<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber

const PL = "#ede9fe";  // light purple

const RL = "#fdf0f0";  // light red

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter

const CHAPTER_META = {
  number: 18,
  title: "Variation and Selection",

  flashcardCount: 56,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [

  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },

// ════════════════════════════════════════════════════════════════════════════

// ── Continuous vs Discontinuous variation graphs ─────────────────────────────

      <text x="35" y="180" fontSize="10" fill={GR} transform="rotate(-90 35 180)">frequency</text>

        <rect x="180" y="130" width="20" height="150" fill={GL} stroke={G} strokeWidth="0.8"/>

// ── Gene mutation diagram (DNA base substitution) ─────────────────────────────
function GeneMutationSVG() {
  return (
    <svg viewBox="0 0 720 280" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="280" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Gene Mutation — Base Substitution
      </text>

      {/* ORIGINAL */}
      <text x="120" y="60" textAnchor="middle" fontSize="12" fontWeight="700" fill={GR}>ORIGINAL sequence</text>
      <text x="120" y="75" textAnchor="middle" fontSize="10" fill="#666">2 triplets = 2 amino acids</text>
      {/* boxes */}
      <g>
        {["A","T","G","C","A","G"].map((b, i) => (
          <g key={i}>
            <rect x={30 + i*32} y="90" width="28" height="36" fill="#fff" stroke={G} strokeWidth="1.2" rx="3"/>
            <text x={44 + i*32} y="113" textAnchor="middle" fontSize="14" fontWeight="700" fill={G}>{b}</text>
          </g>
        ))}
        <line x1="30" y1="135" x2="120" y2="135" stroke={PU} strokeWidth="2"/>
        <line x1="124" y1="135" x2="218" y2="135" stroke={PU} strokeWidth="2"/>
        <text x="75" y="155" textAnchor="middle" fontSize="10" fontWeight="700" fill={PU}>amino acid 1</text>
        <text x="170" y="155" textAnchor="middle" fontSize="10" fontWeight="700" fill={PU}>amino acid 2</text>
      </g>

      {/* arrow */}
      <text x="370" y="115" textAnchor="middle" fontSize="20" fontWeight="700" fill={RD}>↓</text>
      <text x="370" y="135" textAnchor="middle" fontSize="11" fill={RD}>random change</text>

      {/* MUTATED */}
      <text x="600" y="60" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>MUTATED sequence</text>
      <text x="600" y="75" textAnchor="middle" fontSize="10" fill="#666">one base changed → wrong amino acid</text>
      <g>
        {["A","C","G","C","A","G"].map((b, i) => (
          <g key={i}>

        { y: 110, title: "2 · OVER-PRODUCTION", body: "More offspring are produced than can survive — there is competition for food, mates, space." },

// ① QUICK ESSENCE TAB — 5-min last-minute review
// ════════════════════════════════════════════════════════════════════════════
function EssenceTab() {
  const Card = ({ title, color, bg, children }) => (

  return (
    <div>
      <div style={{ background: AM, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55, marginBottom: 14 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>⏱️ Quick Essence — 5-minute Last-Minute Review</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          The 11 highest-yield ideas of Chapter 18. If you only have 5 minutes — read these.
        </div>
      </div>

      <Card title="① KEY DEFINITIONS — Memorise word-for-word" color={AM} bg={AL}>
        <div style={{ marginBottom: 4 }}><Bold>Variation</Bold> = the differences between individuals of the <KW c={AM}>same species</KW>.</div>
        <div style={{ marginBottom: 4 }}><Bold>Mutation</Bold> = a <KW c={AM}>genetic change</KW>.</div>
        <div style={{ marginBottom: 4 }}><Bold>Gene mutation</Bold> = a <KW c={AM}>random change in the base sequence of DNA</KW>.</div>
        <div style={{ marginBottom: 4 }}><Bold>Adaptive feature</Bold> = an <KW c={AM}>inherited</KW> feature that helps an organism <Bold>survive and reproduce</Bold> in its environment.</div>
        <div style={{ marginBottom: 4 }}><Bold>Adaptation</Bold> = the process by which populations become <KW c={AM}>more suited</KW> to their environment over many generations (= natural selection over time).</div>
        <div><Bold>Hydrophyte</Bold> = plant adapted to <KW c={AM}>watery</KW> habitats. <Bold>Xerophyte</Bold> = plant adapted to <KW c={AM}>very dry</KW> habitats.</div>
      </Card>

      <Card title="② CONTINUOUS vs DISCONTINUOUS VARIATION" color={AM} bg={AL}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr style={{ background: "#fff" }}><th style={{ border: `1px solid ${BD}`, padding: 6, color: AM, textAlign: "left" }}>Feature</th><th style={{ border: `1px solid ${BD}`, padding: 6, color: AM }}>Continuous</th><th style={{ border: `1px solid ${BD}`, padding: 6, color: AM }}>Discontinuous</th></tr></thead>
          <tbody>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Range</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>SMOOTH — all values between extremes</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>DISTINCT categories, no intermediates</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Genetic control</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>MANY genes (polygenic)</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>ONE gene (or very few)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Environment</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Yes — strongly affected</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Little / no effect</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Graph</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Histogram → bell curve</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Bar chart (gaps between bars)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Examples</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Height, mass, hand-span, skin colour</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>Blood group (ABO), tongue rolling, sex</td></tr>
          </tbody>
        </table>
      </Card>

      <Card title="③ SOURCES OF GENETIC VARIATION (EXT)" color={AM} bg={AL}>
        <ol style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Mutation</Bold> — new alleles arise as random changes in DNA bases.</li>
          <li><Bold>Meiosis</Bold> — homologous chromosomes randomly assort → each gamete has a unique mix.</li>
          <li><Bold>Random mating</Bold> — any sperm can fertilise any ovum.</li>
          <li><Bold>Random fertilisation</Bold> — a new combination of alleles forms in every zygote.</li>
        </ol>
        <div style={{ marginTop: 6 }}><Bold>Causes of MORE mutations:</Bold> <KW c={AM}>ionising radiation</KW> (X-rays, UV, radioactive sources) and certain <KW c={AM}>chemicals</KW> (tar in tobacco smoke).</div>
      </Card>

      <Card title="④ ADAPTIVE FEATURES — How to spot them in an exam" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li>Look at the <Bold>habitat</Bold>: cold? hot? dry? wet? salty? predator-heavy?</li>
          <li>For every feature, ask <KW c={AM}>"how does it help survival or reproduction?"</KW> in THAT habitat.</li>
          <li>Adaptations are <Bold>inherited</Bold> (passed on through genes), not learned.</li>
          <li>Use a 2-column table: <Bold>feature → function</Bold>. (e.g. Camel hump → stores fat for later respiration → metabolic water.)</li>
        </ul>
      </Card>

      <Card title="⑤ XEROPHYTES — Plants of DRY habitats" color={AM} bg={AL}>
        <div style={{ marginBottom: 5 }}>All adaptations have ONE goal: <KW c={AM}>reduce transpiration</KW> AND find water.</div>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Thick waxy cuticle</Bold> → prevents evaporation through epidermis.</li>
          <li><Bold>Sunken stomata + hairs</Bold> → trap humid air, slow diffusion of water vapour.</li>
          <li><Bold>Rolled leaves</Bold> (Marram grass) → enclose stomata in a humid pocket.</li>
          <li><Bold>Reduced leaves / spines</Bold> (cactus) → small surface area; spines also deter herbivores.</li>
          <li><Bold>Long roots</Bold> → reach groundwater deep in sand.</li>
          <li><Bold>Succulent stems</Bold> (cactus) → store water; thick green stem does photosynthesis.</li>
        </ul>
      </Card>

      <Card title="⑥ HYDROPHYTES — Plants of WATER" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Large air spaces</Bold> in leaf &amp; stem → buoyancy; leaves float to reach sunlight.</li>
          <li><Bold>Stomata on UPPER epidermis only</Bold> → gas exchange with air above (none below — water entering would block air spaces).</li>
          <li><Bold>Weak stems</Bold> → water provides support, no need for thick lignified tissue.</li>
          <li><Bold>Roots with air spaces</Bold> → mud is poorly oxygenated; root cells still need O₂ for respiration.</li>
        </ul>
      </Card>

      <Card title="⑦ NATURAL SELECTION — The 5 STEPS (Darwin)" color={AM} bg={AL}>
        <ol style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Variation</Bold> exists in every population (genetic).</li>
          <li>More offspring are produced than can survive → <Bold>competition</Bold> (food, mates, space).</li>
          <li>The environment exerts a <KW c={AM}>selection pressure</KW> (predator, disease, climate).</li>
          <li>Best-adapted individuals <Bold>survive longer + reproduce more</Bold> → pass on advantageous alleles.</li>
          <li>Over many generations, the advantageous alleles become <KW c={AM}>more frequent</KW>; population is now better adapted = <Bold>evolution by natural selection</Bold>.</li>
        </ol>
      </Card>

      <Card title="⑧ TWO CLASSIC EXAMPLES OF NATURAL SELECTION" color={AM} bg={AL}>
        <div style={{ marginBottom: 5 }}><Bold>1 · Peppered moth</Bold> — industrial soot darkened tree trunks; dark moths were better camouflaged; birds (predators) ate more pale moths; dark allele rose to ~98%.</div>
        <div><Bold>2 · Antibiotic-resistant bacteria</Bold> — chance mutation gives one bacterium resistance; antibiotic kills others; the resistant one survives and divides every ~20 min; <KW c={AM}>whole population becomes resistant</KW>. (Same logic as natural selection — just over hours, not years.)</div>
      </Card>

      <Card title="⑨ ARTIFICIAL SELECTION (Selective Breeding)" color={AM} bg={AL}>
        <ol style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Identify</Bold> a desired feature (e.g. high milk yield, large fruit, disease resistance).</li>
          <li><Bold>Select</Bold> parents that show the feature strongly.</li>
          <li><Bold>Cross-breed</Bold> them; from the offspring, select those that show the feature even more strongly.</li>
          <li><Bold>Repeat</Bold> for many generations until a true-breeding variety is established.</li>
        </ol>
        <div style={{ marginTop: 6 }}><Bold>Pros:</Bold> faster than natural selection; produces commercially useful varieties (high-yield wheat, Friesian cows).</div>
        <div><Bold>Cons:</Bold> <KW c={AM}>reduces variation</KW> in the gene pool → species may be wiped out by a new disease or climate change; harmful recessive alleles can build up.</div>
      </Card>

      <Card title="⑩ NATURAL vs ARTIFICIAL SELECTION — The exam table" color={AM} bg={AL}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM, textAlign: "left" }}>Feature</th><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Natural</th><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Artificial</th></tr></thead>
          <tbody>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Who selects</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>Environment</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>Humans</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Criterion</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>Survival / reproduction</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>Commercially useful trait</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Speed</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>SLOW (many generations)</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>FAST (focused breeding)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Effect on variation</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>Keeps variation; only shifts allele frequencies</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>REDUCES variation</td></tr>
          </tbody>
        </table>
      </Card>

      <Card title="⑪ EXAMINER TRAPS — Easy marks lost here" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>"Mutation = bad" is wrong.</Bold> Most mutations are harmful or neutral, but the rare beneficial mutation is the RAW MATERIAL for evolution.</li>
          <li><Bold>"They adapted because they wanted to" is wrong.</Bold> No organism chooses its mutations. Variation exists first; the environment then selects.</li>
          <li><Bold>"Fittest = strongest" is wrong.</Bold> Fittest = best ADAPTED to the current environment (could be smallest, slowest, or most colourful).</li>
          <li><Bold>"Bacteria become resistant because of antibiotics" is wrong.</Bold> Bacteria have mutations BEFORE the antibiotic; the antibiotic just SELECTS the already-resistant ones.</li>
          <li><Bold>"Suntan is inherited" is wrong.</Bold> Suntan is an ACQUIRED feature (not in genes) — only INHERITED features can be acted on by natural selection.</li>
          <li><Bold>Camel humps store FAT, not water.</Bold> The fat releases water when respired (metabolic water).</li>
        </ul>
      </Card>

      <div style={{ marginTop: 14, padding: "12px 16px", background: AL, borderRadius: 10, fontSize: 12, color: AM, border: `1.5px solid ${AM}` }}>
        🎯 <Bold>Memory hooks:</Bold> (1) "VOSSE" for natural selection — <Bold>V</Bold>ariation, <Bold>O</Bold>verproduction, <Bold>S</Bold>truggle, <Bold>S</Bold>urvival, <Bold>E</Bold>volution. (2) Xerophyte = "x" looks like crossed arms = "no water leaving". (3) Hydrophyte = HYDRO + PHYTE = water plant. (4) Bell-curve graph → continuous; bar gaps → discontinuous. (5) Always link feature → habitat → survival benefit.
      </div>

      <div style={{ marginTop: 10, padding: "12px 16px", background: "#fef9e6", borderRadius: 10, fontSize: 12, color: "#8a6d1f", border: `1.5px solid #f0c14b` }}>
        📑 <Bold>SME exam-emphasis cheat row:</Bold> Phenotypic variation has only TWO causes — <Bold>genetic</Bold> (genes) and <Bold>environmental</Bold> (climate, diet, accidents, culture, lifestyle). Mutagens = <Bold>ionising radiation</Bold> + <Bold>non-ionising UV</Bold> + <Bold>chemicals (tar in tobacco)</Bold>. Worked example animals to know: <Bold>fennec fox</Bold> (large ears / pale fur / furry feet), <Bold>gerbil</Bold> (concentrated urine 5400 mOsm/L). Selective-breeding poster child: <Bold>wild brassica → 6 vegetables</Bold> (cabbage, cauliflower, broccoli, Brussels sprouts, kale, kohlrabi); and <Bold>wolf → modern dog breeds</Bold>. Universal natural-selection narrative: variation → mutation → survival advantage → live longer + breed more + pass genes on → over generations the trait becomes the norm.
      </div>
    </div>
  );
}

      a: "(a) Natural vs artificial selection [3 — any 3, contrast clearly]:\n• Selector — NATURAL: environment / nature; ARTIFICIAL: humans. [1]\n• Trait selected — NATURAL: survival & reproduction; ARTIFICIAL: useful to humans (yield, taste, appearance). [1]\n• Speed — NATURAL: slow (many generations); ARTIFICIAL: fast (few generations). [1]\n• Genetic variation — NATURAL: maintained; ARTIFICIAL: reduced (narrow gene pool).\n\n(b) Wild Mustard → KALE [4]:\n• Wild Mustard plants in the original population show natural genetic VARIATION in leaf size, leaf number, leaf colour. [1]\n• Humans SELECT individuals with the LARGEST / MOST NUTRITIOUS leaves as the parents of the next generation. [1]\n• These selected parents are CROSSED (bred together); their offspring inherit the alleles for large leaves. [1]\n• From the offspring, again only the plants with the BEST leaves are selected and bred; REPEATED over MANY generations, this produces the kale plant — a Brassica oleracea variety bred specifically for its leaves. [1]\n\n(c) Streptomycin data:\nDescribe & explain [4]:\n• Variant X INCREASES from 52 to 99 over 15 generations — it almost doubles and dominates the population. [1]\n• Variant Y DECREASES sharply from 51 to 1 — it is almost completely eliminated. [1]\n• X must therefore carry an allele giving streptomycin RESISTANCE; Y is susceptible and killed by the antibiotic. [1]\n• The change is gradual because each generation only the resistant survivors reproduce → over many divisions, X's frequency rises while Y's falls. [1]\n\nProcess (natural selection) leading to X [4]:\n• The bacterial population shows GENETIC VARIATION caused by random MUTATION — a few cells (variant X) carry a streptomycin-resistance allele. [1]\n• Streptomycin acts as a SELECTION PRESSURE — susceptible Y bacteria are killed. [1]\n• Resistant X bacteria SURVIVE, reproduce by binary fission, and pass the resistance allele to all offspring. [1]\n• Over MANY generations the resistance allele rises in frequency until the population is almost entirely resistant — this is NATURAL SELECTION of antibiotic-resistant bacteria (a classic example). [1]"

ng alleles continue to be favoured and passed on; the physical form is conserved while ants diversify into 12 000+ species mostly through behavioural/chemical differences. [1]"

          <Bold>{filtered.length}</Bold> question{filtered.length !== 1 ? "s" : ""} ·

        </div>
        <div style={{ display: "flex", gap: 6 }}>

            padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",

        </div>
      )}

      {/* Question cards */}
      {filtered.map(q => {
        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>

                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.src && (
                    <span title={q.src === "Hodder" ? "Hodder textbook official question" : q.src === "SME" ? "Save My Exams style question" : q.src === "MCQ" ? "Save My Exams Multiple-Choice Question" : "NLCS supplementary question"}
                      style={{ background: q.src === "Hodder" ? G : q.src === "SME" ? TL : q.src === "MCQ" ? "#0a5a8c" : "#7a6a40", color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                      {q.src === "Hodder" ? "HODDER" : q.src === "SME" ? "SME" : q.src === "MCQ" ? "SME MCQ" : "SUPPL"}
                    </span>
                  )}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

      <div style={box}>

        <GeneMutationSVG />

        </div>
        <div style={sub}>Consequences</div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li>If in a <Bold>gamete</Bold> → the whole offspring is affected (genetic disorder, e.g. cystic fibrosis, haemophilia).</li>

      {/* 4. ADAPTIVE FEATURES — HYDROPHYTES */}
      <div style={box}>
        <div style={head}>4 · Adaptive features — Hydrophytes (watery habitats)</div>
        <HydrophyteLeafSVG />

          <thead><tr><th style={th}>Adaptation</th><th style={th}>Function</th></tr></thead>

            <tr><td style={td}><Bold>Defence / camouflage</Bold></td><td style={td}>White fur — camouflage on snow when hunting seals</td><td style={td}>Sandy fur — camouflage; closable nostrils + long eyelashes keep out sand</td></tr>

          </tbody>
        </table>
      </div>

      {/* 7. NATURAL vs ARTIFICIAL */}
      <div style={box}>
        <div style={head}>7 · Natural vs Artificial selection</div>
        <SelectionComparisonSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 10 }}>
          <thead><tr><th style={th}>Feature</th><th style={th}>Natural selection</th><th style={th}>Artificial selection</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Who selects?</Bold></td><td style={td}>The environment (predators, climate, food)</td><td style={td}>Humans — choose individuals to breed</td></tr>
            <tr><td style={td}><Bold>Criterion</Bold></td><td style={td}>Survival and reproduction in the wild</td><td style={td}>Commercially useful features (yield, taste, appearance)</td></tr>
            <tr><td style={td}><Bold>Speed</Bold></td><td style={td}>Slow — many generations</td><td style={td}>Fast — directed each generation</td></tr>
            <tr><td style={td}><Bold>Effect on gene pool</Bold></td><td style={td}>Allele frequencies shift; variation preserved</td><td style={td}>Variation REDUCED — only chosen alleles kept</td></tr>

          </tbody>
        </table>
        <div style={sub}>Selective breeding — the 4-step recipe</div>
        <ol style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li>Identify the desired feature(s) (high yield, disease resistance, etc.).</li>
          <li>Select parents with the strongest expression of those features.</li>
          <li>Cross-breed them and choose the best offspring.</li>
          <li>Repeat over many generations until a true-breeding variety is established.</li>
        </ol>
        <div style={sub}>⚠️ Risk</div>
        <div style={text}>
          By removing all individuals without the desired feature, many alleles are LOST from the gene pool. If a new disease, pest or climate change appears, the population has no genetic variation to draw on → mass loss is possible (e.g. Irish potato famine).
        </div>
      </div>

      {/* 8. KEY DEFINITIONS QUICK REFERENCE */}
      <div style={box}>
        <div style={head}>8 · Key definitions (memorise word-for-word)</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Term</th><th style={th}>Definition</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Variation</Bold></td><td style={td}>The differences between individuals of the same species.</td></tr>
            <tr><td style={td}><Bold>Mutation</Bold></td><td style={td}>A genetic change.</td></tr>
            <tr><td style={td}><Bold>Gene mutation</Bold> <Ext /></td><td style={td}>A random change in the base sequence of DNA.</td></tr>
            <tr><td style={td}><Bold>Adaptive feature</Bold></td><td style={td}>An inherited feature that helps an organism to survive and reproduce in its environment.</td></tr>
            <tr><td style={td}><Bold>Adaptation</Bold></td><td style={td}>The process resulting from natural selection by which populations become more suited to their environment over many generations.</td></tr>
            <tr><td style={td}><Bold>Hydrophyte</Bold></td><td style={td}>A plant with adaptive features to live in a watery environment.</td></tr>
            <tr><td style={td}><Bold>Xerophyte</Bold></td><td style={td}>A plant with adaptive features to live in very dry environments.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ④ TEXTBOOK TAB — full Hodder notes (Ch.18, pp. 300–315)
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  const box = { border: `1.5px solid ${BD}`, borderRadius: 12, padding: "16px 18px", background: "#fff", marginBottom: 14 };
  const head = { fontSize: 14, fontWeight: 800, color: G, marginBottom: 10, paddingBottom: 6, borderBottom: `2px solid ${GL}` };
  const sub = { fontSize: 13, fontWeight: 700, color: G, marginTop: 12, marginBottom: 6 };
  const text = { fontSize: 12.5, color: GR, lineHeight: 1.7 };
  const defBox = { background: GL, border: `1.5px solid ${GM}`, borderLeft: `4px solid ${G}`, borderRadius: 8, padding: "10px 14px", margin: "10px 0", fontSize: 12.5, color: G, lineHeight: 1.65 };
  const focus = { background: "#fffbeb", border: `1.5px solid #f0c14b`, borderRadius: 8, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: "#8a6d1f", lineHeight: 1.55 };
  const going = { background: "#e8f5e9", border: `1.5px solid ${GM}`, borderLeft: `4px solid ${GM}`, borderRadius: 8, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: G, lineHeight: 1.6 };
  const th = { background: GL, color: G, padding: "7px 10px", fontSize: 11.5, fontWeight: 700, textAlign: "left", border: `1px solid ${BD}` };
  const td = { padding: "7px 10px", fontSize: 12, color: GR, border: `1px solid ${BD}`, verticalAlign: "top", lineHeight: 1.55 };

  return (
    <div>
      {/* INTRO */}
      <div style={{ ...box, background: GL, border: `1.5px solid ${G}` }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: G, marginBottom: 8 }}>
          📗 Chapter 18 · Variation and Selection (Hodder pp. 300–315)
        </div>
        <div style={{ ...text, color: G }}>
          When you look at a crowd of people of the same species, you can see a wide range of differences. This chapter explains what causes that variation, how features are inherited, why some features become more common while others disappear, and how humans manipulate the best features in animals and plants to produce better food.
        </div>
      </div>

      {/* SECTION 1 — VARIATION */}
      <div style={box}>
        <div style={head}>18.1 · Variation</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What is variation? · What does continuous variation result in? · What does discontinuous variation result in? · What are discontinuous and continuous variation usually caused by? · Examples of each.
        </div>
        <div style={defBox}>
          <Bold>Variation</Bold> — the differences between individuals of the same species.
        </div>
        <div style={text}>
          All domestic cats belong to the same species (they can interbreed), but there are many variations in size, coat colour, eye colour and fur length. Some variations are <KW>inherited</KW> — controlled by genes — and are called <KW>genetic</KW> variations. <KW>Phenotypic</KW> variations can be produced by genes, but can also be caused by the environment, or by a combination of both.
        </div>
        <div style={text}>
          Some variations are NOT heritable. They are brought about by factors in the environment. A kitten that does not get enough food will not grow as large as a well-fed littermate. A cat with skin disease may have bald patches. These are caused by environmental effects and are NOT passed on. A fair-skinned person may go brown by tanning in sunlight — a suntan is an <Bold>acquired</Bold> characteristic that you cannot inherit. Black skin, on the other hand, is an <KW>inherited</KW> characteristic.
        </div>
        <div style={text}>
          Many features in plants and animals are a <Bold>mixture of acquired and inherited</Bold> characteristics. Some fair-skinned people never go brown — they only sunburn — because they have not inherited the genes that produce extra brown pigment. A fair-skinned person with those genes will only go brown if they expose themselves to sunlight, so the tan is the result of BOTH inheritance and environment.
        </div>
        <VariationGraphsSVG />

        <div style={sub}>Continuous variation</div>
        <div style={text}>
          <KW>Continuous variation</KW> is influenced by a combination of genetic and environmental factors. An example is height. There are no distinct categories — people are not either tall or short; there are all possible intermediates. Continuous characteristics are usually controlled by several pairs of alleles. For example, there might be five pairs of alleles for height (Hh, Tt, Ll, Ee, Gg), each dominant allele adding 4 cm. A person who inherited all ten dominant alleles (HH TT LL EE GG) could be 40 cm taller than someone who inherited all ten recessive alleles.
        </div>
        <div style={text}>
          Continuous variation is also strongly influenced by environment. A person may inherit genes for tallness but, without enough food, will not grow tall. A plant may have the genes for large fruits but, without enough water and minerals, will not produce them. Continuous variations in human populations — height, physique, intelligence — are always the result of contributions from BOTH genotype and environment.
        </div>

        <div style={sub}>Discontinuous variation</div>
        <div style={text}>
          In <KW>discontinuous variation</KW>, the variations take the form of distinct, alternative phenotypes with NO intermediates. Pea seeds may be wrinkled OR smooth; their colour may be yellow OR green. Mice are either black or brown; there are no intermediates. You are either male or female. Some people can roll their tongue into a tube; others (non-rollers) cannot.
        </div>
        <div style={text}>
          Discontinuous variation cannot usually be altered by the environment — you cannot change your eye colour by altering your diet, and a genetic dwarf cannot grow taller by eating more food. Discontinuous variation is under the control of a <Bold>single pair of alleles or a small number of genes</Bold>.
        </div>
        <div style={text}>
          A clear example is human <KW>blood groups</KW>: a person is one of four — A, B, AB or O. There are no groups in between. Many characteristics are difficult to classify cleanly: eye colour can be classified as blue or brown, but also as grey, hazel or green. Red hair is discontinuous, but it is hidden by other hair-colour genes, so overall hair colour ranges continuously from blond to black.
        </div>

        <div style={sub}>Practical work — collecting variation data</div>
        <div style={text}>
          Set up a table to record features for each student: name, eye colour, tongue roller? (Y/N), hand span (cm), shoe size, height (cm). Tongue rolling and eye colour are CATEGORIC → plot as a BAR CHART (columns separated). Hand span, shoe size and height are NUMERICAL CONTINUOUS → group into class intervals (e.g. heights 155–159, 160–164, ...) and plot as a HISTOGRAM (bars touching). A large sample tends to show a normal (bell-shaped) distribution.
        </div>
      </div>

      {/* SECTION 2 — MUTATIONS */}
      <div style={box}>
        <div style={head}>18.2 · Mutations</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What is mutation? · What is gene mutation? · How are new alleles formed? · What are sources of genetic variation in populations? · What increases the rate of mutation?
        </div>
        <div style={defBox}>
          <Bold>Mutation</Bold> — a genetic change.<br />
          <Bold>Gene mutation</Bold> — a random change in the base sequence of DNA. <Ext />
        </div>
        <div style={text}>
          A mutation is a spontaneous genetic change and is the way new alleles are formed. A mutation may occur in a single gene or in a whole chromosome. In a gene mutation, one or more bases may not be copied correctly. A chromosome mutation can come from loss of part of a chromosome, damage during mitosis or meiosis, or even gain of an extra chromosome (as in Down's syndrome).
        </div>
        <GeneMutationSVG />

        <div style={sub}>Why most mutations are harmful</div>
        <div style={text}>
          A sudden change in a gene is likely to produce a <Bold>faulty enzyme</Bold> or other protein that disrupts cell reactions. So, most mutations are harmful. However, only about 3% of human DNA actually codes for proteins; the rest is non-coding (sometimes called 'junk' DNA). Mutations in the non-coding regions usually have no effect on the organism.
        </div>
        <div style={text}>
          Rarely, a gene or chromosome mutation produces a USEFUL effect, contributing to survival — this is the basis of evolution by natural selection. If a mutation occurs in a <Bold>gamete</Bold>, ALL cells of the resulting individual carry it (whole organism affected — e.g. cystic fibrosis, haemophilia). If a mutation occurs in a <Bold>somatic (body) cell</Bold>, only the cells produced from it (by mitosis) are affected — this can cause cancer (uncontrolled cell division, e.g. basal-cell skin cancer).
        </div>

        <div style={sub}>Mutations in bacteria</div>
        <div style={text}>
          Bacteria reproduce very rapidly (every ~20 minutes). Even a very rare mutation will appear in a large population. If the population contains one or two drug-resistant mutants and is exposed to that drug, the non-resistant bacteria are killed but the resistant mutants SURVIVE. When they reproduce, all offspring are resistant. Mutations are rare events (perhaps one in 100 000 replications), but they happen naturally all the time.
        </div>

        <div style={sub}>Causes of increases in mutation rate</div>
        <div style={text}>
          Some chemicals and <KW>ionising radiation</KW> can change DNA. Sources include X-rays, radioactive compounds, and ultraviolet (UV) radiation from sunlight. Tobacco-smoke chemicals (tar) are mutagens that can cause cancer. It is uncertain whether there is a 'safe' minimum dose of radiation; it is sensible to keep exposure to a minimum. Recently it has been confirmed that light-skinned people who do not protect themselves from UV can develop skin cancer.
        </div>

        <div style={sub}>Sources of genetic variation in populations <Ext /></div>
        <div style={text}>
          Genetic variation in a population may come from:
        </div>
        <ol style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li><Bold>Mutation</Bold> — new alleles.</li>
          <li><Bold>Meiosis</Bold> — homologous chromosomes assort randomly into gametes.</li>
          <li><Bold>Random mating</Bold> — any sperm can fertilise any ovum.</li>
          <li><Bold>Random fertilisation</Bold> — new combinations of alleles in every zygote.</li>
        </ol>
        <div style={text}>
          If a grey, long-furred cat is mated with a black, short-furred cat, the F1 kittens are all black, short-furred. If F1 are interbred, the F2 litters may include FOUR varieties: black-short, black-long, grey-short, grey-long — two of which are different from either parent. This shuffling of alleles is a major source of variation.
        </div>

        <div style={going}>
          <Bold>Going further — Down's syndrome.</Bold> Down's syndrome arises from a chromosome mutation: during meiosis producing an ovum, chromosome 21 fails to separate from its partner (non-disjunction). The ovum carries 24 chromosomes instead of 23, and the resulting zygote has 47 instead of 46. The risk increases with the mother's age.
        </div>
      </div>

      {/* SECTION 3 — ADAPTIVE FEATURES */}
      <div style={box}>
        <div style={head}>18.3 · Adaptive features</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What is an adaptive feature? · What are the adaptive features of a species? · How are hydrophytes and xerophytes adapted to their environments?
        </div>
        <div style={defBox}>
          <Bold>Adaptive feature</Bold> — an inherited feature that helps an organism to survive and reproduce in its environment.
        </div>
        <div style={text}>
          When biologists say that a plant or animal is <Bold>adapted</Bold> to its habitat, they mean that, over the course of evolution, changes have occurred that make the organism more successful in using its habitat. Examples include animals finding and digesting food, selecting nest sites or hiding places, or plants using limited mineral resources and coping with salinity or drought. If an organism is found in a habitat, it must be adapted — otherwise it would have died out by natural selection.
        </div>
        <div style={text}>
          Sometimes, just by looking at an organism and comparing it with related species, we can make reasoned guesses about adaptation. For example, the long, hair-fringed hind legs of a water beetle are clearly adaptations for swimming when compared with the legs of a land-living relative. The flattened, paddle-like forelimb of a whale, compared with the limb of other mammals, is clearly adapted for locomotion in water.
        </div>

        <div style={sub}>The camel — adapted to hot, dry, sandy environments</div>
        <div style={text}>
          Camels show several adaptive features:
        </div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li><Bold>Closable nostrils</Bold> and <Bold>long eyelashes</Bold> → keep out wind-blown sand.</li>
          <li><Bold>Broad, splayed feet</Bold> → spread weight; do not sink in soft sand.</li>
          <li><Bold>Thick fur</Bold> → insulates against heat gain in intense sunlight.</li>
          <li>Can survive without water for 6–8 days; stomach holds large volumes when water is available.</li>
          <li>Body temperature rises to ~40 °C by day, falls to ~35 °C at night → reduces the temperature gradient between body and surroundings, so less heat is absorbed.</li>
          <li>Tolerates water loss equivalent to 25% of body weight (humans die at 12% loss). Blood volume is maintained by removing water from body tissues first.</li>
          <li>Nasal passages lined with mucus that absorbs water vapour from exhaled air during the day and re-moistens inhaled air at night.</li>
          <li><Bold>Humps store FAT</Bold> (not water). When fat is respired, CO₂ and metabolic water are produced — the water-conserving mucus traps some of this.</li>
        </ul>

        <div style={sub}>The polar bear — adapted to the Arctic</div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li>Very large body → small surface-area-to-volume ratio → proportionately less heat lost.</li>
          <li>Small ears and short limbs further reduce heat-losing surface area.</li>
          <li>Thick coat: long, loosely-packed oily guard hairs over a dense layer of short woolly hairs → insulation; can shake off water after swimming.</li>
          <li>Hollow guard hairs may transmit sunlight to the dark skin below; black skin is efficient at absorbing heat. White colour also gives camouflage on snow/ice for hunting seals.</li>
          <li>~10 cm of fat (BLUBBER) beneath the skin → main thermal insulation. Fat has limited blood supply, so very little warm blood reaches the skin surface.</li>
          <li><Bold>Heat-exchange mechanism in the limbs</Bold>: arteries supplying the feet run close to veins returning blood. Heat is transferred from artery to vein BEFORE blood reaches the feet, so little heat is lost there. Feet stay just above freezing → no frost-bite.</li>
          <li>Pregnant females dig dens in snow; cubs are born and reared in shelter for ~140 days, suckling on rich milk made from fat reserves.</li>
        </ul>

        <div style={sub}>Venus flytrap, long-eared bat, hare</div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li><Bold>Venus flytrap</Bold> — paired leaves with tooth-like edges and sensitive trigger hairs; when an insect walks inside, leaves snap shut, secrete proteases, digest insect protein into soluble amino acids, absorb them through the leaf → gains nitrates that the soil cannot provide.</li>
          <li><Bold>Long-eared bat</Bold> — emits high-pitched sounds; echoes reflected off prey/obstacles are picked up by very large ears and sensitive patches on the face. Times the echoes to judge distance (echolocation). Fingers very long, supporting a wing-membrane stretched between them.</li>
          <li><Bold>Hare</Bold> — long ears for sound detection; brown/grey fur for camouflage (some species turn white in winter); long hind legs for fast running and powerful defensive kicks; side-mounted eyes give nearly 360° vision while feeding.</li>
        </ul>
        <AnimalAdaptationsSVG />

        <div style={sub}>Adaptations to arid conditions (XEROPHYTES)</div>
        <div style={text}>
          In hot or cold climates, plants may suffer water shortage — high temperatures speed evaporation; at very low temperatures soil water is frozen and unavailable. Plants modified to cope with lack of water are called <KW>xerophytes</KW>. Many trees in temperate zones drop leaves in autumn — a vital adaptation to winter drought; this also forces dormancy (low metabolic activity) because the plant cannot photosynthesise without leaves.
        </div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li><Bold>Pine tree</Bold> — evergreen with small, needle-like leaves. Tiny surface area → wind blows through; reduces transpiration. Sunken stomata create high humidity around openings → less transpiration. Thick waxy cuticle prevents water loss.</li>
          <li><Bold>Cacti</Bold> — often no leaves or leaves reduced to spines (smaller surface area; spines deter herbivores). Photosynthesis occurs in a thick green succulent stem that stores water. Stomata closed by day (high evaporation), open at night → CO₂ taken in and fixed into an organic acid; in daytime the acid releases CO₂ for photosynthesis. Closure by day greatly reduces water loss.</li>
          <li><Bold>Marram grass</Bold> — lives on sand dunes. Very long roots reach deep water. Leaves roll into tubes in dry weather because hinge cells become flaccid. Rolling, combined with sunken stomata in pits and fine hairs around them, builds humidity around stomata → reduces transpiration. Thick waxy cuticle on epidermis prevents evaporation.</li>
        </ul>
        <XerophyteLeafSVG />

        <div style={sub}>Adaptations to living in water (HYDROPHYTES)</div>
        <div style={text}>
          Plants adapted to living in water are called <KW>hydrophytes</KW>. The water lily (<i>Nymphaea</i>) is an example. Leaves contain large air spaces to make them buoyant, so they float on or near the surface to gain light for photosynthesis. There are NO stomata on the lower epidermis (so water cannot enter the air spaces), while stomata ARE present on the upper epidermis for gas exchange with the air above. (Most land plants have stomata mainly on the lower epidermis.) The roots of hydrophytes are often poorly developed but contain air spaces — the mud they grow in is poorly oxygenated, and root cells still need O₂ for respiration. Stems are weak — they do not need to support the plant; surrounding water provides buoyancy.
        </div>
        <HydrophyteLeafSVG />
      </div>

      {/* SECTION 4 — SELECTION */}
      <div style={box}>
        <div style={head}>18.4 · Selection</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What is natural selection? · What is selective breeding? · How is artificial selection carried out over many generations to improve crops and domesticated animals? · Differences between natural and artificial selection.
        </div>

        <div style={sub}>Natural selection</div>
        <div style={text}>
          Theories of evolution have been put forward for hundreds of years. In 1858, Charles Darwin and Alfred Russel Wallace published a theory of evolution by natural selection that is still accepted today. The theory states that:
        </div>
        <ul style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li>Individuals within a species' population are all slightly different from each other — these differences are called <Bold>variations</Bold>.</li>
          <li>If the climate or food supply changes, individuals with some variations may be more able to survive than others.</li>
          <li>Those that live longer also leave behind more offspring. A mouse living 12 months may have 10 litters of 5 babies = 50; a mouse living 6 months may have 5 litters = 25.</li>
          <li>If offspring inherit the alleles responsible for the helpful variation, they too will survive better and have more offspring.</li>
          <li>In time, this variety outnumbers and replaces the original.</li>
        </ul>
        <NaturalSelectionSVG />
        <div style={text}>
          This is sometimes called <Bold>"survival of the fittest"</Bold> — fitness here does NOT mean strength or good health. It means the organism is well fitted (best adapted) to the conditions in which it lives. Thomas Malthus (1798) had suggested that human populations grow faster than food production, regulated by famine, disease and war. Darwin applied this to other species: animals and plants produce far more offspring than can possibly survive to maturity, so there must be a <Bold>struggle for survival</Bold>.
        </div>
        <div style={text}>
          For example, if a pair of rabbits had 8 surviving offspring, then 4 pairs each had 8, then 32 had 8, and so on, the rabbit population would explode (2 → 8 → 32 → 128 → 512). In reality the population stays roughly constant, so most offspring must die before reproducing.
        </div>
        <div style={defBox}>
          <Bold>Adaptation</Bold> — the process resulting from natural selection by which populations become more suited to their environment over many generations.
        </div>

        <div style={sub}>Competition and selection</div>
        <div style={text}>
          There is <KW>competition</KW> between members of a population for food, burrows and mates. If food is limited, only the healthiest, most active, most fertile and best-adapted rabbits survive and breed. Competition does not have to be direct conflict — best-adapted rabbits may run faster from predators, digest food more efficiently, have larger litters or grow coats that camouflage them better. They survive longer, leave more offspring; if offspring inherit the advantageous traits they form a new generation that gradually replaces less well-adapted variants. New variations are said to have <Bold>survival value</Bold>.
        </div>
        <div style={text}>
          For natural selection to be effective, the variations must be <Bold>heritable</Bold>. Acquired features (e.g. an athlete's stronger muscles from training) are NOT passed on to children.
        </div>

        <div style={sub}>Example 1 — The peppered moth</div>
        <div style={text}>
          The peppered moth (Britain) has a common speckled form and a black form. The black variety was rare in 1850 but had increased to 98% of the population in one industrial area of England by 1895. Observation showed the light form had better camouflage on tree trunks covered with lichens; in industrial areas, pollution had killed the lichens and darkened the bark with soot, so the dark form became better hidden and was less often eaten by birds. The dark form survived better, left more offspring and nearly replaced the light form. The selection pressure was bird predation; the adaptive variation was dark colour. (Note: more recent research has shown some complications — moths often rest under branches; in some unpolluted areas the dark form is also common, so research continues to test the hypothesis.)
        </div>

        <div style={sub}>Example 2 — Antibiotic-resistant bacteria</div>
        <div style={text}>
          Bacterial cells reproduce very rapidly (~every 20 minutes). Even rare mutations appear in a large population. If a population contains one or two drug-resistant mutants and is exposed to the drug, non-resistant cells are killed but the resistant mutants survive. Mutant genes are inherited like normal genes, so when the surviving mutants reproduce, all offspring are resistant. This is a clear example of natural selection.
        </div>

        <div style={sub}>Selective breeding (artificial selection)</div>
        <div style={text}>
          The process of <KW>selective breeding</KW> involves humans choosing individuals with desirable features and cross-breeding them. Offspring with the strongest expression of those features are chosen as parents for the next generation. The process is repeated over many generations.
        </div>
        <div style={text}>
          Examples in animals: cats with pointed ears, particular fur colour or length, or no tail — selected over many generations to produce, for instance, the Siamese cat. In farm animals, stock-breeders select calves from cows with high milk yield. These calves form a breeding herd that all produce high yields. Beneficial alleles are kept; less useful ones are discarded. Selective breeding in livestock is slow (small offspring numbers, one breeding per year) and expensive. A long-term disadvantage is the <Bold>loss of variability</Bold> — by removing all offspring without the desired features, many alleles are lost from the population; useful future combinations may no longer be available.
        </div>
        <div style={text}>
          Examples in plants: high-yielding crops (wheat, rice), disease-resistant strains, large-fruited tomato varieties, drought-tolerant plants. Plant breeders go back to <Bold>wild varieties</Bold> to find alleles for salt tolerance, drought resistance or disease resistance — these wild gene pools are threatened by extinction.
        </div>
        <SelectionComparisonSVG />

        <div style={sub}>Comparing natural and artificial selection</div>
        <div style={text}>
          In <Bold>natural selection</Bold>, the environment selects the best-adapted individuals; the population still retains variation; the process is slow and there is no human involvement. In <Bold>artificial selection</Bold>, humans choose which individuals breed for commercial traits; the process is fast and targeted; but variation is REDUCED, leaving the new variety prone to disease and unable to cope with environmental change — potentially putting species at risk of extinction.
        </div>

        <div style={defBox}>
          <Bold>Revision checklist (Hodder p.315):</Bold>
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li>Variation = differences between individuals of the same species.</li>
            <li>Continuous variation → range between two extremes (e.g. height).</li>
            <li>Discontinuous variation → limited categories, no intermediates (e.g. tongue rolling).</li>
            <li>Discontinuous variation is usually caused by a single gene; continuous variation by several genes (and environment).</li>
            <li>Mutation = a genetic change; gene mutation = a random change in DNA base sequence. <Ext /></li>
            <li>Mutation, meiosis, random mating and random fertilisation = sources of genetic variation. <Ext /></li>
            <li>Ionising radiation and some chemicals increase the rate of mutation.</li>
            <li>Adaptive feature = inherited feature aiding survival/reproduction in the environment.</li>
            <li>Hydrophyte = adapted to watery habitat. Xerophyte = adapted to very dry habitat.</li>
            <li>Natural selection: environment eliminates less-adapted variants; populations evolve over time.</li>
            <li>Antibiotic-resistant bacteria are an example of natural selection.</li>
            <li>Selective breeding (artificial selection) improves commercially useful plants and animals.</li>
            <li>In artificial selection humans choose breeders; in natural selection the environment does.</li>
          </ul>
        </div>
      </div>

      {/* ─────────────────────────────────────────────────────────────────
          18.5  SME Theory Notes — exam emphasis & extra worked examples
          ───────────────────────────────────────────────────────────────── */}
      <div style={box}>
        <div style={head}>18.5  SME Theory Notes — exam emphasis &amp; worked examples</div>
        <div style={text}>
          The SME notes condense the same Hodder material with sharper exam framing. Use this section to lock down the <Bold>phenotypic / genetic / environmental terminology</Bold>, the <Bold>worked examples</Bold> CIE examiners reuse, and the comparison tables you can deploy as answer scaffolds.
        </div>

        <div style={sub}>Phenotypic variation — exam-correct vocabulary</div>
        <div style={text}>
          The <Bold>phenotype</Bold> is the set of observable features of an organism. <Bold>Phenotypic variation</Bold> is therefore the difference in observable features between members of the same species. This variation has only TWO ultimate causes:
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={G}>Genetic</KW> — controlled entirely by genes (e.g. blood group, eye colour, biological sex, tongue rolling, free vs fixed earlobes).</li>
            <li><KW c={G}>Environmental</KW> — caused by factors outside the organism: climate, diet, accidents (scarring), culture (language/accent), lifestyle. A plant in shade growing taller to reach light is a classic example.</li>
          </ul>
        </div>
        <div style={text}>
          Most continuous traits are <Bold>both</Bold>: tall parents pass genes giving the offspring the <Bold>genetic potential</Bold> to be tall, but a <Bold>poor diet</Bold> prevents that potential from being reached. Discontinuous traits are almost always purely genetic.
        </div>

        <div style={focus}>
          <Bold>SME exam-correct phrasing.</Bold> When asked "Why do siblings differ in height despite sharing parents?" you should say: "Their <Bold>genotypes</Bold> differ (random combination of parental alleles at meiosis), AND <Bold>environmental factors</Bold> such as diet, illness and exercise during growth affect how that genetic potential is expressed."
        </div>

        <div style={sub}>Mutation — examples, mutagens and consequences</div>
        <div style={text}>
          Most mutations have <Bold>no effect</Bold> on the phenotype (the mutated protein still functions normally). When they do produce a new allele, the effect is usually small. The three possible outcomes are:
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={G}>Beneficial (rare)</KW> — a new feather colour makes a bird more attractive to mates → bird breeds more → mutation spreads (a natural-selection event in waiting).</li>
            <li><KW c={G}>Harmful</KW> — e.g. <Bold>sickle cell anaemia</Bold> in humans: a single base change in the haemoglobin gene gives red blood cells a sickle shape, reducing their oxygen-carrying capacity.</li>
            <li><KW c={G}>Neutral</KW> — most cases: no detectable change in the phenotype.</li>
          </ul>
        </div>
        <div style={text}>
          <Bold>Mutagens — agents that increase mutation rate:</Bold>
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={G}>Ionising radiation</KW> — gamma rays, X-rays. Damage bonds in DNA and change the base sequence.</li>
            <li><KW c={G}>Non-ionising radiation</KW> — ultraviolet (UV) light from the Sun also damages bonds and alters base sequences (linked to skin cancer).</li>
            <li><KW c={G}>Mutagenic chemicals</KW> — e.g. <Bold>tar</Bold> in tobacco smoke; mustard gas; some pesticides.</li>
          </ul>
          Increased mutation rate is linked to <Bold>cancer</Bold>, because mutations in genes that control cell division allow cells to multiply uncontrollably.
        </div>

        <div style={sub}>Adaptive features — fennec fox &amp; gerbil (SME worked examples)</div>
        <FennecFoxSVG />
        <div style={text}>
          The fennec fox is the SME poster animal for <Bold>desert-mammal adaptations</Bold>. Compare its features point-by-point with the camel and polar bear in your answers:
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={G}>Very large ears</KW> — increase surface area for heat loss; also excellent hearing for prey/predators at night.</li>
            <li><KW c={G}>Pale sandy fur</KW> — camouflage against the sand; reflects sunlight, reducing heating.</li>
            <li><KW c={G}>Fur-covered feet</KW> — insulate paws from the burning desert sand.</li>
            <li><KW c={G}>Nocturnal habit + concentrated urine</KW> — minimise water loss (see gerbil example below).</li>
          </ul>
        </div>
        <div style={focus}>
          <Bold>SME WORKED EXAMPLE — gerbil urine (data response).</Bold> Urine concentration data for four mammals: human (temperate) 1450, beaver (fresh water) 480, dolphin (salt water) 1500, <Bold>gerbil (desert) 5400 mOsm/L</Bold>. Q: Suggest and explain one way gerbils are adapted to their environment.
          <br/><br/>
          <Bold>Model answer</Bold> — "Gerbils produce urine that is much more concentrated than the other species (5400 mOsm/L, about 3–4× more than human or dolphin urine). This allows them to <Bold>excrete waste with very little water loss</Bold>, conserving water in a desert environment where it is scarce and difficult to replace."
        </div>

        <div style={sub}>Hydrophyte adaptations — SME emphasis (water lily)</div>
        <div style={text}>
          SME stresses three key features of hydrophyte leaves; expect to label these on a diagram or describe them in a paragraph:
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={PU}>Large air spaces in the leaves</KW> — provide <Bold>flotation</Bold>, keeping leaves near the water surface where <Bold>more light reaches them for photosynthesis</Bold>. <Ext /></li>
            <li><KW c={PU}>Small (reduced) root system</KW> — roots are not needed for water absorption; nutrients can also be absorbed through the leaf tissues from the surrounding water. <Ext /></li>
            <li><KW c={PU}>Stomata mainly on the UPPER epidermis</KW> — usually open all the time; allows easy gas exchange with the air above the water. <Ext /></li>
            <li>Leaves are <Bold>flat</Bold> — maximise the surface lying on the water surface for light absorption and flotation.</li>
          </ul>
        </div>

        <div style={sub}>Xerophyte adaptations — full SME checklist (cactus &amp; marram)</div>
        <div style={text}>
          Combine the points below in your written answer; SME explicitly rewards giving the feature AND the reason it reduces water loss:
          <ul style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li><KW c={PU}>Thick waxy cuticle</KW> — barrier to evaporation; shiny surface reflects heat, lowering leaf temperature. <Ext /></li>
            <li><KW c={PU}>Sunken stomata</KW> — sit in pits in the epidermis; moist air collects in the pits, <Bold>lengthening the diffusion pathway</Bold> and reducing the rate of water loss. <Ext /></li>
            <li><KW c={PU}>Leaves rolled inwards with hairs lining the inner surface</KW> — traps moist air; prevents air movement across stomata; reduces transpiration. (Marram grass.) <Ext /></li>
            <li><KW c={PU}>Small needle-shaped leaves</KW> — reduce surface area for evaporation.</li>
            <li><KW c={PU}>Extensive shallow roots</KW> OR <KW c={PU}>very deep roots</KW> — absorb maximum water after rare rain; reach deep water tables.</li>
            <li><KW c={PU}>Thickened leaves/stem with water-storage cells</KW> — succulent tissue acts as a reservoir (cactus stem).</li>
          </ul>
        </div>

        <div style={sub}>Natural selection — the snail-shell example (SME)</div>
        <div style={text}>
          Beyond peppered moths, SME uses a snail example to drill in the universal 5-step natural-selection narrative:
          <ol style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li>A population of snails varies in shell colour — most are black or grey.</li>
            <li>A random <Bold>mutation</Bold> produces one (or a few) snails with <Bold>white shells</Bold>.</li>
            <li>White-shelled snails are <Bold>better camouflaged</Bold> against their background, so birds (predators) eat fewer of them.</li>
            <li>Surviving white-shelled snails <Bold>reproduce more</Bold>, passing the white-shell allele to their offspring.</li>
            <li>Over many generations, the proportion of white-shelled snails <Bold>increases</Bold> until they dominate the population.</li>
          </ol>
        </div>
        <div style={focus}>
          <Bold>SME examiner tip.</Bold> "There are hundreds of thousands of examples of natural selection — you cannot know them all. They ALL follow the SAME sequence: variation exists → some individuals have a phenotype that gives a survival advantage → those individuals <Bold>live longer, breed more, and are more likely to pass their genes on</Bold> → over generations, the advantageous phenotype becomes the norm." Master the <Bold>concept</Bold>, not just one example.
        </div>

        <div style={sub}>Adaptation by natural selection — what changes &amp; why <Ext /></div>
        <div style={text}>
          • If the environment <Bold>does not change</Bold>, selection does not change — it favours individuals with the same characteristics as their parents (stabilising effect).<br/>
          • If the environment <Bold>changes</Bold>, OR a chance mutation produces a new advantageous allele, selection now favours a different set of features.<br/>
          • Survivors pass on a <Bold>different set of alleles</Bold>, gradually shifting the characteristics of the species: this is <KW c={PU}>evolution</KW>.<br/>
          • Formal definition: <KW c={PU}>Evolution = change in the adaptive features of a population over time as a result of natural selection</KW>. Populations become better suited to their environment — the process of <Bold>adaptation</Bold>.
        </div>

        <div style={sub}>Antibiotic resistance — including plasmid sharing <Ext /></div>
        <div style={text}>
          The classic example of adaptation in action. The 4-step process:
          <ol style={{ paddingLeft: 18, margin: "6px 0 0 0" }}>
            <li>A population of bacteria has variation; a few carry a <Bold>random mutation</Bold> giving antibiotic resistance.</li>
            <li>Exposure to the antibiotic kills the susceptible bacteria (both the pathogenic strain causing illness and useful gut bacteria).</li>
            <li>With <Bold>reduced competition</Bold> for nutrients, the resistant survivors multiply rapidly, forming a large population that is hard to control.</li>
            <li>Bacteria can also <Bold>share plasmids</Bold> carrying the resistance gene — even between different species — accelerating the spread of resistance.</li>
          </ol>
        </div>

        <div style={sub}>Selective breeding — examples &amp; the wild brassica radiation</div>
        <BrassicaRadiationSVG />
        <div style={text}>
          A single wild brassica plant gave rise (through selective breeding for different parts of the plant) to <Bold>six</Bold> common vegetables: <Bold>cabbage</Bold> (selected for the terminal bud), <Bold>cauliflower</Bold> (flower cluster), <Bold>broccoli</Bold> (immature flowers + stem), <Bold>Brussels sprouts</Bold> (lateral buds), <Bold>kale</Bold> (leaves) and <Bold>kohlrabi</Bold> (swollen stem). This is the textbook illustration of how powerful artificial selection is — one ancestor, six commercial crops.
        </div>
        <div style={text}>
          The other classic example is the <Bold>dog</Bold>: humans selectively bred wolves (<i>Canis lupus</i>) for tameness, coat, size and shape, producing hundreds of recognisable breeds — all still the same species, <i>Canis familiaris</i>.
        </div>
        <div style={text}>
          <Bold>SME target traits for plants:</Bold> disease resistance, increased crop yield, hardiness to weather (e.g. drought tolerance), better tasting fruits, large or unusual flowers (ornamental).
          <br/><Bold>SME target traits for animals:</Bold> faster growth, disease resistance, gentle temperament, increased milk yield.
        </div>

        <div style={sub}>Natural vs Artificial selection — SME 3-row table <Ext /></div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6, fontSize: 12 }}>
          <thead>
            <tr style={{ background: GL }}>
              <th style={{ ...th, width: "50%" }}>NATURAL selection</th>
              <th style={{ ...th, width: "50%" }}>ARTIFICIAL selection</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={td}>Occurs naturally (no human involvement).</td><td style={td}>Only occurs when humans intervene.</td></tr>
            <tr><td style={td}>Produces populations <Bold>better adapted to their environment and survival</Bold>.</td><td style={td}>Produces populations with features <Bold>useful to humans</Bold> — not necessarily useful for individual survival.</td></tr>
            <tr><td style={td}>Usually takes a <Bold>long time</Bold>.</td><td style={td}>Takes <Bold>less time</Bold>, because only individuals with the desired feature are allowed to reproduce.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
