<script>
  (function() {
    try {
      var saved = localStorage.getItem('nlcs-bio-theme');
      if (saved === null || saved === 'dark') {

<style>

  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }

  /* ═══════════════════════════════════════════════════════════════════════
     CHAPTER TITLE — punchy black on light, neon green on dark
     ═══════════════════════════════════════════════════════════════════════ */

    display: inline-block;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.5px;

  .chapter-kicker {

  /* ═══════════════════════════════════════════════════════════════════════
     TAB COLORS — vibrant neon for the 5 main tab buttons
     ═══════════════════════════════════════════════════════════════════════ */
  /* Tab text color (when not active) */

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 12,
  title: "Respiration",
  subtitle: "Aerobic · Anaerobic · Yeast · Muscle · Oxygen debt · Practicals",
  flashcardCount: 55,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.12
// ════════════════════════════════════════════════════════════════════════════

// ── Aerobic respiration overview diagram (inputs → outputs) ──────────────────
function AerobicOverviewDiagram() {
  return (
    <svg viewBox="0 0 720 320" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="320" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="26" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Aerobic Respiration — Inputs &amp; Outputs
      </text>

      {/* Inputs (left) */}
      <g>
        {/* Glucose */}
        <rect x="40" y="90" width="120" height="46" rx="23" fill={GL} stroke={G} strokeWidth="1.8"/>
        <text x="100" y="113" textAnchor="middle" fontSize="13" fontWeight="700" fill={G}>glucose</text>
        <text x="100" y="128" textAnchor="middle" fontSize="9" fill={GR}>C₆H₁₂O₆</text>

        {/* Oxygen */}
        <rect x="40" y="170" width="120" height="46" rx="23" fill={GL} stroke={G} strokeWidth="1.8"/>
        <text x="100" y="193" textAnchor="middle" fontSize="13" fontWeight="700" fill={G}>oxygen</text>
        <text x="100" y="208" textAnchor="middle" fontSize="9" fill={GR}>6 O₂</text>
      </g>

      {/* Plus sign */}
      <text x="100" y="160" textAnchor="middle" fontSize="20" fontWeight="700" fill={GR}>+</text>

      {/* Arrow + enzyme label */}
      <path d="M 175 155 L 275 155" stroke={G} strokeWidth="2.5" fill="none" markerEnd="url(#aroar)"/>
      <defs>
        <marker id="aroar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
          <polygon points="0,0 10,3 0,6" fill={G}/>
        </marker>
      </defs>
      <text x="225" y="142" textAnchor="middle" fontSize="11" fontStyle="italic" fontWeight="700" fill={AM}>enzymes</text>
      <text x="225" y="172" textAnchor="middle" fontSize="9" fill={GR}>in cells (mitochondria)</text>

      {/* Cell illustration on the arrow */}
      <ellipse cx="225" cy="200" rx="35" ry="22" fill="#fff" stroke={GR} strokeWidth="1.2" opacity="0.7"/>
      <ellipse cx="225" cy="200" rx="10" ry="6" fill={PL} stroke={PU} strokeWidth="0.8"/>
      <text x="225" y="232" textAnchor="middle" fontSize="9" fill={GR}>respiring cell</text>

      {/* Outputs (right) - CO2 */}
      <rect x="300" y="60" width="120" height="40" rx="20" fill="#fff" stroke={AM} strokeWidth="1.8"/>
      <text x="360" y="83" textAnchor="middle" fontSize="12" fontWeight="700" fill={AM}>carbon dioxide</text>
      <text x="360" y="95" textAnchor="middle" fontSize="9" fill={GR}>6 CO₂</text>

      {/* Water */}
      <rect x="300" y="120" width="120" height="40" rx="20" fill="#fff" stroke={AM} strokeWidth="1.8"/>
      <text x="360" y="143" textAnchor="middle" fontSize="12" fontWeight="700" fill={AM}>water</text>
      <text x="360" y="155" textAnchor="middle" fontSize="9" fill={GR}>6 H₂O</text>

      {/* Energy */}
      <rect x="300" y="180" width="120" height="50" rx="25" fill={AL} stroke={AM} strokeWidth="2"/>
      <text x="360" y="204" textAnchor="middle" fontSize="13" fontWeight="700" fill={AM}>ENERGY</text>
      <text x="360" y="219" textAnchor="middle" fontSize="9" fill={GR}>≈ 2830 kJ / mol glucose</text>

      {/* Plus signs */}
      <text x="360" y="115" textAnchor="middle" fontSize="14" fontWeight="700" fill={GR}>+</text>
      <text x="360" y="175" textAnchor="middle" fontSize="14" fontWeight="700" fill={GR}>+</text>

      {/* Where the energy goes (right) */}
      <g>
        <text x="450" y="78" fontSize="11" fontWeight="700" fill={PU}>Energy is used for:</text>
        <text x="450" y="96" fontSize="10" fill={GR}>• muscle contraction (movement)</text>
        <text x="450" y="111" fontSize="10" fill={GR}>• protein synthesis from amino acids</text>
        <text x="450" y="126" fontSize="10" fill={GR}>• cell division &amp; growth</text>
        <text x="450" y="141" fontSize="10" fill={GR}>• active transport across membranes</text>
        <text x="450" y="156" fontSize="10" fill={GR}>• nerve impulse conduction</text>
        <text x="450" y="171" fontSize="10" fill={GR}>• maintaining body temperature (mammals/birds)</text>
        <text x="450" y="186" fontSize="10" fill={AM} fontStyle="italic">• some always lost as heat</text>
      </g>

      {/* Word equation banner */}
      <rect x="40" y="258" width="640" height="46" rx="8" fill={AL} stroke={AM} strokeWidth="1.2"/>
      <text x="360" y="277" textAnchor="middle" fontSize="11" fontWeight="700" fill={AM}>WORD EQUATION</text>
      <text x="360" y="295" textAnchor="middle" fontSize="12" fontWeight="600" fill={GR}>
        glucose + oxygen → carbon dioxide + water + ENERGY
      </text>
    </svg>
  );
}

// ── Glucose breakdown in steps (Hodder Fig 12.2) ──────────────────────────────
function GlucoseBreakdownDiagram() {
  return (
    <svg viewBox="0 0 720 460" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="460" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Aerobic Respiration — A Series of Small Enzyme-Controlled Steps
      </text>
      <text x="360" y="40" textAnchor="middle" fontSize="10" fontStyle="italic" fill={GR}>
        Each stage releases a little energy — not all at once
      </text>

      {/* Stage (a) — whole glucose */}
      <g transform="translate(20, 60)">
        <rect x="0" y="0" width="160" height="120" rx="8" fill="#fff" stroke={G} strokeWidth="1.2"/>
        <text x="80" y="16" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>(a) Glucose molecule</text>
        {/* Hexagon ring */}
        <polygon points="80,40 110,55 110,90 80,105 50,90 50,55" fill="none" stroke={GR} strokeWidth="1.5"/>

}

// ④ TEXTBOOK TAB (green)
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  const Section = ({ n, title, children }) => (

  );

  const Def = ({ term, children }) => (
    <div style={{ background: GL, borderLeft: `4px solid ${G}`, padding: "8px 12px", borderRadius: 4, margin: "6px 0 10px", fontSize: 12 }}>
      <Bold>{term}:</Bold> {children}

  const Practical = ({ title, children }) => (
    <div style={{ background: "#fff4e6", border: `1.5px solid ${AM}`, borderRadius: 6, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: GR, lineHeight: 1.6 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: AM, marginBottom: 4, letterSpacing: 1 }}>🔬 PRACTICAL · {title}</div>
      {children}
    </div>
  );

  return (
    <div style={{ background: GL, border: `2px solid ${G}`, borderRadius: 10, padding: "18px 22px" }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: G, marginBottom: 6, letterSpacing: 1 }}>
        📘 TEXTBOOK · HODDER CAMBRIDGE IGCSE BIOLOGY · CHAPTER 12
      </div>
      <div style={{ fontSize: 11, color: GR, marginBottom: 14, fontStyle: "italic" }}>
        Complete notes. Open by topic when something needs deeper revision.
      </div>

      {/* SECTION 1: What is respiration */}
      <Section n="1" title="Respiration: What &amp; Why?">
        <p>
          Cells need <Bold>energy</Bold> for almost every process they carry out — from muscle contraction to making proteins. This energy comes from <KW>glucose</KW> (and other food molecules) that the cells take in.
        </p>
        <Def term="Respiration">
          The chemical reactions in cells that break down nutrient molecules to release energy (using enzymes).
        </Def>
        <SubH>Energy uses inside a living organism</SubH>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Muscle contraction</Bold> — for movement of the body, for peristalsis (food in the gut), and contraction of the uterus during childbirth.</li>
          <li><Bold>Protein synthesis</Bold> — joining amino acids in the correct order to build proteins.</li>
          <li><Bold>Cell division</Bold> — to grow, repair tissues, or make reproductive cells.</li>
          <li><Bold>Active transport</Bold> — moving molecules across a membrane against their concentration gradient (e.g. mineral uptake by root-hair cells).</li>
          <li><Bold>Growth</Bold> — increase in number of cells or in cell size.</li>
          <li><Bold>Nerve impulse conduction</Bold> — electrical signalling along neurones (Ch.14).</li>
          <li><Bold>Maintaining a constant body temperature</Bold> — in warm-blooded animals (mammals and birds; Ch.14). This keeps enzymes near their optimum so the rate of cell reactions does not vary with the surroundings.</li>
        </ul>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Respiration ≠ breathing.</Bold> Breathing is the movement of air in and out of the lungs (ventilation). Respiration is the chemistry inside cells. They are easily confused — never use 'respiration' when you mean 'breathing'.
        </div>
      </Section>

      {/* SECTION 2: Aerobic respiration */}
      <Section n="2" title="Aerobic Respiration">
        <Def term="Aerobic respiration">
          The chemical reactions in cells that use <Bold>oxygen</Bold> to break down nutrient molecules (e.g. glucose) and release energy.
        </Def>
        <p>The word <Bold>aerobic</Bold> means <em>with oxygen</em>. The food molecule (glucose) is combined with oxygen. Carbon atoms are oxidised to <KW c={AM}>carbon dioxide</KW>, and hydrogen atoms are oxidised to <KW c={AM}>water</KW>. As this happens, energy is released for the cell to use.</p>

        <SubH>Word equation</SubH>
        <div style={{ background: GL, padding: "10px 14px", borderRadius: 6, marginBottom: 8, textAlign: "center", fontWeight: 700, color: G }}>
          glucose + oxygen <span style={{ fontSize: 10, fontStyle: "italic", color: AM }}>(enzymes)</span> → carbon dioxide + water + <Bold>ENERGY</Bold>
        </div>

        <SubH>Balanced chemical equation <Ext/></SubH>
        <div style={{ background: PL, padding: "10px 14px", borderRadius: 6, marginBottom: 8, textAlign: "center", fontWeight: 700, color: PU, fontFamily: "monospace" }}>
          C₆H₁₂O₆ + 6 O₂ → 6 CO₂ + 6 H₂O &nbsp;&nbsp;(+ 2830 kJ / mol)
        </div>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "6px 0", fontSize: 12 }}>
          <Bold style={{ color: RD }}>Examiner tip — 3 marks.</Bold> The balanced equation usually carries 3 marks: <Bold>1</Bold> for the correct formulae of glucose and oxygen, <Bold>1</Bold> for the correct formulae of CO₂ and water, and <Bold>1</Bold> for balancing it correctly (the &quot;6&quot; coefficients on O₂, CO₂ and H₂O). Also: energy is always <Bold>RELEASED</Bold> — NEVER &quot;made&quot;, &quot;produced&quot; or &quot;created&quot;. And state that the reactions are <Bold>enzyme-controlled</Bold>.
        </div>
        <p>
          Completely oxidising 180 g (1 mol) of glucose to CO₂ and water releases <KW c={G}>≈ 2830 kJ</KW> of energy. In cells, this is <em>not</em> released all at once. Oxidation happens in many small enzyme-controlled steps; at each step a little energy is released, which the cell can capture and use.
        </p>

        <AerobicOverviewDiagram/>
        <GlucoseBreakdownDiagram/>

        <p>
          Some of the energy <Bold>always appears as heat</Bold>. In <Bold>warm-blooded animals</Bold> (birds, mammals) this heat is used to maintain a constant body temperature. In <Bold>cold-blooded animals</Bold> (amphibians, reptiles, fish) heat may briefly build up and let the animal move more quickly; in plants, heat is lost to the surroundings as fast as it is produced.
        </p>

        <Practical title="Showing aerobic respiration is taking place">
          The equation tells us that an organism that is respiring aerobically must be:
          <ul style={{ margin: "4px 0 4px 18px" }}>
            <li>(a) using up food</li>
            <li>(b) using up oxygen</li>
            <li>(c) giving off carbon dioxide</li>
            <li>(d) giving out water</li>
            <li>(e) releasing energy</li>
          </ul>
          We focus on (b) <Bold>oxygen uptake</Bold> and (c) <Bold>CO₂ release</Bold> as evidence of respiration. (d) is poor evidence because wet non-living material releases water too. (a) is hard to measure precisely because organisms lose water as well as food.
          <br/><br/>
          <Bold>Seeds</Bold> are often used because germinating seeds are very active chemically; <Bold>blowfly maggots</Bold> or <Bold>woodlice</Bold> can be used for animal material; <Bold>yeast</Bold> is useful for studying anaerobic respiration.
        </Practical>
      </Section>

      {/* SECTION 3: Respirometer + heat */}
      <Section n="3" title="Practical: Measuring Oxygen Uptake (Respirometer)">
        <p>
          A simple <KW>respirometer</KW> ("respire meter") measures how fast oxygen is taken up by a small living organism. Living organisms (e.g. germinating seeds, a locust, blowfly larvae) are placed in a sealed boiling tube with a capillary tube fitted at one end. A drop of water or coloured dye is placed in the capillary — as O₂ is taken up by the organism, the volume of air in the tube falls, and the drop is drawn <Bold>inward</Bold>.
        </p>

        <RespirometerDiagram/>

        <SubH>Why is soda lime essential?</SubH>
        <p>
          Organisms give out roughly as much CO₂ as the O₂ they take in. Without soda lime the total air volume would not change and the drop would not move. <KW>Soda lime</KW> absorbs the CO₂ as fast as it is produced, so only the O₂ uptake affects the air volume.
        </p>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ Soda lime is <Bold>corrosive</Bold>. Cotton wool or wire gauze separates it from the organism; wash hands after handling.
        </div>

        <SubH>Calculating the rate</SubH>
        <p>The volume of air taken up is:</p>
        <div style={{ background: PL, padding: "8px 14px", borderRadius: 6, marginBottom: 8, textAlign: "center", fontFamily: "monospace", color: PU }}>
          V = π r² l &nbsp;&nbsp;(r = radius of bore, l = distance moved by the drop)
        </div>
        <p>Rate of O₂ uptake = volume ÷ time taken.</p>

        <div style={{ background: AL, border: `1px solid ${AM}`, padding: "10px 14px", borderRadius: 6, marginBottom: 8 }}>
          <Bold style={{ color: AM }}>Worked example.</Bold> Bore diameter = 0.5 mm → r = 0.25 mm. The drop moved 4.2 cm (= 42 mm) in 5 minutes.
          <br/>Volume = π r² l = 3.142 × (0.25)² × 42 ≈ <Bold>8.25 mm³</Bold> (note: book result corrected to 0.66 mm³ if uncertain — but 3.142 × 0.0625 × 42 = 8.25).
          <br/>Rate = 8.25 ÷ 5 ≈ <Bold>1.65 mm³ min⁻¹</Bold>.
        </div>

        <SubH>Effect of temperature on respiration of germinating seeds</SubH>
        <p>
          The same apparatus is placed vertically in a water-bath at a known temperature. The seeds are surface-sterilised by soaking in bleach (1 : 4 with water) to kill any bacteria/fungi (which would also respire). A control of <Bold>killed (boiled) seeds</Bold> — or glass beads — is also included.
        </p>
        <p>
          As temperature rises, respiration rate rises (more kinetic energy → more enzyme–substrate collisions). Above about <KW c={AM}>40 °C</KW>, respiratory enzymes <KW c={RD}>denature</KW> and the rate falls sharply.
        </p>

        <Practical title="Energy as heat — germinating seeds in vacuum flasks">
          Two vacuum flasks are prepared:
          <ul style={{ margin: "4px 0 4px 18px" }}>
            <li><Bold>Flask A:</Bold> killed (boiled then rinsed in bleach) seeds — the control.</li>
            <li><Bold>Flask B:</Bold> living, germinating seeds.</li>
          </ul>
          A thermometer is sealed into each flask with cotton wool. After 2 days, the LIVING flask is <KW c={G}>5–10 °C warmer</KW> than the dead one. Since the only difference is the living process, the heat must come from respiration → evidence that respiration releases energy. Vacuum flasks insulate the contents so small temperature differences can be detected.
        </Practical>
        <VacuumFlaskDiagram/>
      </Section>

      {/* SECTION 4: Anaerobic */}
      <Section n="4" title="Anaerobic Respiration">
        <Def term="Anaerobic respiration">
          The chemical reactions in cells that break down nutrient molecules to release energy <Bold>without using oxygen</Bold>.
        </Def>
        <p>
          The word <Bold>anaerobic</Bold> means <em>in the absence of oxygen</em>. Energy is still released, but glucose is <Bold>not fully oxidised</Bold>, so much less energy is released than in aerobic respiration.
        </p>

        <SubH>In yeast (fermentation)</SubH>
        <p>Yeast acts on a sugar solution to make alcohol and CO₂. This is the basis of <KW>brewing</KW> (alcohol from sugar) and <KW>bread-making</KW> (CO₂ inflates the dough; alcohol evaporates during baking).</p>
        <div style={{ background: AL, padding: "10px 14px", borderRadius: 6, marginBottom: 8, textAlign: "center", fontWeight: 700, color: AM }}>
          glucose <span style={{ fontSize: 10, fontStyle: "italic" }}>(enzymes)</span> → alcohol + carbon dioxide + ENERGY
        </div>
        <div style={{ background: PL, padding: "8px 14px", borderRadius: 6, marginBottom: 10, textAlign: "center", color: PU, fontFamily: "monospace" }}>
          <Ext/>&nbsp;C₆H₁₂O₆ → 2 C₂H₅OH + 2 CO₂ &nbsp;&nbsp;(+ 118 kJ / mol)
        </div>
        <p>
          Only about <KW c={AM}>118 kJ</KW> per mole — far less than the 2830 kJ from aerobic respiration. This is because alcohol still contains lots of stored chemical energy that the yeast cannot release without O₂.
        </p>

        <SubH>In muscle, during vigorous exercise</SubH>
        <p>
          During hard exercise, the heart and lungs cannot supply O₂ fast enough. Muscle cells switch to anaerobic respiration <em>in addition to</em> aerobic, breaking glucose down only as far as lactic acid:
        </p>
        <div style={{ background: AL, padding: "10px 14px", borderRadius: 6, marginBottom: 8, textAlign: "center", fontWeight: 700, color: AM }}>
          glucose → lactic acid &nbsp;(+ a little energy)
        </div>
        <p>
          Lactic acid builds up in the muscles → muscular fatigue and cramp. There is no CO₂ produced here.
        </p>
      </Section>

      {/* SECTION 5: Oxygen debt */}
      <Section n="5" title="Oxygen Debt (Extended)">
        <Def term="Oxygen debt">
          The volume of oxygen needed (after exercise) to oxidise the lactic acid that built up during anaerobic respiration in the muscles.
        </Def>
        <p>
          Lactic acid is more than a fatigue chemical — it <KW c={RD}>lowers the pH</KW> inside muscle cells, and very low pH can <KW c={RD}>denature respiratory enzymes</KW>. The body has a strong incentive to clear it out quickly. During and immediately after vigorous exercise, lactic acid is released from muscles into the bloodstream. The body then needs to:
        </p>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Transport the lactic acid in the blood from muscles to the <KW c={G}>liver</KW>. → heart rate stays HIGH.</li>
          <li>Take in extra oxygen to oxidise the lactic acid. → breathing rate &amp; depth stay HIGH (the athlete &quot;pants for breath&quot;).</li>
          <li>In the liver, lactic acid + O₂ → CO₂ + H₂O + energy. (This is actually aerobic respiration, but with lactic acid as the substrate instead of glucose.)</li>
        </ol>
        <p>
          Once the lactic acid has been broken down, the oxygen debt is repaid and breathing/heart rate return to normal.
        </p>
        <OxygenDebtDiagram/>

        <div style={{ background: AL, border: `1px solid ${AM}`, padding: "10px 14px", borderRadius: 6, marginTop: 8 }}>
          <Bold style={{ color: AM }}>Altitude.</Bold> Air at high altitude has a lower partial pressure of O₂, so muscles run into an oxygen debt much more quickly than at sea level. Training at altitude before competing makes the body produce <Bold>more red blood cells</Bold> and increase blood volume, raising O₂-carrying capacity.
        </div>
      </Section>

      {/* SECTION 6: Practicals */}
      <Section n="6" title="Practicals — Quick Reference">
        <Practical title="P1 · Effect of temperature on yeast respiration (dough method)">
          Make dough with flour, water and activated yeast. Push a piece into a boiling tube (about ¼ full). Mark the height. Place in a water-bath at e.g. 20 °C for 20 min. Re-measure the height. Repeat at different temperatures. Dough rises fastest at <KW c={AM}>35–40 °C</KW>; very low T → no rise; very high T → enzymes denature.
        </Practical>

        <Practical title="P2 · Effect of temperature on yeast respiration (gas syringe)">
          Place 5 cm³ glucose solution (5 %) + 1 cm³ dried yeast suspension (10 %) in a side-arm boiling tube. Connect to a gas syringe. Place in water-bath, allow to equilibrate. Time gas collection in the syringe. Repeat at different temperatures. Calculate gas volume per minute. Same conclusion: optimum at 35–40 °C.
        </Practical>
        <YeastExperimentDiagram/>

        <Practical title="P3 · Measuring oxygen uptake (respirometer)">
          Apparatus shown above (RespirometerDiagram). Place organism + soda lime (separated by cotton wool) in a sealed boiling tube with capillary outlet. Introduce a dye drop. Measure distance moved per minute → V = π r² l → rate. Use a control of glass beads (or boiled seeds) to subtract physical drift.
        </Practical>

        <Practical title="P4 · Effect of temperature on respiration of germinating seeds">
          Same apparatus as P3 but with the boiling tube held VERTICAL in a water-bath. Surface-sterilise the seeds in bleach (1 : 4, 5 min) to kill micro-organisms. Use a control of boiled seeds. Measure dye-drop movement at a series of temperatures (e.g. 20, 30, 35, 40 °C). Rate rises with T to a maximum near 40 °C, then falls as enzymes denature.
        </Practical>

        <Practical title="P5 · Energy release — vacuum flask">
          Flask A: dead (boiled) seeds (control). Flask B: living germinating seeds. Both rinsed in bleach. Thermometer in each. After 2 days, B is 5–10 °C warmer than A → respiration releases heat. (Vacuum flasks insulate so the small temperature change can be detected.)
        </Practical>
        <VacuumFlaskDiagram/>

        <Practical title="P6 · Anaerobic respiration in yeast">
          Boil water to expel dissolved O₂. Make 5 % glucose + 10 % yeast suspension. Cover with liquid paraffin (excludes air). Connect by delivery tube to limewater. After 10–15 min (gentle warming), bubbles emerge and turn the limewater <KW c={G}>milky</KW> → CO₂ is being produced anaerobically. Control: boiled (dead) yeast should produce no CO₂.
        </Practical>
        <YeastAnaerobicDiagram/>

        <Practical title="P7 · Methylene blue / DCPIP dye method (SME-favoured)">
          <Bold>Principle.</Bold> A redox indicator dye (methylene blue or DCPIP) is added to a yeast-glucose suspension. Respiring cells transfer electrons to the dye, which loses its blue colour. The faster the dye decolourises, the faster the rate of respiration.
          <br/><br/>
          <Bold>Method.</Bold> Add a fixed volume of yeast suspension + glucose solution to each of several test tubes. Place each in a water-bath at a different temperature (e.g. 10, 20, 30, 40, 50, 60 °C) and allow to equilibrate. Add the same number of drops of <KW c={TL}>methylene blue</KW> to each tube and start a stopwatch. Record the time taken for the blue colour to disappear (judged against a white tile).
          <br/><br/>
          <Bold>Variables to control:</Bold> volume &amp; concentration of dye · volume &amp; concentration of yeast · concentration of glucose · pH (use a buffer to stop enzymes denaturing).
          <br/><br/>
          <Bold>Results.</Bold> Plot rate (= 1 / time) against temperature. Rate rises from ~10 °C to a <KW c={AM}>peak near 35–40 °C</KW>, then falls steeply above 50 °C as the respiratory enzymes <KW c={RD}>denature</KW>. (Note: if you plot raw <em>time</em> instead, the graph is the inverse — a U-shape.)
        </Practical>
        <MethyleneBlueDiagram/>
      </Section>

      {/* SECTION 7: Going further */}
      <Section n="7" title="Going Further: Hypothesis Testing">
        <p>
          None of the experiments above can <em>prove</em> respiration is happening — they can only fail to disprove it. The best a scientist can do is form a <Bold>hypothesis</Bold>, make predictions from it, and test them. If a prediction holds, the hypothesis is <em>supported</em> (not proved). If it fails, the hypothesis must be changed or abandoned.
        </p>
        <p>
          Example: "Oxygen is used to convert food → CO₂, releasing energy". A direct test uses <KW c={PU}>radioactive ¹⁴C-labelled glucose</KW>: feed it to the organism and check whether the CO₂ given out is radioactive (using a Geiger counter). If it is, the CO₂'s carbon came from the glucose — direct evidence.
        </p>
        <SubH>Criteria for a good hypothesis</SubH>
        <ul style={{ margin: "4px 0 4px 18px" }}>
          <li>Explains ALL aspects of the observation.</li>
          <li>Is the simplest possible explanation.</li>
          <li>Allows clear predictions to be made.</li>
          <li>Is testable by experiment.</li>
        </ul>
      </Section>

      {/* Revision checklist */}
      <div style={{ background: "#fff", border: `2px solid ${G}`, borderRadius: 8, padding: "14px 18px" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: G, marginBottom: 8 }}>✅ REVISION CHECKLIST · Chapter 12</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.65 }}>
          <li>I can define respiration as the chemical reactions in cells that release energy from glucose.</li>
          <li>I can list at least 5 uses of energy by living organisms.</li>
          <li>I can write the WORD equation for aerobic respiration.</li>
          <li>EXT — I can write the BALANCED chemical equation C₆H₁₂O₆ + 6 O₂ → 6 CO₂ + 6 H₂O.</li>
          <li>I can write the WORD equations for anaerobic respiration in YEAST and in MUSCLE.</li>
          <li>EXT — I can write the BALANCED equation C₆H₁₂O₆ → 2 C₂H₅OH + 2 CO₂ for yeast.</li>
          <li>I can explain why anaerobic respiration releases far less energy per glucose than aerobic.</li>
          <li>EXT — I can explain oxygen debt: build-up, transport, and removal in the liver.</li>
          <li>I can describe the limewater test for CO₂, the soda-lime respirometer for O₂ uptake, and the vacuum flask for heat release.</li>
          <li>I can explain why yeast respires fastest at 35–40 °C and slows above that.</li>
        </ul>
      </div>
    </div>
  );
}

    { src: "Suppl", q: "In the VACUUM-FLASK experiment, why is one flask filled with BOILED (dead) seeds?", a: "As a CONTROL. Dead seeds cannot respire, so any temperature rise in that flask cannot be due to respiration. If the living-seeds flask is warmer than the control, the temperature rise must be caused by respiration in the living cells." },
    { src: "Suppl", q: "In the ANAEROBIC-YEAST experiment, what is the role of LIQUID PARAFFIN?", a: "Liquid paraffin floats on top of the yeast-glucose solution and EXCLUDES atmospheric oxygen — so any respiration taking place must be ANAEROBIC." },
    { src: "Suppl", q: "Why is the water BOILED before being used to make the yeast-glucose mixture?", a: "Boiling REMOVES dissolved oxygen from the water, ensuring the yeast cannot respire aerobically. Combined with the liquid paraffin layer, this guarantees fully anaerobic conditions." },
    { src: "Suppl", q: "What does LIMEWATER detect, and how?", a: "Limewater (calcium hydroxide solution) detects CARBON DIOXIDE. CO₂ turns limewater from CLEAR/COLOURLESS to MILKY (cloudy white) due to formation of insoluble calcium carbonate." },
    { src: "Suppl", q: "In the anaerobic-yeast experiment, what is the CONTROL and why is it needed?", a: "The control uses BOILED (dead) yeast in the same set-up. If no CO₂ is produced from the dead-yeast control, it shows that the CO₂ in the experiment came from a LIVING process (respiration) — not from a non-living chemical reaction between yeast and glucose." },
    { src: "Suppl", q: "How can you show that an organism is GIVING OFF CO₂?", a: "Pass the air around/from the organism through LIMEWATER. If the limewater turns from clear to MILKY/CLOUDY, CO₂ is being produced." },

    // ── Suppl: cross-chapter & extension ──
    { src: "Suppl", q: "Why does a MOUSE have a much higher energy use per kg of body mass than a man?", a: "Mice have a much LARGER SURFACE-AREA-TO-VOLUME RATIO, so they lose heat much faster relative to their body mass. To maintain body temperature they must respire faster — more energy used per kg per day." },
    { src: "Suppl", q: "What is FERMENTATION, and which two everyday processes rely on it?", a: "Fermentation = anaerobic respiration by YEAST (glucose → alcohol + CO₂). It is used in BREWING (the alcohol is the desired product) and BREAD-MAKING (CO₂ gas makes the dough rise; the alcohol is driven off by baking)." },
    { src: "Suppl", q: "How is DIRECT evidence that CO₂ from respiration comes from food obtained? (Going further)", a: "By feeding the organism food (e.g. glucose) labelled with radioactive ¹⁴C. If the CO₂ produced is also radioactive (detected with a Geiger counter), the carbon in the CO₂ must have come from the labelled glucose. This is DIRECT evidence; the standard experiments only give indirect evidence." },
    { src: "Suppl", q: "What is the link between RESPIRATION and ACTIVE TRANSPORT?", a: "Active transport moves molecules AGAINST a concentration gradient and requires energy. That energy comes from RESPIRATION (specifically from ATP made during respiration). Cells that do a lot of active transport — kidney tubule, root hair, gut lining — have many mitochondria." },
  ];

  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [shuffleSeed, setShuffleSeed] = useState(0);

  // Deterministic shuffle based on seed
  const order = (() => {
    if (shuffleSeed === 0) return cards.map((_, i) => i);
    const arr = cards.map((_, i) => i);
    let seed = shuffleSeed;
    for (let i = arr.length - 1; i > 0; i--) {
      seed = (seed * 9301 + 49297) % 233280;
      const j = Math.floor((seed / 233280) * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  })();

  const card = cards[order[idx]];
  const total = cards.length;

  const next = () => { setFlipped(false); setIdx((idx + 1) % total); };
  const prev = () => { setFlipped(false); setIdx((idx - 1 + total) % total); };
  const shuffle = () => { setFlipped(false); setIdx(0); setShuffleSeed(Date.now() % 1000000 + 1); };
  const reset   = () => { setFlipped(false); setIdx(0); setShuffleSeed(0); };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Header */}
      <div style={{ background: TL, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>🎴 SME Flashcards — Click to flip</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          {total} cards total · <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SME</span> = 15 official Save My Exams cards · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SUPPL</span> = NLCS extra · Tap card to flip
        </div>
      </div>

      {/* Counter + buttons */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 12, color: TL, fontWeight: 700 }}>
          Card {idx + 1} / {total}
          {shuffleSeed !== 0 && <span style={{ color: "#888", marginLeft: 8, fontWeight: 500 }}>(shuffled)</span>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={shuffle} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>🔀 Shuffle</button>
          <button onClick={reset} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${BD}`, background: "#fff", color: "#666" }}>↺ Reset</button>
        </div>
      </div>

      {/* Card */}
      <div
        onClick={() => setFlipped(!flipped)}
        style={{
          background: flipped ? TLL : "#fff",
          border: `2px solid ${TL}`,
          borderRadius: 14,
          padding: "32px 24px",
          minHeight: 220,
          cursor: "pointer",
          textAlign: "center",
          display: "flex",
          flexDirection: "column",
          justifyContent: "center",
          transition: "all .2s",
          boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
          position: "relative",
        }}>
        {/* Source badge - top right */}
        <div style={{ position: "absolute", top: 10, right: 12 }}>
          <span style={{
            background: card.src === "SME" ? TL : "#7a6a40",
            color: "#fff", borderRadius: 3,
            padding: "2px 7px", fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
          }}>
            {card.src === "SME" ? "SME" : "SUPPL"}
          </span>
        </div>
        <div style={{ fontSize: 10, color: TL, fontWeight: 700, letterSpacing: 1, marginBottom: 12 }}>
          {flipped ? "ANSWER" : "QUESTION"}
        </div>
        <div style={{ fontSize: 16, lineHeight: 1.6, color: GR, fontWeight: flipped ? 400 : 600 }}>
          {flipped ? card.a : card.q}
        </div>
        <div style={{ fontSize: 10, color: "#aaa", marginTop: 18, fontStyle: "italic" }}>
          {flipped ? "Tap to see the question" : "Tap to reveal the answer"}
        </div>
      </div>

      {/* Nav buttons */}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 4 }}>
        <button onClick={prev} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>← Prev</button>
        <button onClick={next} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: TL, color: "#fff" }}>Next →</button>
      </div>

      {/* Footer */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: TLL, borderRadius: 8, fontSize: 11, color: TL, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Tip:</Bold> Try answering aloud before flipping. Cards marked <Bold>(EXT)</Bold> are Extended-tier content.
      </div>
    </div>
  );
}
