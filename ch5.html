<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────

const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber

const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (

// ── Tab config ───────────────────────────────────────────────────────────────

// ════════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════

// ── Lock-and-key model: ANABOLIC (building up — joining two substrates) ────
function AnabolicLockKey() {
  return (
    <svg viewBox="0 0 700 280" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>

      </text>

      {/* STEP 1 - separated */}
      <text x="115" y="55" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>① Before</text>
      {/* Enzyme with two notches */}
      <path d="M 60 130 Q 60 80 110 80 Q 160 80 160 110 L 145 115 L 130 105 L 130 125 L 145 130 L 160 135 Q 160 165 130 170 L 130 155 L 115 165 L 130 175 Q 100 195 70 170 Q 60 150 60 130 Z"

      <text x="100" y="220" textAnchor="middle" fontSize="10" fill={GR}>enzyme</text>
      {/* Substrate A */}
      <path d="M 195 105 L 215 105 L 220 115 L 215 125 L 195 125 Z" fill="#f3a0c0" stroke={RD} strokeWidth="1.5"/>
      <text x="207" y="95" textAnchor="middle" fontSize="9" fontWeight="700" fill={RD}>A</text>
      {/* Substrate B */}
      <path d="M 195 155 L 220 155 L 215 165 L 220 175 L 195 175 Z" fill="#f3c0a0" stroke={AM} strokeWidth="1.5"/>
      <text x="207" y="195" textAnchor="middle" fontSize="9" fontWeight="700" fill={AM}>B</text>

      {/* arrow */}
      <path d="M 245 140 L 280 140" stroke={G} strokeWidth="2.5" markerEnd="url(#arrA)"/>

      {/* STEP 2 - bound */}
      <text x="365" y="55" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>② Enzyme–substrate complex</text>
      <path d="M 310 130 Q 310 80 360 80 Q 410 80 410 110 L 395 115 L 380 105 L 380 125 L 395 130 L 410 135 Q 410 165 380 170 L 380 155 L 365 165 L 380 175 Q 350 195 320 170 Q 310 150 310 130 Z"
        fill="#a0e0f0" stroke={G} strokeWidth="1.5"/>
      {/* Substrate A docked */}
      <path d="M 380 105 L 405 105 L 410 115 L 405 125 L 380 125 Z" fill="#f3a0c0" stroke={RD} strokeWidth="1.5"/>
      {/* Substrate B docked - touching A */}
      <path d="M 380 155 L 405 155 L 410 165 L 405 175 L 380 175 Z" fill="#f3c0a0" stroke={AM} strokeWidth="1.5"/>
      <text x="365" y="220" textAnchor="middle" fontSize="10" fill={GR}>complementary fit</text>

      {/* arrow */}
      <path d="M 440 140 L 475 140" stroke={G} strokeWidth="2.5" markerEnd="url(#arrA)"/>

      {/* STEP 3 - product released */}
      <text x="595" y="55" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>③ Product released</text>
      <path d="M 505 130 Q 505 80 555 80 Q 605 80 605 110 L 590 115 L 575 105 L 575 125 L 590 130 L 605 135 Q 605 165 575 170 L 575 155 L 560 165 L 575 175 Q 545 195 515 170 Q 505 150 505 130 Z"

      {/* Joined product AB floating away */}

// ── Lock-and-key model: CATABOLIC (breaking down) ──────────────────────────
function CatabolicLockKey() {
  return (
    <svg viewBox="0 0 700 280" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>

      a: "(a)(i) [3 marks — table]\n• Two columns/rows: \"Type of potato\" and \"Height of foam / cm\". [1]\n• Headings include UNITS (cm). [1]\n• Correct values entered: uncooked ≈ 9.0 cm, cooked ≈ 0.5 cm. [1]\n\n(a)(ii) [1] Difference = 9.0 − 0.5 = 8.5 cm. [1]\n\n(a)(iii) [1] Catalase activity is much HIGHER in uncooked potato / much LOWER in cooked potato (cooking has denatured the enzyme).\n\n(b)(i) [1] The temperature treatment of the potato (cooked vs uncooked) / whether the potato has been heated.\n\n(b)(ii) [1] To make sure that the SURFACE AREA and AMOUNT of catalase exposed to H₂O₂ is the same — so any difference in foam height is due to cooking, not size.\n\n(b)(iii) [2] Any TWO of: same volume of H₂O₂ (5 cm³); same concentration of H₂O₂ (3 %); same temperature; same time (3 min); same depth into solution.\n\n(c) [1] Foam may continue rising/falling between cylinders being added so the timing isn't simultaneous. (or: subjective measurement of foam top — bubbles uneven; or: cooked potato may not have been heated long enough/cooled to room temp before use.)\n\n(d) [6 marks — plan]\n• Use cylinders/discs of the SAME size and shape from several different plant species (e.g. potato, carrot, apple, parsnip). [1]\n• Place each into a test-tube with the SAME volume and concentration of H₂O₂ at the same temperature. [1]\n• Measure foam height (or bubbles per minute) after a fixed time (e.g. 3 min). [1]\n• REPEAT each species at least 3 times and calculate a MEAN. [1]\n• Identify independent variable (plant species), dependent variable (foam height), and controlled variables. [1]\n• Compare mean foam height between species to test the statement (the higher the foam, the higher the catalase activity). [1]\n\n(e) [5 marks — food tests]\nSTARCH:\n• Add iodine solution to the sample. [1]\n• Positive: orange-brown → blue-black. [1]\nREDUCING SUGAR:\n• Add Benedict's solution and HEAT in a water bath for ~5 min. [1]\n• Positive: blue → green/yellow/orange/brick-red. [1]\n• Note: Benedict's MUST be heated; iodine doesn't need heat. [1]"

tchy lines). [1]\n• Includes the outer skin (fruit wall), the locules (seed-containing chambers) and the central placental tissue. [1]\n• Correct proportions / no overlapping lines. [1]\n\n(h) [1] Iodine changes from orange-brown to BLUE-BLACK in presence of starch."

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>

                  background: diff === d.id ? d.color : "#fff",
                  color: diff === d.id ? "#fff" : d.color,

                style={{

      {/* Stats bar */}

        <div style={{ display: "flex", gap: 6 }}>

        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 3, padding: "2px 7px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{q.diff.toUpperCase()}</span>
                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.src && (
                    <span title={q.src === "Hodder" ? "Hodder textbook official question" : q.src === "SME" ? "Save My Exams Alternative to Practical question" : "NLCS supplementary question"}
                      style={{ background: q.src === "Hodder" ? G : q.src === "SME" ? TL : "#7a6a40", color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                      {q.src === "Hodder" ? "HODDER" : q.src === "SME" ? "SME" : "SUPPL"}
                    </span>
                  )}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

// ③ SUMMARY TAB
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const [open, setOpen] = useState({ s1: true, s2: false, s3: false, s4: false, s5: false, s6: false, s7: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${PU}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? PU : PL, color: open[id] ? "#fff" : PU, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#3a2a6a" }}>
        <strong>1st-stage summary</strong> — Chapter 5 condensed into key concepts, diagrams and comparison tables. Use after reading <Bold>④ Textbook</Bold> in detail.
      </div>

      <Sec id="s1" title="① What is an Enzyme? — Catalyst, Protein, Specific">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A <KW c={PU}>catalyst</KW> is any substance that <Bold>speeds up</Bold> a chemical reaction without being used up. An <KW c={PU}>enzyme</KW> is a <Bold>biological catalyst</Bold> — specifically a <KW>protein</KW> made by living cells. All enzymes are catalysts; not all catalysts are enzymes.
        </div>
        <CatalystVsEnzymeBox />
        <EnzymeEquation />
        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Why enzymes matter:</Bold> reactions in cells (digestion, respiration, building proteins, building cellulose) need to happen FAST enough to keep the organism alive. Without enzymes the same reactions could take hours, days or years. Catalase, for example, breaks down ~40 000 H₂O₂ molecules per second.
        </div>
      </Sec>

      <Sec id="s2" title="② Enzyme Action — Active Site &amp; Lock-and-Key Model">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Every enzyme has an <KW c={PU}>active site</KW> — a specific region on its surface that binds the substrate. The shape of the active site is <KW c={PU}>complementary</KW> to the substrate's shape, like two jigsaw pieces. When they bind, an <KW>enzyme-substrate complex</KW> forms briefly, the reaction takes place, and the product is released. The enzyme is then free to do it all over again.
        </div>
        <AnabolicLockKey />
        <CatabolicLockKey />
        <div style={{ marginTop: 12, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Two types of reaction:</Bold> ANABOLIC = build-up (e.g. joining glucose units to form starch / cellulose / glycogen, or amino acids to form proteins). CATABOLIC = break-down (e.g. amylase breaking starch to maltose, or catalase breaking H₂O₂ to water + oxygen).
        </div>
      </Sec>

      <Sec id="s3" title="③ Specificity — One Enzyme, One Substrate">
        <SpecificityDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Why are enzymes specific?</strong>
          Because the active site has a precise shape, only ONE substrate (or a closely related family of substrates) can fit into it. A different substrate has the wrong shape — it cannot bind, so no reaction takes place.
        </div>
        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Worked example:</Bold> if a reaction takes place in stages — starch → maltose → glucose — a DIFFERENT enzyme is needed for each stage (amylase for stage 1, maltase for stage 2). One enzyme cannot do both because it works on only ONE substrate.
        </div>
      </Sec>

      <Sec id="s4" title="④ Naming Enzymes — The &quot;-ase&quot; Convention">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Most enzymes are named after their substrate, plus the suffix <KW c={PU}>-ase</KW>. For example, an enzyme that works on starch (= "amylum" in Greek) is called <Bold>amylase</Bold>. An enzyme that works on protein is a <Bold>protease</Bold>.
        </div>
        <EnzymeNamingTable />
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> a few enzyme names don't follow this rule — for example pepsin (a protease in the stomach) and trypsin (a protease in the pancreas). When in doubt, name an enzyme by what it digests + "-ase".
        </div>
      </Sec>

      <Sec id="s5" title="⑤ Effect of Temperature — Optimum &amp; Denaturation">
        <TemperatureGraph />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Three regions of the curve:</strong>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Below optimum</Bold> (cold) — molecules have low kinetic energy → few collisions → low rate. Rule of thumb: 10 °C rise ≈ DOUBLES the rate.</li>
            <li><Bold>At optimum</Bold> (~37 °C in humans) — fastest rate. Active site has its perfect shape; collisions are most effective.</li>
            <li><Bold>Above optimum</Bold> — high kinetic energy BUT shape of active site distorts. Above ~50 °C the enzyme is fully <KW c={RD}>DENATURED</KW> — the shape is permanently changed.</li>
          </ul>
        </div>
        <DenaturationDiagram />
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> Denaturation is <KW c={TL}>permanent</KW>. Cooling a denatured enzyme back down to optimum does NOT restore activity. State this for full marks.
        </div>
        <div style={{ marginTop: 8, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Going further:</Bold> some bacteria (hot-spring &amp; hydrothermal-vent species) make heat-stable enzymes that can work above 80 °C without denaturing. These are commercially valuable — used in biological washing powders that wash hot, and in industrial chemistry.
        </div>
      </Sec>

      <Sec id="s6" title="⑥ Effect of pH — Optimum pH for Each Enzyme">
        <PHGraph />

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Optimum pH for key enzymes</strong>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Enzyme</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Optimum pH</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Where it works</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Why it matters</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Pepsin",            "~ 2",  "stomach (HCl present)",  "matches stomach acid"],
                ["Salivary amylase",  "~ 7",  "mouth",                  "neutral saliva"],
                ["Most cell enzymes", "~ 7",  "cytoplasm",              "neutral cell environment"],
                ["Pancreatic lipase", "~ 8",  "duodenum (small int.)",  "matches alkaline bile + pancreatic juice"],
                ["Trypsin",           "~ 8",  "duodenum",               "matches alkaline duodenum"],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? PL : "#fff" }}>
                  {row.map((c, j) => (
                    <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? PU : GR }}>{c}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Reversibility nuance:</Bold> mild changes in pH usually only DISTORT the active site temporarily — the enzyme recovers when its optimum pH is restored. Only EXTREME pH causes irreversible <KW c={RD}>denaturation</KW> (just like very high temperature).
        </div>
      </Sec>

      <Sec id="s7" title="⑦ Practical Work — How to Test Enzymes in the Lab">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 1: Extracting catalase from liver</strong>
          Grind a piece of liver with sand and water in a mortar (sand is abrasive — it breaks open the cells). Filter to remove debris. The filtrate contains catalase. Add the filtrate to hydrogen peroxide (H₂O₂) → vigorous bubbling of OXYGEN.
          <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
            <li><Bold>Test with a glowing splint</Bold> — splint relights in pure oxygen, confirming O₂ is the gas.</li>
            <li><Bold>Boil the filtrate</Bold> first → no reaction → catalase has been DENATURED → confirms it is a protein / enzyme.</li>
            <li><Bold>Use MnO₂</Bold> (manganese(IV) oxide) as a control — it also catalyses the breakdown but is NOT denatured by boiling, proving it is an inorganic catalyst, not an enzyme.</li>
          </ul>
        </div>

        <TempPracticalDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 2: Effect of temperature on amylase</strong>
          Set up three water-baths (~10, 20, 35 °C). In each, place a tube of starch + iodine (blue colour) and add 1 cm³ of 5% amylase solution. Note how long the blue colour takes to disappear in each bath (faster decolourisation = higher rate). The warmest bath (closest to amylase optimum ~37 °C) should give the fastest result.
        </div>

        <PhPracticalDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 3: Effect of pH on amylase</strong>
          Set up 5 tubes of starch solution. Add varying amounts of <Bold>sodium carbonate (alkali)</Bold> or <Bold>ethanoic acid</Bold> to give pH 3, 6, 6–7, 7–8, 9. Add amylase to each tube and time how long until starch is fully broken down (test by removing drops of sample with a pipette and adding to iodine on a cavity tile every 30 s — when no blue forms, the starch is gone). The tube that decolourises FIRST contains the optimum pH.
        </div>

        <div style={{ marginTop: 10, background: RL, border: `1px solid ${RD}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a0000", lineHeight: 1.7 }}>
          <Bold>Safety reminders:</Bold> Eye protection at all times. Manganese(IV) oxide powder is harmful — avoid inhaling. Hot water-baths → use tongs / heatproof gloves. Hydrogen peroxide is irritant — handle with care. Sodium carbonate / ethanoic acid → wash spills with water.
        </div>

        <div style={{ marginTop: 8, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail — % change formula:</Bold> when calculating % change in rate, always divide the change by the <Bold>ORIGINAL value</Bold>, not the new value:<br/>
          <Bold>% change = (change ÷ original) × 100</Bold><br/>
          e.g. rate at 20 °C = 4, rate at 40 °C = 32.  % increase = (32 − 4) ÷ 4 × 100 = <KW c={TL}>700%</KW>.
        </div>
      </Sec>
    </div>
  );
}

      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Reference notes for Chapter 5: Enzymes</strong>. Sections ①–⑨ are paraphrased from the <Bold>Hodder Cambridge IGCSE Biology</Bold> textbook (pages 73–83). Sections ⑩–⑪ summarise the <Bold>Save My Exams (SME)</Bold> revision notes (concise and exam-focused). Use sections ① and ③ for revision; come here for detail when you don't know something.
      </div>

      <Sec id="t1" title="① Focus &amp; Key Definitions — What is a Catalyst, What is an Enzyme?">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>In Chapter 4 you learned that proteins are one of the main families of biological molecule, made up of long chains of amino acids. Some of these proteins fold into shapes that allow them to act as <KW>biological catalysts</KW>. These special proteins are <KW>enzymes</KW>.</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Key definitions:</Bold><br/>
            • A <KW>catalyst</KW> is a substance that <Bold>increases the rate of a chemical reaction and is not changed by the reaction</Bold>.<br/>
            • <KW>Enzymes</KW> are proteins that function as <KW>biological catalysts</KW> and are involved in <Bold>all metabolic reactions</Bold>.
          </div>

          <p style={{ marginTop: 10 }}>Enzymes are made in <Bold>all living cells</Bold>. They control the rate of chemical reactions inside the cell — making sure these reactions occur quickly enough for the cell (and the whole organism) to function. Like all catalysts, enzymes can be used <Bold>repeatedly</Bold> because they are not consumed by the reaction. Only small amounts are needed.</p>
        </div>
        <EnzymeCycleDiagram />
      </Sec>

      <Sec id="t2" title="② Enzyme Action — Substrate, Product &amp; Active Site">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Every enzyme-controlled reaction involves three things: a <KW>substrate</KW>, an <KW>enzyme</KW>, and a <KW>product</KW>. The substrate is the substance the enzyme works on; the product is what is produced after the reaction. The general equation is:</p>

          <div style={{ textAlign: "center", fontSize: 14, fontStyle: "italic", margin: "8px 0", color: G }}>
            substrate <span style={{ display: "inline-block", borderTop: `1px solid ${G}` }}>&nbsp;<sup>enzyme</sup>&nbsp;</span> ⟶ product
          </div>

          <p>For example, the enzyme <KW>sucrase</KW> works on the substrate <Bold>sucrose</Bold> (table sugar) to produce two monosaccharide products: <Bold>glucose</Bold> and <Bold>fructose</Bold>.</p>

          <p>The part of the enzyme molecule responsible for combining with the substrate is called the <KW>active site</KW>. The active site has a particular shape that exactly matches (is <KW>complementary</KW> to) the shape of the substrate, like jigsaw pieces that fit together. Substrates of the wrong shape cannot fit into the active site, so they don't react.</p>
        </div>
        <EnzymeEquation />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Two reaction types are possible:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Building-up (anabolic)</Bold> — two or more substrates fit into the active site and are joined to form a single, larger product.</li>
            <li><Bold>Breaking-down (catabolic)</Bold> — one large substrate fits into the active site and is split into smaller products.</li>
          </ul>
          <p>In both cases, an <KW>enzyme-substrate complex</KW> forms briefly, the reaction takes place, and the product(s) are released. The enzyme is now free to bind another substrate molecule and repeat the reaction. Catalase, for example, can break down ~40 000 molecules of hydrogen peroxide every second.</p>
        </div>

        <AnabolicLockKey />
        <CatabolicLockKey />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME Examiner Tip:</Bold> when explaining how an enzyme works, name the temporary structure as the <KW c={TL}>enzyme-substrate complex</KW>. Use the word <KW c={TL}>complementary</KW> for the shape relationship — never write &quot;same shape&quot;.
        </div>
      </Sec>

      <Sec id="t3" title="③ Examples of Enzymes &amp; the &quot;-ase&quot; Naming Convention">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The names of enzymes usually end in <KW>-ase</KW>. They are normally named after the SUBSTRATE on which they work, or the reaction they speed up:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><KW>Amylase</KW> — works on STARCH (Latin <em>amylum</em> = starch). Found in saliva. Try chewing a piece of bread without swallowing — eventually it tastes sweeter as amylase breaks the starch down to maltose.</li>
            <li><KW>Protease</KW> — any enzyme that works on PROTEIN, breaking it into amino acids.</li>
            <li><KW>Lipase</KW> — works on LIPIDS (fats and oils), breaking them into fatty acids and glycerol.</li>
            <li><KW>Maltase / sucrase / lactase</KW> — break down maltose / sucrose / lactose into smaller sugars.</li>
            <li><KW>Catalase</KW> — breaks down hydrogen peroxide (a toxic by-product of cell reactions) into harmless water and oxygen.</li>
            <li><KW>Dehydrogenase</KW> — removes hydrogen from a substrate (used in respiration).</li>
          </ul>
          <p>As well as breaking molecules down, enzymes can BUILD them up. For example, hundreds of glucose molecules can be joined end-to-end to make a long molecule of <Bold>starch</Bold> (in plant plastids), or a long molecule of <Bold>cellulose</Bold> (added to the plant cell wall). Protein molecules are built by enzymes joining amino acid molecules together. The proteins built may then become structural cell parts (cell membrane proteins) or enzymes themselves.</p>
        </div>
        <EnzymeNamingTable />
      </Sec>

      <Sec id="t4" title="④ Enzymes &amp; Temperature">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>A rise in temperature increases the rate of MOST chemical reactions; a fall in temperature slows them down. Enzyme reactions are no exception — but enzymes are PROTEINS, which adds an important twist.</p>

          <p style={{ marginTop: 8 }}><Bold>Below the optimum:</Bold> as temperature rises, enzyme and substrate molecules gain more KINETIC ENERGY. They move faster and collide more often → more chances for substrate to fit into the active site → faster reaction. As a rough rule, a 10 °C rise roughly DOUBLES the rate of reaction.</p>

          <p><Bold>Above ~50 °C:</Bold> most enzymes — being proteins — are <KW>denatured</KW>. The shape of the active site is permanently changed, so the enzyme can no longer combine with the substrate. The reaction stops. This is why prolonged exposure to high temperatures kills cells: their enzymes denature and chemical reactions become too slow to keep them alive.</p>

          <p><Bold>Egg-white analogy:</Bold> egg white is the protein albumen. When you heat it, the molecules change shape — the egg white goes from a clear runny liquid to a solid white. This change cannot be reversed. The same kind of structural change is happening to enzyme molecules at high temperature.</p>

          <p><Bold>Above the optimum but below ~50 °C:</Bold> rate begins to fall as some enzyme molecules are starting to denature, even though molecules have more kinetic energy. The denaturation of all enzyme molecules is gradual — not all happen at once.</p>
        </div>

        <TemperatureGraph />
        <DenaturationDiagram />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Boiling test for enzyme:</Bold> one way to test if a substance is an enzyme is to heat it to boiling point. If, after this, it can still carry out its reactions, it CANNOT be an enzyme — it must be an inorganic catalyst. This is used as a CONTROL in enzyme experiments.</p>
        </div>

        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Going further — heat-stable enzymes:</Bold> some bacteria live in extreme environments such as hot springs and around HYDROTHERMAL VENTS on the deep ocean floor (where superheated water rises through cracks in the seabed). These bacteria have very stable proteins; their active sites are not deformed by temperatures above 50 °C. Such heat-stable enzymes are commercially valuable — biological washing powders containing them can wash at high temperatures (which kills more germs and dissolves grease better).
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Enzymes &amp; pH">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Acid or alkaline conditions alter the chemical properties of proteins, including enzymes. Most enzymes work best at a particular level of acidity or alkalinity (pH) — the <KW>optimum pH</KW>.</p>

          <p>Examples:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><KW>Pepsin</KW>, the protein-digesting enzyme in your stomach, works well at <Bold>pH 2</Bold>. At this pH, salivary amylase cannot work at all.</li>
            <li>Inside cells, most enzymes work best in <Bold>neutral conditions (pH ~7)</Bold>.</li>
            <li>The <KW>duodenum</KW> (top of small intestine) is slightly alkaline — the optimum pH for <KW>pancreatic lipase</KW> there is about <Bold>pH 8</Bold>.</li>
          </ul>
        </div>

        <PHGraph />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Reversible vs irreversible:</Bold> although changes in pH affect activity, mild pH changes are usually <Bold>reversible</Bold>. An enzyme that has been disabled by a low pH will start working again when its optimum pH is restored. However, EXTREME pH causes denaturation in the same way that very high temperature does — the active site shape is permanently distorted, so the enzyme and substrate no longer have complementary shapes and cannot fit together.</p>
        </div>
      </Sec>

      <Sec id="t6" title="⑥ Specificity — Why an Enzyme Works on One Substrate Only (Going Further)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><KW>Specificity</KW> simply means that an enzyme which normally works on one substrate will not act on a different one. This follows directly from the lock-and-key model: the active site has a precise shape that only fits one substrate.</p>

          <p>An enzyme that breaks down starch to maltose will NOT break down proteins to amino acids. If a reaction takes place in stages (for example: starch → maltose → glucose), a different enzyme is needed for each stage.</p>
        </div>

        <SpecificityDiagram />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Why temperature and pH affect activity:</Bold> the underlying explanation in both cases is SHAPE CHANGE. Above the optimum temperature, increased kinetic energy disrupts the protein's 3D structure → active site distorts → fewer effective collisions despite more total collisions. Above ~50 °C the change is permanent. Extremes of pH also alter the protein's shape, with the same end-result: substrate cannot fit.</p>
        </div>
      </Sec>

      <Sec id="t7" title="⑦ Practical Work — Extracting Catalase &amp; Testing for Enzymes">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Safety:</Bold> EYE PROTECTION must be worn at all times. Hydrogen peroxide is an irritant. Manganese(IV) oxide powder is harmful — avoid inhaling.</p>

          <p style={{ marginTop: 10 }}><Bold>Practical 1: Extracting and testing an enzyme from living cells (catalase)</Bold></p>
          <p>Catalase is the enzyme; the substrate is hydrogen peroxide (H₂O₂). Hydrogen peroxide is a poisonous by-product of some cell reactions; catalase makes it harmless by breaking it down to water and oxygen:</p>

          <div style={{ textAlign: "center", fontSize: 13, fontStyle: "italic", margin: "8px 0", color: G }}>
            2 H₂O₂ <span style={{ display: "inline-block", borderTop: `1px solid ${G}` }}>&nbsp;<sup>catalase</sup>&nbsp;</span> ⟶ 2 H₂O + O₂
          </div>

          <ul style={{ paddingLeft: 18 }}>
            <li>Grind a small piece of liver with about 20 cm³ of water and a little sand in a mortar (this breaks open the liver cells).</li>
            <li>Filter the mixture, sharing the filtrate between two test tubes A and B.</li>
            <li>Add a few drops of filtrate from tube A to a fresh sample of hydrogen peroxide → <Bold>vigorous bubbling</Bold> (oxygen). The oxygen relights a glowing splint.</li>
            <li>Boil the filtrate in tube B for ~30 s, cool, then add to fresh H₂O₂ → <Bold>NO reaction</Bold> — boiling has DENATURED catalase, confirming it is an enzyme/protein.</li>
            <li>Shake some MnO₂ powder with water and pour into H₂O₂ → vigorous reaction. Boil some MnO₂ + water and add to H₂O₂ → STILL reacts. MnO₂ is a catalyst but NOT an enzyme.</li>
            <li>Optional: repeat the experiment with a piece of potato of the same size to compare its catalase content with liver's.</li>
          </ul>
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Going further — quantitative comparison:</Bold> Investigate a range of plant tissues to find which is the best source of catalase. Possible plant tissues include cassava, potato, celery, apple and carrot. Decide how to make quantitative comparisons (volume of O₂ in fixed time, or time to fill a fixed volume).</p>
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Practical 2: Effect of temperature on amylase</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Use a plastic syringe to place 1 cm³ of 5% amylase solution into each of three test tubes A, B and C.</li>
            <li>Place 5 cm³ of 1% starch solution into each of three test tubes 1, 2 and 3. Add 6 drops of dilute iodine solution to each.</li>
            <li>Prepare three water-baths: (a) ICE WATER (~10 °C), (b) cold tap water (~20 °C), (c) warm water (~35 °C).</li>
            <li>Put tubes 1+A in the cold bath, 2+B in the 20 °C bath, 3+C in the warm bath. Leave for 5 min to reach equilibrium.</li>
            <li>Pour amylase from each lettered tube into the matching numbered tube. Note the time and observe.</li>
            <li>As the amylase breaks down starch, the BLUE iodine colour DISAPPEARS. Time how long this takes. Faster decolourisation = higher rate of reaction.</li>
          </ul>
        </div>

        <TempPracticalDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Practical 3: Effect of pH on amylase</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Label five test tubes 1–5. Place 5 cm³ of 1% starch solution in each.</li>
            <li>Add the following to each tube to set five different pH values:</li>
          </ul>
          <div style={{ overflowX: "auto", marginTop: 6 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
              <thead>
                <tr style={{ background: G, color: "#fff" }}>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Tube</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Chemical added</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Approx. pH</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["1", "1 cm³ sodium carbonate (0.05 mol/dm³)", "9 (alkaline)"],
                  ["2", "0.5 cm³ sodium carbonate (0.05 mol/dm³)", "7-8 (slightly alkaline)"],
                  ["3", "nothing", "6-7 (neutral)"],
                  ["4", "2 cm³ ethanoic acid (0.1 mol/dm³)", "6 (slightly acid)"],
                  ["5", "4 cm³ ethanoic acid (0.1 mol/dm³)", "3 (acid)"],
                ].map((row, i) => (
                  <tr key={i} style={{ background: i % 2 ? GL : "#fff" }}>
                    {row.map((c, j) => (
                      <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? G : GR }}>{c}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <ul style={{ paddingLeft: 18, marginTop: 8 }}>
            <li>Place several drops of iodine solution in rows on a cavity tile.</li>
            <li>Add 1 cm³ of 5% amylase to the first tube; mix; note the time.</li>
            <li>Every 30 s, remove a small sample with a clean dropping pipette and add ONE drop to the next iodine drop on the cavity tile.</li>
            <li>When a sample no longer turns blue-black, the starch is fully digested. Note the time.</li>
            <li>Repeat for each of the other tubes. Stop after ~15 min if no result. Test pH of each tube with universal indicator.</li>
            <li>The tube whose iodine drop turns colourless FIRST contains the enzyme at its OPTIMUM pH (around pH 6–7 for amylase).</li>
          </ul>
        </div>

        <PhPracticalDiagram />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail — % change calculations:</Bold> rates are usually compared using percentage change. The formula is:<br/>
          <Bold>% change = (change in rate ÷ ORIGINAL rate) × 100</Bold><br/>
          Examples (Hodder p.76):<br/>
          • Rate at 20 °C = 4, rate at 40 °C = 32. % increase = (32 − 4) ÷ 4 × 100 = <KW c={TL}>700%</KW>.<br/>
          • Rate at 60 °C = 38, rate at 70 °C = 11. % decrease = (38 − 11) ÷ 38 × 100 = <KW c={TL}>71%</KW>.
        </div>
      </Sec>

      <Sec id="t8" title="⑧ Intracellular and Extracellular Enzymes (Going Further)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>All enzymes are made INSIDE cells, but they don't all do their work there.</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><KW>Intracellular enzymes</KW> ('intra' = inside) remain inside the cell that made them. They speed up the reactions of the cytoplasm and nucleus. Most cellular enzymes (respiration enzymes, replication enzymes, catalase) are intracellular.</li>
            <li><KW>Extracellular enzymes</KW> ('extra' = outside) are made inside the cell but RELEASED OUT to do their work. Examples: digestive enzymes in the human alimentary canal (amylase, pepsin, trypsin) — released into the stomach and intestines. Fungi and bacteria release extracellular enzymes onto their food, then absorb the soluble products. A mould growing on a piece of bread, for example, releases starch-digesting enzymes onto the bread and absorbs the resulting sugars.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t9" title="⑨ Revision Checklist (Hodder, end of chapter)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>After studying Chapter 5 you should know and understand the following:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Catalysts are substances that increase the rate of chemical reactions and are not changed by the reaction.</li>
            <li>Enzymes are proteins that function as biological catalysts.</li>
            <li>Enzymes are important in all organisms because they maintain a reaction speed needed to sustain life.</li>
            <li>The substance on which an enzyme works is called the substrate. After the reaction, a product is formed.</li>
            <li>An enzyme and its substrate have COMPLEMENTARY shapes.</li>
            <li>Enzymes are affected by pH and temperature, and are usually denatured above 50 °C.</li>
            <li><Ext/> Enzymes tend to be very SPECIFIC in the reactions they catalyse, due to the complementary shape of the enzyme's active site and its substrate.</li>
            <li><Ext/> When an enzyme catalyses a reaction, it forms a temporary ENZYME-SUBSTRATE COMPLEX before the product is released.</li>
            <li><Ext/> Changes in temperature affect both the kinetic energy of enzyme molecules AND their shape.</li>
            <li><Ext/> Enzymes can be denatured by changes in temperature and pH.</li>
            <li><Ext/> Changes in pH affect the shape of enzyme molecules.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t10" title="⑩ SME Notes — Concise Theory (Save My Exams revision notes)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <div style={{ background: "#eef4ff", border: "1px solid #b8c8e8", borderRadius: 6, padding: "8px 12px", marginBottom: 10, fontSize: 11.5, color: "#33486d" }}>
            <Bold>Source:</Bold> Save My Exams — Cambridge IGCSE Biology · Enzymes (revision notes). Paraphrased and reorganised; bold-keyword style preserved for exam-vocabulary cues.
          </div>

          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 4, marginBottom: 4 }}>► What are enzymes?</p>
          <p>Enzymes are <KW>catalysts</KW> — substances that <Bold>speed up the rate of a chemical reaction without being changed or used up</Bold> in the reaction. They are <KW>proteins</KW>, made in living cells, which is why they are also called <KW>biological catalysts</KW>.</p>
          <p>Enzymes are necessary for <Bold>all living organisms</Bold> because they maintain reaction speeds of all metabolic reactions (the reactions that keep an organism alive) at a rate that can <KW>sustain life</KW>. As an example, without digestive enzymes a single meal would take roughly 2–3 weeks to digest; with enzymes it takes about 4 hours.</p>

          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 14, marginBottom: 4 }}>► How do enzymes work? (Substrate specificity)</p>
          <p>Each enzyme is <KW>specific</KW> to one particular substrate (or a small group). The <KW>active site</KW> of the enzyme has a shape that is <Bold>complementary</Bold> to that substrate — they fit together like a lock and key. A different molecule, even one that is similar, will not fit and so the enzyme cannot catalyse a reaction with it.</p>
          <p style={{ marginTop: 6 }}>The reaction proceeds in three stages:</p>
          <ol style={{ paddingLeft: 18 }}>
            <li>Enzyme and substrate <Bold>randomly move and collide</Bold> in solution.</li>
            <li>If the substrate fits the active site, an <KW>enzyme–substrate complex</KW> forms (lock-and-key) and the reaction occurs.</li>
            <li>The <Bold>product(s) leave</Bold> the active site (they no longer fit it). The enzyme is <Bold>unchanged</Bold> and free to bind another substrate.</li>
          </ol>

          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 14, marginBottom: 4 }}>► <Ext/> Enzyme Action &amp; Specificity (Extended Tier)</p>
          <p>Enzymes are specific to one particular substrate(s) because the active site, where the substrate attaches, is a complementary shape to the substrate. Each enzyme is a protein with a <KW c={PU}>specific 3-D shape</KW> — this is the <KW c={PU}>lock-and-key hypothesis</KW>. When the substrate moves into the active site, an <KW c={PU}>enzyme–substrate complex</KW> is formed. After the reaction has occurred, the products leave the active site (they no longer fit) and the enzyme is free to take up another substrate.</p>

          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 14, marginBottom: 4 }}>► <Ext/> Enzymes &amp; Temperature (Extended Tier)</p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Enzymes are proteins with a <KW c={PU}>specific shape</KW>, held in place by <Bold>bonds</Bold>. The shape around the active site is what makes the substrate fit.</li>
            <li>Enzymes work fastest at their <KW c={PU}>optimum temperature</KW> — in the human body, this is <Bold>37 °C</Bold>.</li>
            <li>Heating beyond the optimum <Bold>breaks the bonds</Bold> that hold the enzyme together. The enzyme loses its shape — this is <KW c={RD}>denaturation</KW>.</li>
            <li>Substrates can no longer fit into a denatured enzyme because the active site has lost its shape.</li>
            <li><KW c={RD}>Denaturation is irreversible</KW> — once an enzyme is denatured it cannot regain its proper shape, and activity stops.</li>
            <li>From 0 °C up to the optimum, more kinetic energy → faster molecular movement → more <KW c={PU}>successful collisions</KW> with substrate → faster rate. <Bold>Low temperatures do NOT denature enzymes</Bold> — they only slow them down.</li>
          </ul>

          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 14, marginBottom: 4 }}>► <Ext/> Enzymes &amp; pH (Extended Tier)</p>
          <ul style={{ paddingLeft: 18 }}>
            <li>The optimum pH for <Bold>most</Bold> enzymes is <KW c={PU}>pH 7</KW>.</li>
            <li>Some enzymes work in <Bold>acidic</Bold> conditions and have a low optimum — e.g. those produced in the <KW c={PU}>stomach</KW> (≈ pH 2).</li>
            <li>Some work in <Bold>alkaline</Bold> conditions and have a higher optimum — e.g. those produced in the <KW c={PU}>duodenum</KW> (≈ pH 8 or 9).</li>
            <li>If pH moves too far from the optimum, the bonds holding the amino-acid chain together can be <KW c={RD}>destroyed</KW>. The active site changes shape, the substrate no longer fits, and the rate of activity drops.</li>
            <li>Moving far enough away from the optimum causes <KW c={RD}>denaturation</KW>, and activity stops.</li>
          </ul>
          <PHGraph />
        </div>
      </Sec>

      <Sec id="t11" title="⑪ SME Practical Protocols — Amylase + Temperature, Amylase + pH (with results)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <div style={{ background: "#eef4ff", border: "1px solid #b8c8e8", borderRadius: 6, padding: "8px 12px", marginBottom: 10, fontSize: 11.5, color: "#33486d" }}>
            <Bold>Source:</Bold> Save My Exams — Enzyme Investigations. These detailed step-by-step protocols, sample times, and result tables are useful for Paper 6 (Practical) preparation and for explaining experimental observations in Paper 4 questions.
          </div>

          {/* — Amylase + Temperature protocol — */}
          <p style={{ fontSize: 14, fontWeight: 700, color: G, marginTop: 6, marginBottom: 6 }}>► Investigating the Effect of Temperature on Amylase</p>
          <ol style={{ paddingLeft: 20 }}>
            <li>Place a beaker of <Bold>starch solution</Bold> in a water bath set at the test temperature (e.g. 30 °C). Use a thermometer to confirm.</li>
            <li>Add single drops of <KW>iodine solution</KW> in rows on a <Bold>spotting tile</Bold>.</li>
            <li>Add <Bold>amylase</Bold> to the warmed starch solution and mix well. <Bold>Start the timer immediately.</Bold></li>
            <li><Bold>Every minute</Bold>, remove a droplet of the reaction mixture and add it to a fresh well of iodine on the tile.</li>
            <li>If the iodine turns <KW>blue-black</KW>, starch is still present. When iodine <KW c={TL}>stays orange-brown</KW>, all the starch has been digested by the amylase.</li>
            <li>Record the time taken for the reaction to be completed.</li>
            <li>Repeat the experiment at <Bold>different temperatures</Bold>.</li>
          </ol>
          <p style={{ marginTop: 8, fontStyle: "italic", color: "#555", fontSize: 12.5 }}>The quicker the reaction is completed, the faster the enzyme is working at that temperature.</p>

          <p style={{ fontWeight: 700, color: G, marginTop: 10, marginBottom: 4, fontSize: 13 }}>Sample SME results</p>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5, marginTop: 4 }}>

                <th style={{ border: `1px solid ${G}`, padding: "6px 10px", textAlign: "left" }}>Interpretation</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: "6px 10px" }}>20 °C</td>
                <td style={{ border: `1px solid ${BD}`, padding: "6px 10px" }}>≈ 9 minutes</td>
                <td style={{ border: `1px solid ${BD}`, padding: "6px 10px" }}>Slow — low kinetic energy, few successful collisions.</td>
              </tr>

                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
