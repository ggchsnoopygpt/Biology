      </div>

      {/* 4. GENETIC MODIFICATION */}
      <div style={section}>
        <div style={h}>4 · Genetic modification — recombinant DNA technology</div>

        <p style={p}>
          <KW>Genetic modification</KW> is changing the genetic material of an organism by removing, changing or inserting individual genes. To understand the principles, you need to know about <Bold>bacteria</Bold> (Chapter 2 / Fig 2.9) and about <KW>restriction enzymes</KW>.
        </p>

        <div style={{ background: PL, border: `1px solid ${PU}`, borderLeft: `4px solid ${PU}`,
          borderRadius: 6, padding: "10px 14px", marginBottom: 8, fontSize: 11.5, color: GR }}>
          <div style={{ fontWeight: 700, color: PU, marginBottom: 5 }}>🔤 Key SME terms</div>
          <div style={{ marginBottom: 3 }}>
            <Bold>Genetically modified (GM):</Bold> describes an organism that has received DNA from another organism.
          </div>
          <div style={{ marginBottom: 3 }}>
            <Bold>Transgenic organism:</Bold> another name for a genetically modified organism — its genome now contains a gene (or genes) from a different species.
          </div>
          <div>
            <Bold>Recombinant DNA:</Bold> DNA that contains genetic material from <Bold>two different organisms</Bold> combined into a single molecule (e.g. a bacterial plasmid carrying the human insulin gene).
          </div>
        </div>

        <div style={sub}>4.1 Restriction enzymes — the molecular scissors</div>
        <p style={p}>
          Restriction enzymes are produced by bacteria. They cut DNA at <Bold>specific recognition sites</Bold>, for example between the A and the T in the sequence GAA–TTC. Different restriction enzymes recognise different sequences. Using a chosen restriction enzyme, DNA from different organisms can be cut at <Bold>predictable sites</Bold> and made to produce lengths of DNA that contain specific genes — for example the gene that codes for insulin.
        </p>

        <div style={sub}>4.2 DNA ligase — the molecular glue</div>
        <p style={p}>
          DNA from human cells can be removed and restriction enzymes used to <Bold>cut out a sequence of DNA that includes a specific gene</Bold>, leaving <KW>sticky ends</KW> (short single-stranded overhangs). Plasmids are removed from bacteria and cut open with the <Bold>same restriction enzyme</Bold>, producing matching sticky ends. When the human DNA is mixed with the plasmids, some of the human DNA pairs by base-pairing with the matching sticky ends of the open plasmids. The enzyme <KW>DNA ligase</KW> then seals the joins, producing <KW>recombinant plasmids</KW>.
        </p>

        <div style={sub}>4.3 Bacterial uptake, replication and expression</div>
        <p style={p}>
          Bacteria can be stimulated to take up the recombinant plasmids. Scientists have devised ways to <Bold>select only the bacteria that contain the recombinant DNA</Bold>. Given suitable nutrient solutions, these bacteria reproduce rapidly by <Bold>mitosis</Bold> to make millions of identical cells. Each daughter bacterium contains the same DNA and the same plasmids as the parent.
        </p>
        <p style={p}>
          The human DNA in the plasmids continues to produce the same protein as it did in the human cells. When bacteria are modified so they can produce a human protein like insulin, the process is described as <KW>expression</KW>. The bacteria are cultured in fermenters, and the insulin they produce can be extracted from the culture medium and purified for use in treating diabetes.
        </p>
        <GeneticModSVG />

        <div style={sub}>4.4 Variations in genetic modification <Ext/></div>
        <p style={p}>
          Plasmids are described as <Bold>vectors</Bold> that carry the human DNA into the bacteria, and the technique is sometimes called <Bold>gene-splicing</Bold>. Using plasmids is only one type of genetic modification. The vector may be a <Bold>virus</Bold> rather than a plasmid; DNA may be inserted directly without a vector; the donor DNA may be <Bold>synthesised from nucleotides</Bold> rather than extracted from cells; or yeast may be used instead of bacteria. The outcome is the same — DNA from one species is inserted into a different species and made to produce its normal proteins.
        </p>
      </div>

      {/* 5. APPLICATIONS */}
      <div style={section}>
        <div style={h}>5 · Applications of genetic modification</div>

        <div style={sub}>5.1 Human proteins (insulin)</div>
        <p style={p}>
          Human insulin has been produced by GM bacteria <Bold>since 1982</Bold>. The human insulin gene is inserted into bacteria, which then secrete human insulin. It is <Bold>purer</Bold> than insulin extracted from pigs or cattle, which can sometimes trigger allergic reactions because of traces of foreign protein. GM insulin is also acceptable to people whose religious beliefs forbid the use of insulin from cows or pigs.
        </p>

        <div style={sub}>5.2 Hepatitis B vaccine <Ext/></div>
        <p style={p}>
          The gene for the <Bold>protein coat</Bold> of the hepatitis virus is inserted into yeast cells. When these are cultured they produce a protein that acts as an <Bold>antigen</Bold> (a vaccine), which promotes the production of antibodies against the disease. Transgenic plants — including banana, which is cheap and widespread in the tropics — have been modified to produce oral vaccines against diseases such as rabies and cholera. Strict controls ensure such plants cannot enter the human food chain by accident.
        </p>

        <div style={sub}>5.3 GM crops — pest resistance</div>
        <p style={p}>
          Genetic modification has huge potential in agriculture. In the USA, <Bold>94 % of soya beans</Bold> and <Bold>92 % of maize</Bold> are GM, resistant to herbicides and insect pests. In many countries, GM crops are grown only on a trial basis and there is resistance to their use.
        </p>
        <p style={p}>
          The bacterium <i>Bacillus thuringiensis</i> produces a toxin (<KW>Bt toxin</KW>) that kills caterpillars and other insect larvae. The gene has been transferred into crops like <Bold>maize, cotton and soybean</Bold> using a bacterial vector. The plants now produce the toxin themselves and show increased resistance to attack. The gene is passed on to the plant's offspring. Unfortunately, there are signs that some insects are evolving immunity to the toxin. Most American GM maize carries a pesticide gene to reduce damage from stem-boring moth larvae.
        </p>

        <div style={sub}>5.4 GM crops — herbicide resistance</div>
        <p style={p}>
          Some of the most effective herbicides (e.g. <KW>glyphosate</KW>) kill any green plant but become harmless when they reach the soil. These cannot be used on crops because they would kill the crop too. A gene for an <Bold>enzyme that breaks down glyphosate</Bold> is introduced into plant cell cultures, producing herbicide-tolerant crops. Most American GM maize has this gene, allowing reduced overall use of herbicides. Some scientists suspect glyphosate is carcinogenic, so it is being banned in some countries.
        </p>

        <div style={sub}>5.5 GM crops — improved nutritional quality</div>
        <p style={p}>
          Modifying plant products to improve nutritional value rather than yield. Examples include:
        </p>
        <ul style={{ fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8, paddingLeft: 22 }}>
          <li><Bold>Golden Rice</Bold> with a β-carotene gene — vitamin A precursor; tackles the deficiency that causes blindness in over 100 million children.</li>
          <li><Bold>Maize</Bold> with a gene to increase iron uptake — combats anaemia caused by iron deficiency.</li>
          <li><Bold>Wheat</Bold> engineered to be free of gluten — for people with gluten allergy.</li>
          <li><Bold>Vegetables</Bold> with a gene to boost vitamin E — to help fight heart disease.</li>
          <li><Bold>Cassava</Bold> with genes inserted to increase root iron uptake and protein content — important in many African countries where cassava is a staple but poor in protein, vitamins and minerals.</li>
        </ul>
        <p style={p}>
          Other modifications under trial: a gene that produces <Bold>citrate</Bold>, which binds aluminium in acid soils and allows maize to grow well (cuts the 8 % yield loss in tropical/subtropical regions); <Bold>salt-tolerance</Bold> genes from mangroves transferred to crops to reclaim land salted by irrigation; <Bold>nitrogen-fixation</Bold> genes transferred to cereals to reduce the need for fertiliser; and <Bold>drought-resistance</Bold> genes.
        </p>
        <GMCropsSVG />
      </div>

      {/* 6. PROS / CONS / CONCERNS */}
      <div style={section}>
        <div style={h}>6 · Advantages &amp; disadvantages of GM crops</div>

        <div style={sub}>6.1 The benefits</div>
        <p style={p}>
          GM crops show increased yields and better nutritional quality. They can be made <Bold>resistant to pests, herbicides, salt, drought and acid soils</Bold>. Unlike conventional cross-breeding, GM transfers <Bold>only the target gene</Bold>, avoiding the harmful traits that can come with whole-genome mixing. The differences between the genomes of different species are not as great as it seems — plants and animals share around 60 % of their genes; humans share 50 % of their genes with fruit flies. Not all genetic modification involves "alien" genes; sometimes only the plant's own genes are modified to improve field performance.
        </p>

        <div style={sub}>6.2 The risks</div>
        <p style={p}>
          One concern is the <Bold>spread of modified genes to wild plants</Bold>. If a herbicide-resistance gene reached a weed via pollination, that weed could become a <Bold>super-weed</Bold> that cannot be killed. Strict field trials assess this risk before licences are issued. Some scientists add a gene that <Bold>stops the GM plant producing pollen</Bold>, allowing seeds and fruits to develop without fertilisation (a process called apomixis, which occurs naturally in some species).
        </p>
        <p style={p}>
          Another concern is that the bacterial vectors used contain <Bold>antibiotic-resistance marker genes</Bold> (used to select the bacteria that took up the new DNA). If those genes reached <Bold>gut bacteria</Bold>, harmful bacteria might become antibiotic-resistant. Although there is no evidence so far that this happens, biotech companies are seeking vectors that don't rely on antibiotic markers.
        </p>
        <p style={p}>
          There is also concern about possible <Bold>pesticide residues</Bold> or <Bold>allergens</Bold> in GM food. However, GM products undergo more rigorous testing than products from conventional cross-breeding. Only a handful of GM foods are widely available; about 60 % of processed foods contain GM soya in one form or another.
        </p>
        <p style={p}>
          <Bold>Golden Rice</Bold> contains a gene for β-carotene (vitamin A precursor). Some critics argue that β-carotene might change into toxic substances once eaten — currently only the Philippines and Bangladesh allow GM Golden Rice. Other concerns: <Bold>reduced biodiversity</Bold>; <Bold>subsistence farmers</Bold> becoming tied to large agricultural suppliers who control seed prices; and a general unease about introducing genes from one species into a totally different species — something that does not happen naturally, so the long-term effects are unknown.
        </p>

        <div style={sub}>6.3 GM crops — at-a-glance comparison <Ext/></div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 5 }}>
          <thead><tr>
            <th style={{ background: GL, color: G, padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5, textAlign: "left", width: "50%" }}>✓ Advantages</th>
            <th style={{ background: RL, color: RD, padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5, textAlign: "left", width: "50%" }}>✗ Disadvantages</th>
          </tr></thead>
          <tbody>
            <tr>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Reduced use of chemicals (herbicides, pesticides) — better for the environment; cheaper and less time-consuming for farmers.</td>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Increased seed costs — GM seed companies charge more to cover development costs; smaller, poorer farmers cannot compete with larger farms.</td>
            </tr>
            <tr>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Increased crop yields — crops do not compete with weeds for resources and do not suffer pest damage.</td>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Increased dependency on certain chemicals (e.g. herbicides crops are resistant to) — often made by the same companies that produce the seeds, and expensive to buy.</td>
            </tr>
            <tr>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Improved nutritional content (e.g. Golden Rice for vitamin A, iron-fortified maize).</td>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Risk of inserted genes being transferred to wild plants by pollination, possibly creating herbicide-resistant weeds and reducing the usefulness of the GM crop.</td>
            </tr>
            <tr>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Only the target gene is transferred (unlike cross-breeding, which mixes whole genomes).</td>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Reduced biodiversity — fewer plant species where herbicides are used; this can impact insects and insect-eating birds further along the food chain.</td>
            </tr>
            <tr>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>GM crops can be made resistant to salt, drought and acid soils, allowing growing in poor environments.</td>
              <td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11, verticalAlign: "top" }}>Some research suggests plants with inserted genes do not grow as well as non-GM plants; long-term effects of GM food on humans are unknown.</td>
            </tr>
          </tbody>
        </table>
      </div>

      {/* 7. PRACTICAL WORK */}
      <div style={section}>
        <div style={h}>7 · Practical work — three experiments</div>

        <div style={sub}>7.1 Pectinase &amp; fruit juice</div>
        <p style={p}>
          Make about 100 cm³ of apple purée using a liquidiser (or use tinned purée). Transfer to a 250 cm³ beaker. Using a syringe, add 5 cm³ of 50 % pectinase, stir, and leave for about 5 minutes. Transfer the purée into a folded filter paper inside a funnel placed over a 100 cm³ measuring cylinder, and leave in a warm place for up to 24 hours. Repeat with purée kept at <Bold>different temperatures</Bold> to compare juice extraction.
        </p>
        <p style={p}>
          <Bold>Result:</Bold> juice is extracted from the purée and collects in the measuring cylinder, transparent and clarified.
          <br/><Bold>Interpretation:</Bold> pectinase breaks down apple tissue, releasing sugars in solution. More juice collects in warm conditions because the enzyme works faster; colder temperatures slow the process.
          <br/><Bold>Extension:</Bold> compare cellulase and amylase with pectinase (and combinations) to see which is most effective.
        </p>

        <div style={sub}>7.2 Biological washing powder</div>
        <p style={p}>
          Break an egg into a plastic beaker and whisk thoroughly. Cut four 10×10 cm squares of white cloth, smear egg evenly onto each and leave to dry. Set up four 250 cm³ beakers as follows:
        </p>
        <ul style={{ fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8, paddingLeft: 22 }}>
          <li><Bold>A</Bold> — 100 cm³ warm water with no washing powder (control).</li>
          <li><Bold>B</Bold> — 5 cm³ non-biological powder in 100 cm³ warm water.</li>
          <li><Bold>C</Bold> — 5 cm³ biological powder in 100 cm³ warm water.</li>
          <li><Bold>D</Bold> — 5 cm³ biological powder boiled for 5 minutes in 100 cm³ water, then cooled.</li>
        </ul>
        <p style={p}>
          Place an egg-stained cloth in each beaker for 30 minutes, then remove and compare cleanliness.
          <br/><Bold>Result:</Bold> C cleans best, then B, then D; A is largely unchanged.
          <br/><Bold>Interpretation:</Bold> the enzymes in biological powder digest proteins and fats in the egg to soluble amino acids, fatty acids and glycerol, which can wash out. Non-biological powder (B) cleans only by the detergent's surfactant action — less effective. Boiled biological powder (D) is no better because the enzymes have been <Bold>denatured</Bold>. Beaker A is a control with no detergent or enzymes, so the cloth stays stained.
        </p>

        <div style={sub}>7.3 Action of lactase</div>
        <p style={p}>
          Uses glucose test strips (Diastix), which react only to glucose (not to lactose or sucrose). Pour 25 cm³ warm fresh milk into a beaker. Test the milk for glucose with a test strip. Add 2 cm³ of 2 % lactase using a syringe or pipette. Stir and leave for a few minutes.
          <br/><Bold>Result:</Bold> the untreated milk gives a negative test for glucose; the milk treated with lactase gives a positive test.
          <br/><Bold>Interpretation:</Bold> lactase breaks down lactose in milk → glucose + galactose. Now glucose is present, so the test strip reacts.
        </p>

        <div style={sub}>7.4 Practical work questions</div>
        <p style={p}>
          <Bold>Q1</Bold> When studying the effect of temperature on fruit-juice production, two factors that should be controlled to make results reliable: (i) the <Bold>volume and concentration of pectinase</Bold> used in each beaker, and (ii) the <Bold>type / mass of apple purée</Bold> used. Other valid answers: time, particle size, container shape.
          <br/><Bold>Q2</Bold> To convert the qualitative washing-powder test to a quantitative one: cut all cloth squares to the <Bold>same size and mass</Bold>; weigh each cloth after washing and drying, or measure the colour intensity of the stain using a <Bold>colorimeter</Bold>, or measure the volume of stain remaining by scanning.
          <br/><Bold>Q3a</Bold> Without Diastix you could test for glucose with <Bold>Benedict's reagent</Bold>: add equal volume of the test liquid, heat in a water bath — a colour change from blue through green to brick red indicates glucose.
          <br/><Bold>Q3b</Bold> The Benedict's test is <Bold>semi-quantitative</Bold>: a small trace of glucose gives a green/yellow precipitate, a large amount gives a brick-red precipitate. So the depth of colour distinguishes a trace from a large amount.
        </p>
      </div>

      {/* 8. REVISION SUMMARY */}
      <div style={section}>
        <div style={h}>8 · Revision checklist (Hodder summary)</div>
        <p style={p}>
          After studying Chapter 21, you should know and understand the following:
        </p>
        <ul style={{ fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8, paddingLeft: 22 }}>
          <li>Bacteria are useful in biotechnology and genetic modification because of their ability to make complex molecules and their rapid reproduction.</li>
          <li>Bacteria are useful because there is no ethical concern over their manipulation and growth.</li>
          <li>The genetic code in bacteria is shared with all other organisms — foreign genes can be expressed.</li>
          <li>Bacteria contain plasmids which can be cut open and used to insert genes.</li>
          <li>Biotechnology = the application of living organisms, systems or processes in industry — often microorganisms in fermentation.</li>
          <li>The product can be the organism itself (mycoprotein) or its product (ethanol, antibiotic, insulin).</li>
          <li>Yeasts are used in biofuel and bread production.</li>
          <li>Pectinase is used to extract fruit juices.</li>
          <li>Lipase and protease are used in biological washing powders.</li>
          <li>Lactase is used to make lactose-free milk.</li>
          <li>Fermenters are used in the industrial production of antibiotics like penicillin.</li>
          <li><Ext/> Genetic modification = changing the genetic material by removing, changing or inserting individual genes.</li>
          <li><Ext/> Examples of GM include inserting human genes into bacteria to make human proteins (e.g. insulin), inserting genes into crops to give pest/herbicide resistance, or improving nutritional quality.</li>
          <li><Ext/> In the GM process: human gene is isolated using restriction enzymes (sticky ends); plasmid is cut with the same enzyme; gene + plasmid joined by <Bold>DNA ligase</Bold> → recombinant plasmid; plasmid inserted into bacteria; bacteria reproduce; bacteria make human protein as they express the gene. Plasmids and viruses are vectors.</li>
          <li><Ext/> Crop plants can be GM to resist insect pests and herbicides.</li>
          <li><Ext/> Advantages of GM crops: pest resistance, herbicide tolerance, better nutrition.</li>
          <li><Ext/> Concerns: GM genes might spread to wild plants.</li>
        </ul>
      </div>

    </div>
  );
}

function FlashcardTab() {
  const [flipped, setFlipped] = useState({});
  const [topic, setTopic] = useState("all");
  const toggle = id => setFlipped(p => ({ ...p, [id]: !p[id] }));

  const cards = [
    // Bacteria & DNA (1-3)
    { id: "f1",  topic: "bact",    front: "Define: biotechnology.", back: "Biotechnology is the use of living organisms to make products that are useful to humans." },
    { id: "f2",  topic: "bact",    front: "Why are bacteria useful in biotechnology?", back: "Bacteria are useful because: (1) they have a rapid reproduction rate; (2) they can make complex molecules; (3) there are few ethical concerns about their use (EXT); (4) they contain plasmids (EXT)." },
    { id: "f3",  topic: "bact",    front: "Why does the presence of plasmids in bacteria make them useful in biotechnology? (EXT)", back: "Plasmids provide an easy route for inserting new genes into bacteria during genetic modification — the gene of interest can be placed into a plasmid and taken up by the bacterium." },

    // Yeast: biofuels and bread (4-6)
    { id: "f4",  topic: "yeast",   front: "How do yeast cells produce ethanol for biofuels?", back: "Yeast cells produce ethanol during anaerobic respiration: glucose → ethanol + carbon dioxide. The ethanol is collected and used as a renewable biofuel." },
    { id: "f5",  topic: "yeast",   front: "True or False? Yeast requires oxygen to respire.", back: "False. Yeast can carry out anaerobic respiration in the absence of oxygen — this is how it makes ethanol in biofuels and CO₂ in bread-making." },
    { id: "f6",  topic: "yeast",   front: "What is the role of yeast in bread-making?", back: "In bread-making, yeast uses sugars for anaerobic respiration, producing carbon dioxide gas. The CO₂ bubbles become trapped in the dough and make it rise." },

    // Enzymes in industry: pectinase, washing powder, lactase (7-9)
    { id: "f7",  topic: "enzymes", front: "True or False? Pectinase enzyme is involved in the production of cloudy fruit juices.", back: "False. Pectinase is used to produce clear fruit juices — it breaks down pectin so the juice flows out of the fruit pulp and looks clear rather than cloudy." },
    { id: "f8",  topic: "enzymes", front: "What is the benefit of adding enzymes to washing powders?", back: "(1) The enzymes (proteases and lipases) break down biological stains containing fats and proteins; (2) The enzymes work effectively at lower temperatures, so washing temperatures can be reduced, saving energy." },
    { id: "f9",  topic: "enzymes", front: "How can enzymes be used in the production of lactose-free milk? (EXT)", back: "Lactose-free milk is made using lactase enzymes, which break down the lactose in milk (into glucose and galactose) so that lactose-intolerant people can drink it without symptoms." },

    // Fermenters: products, mycoprotein, conditions (10-13)
    { id: "f10", topic: "ferment", front: "What products can be produced on a large scale using industrial fermenters? (EXT)", back: "Products made in industrial fermenters include: insulin, penicillin, and mycoprotein." },
    { id: "f11", topic: "ferment", front: "What is mycoprotein?", back: "Mycoprotein is a protein-rich food produced by a fungus (Fusarium venenatum). It is suitable for vegetarians and is often used as a meat substitute (e.g. Quorn)." },
    { id: "f12", topic: "ferment", front: "Which conditions need to be controlled inside a fermenter? (EXT)", back: "Conditions to control: (1) temperature; (2) pH; (3) oxygen concentration; (4) nutrient supply; (5) concentration of waste products." },
    { id: "f13", topic: "ferment", front: "Why does temperature need to be controlled inside fermenters? (EXT)", back: "Respiring microorganisms release heat as they respire. The fermenter must be kept cool, otherwise the temperature would rise high enough to denature the microbial enzymes and stop the process." },

    // Genetic modification (14-22)
    { id: "f14", topic: "gm",      front: "What is genetic modification?", back: "Genetic modification involves changing the genetic material of an organism by removing, changing or inserting individual genes." },
    { id: "f15", topic: "gm",      front: "True or False? Human genes can be inserted into bacteria, which then produce human proteins.", back: "True. Human genes (such as the insulin gene) can be inserted into bacteria, which then express the gene and produce the human protein on an industrial scale." },
    { id: "f16", topic: "gm",      front: "Why might crop varieties be genetically modified?", back: "Crops are GM to introduce: (1) herbicide resistance; (2) pest resistance; (3) new nutritional qualities (e.g. higher vitamin or mineral content)." },
    { id: "f17", topic: "gm",      front: "What is the role of restriction enzymes in genetic modification? (EXT)", back: "Restriction enzymes cut DNA at specific nucleotide sequences, isolating the desired gene. The cut produces fragments with single-stranded overhangs called sticky ends." },
    { id: "f18", topic: "gm",      front: "True or False? The desired gene is isolated using the same restriction enzyme that is used to cut the plasmid during genetic modification. (EXT)", back: "True. The same restriction enzyme is used on both the human gene and the plasmid so that they have complementary bases on their sticky ends — this allows the sticky ends to pair and bond together." },
    { id: "f19", topic: "gm",      front: "What is recombinant DNA? (EXT)", back: "Recombinant DNA is DNA taken from two different organisms and combined into a single strand — for example, a plasmid containing a human gene." },
    { id: "f20", topic: "gm",      front: "What is the role of plasmids in genetic modification? (EXT)", back: "Plasmids act as vectors that allow DNA to be transferred into bacterial cells." },
    { id: "f21", topic: "gm",      front: "How do bacteria produce more copies of the recombinant plasmids? (EXT)", back: "Bacteria copy the recombinant DNA inside them as they reproduce by asexual reproduction. Each new daughter cell receives a copy of the recombinant DNA, so the gene is multiplied rapidly." },
    { id: "f22", topic: "gm",      front: "Why are genetically engineered bacteria useful in producing specific proteins, e.g. insulin? (EXT)", back: "Once the bacteria have been modified to carry the correct gene, they reproduce quickly and synthesise the specific protein required in large quantities." },

    // GM crops (23-25)
    { id: "f23", topic: "gmcrop",  front: "How has rice been genetically modified to increase its health benefits? (EXT)", back: "Rice has been GM to produce Golden Rice, which contains an increased amount of vitamin A (from added β-carotene) to help prevent vitamin A deficiency." },
    { id: "f24", topic: "gmcrop",  front: "True or False? Soya has been GM to produce Bt toxin which kills insect pests. (EXT)", back: "False. Soya has been GM to provide herbicide resistance, so it can be sprayed with weedkiller without harming the crop. Bt toxin is produced by GM maize and GM cotton." },
    { id: "f25", topic: "gmcrop",  front: "What are some advantages and disadvantages of genetic modification in crops? (EXT)", back: "ADVANTAGES: improved nutritional content; reduction in pesticide use (pest-resistant crops); increased yield. DISADVANTAGES: seeds are more expensive; risk of new genes escaping into wild plant populations; GM crops may produce toxins that harm non-target species as well as pests." },
  ];

  const topics = [
    { id: "all", label: "All", count: cards.length },
    { id: "bact", label: "Bacteria & DNA", count: cards.filter(c => c.topic === "bact").length },
    { id: "yeast", label: "Yeast/Bread/Biofuel", count: cards.filter(c => c.topic === "yeast").length },
    { id: "enzymes", label: "Industrial Enzymes", count: cards.filter(c => c.topic === "enzymes").length },
    { id: "ferment", label: "Fermenters", count: cards.filter(c => c.topic === "ferment").length },
    { id: "gm", label: "Genetic Modification", count: cards.filter(c => c.topic === "gm").length },
    { id: "gmcrop", label: "GM Crops", count: cards.filter(c => c.topic === "gmcrop").length },
  ];

  const filtered = topic === "all" ? cards : cards.filter(c => c.topic === topic);
  const flippedCount = filtered.filter(c => flipped[c.id]).length;

  return (
    <div>
      <div style={{ background: TLL, border: `1px solid ${TL}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: TL, fontWeight: 600 }}>
        🃏 <Bold>SME Flashcards</Bold> · {cards.length} cards · click any card to flip
      </div>

      {/* Topic filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {topics.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{
            padding: "6px 10px", borderRadius: 6,
            border: topic === t.id ? `1.5px solid ${TL}` : `1px solid ${BD}`,
            background: topic === t.id ? TL : "#fff",
            color: topic === t.id ? "#fff" : TL,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>
        <span><Bold>{filtered.length}</Bold> cards · <Bold>{flippedCount}</Bold> revealed</span>
        <button onClick={() => setFlipped({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,
          borderRadius: 4, cursor: "pointer",
        }}>Reset all</button>
      </div>

      {/* Card grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))",
        gap: 10 }}>
        {filtered.map(c => {
          const isFlipped = flipped[c.id];
          return (
            <div key={c.id} onClick={() => toggle(c.id)} style={{
              background: isFlipped ? TLL : "#fff",
              border: `1.5px solid ${isFlipped ? TL : BD}`,
              borderRadius: 8, padding: "12px 14px",
              minHeight: 110, cursor: "pointer",
              transition: "all .15s",
              display: "flex", flexDirection: "column",
            }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: isFlipped ? TL : "#999",
                letterSpacing: 1, marginBottom: 6 }}>
                {isFlipped ? "DEFINITION" : "TERM / QUESTION"} · {c.id.toUpperCase()}
              </div>
              <div style={{ fontSize: isFlipped ? 11.5 : 13.5, lineHeight: 1.5, color: GR,
                fontWeight: isFlipped ? 500 : 700, flex: 1 }}>
                {isFlipped ? c.back : c.front}
              </div>
              <div style={{ fontSize: 9, color: "#bbb", marginTop: 8, textAlign: "right" }}>
                click to {isFlipped ? "show term" : "reveal"}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Save My Exams style · {CHAPTER_META.flashcardCount} cards total · self-testing mode
      </div>
    </div>
  );
}
