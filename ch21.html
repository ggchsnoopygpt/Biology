const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Bread-making flow ────────────────────────────────────────────────────────
function BreadMakingSVG() {
  return (
    <svg viewBox="0 0 720 360" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="360" rx="12" fill="#fafafa" stroke={AM} strokeWidth="1.5"/>

        Bread-making — yeast fermentation in dough

      {/* Step 1: Mixing ingredients */}
      <rect x="30" y="55" width="170" height="80" rx="8" fill="#fff" stroke={G} strokeWidth="1.5"/>
      <text x="115" y="76" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>① Mix ingredients</text>
      <text x="115" y="93" textAnchor="middle" fontSize="9.5" fill={GR}>flour · water · salt</text>
      <text x="115" y="106" textAnchor="middle" fontSize="9.5" fill={GR}>oil · sugar · yeast</text>
      <text x="115" y="124" textAnchor="middle" fontSize="9" fill="#888" fontStyle="italic">water activates amylases</text>

      <line x1="200" y1="95" x2="240" y2="95" stroke={AM} strokeWidth="2" markerEnd="url(#arrAM)"/>

      {/* Step 2: Knead */}
      <rect x="245" y="55" width="170" height="80" rx="8" fill="#fff" stroke={G} strokeWidth="1.5"/>
      <text x="330" y="76" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>② Knead dough</text>
      <text x="330" y="93" textAnchor="middle" fontSize="9.5" fill={GR}>amylase: starch → sugar</text>
      <text x="330" y="108" textAnchor="middle" fontSize="9.5" fill={GR}>gluten forms an</text>
      <text x="330" y="121" textAnchor="middle" fontSize="9.5" fill={GR}>elastic protein network</text>

      <line x1="415" y1="95" x2="455" y2="95" stroke={AM} strokeWidth="2" markerEnd="url(#arrAM)"/>

      {/* Step 3: Rise */}
      <rect x="460" y="55" width="230" height="80" rx="8" fill={AL} stroke={AM} strokeWidth="1.5"/>

// ① QUICK ESSENCE TAB — 5-minute review
// ════════════════════════════════════════════════════════════════════════════
function EssenceTab() {
  const card = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${AM}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 12 };
  const h = { fontSize: 13, fontWeight: 800, color: AM, marginBottom: 8, letterSpacing: 0.3 };
  const li = { fontSize: 12.5, lineHeight: 1.65, marginBottom: 5, color: GR };

  return (
    <div>
      <div style={{ background: AL, border: `1px solid ${AM}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: AM, fontWeight: 600 }}>
        ⚡ <Bold>The 5-minute Essence</Bold> — read this the morning of the exam
      </div>

      <div style={card}>
        <div style={h}>① WHY BACTERIA? — TWO BIG REASONS</div>
        <div style={li}>· <KW c={AM}>Rapid reproduction</KW> — bacteria divide up to 3 times an hour, so millions of cells can be cultured quickly.</div>
        <div style={li}>· <KW c={AM}>Make complex molecules</KW> — proteins and other useful chemicals, all from cheap raw materials.</div>
        <div style={li}>· No ethical objection to growing/manipulating bacteria. <KW c={AM}>Genetic code is universal</KW> — human genes work inside bacteria.</div>
        <div style={li}>· Bacterial DNA = <Bold>one big circular chromosome</Bold> + small circular <KW c={AM}>plasmids</KW> in the cytoplasm (handy as "vectors").</div>
      </div>

      <div style={card}>
        <div style={h}>② FERMENTATION USES OF YEAST &amp; ENZYMES</div>
        <div style={li}>· <KW c={AM}>Bread</KW>: yeast respires sugar → <Bold>CO₂</Bold> (raises dough) + ethanol (evaporates on baking). Amylase in flour digests starch → sugar.</div>
        <div style={li}>· <KW c={AM}>Biofuels</KW>: yeast ferments sugar/grain → <Bold>ethanol</Bold>. Less polluting than petrol — Brazil/Zimbabwe/USA use it for cars. <Bold>Concern:</Bold> if crops are grown specifically for biofuel, less land is available for food crops.</div>
        <div style={li}>· <KW c={AM}>Pectinase</KW> (from <i>Aspergillus</i>) breaks down pectin in apple cells → more juice, clearer, sweeter.</div>
        <div style={li}>· <KW c={AM}>Biological washing powder</KW> = <Bold>proteases</Bold> (blood/egg) + <Bold>lipases</Bold> (grease/oil). Big insoluble stains → small soluble products. Saves energy (works at 40 °C). Hot water denatures the enzymes.</div>
        <div style={li}>· <KW c={AM}>Lactase</KW> breaks lactose → glucose + galactose. <Bold>Lactose-free milk</Bold> for lactose-intolerant people. Lactase is often <Bold>immobilised on beads</Bold> so it doesn't end up in the milk.</div>
      </div>

      <div style={card}>
        <div style={h}>③ FERMENTERS — controlled tanks for microbes</div>
        <div style={li}>· Sealed vessels up to <Bold>100 000 L</Bold> for industrial production: penicillin, insulin, mycoprotein, enzymes.</div>
        <div style={li}>· Six conditions monitored: <KW c={AM}>temperature</KW> (~26 °C, cooled because microbes give off heat), <KW c={AM}>pH</KW> (slightly acidic 5–6), <KW c={AM}>oxygen</KW> (sterile air pumped + stirred), <KW c={AM}>nutrients</KW>, <KW c={AM}>sterile conditions</KW>, <KW c={AM}>waste removal</KW>.</div>
        <div style={li}>· Stirring paddles = even distribution of nutrients, gases and heat.</div>
        <div style={li}>· <Bold>Sterile</Bold> = essential, otherwise contaminating microbes spoil the culture.</div>
      </div>

      <div style={card}>
        <div style={h}>④ GENETIC MODIFICATION (GM) — KEY ENZYMES</div>
        <div style={li}>· Definition: <KW c={AM}>changing the genetic material of an organism by removing, changing or inserting individual genes</KW>.</div>
        <div style={li}>· <KW c={AM}>Restriction enzyme</KW> — cuts DNA at specific base sequences (e.g. between A and T in GAA–TTC), leaving <Bold>sticky ends</Bold>.</div>
        <div style={li}>· <KW c={AM}>DNA ligase</KW> — joins matching sticky ends. The "molecular glue" that seals the recombinant plasmid.</div>
        <div style={li}>· <Bold>Same restriction enzyme</Bold> must be used to cut both the human DNA AND the plasmid → so sticky ends match.</div>
        <div style={li}>· <KW c={AM}>Plasmid</KW> = vector. Other vectors: viruses. <KW c={AM}>Expression</KW> = bacterium makes the human protein from the inserted gene.</div>
      </div>

      <div style={card}>
        <div style={h}>⑤ MAKING INSULIN — six steps</div>
        <div style={li}>· <Bold>1</Bold> Identify and isolate the human insulin gene.</div>
        <div style={li}>· <Bold>2</Bold> Cut it out with a restriction enzyme → sticky ends.</div>
        <div style={li}>· <Bold>3</Bold> Cut bacterial plasmid with the <Bold>same</Bold> restriction enzyme → matching sticky ends.</div>
        <div style={li}>· <Bold>4</Bold> Insulin gene + plasmid joined by <KW c={AM}>DNA ligase</KW> → <Bold>recombinant plasmid</Bold>.</div>
        <div style={li}>· <Bold>5</Bold> Plasmid inserted into bacteria → bacteria reproduce by mitosis → millions of identical copies.</div>
        <div style={li}>· <Bold>6</Bold> Bacteria <Bold>express the gene</Bold> in a fermenter → insulin is extracted, purified, used to treat diabetes.</div>
        <div style={li}>· In use since 1982 · GM insulin is <Bold>purer</Bold> than pig/cow insulin (no allergens) and acceptable across religions.</div>
      </div>

      <div style={card}>
        <div style={h}>⑥ GM CROPS — three big benefits</div>
        <div style={li}>· <KW c={AM}>Pest resistance</KW>: <i>Bacillus thuringiensis</i> (<Bold>Bt</Bold>) toxin gene → maize, cotton, soybean kill caterpillars themselves.</div>
        <div style={li}>· <KW c={AM}>Herbicide resistance</KW>: gene that breaks down glyphosate → crops survive blanket spray. ~94% US soya / 92% US maize is GM.</div>
        <div style={li}>· <KW c={AM}>Better nutrition</KW>: <Bold>Golden Rice</Bold> (β-carotene → vit. A, prevents blindness); iron-rich maize; gluten-free wheat; cassava with extra iron and protein.</div>
      </div>

      <div style={card}>
        <div style={h}>⑦ ADVANTAGES vs DISADVANTAGES OF GM</div>
        <div style={li}>· <Bold>✓ Pros</Bold>: higher yield, fewer pesticides (Bt crops), pollution↓, vitamin/iron content↑, salt/drought tolerance, only the target gene transferred (precise).</div>
        <div style={li}>· <Bold>✗ Cons</Bold>: GM genes might spread to wild plants (super-weeds); antibiotic-resistance markers in bacteria could pass to gut bacteria; allergens possible; long-term effects unknown; only farmers in rich countries benefit; loss of biodiversity in agriculture.</div>
      </div>

      <div style={{ background: AL, border: `1px solid ${AM}`, borderRadius: 8,
        padding: "12px 16px", marginTop: 14, fontSize: 12, color: GR }}>
        <Bold>Key word check</Bold>: biotechnology, genetic modification, plasmid, restriction enzyme, sticky ends, DNA ligase, recombinant plasmid, expression, vector, fermenter, lactase, lactose intolerance, pectinase, protease, lipase, mycoprotein, Bt toxin, Golden Rice, glyphosate, immobilised enzyme.
      </div>
    </div>
  );
}

      hint: "Holds the gas",
      a: <><Bold>Gluten</Bold> — a sticky protein in wheat flour that traps the CO₂ bubbles produced by the yeast [1].</> },

    { id: "e6", diff: "easy", topic: "yeast", marks: 2, star: "★★★",
      q: "Explain why ethanol can be used as a biofuel.",
      hint: "Renewable, less polluting",
      a: <>Ethanol is produced by yeast fermenting sugar or starch from plant material — a <Bold>renewable</Bold> source of energy [1]. Burning it produces <Bold>less pollution</Bold> than burning petrol or diesel [1].</> },

    { id: "e7", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "State the role of pectinase in fruit juice production.",
      hint: "Breaks down 'glue' between cells",
      a: <>Pectinase breaks down <Bold>pectin</Bold>, the jelly-like substance that sticks plant cell walls together [1]. This releases the juice from the fruit and makes the juice <Bold>clearer and sweeter</Bold> [1].</> },

    { id: "e8", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "Name the two types of enzyme in biological washing powders and the type of stain each removes.",
      hint: "Protein + fat",
      a: <><Bold>Proteases</Bold> digest <Bold>protein</Bold> stains (e.g. blood, egg) [1]. <Bold>Lipases</Bold> digest <Bold>fat</Bold> stains (e.g. grease, oil) [1].</> },

    { id: "e9", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "Explain why biological washing powders save energy compared with non-biological powders.",
      hint: "Lower temperature",
      a: <>The enzymes work at <Bold>lower temperatures</Bold> (around 40 °C), so there is no need to use very hot water [1]. Less energy is needed to heat the water, reducing fuel/electricity use [1].</> },

    { id: "e10", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "Explain why biological washing powders are not effective if used in very hot water.",
      hint: "Denaturation",
      a: <>At high temperatures the enzymes become <Bold>denatured</Bold> [1] — their active sites change shape so they can no longer break down protein or fat molecules in stains [1].</> },

    { id: "e11", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "Define lactose intolerance.",
      hint: "Missing enzyme",
      a: <>A digestive problem where the body does not produce enough of the enzyme <Bold>lactase</Bold> [1], so undigested lactose stays in the gut, where bacteria ferment it, causing wind, diarrhoea and stomach pain [1].</> },

    { id: "e12", diff: "easy", topic: "enzymes", marks: 2, star: "★★★",
      q: "State the products formed when lactase breaks down lactose, and explain why this helps lactose-intolerant people.",
      hint: "Two monosaccharides",
      a: <>Lactose → <Bold>glucose + galactose</Bold> [1]. Both are monosaccharides that can be absorbed by the small intestine, so lactose-intolerant people can drink the milk without symptoms [1].</> },

    { id: "e13", diff: "easy", topic: "ferment", marks: 2, star: "★★★",
      q: "State two products made on an industrial scale in fermenters.",
      hint: "Drugs + food protein",
      a: <>Any two: <Bold>penicillin</Bold> (antibiotic) [1]; <Bold>insulin</Bold> (medicine for diabetes) [1]; <Bold>mycoprotein</Bold> (food / Quorn) [1]; <Bold>enzymes</Bold> for washing powders or food production [1]; <Bold>yoghurt</Bold> [1].</> },

    { id: "e14", diff: "easy", topic: "ferment", marks: 4, star: "★★★",
      q: "State four conditions that must be controlled in a fermenter for the production of penicillin.",
      hint: "Temp, pH, O₂, food, sterility",
      a: <>Any four: <Bold>temperature</Bold> (~26 °C — cooled because respiration releases heat) [1]; <Bold>pH</Bold> (slightly acidic, 5–6) [1]; <Bold>oxygen</Bold> (sterile air pumped in, mixture stirred) [1]; <Bold>nutrient supply</Bold> (sugar, amino acids, mineral salts) [1]; <Bold>sterile conditions</Bold> (no contaminating microbes) [1]; <Bold>waste removal</Bold> [1].</> },

    { id: "e15", diff: "easy", topic: "ferment", marks: 2, star: "★★★",
      q: "Explain why fermenters need a cooling jacket.",
      hint: "Respiration is exothermic",
      a: <>Microbial <Bold>respiration releases heat</Bold>; without cooling the mixture would overheat [1] and the enzymes / microbes would be denatured / killed, stopping production [1].</> },

    { id: "e16", diff: "easy", topic: "ferment", marks: 2, star: "★★★",
      q: "Explain why sterile conditions are essential during fermentation.",
      hint: "Contamination ruins yield",
      a: <>Any contaminating bacteria or fungi could grow alongside the wanted microbe, using up nutrients and producing unwanted substances [1], which would spoil the product or stop the wanted microbe growing [1].</> },

    { id: "e17", diff: "easy", topic: "gm", marks: 2, star: "★★★",
      q: "Define genetic modification.",
      hint: "Adding/removing/changing genes",
      a: <>Genetic modification is <Bold>changing the genetic material of an organism</Bold> by <Bold>removing, changing or inserting individual genes</Bold> [2].</> },

    { id: "e18", diff: "easy", topic: "gm", marks: 1, star: "★★★",
      q: "What is a plasmid?",
      hint: "Small + circular",
      a: <>A small <Bold>circular piece of DNA</Bold> found in the cytoplasm of bacteria, separate from the main chromosome [1].</> },

    { id: "e19", diff: "easy", topic: "gm", marks: 2, star: "★★★",
      q: "Name and state the role of the two enzymes used to make a recombinant plasmid.",
      hint: "Cut + paste",
      a: <><Bold>Restriction enzyme</Bold> — cuts the DNA at specific sites, leaving sticky ends [1]. <Bold>DNA ligase</Bold> — joins the sticky ends together to seal the inserted gene into the plasmid [1].</> },

    { id: "e20", diff: "easy", topic: "gm", marks: 3, star: "★★★",
      q: "Outline how genetically modified bacteria are used to produce insulin.",
      hint: "Gene → plasmid → bacterium → ferment",
      a: <>The human insulin <Bold>gene is cut out</Bold> of human DNA using a restriction enzyme [1]. The gene is <Bold>inserted into a bacterial plasmid</Bold> using DNA ligase, which is returned to a bacterium [1]. The bacterium is grown in a fermenter; it <Bold>expresses the gene</Bold> and produces human insulin, which is extracted and purified [1].</> },

    { id: "e21", diff: "easy", topic: "gmcrop", marks: 2, star: "★★★",
      q: "State two ways in which crops have been genetically modified.",
      hint: "Pests + herbicides + nutrition",
      a: <>Any two: <Bold>insect / pest resistance</Bold> (Bt toxin gene from Bacillus thuringiensis kills caterpillars) [1]; <Bold>herbicide resistance</Bold> (crops survive glyphosate spray) [1]; <Bold>improved nutritional quality</Bold> (e.g. Golden Rice with vitamin A) [1].</> },

    { id: "e22", diff: "easy", topic: "gmcrop", marks: 2, star: "★★★",
      q: "Explain how Golden Rice helps prevent blindness.",
      hint: "β-carotene → vitamin A",
      a: <>Golden Rice contains an inserted gene that makes the plant produce <Bold>β-carotene</Bold> (the yellow precursor of vitamin A) [1]. People who eat it convert β-carotene to vitamin A, preventing the vitamin A deficiency that causes blindness in over 100 million children worldwide [1].</> },

    { id: "e23", diff: "easy", topic: "gmcrop", marks: 3, star: "★★★",
      q: "State three advantages of GM crops.",
      hint: "Yield, pesticide, nutrition",
      a: <>Any three: <Bold>higher yields</Bold> [1]; <Bold>less pesticide use</Bold> (Bt crops make their own toxin) [1]; <Bold>better nutritional quality</Bold> (Golden Rice etc.) [1]; <Bold>only the target gene is transferred</Bold> (unlike cross-breeding) [1]; resistance to <Bold>drought, salt, or acid soils</Bold> can be added [1].</> },

    { id: "e24", diff: "easy", topic: "gmcrop", marks: 3, star: "★★★",
      q: "State three concerns about GM crops.",
      hint: "Wild plants, antibiotics, allergens",
      a: <>Any three: GM genes may <Bold>spread to wild plants</Bold> by pollination (e.g. herbicide-resistance creating "super-weeds") [1]; <Bold>antibiotic-resistance marker genes</Bold> could transfer to gut bacteria [1]; possible <Bold>allergens or toxins</Bold> in food [1]; long-term effects unknown [1]; <Bold>reduced biodiversity</Bold> [1]; small farmers dependent on big seed companies [1].</> },

    // ─────────────────── MEDIUM ───────────────────
    { id: "m1", diff: "medium", topic: "yeast", marks: 4, star: "★★★",
      q: "Describe the biology of how bread dough rises and what happens when it is baked.",
      hint: "Amylase → sugar → yeast → CO₂ → bubbles expand",
      a: <>Water activates the <Bold>amylase already in the flour</Bold>, which digests some starch to sugar [1]. The yeast respires this sugar anaerobically, producing <Bold>CO₂ and ethanol</Bold> [1]. The CO₂ bubbles are <Bold>trapped by the gluten protein network</Bold> in the dough, making it rise [1]. In the oven (~200 °C) the bubbles expand, the ethanol evaporates and the heat kills the yeast and sets the dough [1].</> },

    { id: "m2", diff: "medium", topic: "yeast", marks: 4, star: "★★",
      q: "Discuss the disadvantages of producing ethanol biofuel from sugar cane.",
      hint: "Energy cost + deforestation",
      a: <>The energy used to <Bold>grow, fertilise, harvest and transport the cane</Bold> plus the cost of extracting the sugar and converting it to ethanol can exceed the energy released by burning the ethanol [1]. <Bold>Forests are cleared</Bold> to plant the crops (soy, oil palm) [1], destroying habitats of thousands of species (e.g. orang-utan) [1]. The fuel is also <Bold>more expensive to produce</Bold> than petrol or diesel [1].</> },

    { id: "m3", diff: "medium", topic: "enzymes", marks: 5, star: "★★★",
      q: "(a) Describe how lactase can be used to produce lactose-free milk on a large scale by immobilising the enzyme. (b) State one advantage of immobilising the enzyme.",
      hint: "Beads → milk passes over → product",
      a: <>(a) Lactase is <Bold>fixed onto small beads</Bold> [1]; the milk is then <Bold>passed over the beads</Bold> [1]; the lactase on the bead surface breaks the lactose in the milk into <Bold>glucose and galactose</Bold> [1]; the milk leaves the column lactose-free [1]. (b) The enzyme molecules <Bold>stay on the beads</Bold> and are not lost in the milk, so the lactase can be re-used and the milk contains no enzyme [1]. <i>(Also accept: continuous process, no further purification needed.)</i></> },

    { id: "m4", diff: "medium", topic: "enzymes", marks: 4, star: "★★★",
      q: "Explain how a biological washing powder removes a protein stain on a shirt.",
      hint: "Protease → small soluble products",
      a: <>The powder contains a <Bold>protease enzyme</Bold> [1]. Proteins in the stain are large and insoluble, so they stick to the fibres [1]. The protease <Bold>digests the protein into amino acids</Bold> [1], which are <Bold>small and soluble</Bold>, so they dissolve in the water and wash out of the cloth [1].</> },

    { id: "m5", diff: "medium", topic: "ferment", marks: 5, star: "★★★", type: "labelling",
      q: "Sketch a fermenter used for penicillin production. Label five important features.",
      hint: "Tank · paddle · air in · cooling jacket · probe · outlet",
      a: <>Award 1 mark per labelled feature, up to 5: <Bold>sealed vessel</Bold> (often stainless steel) [1]; <Bold>paddles / stirrer</Bold> driven by motor at the top [1]; <Bold>sterile air inlet</Bold> (with filter) [1]; <Bold>cooling water jacket</Bold> with inlet and outlet [1]; <Bold>pH / temperature / O₂ probes</Bold> [1]; <Bold>nutrient feed pipe</Bold> [1]; <Bold>product outlet / tap</Bold> [1]; <Bold>exhaust gas vent</Bold> [1].</> },

    { id: "m6", diff: "medium", topic: "ferment", marks: 4, star: "★★",
      q: "Explain what mycoprotein is and why it has become a popular meat substitute.",
      hint: "Fungus + low fat + vegan",
      a: <>Mycoprotein is a <Bold>protein-rich food made from the fungus Fusarium venenatum</Bold> [1], grown on glucose in a large fermenter. It contains <Bold>no cholesterol</Bold> and is <Bold>low in saturated fat</Bold> [1], so it is healthier than meat. It is <Bold>suitable for vegetarian and vegan diets</Bold> [1] and gives a high protein yield per hectare compared with farming animals [1].</> },

    { id: "m7", diff: "medium", topic: "gm", marks: 6, star: "★★★", type: "labelling",
      q: "Describe the six main stages used to produce human insulin from genetically modified bacteria.",
      hint: "Isolate → cut → cut plasmid → ligase → bacteria → ferment",
      a: <><Bold>1</Bold> The <Bold>human insulin gene is identified and isolated</Bold> from human DNA [1]. <Bold>2</Bold> A <Bold>restriction enzyme</Bold> cuts the gene out, leaving sticky ends [1]. <Bold>3</Bold> A bacterial plasmid is cut open with the <Bold>same restriction enzyme</Bold> so the sticky ends match [1]. <Bold>4</Bold> The insulin gene is inserted and sealed in with <Bold>DNA ligase</Bold>, giving a recombinant plasmid [1]. <Bold>5</Bold> The plasmid is taken up by bacteria, which reproduce so each daughter cell carries the gene [1]. <Bold>6</Bold> Bacteria are grown in a <Bold>fermenter</Bold>, where they <Bold>express the gene</Bold> and produce insulin, which is extracted, purified and used to treat diabetes [1].</> },

    { id: "m8", diff: "medium", topic: "gm", marks: 4, star: "★★★",
      q: "Explain why the same restriction enzyme must be used to cut both the human DNA and the bacterial plasmid.",
      hint: "Sticky ends must match",
      a: <>Restriction enzymes cut DNA at <Bold>specific base sequences</Bold> [1], producing characteristic short single-stranded <Bold>sticky ends</Bold> [1]. Using the <Bold>same enzyme</Bold> on both produces sticky ends with <Bold>complementary bases</Bold> [1], so the human DNA can pair with the plasmid by base-pairing before DNA ligase seals the join [1].</> },

    { id: "m9", diff: "medium", topic: "gm", marks: 3, star: "★★★",
      q: "Explain what is meant by 'expression' of an inserted human gene in a bacterium.",
      hint: "Transcription + translation",
      a: <>The bacterium uses the inserted gene as a <Bold>template for transcription</Bold> [1] and then for <Bold>translation at its ribosomes</Bold>, making the protein coded for by the gene [1]. So the bacterium produces a <Bold>human protein</Bold> (such as insulin) from the human gene [1].</> },

    { id: "m10", diff: "medium", topic: "gm", marks: 4, star: "★★★",
      q: "Compare GM insulin with insulin extracted from pigs or cattle.",
      hint: "Purity, allergy, religion, supply",
      a: <>GM insulin is <Bold>purer</Bold> — it contains no traces of foreign animal protein, so it does not trigger allergic reactions [1]. It is <Bold>identical to human insulin</Bold>, so it is more effective [1]. It is <Bold>acceptable</Bold> to people whose religion forbids the use of pig or cow products [1]. It can be produced in <Bold>much larger quantities</Bold> from a fermenter culture than from slaughtered animals [1].</> },

    { id: "m11", diff: "medium", topic: "gmcrop", marks: 4, star: "★★★",
      q: "Explain how the Bt gene gives a crop plant protection against insect pests.",
      hint: "Bacterial toxin gene transferred into the plant",
      a: <>The bacterium <Bold>Bacillus thuringiensis</Bold> naturally produces a toxin that kills caterpillars and other insect larvae [1]. The gene for this toxin has been transferred (using a bacterial vector) into crops like maize, cotton and soybean [1]. The plant now produces the toxin in its own cells [1]. Insects that eat the plant <Bold>take in the toxin and die</Bold>, so the crop is protected without external spraying [1].</> },

    { id: "m12", diff: "medium", topic: "gmcrop", marks: 4, star: "★★★",
      q: "Explain why farmers find herbicide-resistant GM crops useful, and one possible drawback.",
      hint: "Easy weed control + cross-pollination risk",
      a: <>The herbicide (e.g. <Bold>glyphosate</Bold>) kills most green plants but the GM crop has an <Bold>enzyme that breaks the herbicide down</Bold>, so the crop survives [1]. Farmers can spray the whole field, removing all weeds in one application — quicker and using less herbicide overall [1]. Drawback: <Bold>pollen from the crop</Bold> may transfer the resistance gene to wild plants via pollination [1], producing herbicide-tolerant "<Bold>super-weeds</Bold>" that cannot be killed [1].</> },

    { id: "m13", diff: "medium", topic: "gmcrop", marks: 4, star: "★★★",
      q: "Describe three ways in which genetic modification could be used to solve worldwide nutritional deficiencies.",
      hint: "Vit A, iron, salt-tolerance",
      a: <>Any three of: <Bold>Golden Rice</Bold> with a β-carotene gene to provide vitamin A and prevent blindness [1]; <Bold>maize</Bold> with a gene that increases iron uptake, treating anaemia [1]; <Bold>cassava</Bold> with genes to boost protein and iron content, improving diet quality in Africa [1]; <Bold>wheat</Bold> with a gene to remove gluten, helping people with gluten allergy [1]; <Bold>vegetables</Bold> with a vitamin E gene to help fight heart disease [1].</> },

    { id: "m14", diff: "medium", topic: "gm", marks: 3, star: "★★",
      q: "Explain why plasmids are described as 'vectors' in genetic modification.",
      hint: "Carry foreign DNA into a cell",
      a: <>A vector is a <Bold>carrier of DNA</Bold> from one cell or organism into another [1]. Plasmids can pick up the inserted foreign gene (after restriction-enzyme cutting and ligase joining) [1] and <Bold>deliver it into the bacterial cell</Bold>, where it can be expressed [1]. (Viruses can also be used as vectors.)</> },

    { id: "m15", diff: "medium", topic: "gmcrop", marks: 3, star: "★★",
      q: "Suggest why governments in many countries require strict regulation before allowing the planting of GM crops.",
      hint: "Long-term, gene spread, food safety",
      a: <>Any three of: long-term effects of GM crops on the environment are <Bold>not yet known</Bold> [1]; modified genes may <Bold>spread to wild plants</Bold> via pollination [1]; possibility of new <Bold>allergens or toxins</Bold> in the food [1]; risk of <Bold>antibiotic-resistance genes</Bold> spreading from bacterial vectors [1]; <Bold>biodiversity</Bold> loss [1]; ethical concerns about transferring genes between species [1].</> },

    // ─────────────────── HARD ───────────────────
    { id: "h1", diff: "hard", topic: "gm", marks: 6, star: "★★★", ext: true, type: "labelling",
      q: "Annotate a flow diagram of insulin production from human gene to fermenter product. Mark in the function of the restriction enzyme, DNA ligase, and the plasmid, and explain what 'expression' means.",
      hint: "Stage-by-stage with enzyme roles",
      a: <>Marking points (max 6): (i) <Bold>restriction enzyme</Bold> cuts at a specific base sequence in both human DNA and plasmid, producing <Bold>complementary sticky ends</Bold> [1]; (ii) the cut insulin gene has bases that <Bold>pair</Bold> with the matching sticky ends of the opened plasmid [1]; (iii) <Bold>DNA ligase seals</Bold> the join between gene and plasmid, forming a recombinant plasmid [1]; (iv) plasmid acts as a <Bold>vector</Bold> — carries the foreign gene into the bacterial cell [1]; (v) bacterium <Bold>reproduces by mitosis</Bold>, copying the recombinant DNA [1]; (vi) <Bold>expression</Bold> = the bacterium transcribes and translates the human gene at its ribosomes, producing human insulin protein, which is extracted from the fermenter and purified [1].</> },

    { id: "h2", diff: "hard", topic: "ferment", marks: 5, star: "★★★",
      q: "Explain in detail why pH, temperature, oxygen and sterility must all be carefully controlled in a fermenter producing antibiotics.",
      hint: "Each affects enzyme activity / microbe growth",
      a: <><Bold>Temperature</Bold>: each microbe has an optimum (~26 °C for Penicillium); too cold and enzymes work slowly, too hot and they denature → no product [1]. Microbial respiration releases heat → fermenter must be cooled [1]. <Bold>pH</Bold>: enzymes work in a narrow pH window (5–6 for Penicillium); the wrong pH denatures enzymes → no product [1]. <Bold>Oxygen</Bold>: most industrial microbes respire aerobically — sterile air is pumped in and stirring distributes it; without enough O₂, anaerobic respiration takes over, slowing growth and yielding by-products like ethanol [1]. <Bold>Sterility</Bold>: any contaminating bacteria or fungi would compete for nutrients, produce different by-products, or contaminate the medicine — so all inputs and equipment must be sterilised [1].</> },

    { id: "h3", diff: "hard", topic: "gmcrop", marks: 6, star: "★★",
      q: "Construct a balanced argument for and against the wide use of GM crops in farming today.",
      hint: "Three pros + three cons",
      a: <><Bold>For</Bold> (any 3): higher yields → more food security [1]; pest-resistant crops (Bt) reduce pesticide use → less pollution + safer for farm workers [1]; vitamin-enriched crops (Golden Rice) can prevent malnutrition disorders [1]; salt- or drought-tolerant varieties allow farming on marginal land [1]; precise transfer of one gene avoids the random damage of cross-breeding [1]. <Bold>Against</Bold> (any 3): risk of <Bold>resistance genes spreading</Bold> to wild relatives (super-weeds) [1]; possible spread of <Bold>antibiotic-resistance marker</Bold> genes to gut bacteria [1]; possible allergens / toxins in food [1]; mainly benefits farmers in rich countries — small farmers become dependent on large biotech companies [1]; <Bold>reduces biodiversity</Bold> in agriculture [1]; long-term ecological effects unknown [1].</> },

    { id: "h4", diff: "hard", topic: "enzymes", marks: 5, star: "★★",
      q: "Describe the practical method you would use to investigate the effect of temperature on the volume of juice extracted from apple pulp using pectinase.",
      hint: "Variables · five steps",
      a: <>Set up several beakers each with the <Bold>same volume of apple pulp</Bold> (e.g. 100 cm³) and add the <Bold>same volume of pectinase</Bold> (e.g. 5 cm³ of 50 %) [1]. Place each at a different temperature (e.g. 10, 20, 30, 40, 50 °C) [1]. After 24 h, filter the mixture through filter paper into a measuring cylinder [1]. Record the <Bold>volume of clear juice</Bold> collected [1]. Plot juice volume against temperature; expect a peak at the optimum temperature for pectinase (around 30–40 °C). Control variables: pulp volume, enzyme volume + concentration, time, type of apple, particle size [1].</> },

    { id: "h5", diff: "hard", topic: "enzymes", marks: 4, star: "★★", type: "calc",
      q: "An experiment compared four washing-powder treatments on identical egg-stained cloths. Beaker A (water only) showed almost no stain removal; B (non-bio powder) removed about 30 % of the stain; C (bio powder at 40 °C) removed about 85 %; D (bio powder boiled first then cooled) removed about 35 %. (a) Explain why C cleaned best. (b) Explain why D cleaned no better than B.",
      hint: "Active enzymes vs denatured",
      a: <>(a) Beaker C contains <Bold>active protease and lipase</Bold> enzymes at 40 °C [1] that digest the protein and fat in the egg stain to small soluble molecules (amino acids, fatty acids, glycerol), which dissolve away [1]. (b) In beaker D the powder was <Bold>boiled</Bold>, so the enzymes were <Bold>denatured</Bold> — their active sites changed shape and no longer fit the substrate [1]. So D works only by the detergent's surfactant action — much like B (no enzymes) [1].</> },

    { id: "h6", diff: "hard", topic: "gm", marks: 5, star: "★★", ext: true,
      q: "Apart from making insulin, describe TWO further important applications of genetic modification used today.",
      hint: "Vaccine in plant · gene for pest resistance",
      a: <>Any two well-developed examples (~2½ marks each): (i) <Bold>Hepatitis B vaccine in yeast / banana</Bold> — the gene for the viral coat protein is inserted into yeast or transgenic banana plants; the protein produced acts as an antigen that triggers antibody production in those who eat / receive it; cheap oral vaccine for tropical countries [3]. (ii) <Bold>Bt maize / cotton</Bold> — gene from Bacillus thuringiensis inserted into the plant produces a toxin that kills caterpillars; reduces pesticide use; passed to plant's offspring; but caterpillars are developing resistance [2]. (Other accepted answers: transgenic rabies/cholera-vaccine plants; nitrogen-fixation genes in cereals; salt-tolerance in mangrove → crops.)</> },

    { id: "h7", diff: "hard", topic: "gmcrop", marks: 5, star: "★★", ext: true,
      q: "A field of Bt cotton next to a field of conventional cotton has noticeably fewer caterpillars. Explain why this is so, AND why after several years insect numbers may rise again.",
      hint: "Toxin in every cell · resistance evolves",
      a: <>The Bt gene from <Bold>Bacillus thuringiensis</Bold> is expressed in every cell of the cotton plant, so the plant <Bold>produces its own toxin</Bold> in every leaf [1]. Caterpillars eating the leaves are <Bold>killed by the toxin</Bold>, so far fewer survive [1]. Over years, however, any caterpillar with a <Bold>resistance allele</Bold> (e.g. an altered receptor in the gut) survives [1]. Those survivors reproduce and pass the allele to offspring — <Bold>natural selection</Bold> [1]. After many generations the population is largely resistant, and pest numbers rise to original levels — known as the <Bold>pesticide-resistance cascade</Bold> [1].</> },

    { id: "h8", diff: "hard", topic: "gm", marks: 4, star: "★★", ext: true,
      q: "Explain why scientists try to find ways to insert foreign genes WITHOUT using bacterial vectors carrying antibiotic-resistance marker genes.",
      hint: "Spread of antibiotic resistance",
      a: <>The marker gene is used to <Bold>select the bacteria that have taken up the new DNA</Bold> — only those with the marker survive when grown on a medium containing the antibiotic [1]. However, if the modified bacteria reach the gut, the antibiotic-resistance gene could <Bold>transfer to harmful gut bacteria</Bold> (by conjugation or plasmid transfer) [1]. Those bacteria would then become <Bold>resistant to that antibiotic</Bold> [1], reducing the effectiveness of medical treatment of infections — a serious public-health risk, so safer marker systems are being developed [1].</> },

    // ─────────────────── MCQ ─────────────────────
    { id: "mcq1", diff: "easy", topic: "bact", marks: 1, star: "★★★", type: "mcq",
      q: <>Bacteria are particularly useful in biotechnology because they:<br/>A. have a nucleus that stores DNA safely.<br/>B. reproduce rapidly and can make complex proteins.<br/>C. have no cell wall, so chemicals enter freely.<br/>D. carry out photosynthesis to produce sugars.</>,
      hint: "Speed of reproduction matters",
      a: <><Bold>B</Bold> — rapid binary fission (up to 3 times an hour) allows a single cell to become millions overnight, and they can express genes that make proteins like insulin [1].</> },

    { id: "mcq2", diff: "easy", topic: "yeast", marks: 1, star: "★★★", type: "mcq",
      q: <>In bread-making, the role of the yeast is to:<br/>A. produce ethanol that flavours the bread.<br/>B. produce carbon dioxide that makes the dough rise.<br/>C. break down gluten to give a smooth texture.<br/>D. denature amylase in the flour.</>,
      hint: "Bubbles in the dough",
      a: <><Bold>B</Bold> — yeast ferments sugar producing CO₂ bubbles trapped by gluten. The ethanol evaporates during baking [1].</> },

    { id: "mcq3", diff: "easy", topic: "enzymes", marks: 1, star: "★★★", type: "mcq",
      q: <>Lactase is used in industry to make lactose-free milk because it:<br/>A. converts lactose into glucose and galactose.<br/>B. removes lactose by precipitation.<br/>C. kills the bacteria that produce lactose.<br/>D. converts lactose into sucrose, which is sweeter.</>,
      hint: "Hydrolysis of a disaccharide",
      a: <><Bold>A</Bold> — lactose is a disaccharide; lactase hydrolyses it to two absorbable monosaccharides (glucose + galactose) [1].</> },

    { id: "mcq4", diff: "easy", topic: "enzymes", marks: 1, star: "★★★", type: "mcq",
      q: <>Biological washing powders work best at around 40 °C because at higher temperatures:<br/>A. the stains become insoluble.<br/>B. enzymes are denatured and lose their function.<br/>C. the dye on the cloth dissolves.<br/>D. detergent stops working.</>,
      hint: "Active site changes shape",
      a: <><Bold>B</Bold> — high heat denatures the protease and lipase, so the enzymes can no longer fit the protein or fat substrates [1].</> },

    { id: "mcq5", diff: "medium", topic: "ferment", marks: 1, star: "★★★", type: "mcq",
      q: <>Which is NOT a condition that must be carefully controlled in a fermenter?<br/>A. Light intensity.<br/>B. Temperature.<br/>C. pH.<br/>D. Sterility.</>,
      hint: "Most industrial microbes are not photosynthetic",
      a: <><Bold>A</Bold> — industrial fermenters use bacteria or fungi that do not photosynthesise, so light is irrelevant. Temperature, pH, oxygen, nutrients and sterility are the key controlled variables [1].</> },

    { id: "mcq6", diff: "medium", topic: "gm", marks: 1, star: "★★★", type: "mcq",
      q: <>In the production of recombinant plasmids, which enzyme JOINS the human DNA to the bacterial plasmid?<br/>A. Restriction enzyme.<br/>B. Amylase.<br/>C. DNA ligase.<br/>D. Lactase.</>,
      hint: "'Ligate' = to tie",
      a: <><Bold>C</Bold> — DNA ligase seals the sugar-phosphate backbone where matching sticky ends have base-paired. Restriction enzyme does the opposite (it cuts) [1].</> },

    { id: "mcq7", diff: "medium", topic: "gm", marks: 1, star: "★★★", type: "mcq",
      q: <>The function of a plasmid in genetic modification is to:<br/>A. provide energy for the bacterium.<br/>B. carry foreign DNA into a bacterial cell.<br/>C. translate the gene into a protein.<br/>D. destroy invading viruses.</>,
      hint: "A 'vector'",
      a: <><Bold>B</Bold> — a plasmid acts as a vector (carrier) that delivers the inserted gene into the bacterial cell, where it can then be expressed [1].</> },

    { id: "mcq8", diff: "medium", topic: "gmcrop", marks: 1, star: "★★", type: "mcq",
      q: <>Bt maize is protected from insect pests because:<br/>A. its leaves are too tough for caterpillars to bite.<br/>B. it produces a chemical that attracts pest predators.<br/>C. it produces a toxin in its tissues that kills insect larvae.<br/>D. its sap is too acidic for insects to digest.</>,
      hint: "Bacillus thuringiensis gene",
      a: <><Bold>C</Bold> — a gene from Bacillus thuringiensis lets the maize make a toxin that kills caterpillars that eat its tissues [1].</> },

    { id: "mcq9", diff: "hard", topic: "gm", marks: 1, star: "★★", type: "mcq", ext: true,
      q: <>Statements about restriction enzymes: (1) they cut DNA at specific base sequences; (2) they produce blunt ends only; (3) they are extracted from bacteria; (4) they join two DNA strands together. Which statements are correct?<br/>A. 1 and 3 only<br/>B. 2 and 4 only<br/>C. 1, 2 and 3 only<br/>D. 1, 3 and 4 only</>,
      hint: "Cut · sticky · from bacteria",
      a: <><Bold>A</Bold> — (1) and (3) are correct: they cut at specific recognition sequences and they come from bacteria. (2) is wrong — they typically leave SHORT single-stranded "sticky" ends, not blunt. (4) is wrong — DNA ligase joins strands; restriction enzymes only cut [1].</> },

    { id: "mcq10", diff: "hard", topic: "gmcrop", marks: 1, star: "★★", type: "mcq", ext: true,
      q: <>Which is the BEST reason for ensuring that GM crops cannot cross-pollinate with wild plants?<br/>A. Pollen could trigger allergies in farm workers.<br/>B. Wild plants could gain herbicide-resistance genes and become 'super-weeds'.<br/>C. The crop yield would fall.<br/>D. Crops would no longer be sweet-tasting.</>,
      hint: "Spread of resistance is the worry",
      a: <><Bold>B</Bold> — if a herbicide-resistance gene moved into a weed, that weed would survive blanket spraying, defeating the purpose of the GM trait and creating a worse weed problem [1].</> },

    { id: "mcq11", diff: "easy", topic: "gm", marks: 1, star: "★★★", type: "mcq",
      q: <>Which is the correct sequence for producing human insulin from GM bacteria?<br/>A. Cut plasmid → cut human gene → ligate → insert into bacterium → ferment.<br/>B. Insert into bacterium → cut human gene → ligate → cut plasmid → ferment.<br/>C. Ferment → cut human gene → ligate → cut plasmid → insert into bacterium.<br/>D. Cut plasmid → ferment → ligate → insert into bacterium → cut human gene.</>,
      hint: "Both cuts come before joining",
      a: <><Bold>A</Bold> — both pieces of DNA must be cut (with the same restriction enzyme) before they can be joined by ligase, before the recombinant plasmid is inserted into the bacterium and the bacteria are then cultured in a fermenter [1].</> },

    { id: "mcq12", diff: "medium", topic: "yeast", marks: 1, star: "★★★", type: "mcq",
      q: <>During bread-making, the dough is left at about 27 °C for an hour or two before baking. The main reason is to:<br/>A. activate amylase in the flour.<br/>B. denature gluten.<br/>C. allow yeast to respire sugar and produce CO₂.<br/>D. let salt dissolve.</>,
      hint: "Why 'proving' the dough",
      a: <><Bold>C</Bold> — at 27 °C the yeast respires actively, producing CO₂ that is trapped by the gluten network, doubling the dough volume. This is the proving / proofing step [1].</> },

    { id: "mcq13", diff: "easy", topic: "ferment", marks: 1, star: "★★★", type: "mcq",
      q: <>Mycoprotein is produced by:<br/>A. genetically modified bacteria.<br/>B. the fungus Fusarium venenatum in fermenters.<br/>C. boiling soya beans with glucose.<br/>D. yeast respiring lactose.</>,
      hint: "Fungus + Quorn",
      a: <><Bold>B</Bold> — Fusarium venenatum is a filamentous soil fungus that is fermented on glucose. The harvested mycelium becomes Quorn [1].</> },

    { id: "mcq14", diff: "medium", topic: "enzymes", marks: 1, star: "★★★", type: "mcq",
      q: <>Pectinase used to extract apple juice is most commonly obtained from:<br/>A. Aspergillus (a fungus).<br/>B. Lactobacillus (a bacterium).<br/>C. yeast.<br/>D. genetically modified rice.</>,
      hint: "Filamentous fungus",
      a: <><Bold>A</Bold> — pectinase is obtained from the fungus Aspergillus niger. It digests pectin between plant cell walls, releasing juice [1].</> },
  ];

  // Topic palette
  const topics = [
    { id: "all", label: "All topics", color: RD },
    { id: "bact", label: "Bacteria basics", color: "#2d6a4f" },
    { id: "yeast", label: "Yeast · biofuel · bread", color: "#b5540a" },
    { id: "enzymes", label: "Enzymes in industry", color: "#3a5fa8" },
    { id: "ferment", label: "Fermenters", color: "#1a7a6e" },
    { id: "gm", label: "Genetic modification", color: "#5b3fa6" },
    { id: "gmcrop", label: "GM crops", color: "#9b2c2c" },
  ];

  const diffs = [
    { id: "all",    label: "All",    color: RD,        bg: RL },
    { id: "easy",   label: "Easy",   color: "#1a7a3a", bg: "#e8f7ec" },
    { id: "medium", label: "Medium", color: "#b85c00", bg: "#fff4e6" },
    { id: "hard",   label: "Hard",   color: "#b02020", bg: "#fdf0f0" },
  ];

  const filtered = qs.filter(q =>
    (diff === "all" || q.diff === diff) &&
    (topic === "all" || q.topic === topic)
  );
  const totalMarks = filtered.reduce((s, q) => s + q.marks, 0);
  const revealedCount = filtered.filter(q => rev[q.id]).length;

  const dCount = id => id === "all" ? qs.length : qs.filter(q => q.diff === id).length;
  const tCount = id => id === "all" ? qs.length : qs.filter(q => q.topic === id).length;

  return (
    <div>
      {/* Header banner */}
      <div style={{ background: RL, border: `1px solid ${RD}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: RD, fontWeight: 600 }}>
        🎯 <Bold>Exam Practice — Infinite Test Bank</Bold> · filter by difficulty and topic
      </div>

      {/* Difficulty filter */}
      <div style={{ fontSize: 10, fontWeight: 700, color: "#888", letterSpacing: 1, marginBottom: 5 }}>DIFFICULTY</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {diffs.map(d => (
          <button key={d.id} onClick={() => setDiff(d.id)} style={{
            padding: "6px 12px", borderRadius: 6,
            border: diff === d.id ? `1.5px solid ${d.color}` : `1px solid ${BD}`,
            background: diff === d.id ? d.color : "#fff",
            color: diff === d.id ? "#fff" : d.color,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {d.label} ({dCount(d.id)})
          </button>
        ))}
      </div>

      {/* Topic filter */}
      <div style={{ fontSize: 10, fontWeight: 700, color: "#888", letterSpacing: 1, marginBottom: 5 }}>TOPIC</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {topics.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{
            padding: "6px 10px", borderRadius: 6,
            border: topic === t.id ? `1.5px solid ${t.color}` : `1px solid ${BD}`,
            background: topic === t.id ? t.color : "#fff",
            color: topic === t.id ? "#fff" : t.color,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {t.label} ({tCount(t.id)})
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>
        <span><Bold>{filtered.length}</Bold> questions · <Bold>{totalMarks}</Bold> marks · <Bold>{revealedCount}</Bold> revealed</span>
        <button onClick={() => setRev({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,
          borderRadius: 4, cursor: "pointer",
        }}>Hide all</button>
      </div>

      {/* Question cards */}
      {filtered.map(q => {
        const dInfo = diffs.find(d => d.id === q.diff);
        const tInfo = topics.find(t => t.id === q.topic);
        const isRev = rev[q.id];
        return (
          <div key={q.id} style={{
            background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${tInfo.color}`,
            borderRadius: 8, padding: "12px 14px", marginBottom: 10,
          }}>
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: dInfo.bg, color: dInfo.color, borderRadius: 3 }}>{dInfo.label.toUpperCase()}</span>
              <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: "#f5f5f3", color: tInfo.color, borderRadius: 3, border: `1px solid ${tInfo.color}33` }}>{tInfo.label}</span>
              {q.ext && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: PL, color: PU, borderRadius: 3 }}>EXT</span>}
              {q.type && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: "#eef", color: "#446", borderRadius: 3 }}>{q.type.toUpperCase()}</span>}
              <span style={{ fontSize: 10, color: "#b85c00", marginLeft: 2 }}>{q.star}</span>
              <span style={{ marginLeft: "auto", fontSize: 10, fontWeight: 700, color: GR,
                background: "#f5f5f3", padding: "2px 8px", borderRadius: 4 }}>{q.marks} marks</span>
            </div>

            <div style={{ fontSize: 12.5, lineHeight: 1.55, color: GR, marginBottom: 8 }}>
              <Bold>Q{q.id.toUpperCase()}.</Bold> {q.q}
            </div>

            {!isRev && q.hint && (
              <div style={{ fontSize: 11, color: "#888", fontStyle: "italic", marginBottom: 8 }}>
                💡 Hint: {q.hint}
              </div>
            )}

            <button onClick={() => toggle(q.id)} style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 700,
              background: isRev ? "#f5f5f3" : RD, color: isRev ? GR : "#fff",
              border: isRev ? `1px solid ${BD}` : "none", borderRadius: 4, cursor: "pointer",
            }}>
              {isRev ? "Hide answer" : "Show answer"}
            </button>

            {isRev && (
              <div style={{ marginTop: 10, padding: "10px 12px", background: RL,
                borderRadius: 6, fontSize: 12, lineHeight: 1.6, color: GR, border: `1px solid ${RD}33` }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: RD, marginBottom: 4 }}>MODEL ANSWER</div>
                {q.a}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Infinite test mode: <Bold>{qs.length}</Bold> questions loaded · filters applied
      </div>
    </div>
  );
}

// ③ SUMMARY TAB — concept flow & key tables
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const section = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${PU}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 14 };
  const h = { fontSize: 13, fontWeight: 800, color: PU, marginBottom: 10, letterSpacing: 0.3 };
  const td = { padding: "7px 9px", fontSize: 11.5, color: GR, border: `1px solid ${BD}` };
  const th = { padding: "7px 9px", fontSize: 11, fontWeight: 700, color: "#fff", background: PU, border: `1px solid ${PU}`, textAlign: "left" };

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: PU, fontWeight: 600 }}>
        📊 <Bold>Summary</Bold> · concept flow, comparison tables, and big-picture overview
      </div>

      {/* Key terms */}
      <div style={section}>
        <div style={h}>★ KEY TERMS — definitions you must know</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Term</th><th style={th}>Definition</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Biotechnology</Bold></td><td style={td}>The application of biological organisms, systems or processes to industry.</td></tr>
            <tr><td style={td}><Bold>Genetic modification</Bold></td><td style={td}>Changing the genetic material of an organism by removing, changing or inserting individual genes.</td></tr>
            <tr><td style={td}><Bold>Transgenic organism</Bold></td><td style={td}>Another name for a genetically modified organism — its DNA contains genes from a different species.</td></tr>
            <tr><td style={td}><Bold>Recombinant DNA</Bold></td><td style={td}>DNA combining genetic material from two different organisms (e.g. a plasmid + a human gene).</td></tr>
            <tr><td style={td}><Bold>Plasmid</Bold></td><td style={td}>Small circular piece of DNA in bacterial cytoplasm, separate from the chromosome.</td></tr>
            <tr><td style={td}><Bold>Restriction enzyme</Bold></td><td style={td}>Bacterial enzyme that cuts DNA at a specific base sequence, leaving sticky ends.</td></tr>
            <tr><td style={td}><Bold>Sticky end</Bold></td><td style={td}>A short single-stranded overhang produced when a restriction enzyme cuts DNA.</td></tr>
            <tr><td style={td}><Bold>DNA ligase</Bold></td><td style={td}>Enzyme that seals matching sticky ends, joining DNA fragments together.</td></tr>
            <tr><td style={td}><Bold>Recombinant plasmid</Bold></td><td style={td}>A plasmid that has had a foreign gene inserted into it.</td></tr>
            <tr><td style={td}><Bold>Vector</Bold></td><td style={td}>A carrier (plasmid or virus) that delivers a gene from one organism into another.</td></tr>
            <tr><td style={td}><Bold>Expression</Bold></td><td style={td}>Use of an inserted gene by a cell to make the protein that gene codes for.</td></tr>
            <tr><td style={td}><Bold>Fermenter</Bold></td><td style={td}>Sealed vessel in which microbes are grown under controlled conditions for industrial production.</td></tr>
            <tr><td style={td}><Bold>Lactose intolerance</Bold></td><td style={td}>Inability to digest lactose due to lack of the enzyme lactase.</td></tr>
            <tr><td style={td}><Bold>Mycoprotein</Bold></td><td style={td}>Protein-rich meat substitute made by growing the fungus Fusarium venenatum in fermenters.</td></tr>
            <tr><td style={td}><Bold>Bt toxin</Bold></td><td style={td}>Insect-killing protein originally made by Bacillus thuringiensis; the Bt gene is transferred into crops.</td></tr>
          </tbody>
        </table>
      </div>

      {/* Why bacteria */}
      <div style={section}>
        <div style={h}>★ WHY BACTERIA? — four reasons</div>
        <BacteriumSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={th}>Feature</th><th style={th}>Why it's useful</th></tr></thead>
          <tbody>
            <tr><td style={td}>Rapid reproduction</td><td style={td}>Up to 3 divisions per hour → millions of cells overnight; large yield from small starter culture.</td></tr>
            <tr><td style={td}>Universal genetic code</td><td style={td}>Genes from any organism (humans, plants) can be transcribed and translated in bacteria.</td></tr>
            <tr><td style={td}>Make complex molecules</td><td style={td}>Bacteria can be made to produce proteins (insulin), antibiotics, enzymes.</td></tr>
            <tr><td style={td}>No ethical concerns</td><td style={td}>Few people object to growing or genetically modifying bacteria.</td></tr>
            <tr><td style={td}>Plasmids</td><td style={td}>Small circular DNA — easy to cut, paste a new gene into, and return to a bacterium.</td></tr>
          </tbody>
        </table>
      </div>

      {/* Bread-making */}
      <div style={section}>
        <div style={h}>★ BREAD-MAKING — yeast fermentation step by step</div>
        <BreadMakingSVG />
        <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.65, marginTop: 6 }}>
          <Bold>Key idea:</Bold> in bread the wanted product is <KW c={PU}>CO₂</KW>, not ethanol. Amylase in the flour digests starch to sugar; yeast respires the sugar anaerobically → CO₂ + ethanol. Gluten (sticky protein in flour) traps the CO₂ as bubbles, making the dough rise. Baking at 200 °C expands the bubbles, evaporates the ethanol and kills the yeast.
        </div>
      </div>

      {/* Industrial fermenter */}
      <div style={section}>
        <div style={h}>★ INDUSTRIAL FERMENTER — six controlled conditions</div>
        <FermenterSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={th}>Condition</th><th style={th}>Detail</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Temperature</Bold></td><td style={td}>~26 °C for Penicillium. Microbes generate heat (respiration), so a <Bold>cooling water jacket</Bold> removes it.</td></tr>
            <tr><td style={td}><Bold>pH</Bold></td><td style={td}>Slightly acidic (5–6); enzymes have a narrow optimum window.</td></tr>
            <tr><td style={td}><Bold>Oxygen</Bold></td><td style={td}>Sterile air bubbled in; stirring paddles disperse it.</td></tr>
            <tr><td style={td}><Bold>Nutrients</Bold></td><td style={td}>Sugar (e.g. molasses, corn-steep liquor), amino acids, mineral salts.</td></tr>
            <tr><td style={td}><Bold>Sterility</Bold></td><td style={td}>All inputs and equipment sterilised — contaminants would ruin the culture.</td></tr>
            <tr><td style={td}><Bold>Waste removal</Bold></td><td style={td}>Spent medium, antibiotic-containing waste, exhaust gases extracted.</td></tr>
          </tbody>
        </table>
      </div>

      {/* Enzymes in industry */}
      <div style={section}>
        <div style={h}>★ ENZYMES IN INDUSTRY — what each one does</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Enzyme</th><th style={th}>Source</th><th style={th}>Use / product</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Amylase</Bold></td><td style={td}>Flour (natural)</td><td style={td}>Digests starch → sugar in bread dough.</td></tr>
            <tr><td style={td}><Bold>Pectinase</Bold></td><td style={td}>Fungi (Aspergillus)</td><td style={td}>Breaks down pectin → releases juice from apples; clearer + sweeter.</td></tr>
            <tr><td style={td}><Bold>Protease</Bold></td><td style={td}>Bacteria / fungi</td><td style={td}>Biological washing powder — digests protein stains (blood, egg).</td></tr>
            <tr><td style={td}><Bold>Lipase</Bold></td><td style={td}>Bacteria / fungi</td><td style={td}>Biological washing powder — digests fat / grease stains.</td></tr>
            <tr><td style={td}><Bold>Lactase</Bold></td><td style={td}>Yeast (Kluyveromyces) / fungi (Aspergillus)</td><td style={td}>Lactose-free milk — breaks lactose → glucose + galactose. Often immobilised on beads.</td></tr>
            <tr><td style={td}><Bold>Restriction enzyme</Bold></td><td style={td}>Bacteria</td><td style={td}>Cuts DNA at specific base sequences in genetic modification.</td></tr>
            <tr><td style={td}><Bold>DNA ligase</Bold></td><td style={td}>Bacteria</td><td style={td}>Joins matching sticky ends → recombinant plasmid.</td></tr>
          </tbody>
        </table>
      </div>

      {/* Lactose-free milk */}
      <div style={section}>
        <div style={h}>★ LACTOSE-FREE MILK — immobilised lactase</div>
        <LactaseBeadsSVG />
        <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.65, marginTop: 6 }}>
          Immobilising the lactase on beads means the enzyme <Bold>stays on the beads</Bold> rather than ending up in the milk. The treated milk is <Bold>continuously</Bold> produced as fresh milk flows over the bead column, and the enzyme can be <Bold>re-used many times</Bold>. Lactose intolerance is more common in adults from East Asian, sub-Saharan African and many Middle Eastern populations.
        </div>
      </div>

      {/* Pectinase */}
      <div style={section}>
        <div style={h}>★ PECTINASE — clearer, sweeter apple juice</div>
        <PectinaseSVG />
        <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.65, marginTop: 6 }}>
          Pectin acts as a "glue" between plant cells. Without pectinase, juice is trapped in the pulp and the released juice is cloudy. Pectinase breaks down pectin, so cells separate and clear, sweet juice flows out. (Sugars released from pectin add to the sweetness.)
        </div>
      </div>

      {/* Biological washing powder */}
      <div style={section}>
        <div style={h}>★ BIOLOGICAL WASHING POWDER — protease + lipase</div>
        <WashingPowderSVG />
      </div>

      {/* GM key flow */}
      <div style={section}>
        <div style={h}>★ GENETIC MODIFICATION — the insulin flow</div>
        <GeneticModSVG />
        <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.65, marginTop: 6 }}>
          The <KW c={PU}>same restriction enzyme</KW> is used to cut BOTH the human DNA AND the plasmid — that's what makes their sticky ends complementary so they can pair. <Bold>Ligase</Bold> then seals the join. Inside the bacterium the plasmid replicates with each cell division, so every daughter cell contains the gene. <KW c={PU}>Expression</KW> means the bacterium uses the gene to make human protein, which is harvested from the fermenter.
        </div>

      {/* GM crops */}

        <div style={h}>★ GM CROPS — three main applications</div>
        <GMCropsSVG />

      <div style={section}>
        <div style={h}>★ GM CROPS — advantages &amp; disadvantages <Ext/></div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Advantages</th><th style={th}>Disadvantages</th></tr></thead>
          <tbody>
            <tr>
              <td style={td}><Bold>Higher yields</Bold> — Bt crops lose less to pests; herbicide-tolerant crops face less weed competition.</td>
              <td style={td}>GM genes may <Bold>spread to wild relatives</Bold> through pollination → "super-weeds" with herbicide resistance.</td>

            <tr>
              <td style={td}><Bold>Less pesticide use</Bold> — plants make their own toxin (Bt); fewer sprayings → less pollution.</td>

            <tr>

            </tr>
            <tr>
              <td style={td}><Bold>Tolerance to harsh conditions</Bold> — drought, salt, acid soils → cultivable land expanded.</td>

        📚 <Bold>Textbook</Bold> · complete Hodder notes for Chapter 21
      </div>

      {/* 1. INTRODUCTION */}
      <div style={section}>
        <div style={h}>1 · Biotechnology &amp; the role of bacteria</div>

        <div style={sub}>1.1 Definitions</div>
        <p style={p}>
          <KW>Biotechnology</KW> is the application of living organisms, biological systems or biological processes to industries such as manufacturing, food production and medicine. <KW>Genetic modification</KW> is the transfer of one or more genes from one organism to another (usually unrelated) species, changing the recipient's genetic material.
        </p>
        <p style={p}>
          Both processes lean heavily on <Bold>bacteria</Bold>, because bacteria can make <Bold>complex molecules</Bold> (such as proteins) from cheap starting materials and they reproduce very rapidly.
        </p>

        <div style={sub}>1.2 Why bacteria are so useful</div>
        <p style={p}>
          Bacteria are useful in biotechnology and genetic modification for several reasons. They can be grown and manipulated <Bold>without ethical concerns</Bold>. They have a genetic code that is the <Bold>same as all other organisms</Bold>, so genes from animals or plants can be transferred into bacterial DNA and still work. They <Bold>reproduce extremely quickly</Bold> — sometimes up to three times an hour — so cultures grow large in a short time.
        </p>
        <p style={p}>
          Bacterial DNA is in the form of a <Bold>single circular chromosome</Bold> floating in the cytoplasm (there is no proper nucleus). In addition, bacteria contain small extra circular pieces of DNA called <KW>plasmids</KW>. Plasmids often carry genes for antibiotic resistance (e.g. against tetracycline, ampicillin). Scientists have developed techniques to <Bold>cut plasmids open</Bold> and insert sections of DNA from other organisms; once the plasmid is returned to a bacterium, the new gene is copied every time the bacterium divides. The plasmid may then carry, for example, the gene to make human insulin, which can be extracted and used to treat diabetes.
        </p>

      <div style={section}>
        <div style={h}>2 · Fermentation — biofuels, bread, juice, washing powder, milk</div>

        <p style={p}>
          Biotechnology is far older than it sounds. <Bold>Baking, brewing, wine-making and cheese</Bold> all rely on fermentation by yeasts, other fungi or bacteria — or by enzymes from these organisms. <Bold>Antibiotics</Bold> are produced by moulds (e.g. <i>Penicillium</i>) or bacteria. Industrial chemicals like <Bold>citric acid</Bold> and <Bold>lactic acid</Bold> are produced by microorganisms. Even <Bold>sewage treatment</Bold> uses bacteria as the base of the food chain that purifies the effluent.
        </p>

        <div style={sub}>2.1 Biofuels</div>
        <p style={p}>
          Microorganisms involved in fermentation are using a chemical reaction (anaerobic respiration of glucose) to release energy for their own life processes. <KW>Ethanol</KW> can be made by yeast fermenting sugar or spare grain, and used as a <Bold>renewable fuel</Bold>. Since 2013, 94 % of new cars in Brazil run on a petrol–ethanol mix. As well as being renewable, ethanol burns more cleanly than petrol. Vegetable oils from rapeseed or sunflower can be processed into <Bold>biodiesel</Bold>, replacing diesel — less polluting but more expensive.
        </p>
        <p style={p}>
          However, biofuels are <Bold>not yet economical</Bold>. The energy used to grow, fertilise, harvest and transport the crop (and to extract and convert the sugar) often exceeds the energy released when the fuel is burned. There are also <Bold>environmental costs</Bold>: forests are cleared to plant soya or oil palms, removing habitat for thousands of species, some of which (e.g. orang-utans) are nearing extinction.
        </p>

        <div style={{ background: GL, border: `1px solid ${G}`, borderLeft: `4px solid ${G}`,
          borderRadius: 6, padding: "10px 14px", marginTop: 6, marginBottom: 8, fontSize: 11.5, color: GR }}>
          <div style={{ fontWeight: 700, color: G, marginBottom: 4 }}>📋 Biofuel production — 4-step procedure</div>
          <div>1. Plant material is broken into small pieces and mixed with yeast.</div>
          <div>2. Yeast cells use the plant material as a substrate in anaerobic respiration, producing ethanol.</div>
          <div>3. The liquid is separated from the remaining solids and water is removed, leaving a <Bold>concentrated solution of ethanol</Bold>.</div>
          <div>4. The ethanol is blended with petrol, or used on its own as a fuel.</div>
          <div style={{ marginTop: 6, fontStyle: "italic", color: "#666" }}>
            ⚠ Concern: when crops are grown <Bold>specifically</Bold> to make biofuel (not just using waste plant parts), less land is available for local people to grow food crops needed for survival.
          </div>
        </div>

        <div style={sub}>2.2 Bread-making</div>
        <p style={p}>
          Yeast is the microorganism used in bread-making, and the only fermentation product needed is <Bold>carbon dioxide</Bold>. The dough is mixed from flour, water, salt, oil, sugar and yeast. Yeast cannot digest the starch in the flour itself, but adding water <Bold>activates the amylases</Bold> already present in the flour, which digest some of the starch to sugar. The yeast then ferments the sugar to <Bold>ethanol and CO₂</Bold>.
        </p>
        <p style={p}>
          A sticky, elastic protein in wheat flour called <KW>gluten</KW> gives the dough its texture and traps the CO₂ bubbles. The dough is kneaded (by hand or mechanically) and left at about <Bold>27 °C for an hour or two</Bold>; the yeast respires actively and the CO₂ bubbles build up, doubling the dough's volume. The dough is then placed in baking tins and baked at about <Bold>200 °C</Bold>. The heat expands the bubbles, evaporates the small amount of ethanol, and kills the yeast — leaving a light, airy loaf.
        </p>
        <BreadMakingSVG />

        <div style={sub}>2.3 Fruit juice (pectinase)</div>
        <p style={p}>
          <KW>Pectinases</KW> are enzymes that separate juice from fruit such as apples. They are extracted from fungi (e.g. <i>Aspergillus niger</i>) and work by breaking down <Bold>pectin</Bold>, the jelly-like substance that sticks plant cell walls together. Pectinases also make fruit juice <Bold>more transparent</Bold>, because various polysaccharides released during breakdown are also digested. The sugars produced make the juice <Bold>sweeter</Bold>.
        </p>
        <PectinaseSVG />

        <div style={sub}>2.4 Biological washing powders</div>
        <p style={p}>
          Most commercial enzyme production involves protein-digesting enzymes (<KW>proteases</KW>) and fat-digesting enzymes (<KW>lipases</KW>) used in the food and textile industries. When combined in washing powders they <Bold>remove stains from clothes</Bold> caused by proteins (e.g. blood or egg) and fats (e.g. grease and oil). Protein and fat molecules are large and insoluble. When digested they become small, soluble molecules (amino acids; fatty acids and glycerol) that can pass out of the cloth.
        </p>
        <p style={p}>
          Biological washing powders <Bold>save energy</Bold>, because they wash effectively at <Bold>lower temperatures</Bold> — there is no need to boil water. However, if used in water that is <Bold>too hot</Bold>, the enzymes become <Bold>denatured</Bold> and are no longer effective.
        </p>
        <WashingPowderSVG />

        <div style={sub}>2.5 Lactose-free milk (lactase)</div>
        <p style={p}>
          <KW>Lactose</KW> is a disaccharide sugar found in milk and dairy products. People with <KW>lactose intolerance</KW> do not produce enough of the enzyme <Bold>lactase</Bold>, so undigested lactose stays in the gut, where bacteria ferment it. This causes wind, diarrhoea and stomach pains. Many foods contain dairy products, so lactose-intolerant people either avoid them or suffer these symptoms.
        </p>
        <p style={p}>
          Lactase can be produced on a large scale by fermenting yeasts (e.g. <i>Kluyveromyces fragilis</i>) or fungi (e.g. <i>Aspergillus niger</i>). The simplest way to make lactose-free milk is to <Bold>add lactase to the milk</Bold>: the enzyme breaks lactose into <Bold>glucose and galactose</Bold>, both monosaccharides that can be absorbed by the intestine.
        </p>
        <p style={p}>
          A better large-scale method is to <Bold>immobilise the lactase on the surface of beads</Bold>. Milk is passed over the beads; the lactose is broken down on contact, and the enzyme molecules <Bold>stay on the beads</Bold> instead of entering the milk. This makes a clean, continuous process — and the lactase can be re-used.
        </p>
        <LactaseBeadsSVG />
      </div>

      {/* 3. FERMENTERS */}
      <div style={section}>
        <div style={h}>3 · Fermenters — controlled tanks for industrial culture</div>

        <div style={sub}>3.1 Why use a fermenter?</div>
        <p style={p}>
          Fermenters are giant sealed vessels — up to <Bold>100 000 L in capacity</Bold> — used to culture microorganisms on a huge scale and harvest their products. Penicillin, insulin, mycoprotein and many enzymes are all produced in this way. The tank is filled with a <KW>nutrient solution</KW>; a culture of the appropriate microbe is added; conditions are controlled, and after 24–48 h the wanted product is extracted from the broth.
        </p>
        <FermenterSVG />

        <div style={sub}>3.2 Insulin production</div>
        <p style={p}>
          Insulin can be produced in large quantities by genetically modified bacteria growing in fermenters. The bacteria respire aerobically, so <Bold>air is pumped into the fermenter</Bold>. Other conditions (nutrient levels, temperature, pH, moisture) are kept at the optimum so the bacteria grow and reproduce rapidly. The nutrients are then reduced, which triggers the bacteria to <Bold>produce the insulin</Bold>, which is extracted from the culture and purified.
        </p>

        <div style={sub}>3.3 Penicillin</div>
        <p style={p}>
          Antibiotics are produced in giant fermenting tanks up to 100 000 L. For penicillin production the carbohydrate source is sugar, mainly lactose or <Bold>corn-steep liquor</Bold> (a by-product of cornflour and maize starch manufacture, containing amino acids as well as sugars). Mineral salts are added and the pH adjusted to <Bold>between 5 and 6</Bold>. The temperature is held at about <Bold>26 °C</Bold>; air is blown through the liquid and it is stirred. A culture of <i>Penicillium</i> is added and allowed to grow for 24 to 48 hours. <Bold>Sterile conditions are essential</Bold> — any contaminating bacteria or fungi would spoil the process. As the nutrient supply reduces, the mould begins to <Bold>secrete penicillin into the medium</Bold>. The nutrient fluid is then filtered off and the antibiotic extracted by crystallisation or other methods.
        </p>
        <div style={{ background: "#fff8e6", border: `1px solid ${AM}`, borderLeft: `4px solid ${AM}`,
          borderRadius: 6, padding: "8px 12px", marginTop: 4, marginBottom: 8, fontSize: 11.5, color: GR }}>
          <Bold style={{ color: AM }}>How penicillin kills bacteria:</Bold> penicillin <Bold>interferes with the building of the bacterial cell wall</Bold>. When the bacterium tries to grow or divide, the weakened wall cannot withstand internal pressure, and the cell <Bold>ruptures and dies</Bold>. This is why penicillin only kills <Bold>growing</Bold> bacteria.
        </div>

        <div style={sub}>3.4 Mycoprotein</div>
        <p style={p}>
          <KW>Mycoprotein</KW> is a protein-rich meat substitute extracted from a fungus — the filamentous <i>Fusarium venenatum</i>, found naturally in soil. Mycoprotein contains <Bold>no cholesterol</Bold> and is lower in saturated fat than meat. It is suitable for vegan diets (no animal products), partly because of its high protein content. It is fermented in a similar way to antibiotics and enzymes, using <Bold>glucose and salts</Bold> as the feedstock. One commercial mycoprotein product is <Bold>Quorn</Bold>.
        </p>

        <div style={sub}>3.5 Conditions to control — summary</div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 5 }}>
          <thead><tr>
            <th style={{ background: GL, color: G, padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5, textAlign: "left" }}>Condition</th>
            <th style={{ background: GL, color: G, padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5, textAlign: "left" }}>Detail</th>
          </tr></thead>
          <tbody>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>Temperature</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>Around 26 °C. Heat is released during fermentation, so the mixture is <Bold>cooled</Bold>.</td></tr>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>pH</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>Slightly acidic (5–6).</td></tr>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>Oxygen</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>Sterilised air is pumped into the mixture and stirred to aerate it.</td></tr>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>Nutrient supply</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>Depends on product; for penicillin the feedstock is molasses or corn-steep liquor.</td></tr>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>Waste products</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>Spent nutrient fluid with bacterial residue (hazardous if traces of antibiotic). Gases include CO₂.</td></tr>
            <tr><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}><Bold>Sterility</Bold></td><td style={{ padding: "6px 9px", border: `1px solid ${BD}`, fontSize: 11.5 }}>All inputs and equipment sterilised to prevent contamination.</td></tr>
          </tbody>
