<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#2d6a4f" />
<title>Biology · NLCS Jeju</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjE4IiBmaWxsPSIjMmQ2YTRmIi8+PHRleHQgeD0iNTAiIHk9IjY1IiBmb250LXNpemU9IjU1IiBmb250LWZhbWlseT0iLWFwcGxlLXN5c3RlbSIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QjwvdGV4dD48L3N2Zz4=" />

<script>
  (function() {
    try {
      var saved = localStorage.getItem('nlcs-bio-theme');
      if (saved === null || saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    } catch(e) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #2d6a4f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    transition: background 0.3s;
  }
  body {
    color: #fff;
    background: linear-gradient(180deg, #2d6a4f 0%, #1a4631 100%);
    background-attachment: fixed;
  }

  /* Dark mode for cover - even darker greens */
  html.dark body {
    background: linear-gradient(180deg, #0f3a26 0%, #051a10 100%);
    background-attachment: fixed;
  }

  .cover {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 30px) 24px max(env(safe-area-inset-bottom), 30px);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
  }
  .cover::before {
    content: ""; position: absolute;
    top: -150px; right: -150px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: rgba(82, 183, 136, 0.15);
    pointer-events: none;
  }
  .cover::after {
    content: ""; position: absolute;
    bottom: -200px; left: -150px;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.04);
    pointer-events: none;
  }
  .cover-top { display: flex; justify-content: space-between; align-items: flex-start; z-index: 1; }
  .school strong { display: block; font-weight: 600; margin-bottom: 4px; letter-spacing: 2.5px; font-size: 11px; }
  .school span { font-size: 10px; letter-spacing: 1.5px; opacity: 0.7; }
  .badge { border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 16px; padding: 4px 12px; font-size: 10px; letter-spacing: 1px; opacity: 0.8; }
  .cover-center { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 1; gap: 24px; }
  .icon-circle { width: 96px; height: 96px; border-radius: 50%; background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.2); display: flex; align-items: center; justify-content: center; }
  .icon-circle svg { width: 48px; height: 48px; stroke: #fff; stroke-width: 1.5; fill: none; }
  .title { font-size: 56px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
  .subtitle { font-size: 15px; opacity: 0.85; font-weight: 400; letter-spacing: 0.3px; }
  .divider { width: 32px; height: 1px; background: rgba(255, 255, 255, 0.4); margin: 4px 0; }
  .meta { font-size: 11px; opacity: 0.6; letter-spacing: 1px; text-transform: uppercase; }
  .cover-bottom { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 1; transition: transform 0.3s ease; }
  .cover:hover .cover-bottom { transform: translateY(-4px); }
  .enter-pill { display: flex; align-items: center; gap: 10px; padding: 14px 28px; background: rgba(255, 255, 255, 0.95); color: #2d6a4f; border-radius: 999px; font-size: 14px; font-weight: 600; letter-spacing: 0.3px; transition: all 0.2s; }
  html.dark .enter-pill { background: rgba(232, 232, 232, 0.95); color: #0f3a26; }
  .cover:hover .enter-pill { background: #fff; transform: scale(1.03); }
  .enter-pill .arrow { display: inline-block; transition: transform 0.2s; }
  .cover:hover .enter-pill .arrow { transform: translateX(3px); }
  .footer-meta { display: flex; justify-content: space-between; width: 100%; max-width: 320px; font-size: 10px; opacity: 0.5; letter-spacing: 0.8px; }

  /* Theme toggle button */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.25);
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  .theme-toggle:hover { transform: scale(1.08); background: rgba(255, 255, 255, 0.22); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #fff; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  html.dark .theme-toggle svg { stroke: #f3d488; }
  html.dark .theme-toggle .icon-sun { display: block; }
  html.dark .theme-toggle .icon-moon { display: none; }

  @media (max-width: 480px) {
    .title { font-size: 44px; }
    .icon-circle { width: 80px; height: 80px; }
    .icon-circle svg { width: 40px; height: 40px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
</button>

<a href="contents.html" class="cover">
  <div class="cover-top">
    <div class="school">
      <strong>NLCS JEJU</strong>
      <span>Cambridge IGCSE</span>
    </div>
    <div class="badge">v2026.05</div>
  </div>

  <div class="cover-center">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 21c0-6 4-10 10-10c-4 4-4 8-10 10z" />
        <path d="M5 21c5-1 8-4 9-9" />
        <path d="M9 13c0-3 2-5 5-5" />
      </svg>
    </div>
    <div class="title">Biology</div>
    <div class="divider"></div>
    <div class="subtitle">Cambridge IGCSE · Hodder edition</div>
    <div class="meta">Extended · Paper 1, 4, 6</div>
  </div>

  <div class="cover-bottom">
    <div class="enter-pill">
      <span>Enter library</span>
      <span class="arrow">→</span>
    </div>
    <div class="footer-meta">
      <span>4 chapters</span>
      <span>NLCS JEJU 2026</span>
    </div>
  </div>
</a>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      var isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('nlcs-bio-theme', isDark ? 'dark' : 'light'); } catch(e) {}
    });
  })();
</script>

</body>
</html>
