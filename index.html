<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#2d6a4f" />
<title>Biology · NLCS Jeju</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgcng9IjE4IiBmaWxsPSIjMmQ2YTRmIi8+PHRleHQgeD0iNTAiIHk9IjY1IiBmb250LXNpemU9IjU1IiBmb250LWZhbWlseT0iLWFwcGxlLXN5c3RlbSIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iI2ZmZiIgdGV4dC1hbmNob3I9Im1pZGRsZSI+QjwvdGV4dD48L3N2Zz4=" />

<script>
  (function() {
    try {
      var saved = localStorage.getItem('nlcs-bio-theme');
      if (saved === null || saved === 'dark') {
        document.documentElement.classList.add('dark');
      }
    } catch(e) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    transition: background 0.3s;
  }
  html { background: #2d6a4f; }
  html.dark { background: #051a10; }

  body {
    color: #fff;
    background: linear-gradient(160deg, #2d6a4f 0%, #1a4631 60%, #0f3a26 100%);
    background-attachment: fixed;
  }
  html.dark body {
    background:
      radial-gradient(circle at 80% 10%, rgba(182, 255, 60, 0.08) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(93, 202, 165, 0.05) 0%, transparent 50%),
      linear-gradient(160deg, #0f3a26 0%, #051a10 100%);
    background-attachment: fixed;
  }

  /* ─── Cover layout ────────────────────────────────────────────────────── */
  .cover {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 30px) 24px max(env(safe-area-inset-bottom), 30px);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
  }

  /* Decorative orbs */
  .cover::before {
    content: ""; position: absolute;
    top: -180px; right: -180px;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: rgba(82, 183, 136, 0.18);
    pointer-events: none;
    filter: blur(20px);
  }
  html.dark .cover::before { background: rgba(182, 255, 60, 0.10); filter: blur(30px); }
  .cover::after {
    content: ""; position: absolute;
    bottom: -220px; left: -180px;
    width: 560px; height: 560px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.05);
    pointer-events: none;
    filter: blur(20px);
  }
  html.dark .cover::after { background: rgba(93, 202, 165, 0.08); filter: blur(30px); }

  /* ─── Top bar ─────────────────────────────────────────────────────────── */
  .cover-top { display: flex; justify-content: space-between; align-items: flex-start; z-index: 2; }
  .school strong {
    display: block; font-weight: 700; margin-bottom: 5px;
    letter-spacing: 3px; font-size: 11px;
  }
  .school span { font-size: 10px; letter-spacing: 1.8px; opacity: 0.7; }
  .badge {
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 999px;
    padding: 5px 14px; font-size: 10px;
    letter-spacing: 1.2px; opacity: 0.85;
    font-weight: 600;
  }
  html.dark .badge {
    border-color: rgba(182, 255, 60, 0.35);
    color: #b6ff3c;
    background: rgba(182, 255, 60, 0.05);
  }

  /* ─── Center hero ─────────────────────────────────────────────────────── */
  .cover-center {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; z-index: 2; gap: 22px;
  }
  .icon-circle {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.22);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all 0.3s;
  }
  html.dark .icon-circle {
    background: rgba(182, 255, 60, 0.08);
    border-color: rgba(182, 255, 60, 0.3);
    box-shadow: 0 0 30px rgba(182, 255, 60, 0.15);
  }
  .icon-circle svg { width: 50px; height: 50px; stroke: #fff; stroke-width: 1.5; fill: none; }
  html.dark .icon-circle svg { stroke: #b6ff3c; }
  .cover:hover .icon-circle { transform: scale(1.05); }

  .title {
    font-size: 62px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
    -webkit-text-stroke: 0.5px #fff;
  }
  html.dark .title {
    color: #b6ff3c;
    -webkit-text-stroke: 0.5px #b6ff3c;
    text-shadow:
      0 0 10px rgba(182, 255, 60, 0.9),
      0 0 20px rgba(182, 255, 60, 0.6),
      0 0 40px rgba(182, 255, 60, 0.4);
  }
  .subtitle { font-size: 15px; opacity: 0.9; font-weight: 500; letter-spacing: 0.3px; }
  .divider {
    width: 40px; height: 1px;
    background: rgba(255, 255, 255, 0.4);
    margin: 2px 0;
  }
  html.dark .divider { background: rgba(182, 255, 60, 0.5); }
  .meta { font-size: 11px; opacity: 0.65; letter-spacing: 1.2px; text-transform: uppercase; font-weight: 600; }

  /* ─── Bottom enter pill ───────────────────────────────────────────────── */
  .cover-bottom {
    display: flex; flex-direction: column;
    align-items: center; gap: 22px; z-index: 2;
    transition: transform 0.3s ease;
  }
  .cover:hover .cover-bottom { transform: translateY(-4px); }
  .enter-pill {
    display: flex; align-items: center; gap: 12px;
    padding: 15px 30px;
    background: rgba(255, 255, 255, 0.95);
    color: #2d6a4f;
    border-radius: 999px;
    font-size: 14px; font-weight: 700;
    letter-spacing: 0.4px;
    transition: all 0.2s;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
  }
  html.dark .enter-pill {
    background: #b6ff3c;
    color: #0a1a05;
    box-shadow:
      0 0 24px rgba(182, 255, 60, 0.5),
      0 8px 24px rgba(0, 0, 0, 0.3);
  }
  .cover:hover .enter-pill { background: #fff; transform: scale(1.04); }
  html.dark .cover:hover .enter-pill {
    background: #d4ff5e;
    box-shadow:
      0 0 32px rgba(182, 255, 60, 0.7),
      0 10px 28px rgba(0, 0, 0, 0.3);
  }
  .enter-pill .arrow { display: inline-block; transition: transform 0.2s; font-size: 16px; }
  .cover:hover .enter-pill .arrow { transform: translateX(4px); }

  .footer-meta {
    display: flex; justify-content: space-between;
    width: 100%; max-width: 340px;
    font-size: 10px; opacity: 0.55;
    letter-spacing: 1px; font-weight: 500;
  }

  /* ─── Theme toggle ────────────────────────────────────────────────────── */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.25);
    cursor: pointer; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
  }
  html.dark .theme-toggle {
    background: rgba(182, 255, 60, 0.08);
    border-color: rgba(182, 255, 60, 0.3);
  }
  .theme-toggle:hover { transform: scale(1.08); background: rgba(255, 255, 255, 0.22); }
  html.dark .theme-toggle:hover { background: rgba(182, 255, 60, 0.15); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #fff; }
  html.dark .theme-toggle svg { stroke: #b6ff3c; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  html.dark .theme-toggle .icon-sun { display: block; }
  html.dark .theme-toggle .icon-moon { display: none; }

  @media (max-width: 480px) {
    .title { font-size: 48px; }
    .icon-circle { width: 84px; height: 84px; }
    .icon-circle svg { width: 42px; height: 42px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
</button>

<a href="contents.html" class="cover">
  <div class="cover-top">
    <div class="school">
      <strong>NLCS JEJU</strong>
      <span>Cambridge IGCSE</span>
    </div>
    <div class="badge">v2026.05</div>
  </div>

  <div class="cover-center">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 21c0-6 4-10 10-10c-4 4-4 8-10 10z" />
        <path d="M5 21c5-1 8-4 9-9" />
        <path d="M9 13c0-3 2-5 5-5" />
      </svg>
    </div>
    <div class="title">Biology</div>
    <div class="divider"></div>
    <div class="subtitle">Cambridge IGCSE · Hodder edition</div>
    <div class="meta">Extended · Paper 1, 4, 6</div>
  </div>

  <div class="cover-bottom">
    <div class="enter-pill">
      <span>Enter library</span>
      <span class="arrow">→</span>
    </div>
    <div class="footer-meta">
      <span>21 chapters</span>
      <span>NLCS JEJU 2026</span>
    </div>
  </div>
</a>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      e.preventDefault();
      var isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('nlcs-bio-theme', isDark ? 'dark' : 'light'); } catch(e) {}
    });
  })();
</script>

</body>
</html>
