    { src: "SME", cat: "Sexual", front: "9 / 54 — Advantages of sexual reproduction for wild populations &amp; crops. (EXT)", back: <span>Produces <KW c={PU}>genetic variation</KW>:<br/>• Wild populations can <Bold>adapt</Bold> to changes in environment.<br/>• Not all crop plants will be <Bold>equally susceptible</Bold> to pests &amp; disease — some may be resistant. (EXT)</span> },
    { src: "SME", cat: "Sexual", front: "10 / 54 — Disadvantages of sexual reproduction for wild populations &amp; crops. (EXT)", back: <span>Offspring are different from parents, so:<br/>• Some wild offspring may be <KW c={RD}>less well-suited</KW> to the environment.<br/>• <Bold>Desirable traits</Bold> of a crop may not be present in seed-grown offspring. (EXT)</span> },
    { src: "SME", cat: "Plants", front: "11 / 54 — Identify A–D in the insect-pollinated flower diagram. (Picture card)", back: <span>From the SME flower diagram:<br/>• A = <KW c={TL}>ANTHER</KW> (red, at filament tip).<br/>• B = <KW c={TL}>STYLE</KW> (yellow tube from ovary).<br/>• C = <KW c={TL}>STIGMA</KW> (blue, top of style).<br/>• D = <KW c={TL}>OVARY</KW> (blue, swollen base).</span> },
    { src: "SME", cat: "Plants", front: "12 / 54 — True or False? Petals of insect-pollinated flowers tend to be brightly coloured.", back: <span><Bold>TRUE.</Bold> Petals of insect-pollinated flowers are typically <KW c={TL}>brightly coloured</KW> to <Bold>attract pollinating insects</Bold>.</span> },
    { src: "SME", cat: "Plants", front: "13 / 54 — What is the role of the ANTHERS?", back: <span>Anthers <KW c={TL}>produce and release pollen</KW>.</span> },
    { src: "SME", cat: "Plants", front: "14 / 54 — Identify X &amp; Y in the wind-pollinated flower diagram. (Picture card)", back: <span>From the SME wind-pollinated flower diagram:<br/>• X = <KW c={TL}>ANTHER</KW> (hanging on a long filament OUTSIDE the flower).<br/>• Y = <KW c={TL}>STIGMA</KW> (feathery, hanging out).</span> },
    { src: "SME", cat: "Plants", front: "15 / 54 — True or False? Pollen of insect-pollinated flowers is smaller &amp; lighter than that of wind-pollinated flowers.", back: <span><Bold>FALSE.</Bold> It is the OPPOSITE: insect-pollinated flowers produce <KW c={TL}>large, sticky</KW> pollen grains, while wind-pollinated flowers produce <KW c={TL}>small, light</KW> pollen grains.</span> },
    { src: "SME", cat: "Definitions", front: "16 / 54 — Define POLLINATION.", back: <span>The transfer of <KW c={TL}>pollen from the anther to the stigma</KW> of a flower.</span> },
    { src: "SME", cat: "Plants", front: "17 / 54 — Describe fertilisation in plants.", back: <span>Fertilisation in plants is the <KW c={TL}>fusion of a pollen nucleus with an ovule nucleus</KW>.</span> },
    { src: "SME", cat: "Plants", front: "18 / 54 — How are the STIGMAS of insect-pollinated flowers adapted?", back: <span>They are <KW c={TL}>STICKY</KW> — this allows them to collect pollen grains from the <Bold>bodies of visiting insects</Bold>.</span> },
    { src: "SME", cat: "Plants", front: "19 / 54 — How are ANTHERS adapted in WIND-pollinated plants?", back: <span>Anthers swing on <KW c={TL}>LONG FILAMENTS</KW> that hang <Bold>OUTSIDE</Bold> the flower. This lets the wind catch the pollen grains and disperse them easily.</span> },
    { src: "SME", cat: "Germination", front: "20 / 54 — True or False? Seed germination requires water, oxygen and cold temperatures.", back: <span><Bold>FALSE.</Bold> Germination requires <KW c={TL}>WATER, OXYGEN and WARMTH</KW> — NOT cold. Warmth is needed for suitable enzyme activity (low temperatures slow enzymes too much).</span> },
    { src: "SME", cat: "Plants", front: "21 / 54 — What is SELF-POLLINATION? (EXT)", back: <span>Pollen is transferred from the anther of a flower to:<br/>• the <KW c={PU}>stigma of the SAME flower</KW>, OR<br/>• the stigma of <KW c={PU}>another flower on the SAME plant</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Plants", front: "22 / 54 — What is CROSS-POLLINATION? (EXT)", back: <span>Pollen is transferred from the anther of a flower to the stigma of a flower on a <KW c={PU}>DIFFERENT plant of the same species</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Plants", front: "23 / 54 — True or False? Self-pollination reduces ability to respond to environmental change. (EXT)", back: <span><Bold>TRUE.</Bold> Self-pollinated offspring are <KW c={PU}>less genetically diverse</KW> (though not clones) → <Bold>reduced ability</Bold> to respond to environmental change. (Extended Tier)</span> },
    { src: "SME", cat: "Plants", front: "24 / 54 — Describe how fertilisation occurs in plants. (EXT)", back: <span>1. A <KW c={PU}>pollen tube grows down the style</KW> towards the ovary.<br/>2. Pollen nuclei <Bold>travel down the pollen tube</Bold> to the ovary.<br/>3. A pollen nucleus <Bold>fuses with an ovule nucleus</Bold> in the ovary. (Extended Tier)</span> },
    { src: "SME", cat: "Human", front: "25 / 54 — Identify A–D in the male reproductive system diagram. (Picture card)", back: <span>From the SME male system diagram:<br/>• A = <KW c={TL}>URETHRA</KW><br/>• B = <KW c={TL}>PENIS</KW><br/>• C = <KW c={TL}>SPERM DUCT</KW><br/>• D = <KW c={TL}>TESTES (TESTIS)</KW></span> },
    { src: "SME", cat: "Human", front: "26 / 54 — Identify A–D in the female reproductive system diagram. (Picture card)", back: <span>From the SME female system diagram:<br/>• A = <KW c={TL}>OVIDUCT</KW><br/>• B = <KW c={TL}>OVARY</KW><br/>• C = <KW c={TL}>CERVIX</KW><br/>• D = <KW c={TL}>VAGINA</KW></span> },
    { src: "SME", cat: "Human", front: "27 / 54 — What is the function of the TESTES?", back: <span>The testes <KW c={TL}>produce SPERM</KW> cells. They also secrete the hormone <Bold>TESTOSTERONE</Bold>, essential for development of male reproductive organs and secondary sexual characteristics.</span> },
    { src: "SME", cat: "Human", front: "28 / 54 — True or False? The prostate gland secretes a fluid that nourishes and protects sperm.", back: <span><Bold>TRUE.</Bold> The prostate produces a fluid that contributes to <KW c={TL}>SEMEN VOLUME</KW>. It contains <Bold>enzymes and nutrients</Bold> for sperm motility, and substances that help <Bold>neutralise the acidity</Bold> of the female tract.</span> },
    { src: "SME", cat: "Human", front: "29 / 54 — What is the role of the CERVIX?", back: <span>The cervix is a <KW c={TL}>ring of muscle</KW> between the vagina and uterus. It <Bold>holds the fetus inside the uterus</Bold> during pregnancy, and <Bold>DILATES during birth</Bold> to let the baby pass through.</span> },
    { src: "SME", cat: "Human", front: "30 / 54 — What is the role of the UTERUS?", back: <span>The uterus is where the <KW c={TL}>developing embryo IMPLANTS and develops</KW> during pregnancy.</span> },
    { src: "SME", cat: "Human", front: "31 / 54 — What is fertilisation in human reproduction?", back: <span>The <KW c={TL}>fusion of the nuclei of an egg and a sperm cell</KW>.</span> },
    { src: "SME", cat: "Human", front: "32 / 54 — Adaptive features of SPERM cells.", back: <span>• <KW c={TL}>Flagellum (tail)</KW> for swimming.<br/>• <Bold>Many mitochondria</Bold> to release energy for swimming.<br/>• <Bold>Enzymes in the acrosome</Bold> for entry into the egg cell.</span> },
    { src: "SME", cat: "Human", front: "33 / 54 — Adaptive features of EGG cells.", back: <span>• <KW c={TL}>Energy stores</KW> within the cytoplasm.<br/>• <Bold>Jelly coat</Bold> that <Bold>changes at fertilisation</Bold> to allow entry of a SINGLE sperm cell only.</span> },
    { src: "SME", cat: "Human", front: "34 / 54 — True or False? Egg cells are larger, fewer and MORE MOTILE than sperm cells.", back: <span><Bold>FALSE.</Bold> Egg cells ARE larger and fewer than sperm cells, but they are <KW c={RD}>NOT motile</KW> — they cannot move by themselves.</span> },
    { src: "SME", cat: "Definitions", front: "35 / 54 — Define the term EMBRYO.", back: <span>A <KW c={TL}>ball of cells</KW> that develops from the <Bold>zygote</Bold>.</span> },
    { src: "SME", cat: "Placenta", front: "36 / 54 — Identify A–D in the diagram of the fetus in the uterus. (Picture card)", back: <span>From the SME fetus diagram:<br/>• A = <KW c={TL}>PLACENTA</KW><br/>• B = <KW c={TL}>AMNIOTIC SAC</KW><br/>• C = <KW c={TL}>UMBILICAL CORD</KW><br/>• D = <KW c={TL}>AMNIOTIC FLUID</KW></span> },
    { src: "SME", cat: "Placenta", front: "37 / 54 — What is the function of the PLACENTA? (EXT)", back: <span>Allows <KW c={PU}>exchange of substances</KW> between mother's and fetus's blood. Exchanged substances include:<br/>• <Bold>Dissolved nutrients</Bold> (glucose, amino acids).<br/>• <Bold>Gases</Bold> (O₂, CO₂).<br/>• <Bold>Excretory products</Bold> (urea). (Extended Tier)</span> },
    { src: "SME", cat: "Placenta", front: "38 / 54 — True or False? Pathogens cannot cross the placenta but some toxins can. (EXT)", back: <span><Bold>FALSE.</Bold> <KW c={RD}>BOTH pathogens AND toxins</KW> can cross the placenta (e.g. rubella virus, HIV; nicotine, alcohol). This is why pregnant women avoid smoking, drinking, and contact with infections. (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "39 / 54 — What are SECONDARY SEXUAL CHARACTERISTICS?", back: <span>Features that are <KW c={TL}>NOT present at birth</KW>, but develop during <Bold>PUBERTY</Bold>.</span> },
    { src: "SME", cat: "Hormones", front: "40 / 54 — Which two hormones control secondary sexual characteristics?", back: <span>• <KW c={TL}>OESTROGEN</KW> — in females.<br/>• <KW c={TL}>TESTOSTERONE</KW> — in males.</span> },
    { src: "SME", cat: "Hormones", front: "41 / 54 — Examples of FEMALE secondary sexual characteristics.", back: <span>• <KW c={TL}>Breast development</KW>.<br/>• <Bold>Growth of body hair</Bold>.<br/>• <Bold>Widening of hips</Bold>.<br/>• <Bold>Menstruation</Bold> begins.<br/>• <Bold>Growth of sex organs</Bold>.</span> },
    { src: "SME", cat: "Hormones", front: "42 / 54 — Examples of MALE secondary sexual characteristics.", back: <span>• <KW c={TL}>Growth of sex organs</KW>.<br/>• <Bold>Growth of facial &amp; body hair</Bold>.<br/>• <Bold>Voice "breaking"</Bold> (deepens).<br/>• <Bold>Sperm production</Bold> begins.</span> },
    { src: "SME", cat: "Hormones", front: "43 / 54 — What is the MENSTRUAL CYCLE?", back: <span>The sequence of events including:<br/>• <KW c={TL}>thickening of the uterus lining</KW><br/>• <Bold>ovulation</Bold><br/>• <Bold>menstruation</Bold><br/>It is controlled by a series of <Bold>hormones</Bold>.</span> },
    { src: "SME", cat: "Definitions", front: "44 / 54 — Define OVULATION.", back: <span>The <KW c={TL}>release of an egg cell from the ovaries</KW> during the menstrual cycle (around day 14).</span> },
    { src: "SME", cat: "Hormones", front: "45 / 54 — Where are OESTROGEN and PROGESTERONE secreted from? (EXT)", back: <span>Both are secreted by the <KW c={PU}>OVARIES</KW>:<br/>• <Bold>Oestrogen</Bold> — from the <Bold>developing follicle</Bold>.<br/>• <Bold>Progesterone</Bold> — from the empty follicle (the <Bold>CORPUS LUTEUM</Bold>). (Extended Tier)</span> },
    { src: "SME", cat: "Hormones", front: "46 / 54 — Role of FSH in the menstrual cycle? (EXT)", back: <span>FSH:<br/>• Causes an egg to <KW c={PU}>start MATURING</KW> in the ovary.<br/>• <Bold>Stimulates the ovaries to start releasing oestrogen</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Hormones", front: "47 / 54 — True or False? LH causes egg cells to mature in the ovaries. (EXT)", back: <span><Bold>FALSE.</Bold> LH causes <KW c={PU}>OVULATION</KW> (release of the mature egg) — NOT maturation. It is <Bold>FSH</Bold> that causes an egg cell to begin to mature. (Extended Tier)</span> },
    { src: "SME", cat: "Hormones", front: "48 / 54 — Role of OESTROGEN in the menstrual cycle? (EXT)", back: <span>Oestrogen:<br/>• Causes the <KW c={PU}>UTERUS LINING TO THICKEN</KW> during the first part of the cycle.<br/>• Interacts with other hormones to bring about <Bold>maturation of an egg cell</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Hormones", front: "49 / 54 — True or False? An INCREASE in progesterone causes loss of the uterus lining. (EXT)", back: <span><Bold>FALSE.</Bold> It is a <KW c={PU}>DECREASE in progesterone</KW> levels at the end of the cycle that causes the lining to break down (= menstruation). (Extended Tier)</span> },
    { src: "SME", cat: "Definitions", front: "50 / 54 — Define SEXUALLY TRANSMITTED INFECTION (STI).", back: <span>An infection that is <KW c={TL}>transmitted through sexual contact</KW>.</span> },
    { src: "SME", cat: "STIs", front: "51 / 54 — What is HIV?", back: <span>HIV (<KW c={TL}>Human Immunodeficiency Virus</KW>) is a <Bold>pathogen that causes an STI</Bold>.</span> },
    { src: "SME", cat: "STIs", front: "52 / 54 — True or False? HIV is the same as AIDS.", back: <span><Bold>FALSE.</Bold> HIV is the <KW c={TL}>PATHOGEN (virus)</KW>; infection with HIV can eventually lead to the <Bold>DISEASE called AIDS</Bold> — they are not the same thing.</span> },
    { src: "SME", cat: "STIs", front: "53 / 54 — How is HIV transmitted?", back: <span>HIV is transmitted via <KW c={TL}>BODY FLUIDS</KW>, e.g.:<br/>• <Bold>Sexual intercourse</Bold>.<br/>• <Bold>Contaminated blood</Bold>.<br/>• <Bold>Sharing needles</Bold>.<br/>• <Bold>Across the placenta</Bold> (mother → fetus).</span> },
    { src: "SME", cat: "STIs", front: "54 / 54 — How can the spread of STIs be controlled?", back: <span>• <KW c={TL}>Use of CONDOMS</KW>.<br/>• <Bold>Testing for HIV</Bold> so infected individuals do not unknowingly pass it on.<br/>• <Bold>Education</Bold> about transmission and prevention.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Definitions & key terms (12 cards) — teacher-curated
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Definitions", front: "Define the term ASEXUAL REPRODUCTION.", back: <span>A process resulting in the production of <KW c={TL}>genetically identical offspring</KW> from <Bold>one parent</Bold>. No gametes are involved.</span> },
    { src: "SME", cat: "Definitions", front: "Define the term SEXUAL REPRODUCTION.", back: <span>A process involving the <KW c={TL}>fusion of the nuclei of two gametes</KW> to form a <Bold>zygote</Bold>, producing offspring that are <Bold>genetically different</Bold> from each other.</span> },
    { src: "SME", cat: "Definitions", front: "Define POLLINATION.", back: <span>The transfer of <KW c={TL}>pollen grains from an anther to a stigma</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define FERTILISATION (in plants).", back: <span>The <KW c={TL}>fusion of a pollen nucleus with the nucleus in an ovule</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define FERTILISATION (in humans).", back: <span>The fusion of the nuclei from a <KW c={TL}>male gamete (sperm) and a female gamete (egg cell)</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define SELF-POLLINATION.", back: <span>The transfer of pollen grains from the anther of a flower to the stigma of the <KW c={TL}>same flower, or a different flower on the same plant</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define CROSS-POLLINATION.", back: <span>The transfer of pollen grains from the anther of a flower to the stigma of a flower on a <KW c={TL}>different plant of the same species</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define GERMINATION.", back: <span>The process of <KW c={TL}>development of a young plant from a seed</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define a SEXUALLY TRANSMITTED INFECTION (STI).", back: <span>An infection that is <KW c={TL}>transmitted through sexual contact</KW>.</span> },
    { src: "SME", cat: "Definitions", front: "Define a ZYGOTE.", back: <span>The <KW c={TL}>single cell</KW> formed after fertilisation, when the nuclei of two gametes have fused. It will grow into an embryo.</span> },
    { src: "SME", cat: "Definitions", front: "What is a GAMETE?", back: <span>A <KW c={TL}>sex cell</KW>. In humans: sperm (♂) and egg / ovum (♀). In flowering plants: nucleus in a pollen grain (♂) and egg cell in an ovule (♀).</span> },
    { src: "SME", cat: "Definitions", front: "Define HAPLOID and DIPLOID. (EXT)", back: <span><KW c={PU}>Haploid</KW> = nucleus with a SINGLE set of chromosomes (e.g. gametes; 23 in humans).<br/><KW c={PU}>Diploid</KW> = nucleus with TWO sets of chromosomes (e.g. body cells, zygote; 46 in humans). (Extended Tier)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Asexual reproduction (4 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Asexual", front: "Name two ADVANTAGES of asexual reproduction.", back: <span>Any 2 of:<br/>1. No <KW c={TL}>mate</KW> needed.<br/>2. Fast — <Bold>quick population growth</Bold>.<br/>3. All good characteristics of the parent are passed on.<br/>4. Uniform crops produced.</span> },
    { src: "SME", cat: "Asexual", front: "Name two DISADVANTAGES of asexual reproduction.", back: <span>1. <KW c={RD}>Little variation</KW> → poor adaptation to a changing environment.<br/>2. <KW c={RD}>Whole population vulnerable</KW> to the same disease (no individual is resistant).</span> },
    { src: "SME", cat: "Asexual", front: "Name three methods by which a flowering plant can reproduce asexually.", back: <span>Any 3 of: <KW c={TL}>stolons (runners)</KW> · <Bold>rhizomes</Bold> · <Bold>bulbs</Bold> · <Bold>corms</Bold> · <Bold>stem tubers</Bold> · <Bold>cuttings</Bold> · <Bold>tissue culture</Bold>.</span> },
    { src: "SME", cat: "Asexual", front: "What is TISSUE CULTURE? (EXT)", back: <span>An <KW c={PU}>artificial method of asexual propagation</KW> where small pieces of plant tissue are stimulated to divide on a nutrient agar with growth hormones, forming a callus → develops into a complete plant. Produces <Bold>large numbers of disease-free clones</Bold> from a single parent. (Extended)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Sexual reproduction (advantages/disadvantages) (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Sexual", front: "Name two ADVANTAGES of sexual reproduction.", back: <span>1. <KW c={TL}>Variation in offspring</KW> → better adaptation to a changing environment / new diseases.<br/>2. New <Bold>varieties</Bold> can be created (e.g. by selective breeding).</span> },
    { src: "SME", cat: "Sexual", front: "Name two DISADVANTAGES of sexual reproduction.", back: <span>1. <KW c={RD}>Two parents</KW> usually needed → mate must be found.<br/>2. Growth of a new individual from a seed/zygote is <KW c={RD}>slow</KW>.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Plant reproduction (8 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Plants", front: "Name and state the function of the MALE parts of a flower.", back: <span>The <KW c={TL}>STAMEN</KW> = anther + filament.<br/>• Anther — contains pollen sacs that produce <Bold>pollen grains</Bold> (containing the male gamete).<br/>• Filament — supports the anther.</span> },
    { src: "SME", cat: "Plants", front: "Name and state the function of the FEMALE parts of a flower.", back: <span>The <KW c={TL}>CARPEL</KW> = stigma + style + ovary.<br/>• <Bold>Stigma</Bold> — sticky surface; receives pollen.<br/>• <Bold>Style</Bold> — links stigma to ovary; pollen tube grows down it.<br/>• <Bold>Ovary</Bold> — contains <Bold>ovules</Bold> (each has a female gamete = egg cell).</span> },
    { src: "SME", cat: "Plants", front: "State 3 features of an INSECT-pollinated flower.", back: <span>Any 3 of:<br/>1. <KW c={TL}>Large, brightly coloured, scented</KW> petals.<br/>2. <Bold>Nectar</Bold> present.<br/>3. Anthers <Bold>inside</Bold> the flower.<br/>4. Stigma small, sticky, inside.<br/>5. <Bold>Small amount</Bold> of sticky/spiky pollen.</span> },
    { src: "SME", cat: "Plants", front: "State 3 features of a WIND-pollinated flower.", back: <span>Any 3 of:<br/>1. Petals <KW c={TL}>small or absent</KW>; green, with bracts.<br/>2. No nectar.<br/>3. Anthers <Bold>hang OUTSIDE</Bold> on long filaments.<br/>4. Stigma is <Bold>large and feathery</Bold>, hanging outside.<br/>5. <Bold>HUGE amounts</Bold> of smooth, light pollen.</span> },
    { src: "SME", cat: "Plants", front: "Describe how fertilisation occurs in a flowering plant.", back: <span>1. A pollen grain on the stigma absorbs liquid and grows a <KW c={TL}>pollen tube</KW> down the style.<br/>2. The tube enters the ovule via the <Bold>micropyle</Bold>.<br/>3. The <Bold>male nucleus</Bold> travels down the tube and <Bold>FUSES</Bold> with the female nucleus.<br/>4. Forms a <Bold>zygote</Bold> → seed; the ovary → fruit.</span> },
    { src: "SME", cat: "Plants", front: "State which part of a flower becomes the SEED.", back: <span>The <KW c={TL}>OVULE</KW> becomes the seed after fertilisation.</span> },
    { src: "SME", cat: "Plants", front: "State which part of a flower becomes the FRUIT.", back: <span>The <KW c={TL}>OVARY</KW> becomes the fruit after fertilisation.</span> },
    { src: "SME", cat: "Plants", front: "What is the effect of self-pollination versus cross-pollination on a population?", back: <span><Bold>Self:</Bold> <KW c={RD}>limited variation</KW> → poor adaptation to change; but works without pollinators (avoids extinction).<br/><Bold>Cross:</Bold> <KW c={TL}>variation introduced</KW> → better adaptation, more disease resistance; but depends on pollinators.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Germination (3 cards, mostly EXT)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Germination", front: "State the three conditions needed for germination. (EXT)", back: <span><KW c={PU}>1. Water</KW> · <KW c={PU}>2. Oxygen</KW> · <KW c={PU}>3. Suitable temperature</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Germination", front: "Why is WATER needed for germination? (EXT)", back: <span><KW c={PU}>Activates enzymes</KW>; converts stored starch to soluble sugar; transports sugar to growing regions; expands vacuoles to push out root and shoot; maintains turgor. (EXT)</span> },
    { src: "SME", cat: "Germination", front: "Why is OXYGEN needed for germination? (EXT)", back: <span>For <KW c={PU}>aerobic respiration</KW>. This releases the energy (ATP) needed to activate food reserves and make new cytoplasm and cell walls in the growing seedling. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Human reproduction (7 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Human", front: "State the function of the OVARIES.", back: <span>Female gonads that <KW c={TL}>produce ova (eggs)</KW> and the female hormone <Bold>oestrogen</Bold>.</span> },
    { src: "SME", cat: "Human", front: "State the function of the OVIDUCT (fallopian tube).", back: <span>Carries the <KW c={TL}>ovum from the ovary to the uterus</KW>. It is the <Bold>SITE OF FERTILISATION</Bold>. Cilia in its lining propel the ovum along.</span> },
    { src: "SME", cat: "Human", front: "State the function of the UTERUS.", back: <span>The site where the <KW c={TL}>fetus develops</KW> during pregnancy. Its lining (endometrium) thickens monthly to receive a potential embryo.</span> },
    { src: "SME", cat: "Human", front: "State the function of the TESTES.", back: <span>Male gonads that produce <KW c={TL}>sperm</KW> and the male hormone <Bold>testosterone</Bold>. Held in the scrotum to stay slightly cooler than body temperature.</span> },
    { src: "SME", cat: "Human", front: "State the function of the PROSTATE GLAND.", back: <span>Adds <KW c={TL}>fluid and nutrients</KW> to sperm to form <Bold>semen</Bold>.</span> },
    { src: "SME", cat: "Human", front: "State 2 features of a SPERM cell that adapt it to its function.", back: <span>Any 2 of:<br/>1. <KW c={TL}>Flagellum (tail)</KW> for swimming.<br/>2. <Bold>Many mitochondria</Bold> in mid-piece → ATP energy.<br/>3. <Bold>Acrosome</Bold> with enzymes to digest egg coat.<br/>4. Small/streamlined for movement.</span> },
    { src: "SME", cat: "Human", front: "State 2 features of an EGG CELL that adapt it to its function.", back: <span>1. Large amount of <KW c={TL}>yolk / fat droplets</KW> in cytoplasm → energy stores for the early embryo.<br/>2. <Bold>Jelly coat</Bold> that prevents more than one sperm from entering after fertilisation.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Pregnancy / placenta (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Placenta", front: "State the functions of the PLACENTA and UMBILICAL CORD.", back: <span><Bold>Placenta:</Bold> exchange of substances between mother and fetus by <KW c={TL}>diffusion</KW> (without mixing blood). Supplies O₂, glucose, amino acids, ions; removes CO₂, urea. Also makes progesterone in late pregnancy.<br/><Bold>Umbilical cord:</Bold> connects fetus to placenta. Vein → fetus (O₂); arteries → placenta (CO₂, urea).</span> },
    { src: "SME", cat: "Placenta", front: "State what pathogens / toxins CAN cross the placenta.", back: <span>Some pathogens and toxins are NOT blocked by the placenta:<br/>• <KW c={RD}>Rubella virus</KW> (German measles) → birth defects.<br/>• <KW c={RD}>HIV</KW> → baby may be born HIV+.<br/>• <KW c={RD}>Nicotine, alcohol, drugs</KW> → harm the fetus.<br/>This is why pregnant women should not smoke or drink.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — Hormones / menstrual cycle (EXT) (3 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Hormones", front: "What are the roles of TESTOSTERONE and OESTROGEN during puberty?", back: <span><Bold>Testosterone</Bold> (testes): develops <KW c={TL}>male secondary sexual characteristics</KW> — deeper voice, facial/body hair, larger testes, sperm production.<br/><Bold>Oestrogen</Bold> (ovaries): develops <KW c={TL}>female secondary sexual characteristics</KW> — breast growth, wider hips, body hair, larger uterus.</span> },
    { src: "SME", cat: "Hormones", front: "Where are OESTROGEN and PROGESTERONE produced? (EXT)", back: <span><Bold>Oestrogen</Bold> — by the <KW c={PU}>ovary</KW> (developing follicle).<br/><Bold>Progesterone</Bold> — by the <KW c={PU}>corpus luteum</KW> in the ovary (and by the placenta during pregnancy). Both are <Bold>endocrine glands</Bold>. (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "Outline the four hormones of the menstrual cycle. (EXT)", back: <span>1. <KW c={PU}>FSH</KW> (pituitary) — stimulates egg/follicle to mature.<br/>2. <KW c={PU}>Oestrogen</KW> (ovary) — thickens uterus lining.<br/>3. <KW c={PU}>LH</KW> (pituitary) — peaks ~day 14 → triggers <Bold>ovulation</Bold>.<br/>4. <KW c={PU}>Progesterone</KW> (corpus luteum) — MAINTAINS lining; falls if no implantation → menstruation. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME-style — STIs (3 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "STIs", front: "What may HIV cause?", back: <span>HIV may eventually cause <KW c={TL}>AIDS</KW> (Acquired Immune Deficiency Syndrome). HIV attacks <Bold>lymphocytes</Bold>, so the immune system can no longer fight off other infections.</span> },
    { src: "SME", cat: "STIs", front: "State three ways HIV can be transmitted.", back: <span>Any 3 of:<br/>1. <KW c={TL}>Unprotected sex</KW> with an infected person.<br/>2. <Bold>Shared needles</Bold> among drug users (contaminated blood).<br/>3. <Bold>Mother to baby</Bold> — across placenta, during birth, or via breastmilk.<br/>4. Blood products (e.g. unscreened transfusions).</span> },
    { src: "SME", cat: "STIs", front: "State two ways the spread of STIs can be controlled.", back: <span>Any 2 of:<br/>1. Use of a <KW c={TL}>condom / femidom</KW> — barrier method.<br/>2. <Bold>Faithfulness</Bold> to one uninfected partner / avoid intercourse with someone who might be infected.<br/>3. <Bold>Early treatment</Bold> of infected individuals AND their sexual contacts.<br/>4. Don't share needles.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Asexual / bacteria-specific content (4 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Asexual", front: "Describe BINARY FISSION in bacteria. (SME diagram)", back: <span>Asexual reproduction in bacteria:<br/>1. Parent cell contains a <KW c={TL}>circular chromosome</KW>.<br/>2. <Bold>Cell contents double</Bold>; DNA replicates.<br/>3. <Bold>Cell divides by binary fission</Bold>.<br/>4. Two <KW c={TL}>genetically identical daughter cells</KW> form. Produces exact genetic copies → clones.</span> },
    { src: "SME", cat: "Asexual", front: "What is a BULB and how is it used in asexual reproduction? (SME)", back: <span>A bulb is a <KW c={TL}>short stem with leaves (or remains of leaves)</KW> that acts as a <Bold>food storage organ</Bold>. A <Bold>lateral bud</Bold> inside the parent bulb develops into a new plant in the following year, genetically identical to the parent.</span> },
    { src: "SME", cat: "Asexual", front: "What is a TUBER and how does it reproduce a new plant? (SME)", back: <span>A tuber is a <KW c={TL}>swollen, fleshy underground stem</KW> (e.g. potato). It contains stored food. <Bold>Buds form on the tuber</Bold> ("eyes" on a potato) → each bud can grow into a new shoot using the stored starch, producing a genetically identical plant.</span> },
    { src: "SME", cat: "Asexual", front: "What is a RUNNER (stolon) and how does it produce new plants? (SME)", back: <span>A runner is a <KW c={TL}>horizontal side-shoot</KW> growing from the parent plant (e.g. strawberry). Tiny <Bold>plantlets</Bold> form along the runner; at each node they grow <Bold>roots</Bold> and develop into <Bold>separate, genetically identical plants</Bold>.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Asexual reproduction in CROP plants (EXT, 4 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Asexual", front: "State THREE ADVANTAGES of asexual reproduction in CROP PLANTS. (EXT)", back: <span>Any 3 of:<br/>1. Crops with <KW c={PU}>desired characteristics</KW> (high yield, disease-resistant, drought-resistant) preserved.<br/>2. <Bold>Uniform characteristics</Bold> — important for commercial sale.<br/>3. <Bold>Production is faster</Bold> than from seed.<br/>4. <Bold>Cheaper</Bold> than buying seeds. (EXT)</span> },
    { src: "SME", cat: "Asexual", front: "State THREE DISADVANTAGES of asexual reproduction in CROP PLANTS. (EXT)", back: <span>Any 3 of:<br/>1. <KW c={RD}>Cannot adapt</KW> to climate change (no variation).<br/>2. Requires <Bold>human input and management</Bold>.<br/>3. If the parent is <Bold>diseased</Bold>, ALL offspring will be diseased.<br/>4. Disease/pest outbreak can cause <Bold>big financial losses</Bold>. (EXT)</span> },
    { src: "SME", cat: "Asexual", front: "State THREE ADVANTAGES of asexual reproduction in WILD species. (EXT)", back: <span>Any 3 of:<br/>1. <KW c={PU}>Rapid population growth</KW>.<br/>2. Can <Bold>exploit suitable environments quickly</Bold>.<br/>3. More <Bold>time- and energy-efficient</Bold> (no mate-finding).<br/>4. Reproduction is <Bold>faster</Bold> than sexual. (EXT)</span> },
    { src: "SME", cat: "Asexual", front: "State THREE DISADVANTAGES of asexual reproduction in WILD species. (EXT)", back: <span>Any 3 of:<br/>1. <KW c={RD}>Limited genetic variation</KW> in the population.<br/>2. <Bold>Vulnerability to habitat changes</Bold> (temperature, drought, new predators).<br/>3. <Bold>Disease can wipe out the whole population</Bold> (no resistant individuals).<br/>4. <Bold>Slow evolution</Bold> — no recombination of genes. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Wind vs insect pollinated structural details (3 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Plants", front: "Describe the structural adaptations of an INSECT-pollinated flower. (SME table)", back: <span>• <Bold>Petals</Bold> — <KW c={TL}>large &amp; brightly coloured</KW>; attract insects.<br/>• <Bold>Scent + nectar</Bold> — produced; reward to encourage visits, makes insects push past stamens.<br/>• <Bold>Anthers</Bold> — held on <Bold>STIFF filaments</Bold> WITHIN the flower → brush against insects.<br/>• <Bold>Stigma</Bold> — <Bold>STICKY</Bold>, INSIDE the flower → catches pollen when insects brush past.</span> },
    { src: "SME", cat: "Plants", front: "Describe the structural adaptations of a WIND-pollinated flower. (SME table)", back: <span>• <Bold>Petals</Bold> — <KW c={TL}>small &amp; dull</KW>, often green or brown.<br/>• <Bold>Scent + nectar</Bold> — NONE; would be a waste of energy.<br/>• <Bold>Anthers</Bold> — held on <Bold>LONG filaments OUTSIDE</Bold> the flower → release pollen easily into the wind.<br/>• <Bold>Stigma</Bold> — <Bold>FEATHERY</Bold>, OUTSIDE the flower → catches airborne pollen grains.</span> },
    { src: "SME", cat: "Plants", front: "How is pollen ADAPTED for its pollination method? (SME worked example)", back: <span>• <KW c={TL}>Insect-pollinated pollen</KW>: <Bold>large, heavy</Bold>, with <Bold>spikes/hooks</Bold> — sticks to insect bodies.<br/>• <KW c={TL}>Wind-pollinated pollen</KW>: <Bold>small, light, smooth</Bold> — easily carried by air.<br/>(Pollen with wing-like flaps is also wind-pollinated — catches the wind.)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Germination practical (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Germination", front: "Describe the SME 4-tube germination experiment. (Practical, EXT)", back: <span>4 boiling tubes, each with 10 cress seeds on cotton wool:<br/>• <Bold>A</Bold> — dry cotton wool → tests <KW c={PU}>WATER</KW> (no germination).<br/>• <Bold>B</Bold> — moist cotton, 20 °C, air → <Bold>CONTROL</Bold> (germination!).<br/>• <Bold>C</Bold> — moist + boiled (de-oxygenated) water under oil → tests <KW c={PU}>OXYGEN</KW> (no germination).<br/>• <Bold>D</Bold> — moist cotton at 4 °C (fridge) → tests <KW c={PU}>WARMTH</KW> (no germination).<br/>Proves all 3 factors are needed. (EXT)</span> },
    { src: "SME", cat: "Germination", front: "Is CARBON DIOXIDE needed for germination? (SME)", back: <span><KW c={TL}>NO</KW>. CO₂ does not inhibit germination either — its presence or absence makes <Bold>no difference</Bold>. Only WATER, OXYGEN and a SUITABLE TEMPERATURE are needed.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Sperm chemistry &amp; fertilisation detail (3 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Human", front: "How does sperm find the egg in the female system? (SME)", back: <span>Sperm follow a <KW c={TL}>chemical trail</KW> starting in the cervix → through the uterus → up into the oviduct where the egg is located. The <Bold>flagellum</Bold> propels them; <Bold>mitochondria</Bold> in the midpiece provide ATP.</span> },
    { src: "SME", cat: "Human", front: "Describe the role of the ACROSOME during fertilisation. (SME)", back: <span>The acrosome is a region in the <KW c={TL}>head of the sperm</KW> containing <Bold>digestive enzymes</Bold>. On contact with the egg, the enzymes <Bold>digest a route</Bold> through the jelly coat &amp; cell membrane so that the <Bold>sperm nucleus can enter</Bold> and fuse with the egg nucleus.</span> },
    { src: "SME", cat: "Human", front: "What happens to the egg's JELLY COATING after fertilisation? (SME)", back: <span>The jelly-like coating <KW c={TL}>CHANGES (hardens)</KW> immediately after the first sperm enters. This forms an <Bold>impenetrable barrier</Bold> that prevents any MORE sperm from entering the egg. Only ONE sperm fertilises an egg.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Gamete comparison &amp; numbers (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Human", front: "Compare SPERM and EGG — size, motility &amp; numbers. (SME table)", back: <span><Bold>Size:</Bold> sperm = <KW c={TL}>~45 µm</KW>; egg = <KW c={TL}>~0.15 mm</KW> (≈3× larger).<br/><Bold>Motility:</Bold> sperm is mobile (flagellum); egg is NOT mobile.<br/><Bold>Numbers:</Bold> sperm = ~100 million per DAY; egg = ONE released per month from thousands of immature ova.</span> },
    { src: "SME", cat: "Human", front: "List the parts of the MALE reproductive system and their functions. (SME)", back: <span>• <KW c={TL}>Testis</KW> — produces sperm + testosterone.<br/>• <Bold>Scrotum</Bold> — holds testes outside body, slightly cooler.<br/>• <Bold>Sperm duct</Bold> — carries sperm.<br/>• <Bold>Prostate gland</Bold> — adds fluid → semen.<br/>• <Bold>Urethra</Bold> — tube through penis (urine OR semen; ring muscle prevents mixing).<br/>• <Bold>Penis</Bold> — delivers semen into the vagina.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Pregnancy / placenta detail (4 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Placenta", front: "State the journey of the zygote after fertilisation. (SME)", back: <span>1. Fertilisation occurs in the <KW c={TL}>OVIDUCT</KW>.<br/>2. Zygote travels towards the uterus over <Bold>~3 days</Bold>, dividing by mitosis several times.<br/>3. By the time it reaches the uterus, it is a ball of cells called an <Bold>EMBRYO</Bold>.<br/>4. The embryo <Bold>IMPLANTS</Bold> in the thick uterine lining and continues to develop.</span> },
    { src: "SME", cat: "Placenta", front: "What is the GESTATION period in humans and when does embryo become fetus? (SME)", back: <span>Gestation = <KW c={TL}>9 months</KW>.<br/>• <Bold>First 12 weeks</Bold>: major <Bold>organ development</Bold>; nutrients diffuse through uterus lining. Called an EMBRYO.<br/>• <Bold>After 12 weeks</Bold>: organs in place, <Bold>placenta has formed</Bold> → now called a <Bold>FETUS</Bold>.<br/>• Remaining time: fetus mostly grows in SIZE.</span> },
    { src: "SME", cat: "Placenta", front: "What is the role of AMNIOTIC FLUID? (SME)", back: <span>The fetus is surrounded by the <KW c={TL}>amniotic sac</KW> containing <Bold>amniotic fluid</Bold> (made from the mother's blood plasma). It <Bold>CUSHIONS the fetus from bumps</Bold> to the mother's abdomen, protecting it during development.</span> },
    { src: "SME", cat: "Placenta", front: "How is the placenta ADAPTED for efficient diffusion? (EXT)", back: <span>• <KW c={PU}>LARGE SURFACE AREA</KW> (villi project into the mother's blood spaces).<br/>• <KW c={PU}>THIN walls</KW> → short diffusion distance.<br/>• Mother's and fetus's blood <Bold>NEVER MIX</Bold> — only diffusion across the placental membrane.<br/>• Counter-current arrangement maintains concentration gradients. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Specific substances crossing the placenta (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Placenta", front: "Name 4 substances that move FROM MOTHER TO FETUS across the placenta. (SME — exam tip!)", back: <span>By DIFFUSION (high → low):<br/>• <KW c={TL}>GLUCOSE</KW><br/>• <KW c={TL}>AMINO ACIDS</KW><br/>• <KW c={TL}>FATS</KW> (small fatty acids)<br/>• <KW c={TL}>WATER</KW><br/>• <KW c={TL}>OXYGEN</KW><br/>(SME exam tip: name SPECIFIC substances — "nutrients" alone scores 0.)</span> },
    { src: "SME", cat: "Placenta", front: "Name 2 substances that move FROM FETUS TO MOTHER across the placenta. (SME)", back: <span>By DIFFUSION (high → low):<br/>• <KW c={TL}>CARBON DIOXIDE</KW> (waste of respiration)<br/>• <KW c={TL}>UREA</KW> (waste of amino acid breakdown)<br/>(SME exam tip: be SPECIFIC — "waste products" alone scores 0.)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Secondary sexual characteristics (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Hormones", front: "List the FEMALE secondary sexual characteristics from puberty. (SME)", back: <span>Triggered by <KW c={TL}>oestrogen</KW>:<br/>• <Bold>Breasts develop</Bold>.<br/>• <Bold>Body hair grows</Bold> (pubic, underarm).<br/>• <Bold>Menstrual cycle begins</Bold>.<br/>• <Bold>Hips get wider</Bold>.<br/>• (Both sexes): emotional changes, mood swings.</span> },
    { src: "SME", cat: "Hormones", front: "List the MALE secondary sexual characteristics from puberty. (SME)", back: <span>Triggered by <KW c={TL}>testosterone</KW>:<br/>• <Bold>Penis &amp; testes grow</Bold>.<br/>• <Bold>Facial &amp; body hair grow</Bold>.<br/>• <Bold>Muscles develop</Bold>.<br/>• <Bold>Voice "breaks"</Bold> (deepens).<br/>• <Bold>Testes start producing sperm</Bold>.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Menstrual cycle hormones (EXT, 5 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Hormones", front: "Where are the four menstrual cycle hormones MADE? (EXT)", back: <span>• <KW c={PU}>FSH</KW> &amp; <KW c={PU}>LH</KW> — <Bold>PITUITARY gland</Bold> (in the brain).<br/>• <KW c={PU}>Oestrogen</KW> — <Bold>OVARY</Bold> (developing follicle).<br/>• <KW c={PU}>Progesterone</KW> — <Bold>OVARY</Bold> (corpus luteum), then placenta during pregnancy.<br/>All four <Bold>circulate in the blood</Bold>. (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "What are the two effects of FSH? (EXT)", back: <span>FSH (follicle-stimulating hormone) from the pituitary:<br/>1. <KW c={PU}>Stimulates an egg to mature</KW> in a follicle in the ovary.<br/>2. Stimulates the <Bold>ovary follicle to SECRETE OESTROGEN</Bold>. (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "What are the two effects of LH? (EXT)", back: <span>LH (luteinising hormone) from the pituitary, peaks ~day 14:<br/>1. <KW c={PU}>Triggers OVULATION</KW> — release of the egg from the follicle into the oviduct.<br/>2. Causes the empty follicle to form the <Bold>CORPUS LUTEUM</Bold>, which produces progesterone. (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "What are the TWO effects of OESTROGEN in the cycle? (EXT)", back: <span>1. <KW c={PU}>STIMULATES the uterus</KW> to develop a thick lining (after menstruation has lost the previous one).<br/>2. <Bold>POST-OVULATION</Bold>: oestrogen INHIBITS further FSH and LH production from the pituitary (negative feedback). (EXT)</span> },
    { src: "SME", cat: "Hormones", front: "What are the THREE effects of PROGESTERONE in the cycle? (EXT)", back: <span>1. <KW c={PU}>MAINTAINS and THICKENS</KW> the uterus lining.<br/>2. <Bold>INHIBITS</Bold> FSH and LH production (negative feedback).<br/>3. If <Bold>fertilisation doesn't occur</Bold>, corpus luteum breaks down → progesterone falls → <Bold>menstruation</Bold>. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — Cycle facts &amp; timings (2 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "Hormones", front: "State key TIMINGS in the menstrual cycle. (SME)", back: <span>• Average cycle = <KW c={TL}>28 DAYS</KW>.<br/>• <Bold>Day 1</Bold> = first day of menstruation.<br/>• <Bold>Menstruation</Bold> lasts ~5–7 days.<br/>• <Bold>Ovulation</Bold> = ~day 14 (halfway).<br/>• Cycle begins in girls at ~age 12.</span> },
    { src: "SME", cat: "Hormones", front: "What happens to the corpus luteum if pregnancy DOES occur? (EXT)", back: <span>The corpus luteum <KW c={PU}>continues to produce progesterone</KW>, preventing the uterus lining from breaking down (which would <Bold>abort</Bold> the pregnancy). It does this <Bold>until the placenta develops</Bold>, then the placenta takes over progesterone production for the rest of pregnancy. (EXT)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME PDF — HIV mechanism &amp; immunity (5 cards)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "SME", cat: "STIs", front: "What does HIV stand for and what does it cause? (SME)", back: <span><KW c={TL}>Human Immunodeficiency Virus</KW> — a VIRUS that usually leads to <Bold>AIDS (Acquired Immune Deficiency Syndrome)</Bold>.</span> },
    { src: "SME", cat: "STIs", front: "What symptoms appear IMMEDIATELY after HIV infection? (SME)", back: <span>Immediately after infection: <KW c={TL}>mild flu-like symptoms</KW>. These pass; for a period of time, <Bold>infected people may not know they are infected</Bold> — which is why they may unknowingly spread the virus.</span> },
    { src: "SME", cat: "STIs", front: "How does HIV EVADE the immune system? (SME)", back: <span>HIV <KW c={TL}>repeatedly CHANGES its protein coat</KW> (antigens on its surface). This means <Bold>memory cells and antibodies</Bold> from previous infection can no longer recognise it. The virus avoids being destroyed by lymphocytes long enough to <Bold>infect them</Bold>.</span> },
    { src: "SME", cat: "STIs", front: "Describe the 4 steps of how HIV affects lymphocytes. (SME diagram)", back: <span>1. <KW c={TL}>HIV attaches to receptors</KW> on a CD4 T-lymphocyte.<br/>2. HIV <Bold>injects its genetic material</Bold> into the lymphocyte → it becomes a host cell.<br/>3. HIV <Bold>uses the lymphocyte's machinery</Bold> to make copies of itself.<br/>4. Many new HIV particles are released; the host cell is <Bold>destroyed</Bold>.<br/>Result: lymphocyte numbers fall → fewer antibodies → unable to fight infections = AIDS.</span> },
    { src: "SME", cat: "STIs", front: "Name the 4 ways spread of STIs (such as HIV) can be controlled. (SME)", back: <span>1. <KW c={TL}>Limit number of sexual partners</KW>.<br/>2. <Bold>Avoid unprotected sex</Bold> — always use a <Bold>condom</Bold>.<br/>3. <Bold>Get tested</Bold> after unprotected sex or sex with multiple partners.<br/>4. <Bold>Education programmes</Bold> to raise awareness.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       NLCS SUPPLEMENTARY — extras for deeper coverage
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "Suppl", cat: "Asexual", front: "How does Mucor reproduce asexually?", back: <span>Forms <KW c={TL}>spherical sporangia</KW> at the tips of vertical hyphae. Each sporangium contains hundreds of <Bold>spores</Bold>, dispersed by insect feet or rain splashes. Each spore can grow into a new mycelium.</span> },
    { src: "Suppl", cat: "Plants", front: "Why do wind-pollinated flowers produce HUGE amounts of pollen?", back: <span>Because most of the pollen is <KW c={TL}>lost in the air</KW> — only a small fraction lands on the stigma of another flower of the same species. Large quantities increase the chance of successful pollination.</span> },
    { src: "Suppl", cat: "Human", front: "Why is the scrotum located outside the body cavity?", back: <span>To keep the testes at a temperature <KW c={TL}>slightly BELOW body temperature</KW> (about 35 °C) — this is the optimum for <Bold>sperm production</Bold>. At body temperature (37 °C) sperm production is impaired.</span> },
    { src: "Suppl", cat: "Placenta", front: "Why must the mother's and fetus's blood NOT mix in the placenta?", back: <span>1. They may have <KW c={RD}>different blood groups</KW> → immune reaction (agglutination).<br/>2. The mother's <Bold>blood pressure</Bold> is much higher → would damage the fetus's delicate vessels.<br/>3. Pathogens in mother's blood would directly enter the fetus.</span> },
    { src: "Suppl", cat: "Asexual", front: "What is unusual about asexual reproduction in Bryophyllum?", back: <span>Tiny plantlets develop along the <KW c={TL}>LEAF MARGINS</KW> (notched edges of the leaves), not on a stem. When plantlets fall to the soil they root and grow into independent plants — vegetative propagation from a LEAF.</span> },
    { src: "Suppl", cat: "Asexual", front: "Describe the stages of asexual reproduction (budding) in Hydra.", back: <span>(a) Cells on the column divide rapidly → <Bold>swelling / bulge</Bold>.<br/>(b) Swelling develops <Bold>tentacles</Bold>.<br/>(c) Daughter Hydra <Bold>pulls itself off</Bold> the parent.<br/>(d) Daughter becomes an <KW c={TL}>independent animal</KW> (a clone).</span> },
    { src: "Suppl", cat: "Plants", front: "How is a FOXGLOVE flower adapted for pollination by a large bumble-bee?", back: <span>Tube-like petals lined with <KW c={TL}>DENSE HAIRS</KW> — these stop small insects sneaking past to steal nectar. Only a large bumble-bee can push past the hairs, forcing it to <Bold>rub against the anthers and stigma</Bold>, achieving pollination.</span> },
    { src: "Suppl", cat: "Plants", front: "What are HONEY GUIDES on a flower?", back: <span><KW c={TL}>Dark lines on petals</KW> that DIRECT insects (especially bees) towards the nectar source. They bring the insect into contact with the <Bold>anthers and stigma</Bold>, increasing the chance of pollination.</span> },
    { src: "Suppl", cat: "Sexual", front: "What is CROSS-BREEDING (selective breeding)?", back: <span>Crossing two varieties to combine their useful characteristics. e.g. wheat: <KW c={TL}>high-yield (HHrr) × disease-resistant (hhRR)</KW> → F₁ generation (HhRr) shows both traits if H and R are dominant.</span> },
    { src: "Suppl", cat: "Sexual", front: "State ONE long-term disadvantage of selective breeding.", back: <span><KW c={RD}>LOSS OF VARIABILITY</KW> — by removing offspring that don't carry the desired traits, many other genes are lost from the population. The narrow gene pool may not contain useful genes for <Bold>future challenges</Bold> (new diseases, climate change).</span> },
    { src: "Suppl", cat: "Placenta", front: "Why do humans grow so slowly in the first 5 weeks of pregnancy compared to weeks 15–20?", back: <span>Weeks 0–5: <KW c={TL}>cells are differentiating</KW> into tissues and organs — slow rate (~0.34 mm/day).<br/>Weeks 15–20: organs already formed, fetus just gets BIGGER → rapid growth (~4.3 mm/day). That's a <Bold>~1200% increase</Bold> in growth rate.</span> },
    { src: "Suppl", cat: "Germination", front: "In the pollen tube growth practical, why are different sucrose concentrations needed for different species?", back: <span>The sucrose concentration on a stigma must match the species' OWN optimum for pollen germination. This is a <KW c={TL}>natural barrier</KW> — only the species' own pollen germinates well, preventing pollen from a different species from fertilising the ovule.</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams style card (teacher-curated for Ch.16)" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. First 54 cards = <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> official PDF (Reproduction in Plants &amp; Humans). Remaining SME cards are teacher-curated in the same style. <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
