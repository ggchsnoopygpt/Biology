        <div><Bold>Self-pollination</Bold> = anther → stigma of <Bold>same flower / same plant</Bold>. <Bold>Cross-pollination</Bold> = anther → stigma of a <Bold>DIFFERENT plant of the same species</Bold>.</div>

      <Card title="② ASEXUAL vs SEXUAL — One-table comparison" color={AM} bg={AL}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>

      a: "(a) (i) Many mitochondria [2]:\n• Conversion of glucose → glycogen requires ENERGY (an active anabolic process). [1]\n• Mitochondria carry out aerobic RESPIRATION → produce lots of ATP needed for the bonds formed in glycogen synthesis. [1]\n\n(ii) ENZYMES (catalytic PROTEINS). [1]\n\n(b) Fetal glucose supply [3]:\n• Mother eats food → glucose absorbed into her blood. [1]\n• Glucose carried in maternal blood to the PLACENTA. [1]\n• Glucose DIFFUSES across the placenta from maternal → fetal blood (along the concentration gradient) — no mixing of blood. [1]\n\n(c) (i) Hormone definition [3]:\n• A CHEMICAL SUBSTANCE [1]\n• Produced by a GLAND / endocrine gland [1]\n• Carried in the BLOOD which alters the activity of one or more specific TARGET ORGANS. [1]\n\n(ii) % increase [2]:\n• (625 − 200) / 200 × 100 [1] = 212.5 % ≈ 213 %. [1]\n(Accept answers around 212–215% depending on graph reading.)"

                  background: src === s.id ? s.color : "#fff",
                  color: src === s.id ? "#fff" : s.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {s.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Difficulty filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>DIFFICULTY</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {diffs.map(d => {
            const count = qs.filter(q => d.id === "all" || q.diff === d.id).length;
            return (
              <button key={d.id} onClick={() => setDiff(d.id)}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: diff === d.id ? `2px solid ${d.color}` : `1.5px solid ${BD}`,
                  background: diff === d.id ? d.color : "#fff",
                  color: diff === d.id ? "#fff" : d.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {d.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Topic filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>TOPIC</div>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {topics.map(t => {
            const count = qs.filter(q => t.id === "all" || q.topic === t.id).length;
            return (
              <button key={t.id} onClick={() => setTopic(t.id)}
                style={{
                  padding: "5px 10px", borderRadius: 14,
                  border: topic === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
                  background: topic === t.id ? t.color : "#fff",
                  color: topic === t.id ? "#fff" : t.color,
                  fontSize: 10.5, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {t.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        background: RL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: RD, flexWrap: "wrap", gap: 8 }}>
        <div>
          <Bold>{filtered.length}</Bold> question{filtered.length !== 1 ? "s" : ""} ·
          <Bold> /{totalMarks} marks total</Bold> ·
          <span style={{ color: "#666" }}> {revealedCount} revealed</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setRev({})} style={{
            padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
            border: `1.5px solid ${RD}`, background: "#fff", color: RD,
          }}>Hide all</button>
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "30px 20px", color: "#999", fontSize: 13, background: "#f8f8f6", borderRadius: 10 }}>
          No questions match the selected filters. Try a different combination.
        </div>
      )}

      {/* Question cards */}
      {filtered.map(q => {
        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 3, padding: "2px 7px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{q.diff.toUpperCase()}</span>
                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.src && (
                    <span title={q.src === "Hodder" ? "Hodder textbook official question" : q.src === "SME" ? "Save My Exams style question" : "NLCS supplementary question"}
                      style={{ background: q.src === "Hodder" ? G : q.src === "SME" ? TL : "#7a6a40", color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                      {q.src === "Hodder" ? "HODDER" : q.src === "SME" ? "SME" : "SUPPL"}
                    </span>
                  )}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

            <tr><Td>Chromosome behaviour</Td><Td bg={GL}>diploid → diploid (no change)</Td><Td bg={PL}>diploid → <KW c={PU}>haploid</KW> gametes → diploid zygote</Td></tr>
            <tr><Td>Genetic similarity of offspring</Td><Td bg={GL}>IDENTICAL (clones)</Td><Td bg={PL}>VARIED</Td></tr>
            <tr><Td>Speed</Td><Td bg={GL}>fast</Td><Td bg={PL}>slow (seed/egg → adult)</Td></tr>

          <thead><tr><Th>Method</Th><Th>What it is</Th><Th>Example</Th></tr></thead>
          <tbody>
            <tr><Td>Stolon (runner)</Td><Td>horizontal stem growing ABOVE soil, with new plantlet at the tip</Td><Td>Strawberry, creeping buttercup</Td></tr>
            <tr><Td>Rhizome</Td><Td>horizontal stem growing BELOW soil; buds send up shoots</Td><Td>Couch grass, bracken, ginger</Td></tr>

      </Section>

      {/* SECTION 3 — Flower anatomy */}
      <Section title="③ Flower Structure — Inside, Outside, ♂ and ♀">

          <thead><tr><Th>Part</Th><Th>Function</Th></tr></thead>
          <tbody>
            <tr><Td>Sepal</Td><Td>protects flower while in bud (outermost layer)</Td></tr>

            <tr><Td><Bold>Stamen</Bold> (♂ = anther + filament)</Td><Td>male reproductive part</Td></tr>

            <tr><Td><Bold>Carpel</Bold> (♀ = stigma + style + ovary)</Td><Td>female reproductive part</Td></tr>
            <tr><Td>&nbsp;&nbsp;Stigma</Td><Td>sticky surface that receives pollen</Td></tr>
            <tr><Td>&nbsp;&nbsp;Style</Td><Td>links stigma to ovary; pollen tube grows down it</Td></tr>

            <tr><Td>&nbsp;&nbsp;Ovule</Td><Td>contains the egg cell; becomes the seed after fertilisation</Td></tr>

      </Section>

      {/* SECTION 4 — Insect vs wind pollination */}
      <Section title="④ Insect-pollinated vs Wind-pollinated Flowers">
        <InsectVsWindSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 8 }}>
          <thead><tr><Th>Feature</Th><Th>Insect-pollinated</Th><Th>Wind-pollinated</Th></tr></thead>

            <tr><Td>Anthers</Td><Td>inside the flower, brushing against insects</Td><Td>hang OUTSIDE on long filaments; loosely attached</Td></tr>
            <tr><Td>Stigma</Td><Td>small, sticky surface inside the flower</Td><Td>large, FEATHERY, hangs OUTSIDE — catches pollen from air</Td></tr>
            <tr><Td>Pollen amount</Td><Td>small amount produced</Td><Td>HUGE quantities (most is lost)</Td></tr>
            <tr><Td>Pollen surface</Td><Td>round, sticky, often spiky → grips insect fur</Td><Td>smooth and light → easily blown by air</Td></tr>
            <tr><Td>Bracts (modified leaves)</Td><Td>absent</Td><Td>often present (replace petals)</Td></tr>
            <tr><Td>Examples</Td><Td>Lupin, wallflower, buttercup, foxglove</Td><Td>Grasses, cereals, fir tree, pampas grass</Td></tr>

        <div style={{ marginTop: 10, background: PL, padding: 10, borderRadius: 6, fontSize: 12, lineHeight: 1.6, color: PU }}>
          🌺 <Bold>Specialised insect adaptations</Bold> — many flowers are matched to ONE type of pollinator:<br/>
          • <Bold>Honey guides</Bold> = dark lines on petals that direct insects to the nectar.<br/>
          • <Bold>Honeysuckle</Bold> (narrow, deep tube) → MOTHS / BUTTERFLIES with long tongues only.<br/>
          • <Bold>Foxglove</Bold> (tube + dense hairs inside) → BUMBLE-BEES only (small insects can't push past hairs).<br/>
          • <Bold>Tropical tube flowers</Bold> → SUNBIRDS, HUMMINGBIRDS, and even some BATS / MICE.<br/>
          This matching of flower to pollinator is a result of <Bold>EVOLUTION</Bold>.
        </div>
      </Section>

      {/* SECTION 5 — Self vs cross-pollination */}
      <Section title="⑤ Self-pollination vs Cross-pollination">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
          <div style={{ border: `1.5px solid ${AM}`, borderRadius: 8, padding: 10, background: AL }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: AM, marginBottom: 4 }}>SELF-pollination</div>
            <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.6 }}>
              Pollen from anther → stigma of the <Bold>same flower</Bold> OR a different flower on the <Bold>same plant</Bold>.<br/>
              <Bold>Advantage:</Bold> works without pollinators / when plants are isolated → species avoids extinction.<br/>
              <Bold>Disadvantage:</Bold> limited variation → poor adaptation to changing environment.
            </div>
          </div>
          <div style={{ border: `1.5px solid ${G}`, borderRadius: 8, padding: 10, background: GL }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: G, marginBottom: 4 }}>CROSS-pollination</div>

              <Bold>Advantage:</Bold> introduces genetic variation → better adaptation, more disease resistance.<br/>

            </div>
          </div>
        </div>
        <div style={{ background: PL, padding: 10, borderRadius: 6, fontSize: 11.5, color: PU }}>

        <PollenTubeSVG />
        <ol style={{ marginTop: 8, marginBottom: 0, paddingLeft: 20, fontSize: 12.5, lineHeight: 1.8 }}>
          <li>Pollen grain lands on stigma (= <KW c={PU}>pollination</KW>).</li>
          <li>Pollen absorbs sugary liquid from stigma → swells.</li>
          <li>A microscopic <KW c={PU}>pollen tube</KW> grows out of the pollen and down the style.</li>
          <li>Pollen tube enters the ovule through the <KW c={PU}>micropyle</KW> (a small hole).</li>
          <li>The <Bold>male nucleus</Bold> travels down the pollen tube into the ovule.</li>
          <li>Male nucleus FUSES with the female nucleus (egg cell) → <KW c={PU}>zygote</KW> = <Bold>fertilisation</Bold>.</li>
          <li>Zygote divides by mitosis → embryo. The ovule becomes the <Bold>seed</Bold>. The ovary becomes the <Bold>fruit</Bold>.</li>

          <thead><tr><Th>Hormone</Th><Th>Released by</Th><Th>Effect</Th></tr></thead>

        </table>
        <div style={{ background: PL, padding: 10, borderRadius: 6, marginTop: 8, fontSize: 12, color: PU, lineHeight: 1.6 }}>
          🔑 <Bold>If pregnancy occurs:</Bold> the embryo signals the corpus luteum to keep secreting progesterone → lining stays thick → no menstruation → first sign of pregnancy = missed period.
        </div>
      </Section>

      {/* SECTION 12 — STIs / HIV */}
      <Section title="⑫ STIs and HIV/AIDS">
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><Th>Topic</Th><Th>Key points</Th></tr></thead>
          <tbody>
            <tr><Td>Definition</Td><Td>STI = sexually transmitted infection (passed through sexual contact)</Td></tr>
            <tr><Td>HIV — what it is</Td><Td>Human Immunodeficiency Virus; a pathogen that causes AIDS (Acquired Immune Deficiency Syndrome)</Td></tr>
            <tr><Td>HIV — what it attacks</Td><Td>certain LYMPHOCYTES in the immune system → patient becomes vulnerable to many opportunistic infections</Td></tr>
            <tr><Td>Transmission</Td><Td>unprotected sexual contact; shared needles (IV drug use); mother → baby (placenta / birth / breastmilk); contaminated blood products</Td></tr>
            <tr><Td>NOT transmitted by</Td><Td>droplets / saliva / casual contact</Td></tr>
            <tr><Td>Control of spread</Td><Td>condom or femidom (barrier); faithfulness to one uninfected partner; avoid shared needles; early treatment; treat all sexual contacts</Td></tr>
            <tr><Td>Treatment</Td><Td>antiretroviral drugs slow progress (no cure); ANTIBIOTICS DO NOT WORK on HIV (virus, not bacterium)</Td></tr>
          </tbody>
        </table>
      </Section>

      <div style={{ marginTop: 14, padding: "12px 16px", background: PL, borderRadius: 10, fontSize: 12, color: PU, border: `1.5px solid ${PU}` }}>
        ✨ <Bold>Big picture:</Bold> Reproduction comes in two flavours — fast/identical (asexual) and slow/varied (sexual). Flowering plants do BOTH. Mammals do only sexual, with internal fertilisation and a placenta-supported pregnancy. Hormones (FSH/oestrogen/LH/progesterone) coordinate the cycle. STIs are a real-world risk → barrier methods + faithful partner + early treatment.
      </div>
    </div>
  );
}

function TextbookTab() {
  const Section = ({ title, children }) => (

      </div>
    </div>
  );

  const Sub = ({ children }) => (
    <div style={{ fontSize: 12.5, fontWeight: 700, color: G, marginTop: 10, marginBottom: 4, borderBottom: `1px dashed ${G}`, paddingBottom: 2 }}>
      {children}
    </div>
  );

  const Def = ({ term, children }) => (
    <div style={{ background: GL, borderLeft: `3px solid ${G}`, padding: "8px 12px", margin: "8px 0", borderRadius: 4, fontSize: 12.5 }}>
      <Bold>{term}</Bold> — {children}
    </div>
  );

  return (
    <div>
      <div style={{ background: G, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📖 Textbook — Hodder Complete Notes</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          Full notes paraphrased from Hodder Cambridge IGCSE Biology Chapter 16 (pages 246–278). All Extended (Paper 2/4) content tagged.
        </div>
      </div>

      {/* ===== 1. ASEXUAL REPRODUCTION ===== */}
      <Section title="1 · Asexual Reproduction">
        <Def term="Asexual reproduction">
          a process resulting in the production of <KW c={G}>genetically identical offspring</KW> from <Bold>one parent</Bold>. No gametes are involved.
        </Def>

        <div>The word "asexual" means <i>without sex</i>. No gametes (sex cells) are produced or fused. In single-celled bacteria and Protoctista, one cell simply divides into two by binary fission — each daughter cell is an independent organism. In larger organisms, a part of the body grows and develops into a new individual.</div>

        <div style={{ marginTop: 8 }}>For example, a small piece of stem planted in the soil can grow roots and become a new plant. Bacteria can divide every ~20 minutes, so a huge colony can form from a single cell in a short time — that's why a small number of bacteria can heavily contaminate food.</div>

        <Sub>1.1 Asexual reproduction in fungi</Sub>
        <div><i>Penicillium</i> and <i>Mucor</i> are mould fungi that grow on decaying food. They produce huge numbers of single-celled, <KW c={G}>haploid spores</KW> at the tips of vertical hyphae. The spores are dispersed by air currents (Penicillium) or rain splashes and insect feet (Mucor). If a spore lands on a suitable substrate it grows into a new mycelium.</div>
        <div style={{ marginTop: 6 }}><Bold>Penicillium</Bold> grows on damp leather, citrus fruits and decaying vegetable matter. Its mycelium grows over the food, digesting and absorbing it. Vertical hyphae grow upward and produce CHAINS of spores at their tips, giving the colony a blue-green powdery appearance.</div>
        <div style={{ marginTop: 6 }}><Bold>Mucor</Bold> feeds and grows similarly, but forms <KW c={G}>spherical sporangia</KW> at the tips of vertical hyphae instead of chains of spores. Each sporangium contains hundreds of spores, dispersed by insect feet or rain droplets.</div>
        <div style={{ marginTop: 6 }}><Bold>Mushrooms and toadstools</Bold> are the reproductive structures of larger fungi. The feeding mycelium lies inside the wood or soil; the visible "mushroom" is just the spore-producing body. <KW c={G}>Gills</KW> on the lower side of the cap produce vast numbers of spores, which fall and are carried away by air currents.</div>
        <div style={{ marginTop: 6 }}><Bold>Puffballs</Bold> are spherical fungal fruiting bodies. When ripe, a raindrop striking the puffball triggers it to release a CLOUD of spores into the air — a beautiful adaptation for wind dispersal.</div>

        <Sub>1.2 Vegetative propagation in flowering plants</Sub>
        <div>Most flowering plants reproduce sexually (via flowers), but many also have asexual methods, called <KW c={G}>vegetative propagation</KW>. A lateral bud on or under the soil grows into a complete new plant — instead of just a branch — and becomes independent when the connection dies.</div>
        <div style={{ marginTop: 6 }}><Bold>An unusual case — Bryophyllum:</Bold> in this plant, tiny plantlets develop along the leaf MARGINS (the notched edges of the leaves). When the plantlets fall to the soil, they take root and grow into independent plants. This is an unusual vegetative propagation method because new plants form on a leaf rather than on a stem.</div>
        <VegPropagationSVG />

        <div style={{ marginTop: 4 }}>The five main methods:</div>
        <ul style={{ marginTop: 4, paddingLeft: 18 }}>
          <li><Bold>Stolons (runners)</Bold> — horizontal shoots ABOVE ground (e.g. strawberry). At each node, buds produce shoots and roots, forming an independent daughter plant.</li>
          <li><Bold>Rhizomes</Bold> — horizontal stems BELOW ground (e.g. couch grass, bracken). Buds send shoots upward to form new plants.</li>
          <li><Bold>Bulbs</Bold> — short shoots with swollen, fleshy <Bold>leaf bases</Bold> storing food (e.g. daffodil, lily). A lateral bud inside the parent bulb produces a new plant next season.</li>
          <li><Bold>Corms</Bold> — short, fat <Bold>stems</Bold> swollen with stored food (e.g. crocus, taro / <i>Colocasia esculenta</i>). Note: the swelling is the stem, not leaf bases.</li>
          <li><Bold>Stem tubers</Bold> — swollen ends of underground stems with buds ("eyes") (e.g. potato). Each bud can produce a new shoot, using the tuber's stored starch.</li>
        </ul>

        <Sub>1.3 Artificial propagation  EXT</Sub>
        <div><Bold>Cuttings:</Bold> a piece of shoot cut from a plant is placed in water or moist soil; roots grow from the base of the stem. A rooting hormone (auxin) can speed this up; covering with polythene reduces water loss. Common with geraniums, willows, mint.</div>
        <div style={{ marginTop: 6 }}><Bold>Tissue culture:</Bold> small pieces of plant tissue are treated with enzymes to separate them into individual cells; the cells are placed on a nutrient agar with growth substances → they divide and form a shapeless mass called a <KW c={G}>callus</KW> → with the right hormones the callus develops into a complete plantlet. This technique produces large numbers of disease-free clones from a tiny amount of tissue.</div>

        <Sub>1.4 Asexual reproduction in animals</Sub>
        <div>Some species of invertebrate animals can reproduce asexually. <i>Hydra</i> is a small (5–10 mm) animal that lives in ponds attached to pondweed. It catches small animals with its tentacles, swallows and digests them. Hydra can reproduce sexually by releasing male and female gametes into the water, but it also has an asexual method called <KW c={G}>BUDDING</KW>:</div>
        <ol style={{ paddingLeft: 18, marginTop: 6 }}>
          <li>(a) A group of cells on the column starts <Bold>dividing rapidly</Bold> by mitosis, producing a small bulge / swelling.</li>
          <li>(b) The swelling develops <Bold>tentacles</Bold> — it begins to look like a tiny Hydra.</li>
          <li>(c) The daughter Hydra <Bold>pulls itself off</Bold> the parent at the base of the bud.</li>
          <li>(d) The daughter becomes an <Bold>independent animal</Bold>, identical to the parent (a clone).</li>
          <li>(e) Hydra with bud visible — shown in Figure 16.14.</li>
        </ol>

        <Sub>1.5 Advantages &amp; disadvantages of asexual reproduction</Sub>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G }}>Advantages</th><th style={{ background: "#fff3e0", padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: AM }}>Disadvantages</th></tr></thead>
          <tbody>
            <tr>
              <td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • No mate needed.<br/>
                • No gametes needed.<br/>
                • All good characteristics of the parent are passed on → uniform crops, stable varieties.<br/>
                • Where there is no dispersal (e.g. potato tubers), offspring grow in the SAME favourable environment as the parent.<br/>
                • Plants reproducing asexually store large amounts of food → rapid growth when conditions become suitable.
              </td>
              <td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • Little/no variation → adaptation to a changing environment is unlikely.<br/>
                • If the parent has no resistance to a particular disease, NONE of the offspring will → could wipe out a whole crop.<br/>
                • Lack of dispersal (e.g. potato tubers) → competition for nutrients, water and light among offspring.
              </td>
            </tr>
          </tbody>
        </table>
      </Section>

      {/* ===== 2. SEXUAL REPRODUCTION ===== */}
      <Section title="2 · Sexual Reproduction (overview)">
        <Def term="Sexual reproduction">
          a process involving the fusion of the nuclei of <KW c={G}>two gametes</KW> to form a <Bold>zygote</Bold>, and the production of offspring that are <Bold>genetically different</Bold> from each other.
        </Def>
        <div>Sexual reproduction involves the production of sex cells called <Bold>gametes</Bold> in reproductive organs. The type of cell division that produces gametes is <KW c={G}>meiosis</KW> (Chapter 17). At fertilisation, the male and female gametes meet and FUSE — their nuclei and cytoplasm join to form a single cell, the <Bold>zygote</Bold>, which then grows into a new individual.</div>
        <div style={{ marginTop: 6 }}>In flowering plants, the male gamete is in the <Bold>pollen grain</Bold>; the female gamete is the <Bold>egg cell</Bold> inside the <Bold>ovule</Bold>. In animals, the male gamete is <Bold>sperm</Bold>; the female gamete is the <Bold>egg (ovum)</Bold>.</div>
        <div style={{ marginTop: 6 }}>In all species the male gamete is small and <Bold>mobile</Bold> (it moves to reach the female gamete); the female gamete is much <Bold>larger</Bold> and <Bold>not mobile</Bold>.</div>

        <Sub>2.1 Chromosome numbers — haploid &amp; diploid  EXT</Sub>
        <div>In normal body (somatic) cells, chromosomes occur in <Bold>pairs</Bold>. Humans have 46 chromosomes = 23 pairs. This is the <KW c={G}>diploid</KW> number. When gametes are formed, the chromosome number is halved — this is the <KW c={G}>haploid</KW> number (23 in human sperm/egg).</div>
        <div style={{ marginTop: 6 }}>At fertilisation, the nuclei of the two gametes fuse → the zygote gets chromosomes from both parents → diploid number is restored (46 in humans).</div>

        <Sub>2.2 Advantages &amp; disadvantages of sexual reproduction</Sub>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G }}>Advantages</th><th style={{ background: "#fff3e0", padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: AM }}>Disadvantages</th></tr></thead>
          <tbody>
            <tr>
              <td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • Variation in offspring → better adaptation to changing/new environments.<br/>
                • New varieties can be created → may have disease resistance.<br/>
                • In plants, seeds allow dispersal → reduces competition with the parent.
              </td>
              <td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • Two parents usually needed (though some plants self-pollinate).<br/>
                • Growth of a new plant from a seed (or animal from a zygote) is slow.<br/>
                • Some combinations of genes will produce less successful individuals.
              </td>
            </tr>
          </tbody>
        </table>

        <Sub>2.3 Cross-breeding &amp; selective breeding</Sub>
        <div>Sexual reproduction is used to produce new varieties of plants and animals by <KW c={G}>cross-breeding</KW>. Biologists can use their knowledge of genetics (see Chapter 17 — monohybrid inheritance) to combine the useful characteristics of two parents.</div>
        <div style={{ marginTop: 6 }}><Bold>Worked example — wheat:</Bold> one variety (HHrr) produces a HIGH yield of grain but is NOT resistant to fungal disease. Another variety (hhRR) produces a LOW yield but IS resistant. If the two varieties are CROSS-POLLINATED, the <KW c={G}>F₁</KW> (first filial generation) offspring are HhRr — and if H and R are both DOMINANT, the F₁ shows high yield AND high resistance (Figure 16.16). Farmers can then breed from these F₁ plants to produce new improved varieties.</div>
        <div style={{ marginTop: 6 }}><Bold>Long-term disadvantage — loss of variability:</Bold> by removing all the offspring that do NOT bear the desired characteristics, many genes are LOST from the breeding population. In the future, when new combinations of genes are needed (e.g. for resistance to a new disease, or to cope with climate change), some of these potentially useful genes may no longer be available. This is the price paid for <KW c={G}>selective breeding</KW>. (More on this in Chapter 18 — "Selection".)</div>
      </Section>

      {/* ===== 3. SEXUAL REPRODUCTION IN PLANTS ===== */}
      <Section title="3 · Sexual Reproduction in Plants">

        <Sub>3.1 Flower structure</Sub>
        <div>Flowers are the reproductive structures of flowering plants. They contain stamens (♂), carpels (♀), or both (most species are "bisexual"). After fertilisation, part of the carpel becomes the fruit, containing the seeds.</div>
        <FlowerStructureSVG />
        <div style={{ marginTop: 4 }}>The main parts:</div>
        <ul style={{ paddingLeft: 18, marginTop: 4 }}>
          <li><Bold>Petals</Bold> — usually large, brightly coloured and sometimes scented. They attract insects for pollination. Sometimes joined to form a tube. Grasses and trees often have no petals — they have small leaf-like <Bold>bracts</Bold> instead.</li>
          <li><Bold>Sepals</Bold> — outside the petals, often green and smaller; protect the flower while it is in bud.</li>
          <li><Bold>Stamens (♂)</Bold> — each consists of a stalk called the <Bold>filament</Bold> with an <Bold>anther</Bold> on the end. The anther contains four pollen sacs in which <Bold>pollen grains</Bold> are made by cell division. When ripe, the sacs split open and release pollen.</li>
          <li><Bold>Carpels (♀)</Bold> — each carpel consists of an <Bold>ovary</Bold> with one or more <Bold>ovules</Bold> inside, plus a <Bold>style</Bold> ending in a sticky <Bold>stigma</Bold>. The ovule contains a haploid egg cell.</li>
          <li><Bold>Receptacle</Bold> — expanded end of the flower stalk to which all flower parts are attached. In some plants (apple, pear) it becomes fleshy and edible after fertilisation.</li>
        </ul>

        <div style={{ marginTop: 8 }}><Bold>The lupin flower</Bold> is a classic example. Its five petals have different shapes: the upper "standard" stands vertically; two "wings" sit at the sides; two more petals join to form a boat-shaped "keel". The single long, narrow carpel contains about ten ovules. The ten stamens have filaments joined at the base, forming a sheath around the ovary.</div>

        <Sub>3.2 Pollination</Sub>
        <Def term="Pollination">
          the transfer of pollen grains from an <KW c={G}>anther to a stigma</KW>.
        </Def>
        <div>When anthers split open, pollen grains are exposed. They are then carried away — either on insects' bodies (insect pollination) or by wind (wind pollination).</div>
        <InsectVsWindSVG />

        <div style={{ marginTop: 8 }}><Bold>Insect pollination</Bold> (e.g. lupin):  bees land on the flower's wings, their weight pushes the wings and keel down, the anthers and stigma push out and brush against the bee. Pollen sticks to the underside of the bee. When the bee visits an older flower (which has already lost its pollen) and presses the keel down, the stigma touches the bee's body and picks up the pollen grains.</div>
        <div style={{ marginTop: 6 }}><Bold>Wind pollination</Bold> (e.g. grasses, cereals, fir trees): flowers are small with small green bracts (no petals or nectar). Anthers hang loosely OUTSIDE the flower so wind can shake the pollen out. Stigmas are FEATHERY and hang outside the flower to trap passing pollen. Pollen is produced in HUGE quantities because much is lost.</div>

        <Sub>3.3 Self- and cross-pollination</Sub>
        <Def term="Self-pollination">
          the transfer of pollen grains from the anther of a flower to the stigma of the <KW c={G}>same flower</KW>, or a different flower on the <KW c={G}>same plant</KW>.
        </Def>
        <Def term="Cross-pollination">
          the transfer of pollen grains from the anther of a flower to the stigma of a flower on a <KW c={G}>different plant of the same species</KW>.
        </Def>
        <div>Self-pollination is useful when no pollinators are available — the plant can still produce seeds and avoid extinction. However, it leads to limited genetic variation, making the species poorly adapted to environmental change.</div>
        <div style={{ marginTop: 6 }}>Cross-pollination guarantees variation and better adaptation. Plants encourage cross-pollination by producing stamens and carpels at DIFFERENT times in the same flower, so the flower's own pollen cannot fertilise itself.</div>

        <Sub>3.4 Fertilisation in a flowering plant</Sub>
        <div>After pollination, fertilisation can take place. The pollen grain absorbs liquid from the stigma and grows a microscopic <KW c={G}>pollen tube</KW> down through the style. The tube enters the ovule through a small hole called the <KW c={G}>micropyle</KW>. The male nucleus travels down the pollen tube and FUSES with the female nucleus (egg cell). Each ovule must be fertilised by a separate pollen grain.</div>
        <PollenTubeSVG />
        <div style={{ marginTop: 6 }}>After fertilisation: the OVULE → <Bold>seed</Bold>; the OVARY → <Bold>fruit</Bold>. (In biology, a fruit is the fertilised ovary of a flower — not always edible.)</div>
        <div style={{ marginTop: 6 }}><Bold>Note:</Bold> pollination does NOT always lead to fertilisation. Some plants are self-sterile (e.g. Bramley apple) — pollination with their own pollen does not result in fertilisation; they need pollen from a different variety.</div>

        <Sub>3.4a Adaptation of flowers to pollinators</Sub>
        <div>Insect-pollinated flowers have evolved many specific adaptations that improve the chances of successful pollination by a particular type of insect. This process — the structure and physiology of a flower changing over generations to suit its pollinator — is called <KW c={G}>EVOLUTION</KW>.</div>
        <ul style={{ paddingLeft: 18, marginTop: 6 }}>
          <li><Bold>Brightly coloured petals + scent</Bold> — attract a variety of insects.</li>
          <li><Bold>Honey guides</Bold> — dark lines on the petals that DIRECT insects towards the nectar, bringing them past the stamens and stigma on the way.</li>
          <li><Bold>Nectar</Bold> — a sugary reward that motivates insects to visit.</li>
          <li><Bold>Honeysuckle</Bold> — narrow, deep petal tubes; only insects with long mouthparts (moths, butterflies) can reach the nectar. They use their tongues like straws.</li>
          <li><Bold>Foxglove</Bold> — tube-like flowers with dense hairs lining the petal tube. The hairs stop small insects sneaking in and stealing nectar without pollinating. A large BUMBLE-BEE pushing into the tube is forced to rub against the anthers and stigma.</li>
          <li><Bold>Tropical / subtropical flowers</Bold> — many are pollinated by birds (HUMMINGBIRDS, SUNBIRDS) which feed from tube-shaped flowers. Some are even pollinated by bats and mice.</li>
        </ul>
        <div style={{ marginTop: 6 }}>Wind-pollinated flowers are adapted differently — they produce large quantities of light, smooth pollen; have anthers and stigmas that hang OUTSIDE the flower; have feathery stigmas that act like a net to trap floating pollen. Grasses often have anthers loosely attached to the filaments so they can be shaken by the wind.</div>

        <Sub>3.4b Practical work — growth of pollen tubes</Sub>
        <div><Bold>Safety:</Bold> wear eye protection.</div>
        <div style={{ marginTop: 6 }}><Bold>Method:</Bold></div>
        <ul style={{ paddingLeft: 18, marginTop: 4 }}>
          <li>Prepare a solution containing 15 g sucrose + 0.1 g sodium borate in 100 cm³ water. (You may need to try concentrations between 5–20% depending on the species.)</li>
          <li>Place a drop of the solution on a cavity slide. Scatter pollen grains on the drop — scrape a ripe anther with a mounted needle, or touch the anther on the liquid.</li>
          <li>Cover with a cover-slip. Examine under the microscope at <Bold>15 minute intervals</Bold>.</li>
          <li>Suitable plants: lily, narcissus (Nargis), tulip, Indian Blanket Flower, bluebell, lupin, wallflower, sweet pea, deadnettle.</li>
        </ul>
        <div style={{ marginTop: 6 }}><Bold>Observation:</Bold> with successful conditions, pollen tubes can be seen growing out of the pollen grains. Different species require different sucrose concentrations — the sugar concentration on the stigma in nature is a barrier that helps only the species' own pollen germinate.</div>

        <Sub>3.5 Germination — environmental conditions  EXT</Sub>
        <Def term="Germination">
          the process of development of a young plant from a seed.
        </Def>
        <GerminationSVG />
        <div>Three conditions are needed for germination: <KW c={G}>WATER</KW>, <KW c={G}>OXYGEN</KW> and a <KW c={G}>SUITABLE TEMPERATURE</KW>.</div>
        <ul style={{ paddingLeft: 18, marginTop: 6 }}>
          <li><Bold>Water</Bold> — absorbed through the micropyle of the seed. It activates enzymes, helps convert stored starch to soluble sugar (and proteins to amino acids), transports sugars to growing regions, expands vacuoles (so root/shoot grow and leaves expand), maintains turgor, and provides water for photosynthesis once leaves are above ground.</li>
          <li><Bold>Oxygen</Bold> — needed for aerobic respiration in the seed, which provides ATP energy for activating food reserves and making new cytoplasm and cell walls in the growing seedling.</li>
          <li><Bold>Temperature</Bold> — within an organism's tolerated range, a rise in temperature speeds up enzyme-controlled reactions; so germination happens faster at higher temperatures, up to about 40 °C. Above ~45 °C, enzymes are denatured and seedlings would be killed. Below ~0–4 °C, germination may not start at all.</li>
        </ul>

        <div style={{ marginTop: 8 }}><Bold>Stages of germination in a French bean</Bold> (Figure 16.33 in Hodder):</div>
        <ol style={{ paddingLeft: 18, marginTop: 4 }}>
          <li>The seed absorbs water → testa (seed coat) splits → the radicle (future root) emerges and grows downwards.</li>
          <li>Lateral roots grow from the side of the main root; root hairs absorb water from the soil.</li>
          <li>The hypocotyl (region just above the radicle) elongates and arches up out of the soil, pulling the cotyledons with it. The plumule (shoot) is protected between the cotyledons.</li>
          <li>Once the cotyledons are above the soil, the hypocotyl straightens and the plumule leaves open out.</li>
          <li>The stored starch in the cotyledons is converted to sugar by enzymes and used by the growing shoot/root. When the food reserve is used up, the cotyledons shrink and fall off. Now the plumule leaves photosynthesise — the seedling is an independent plant.</li>
        </ol>

        <Sub>3.6 Practical work — investigating germination conditions</Sub>
        <div><Bold>Experiment 2 — need for water:</Bold> three jars (A, B, C). All have soaked peas and cotton wool. A = dry; B = damp; C = covered with water (no oxygen). Result: only B germinates fully. Interpretation: water is needed, but too much water cuts off oxygen.</div>
        <div style={{ marginTop: 6 }}><Bold>Experiment 3 — need for oxygen:</Bold> two flasks. A = filled with CO₂ (no O₂); B = air. Both contain moist cotton wool with cress seeds. Result: only flask B germinates. Swapping seeds from A to B then shows the CO₂ didn't kill the seeds — they were simply deprived of oxygen.</div>
        <div style={{ marginTop: 6 }}><Bold>Experiment 4 — need for temperature:</Bold> identical rolls of moist paper with soaked maize grains placed at 4 °C (fridge, dark), 20 °C (dark) and 30 °C (incubator, dark). The 30 °C grains develop most; fridge grains barely germinate. Conclusion: warmth speeds germination up to ~35–40 °C.</div>
      </Section>

      {/* ===== 4. SEXUAL REPRODUCTION IN HUMANS ===== */}
      <Section title="4 · Sexual Reproduction in Humans">

        <Sub>4.1 The female reproductive system</Sub>
        <div>The female sex organs are paired <Bold>ovaries</Bold>, lying in the lower abdomen. Close to each ovary is the funnel-shaped opening of the <Bold>oviduct</Bold> (fallopian tube). The oviducts lead to the muscular <Bold>uterus</Bold> (womb). The cervix is a ring of muscle separating the uterus from the <Bold>vagina</Bold>.</div>
        <HumanReproSVG />

        <div style={{ marginTop: 6 }}>Table 16.5 (Hodder) — functions:</div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G, textAlign: "left" }}>Part</th><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G, textAlign: "left" }}>Function</th></tr></thead>
          <tbody>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>cervix</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>ring of muscle separating the vagina from the uterus</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>funnel of oviduct</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>directs an ovum from the ovary into the oviduct</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>ovary</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>female gonad — contains follicles where ova are produced</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>oviduct</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>carries the ovum to the uterus (cilia in the lining help propel it); SITE OF FERTILISATION</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>uterus</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>where the fetus develops</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>vagina</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>receives the penis during sexual intercourse; sperm are deposited here</td></tr>
          </tbody>
        </table>

        <Sub>4.2 The male reproductive system</Sub>
        <div>Sperm are produced in the paired <Bold>testes</Bold>, which lie OUTSIDE the abdominal cavity in a sac called the <Bold>scrotum</Bold>. This keeps them slightly cooler than body temperature — the best temperature for sperm production.</div>
        <div style={{ marginTop: 6 }}>Each testis is a mass of sperm-producing tubules. These join into a coiled tube that leads into a muscular <Bold>sperm duct</Bold> (vas deferens). The two sperm ducts open into the top of the <Bold>urethra</Bold> just after it leaves the bladder. They enter the <Bold>prostate gland</Bold>, which surrounds the urethra at this point. The urethra passes through the <Bold>penis</Bold> and can carry urine or semen at different times. The penis contains erectile tissue (connective tissue with blood spaces) which becomes firm when filled with blood.</div>

        <div style={{ marginTop: 6 }}>Table 16.6 (Hodder) — functions:</div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead><tr><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G, textAlign: "left" }}>Part</th><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G, textAlign: "left" }}>Function</th></tr></thead>
          <tbody>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>penis</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>becomes firm to insert into the vagina during sexual intercourse to transfer sperm</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>prostate gland</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>adds fluid and nutrients to sperm to form semen</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>scrotum</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>sac that holds the testes outside the body, keeping them cooler than body temperature</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>sperm duct</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>muscular tube linking testis to urethra; passes semen containing sperm</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>testis</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>male gonad — produces sperm</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>urethra</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>passes semen through the penis; also carries urine from the bladder</td></tr>
          </tbody>
        </table>

        <Sub>4.3 Comparing male and female gametes</Sub>
        <SpermEggSVG />
        <div><Bold>Sperm</Bold> are much smaller than eggs and produced in HUGE numbers (over 300 million per ejaculation). The tip of the cell carries an <KW c={G}>acrosome</KW> which secretes enzymes that can digest the jelly coat of the egg cell, allowing the sperm nucleus to fuse with the egg nucleus. The mid-piece contains many <KW c={G}>mitochondria</KW> which carry out respiration, providing energy to make the <KW c={G}>flagellum</KW> (tail) propel the sperm forward.</div>
        <div style={{ marginTop: 6 }}>The <Bold>egg cell (ovum)</Bold> is much larger than a sperm. Only one is released each month while the woman is fertile. It is surrounded by a jelly coat which protects the contents and — after one sperm has entered — prevents any further sperm from entering. The cytoplasm contains a large amount of yolk droplets rich in fats and proteins, which act as energy stores for the early embryo.</div>

        <Sub>4.4 Production of gametes  EXT</Sub>
        <div><Bold>Sperm production</Bold> takes place in the lining of the sperm-producing tubules in the testis (Figure 16.43). This lining consists of rapidly dividing cells. After a series of cell divisions (involving meiosis to halve the chromosome number), the cells grow long tails called <KW c={G}>flagella</KW> (singular: flagellum) and become mature sperm (Figure 16.44). The sperm then pass into the <KW c={G}>epididymis</KW> — the coiled tube on the outside of each testis, where they are stored.</div>
        <div style={{ marginTop: 6 }}>During <Bold>copulation</Bold>, the coiled tube and sperm ducts contract and force sperm out through the urethra. The prostate gland adds fluid to the sperm — this fluid plus the sperm is called <KW c={G}>semen</KW>. The ejection of semen through the penis is called <Bold>ejaculation</Bold>.</div>
        <div style={{ marginTop: 8 }}><Bold>Ovulation</Bold> — the egg cells (ova) are present in the ovary from the time of birth; no more are formed during the female's lifetime. Between ages 10–14, some egg cells start to mature one at a time, about every 4 weeks, from alternate ovaries.</div>
        <div style={{ marginTop: 6 }}>As each ovum matures, the cells around it divide rapidly and produce a fluid-filled sac — the <KW c={G}>FOLLICLE</KW> (Figure 16.45). When mature, the follicle forms a small bump on the surface of the ovary (like a small blister, Figure 16.46). Finally, the follicle BURSTS and releases the ovum, with its coat of follicle cells, into the funnel of the oviduct. This is <KW c={G}>OVULATION</KW>. From here, the ovum is wafted down the oviduct by the action of <Bold>cilia</Bold> in the lining of the tube.</div>
        <div style={{ marginTop: 6 }}>The empty follicle that has just released its ovum develops into a yellow body called the <KW c={G}>CORPUS LUTEUM</KW>. This produces the hormone <Bold>progesterone</Bold> — important for maintaining the uterus lining (see Section 5).</div>

        <Sub>4.5 Fertilisation</Sub>
        <div>The sperm swim through the cervix and uterus by wriggling movements of their tails, and enter the oviduct. If an ovum is in the oviduct, one of the sperm bumps into it and sticks to its surface. The acrosome at the head secretes enzymes that digest a channel through the jelly coat and part of the egg membrane. The sperm enters the cytoplasm of the ovum and the male nucleus fuses with the female nucleus — this is fertilisation.</div>
        <div style={{ marginTop: 6 }}>Although hundreds of millions of sperm are released in an ejaculation, only a few hundred reach the oviduct and only ONE will fertilise the ovum. The released ovum survives for ~24 hours; sperm can fertilise an ovum for about 2–3 days; so there are only ~4 days per month when fertilisation might occur.</div>
        <div style={{ marginTop: 6 }}>The fertilised egg has 23 chromosomes from the mother and 23 from the father, bringing its chromosome number to 46 — the diploid number. The fertilised egg is now called a <KW c={G}>zygote</KW>.</div>

        <Sub>4.6 Pregnancy and development</Sub>
        <div>The zygote is protected from any further sperm by the jelly coat, which now acts as a barrier. The zygote divides by mitosis into 2, then 4, then more cells — producing a solid ball (an early embryo). This travels down the oviduct to the uterus, where it <KW c={G}>implants</KW> into the thickened lining. The embryo continues to grow, forming tissues and organs. After 8 weeks, when all organs are formed, the embryo is called a <Bold>fetus</Bold>. The heart is one of the first organs to develop.</div>
        <div style={{ marginTop: 6 }}>Inside the uterus, the embryo becomes enclosed in a fluid-filled <KW c={G}>amniotic sac</KW> containing <KW c={G}>amniotic fluid</KW> — this protects the fetus from physical damage and prevents unequal pressures from acting on it. Oxygen and food come from the mother's blood via the <Bold>placenta</Bold>.</div>

        <div style={{ marginTop: 8 }}><Bold>Growth of the embryo / fetus</Bold> — typical lengths at different stages (Figures 16.49–16.50):</div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6 }}>
          <thead>
            <tr><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G }}>Age</th><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G }}>Length</th><th style={{ background: GL, padding: 6, fontSize: 11.5, border: `1px solid ${BD}`, color: G }}>Stage</th></tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>2 weeks</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>1.5 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>tiny embryo, just implanted</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>5 weeks</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>12 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>developing ear, eye, heart, umbilical cord; amniotic sac forming</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>8 weeks</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>40 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>all organs present — now called FETUS</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>10 weeks</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>60 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>placenta well established</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>5 months (~20 wk)</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>250 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>rapid growth phase</td></tr>
            <tr><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>35 weeks</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>470 mm</td><td style={{ padding: 6, fontSize: 12, border: `1px solid ${BD}` }}>fetus near full-term, a few weeks before birth</td></tr>
          </tbody>
        </table>
        <div style={{ marginTop: 6, background: GL, padding: 8, borderRadius: 6, fontSize: 12 }}>
          📊 <Bold>Worked example (Hodder p.271):</Bold> if you plot length vs time, you'll see a slow start (0–5 wk: ~0.34 mm/day while organs differentiate) followed by very rapid growth (15–20 wk: ~4.3 mm/day). That's a ≈ 1200% increase in growth rate — once the body plan is set, the fetus simply gets BIGGER. See Exam Practice for the calculation.
        </div>

        <Sub>4.7 The placenta and umbilical cord</Sub>
        <PlacentaSVG />
        <div>The placenta is a disc-like organ that becomes closely attached to the lining of the uterus; it is connected to the embryo by the <KW c={G}>umbilical cord</KW>. The cord contains:
          <ul style={{ paddingLeft: 18, marginTop: 4 }}>
            <li><Bold>Umbilical vein</Bold> — carries OXYGENATED blood + nutrients FROM placenta TO fetus.</li>
            <li><Bold>Two umbilical arteries</Bold> — carry DEOXYGENATED blood + waste (CO₂, urea) FROM fetus TO placenta.</li>
          </ul>
        </div>
        <div style={{ marginTop: 6 }}>Inside the placenta, blood vessels of mother and fetus lie very close together but DO NOT MIX. Exchange occurs by <KW c={G}>diffusion</KW> across the thin walls of placental villi:
          <ul style={{ paddingLeft: 18, marginTop: 4 }}>
            <li>Mother → fetus: oxygen, glucose, amino acids, ions, vitamins, antibodies.</li>
            <li>Fetus → mother: carbon dioxide, urea.</li>
          </ul>
        </div>
        <div style={{ marginTop: 6 }}><Bold>Why mother's blood must not mix with fetus's blood:</Bold>
          <ul style={{ paddingLeft: 18, marginTop: 4 }}>
            <li>They may have different blood groups (antigens) → mixing could cause an immune reaction.</li>
            <li>Mother's blood pressure is much higher than the fetus's → would damage the delicate fetal vessels.</li>
            <li>The placenta can SELECT what passes through.</li>
          </ul>
        </div>
        <div style={{ marginTop: 6 }}><Bold>Toxins and pathogens that CAN cross the placenta:</Bold> the placenta can prevent some toxins, but NOT all — nicotine, alcohol, drugs, the rubella virus and HIV can pass through and harm the fetus. Rubella (German measles), although mild in the mother, can cause deafness, congenital heart disease and other problems in the fetus. HIV can be transmitted to the baby in the uterus, during birth, or in breastmilk.</div>
      </Section>

      {/* ===== 5. SEXUAL HORMONES ===== */}
      <Section title={<span>5 · Sexual Hormones in Humans <Ext /></span>}>

        <Sub>5.1 Puberty</Sub>
        <div>The ovaries of a young girl contain all the ova she will ever produce, but these are not released until she is about 10–14 years old (puberty). At about the same time as the first ovulation, the ovary also releases female sex hormones (<KW c={G}>oestrogens</KW>) into the bloodstream. They cause the development of secondary sexual characteristics in girls: increased growth of breasts, widening of the hips, growth of pubic and underarm hair, increase in size of the uterus and vagina, and onset of menstruation.</div>
        <div style={{ marginTop: 6 }}>In boys, puberty starts at about the same age. The testes start to produce sperm and release <KW c={G}>testosterone</KW> into the bloodstream. Male secondary sexual characteristics develop: enlargement of testes and penis, deepening of the voice, growth of pubic, underarm, chest and (later) facial hair. In both sexes, there is also a rapid increase in growth rate.</div>

        <Sub>5.2 The menstrual cycle</Sub>
        <MenstrualCycleSVG />
        <div>The ovaries release an ovum about every 4 weeks. In preparation, the lining of the uterus thickens — ready for an embryo to implant if the released ovum is fertilised. If no embryo implants, the lining breaks down and cells, along with blood, pass out of the vagina — this is the menstrual <Bold>period</Bold> (menstruation).</div>

        <Sub>5.3 Hormones controlling the cycle</Sub>
        <ol style={{ paddingLeft: 18, marginTop: 4 }}>
          <li>At the start of the cycle, after menstruation, <KW c={G}>FSH</KW> (follicle-stimulating hormone) is released by the <Bold>pituitary gland</Bold>. FSH stimulates the growth of an egg follicle in the ovary.</li>
          <li>As the follicle develops, the ovary produces increasing amounts of <KW c={G}>oestrogen</KW>. Oestrogen makes the uterus lining grow thicker and develop more blood vessels — preparing for implantation.</li>
          <li>Around day 14, the pituitary releases a sharp peak of <KW c={G}>LH</KW> (luteinising hormone). LH triggers the release of the ovum from the ovary — <Bold>ovulation</Bold>.</li>
          <li>Once the ovum is released, the empty follicle develops into a yellow body called the <Bold>corpus luteum</Bold>. This produces <KW c={G}>progesterone</KW>, which MAINTAINS the uterus lining in a thick, blood-rich state suitable for implantation.</li>
          <li>If the ovum is NOT fertilised, the corpus luteum stops making progesterone. The lining breaks down, and menstruation begins → a new cycle starts.</li>
          <li>If the ovum IS fertilised and the embryo implants, the corpus luteum continues to make progesterone, and later the placenta takes over progesterone production. High progesterone keeps the lining intact → no menstruation (first sign of pregnancy = missed period).</li>
        </ol>
      </Section>

      {/* ===== 6. STIs ===== */}
      <Section title="6 · Sexually Transmitted Infections (STIs)">
        <Def term="Sexually transmitted infection (STI)">
          an infection that is transmitted through <KW c={G}>sexual contact</KW>.
        </Def>

        <Sub>6.1 AIDS and HIV</Sub>
        <div>AIDS stands for <Bold>Acquired Immune Deficiency Syndrome</Bold>. The virus that causes AIDS is the <Bold>Human Immunodeficiency Virus (HIV)</Bold>. HIV is a pathogen that causes an STI.</div>
        <div style={{ marginTop: 6 }}>Years may pass between infection and the appearance of symptoms. People may carry the virus without symptoms but can still infect others. It is not certain what proportion of HIV-positive people eventually develop AIDS — perhaps 30–50% or more.</div>

        <Sub>6.2 Transmission of HIV</Sub>
        <ul style={{ paddingLeft: 18, marginTop: 4 }}>
          <li><Bold>Sexual contact</Bold> with an infected person (unprotected sex with infected men or women).</li>
          <li><Bold>Shared needles</Bold> among intravenous drug users — needles contaminated with infected blood.</li>
          <li><Bold>Mother → baby</Bold> — across the placenta in the uterus, during birth (contact with blood), or via breastmilk. The risk varies (e.g. ~40% in some parts of Africa, ~14% in Europe). Drug therapy for the mother during labour and for the baby within 3 days of birth reduces this risk.</li>
          <li><Bold>Blood products</Bold> — historically a problem for haemophiliacs receiving clotting factor; now screened.</li>
        </ul>
        <div style={{ marginTop: 6 }}>HIV is NOT spread by saliva, droplets or normal everyday contact.</div>

        <Sub>6.3 Effect of HIV on the immune system  EXT</Sub>
        <div>HIV attacks certain kinds of <KW c={G}>lymphocytes</KW>, the white blood cells that make antibodies. As lymphocyte numbers fall, the body can no longer respond effectively to infections. The patient becomes vulnerable to many opportunistic pathogens that would not normally be life-threatening: influenza, pneumonia, blood disorders, skin cancer, or damage to the nervous system. This is AIDS.</div>
        <div style={{ marginTop: 6 }}><Bold>How HIV evades the immune system (SME):</Bold> Lymphocytes normally seek out and destroy pathogens, producing antibodies. However, HIV avoids being recognised by <KW c={G}>repeatedly changing its protein coat (its surface antigens)</KW> — memory cells and antibodies from a previous encounter no longer "match" the new shape. This means the virus can survive long enough to find and infect lymphocytes.</div>
        <div style={{ marginTop: 6 }}><Bold>The 4-step infection cycle (SME diagram):</Bold></div>
        <ol style={{ paddingLeft: 18, marginTop: 4 }}>
          <li><Bold>HIV attaches</Bold> to receptors on a CD4 T-lymphocyte.</li>
          <li>HIV <Bold>injects its genetic material</Bold> into the lymphocyte — the cell becomes a HOST cell.</li>
          <li>HIV uses the lymphocyte's <Bold>cellular machinery</Bold> (ribosomes, enzymes) to make many copies of itself.</li>
          <li>The new HIV particles bud out and the host cell is <Bold>destroyed</Bold>. Released viruses then infect more lymphocytes.</li>
        </ol>
        <div style={{ marginTop: 6 }}><Bold>Early symptoms:</Bold> immediately after infection, mild flu-like symptoms may appear; these pass, and for a period of time infected people may not know they are infected (which is why they may unknowingly transmit the virus).</div>

        <Sub>6.4 Control of the spread of STIs</Sub>
        <ul style={{ paddingLeft: 18, marginTop: 4 }}>
          <li>Avoid sexual intercourse with someone who might be infected (faithful relationship with one uninfected partner).</li>
          <li>Use of a <Bold>condom</Bold> (or femidom for women) — acts as a physical barrier to bacteria and viruses.</li>
          <li>Avoid sharing needles.</li>
          <li>Early <Bold>treatment</Bold> — antiretroviral drugs slow the progress of HIV; no cure exists yet. All sexual contacts of an infected person must also be treated.</li>
          <li>Treatment is confidential to encourage people to come forward.</li>
        </ul>
        <div style={{ marginTop: 6 }}><Bold>Important:</Bold> bacterial STIs (e.g. syphilis, gonorrhoea) can be treated with antibiotics. But HIV is a VIRUS, so antibiotics will not work — only antiviral drugs slow it.</div>
      </Section>

      <div style={{ marginTop: 14, padding: "12px 16px", background: GL, borderRadius: 10, fontSize: 12, color: G, border: `1.5px solid ${G}` }}>
        🌱 <Bold>Summary of Chapter 16:</Bold> Reproduction = continuation of the species. Asexual = one parent → identical clones (fast, no variation). Sexual = two gametes fuse → varied offspring (slow, adaptable). Plants reproduce both ways; mammals only sexually. Pollination + fertilisation in plants involves a pollen tube reaching the ovule via the micropyle. In humans, sperm fertilises egg in the oviduct; the embryo implants and is supported by the placenta. The menstrual cycle is run by FSH, oestrogen, LH and progesterone. STIs like HIV spread through sexual contact and shared blood — prevention is by barrier contraception, faithfulness and early treatment.
      </div>
    </div>
  );
}
