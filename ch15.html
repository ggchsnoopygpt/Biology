<style>

  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }

  /* ═══════════════════════════════════════════════════════════════════════

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 15,
  title: "Drugs",
  subtitle: "Drug definition · Antibiotics · Bacteria vs viruses · Resistance · MRSA",
  flashcardCount: 41,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.15
// ════════════════════════════════════════════════════════════════════════════

function ArrowDefs() {
  return (
    <defs>
      <marker id="arrowG15" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={G}/>

      <marker id="arrowR15" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={RD}/>
      </marker>
      <marker id="arrowP15" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={PU}/>
      </marker>
      <marker id="arrowA15" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">

}

// ── Diagram 1: What is a drug? (overview) ────────────────────────────────────
function DrugOverviewDiagram() {
  return (
    <svg viewBox="0 0 700 320" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <ArrowDefs/>
      <rect width="700" height="320" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        What is a Drug?
      </text>

      {/* Central definition box */}
      <rect x="180" y="50" width="340" height="60" rx="10" fill={GL} stroke={G} strokeWidth="2"/>
      <text x="350" y="72" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>DRUG</text>
      <text x="350" y="90" textAnchor="middle" fontSize="11" fill={GR}>Any substance taken into the body that</text>
      <text x="350" y="103" textAnchor="middle" fontSize="11" fill={GR}>modifies or affects chemical reactions in it</text>

      {/* Two branches: medicinal vs other */}
      <line x1="280" y1="110" x2="180" y2="160" stroke={G} strokeWidth="2" markerEnd="url(#arrowG15)"/>
      <line x1="420" y1="110" x2="520" y2="160" stroke={AM} strokeWidth="2" markerEnd="url(#arrowA15)"/>

      {/* Left: medicinal drugs */}
      <rect x="40" y="165" width="280" height="125" rx="10" fill={GL} stroke={G} strokeWidth="2"/>
      <text x="180" y="185" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>MEDICINAL DRUGS</text>
      <text x="180" y="200" textAnchor="middle" fontSize="10" fontStyle="italic" fill="#666">used to treat disease</text>
      <text x="55" y="220" fontSize="10" fill={GR}>• Antibiotics — kill bacteria</text>
      <text x="55" y="236" fontSize="10" fill={GR}>• Painkillers — reduce pain</text>
      <text x="55" y="252" fontSize="10" fill={GR}>• Antihistamines — allergies</text>
      <text x="55" y="268" fontSize="10" fill={GR}>• Vaccines (preventive)</text>
      <text x="55" y="284" fontSize="9" fontStyle="italic" fill="#888">Liver = primary site of metabolism</text>

      {/* Right: non-medicinal */}
      <rect x="380" y="165" width="280" height="125" rx="10" fill={AL} stroke={AM} strokeWidth="2"/>

      <text x="395" y="284" fontSize="9" fontStyle="italic" fill="#888">stimulation, sleep, hallucinations</text>
    </svg>
  );
}

// ── Diagram 2: How penicillin works ──────────────────────────────────────────
function PenicillinActionDiagram() {
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>

      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>

      </text>

      {/* LEFT: healthy bacterium */}
      <text x="160" y="55" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>1. Normal bacterium</text>
      <ellipse cx="160" cy="180" rx="80" ry="55" fill="#fdb6c0" stroke={RD} strokeWidth="3"/>
      <ellipse cx="160" cy="180" rx="65" ry="40" fill="#a8e1d8" stroke="none"/>
      <path d="M 140 165 Q 165 150 180 170 Q 175 195 155 200 Q 135 195 140 165" fill="#b5540a" opacity="0.7"/>
      <circle cx="135" cy="195" r="3" fill="#5b3fa6" opacity="0.6"/>
      <circle cx="180" cy="190" r="2.5" fill="#5b3fa6" opacity="0.6"/>
      <circle cx="170" cy="170" r="2" fill="#5b3fa6" opacity="0.6"/>

      {/* Labels for normal bacterium */}
      <line x1="60" y1="130" x2="100" y2="155" stroke={RD} strokeWidth="1"/>
      <text x="58" y="125" textAnchor="end" fontSize="10" fill={RD} fontWeight="600">cell wall</text>
      <line x1="265" y1="180" x2="230" y2="180" stroke={GR} strokeWidth="1"/>
      <text x="270" y="183" fontSize="10" fill={GR}>cytoplasm</text>
      <text x="160" y="270" textAnchor="middle" fontSize="9" fontStyle="italic" fill="#666">cell wall keeps bacterium intact</text>

      {/* Penicillin molecules being added */}
      <circle cx="260" cy="110" r="8" fill={GM}/>
      <circle cx="290" cy="135" r="8" fill={GM}/>
      <circle cx="270" cy="155" r="8" fill={GM}/>
      <text x="280" y="92" textAnchor="middle" fontSize="10" fontWeight="700" fill={G}>penicillin</text>

      {/* Arrow centre */}

                <th style={{ padding: "6px 8px", textAlign: "left" }}>Feature</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Bacterium</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Virus</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Cellular?",        "Yes — prokaryotic cell",        "No — not a cell"],
                ["Size",              "~1–10 µm",                      "~20–300 nm (≈100× smaller)"],
                ["Cell wall",         "Present (target of penicillin)","Absent (only a protein coat)"],
                ["Cell membrane",     "Present",                       "Absent (just capsid; some have envelope)"],
                ["Ribosomes",         "Has its own (different from animal cells)", "None — uses host's ribosomes"],
                ["DNA / RNA",         "DNA in cytoplasm (+ plasmids)", "DNA OR RNA, inside protein coat"],
                ["Reproduction",      "Binary fission, independently", "Only inside a host cell"],
                ["Antibiotic effect", "Killed / blocked",              "NOT AFFECTED"],
              ].map((r, i) => (
                <tr key={i} style={{ background: i % 2 ? "#faf8ff" : "#fff" }}>
                  {r.map((c, j) => <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>{c}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background: RL, borderRadius: 8, padding: "10px 14px", marginTop: 12, fontSize: 12, lineHeight: 1.65, color: "#3a0000" }}>
          <strong style={{ color: RD }}>Bottom line:</strong> Antibiotics work by attacking structures and processes that are present in BACTERIA but absent (or completely different) in viruses. Prescribing antibiotics for a viral infection helps nobody — and risks promoting resistance.
        </div>
      </Sec>

      <Sec id="s4" title="④ Antibiotic Resistance — how it develops (EXT)">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A bacterium becomes <KW c={PU}>antibiotic-resistant</KW> when it can survive exposure to an antibiotic that would normally kill it or stop it from reproducing.
        </p>
        <ResistanceMechanismDiagram />
        <div style={{ background: PL, borderRadius: 8, padding: "10px 14px", marginTop: 10, fontSize: 12, lineHeight: 1.7, color: "#3a2a6a" }}>
          <strong style={{ color: PU }}>The natural-selection sequence:</strong><br/>
          1. <Bold>Variation</Bold> — random mutation creates a rare allele giving resistance. <Ext/><br/>
          2. <Bold>Selection</Bold> — antibiotic kills susceptible cells; resistant mutants survive.<br/>
          3. <Bold>Reproduction</Bold> — survivors multiply rapidly; resistance passed to all offspring.<br/>
          4. <Bold>Spread</Bold> — resistance alleles can transfer between bacteria on <Bold>plasmids</Bold> (even between species).<br/>
          5. <Bold>Result</Bold> — antibiotic becomes less effective.
        </div>
        <div style={{ marginTop: 12 }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Factors that ACCELERATE resistance:</strong>
          <ul style={{ marginTop: 0, paddingLeft: 20, fontSize: 13, color: GR, lineHeight: 1.65 }}>
            <li><Bold>Over-prescription</Bold> — antibiotics for viral infections; "just in case" prescribing.</li>
            <li><Bold>Patients not completing the course</Bold> — survivors more likely to be tough/resistant.</li>
            <li><Bold>Diluted doses / wrong duration</Bold> — partial killing breeds resistance.</li>
            <li><Bold>Routine use in farming</Bold> — antibiotics in feed for healthy livestock; selects for resistance in farm bacteria.</li>
            <li><Bold>Poor hospital hygiene</Bold> — lets resistant strains (like MRSA) spread.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="s5" title="⑤ MRSA, Prevention & Going Further (Fleming)">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          <KW c={RD}>MRSA</KW> = <Bold>Methicillin-Resistant <em>Staphylococcus aureus</em></Bold>. <em>S. aureus</em> usually lives harmlessly on skin, nose and throat — but becomes dangerous when it enters the bloodstream (e.g. through wounds in hospital), where it can cause <Bold>blood poisoning</Bold>.
        </p>
        <PreventionFlowDiagram />
        <div style={{ background: AL, borderRadius: 8, padding: "10px 14px", marginTop: 10, fontSize: 12, lineHeight: 1.7, color: "#5a3a00" }}>
          <strong style={{ color: AM }}>Key prevention messages — exam favourite:</strong><br/>
          • <Bold>Only when essential</Bold> — antibiotics not for colds, flu, viral sore throats.<br/>
          • <Bold>Complete the FULL course</Bold> — even when you feel better.<br/>
          • <Bold>Hospital hygiene</Bold> — handwashing, sterilisation, isolation of MRSA patients.<br/>
          • <Bold>Don't share or stockpile</Bold> antibiotics.<br/>
          • <Bold>Restrict farming use</Bold> — no routine antibiotics in healthy livestock.<br/>
          <em>Why these work:</em> they reduce both <KW c={AM}>selection</KW> (less antibiotic exposure) and <KW c={AM}>transmission</KW> (less spread of resistant strains).
        </div>
        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 6 }}>Going further — Fleming &amp; the discovery of penicillin <Ext/></strong>
        </div>
        <FlemingDiscoveryDiagram />
        <div style={{ background: GL, borderRadius: 8, padding: "10px 14px", marginTop: 10, fontSize: 12, lineHeight: 1.7 }}>
          <Bold>1928:</Bold> Fleming noticed a clear bacteria-free zone around a mould contaminant on a <em>Staphylococcus</em> plate → identified the mould as <em>Penicillium notatum</em> and named the active substance <KW>penicillin</KW>.<br/>
          <Bold>1939:</Bold> Florey &amp; Chain (Oxford) purified it into a stable, freeze-dried powder usable as a medicine.<br/>
          <Bold>1940s:</Bold> WWII drove mass production; many lives saved from wound infections.<br/>
          <Bold>Later:</Bold> chemists modified the molecule (e.g. ampicillin); soil microbes yielded streptomycin, chloramphenicol, tetracyclines — the modern arsenal.
        </div>
      </Sec>
    </div>
  );
}

      {/* ───── Section 1: Drugs ───── */}
      <Sec id="t1" title="1 · What is a Drug?" page="241">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Earlier chapters showed that the body works hard to keep its internal conditions steady (<KW>homeostasis</KW>). Sometimes the balance is upset — often by a <Bold>pathogen</Bold> such as a bacterium or virus. Scientists have developed many <KW>drugs</KW> to relieve symptoms or, in some cases, kill the pathogen.
        </p>
        <div style={{ marginTop: 8 }}>
          <Def term="Drug">Any <Bold>substance taken into the body</Bold> that <Bold>modifies or affects chemical reactions</Bold> in the body.</Def>
        </div>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 8 }}>
          Drugs can be <KW>medicinal</KW> (legally used to reduce symptoms or to treat a bacterial infection — e.g. <Bold>antibiotics</Bold>) or <KW c={AM}>non-medicinal</KW>. Drugs are also present in many everyday products: <KW>caffeine</KW> in tea, coffee and energy drinks; <KW>nicotine</KW> in tobacco; <KW>alcohol</KW> in alcoholic drinks. Some drugs are <Bold>illegal</Bold> and used recreationally (for stimulation, sleep, or hallucinations).
        </p>
        <DrugOverviewDiagram />
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Any substance used in <Bold>medicine</Bold> to help the body fight illness or disease is a drug. The <KW>liver</KW> is the body's primary site for drug metabolism — chemically breaking drugs down so they can be excreted.
        </p>
        <Tip>
          The exam definition of "drug" is broad on purpose — caffeine and alcohol both count. Don't restrict yourself to "medicines prescribed by a doctor".
        </Tip>
        <TY qs={[
          "Define the term 'drug'.",
          "Name three non-medicinal drugs found in everyday products and the products they appear in.",
        ]}/>
      </Sec>

      {/* ───── Section 2: Antibiotics — what they do ───── */}
      <Sec id="t2" title="2 · Antibiotics — what they are & how they kill bacteria" page="241">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          The "ideal" drug for curing a disease would <Bold>destroy the pathogen without harming the host's tissues</Bold>. For bacterial infections, modern antibiotics like <KW>penicillin</KW> come close to that ideal.
        </p>
        <div style={{ marginTop: 8 }}>
          <Def term="Antibiotics">Chemical substances <Bold>produced by certain fungi or bacteria</Bold> that affect bacterial cells — by disrupting their structure or function, or by stopping them from reproducing.</Def>
        </div>

        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 10 }}>
          A tiny minority of bacteria are <KW>pathogenic</KW> (harmful) — antibiotics attack them in several different ways:
        </p>
        <ul style={{ marginTop: 6, paddingLeft: 20, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <li>Some disrupt the production of the bacterial <Bold>cell wall</Bold> — preventing reproduction or causing the cell to burst open as it grows.</li>
          <li>Some interfere with <Bold>protein synthesis</Bold> at bacterial ribosomes — stopping bacterial growth.</li>
          <li>Some block <Bold>DNA replication</Bold> — preventing bacteria from dividing.</li>
        </ul>

        <PenicillinActionDiagram />

        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 10 }}>
          Animal cells <Bold>do not have cell walls</Bold>, and the cell structures involved in protein synthesis are <Bold>different</Bold> from those in bacteria. As a result, antibiotics generally do <Bold>not damage human cells</Bold> — although some side-effects (e.g. allergic reactions) can occur.
        </p>
        <Tip>
          Don't say "antibiotics kill the disease" — they kill the BACTERIA causing the disease. Precision matters for marks.
        </Tip>
        <TY qs={[
          "Name three different ways in which antibiotics can attack bacteria.",
          "Why do antibiotics generally not damage human cells?",
        ]}/>
      </Sec>

      {/* ───── Section 3: Antibiotics & viruses ───── */}
      <Sec id="t3" title="3 · Antibiotics and Viral Diseases" page="241–242">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Antibiotics are <Bold>not effective</Bold> in the treatment of diseases caused by <KW c={RD}>viruses</KW>. When a patient with, for example, a throat infection visits the doctor, the doctor looks at the symptoms and decides whether they are caused by a virus or a bacterium. It is pointless to prescribe antibiotics if the symptoms are caused by a virus — and doing so would <Bold>also risk reducing the effectiveness</Bold> of the antibiotic.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          The reason antibiotics are not effective against viral diseases is that <Bold>antibiotics work by disrupting bacterial structures</Bold> like cell walls and membranes, or processes such as protein synthesis and DNA replication. Viruses have <Bold>totally different characteristics</Bold> to bacteria — no cell wall, no ribosomes of their own, no metabolism outside a host cell — so antibiotics have nothing to attack.
        </p>

        <BacteriaVsVirusDiagram />

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 6 }}>Bacteria vs Viruses — feature-by-feature</strong>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: G, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Feature</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Bacterium</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Virus</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Cellular?",        "Yes — a prokaryotic cell",      "No — not a cell"],
                ["Size",             "~1–10 µm",                       "~20–300 nm"],
                ["Cell wall",        "Yes (peptidoglycan)",            "No (only a protein coat / capsid)"],
                ["Cell membrane",    "Yes",                            "No (some have an envelope from host)"],
                ["Cytoplasm",        "Yes",                            "No"],
                ["Ribosomes",        "Yes (prokaryotic type)",         "No — uses host's"],
                ["Genetic material", "DNA in cytoplasm + plasmids",    "DNA or RNA inside capsid"],
                ["Reproduction",     "Binary fission, independently",  "Only inside a host cell"],
                ["Antibiotic effect","Killed / blocked",               "NOT AFFECTED"],
              ].map((r, i) => (
                <tr key={i} style={{ background: i % 2 ? "#f6fbf6" : "#fff" }}>
                  {r.map((c, j) => <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>{c}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <Tip>
          When asked "Why don't antibiotics work on viruses?", give a STRUCTURAL reason (no cell wall, no own ribosomes) — not just "viruses are different".
        </Tip>
        <TY qs={[
          "Why is it pointless for a doctor to prescribe antibiotics for a viral sore throat?",
          "Give two structural differences between a virus and a bacterium that explain why antibiotics don't affect viruses.",
        ]}/>
      </Sec>

      {/* ───── Section 4: Development of resistant bacteria (EXT) ───── */}
      <Sec id="t4" title="4 · Development of Antibiotic-Resistant Bacteria" page="242" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          A course of antibiotics is given to a patient to destroy bacteria. If the patient does <Bold>not complete the course</Bold>, some of the bacteria will not be killed. However, those that survive have been EXPOSED to the drug — and some of the survivors may be <KW c={PU}>drug-resistant mutants</KW>. When they reproduce, all their offspring will have the resistance, so the antibiotic will become less effective.
        </p>

        <ResistanceMechanismDiagram />

        <div style={{ marginTop: 10 }}>
          <Def term="Resistance">Antibiotic resistance occurs when bacteria <Bold>survive exposure</Bold> to an antibiotic that would normally kill them or inhibit their growth.</Def>
        </div>

        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 10 }}>
          Not all bacteria are killed by antibiotics. Some bacteria have the ability to <Bold>mutate</Bold> into forms that are resistant to these drugs. For this reason, it is important <Bold>not</Bold> to use antibiotics in a diluted form, for too short a period, or for minor complaints. These practices lead to a <Bold>build-up of a resistant population</Bold> of bacteria.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Antibiotic resistance reduces the effectiveness of antibiotics. Also, antibiotic drug resistance can be passed from <Bold>harmless bacteria to pathogens</Bold> — often via <KW c={PU}>plasmids</KW> (small circles of DNA that can move between bacteria, even between different species).
        </p>

        <div style={{ background: PL, borderRadius: 8, padding: "10px 14px", marginTop: 12, fontSize: 12, lineHeight: 1.7, color: "#3a2a6a" }}>
          <strong style={{ color: PU }}>Why "only when essential" works:</strong> Antibiotic use can increase the probability that a resistant population of bacteria will arise because:<br/>
          • the antibiotics <Bold>kill any non-resistant individuals</Bold>;<br/>
          • the randomly occurring alleles that code for resistance become <Bold>highly advantageous</Bold>;<br/>
          • the resistance alleles are more likely to <Bold>spread to other individuals</Bold>.<br/>
          So using antibiotics only when truly needed <Bold>reduces selection pressure</Bold> and therefore <Bold>limits antibiotic resistance</Bold>.
        </div>

        <Tip>
          A common exam slip: "Antibiotics cause bacteria to become resistant." Wrong — antibiotics SELECT for the resistant mutants that already exist; they don't CREATE resistance. Resistance comes from random mutation.
        </Tip>
        <TY qs={[
          "Explain why patients are told to complete the full course of antibiotics.",
          "Starting with a single mutant bacterium that reproduces every 20 minutes, calculate how long it would take to produce over one million resistant cells.",
        ]}/>
      </Sec>

      {/* ───── Section 5: MRSA & "Superbugs" ───── */}
      <Sec id="t5" title="5 · MRSA — A Famous Superbug" page="242" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          <KW c={RD}>MRSA</KW> — <Bold>methicillin-resistant <em>Staphylococcus aureus</em></Bold> — is one type of bacterium that has developed resistance to several widely used antibiotics. These bacteria are sometimes called <KW c={RD}>superbugs</KW> because they are so difficult to treat.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <em>S. aureus</em> is very common and lives harmlessly on the skin, nose and throat, sometimes causing mild infections. It becomes dangerous if there is a <Bold>break in the skin</Bold>. Then, the bacterium can get into the <Bold>bloodstream</Bold> to infect internal organs and cause <KW c={RD}>blood poisoning</KW>. This can happen in hospitals during operations, especially if hygiene precautions are not good enough.
        </p>

        <div style={{ background: RL, borderRadius: 8, padding: "10px 14px", marginTop: 10, fontSize: 12, lineHeight: 1.65, color: "#3a0000" }}>
          <strong style={{ color: RD }}>To reduce the risk of resistant strains developing:</strong><br/>
          • Doctors are now <Bold>much more cautious</Bold> about prescribing antibiotics — only when truly necessary.<br/>
          • Patients are made <Bold>aware</Bold> of the importance of completing a course.<br/>
          • Hospitals strengthen <Bold>hygiene practices</Bold> (handwashing, sterilisation, isolation of MRSA-positive patients).<br/>
          Again, this reduces the risk of resistant strains developing and spreading.
        </div>

        <Tip>
          Don't say "MRSA is resistant to all antibiotics" — it's resistant to MANY commonly used ones (especially methicillin and similar drugs). Specialist alternatives may still work, but they're often the last line of defence.
        </Tip>
      </Sec>

      {/* ───── Section 6: Prevention strategies ───── */}
      <Sec id="t6" title="6 · Preventing Resistance — Who Does What" page="242–244">
        <PreventionFlowDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 6 }}>Three groups of people share the responsibility:</strong>
          <ul style={{ paddingLeft: 20, marginTop: 6 }}>
            <li><Bold>Doctors</Bold> — diagnose carefully (bacterial vs viral); prescribe only when essential; choose the right antibiotic for the species.</li>
            <li><Bold>Patients</Bold> — <Bold>always complete the full course</Bold>; take correct doses at correct times; don't share or stockpile; don't pressure for unnecessary prescriptions.</li>
            <li><Bold>Hospitals &amp; farmers</Bold> — strict hygiene; isolate resistant cases; avoid routine antibiotic use in healthy livestock.</li>
          </ul>
        </div>
        <Tip>
          The exam favourite is "Explain how using antibiotics only when essential limits MRSA." Frame your answer around <Bold>selection pressure</Bold>: less use → less selection → fewer resistant mutants surviving and multiplying.
        </Tip>
        <TY qs={[
          "Outline three actions hospitals can take to reduce MRSA infections.",
          "Explain why routine antibiotic use in farming is a public-health concern.",
        ]}/>
      </Sec>

      {/* ───── Section 7: Going Further — Fleming & the history of antibiotics ───── */}
      <Sec id="t7" title="7 · Going Further — Fleming & the History of Antibiotics" page="243" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Before 1934 there were few effective drugs. Some plant-based preparations were useful — <Bold>quinine</Bold> (from a tree bark) treated malaria; <Bold>aspirin</Bold> (salicylic acid) was originally from willow bark. In 1935, a group of chemicals called <Bold>sulfanilamides</Bold> proved effective against some bacterial diseases like blood poisoning, pneumonia and septic wounds.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <KW>Alexander Fleming (1881–1955)</KW> discovered <Bold>penicillin in 1928</Bold>, seven years before sulfanilamides were used — but he could not purify it or test it on humans. Fleming was a bacteriologist in a London hospital studying different strains of <em>Staphylococcus</em>. He had left agar-plate cultures on the bench during a four-week holiday. When he returned, he noticed that one plate had been <Bold>contaminated by a mould fungus</Bold>, and that around the edges of the mould there was a <Bold>clear zone with no bacteria growing</Bold>.
        </p>

        <FlemingDiscoveryDiagram />

        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 10 }}>
          Fleming concluded that a substance had <Bold>diffused out of the mould colony</Bold> and killed the bacteria. The mould was identified as <em>Penicillium notatum</em>, and he called the antibacterial chemical <KW>penicillin</KW>. Fleming grew the mould on a liquid meat broth, and showed that the broth contained penicillin — which stopped the growth of a wide range of bacteria.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Two research assistants tried to obtain a pure sample, free from the other broth substances. Although they succeeded, the method was <Bold>awkward and the product was unstable</Bold>. Fleming decided that penicillin would be too difficult to extract and too unstable to be of medical value.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          In 1939, <KW>Howard Florey</KW> (a pathologist) and <KW>Ernst Chain</KW> (a biochemist), working at <Bold>Oxford University</Bold>, succeeded in preparing reasonably pure penicillin and making it <Bold>stable</Bold>. This was achieved by <Bold>freeze-drying</Bold> — producing a stable, water-soluble powder form. <Bold>World War II</Bold> created a huge demand to produce large quantities of penicillin; doing this certainly saved many lives that would otherwise have been lost to infected wounds.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          After Ernst Chain had worked out the molecular structure, scientists could <Bold>modify penicillin chemically</Bold> — producing new forms (e.g. <Bold>ampicillin</Bold>, which can be swallowed rather than injected). Because penicillin was the product of a mould, chemists searched for other moulds — especially in soils — which might produce antibiotics. Several were discovered, including:
        </p>
        <ul style={{ marginTop: 6, paddingLeft: 20, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Streptomycin</Bold> — for tuberculosis.</li>
          <li><Bold>Chloramphenicol</Bold> — for typhoid.</li>
          <li><Bold>Aureomycin</Bold> and <Bold>terramycin</Bold> — broad-spectrum antibiotics, attacking a wide range of bacteria.</li>
        </ul>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          The ideal drug is one that kills or stops the growth of harmful cells — like bacteria or cancer cells — <Bold>without damaging the body cells</Bold>. Scientists have been trying for years to find a perfect drug that works exclusively on its target cells. For <Bold>bacterial diseases</Bold>, antibiotics nearly achieve perfection. However, the bacteria do seem able to develop <Bold>resistant forms</Bold> after a few years — and the race to discover new antibiotics continues.
        </p>
        <Tip>
          The history is examined under "Going further" — useful for context but rarely worth more than 1–2 marks. Focus your effort on the biology of <Bold>resistance</Bold> and <Bold>why antibiotics don't work on viruses</Bold> — those are the high-value topics.
        </Tip>
      </Sec>
    </div>
  );
}
