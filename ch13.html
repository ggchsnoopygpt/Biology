}

      <g>
        <text x="170" y="56" textAnchor="middle" fontSize="12" fontWeight="700" fill={AM}>STEP 1: FILTRATION (in the capsule)</text>

      {/* === RIGHT panel: reabsorption === */}

      </g>
    </svg>
  );
}

        <rect x="30" y="50" width="320" height="290" rx="10" fill="#e8f4ff" stroke="#1f5fa3" strokeWidth="1.8"/>
        <text x="190" y="72" textAnchor="middle" fontSize="12" fontWeight="700" fill="#1f5fa3">

      </div>

      <div style={{ background: "#fff", border: `1.5px solid ${AM}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: AM, marginBottom: 6 }}>2. URINARY SYSTEM — FOUR STRUCTURES TO LEARN</div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <tbody>
            <tr><td style={{ padding: "4px 8px", fontWeight: 700, color: AM, width: "30%" }}>kidney (×2)</td><td style={{ padding: "4px 8px" }}>filters blood → makes urine</td></tr>
            <tr style={{ background: "#fafafa" }}><td style={{ padding: "4px 8px", fontWeight: 700, color: AM }}>ureter (×2)</td><td style={{ padding: "4px 8px" }}>tube carrying urine from each kidney to the bladder</td></tr>

            <tr style={{ background: "#fafafa" }}><td style={{ padding: "4px 8px", fontWeight: 700, color: AM }}>urethra</td><td style={{ padding: "4px 8px" }}>single tube carrying urine from bladder to outside the body</td></tr>
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: GR, marginTop: 8, fontStyle: "italic" }}>

      <div style={{ background: "#fff", border: `1.5px solid ${G}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>

        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><KW c={G}>cortex</KW> — outer, dark region. <Bold>Glomeruli + capsules live here.</Bold></li>
          <li><KW c={AM}>medulla</KW> — inner, lighter zone. Loops of Henle + collecting ducts pass through.</li>
          <li><KW c={PU}>pelvis</KW> — central funnel/space where urine collects before entering the ureter.</li>
        </ul>
      </div>

      {/* Nephron — EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>

        <div style={{ fontSize: 12, color: GR, lineHeight: 1.6, marginBottom: 6 }}>
          Each kidney has up to <KW c={PU}>~4 million nephrons</KW>. One nephron = glomerulus + renal capsule + renal tubule + blood capillaries.
        </div>
        <ol style={{ margin: "4px 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Glomerulus:</Bold> knot of capillaries inside renal capsule. High blood pressure here.</li>
          <li><Bold>Renal (Bowman&apos;s) capsule:</Bold> cup-shape around glomerulus → collects filtrate.</li>
          <li><Bold>Renal tubule:</Bold> long coiled tube where reabsorption happens.</li>
          <li><Bold>Collecting duct:</Bold> takes the remaining liquid (now URINE) into the pelvis.</li>
        </ol>
      </div>

      {/* Two-step urine formation EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: PU, marginBottom: 8 }}>5. URINE FORMATION — TWO STEPS <Ext/></div>

        <div style={{ background: AL, padding: "8px 10px", borderRadius: 6, marginBottom: 8 }}>

          <ul style={{ margin: "4px 0 0 18px", fontSize: 11.5, color: GR, lineHeight: 1.55 }}>
            <li>VERY high blood pressure forces plasma out of glomerular capillaries into Bowman's capsule.</li>

            <li>TOO BIG to pass: <KW c={RD}>red blood cells</KW> and <KW c={RD}>plasma proteins</KW>.</li>
            <li>Filtrate = plasma <em>without</em> the cells or proteins.</li>
          </ul>
        </div>

        <div style={{ background: PL, padding: "8px 10px", borderRadius: 6 }}>
          <Bold>STEP 2 · SELECTIVE REABSORPTION (along tubule)</Bold>
          <ul style={{ margin: "4px 0 0 18px", fontSize: 11.5, color: GR, lineHeight: 1.55 }}>
            <li>ALL <KW c={G}>glucose</KW> reabsorbed at the <Bold>PCT</Bold> by active transport — none in normal urine.</li>
            <li>SOME <KW c={G}>salts</KW> reabsorbed at the <Bold>Loop of Henle</Bold> (diffusion + active transport).</li>
            <li>MOST <KW c={G}>water</KW> reabsorbed (osmosis) at Loop of Henle + <Bold>collecting duct</Bold>.</li>
            <li>Urea, excess salts, excess water → continue down → URINE.</li>
          </ul>
        </div>
      </div>

      {/* Liver role */}
      <div style={{ background: "#fff", border: `1.5px solid ${AM}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: AM, marginBottom: 6 }}>6. THE LIVER — WHY UREA EXISTS</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li>Amino acids cannot be stored. Excess ones → broken down in the <KW c={AM}>liver</KW>.</li>
          <li><KW c={AM}>Deamination</KW> = removal of the –NH₂ (nitrogen-containing) part.</li>
          <li>–NH₂ → ammonia (very toxic) → quickly converted to <KW>urea</KW> (much less toxic).</li>
          <li>Urea enters the blood → kidneys filter it out → excreted in urine.</li>
          <li>The liver also <Bold>assimilates</Bold> amino acids — building them into proteins (e.g. fibrinogen for clotting). <Ext/></li>
        </ul>
      </div>

      {/* Osmoregulation EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "12px 16px", marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: PU, marginBottom: 6 }}>7. OSMOREGULATION <Ext/> — ADJUSTING WATER BALANCE</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li>Drank lots of water → blood too dilute → kidneys reabsorb <KW c={RD}>LESS</KW> water → <Bold>large volume of pale urine</Bold>.</li>
          <li>Sweated lots / dehydrated → blood too concentrated → kidneys reabsorb <KW c={G}>MORE</KW> water → <Bold>small volume of dark urine</Bold>.</li>
          <li>Result: blood water concentration is kept within narrow limits.</li>
        </ul>
      </div>

      {/* Common confusions */}
      <div style={{ background: RL, border: `2px solid ${RD}`, borderRadius: 8, padding: "12px 16px", marginBottom: 4 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: RD, marginBottom: 8 }}>⚠️ EXAM TRAPS — DO NOT MIX UP</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Excretion ≠ egestion.</Bold> Egestion = undigested food (faeces). Excretion = waste from your own cells.</li>
          <li><Bold>Ureter ≠ urethra.</Bold> ureter = kidney→bladder (×2). urethra = bladder→outside (×1).</li>
          <li><Bold>Urea is made in the LIVER</Bold>, NOT in the kidneys. Kidneys only filter and excrete it.</li>
          <li><Bold>Glucose normally = 0 % in urine.</Bold> If glucose IS in urine → suspect diabetes.</li>
          <li><Bold>Proteins do not appear in urine.</Bold> They&apos;re too big to be filtered out.</li>
          <li>The skin sweats but skin is <KW c={RD}>NOT</KW> an excretory organ — sweating is for temperature, not for controlling blood composition.</li>
          <li><Bold>Reabsorption is SELECTIVE</Bold> and uses ACTIVE TRANSPORT (especially for glucose) — needs energy from respiration.</li>
        </ul>
      </div>
    </div>
  );
}

              <th style={{ padding: "8px 10px", textAlign: "left", color: PU, fontWeight: 700, border: `1px solid ${PU}` }}>Structure</th>
              <th style={{ padding: "8px 10px", textAlign: "left", color: PU, fontWeight: 700, border: `1px solid ${PU}` }}>Number</th>
              <th style={{ padding: "8px 10px", textAlign: "left", color: PU, fontWeight: 700, border: `1px solid ${PU}` }}>Function</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Kidneys</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>2</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Filter blood; make urine</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Ureters</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>2</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Carry urine from KIDNEY → BLADDER</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Bladder</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>1</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Stores urine (~400 cm³); sphincter holds it in</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Urethra</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>1</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Carries urine BLADDER → OUTSIDE</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Renal artery</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>2</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Brings blood (with urea) IN to kidney from aorta</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>Renal vein</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "center" }}>2</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Carries filtered blood OUT of kidney to vena cava</td></tr>
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: GR, marginTop: 8, fontStyle: "italic" }}>
          ⚠️ Two of everything EXCEPT the bladder and urethra. "uretEr" goes to bladder (with an E for Entry); "uretHra" goes out (with H for the Highway out).
        </div>
      </div>

      {/* 3. Kidney internal structure */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 10 }}>3. INSIDE THE KIDNEY — THREE REGIONS</div>
        <KidneySectionDiagram/>
        <ul style={{ margin: "8px 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Cortex</Bold> (outer, dark): contains the <Bold>glomeruli</Bold> and renal capsules — where FILTRATION happens.</li>
          <li><Bold>Medulla</Bold> (inner, lighter): contains the long tubules and collecting ducts — where REABSORPTION is completed.</li>
          <li><Bold>Pelvis</Bold> (funnel): collects urine from collecting ducts → drains into the ureter.</li>
        </ul>
      </div>

      {/* 4. Nephron structure EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>4. THE NEPHRON — FUNCTIONAL UNIT <Ext/></div>
        <NephronDiagram/>
        <div style={{ background: GL, padding: "10px 12px", borderRadius: 6, marginTop: 10, fontSize: 12, color: GR, lineHeight: 1.65 }}>
          <Bold>~4 million nephrons per kidney.</Bold> Each consists of:
          <ul style={{ margin: "6px 0 0 18px" }}>
            <li><KW c={G}>Glomerulus</KW> — a knot of capillaries with HIGH blood pressure.</li>
            <li><KW c={G}>Renal capsule</KW> (Bowman's capsule) — cup wrapping the glomerulus; receives the filtrate.</li>
            <li><KW c={G}>Renal tubule</KW> — long coiled tube where reabsorption occurs.</li>
            <li><KW c={G}>Collecting duct</KW> — gathers urine from many nephrons → pelvis.</li>
          </ul>
        </div>
      </div>

      {/* 5. Ultrafiltration + Selective Reabsorption EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>5. ULTRAFILTRATION &amp; SELECTIVE REABSORPTION <Ext/></div>
        <FiltrationReabsorptionDiagram/>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, marginTop: 8 }}>
          <thead>
            <tr style={{ background: PL }}>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Stage</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Where</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Mechanism</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Substances moved</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ padding: "8px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>ULTRAFILTRATION</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>Glomerulus → Bowman's capsule</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>HIGH BLOOD PRESSURE pushes plasma through the capillary wall</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>OUT: water, glucose, urea, salts, amino acids · NOT OUT: blood cells, plasma proteins (too big)</td>
            </tr>
            <tr style={{ background: "#fafafa" }}>
              <td style={{ padding: "8px", border: `1px solid ${BD}`, fontWeight: 700, color: G }}>SELECTIVE REABSORPTION</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>Glucose at PCT · Salts at Loop of Henle · Water at Loop of Henle + collecting duct</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>ACTIVE TRANSPORT (glucose, ions) · OSMOSIS (water)</td>
              <td style={{ padding: "8px", border: `1px solid ${BD}` }}>BACK IN: ALL glucose · MOST water · SOME salts · LEFT BEHIND: urea + excess water + excess salts = urine</td>
            </tr>
          </tbody>
        </table>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, marginTop: 10, fontSize: 12 }}>
          ⚠️ Glucose in urine = sign that reabsorption failed (e.g. diabetes). ALL glucose should be reabsorbed by active transport at the PCT — it is too valuable to lose, and gates exist nowhere else in the nephron.
        </div>
      </div>

      {/* 6. Urine vs plasma */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>6. URINE vs PLASMA — KEY COMPARISON</div>
        <PlasmaUrineDiagram/>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, marginTop: 8 }}>
          <thead>
            <tr style={{ background: PL }}>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Component (g/100 cm³)</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "center" }}>Plasma</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "center" }}>Urine</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Why?</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Water</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>90–93</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>95</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Most reabsorbed; small surplus excreted</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Proteins</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>7.0</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center", color: RD, fontWeight: 700 }}>0</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>TOO BIG to be filtered out at the glomerulus</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Glucose</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>0.1</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center", color: RD, fontWeight: 700 }}>0</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>ALL reabsorbed by active transport</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Urea</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>0.03</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center", color: G, fontWeight: 700 }}>2.0</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>NOT reabsorbed — concentrated ~60× in urine</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Ions (Na⁺ etc.)</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>0.37</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, textAlign: "center" }}>0.6</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Variable; depends on diet (excess lost)</td></tr>
          </tbody>
        </table>
      </div>

      {/* 7. Liver: deamination + assimilation EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>7. LIVER · DEAMINATION + ASSIMILATION <Ext/></div>
        <DeaminationDiagram/>
        <div style={{ background: GL, padding: "10px 12px", borderRadius: 6, marginTop: 10, fontSize: 12, color: GR, lineHeight: 1.65 }}>
          <Bold>Why does the body MAKE urea?</Bold>
          <ul style={{ margin: "6px 0 0 18px" }}>
            <li>Amino acids CANNOT be stored. Excess amino acids are sent to the LIVER.</li>
            <li><KW c={G}>Deamination</KW>: the −NH₂ group is removed from the amino acid → forms <KW c={AM}>ammonia (toxic)</KW>.</li>
            <li>The remaining carbon chain is used in respiration or converted to glucose/fat.</li>
            <li>Ammonia is immediately converted to <KW c={G}>urea</KW> (less toxic, can be safely transported).</li>
            <li>Urea travels in the blood from liver → kidney, where it is excreted in urine.</li>
          </ul>
          <Bold>Assimilation:</Bold> the liver also uses absorbed amino acids to make plasma proteins like <KW c={AM}>fibrinogen</KW> (for blood clotting).
        </div>
      </div>

      {/* 8. Osmoregulation EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>8. OSMOREGULATION — URINE GETS DARK WHEN YOU'RE THIRSTY <Ext/></div>
        <OsmoregulationDiagram/>
        <div style={{ background: GL, padding: "10px 12px", borderRadius: 6, marginTop: 10, fontSize: 12, color: GR, lineHeight: 1.65 }}>
          The kidney <Bold>varies how much water it reabsorbs</Bold> to keep blood concentration constant.
          <ul style={{ margin: "6px 0 0 18px" }}>
            <li><Bold>Drank a lot of water</Bold> → blood DILUTE → kidney reabsorbs LESS water → <KW c={G}>large volume of PALE urine</KW>.</li>
            <li><Bold>Dehydrated / sweating</Bold> → blood CONCENTRATED → kidney reabsorbs MORE water → <KW c={AM}>small volume of DARK urine</KW>.</li>
            <li>Result: blood water content stays roughly the same.</li>
          </ul>
        </div>
      </div>

      {/* Common confusion box */}
      <div style={{ background: AL, border: `1.5px solid ${AM}`, borderRadius: 8, padding: "12px 16px" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: AM, marginBottom: 8 }}>⚠️ KEY DISTINCTIONS</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Urea is MADE in the LIVER, EXCRETED by the KIDNEY.</Bold> Two different organs — one makes, the other removes.</li>
          <li><Bold>uretER (with E)</Bold> = kidney → bladder. <Bold>uretHra (with H)</Bold> = bladder → outside. Don't swap them.</li>
          <li><Bold>Filtration</Bold> = high BP forces small molecules out. <Bold>Reabsorption</Bold> = useful stuff brought back IN.</li>
          <li><Bold>Glucose</Bold> is reabsorbed by <Bold>ACTIVE TRANSPORT</Bold> — never by simple diffusion. Active = needs ATP from respiration.</li>
          <li><Bold>Excretion ≠ egestion.</Bold> Excretion removes metabolic waste from the body's cells. Egestion removes undigested food that never entered cells.</li>
          <li><Bold>Skin sweat is NOT excretion.</Bold> Sweating is for temperature control. The urea/ions in sweat are too small to count.</li>
        </ul>
      </div>
    </div>
  );
}

// ④ TEXTBOOK TAB (green)
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  const Section = ({ n, title, children }) => (
    <div style={{ background: "#fff", border: `1.5px solid ${G}`, borderRadius: 8, padding: "14px 18px", marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: G, fontWeight: 700, letterSpacing: 1, marginBottom: 2 }}>SECTION {n}</div>
      <div style={{ fontSize: 16, fontWeight: 800, color: G, marginBottom: 10 }}>{title}</div>
      <div style={{ fontSize: 13, color: GR, lineHeight: 1.65 }}>{children}</div>
    </div>
  );

  const SubH = ({ children }) => (
    <div style={{ fontSize: 13, fontWeight: 700, color: G, margin: "10px 0 4px" }}>{children}</div>
  );

  const Def = ({ term, children }) => (
    <div style={{ background: GL, borderLeft: `4px solid ${G}`, padding: "8px 12px", borderRadius: 4, margin: "6px 0 10px", fontSize: 12 }}>
      <Bold>{term}:</Bold> {children}
    </div>
  );

  const Practical = ({ title, children }) => (
    <div style={{ background: "#fff4e6", border: `1.5px solid ${AM}`, borderRadius: 6, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: GR, lineHeight: 1.6 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: AM, marginBottom: 4, letterSpacing: 1 }}>🔬 PRACTICAL / CLINICAL · {title}</div>
      {children}
    </div>
  );

  return (
    <div style={{ background: GL, border: `2px solid ${G}`, borderRadius: 10, padding: "18px 22px" }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: G, marginBottom: 6, letterSpacing: 1 }}>
        📘 TEXTBOOK · HODDER CAMBRIDGE IGCSE BIOLOGY · CHAPTER 13
      </div>
      <div style={{ fontSize: 11, color: GR, marginBottom: 14, fontStyle: "italic" }}>
        Complete notes. Open by topic when something needs deeper revision.
      </div>

      {/* SECTION 1: What is excretion */}
      <Section n="1" title="Excretion: What &amp; Why?">
        <p>
          As cells respire, build proteins, and break down old molecules, they constantly produce <Bold>waste</Bold>. Some of this waste is harmless; much of it is <Bold>toxic</Bold> and must be removed before it builds up to dangerous levels.
        </p>
        <Def term="Excretion">
          The removal from organisms of <Bold>toxic materials</Bold> and the <Bold>waste products of metabolism</Bold> (chemical reactions in cells), as well as <Bold>substances in excess of requirements</Bold>.
        </Def>
        <p>
          The key word in the definition is <Bold>metabolism</Bold> — chemical reactions happening inside the body's own cells. Excretion only refers to substances <em>made by the body</em>. This is why <KW c={RD}>faeces is NOT excretion</KW> — most of the faeces (undigested fibre, bacteria, dead gut-lining cells) was never built into the body. We call its removal <Bold>egestion</Bold>.
        </p>
        <SubH>The three excretory organs</SubH>
        <ExcretoryOrgansDiagram/>
        <ul style={{ margin: "8px 0 0 18px" }}>
          <li><Bold>Lungs</Bold> → excrete <KW>carbon dioxide</KW> (waste from aerobic respiration). Small amount of water vapour is also lost in the breath.</li>
          <li><Bold>Kidneys</Bold> → excrete <KW>urea</KW> (from amino-acid breakdown), excess <KW>water</KW>, and excess <KW>ions</KW> in urine.</li>
          <li><Bold>Liver</Bold> → MAKES urea (and bile pigments from broken-down red blood cells). The liver does not remove these from the body itself — bile pigments leave via bile in the gut, urea leaves via the kidneys.</li>
        </ul>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>The skin is NOT a primary excretory organ.</Bold> Sweat is for COOLING the body (temperature control, Ch.14). A SMALL amount of urea is lost in sweat, but the body could survive perfectly well without it — sweat's role is heat loss, not waste removal.
        </div>

        <SubH>Why CO₂ and urea MUST be excreted</SubH>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Carbon dioxide</Bold> dissolves easily in water to form an <KW c={AM}>acidic solution</KW>. This LOWERS the pH of cells, which reduces the activity of enzymes that control metabolic reactions. Too much CO₂ in the body is therefore TOXIC.</li>
          <li><Bold>Urea</Bold> is also toxic at higher concentrations. If urea is NOT excreted effectively the consequences are severe: <KW c={RD}>cell death</KW>, <KW c={RD}>reduced response to insulin</KW> (potentially leading to diabetes), and <KW c={RD}>deposits in blood vessels</KW>.</li>
        </ul>

        <SubH>Other substances the kidneys remove</SubH>
        <p>
          Although urea is the headline waste, the kidneys actually filter out a wider range of substances from the blood: <Bold>urea, creatinine</Bold> (a waste product from muscle), <Bold>ammonia, uric acid</Bold> (from nucleotide breakdown), <Bold>excess hormones</Bold> (after they have done their job), <Bold>excess water</Bold>, and <Bold>excess salts/ions</Bold> (Na⁺, Cl⁻, K⁺, Mg²⁺, Ca²⁺, HCO₃⁻ and more).
        </p>
      </Section>

      {/* SECTION 2: Urinary system anatomy */}
      <Section n="2" title="The Urinary System">
        <p>
          The <KW>urinary system</KW> is the set of organs responsible for making and storing urine. There are five named structures, four of which come in pairs.
        </p>
        <UrinarySystemDiagram/>
        <SubH>The structures</SubH>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Kidneys</Bold> (×2) — bean-shaped, about 10 cm long, on the back wall of the abdomen, just below the diaphragm. Make urine by filtering blood.</li>
          <li><Bold>Renal artery</Bold> (×2) — branches from the AORTA. Carries blood IN to the kidney. Contains UREA (high), oxygen (high), glucose (high).</li>
          <li><Bold>Renal vein</Bold> (×2) — drains into the VENA CAVA. Carries blood OUT of the kidney. Contains urea (low), oxygen (low).</li>
          <li><Bold>Ureters</Bold> (×2) — narrow muscular tubes. Carry urine from each kidney DOWN to the bladder (peristalsis).</li>
          <li><Bold>Bladder</Bold> (×1) — muscular stretchy sac with capacity of about 400 cm³. Stores urine until urination.</li>
          <li><Bold>Urethra</Bold> (×1) — single tube carrying urine from the bladder to the outside. A ring of muscle (<KW c={AM}>sphincter</KW>) at the top of the urethra normally keeps it closed; relaxing the sphincter allows urination.</li>
        </ul>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>uretER vs uretHRA — exam trap.</Bold> "uretER" has an E → goes to bladder (Entry to bladder). "uretHRA" has H → carries urine out (the Highway out of the body). There are TWO ureters (one from each kidney) but only ONE urethra. Mixing these up is one of the most common spelling/anatomy errors at IGCSE.
        </div>
      </Section>

      {/* SECTION 3: Kidney structure */}
      <Section n="3" title="Inside a Kidney">
        <p>
          Cut a kidney in half lengthwise and you see three distinct regions arranged from outside to inside.
        </p>
        <KidneySectionDiagram/>
        <ul style={{ margin: "8px 0 0 18px" }}>
          <li><Bold>Cortex</Bold> — outer layer, darker red-brown. This is where blood is FILTERED (the glomeruli sit here).</li>
          <li><Bold>Medulla</Bold> — inner layer, paler and striped. Contains the long tubules where REABSORPTION is completed.</li>
          <li><Bold>Pelvis</Bold> — central funnel-shaped space. Collects the finished urine from all the collecting ducts and drains it into the ureter.</li>
        </ul>
        <p style={{ marginTop: 8 }}>
          You should be able to <Bold>identify these three regions on a diagram</Bold> of a kidney section. Examiners often label the regions A, B, C and ask which is which.
        </p>
      </Section>

      {/* SECTION 4: Nephron EXT */}
      <Section n="4" title={<>The Nephron — Functional Unit <Ext/></>}>
        <p>
          Each kidney contains about <KW>4 million nephrons</KW>. A nephron is one microscopic urine-making unit; the kidney is just millions of these working in parallel.
        </p>
        <NephronDiagram/>
        <SubH>The parts of a nephron</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Glomerulus</Bold> — a tight knot of capillaries. The capillary supplying it (<Bold>afferent</Bold>) is WIDER than the one leaving (<Bold>efferent</Bold>); the capillaries inside the glomerulus also get NARROWER as they wind further in. Both effects raise blood pressure inside the glomerulus to a very HIGH value. This pressure is what drives filtration.</li>
          <li><Bold>Bowman's capsule</Bold> (also called the renal capsule) — a hollow cup wrapping around the glomerulus. The filtered liquid (called <KW c={AM}>filtrate</KW>) enters here.</li>
          <li><Bold>Proximal convoluted tubule</Bold> (PCT, also called the "first" convoluted tubule) — site of <Bold>glucose reabsorption by active transport</Bold>. Cells lining the PCT are packed with mitochondria to supply the ATP needed.</li>
          <li><Bold>Loop of Henle</Bold> — the long hairpin loop that dips down into the medulla and back up. Site of <Bold>salt and water reabsorption</Bold>.</li>
          <li><Bold>Distal convoluted tubule</Bold> (DCT, "second" convoluted tubule) — further fine-tuning of ions and water.</li>
          <li><Bold>Collecting duct</Bold> — many nephrons share one collecting duct. <Bold>Final water reabsorption</Bold> happens here under hormonal control (ADH). Drains into the renal pelvis → ureter.</li>
        </ol>
        <p>
          The nephron is wrapped along its whole length by a network of capillaries — they are essential because every reabsorbed molecule has to enter the blood from those capillaries.
        </p>
      </Section>

      {/* SECTION 5: Ultrafiltration + Selective Reabsorption EXT */}
      <Section n="5" title={<>Ultrafiltration &amp; Selective Reabsorption <Ext/></>}>
        <p>Urine is made in TWO sequential steps. Understanding the difference is essential.</p>
        <FiltrationReabsorptionDiagram/>

        <SubH>Step 1: ULTRAFILTRATION (at the glomerulus)</SubH>
        <p>
          The afferent arteriole carries blood INTO the glomerulus. The very high blood pressure inside the glomerulus pushes plasma OUT through the capillary wall and into the Bowman's capsule. Because it is filtration driven by very high pressure through an extremely fine filter, it is called <KW>ultrafiltration</KW>.
        </p>
        <p>
          The capillary wall acts as a sieve, with very small "pores":
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Small enough to pass through</Bold>: water, glucose, amino acids, urea, ions, vitamins.</li>
          <li><Bold>Too big to pass through</Bold>: red blood cells, white blood cells, platelets, plasma proteins.</li>
        </ul>
        <Def term="Glomerular filtrate">
          The fluid in the renal capsule after filtration. Same composition as plasma <Bold>MINUS the cells and the plasma proteins</Bold>.
        </Def>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Finding PROTEIN in urine is a sign of damage.</Bold> If plasma proteins leak through it usually means the glomerular wall has been damaged (e.g. by high blood pressure or kidney disease).
        </div>

        <SubH>Step 2: REABSORPTION (along the renal tubule + collecting duct)</SubH>
        <p>
          The filtrate flows along the renal tubule. Different substances are reabsorbed at <Bold>different sites</Bold> along the nephron — this is why it is called <KW>selective reabsorption</KW>:
        </p>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, marginTop: 6 }}>
          <thead>
            <tr style={{ background: GL }}>
              <th style={{ padding: "6px 8px", textAlign: "left", color: G, fontWeight: 700, border: `1px solid ${G}` }}>Substance</th>
              <th style={{ padding: "6px 8px", textAlign: "left", color: G, fontWeight: 700, border: `1px solid ${G}` }}>How much</th>
              <th style={{ padding: "6px 8px", textAlign: "left", color: G, fontWeight: 700, border: `1px solid ${G}` }}>Where (site)</th>
              <th style={{ padding: "6px 8px", textAlign: "left", color: G, fontWeight: 700, border: `1px solid ${G}` }}>Mechanism</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Glucose</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, color: G, fontWeight: 700 }}>ALL</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Proximal convoluted tubule ONLY</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>ACTIVE TRANSPORT (needs ATP)</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Salts (ions)</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>SOME (variable)</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Loop of Henle</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>DIFFUSION + ACTIVE TRANSPORT</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Water</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>MOST (variable)</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>Loop of Henle + Collecting duct</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}` }}>OSMOSIS (follows the salts)</td></tr>
            <tr><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Urea</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, color: RD, fontWeight: 700 }}>NONE</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontStyle: "italic" }}>— (stays in tubule)</td><td style={{ padding: "6px 8px", border: `1px solid ${BD}`, fontStyle: "italic" }}>— (it is waste)</td></tr>
          </tbody>
        </table>
        <p style={{ marginTop: 8 }}>
          Whatever is LEFT in the tubule at the end is URINE: water, urea, ions, and any other waste. It flows through the collecting duct → renal pelvis → ureter → bladder.
        </p>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>"Active transport" is the magic word for glucose.</Bold> Examiners want you to say (a) glucose is reabsorbed by ACTIVE TRANSPORT and (b) this uses ENERGY FROM RESPIRATION (ATP). Saying "absorbed back into blood" is not enough — you must name the mechanism. Glucose is reabsorbed at the <Bold>PCT only</Bold>: if it gets past the PCT it stays in the filtrate forever (no glucose gates further down).
        </div>

        <Practical title="Testing urine for glucose / protein">
          A normal urine sample should contain <Bold>no glucose</Bold> and <Bold>no protein</Bold>. The presence of either is diagnostic. Glucose can be tested using Benedict's reagent (heat → red-brown precipitate if positive) or a dipstick (clinistix). A positive result usually indicates <Bold>diabetes mellitus</Bold> — when blood glucose is so high that the filtrate glucose exceeds the maximum rate at which the PCT active-transport gates can return it, glucose "spills" into the urine.
        </Practical>
      </Section>

      {/* SECTION 6: Urine composition + Osmoregulation EXT */}
      <Section n="6" title={<>Urine Composition &amp; Osmoregulation <Ext/></>}>
        <p>
          The exact composition of urine changes from minute to minute, depending on what you eat, drink, and how much you sweat.
        </p>
        <PlasmaUrineDiagram/>
        <SubH>Plasma vs Urine — what changed?</SubH>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Water</Bold>: ~ 90 g per 100 cm³ in plasma; ~ 95 g per 100 cm³ in urine. Slightly more concentrated in urine because urea has been added in.</li>
          <li><Bold>Proteins</Bold>: 7 g per 100 cm³ → 0. None enter the filtrate (too big).</li>
          <li><Bold>Glucose</Bold>: 0.1 g per 100 cm³ → 0. All reabsorbed by active transport.</li>
          <li><Bold>Urea</Bold>: 0.03 g per 100 cm³ → 2.0 g per 100 cm³. CONCENTRATED about 60× because water was reabsorbed but urea was not.</li>
          <li><Bold>Ions</Bold>: 0.37 → 0.6 g per 100 cm³. Variable — depends on diet (high salt diet → more salt in urine).</li>
        </ul>

        <SubH>Going further: Osmoregulation</SubH>
        <p>
          The kidney is more than a filter — it also helps maintain a <Bold>constant water balance</Bold> in the body (called osmoregulation). The trick is to adjust how much water is reabsorbed at the collecting duct.
        </p>
        <OsmoregulationDiagram/>
        <ul style={{ margin: "8px 0 0 18px" }}>
          <li><Bold>If you drank a lot of water</Bold> → blood becomes diluted → kidney reabsorbs LESS water → urine is <KW c={G}>LARGE in volume and PALE</KW>.</li>
          <li><Bold>If you sweated a lot or didn't drink</Bold> → blood becomes concentrated → kidney reabsorbs MORE water → urine is <KW c={AM}>SMALL in volume and DARK</KW>.</li>
        </ul>
        <p>
          A hormone called <KW c={AM}>ADH</KW> (anti-diuretic hormone) controls this: more ADH → more water reabsorbed → darker urine. ADH is released from the pituitary gland when the brain detects that the blood is too concentrated.
        </p>
      </Section>

      {/* SECTION 7: Liver — Deamination + Assimilation EXT */}
      <Section n="7" title={<>The Liver — Deamination &amp; Assimilation <Ext/></>}>
        <p>
          The liver is the body's chemistry factory. Two of its many roles connect directly to excretion and the digestion of proteins.
        </p>

        <SubH>Deamination — making urea</SubH>
        <Def term="Deamination">
          The removal of the <Bold>nitrogen-containing part</Bold> (amino group, −NH₂) from an amino acid to form <Bold>ammonia</Bold>, which is then converted to <Bold>urea</Bold> for excretion.
        </Def>
        <DeaminationDiagram/>
        <ol style={{ margin: "8px 0 8px 18px" }}>
          <li><Bold>Excess amino acids</Bold> reach the liver in the hepatic portal vein.</li>
          <li>Amino acids <Bold>cannot be stored</Bold>. The body has no protein "storage organ".</li>
          <li>The −NH₂ group is split off the amino acid by liver enzymes. → <KW c={AM}>ammonia</KW> (NH₃).</li>
          <li>Ammonia is <Bold>very toxic</Bold>, even in small amounts, so it is immediately combined with CO₂ to form <KW c={G}>urea</KW>.</li>
          <li>The <Bold>carbon-containing</Bold> part of the molecule is converted to <KW>glycogen</KW> and stored in the liver (or to glucose / fat if needed).</li>
          <li>Urea travels in the blood (in solution) to the <Bold>kidneys</Bold>, where it is excreted in urine. A small amount is also lost in sweat.</li>
        </ol>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Urea is MADE in the LIVER, EXCRETED by the KIDNEY.</Bold> Two different organs. Examiners love this distinction. Saying "the kidney makes urea" is a mark lost.
        </div>

        <SubH>What happens if urea is NOT excreted properly?</SubH>
        <p>The consequences of high blood urea (e.g. in kidney failure) are very serious:</p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Cell death</Bold> — high urea concentrations directly damage cells.</li>
          <li><Bold>Reduced response to insulin</Bold> — can lead to a diabetes-like state.</li>
          <li><Bold>Deposits inside blood vessels</Bold> — damages the cardiovascular system.</li>
        </ul>

        <SubH>Assimilation — using amino acids</SubH>
        <Def term="Assimilation">
          The movement of digested food molecules into the cells of the body, where they are used to become part of the cells or are used to provide energy.
        </Def>
        <p>
          Amino acids absorbed from the gut travel directly to the liver via the hepatic portal vein. From there, the liver:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>releases some amino acids into general circulation for body cells to use in their own protein synthesis</li>
          <li>uses some itself to manufacture plasma proteins, especially <KW>fibrinogen</KW> (needed for blood clotting, Ch.9)</li>
          <li>sends any excess to deamination as described above</li>
        </ul>
        <p>
          So the liver is centrally involved in BOTH the productive use of amino acids (assimilation) AND the safe disposal of excess ones (deamination).
        </p>
      </Section>
    </div>
  );
}

    { src: "Suppl", q: "Define ASSIMILATION. (EXT)", a: "Assimilation is the MOVEMENT of digested food molecules INTO the cells of the body, where they are used to BECOME PART OF the cells or to provide ENERGY. (E.g. amino acids assimilated in the liver to make plasma proteins.)" },
    { src: "Suppl", q: "Name one specific plasma protein made by the liver from absorbed amino acids. (EXT)", a: "FIBRINOGEN — a soluble plasma protein essential for BLOOD CLOTTING. When tissue is damaged, fibrinogen is converted to insoluble FIBRIN, which forms the mesh of a blood clot. (Other examples: albumin, globulins.)" },
    { src: "Suppl", q: "What happens to the CARBON SKELETON left over after deamination? (EXT)", a: "It can be (a) RESPIRED to release energy directly, (b) CONVERTED TO GLUCOSE and added to blood glucose, or (c) CONVERTED TO FAT and stored. The nitrogen alone (as ammonia → urea) is the part that is excreted." },

    // ── Suppl: clinical / exam booster ──
    { src: "Suppl", q: "What would happen if BOTH kidneys stopped working?", a: "Urea and excess water/ions would build up in the blood, the internal environment would become unstable, and the person would die within days. Treatment options are DIALYSIS (artificial filtering of the blood, several times a week) or a KIDNEY TRANSPLANT." },
    { src: "Suppl", q: "What does it mean if urine is RED or BROWN?", a: "Red/brown urine usually indicates BLOOD or HAEMOGLOBIN in the urine. Possible causes include damage to the kidneys, bladder or urinary tract (e.g. infection, kidney stones, injury, tumour). Should always be investigated medically." },
    { src: "Suppl", q: "Why might an athlete's urine be DARKER after exercise?", a: "Heavy sweating causes water loss. The brain detects more concentrated blood, the pituitary releases more ADH, the collecting duct becomes more permeable to water, more water is reabsorbed, and urine becomes a small volume of dark/concentrated fluid. (No diet change required — just rehydration.)" },
    { src: "Suppl", q: "EXAMINER TRAP: Urea is made in the …", a: "Urea is MADE in the LIVER and EXCRETED by the KIDNEY. Two different organs. Confusing them is one of the most common errors in this chapter. Use the link: 'liver deaminates → makes urea → kidney filters it out → bladder stores → urethra removes'." },
  ];

  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [shuffleSeed, setShuffleSeed] = useState(0);

  // Deterministic shuffle based on seed
  const order = (() => {
    if (shuffleSeed === 0) return cards.map((_, i) => i);
    const arr = cards.map((_, i) => i);
    let seed = shuffleSeed;
    for (let i = arr.length - 1; i > 0; i--) {
      seed = (seed * 9301 + 49297) % 233280;
      const j = Math.floor((seed / 233280) * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  })();

  const card = cards[order[idx]];
  const total = cards.length;

  const next = () => { setFlipped(false); setIdx((idx + 1) % total); };
  const prev = () => { setFlipped(false); setIdx((idx - 1 + total) % total); };
  const shuffle = () => { setFlipped(false); setIdx(0); setShuffleSeed(Date.now() % 1000000 + 1); };
  const reset   = () => { setFlipped(false); setIdx(0); setShuffleSeed(0); };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Header */}
      <div style={{ background: TL, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>🎴 SME Flashcards — Click to flip</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          {total} cards total · <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SME</span> = 18 official Save My Exams cards · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SUPPL</span> = NLCS extra · Tap card to flip
        </div>
      </div>

      {/* Counter + buttons */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 12, color: TL, fontWeight: 700 }}>
          Card {idx + 1} / {total}
          {shuffleSeed !== 0 && <span style={{ color: "#888", marginLeft: 8, fontWeight: 500 }}>(shuffled)</span>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={shuffle} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>🔀 Shuffle</button>
          <button onClick={reset} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${BD}`, background: "#fff", color: "#666" }}>↺ Reset</button>
        </div>
      </div>

      {/* Card */}
      <div
        onClick={() => setFlipped(!flipped)}
        style={{
          background: flipped ? TLL : "#fff",
          border: `2px solid ${TL}`,
          borderRadius: 14,
          padding: "32px 24px",
          minHeight: 220,
          cursor: "pointer",
          textAlign: "center",
          display: "flex",
          flexDirection: "column",
          justifyContent: "center",
          transition: "all .2s",
          boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
          position: "relative",
        }}>
        {/* Source badge - top right */}
        <div style={{ position: "absolute", top: 10, right: 12 }}>
          <span style={{
            background: card.src === "SME" ? TL : "#7a6a40",
            color: "#fff", borderRadius: 3,
            padding: "2px 7px", fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
          }}>
            {card.src === "SME" ? "SME" : "SUPPL"}
          </span>
        </div>
        <div style={{ fontSize: 10, color: TL, fontWeight: 700, letterSpacing: 1, marginBottom: 12 }}>
          {flipped ? "ANSWER" : "QUESTION"}
        </div>
        <div style={{ fontSize: 16, lineHeight: 1.6, color: GR, fontWeight: flipped ? 400 : 600 }}>
          {flipped ? card.a : card.q}
        </div>
        <div style={{ fontSize: 10, color: "#aaa", marginTop: 18, fontStyle: "italic" }}>
          {flipped ? "Tap to see the question" : "Tap to reveal the answer"}
        </div>
      </div>

      {/* Nav buttons */}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 4 }}>
        <button onClick={prev} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>← Prev</button>
        <button onClick={next} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: TL, color: "#fff" }}>Next →</button>
      </div>

      {/* Footer */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: TLL, borderRadius: 8, fontSize: 11, color: TL, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Tip:</Bold> Try answering aloud before flipping. Cards marked <Bold>(EXT)</Bold> are Extended-tier content.
      </div>
    </div>
  );
}
