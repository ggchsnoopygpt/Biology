<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #fafaf7;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .loader { position: fixed; inset: 0; background: #fafaf7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 100; transition: opacity 0.3s; }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-spinner { width: 36px; height: 36px; border: 3px solid #d8f3dc; border-top-color: #2d6a4f; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loader-text { font-size: 13px; color: #888; letter-spacing: 0.5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid #e4e4e0;
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }

  /* ═══════════════════════════════════════════════════════════════════════
     DARK MODE
     ═══════════════════════════════════════════════════════════════════════ */
  html.dark { background: #1a1a1a; }
  html.dark body { background: #1a1a1a; color: #e8e8e8; }
  html.dark .loader { background: #1a1a1a; }
  html.dark .loader-text { color: #999; }
  html.dark .theme-toggle { background: rgba(40, 40, 40, 0.92); border-color: #3a3a3a; }
  html.dark .theme-toggle svg { stroke: #f3d488; }
  html.dark .theme-toggle .icon-sun { display: block; }
  html.dark .theme-toggle .icon-moon { display: none; }

  /* ─── Pure white & off-white backgrounds → dark ─── */
  html.dark #root [style*="background: rgb(255, 255, 255)"],
  html.dark #root [style*="background:#fff"],
  html.dark #root [style*="background: #fff"] {
    background: #2a2a2a !important;
  }
  html.dark #root [style*="rgb(245, 245, 243)"],
  html.dark #root [style*="#f5f5f3"] { background: #232323 !important; }
  html.dark #root [style*="rgb(248, 248, 246)"],
  html.dark #root [style*="#f8f8f6"] { background: #252525 !important; }
  html.dark #root [style*="rgb(250, 250, 247)"],
  html.dark #root [style*="#fafaf7"] { background: #1a1a1a !important; }

  /* ─── Pastel backgrounds (exam cards, flashcard backs) → dark ─── */
  /* RL #fdf0f0 - light red/pink (exam card hard) */
  html.dark #root [style*="rgb(253, 240, 240)"],
  html.dark #root [style*="#fdf0f0"] { background: #2a1a1a !important; color: #e8e8e8 !important; }
  /* AL #fff3e0 - light amber */
  html.dark #root [style*="rgb(255, 243, 224)"],
  html.dark #root [style*="#fff3e0"] { background: #2a200f !important; color: #e8e8e8 !important; }
  /* PL #ede9fe - light purple */
  html.dark #root [style*="rgb(237, 233, 254)"],
  html.dark #root [style*="#ede9fe"] { background: #1f1c2e !important; color: #e8e8e8 !important; }
  /* GL #d8f3dc - light green */
  html.dark #root [style*="rgb(216, 243, 220)"],
  html.dark #root [style*="#d8f3dc"] { background: #182a1e !important; color: #e8e8e8 !important; }
  /* TLL #e6f4f2 - light teal */

  /* Flashcard back: #fffdf6 - cream */

  html.dark #root [style*="#fffdf6"] { background: #2a2820 !important; color: #e8e8e8 !important; }
  /* Exam card backgrounds (e8f7ec, fff4e6, fdf0f0 used in diffMeta.bg) */
  html.dark #root [style*="rgb(232, 247, 236)"],
  html.dark #root [style*="#e8f7ec"] { background: #182a1e !important; color: #e8e8e8 !important; }
  html.dark #root [style*="rgb(255, 244, 230)"],
  html.dark #root [style*="#fff4e6"] { background: #2a200f !important; color: #e8e8e8 !important; }

  /* Default text */
  html.dark #root > div { color: #e8e8e8 !important; }

  /* Grey text → light */
  html.dark #root [style*="color: rgb(61, 61, 61)"],
  html.dark #root [style*="color:#3d3d3d"],
  html.dark #root [style*="color: #3d3d3d"] { color: #e8e8e8 !important; }
  html.dark #root [style*="color: rgb(102, 102, 102)"],
  html.dark #root [style*="color:#666"],
  html.dark #root [style*="color: #666"] { color: #b8b8b8 !important; }
  html.dark #root [style*="color: rgb(136, 136, 136)"],
  html.dark #root [style*="color:#888"],

  html.dark #root [style*="color: rgb(153, 153, 153)"],
  html.dark #root [style*="color:#999"],
  html.dark #root [style*="color: #999"] { color: #888 !important; }

  /* Border default */
  html.dark #root [style*="rgb(228, 228, 224)"],
  html.dark #root [style*="#e4e4e0"] { border-color: #3a3a3a !important; }

  /* Dark text on colored backgrounds (exam card question text "#2a0000") → light */

  html.dark #root [style*="#2a0000"] { color: #f0d4d4 !important; }
  /* Dark amber text on AL background */

  html.dark #root [style*="#2a1000"] { color: #f0d8b5 !important; }
  /* Highlighted dark red */
  html.dark #root [style*="rgb(58, 0, 0)"],
  html.dark #root [style*="#3a0000"] { color: #f0c8c8 !important; }

  /* SVG diagrams: keep white card */

    background: #fff;

  html.dark #root strong[style*="#3d3d3d"] { color: #f0f0f0 !important; }

  /* ═══════════════════════════════════════════════════════════════════════
     TAB COLORS — vibrant neon for the 5 main tab buttons
     ═══════════════════════════════════════════════════════════════════════ */
  /* Tab text color (when not active) */
  html.dark #root button[style*="color: rgb(181, 84, 10)"],
  html.dark #root button[style*="color:#b5540a"],
  html.dark #root button[style*="color: #b5540a"] { color: #ffa726 !important; }
  html.dark #root button[style*="color: rgb(176, 32, 32)"],
  html.dark #root button[style*="color:#b02020"],
  html.dark #root button[style*="color: #b02020"] { color: #ff6b6b !important; }
  html.dark #root button[style*="color: rgb(91, 63, 166)"],
  html.dark #root button[style*="color:#5b3fa6"],
  html.dark #root button[style*="color: #5b3fa6"] { color: #a78bfa !important; }
  html.dark #root button[style*="color: rgb(45, 106, 79)"],
  html.dark #root button[style*="color:#2d6a4f"],
  html.dark #root button[style*="color: #2d6a4f"] { color: #5dcaa5 !important; }
  html.dark #root button[style*="color: rgb(26, 122, 110)"],
  html.dark #root button[style*="color:#1a7a6e"],
  html.dark #root button[style*="color: #1a7a6e"] { color: #5eead4 !important; }

  /* Tab active background */
  html.dark #root button[style*="background: rgb(181, 84, 10)"] { background-color: #ffa726 !important; border-color: #ffa726 !important; }
  html.dark #root button[style*="background: rgb(176, 32, 32)"] { background-color: #ff6b6b !important; border-color: #ff6b6b !important; }
  html.dark #root button[style*="background: rgb(91, 63, 166)"] { background-color: #a78bfa !important; border-color: #a78bfa !important; }
  html.dark #root button[style*="background: rgb(45, 106, 79)"] { background-color: #5dcaa5 !important; border-color: #5dcaa5 !important; }
  html.dark #root button[style*="background: rgb(26, 122, 110)"] { background-color: #5eead4 !important; border-color: #5eead4 !important; }

  /* Active tab: white text → dark text on neon bg */
  html.dark #root button[style*="background: rgb(181, 84, 10)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(176, 32, 32)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(91, 63, 166)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(45, 106, 79)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(26, 122, 110)"][style*="color: rgb(255, 255, 255)"] {
    color: #1a1a1a !important;
  }

  /* Tab borders */
  html.dark #root button[style*="2px solid rgb(181, 84, 10)"] { border-color: #ffa726 !important; }
  html.dark #root button[style*="2px solid rgb(176, 32, 32)"] { border-color: #ff6b6b !important; }
  html.dark #root button[style*="2px solid rgb(91, 63, 166)"] { border-color: #a78bfa !important; }
  html.dark #root button[style*="2px solid rgb(45, 106, 79)"] { border-color: #5dcaa5 !important; }
  html.dark #root button[style*="2px solid rgb(26, 122, 110)"] { border-color: #5eead4 !important; }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 1,
  title: "Characteristics & Classification of Living Organisms",
  subtitle: "MRS GREN · Species & Binomial System · Five Kingdoms · Arthropods · Vertebrates · Viruses",
  flashcardCount: 32,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];
// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS
// ════════════════════════════════════════════════════════════════════════════

function MrsGrenDiagram() {
  const items = [
    { letter: "M", word: "Movement",    desc: "Action causing change of position",        color: "#2d6a4f" },
    { letter: "R", word: "Respiration", desc: "Chemical reactions releasing energy",       color: "#1e6091" },
    { letter: "S", word: "Sensitivity", desc: "Detect & respond to environmental changes", color: "#6a0dad" },
    { letter: "G", word: "Growth",      desc: "Permanent increase in size & dry mass",     color: "#b5540a" },
    { letter: "R", word: "Reproduction",desc: "Produce more of the same organism",         color: "#c0392b" },
    { letter: "E", word: "Excretion",   desc: "Remove waste products of metabolism",       color: "#1a7a6e" },
    { letter: "N", word: "Nutrition",   desc: "Take in materials for energy & growth",     color: "#6d4c41" },
  ];
  return (
    <svg viewBox="0 0 680 320" style={{ width: "100%", maxWidth: 680, display: "block", margin: "10px auto" }}>
      <rect width="680" height="320" rx="12" fill="#f8fffe" stroke={G} strokeWidth="1.5"/>
      <text x="340" y="28" textAnchor="middle" fontFamily="Georgia,serif" fontSize="16" fontWeight="700" fill={G}>
        MRS GREN — 7 Characteristics of Living Organisms
      </text>
      {items.map((item, i) => {
        const x = 20 + (i % 4) * 163;
        const y = i < 4 ? 48 : 188;
        return (
          <g key={i}>
            <rect x={x} y={y} width="150" height="118" rx="8" fill="white" stroke={item.color} strokeWidth="1.5"/>
            <rect x={x} y={y} width="150" height="36" rx="8" fill={item.color}/>
            <rect x={x} y={y + 28} width="150" height="8" fill={item.color}/>
            <text x={x + 22} y={y + 23} fontFamily="Georgia,serif" fontSize="22" fontWeight="900" fill="white">{item.letter}</text>
            <text x={x + 46} y={y + 23} fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill="white">{item.word}</text>
            <text x={x + 10} y={y + 58} fontFamily="sans-serif" fontSize="11" fill={GR} width="130">
              {item.desc.split(" ").reduce((acc, word, wi) => {
                const line = Math.floor(wi / 4);
                if (!acc[line]) acc[line] = [];
                acc[line].push(word);
                return acc;
              }, []).map((line, li) => (
                <tspan key={li} x={x + 10} dy={li === 0 ? 0 : 14}>{line.join(" ")}</tspan>
              ))}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function FiveKingdomDiagram() {
  const kingdoms = [
    { name: "Animal",     features: "Multicellular · No cell wall · No chloroplasts · Ingest food", color: "#c0392b", ex: "Insects, Fish, Mammals" },
    { name: "Plant",      features: "Multicellular · Cellulose cell wall · Chloroplasts · Photosynthesis", color: "#2d6a4f", ex: "Ferns, Flowering plants" },
    { name: "Fungus",     features: "Thread-like hyphae · No chloroplasts · Absorb food externally", color: "#6d4c41", ex: "Mushrooms, Moulds, Yeasts" },
    { name: "Prokaryote", features: "Single cell · No membrane-bound nucleus · Circular DNA", color: "#1e6091", ex: "Bacteria, Blue-green algae" },
    { name: "Protoctist", features: "Single cell · Nucleus present · Varied feeding", color: "#6a0dad", ex: "Amoeba, Euglena, Paramecium" },
  ];
  return (
    <svg viewBox="0 0 680 290" style={{ width: "100%", maxWidth: 680, display: "block", margin: "10px auto" }}>
      <rect width="680" height="290" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="340" y="26" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        The Five-Kingdom Classification Scheme
      </text>
      {kingdoms.map((k, i) => {
        const x = 10 + i * 134;
        return (
          <g key={i}>
            <rect x={x} y="40" width="124" height="230" rx="8" fill="white" stroke={k.color} strokeWidth="1.5"/>
            <rect x={x} y="40" width="124" height="32" rx="8" fill={k.color}/>
            <rect x={x} y="62" width="124" height="10" fill={k.color}/>
            <text x={x + 62} y={60} textAnchor="middle" fontFamily="Georgia,serif" fontSize="13" fontWeight="700" fill="white">{k.name}</text>
            {k.features.split(" · ").map((f, fi) => (
              <text key={fi} x={x + 8} y={96 + fi * 30} fontFamily="sans-serif" fontSize="10" fill={GR}>
                <tspan>• {f}</tspan>
              </text>
            ))}
            <rect x={x + 6} y="218" width="112" height="44" rx="5" fill={k.color + "22"}/>
            <text x={x + 62} y="232" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fontWeight="600" fill={k.color}>Examples:</text>
            <text x={x + 62} y="246" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill={GR}>{k.ex.split(", ")[0]}</text>
            <text x={x + 62} y="258" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill={GR}>{k.ex.split(", ").slice(1).join(", ")}</text>
          </g>
        );
      })}
    </svg>
  );
}

function ArthropodDiagram() {
  const classes = [
    { name: "Insects",    legs: "3 pairs (6)", body: "Head · Thorax · Abdomen", antenna: "1 pair", eyes: "Compound", extra: "Usually 2 pairs wings", color: "#2d6a4f", ex: "Wasp, Dragonfly" },
    { name: "Arachnids",  legs: "4 pairs (8)", body: "Cephalothorax · Abdomen", antenna: "None", eyes: "Simple (several pairs)", extra: "Pedipalps for biting", color: "#c0392b", ex: "Spider, Mite" },
    { name: "Crustacea",  legs: "5+ pairs",    body: "Cephalothorax · Abdomen", antenna: "2 pairs", eyes: "Compound", extra: "Hard exoskeleton", color: "#1e6091", ex: "Crab, Woodlouse" },
    { name: "Myriapods",  legs: "10+ pairs",   body: "Head · Segmented body", antenna: "1 pair", eyes: "Simple", extra: "No thorax/abdomen division", color: "#6d4c41", ex: "Centipede, Millipede" },
  ];
  return (
    <svg viewBox="0 0 680 260" style={{ width: "100%", maxWidth: 680, display: "block", margin: "10px auto" }}>
      <rect width="680" height="260" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="340" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={G}>
        Arthropod Classes — Key Distinguishing Features
      </text>
      {classes.map((c, i) => {
        const x = 10 + i * 168;
        const rows = [
          ["Legs", c.legs], ["Body", c.body], ["Antennae", c.antenna], ["Eyes", c.eyes], ["Special", c.extra]
        ];
        return (
          <g key={i}>
            <rect x={x} y="35" width="158" height="212" rx="8" fill="white" stroke={c.color} strokeWidth="1.5"/>
            <rect x={x} y="35" width="158" height="30" rx="8" fill={c.color}/>
            <rect x={x} y="55" width="158" height="10" fill={c.color}/>
            <text x={x + 79} y={54} textAnchor="middle" fontFamily="Georgia,serif" fontSize="13" fontWeight="700" fill="white">{c.name}</text>
            <text x={x + 79} y="76" textAnchor="middle" fontFamily="sans-serif" fontSize="10" fontStyle="italic" fill="#888">{c.ex}</text>
            {rows.map(([label, val], ri) => (
              <g key={ri}>
                <rect x={x + 6} y={85 + ri * 30} width="50" height="22" rx="3" fill={c.color + "33"}/>

// ── NEW SVG #4: Five Kingdoms Cells side-by-side ────────────────────────────
function FiveKingdomsCells() {
  const cells = [
    { name: "Animal",     fill: "#ffd6e0", wall: false, chloro: false, nucleus: true,  vacuole: false, x: 70  },
    { name: "Plant",      fill: "#c8f7d0", wall: true,  chloro: true,  nucleus: true,  vacuole: true,  x: 220 },
    { name: "Fungal",     fill: "#ffe6c0", wall: true,  chloro: false, nucleus: true,  vacuole: false, x: 370, chitin: true },
    { name: "Protoctist", fill: "#d4e8ff", wall: false, chloro: false, nucleus: true,  vacuole: false, x: 520, flagellum: true },
    { name: "Bacterial",  fill: "#ffd0d0", wall: true,  chloro: false, nucleus: false, vacuole: false, x: 670, plasmid: true },
  ];
  return (
    <svg viewBox="0 0 800 280" style={{ width: "100%", maxWidth: 800, display: "block", margin: "10px auto" }}>
      <rect width="800" height="280" rx="12" fill="#fafffe" stroke={G} strokeWidth="1.5"/>
      <text x="400" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={G}>
        Five Kingdoms — Cell Comparison
      </text>
      {cells.map((c, i) => (
        <g key={i}>
          {/* Cell wall (if any) */}
          {c.wall && (
            <ellipse cx={c.x} cy="140" rx="55" ry="48" fill="none"
              stroke={c.chitin ? "#8b5a2b" : c.name === "Plant" ? "#1a7a3a" : "#b02020"} strokeWidth="3"/>
          )}
          {/* Cell membrane / body */}
          <ellipse cx={c.x} cy="140" rx={c.wall ? 50 : 53} ry={c.wall ? 43 : 46} fill={c.fill} stroke="#444" strokeWidth="1"/>
          {/* Nucleus */}
          {c.nucleus && (
            <>
              <circle cx={c.x - 8} cy="135" r="11" fill="#a02060" opacity="0.85"/>
              <text x={c.x - 8} y="139" textAnchor="middle" fontSize="8" fill="#fff" fontWeight="700">N</text>
            </>
          )}
          {/* Chloroplast */}
          {c.chloro && (
            <ellipse cx={c.x + 18} cy="125" rx="8" ry="5" fill="#1a7a3a"/>
          )}
          {/* Vacuole */}
          {c.vacuole && (
            <circle cx={c.x + 12} cy="155" r="9" fill="#88c8ff" opacity="0.7"/>
          )}
          {/* Plasmid (bacteria) */}
          {c.plasmid && (
            <>
              <circle cx={c.x - 5} cy="138" r="4" fill="none" stroke="#5b3fa6" strokeWidth="1.5"/>
              <path d={`M ${c.x + 5} 130 Q ${c.x + 15} 140 ${c.x + 5} 150 Q ${c.x - 5} 145 ${c.x + 5} 130`} fill="none" stroke="#b02020" strokeWidth="1.5"/>
            </>
          )}
          {/* Flagellum (protoctist) */}
          {c.flagellum && (
            <path d={`M ${c.x + 50} 140 Q ${c.x + 70} 130, ${c.x + 80} 145 T ${c.x + 95} 138`} fill="none" stroke="#444" strokeWidth="1.5"/>
          )}
          {/* Mitochondria (eukaryotes) */}
          {c.nucleus && c.name !== "Bacterial" && (
            <ellipse cx={c.x + 5} cy="118" rx="6" ry="3" fill="#b85c00"/>
          )}
          {/* Label */}
          <text x={c.x} y="208" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>{c.name}</text>
          <text x={c.x} y="222" textAnchor="middle" fontSize="9" fill={GR}>
            {c.name === "Animal"     && "no wall, no chloroplast"}
            {c.name === "Plant"      && "cellulose wall + chloroplast"}
            {c.name === "Fungal"     && "chitin wall, no chloroplast"}
            {c.name === "Protoctist" && "varied; some photosynthesise"}
            {c.name === "Bacterial"  && "no nucleus, has plasmids"}
          </text>
          <text x={c.x} y="234" textAnchor="middle" fontSize="9" fontStyle="italic" fill="#666">
            {c.name === "Animal"     && "multicellular"}
            {c.name === "Plant"      && "multicellular"}
            {c.name === "Fungal"     && "usually multicellular"}
            {c.name === "Protoctist" && "uni- or multicellular"}
            {c.name === "Bacterial"  && "unicellular (prokaryote)"}
          </text>
        </g>
      ))}

          <Bold>Sensitivity</Bold> — detect &amp; respond to stimuli.<br/>
          <Bold>Growth</Bold> — permanent increase in size and <KW>dry mass</KW>.<br/>
          <Bold>Reproduction</Bold> — making more of the same kind.<br/>
          <Bold>Excretion</Bold> — removal of <KW>metabolic waste</KW> &amp; excess substances.<br/>

          <Bold>Binomial system</Bold> — two-part Latin name: <em>Genus species</em>. Genus capitalised, species lowercase, both italic. Universal — no language barriers.
        </div>

          <strong>7 levels mnemonic:</strong> "<Bold>K</Bold>ing <Bold>P</Bold>hilip <Bold>C</Bold>ame <Bold>O</Bold>ver <Bold>F</Bold>or <Bold>G</Bold>ran's <Bold>S</Bold>paghetti" → <KW c={PU}>Kingdom · Phylum · Class · Order · Family · Genus · Species</KW>. The further down, the more features in common.

            <tbody>

                ["Protoctists", "Uni or multi", "Yes", "Some",                "Photosynthesis or feeding"],

        <div style={{ marginTop: 16 }}>

        <div style={{ marginTop: 14 }}>

          <div style={{ marginTop: 8, overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
              <thead>
                <tr style={{ background: PU, color: "#fff" }}>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Group</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Body parts</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Leg pairs</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Antennae</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Myriapods",  "Many segments", "1 per segment", "1 pair"],
                  ["Insects",    "3 (head, thorax, abdomen)", "3 pairs", "1 pair"],
                  ["Arachnids",  "2", "4 pairs", "None"],
                  ["Crustaceans","Segmented", ">4 pairs (gills)", "2 pairs"],
                ].map((row, i) => (
                  <tr key={i} style={{ background: i % 2 ? PL : "#fff" }}>
                    {row.map((c, j) => (
                      <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? PU : GR }}>{c}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </Sec>

      <Sec id="s5" title="⑤ Plants & Viruses (EXT) + Revision Checklist">
        <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Plant Kingdom — Ferns vs Flowering plants</strong>
        <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          <Bold>Ferns</Bold> — leaves called <KW>fronds</KW>, reproduce by <KW>spores</KW> on the underside, no flowers.<br/>
          <Bold>Flowering plants</Bold> — reproduce by <KW>flowers and seeds</KW>; seeds form in the ovary. Two sub-groups: <Bold>monocots</Bold> &amp; <Bold>dicots</Bold>.
        </div>
        <MonocotDicotCompare />

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Viruses</strong>

          <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, marginTop: 6 }}>

        <div style={{ marginTop: 16 }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>✓ Revision checklist</strong>
          {[

            "Species = can reproduce to produce fertile offspring",
            "Binomial system = Genus species (Latin, italics)",
            "7 classification levels: KPCOFGS",
            "Classification reflects evolutionary relationships",
            "Dichotomous keys use paired contrasting features",

            "Five kingdoms: Animal, Plant, Fungi, Protoctist, Prokaryote",

    </div>
  );

  const Def = ({ term, children }) => (
    <div style={{ display: "flex", gap: 10, marginBottom: 8, fontSize: 13, lineHeight: 1.65 }}>
      <span style={{ flexShrink: 0, minWidth: 110, color: G, fontWeight: 700 }}>{term}</span>
      <span style={{ color: GR }}>{children}</span>
    </div>
  );

  const TY = ({ qs }) => (
    <div style={{ background: "#f0f9f0", border: `1px solid ${G}`, borderRadius: 8, padding: "10px 14px", marginTop: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: G, marginBottom: 6 }}>▶ Test Yourself</div>
      {qs.map((q, i) => <div key={i} style={{ fontSize: 12, color: GR, marginBottom: 4, lineHeight: 1.5 }}><strong>{i + 1}.</strong> {q}</div>)}
    </div>
  );

  return (
    <div>
      {/* Header banner */}
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 10, fontSize: 12, color: "#1a3a26" }}>
        <strong>Complete reference for Chapter 1</strong> — every concept, every diagram, every definition.<br/>
        Use this as a lookup when something is unclear. Sections marked <span style={{ background: PL, color: PU, padding: "1px 5px", borderRadius: 3, fontWeight: 700, fontSize: 10 }}>EXT</span> are Extended-tier only.
      </div>

      {/* Expand-all toggle */}
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
        <button onClick={expandAll} style={{ padding: "5px 12px", borderRadius: 6, border: `1.5px solid ${G}`, background: showAll ? G : "#fff", color: showAll ? "#fff" : G, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
          {showAll ? "Collapse all" : "Expand all"}
        </button>
      </div>

      {/* ───── Section 1: Characteristics of Living Organisms ───── */}
      <Sec id="t1" title="1 · Characteristics of Living Organisms" page="2">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          The seven characteristics shared by every living organism, summarised by the mnemonic <KW c={AM}>MRS GREN</KW>:
        </p>
        <MrsGrenDiagram />
        <div style={{ marginTop: 12 }}>
          <Def term="Movement">An action by an organism (or part of it) causing a <Bold>change of position or place</Bold>.</Def>
          <Def term="Respiration">Chemical reactions in living cells that <Bold>break down nutrient molecules</Bold> to release energy for metabolism.</Def>
          <Def term="Sensitivity">The ability to <Bold>detect and respond to stimuli</Bold> in the internal or external environment.</Def>
          <Def term="Growth">A <Bold>permanent increase in size and dry mass</Bold>, by an increase in cell number, cell size, or both.</Def>
          <Def term="Reproduction">The processes that produce <Bold>more of the same kind</Bold> of organism.</Def>
          <Def term="Excretion">The removal of <Bold>toxic waste products of metabolism</Bold> and substances in excess of requirements.</Def>
          <Def term="Nutrition">Taking in materials for energy, growth and development. Plants need light, CO₂, water, ions; animals need organic compounds, ions, and usually water.</Def>
        </div>
        <Tip>
          A common mistake: confusing <em>respiration</em> (chemical energy release in cells) with <em>breathing</em> (gas exchange ventilation). They are different processes.
        </Tip>
      </Sec>

      {/* ───── Section 2: Classification & Binomial System ───── */}
      <Sec id="t2" title="2 · Classification & The Binomial System" page="3">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Earth has millions of species. <KW>Classification</KW> sorts them into nested groups based on shared features, with each level becoming more specific as you go down.
        </p>

        <div style={{ marginTop: 10 }}>
          <Def term="Species">A group of organisms that can <Bold>reproduce to produce fertile offspring</Bold>.</Def>
        </div>

        <div style={{ marginTop: 14, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>The binomial system (Linnaeus, 18th century)</strong>
          Each organism has a <KW>two-part Latin name</KW>:
          <ul style={{ marginTop: 6, paddingLeft: 20 }}>
            <li><Bold>Genus</Bold> — capital letter, e.g. <em>Homo</em></li>
            <li><Bold>Species</Bold> — lowercase, e.g. <em>sapiens</em></li>
            <li>Always written in <em>italics</em> (or underlined when handwritten)</li>
          </ul>
          <Bold>Why Latin?</Bold> A single, universal name avoids language confusion (a "robin" in the UK and India are different birds — but <em>Erithacus rubecula</em> is unambiguous).
        </div>

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, display: "block", marginBottom: 6 }}>Hierarchy of classification — 7 levels</strong>
          <LinnaeusHierarchy />
        </div>

        <Tip>
          The mnemonic <Bold>"King Philip Came Over For Gran's Spaghetti"</Bold> = Kingdom, Phylum, Class, Order, Family, Genus, Species. The further down the list, the more features the members share.
        </Tip>
      </Sec>

      {/* ───── Section 3: Dichotomous Keys ───── */}
      <Sec id="t3" title="3 · Dichotomous Keys" page="5">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          A <KW>dichotomous key</KW> identifies an unknown organism through a series of paired statements. "Dichotomous" means <em>branching into two</em>: at each step you pick the option that matches your specimen, which leads to the next pair — eventually arriving at a name.
        </p>

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>How to use a key correctly</strong>
          <ol style={{ paddingLeft: 20, margin: "4px 0" }}>
            <li>Start with one organism at a time.</li>
            <li><Bold>Always begin at step 1</Bold> — never skip ahead.</li>
            <li>At each step, pick the description that fits, then follow its instruction (e.g. "go to step 3" or a species name).</li>
            <li>Repeat for the next organism, again from step 1.</li>
          </ol>
        </div>

        <DichotomousKeyVisual />

        <Tip>
          IGCSE almost always asks you to <Bold>use</Bold> a key, not construct one. Practise reading keys carefully and tracing the path step by step. Multiple-choice paper favourite.
        </Tip>
      </Sec>

      {/* ───── Section 4: Evolutionary Relationships & DNA (EXT) ───── */}
      <Sec id="t4" title="4 · Evolutionary Relationships & DNA Classification" page="7" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Modern classification aims to reflect <KW c={PU}>evolutionary relationships</KW> — grouping organisms by how recently they shared a common ancestor.
        </p>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Old method — morphology &amp; anatomy</strong>
          Originally, organisms were grouped by visible features (shape, body plan, limb structure) and dissection of internal anatomy. Useful, but limited: superficially similar organisms may not actually be closely related.
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Modern method — DNA base sequences</strong>
          Every species has its own DNA sequence. The principle:
          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "8px 12px", margin: "8px 0", fontSize: 12.5, color: "#3a2a6a" }}>
            <Bold>More similar DNA base sequences</Bold> → more recent common ancestor → more closely related.
          </div>
          Because DNA codes for proteins, comparing <Bold>amino acid sequences</Bold> gives the same information.
        </div>

        <DNAComparison />

        <div style={{ marginTop: 10, fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
          In the example above, the two <em>Brachinus</em> species share an identical sequence — their DNA places them in the same genus. The other species differ at one or more positions, indicating a more distant common ancestor.
        </div>

        <Tip>
          Mammals share more DNA base sequences with other mammals than with any other vertebrate group — DNA evidence confirms morphological grouping for vertebrates, but has overturned mistakes in other parts of the tree of life.
        </Tip>
      </Sec>

      {/* ───── Section 5: The Five Kingdoms ───── */}
      <Sec id="t5" title="5 · The Five Kingdoms" page="10">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          The first split in classification places every living organism into one of <KW>five kingdoms</KW>: <Bold>Animals</Bold>, <Bold>Plants</Bold>, <Bold>Fungi</Bold>, <Bold>Protoctists</Bold>, <Bold>Prokaryotes</Bold>. (Viruses are not included — see Section 9.)
        </p>

        <FiveKingdomsCells />

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Animals</strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li><Bold>Multicellular</Bold></li>
            <li>Cells have a <KW>nucleus</KW>, but <Bold>no cell wall</Bold> and <Bold>no chloroplasts</Bold></li>
            <li>Feed on organic substances made by other organisms (<KW>heterotrophic</KW>)</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Plants</strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li><Bold>Multicellular</Bold></li>
            <li>Cells have a <KW>nucleus</KW>, <KW>cellulose cell wall</KW>, and <KW>chloroplasts</KW></li>
            <li>Make their own organic molecules by <KW>photosynthesis</KW> (<KW>autotrophic</KW>)</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Fungi <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700 }}>EXT</span></strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li>Usually multicellular (yeasts are unicellular)</li>
            <li>Body made of thread-like <KW>hyphae</KW> forming a network called <Bold>mycelium</Bold></li>
            <li>Cells have <KW>nuclei</KW> and cell walls — <Bold>not made of cellulose</Bold> (chitin instead)</li>
            <li>Do not photosynthesise — feed by <KW>saprophytic</KW> nutrition (on dead/decaying matter) or <KW>parasitic</KW> nutrition (on a living host)</li>
            <li>Examples: mushrooms, moulds, yeasts</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Protoctists <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700 }}>EXT</span></strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li>Mostly unicellular, some multicellular</li>
            <li>All have a <KW>nucleus</KW>; some have cell walls and chloroplasts</li>
            <li>Some photosynthesise (e.g. <em>Chlamydomonas</em>, <em>Euglena</em>); others ingest food (e.g. <em>Amoeba</em>, <em>Paramecium</em>, <em>Plasmodium</em>)</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Prokaryotes <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700 }}>EXT</span></strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li>Usually <KW>unicellular</KW></li>
            <li>Cell wall present (<Bold>not cellulose</Bold>) — bacteria use peptidoglycan</li>
            <li>Cytoplasm and ribosomes, but <KW c={RD}>no nucleus</KW> and no other membrane-bound organelles</li>
            <li>DNA is a single circular loop, often with smaller <KW>plasmids</KW></li>
            <li>Examples: bacteria, blue-green algae</li>
          </ul>
        </div>

        <Tip>
          Distinguish <Bold>main features</Bold> (shared by all members of a group) from <Bold>defining features</Bold> (unique to that group). Example: all vertebrates have a backbone (main feature shared with all classes), but only mammals have fur (defining feature of mammals).
        </Tip>
      </Sec>

      {/* ───── Section 6: Animal Kingdom — Vertebrates & Arthropods ───── */}
      <Sec id="t6" title="6 · The Animal Kingdom — Vertebrates & Arthropods" page="11">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Animals split into two major groups by the presence or absence of a backbone:
          <Bold> Vertebrates</Bold> (with vertebral column) and <Bold>Invertebrates</Bold> (without).
          <KW>Arthropods</KW> are the largest invertebrate group — invertebrates with <Bold>jointed legs</Bold> and an exoskeleton.
        </p>

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, display: "block", marginBottom: 6, fontSize: 13 }}>Vertebrates — five classes</strong>
          <VertebrateTable />
          <div style={{ fontSize: 12, color: GR, lineHeight: 1.6, marginTop: 8 }}>
            <KW c={AM}>Endothermic</KW> (warm-blooded) = body temperature regulated internally — Mammals, Birds.<br/>
            <KW c={AM}>Ectothermic</KW> (cold-blooded) = body temperature varies with surroundings — Reptiles, Amphibians, Fish.
          </div>
        </div>

        <div style={{ marginTop: 16 }}>
          <strong style={{ color: G, display: "block", marginBottom: 6, fontSize: 13 }}>Arthropods — four groups</strong>
          <ArthropodDiagram />
          <div style={{ fontSize: 12, color: GR, lineHeight: 1.6, marginTop: 8 }}>
            All arthropods share: <KW>jointed legs</KW> · <KW>hard exoskeleton</KW> · <KW>segmented body</KW>.
          </div>

          {/* Arthropod features table */}
          <div style={{ marginTop: 10, overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
              <thead>
                <tr style={{ background: G, color: "#fff" }}>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Group</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Body</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Legs</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Antennae</th>
                  <th style={{ padding: "6px 8px", textAlign: "left" }}>Example</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Myriapods",  "Many segments",            "1 pair per segment",      "1 pair", "Centipede"],
                  ["Insects",    "3 parts (head/thorax/abdomen)", "3 pairs (+ usually wings)", "1 pair", "Butterfly"],
                  ["Arachnids",  "2 parts (cephalothorax + abdomen)", "4 pairs",     "None",   "Spider"],
                  ["Crustaceans","Segmented (calcium exoskeleton)",  ">4 pairs (gills)", "2 pairs", "Crab"],
                ].map((row, i) => (
                  <tr key={i} style={{ background: i % 2 ? GL : "#fff" }}>
                    {row.map((c, j) => (
                      <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? G : GR }}>{c}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <Tip>
          Defining features to remember: <Bold>insects</Bold> = 3 body parts &amp; 3 leg pairs, <Bold>arachnids</Bold> = 4 leg pairs &amp; no antennae, <Bold>crustaceans</Bold> = 2 antennae pairs &amp; gills, <Bold>myriapods</Bold> = many segments each with legs.
        </Tip>
      </Sec>

      {/* ───── Section 7: Plant Kingdom — Ferns vs Flowering Plants (EXT) ───── */}
      <Sec id="t7" title="7 · The Plant Kingdom — Ferns & Flowering Plants" page="18" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          All plants contain <KW>chlorophyll</KW> for photosynthesis. The Cambridge syllabus requires two plant groups: <Bold>ferns</Bold> and <Bold>flowering plants</Bold>.
        </p>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Ferns</strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li>Leaves called <KW>fronds</KW></li>
            <li>Reproduce by <KW>spores</KW> (not seeds) — produced on the underside of fronds</li>
            <li>Do not produce flowers</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4, fontSize: 13 }}>Flowering plants</strong>
          <ul style={{ paddingLeft: 20, fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            <li>Reproduce sexually using <KW>flowers and seeds</KW></li>
            <li>Seeds form inside the <KW>ovary</KW> at the base of the flower</li>
            <li>Two sub-groups: <Bold>monocotyledons</Bold> (1 seed leaf) and <Bold>dicotyledons</Bold> (2 seed leaves)</li>
          </ul>
        </div>

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, display: "block", marginBottom: 6, fontSize: 13 }}>Monocots vs dicots — the key differences</strong>
          <MonocotDicotCompare />
        </div>

        <Tip>
          This appears regularly in the multiple-choice paper. Memorise the four differences: <Bold>cotyledons (1 vs 2)</Bold>, <Bold>leaf shape (narrow vs broad)</Bold>, <Bold>veins (parallel vs net)</Bold>, <Bold>flower parts (×3 vs ×4 or 5)</Bold>.
        </Tip>
      </Sec>

      {/* ───── Section 8: Viruses (EXT) ───── */}
      <Sec id="t8" title="8 · Viruses" page="21" ext>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Viruses are <KW c={RD}>not classified within the five kingdoms</KW> — they are <Bold>not considered living organisms</Bold>. They cannot perform the seven life processes on their own; instead they hijack a host cell's machinery to make copies of themselves.
        </p>

        <VirusStructure />

        <div style={{ marginTop: 8, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Basic structure</strong>
          A virus is essentially a parcel of <KW>genetic material</KW> (DNA <em>or</em> RNA) wrapped in a <KW>protein coat</KW> called the <Bold>capsid</Bold>. Some viruses also have an outer lipid <Bold>envelope</Bold>.
        </div>

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Why viruses are not "alive"</strong>
          They cannot <Bold>respire</Bold>, <Bold>excrete</Bold>, <Bold>grow</Bold>, or <Bold>reproduce</Bold> independently. Outside a host they are inert chemical particles. Examples: influenza virus, HIV, tobacco mosaic virus.
        </div>
      </Sec>

      {/* ───── Section 9: Exam-style Questions (kept from original) ───── */}
      <Sec id="t9" title="9 · Exam-style Questions" page="23">
        <div style={{ fontSize: 12, color: GR, lineHeight: 1.7 }}>
          The seven exam-style questions from Hodder p.23 — full mark-scheme answers in <Bold>② Exam Practice</Bold> tab.
          {[
            "[3] State three other characteristics Amoeba would show",
            "[2+3] Define species; explain binomial system with Panthera tigris",
            "[3+3] Main characteristics of arthropods; table of differences insects vs myriapods",
            "[3+3] Main characteristics of a fungus and a bacterium",
            "[7] Design dichotomous key for vertebrate classes",
            "[data] Proportions of known species — calculations and comparisons",
            "[4+4+3] Monocots vs dicots; amphibians vs reptiles; binomial system",
          ].map((q, i) => (
            <div key={i} style={{ display: "flex", gap: 8, padding: "6px 0", borderBottom: `1px solid ${BD}`, fontSize: 12 }}>
              <span style={{ color: G, fontWeight: 700, flexShrink: 0 }}>Q{i + 1}</span>
              <span>{q}</span>
            </div>
          ))}
        </div>
      </Sec>
    </div>
  );
}

// ⑤ SME FLASHCARD TAB
// ════════════════════════════════════════════════════════════════════════════
function FlashcardTab() {
  const [flipped, setFlipped] = useState({});
  const [activeCat, setActiveCat] = useState("all");

  const toggle = (id) => setFlipped(p => ({ ...p, [id]: !p[id] }));
  const flipAll = (state) => {
    const next = {};
    cards.forEach(c => { if (activeCat === "all" || c.cat === activeCat) next[c.id] = state; });
    setFlipped(state ? next : {});
  };

  const categories = [
    { id: "all",    label: "All 32",         color: TL,        count: 32 },
    { id: "mrs",    label: "MRS GREN",       color: "#1e6091", count: 4  },
    { id: "class",  label: "Classification", color: "#6a0dad", count: 8  },
    { id: "king",   label: "Kingdoms",       color: "#1a7a3a", count: 9  },
    { id: "vert",   label: "Vert. & Arth.",  color: "#b5540a", count: 5  },
    { id: "plant",  label: "Plants & Virus", color: "#c0392b", count: 6  },
  ];

  // 32 cards — paraphrased from Save My Exams flashcards
  const cards = [
    // ── MRS GREN (4) ──
    { id: 1,  cat: "mrs",   q: "What does the G in MRS GREN stand for?",
      a: <>The <strong>G</strong> stands for <KW c={G}>Growth</KW> — a permanent increase in size and dry mass.</> },
    { id: 2,  cat: "mrs",   q: "What do the two Rs in MRS GREN stand for?",
      a: <>The two Rs stand for <KW c={G}>Respiration</KW> and <KW c={G}>Reproduction</KW>.</> },
    { id: 3,  cat: "mrs",   q: "Define sensitivity in the context of MRS GREN.",
      a: <><KW c={G}>Sensitivity</KW> is an organism's ability to <Bold>detect and respond to stimuli</Bold> in its internal or external environment.</> },
    { id: 4,  cat: "mrs",   q: "What is movement in living organisms?",
      a: <><KW c={G}>Movement</KW> is any action by an organism (or part of it) that causes a <Bold>change in position or place</Bold>.</> },

    // ── Classification (8) ──
    { id: 5,  cat: "class", q: "How were living organisms traditionally classified?",
      a: <>By their <KW c={PU}>structural (morphological) characteristics</KW> — body shape, internal anatomy, and other observable features.</> },
    { id: 6,  cat: "class", q: "True or False? The binomial system uses family and genus levels.",
      a: <><KW c={RD}>False.</KW> The binomial system uses <Bold>genus and species</Bold> — e.g. <em>Homo sapiens</em>.</> },
    { id: 7,  cat: "class", q: "Canis lupus is the scientific name for wolves. What does this tell us?",
      a: <>Wolves belong to the genus <KW c={PU}>Canis</KW> and the species <KW c={PU}>lupus</KW>. Genus is capitalised, species lowercase, both italicised.</> },
    { id: 8,  cat: "class", q: "Define the term species.",
      a: <>A <KW c={PU}>species</KW> is a group of organisms that can <Bold>reproduce to produce fertile offspring</Bold>.</> },
    { id: 9,  cat: "class", q: "What is a dichotomous key?",
      a: <>An identification tool that gives a <Bold>series of paired statements</Bold>; at each step you choose the one matching the organism, leading you to its name.</> },
    { id: 10, cat: "class", q: "True or False? You can start a dichotomous key from any point.",
      a: <><KW c={RD}>False.</KW> You must <Bold>follow the statements from the very beginning</Bold> in order; skipping steps misidentifies the organism.</> },
    { id: 11, cat: "class", q: "What does it mean to classify by evolutionary relationship? (Ext.)",
      a: <>Grouping organisms by <KW c={PU}>shared common ancestry</KW>. Those with more recent common ancestors are grouped more closely than those with distant ancestors.</> },
    { id: 12, cat: "class", q: "How does DNA sequencing contribute to classification? (Ext.)",
      a: <>Organisms can now be classified by their <KW c={PU}>DNA base sequences</KW> rather than only observable features — providing a more accurate evolutionary picture.</> },

    // ── Kingdoms (Animal/Plant + Five) (9) ──
    { id: 13, cat: "king",  q: "T/F? Organisms with a more recent common ancestor have more similar DNA sequences. (Ext.)",
      a: <><KW c={G}>True.</KW> The more recent the common ancestor, the more <Bold>DNA bases the organisms share</Bold>.</> },
    { id: 14, cat: "king",  q: "T/F? Mammals' DNA is more similar to other mammals than to other vertebrates. (Ext.)",
      a: <><KW c={G}>True.</KW> Closer evolutionary relationship → more similar DNA base sequences.</> },
    { id: 15, cat: "king",  q: "Main features of the Animal Kingdom?",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Multicellular</Bold></li>
            <li>Cells have a <KW c={G}>nucleus</KW> but <Bold>no cell wall, no chloroplasts</Bold></li>
            <li>Feed on <KW c={G}>organic molecules</KW> from other organisms (heterotrophic)</li>
          </ul> },
    { id: 16, cat: "king",  q: "T/F? All animals are multicellular.",
      a: <><KW c={G}>True.</KW> All members of the animal kingdom are multicellular organisms.</> },
    { id: 17, cat: "king",  q: "T/F? Animal cells contain chloroplasts.",
      a: <><KW c={RD}>False.</KW> Animal cells do <Bold>not</Bold> contain chloroplasts — they cannot photosynthesise.</> },
    { id: 18, cat: "king",  q: "Main features of the Plant Kingdom?",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Multicellular</Bold></li>
            <li>Cells have a <KW c={G}>nucleus, cell wall, and chloroplasts</KW></li>
            <li>Make their own organic molecules by <KW c={G}>photosynthesis</KW> (autotrophic)</li>
          </ul> },
    { id: 19, cat: "king",  q: "What are the five kingdoms? (Ext.)",
      a: <>The five kingdoms: <KW c={PU}>Animals</KW>, <KW c={PU}>Plants</KW>, <KW c={PU}>Fungi</KW>, <KW c={PU}>Protoctists</KW>, <KW c={PU}>Prokaryotes</KW>.</> },
    { id: 20, cat: "king",  q: "Main features of fungi? (Ext.)",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Usually multicellular (yeasts are unicellular)</li>
            <li>Cells contain <KW c={G}>nuclei</KW></li>
            <li>Cell walls are <Bold>not</Bold> made of cellulose (chitin instead)</li>
            <li>Feed by <KW c={G}>saprophytic or parasitic nutrition</KW></li>
          </ul> },
    { id: 21, cat: "king",  q: "What are protoctists? (Ext.)",
      a: <>Unicellular or multicellular organisms with a <KW c={PU}>nucleus</KW>. Some have cell walls and chloroplasts, some don't; some photosynthesise, others feed on organic substances.</> },

    // ── Vertebrates & Arthropods (5) ──
    { id: 22, cat: "vert",  q: "Define vertebrate.",
      a: <>A <KW c={AM}>vertebrate</KW> is an animal that has a <Bold>backbone (vertebral column)</Bold>.</> },
    { id: 23, cat: "vert",  q: "What are the main groups of vertebrates?",
      a: <>The five vertebrate groups: <KW c={AM}>Mammals · Birds · Reptiles · Amphibians · Fish</KW>.</> },
    { id: 24, cat: "vert",  q: "Main features of mammals?",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW c={AM}>Fur or hair</KW> on body</li>
            <li><KW c={AM}>Mammary glands</KW> to feed young with milk</li>
            <li><Bold>Regulate internal body temperature</Bold> (endothermic)</li>
            <li><KW c={AM}>Diaphragm</KW> for breathing</li>
            <li><Bold>Four-chambered heart</Bold></li>
          </ul> },
    { id: 25, cat: "vert",  q: "Define arthropod.",
      a: <><KW c={AM}>Arthropods</KW> are <Bold>invertebrates with jointed legs</Bold> and an exoskeleton.</> },
    { id: 26, cat: "vert",  q: "Main features of crustaceans?",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW c={AM}>Two pairs of antennae</KW></li>
            <li>Hard <Bold>exoskeleton</Bold></li>
            <li>Separate body segments</li>
            <li><KW c={AM}>More than four pairs</KW> of jointed legs</li>
            <li><Bold>Gills</Bold> for gas exchange</li>
          </ul> },

    // ── Plants & Virus (6) ──
    { id: 27, cat: "plant", q: "What are the main groups of arthropods?",
      a: <>The four arthropod groups: <KW c={RD}>Myriapods · Insects · Arachnids · Crustaceans</KW>.</> },
    { id: 28, cat: "plant", q: "T/F? All plants reproduce using flowers and seeds. (Ext.)",
      a: <><KW c={RD}>False.</KW> Some plants — like <Bold>ferns</Bold> — reproduce by <KW c={RD}>spores</KW> instead of flowers and seeds.</> },
    { id: 29, cat: "plant", q: "Two differences between monocot and dicot leaves? (Ext.)",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Monocots: <KW c={RD}>parallel veins</KW> · Dicots: <KW c={RD}>network of veins</KW></li>
            <li>Monocots: <Bold>narrow</Bold> leaves · Dicots: <Bold>broader</Bold> leaves</li>
          </ul> },
    { id: 30, cat: "plant", q: "Key flower difference: monocots vs dicots? (Ext.)",
      a: <>Monocot flowers have petals in <KW c={RD}>multiples of 3</KW>; dicot flowers have petals in <KW c={RD}>multiples of 4 or 5</KW>.</> },
    { id: 31, cat: "plant", q: "Main characteristics of prokaryotes? (Ext.)",
      a: <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW c={RD}>Unicellular</KW></li>
            <li>Cell walls <Bold>not</Bold> made of cellulose</li>
            <li>Contain cytoplasm but <KW c={RD}>no nucleus</KW> and no other membrane-bound organelles</li>
          </ul> },
    { id: 32, cat: "plant", q: "Describe the basic structure of a virus. (Ext.)",
      a: <>A virus consists of <KW c={RD}>genetic material (DNA or RNA)</KW> enclosed in a <Bold>protein coat (capsid)</Bold>. Viruses are not classified within the five kingdoms.</> },
  ];

  const visibleCards = activeCat === "all" ? cards : cards.filter(c => c.cat === activeCat);
  const flippedCount = visibleCards.filter(c => flipped[c.id]).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Header banner */}
      <div style={{ background: TL, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📇 Save My Exams · 32 Flashcards</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>Click any card to flip · Filter by category · Track your progress</div>
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {categories.map(c => (
          <button key={c.id} onClick={() => setActiveCat(c.id)}
            style={{
              padding: "6px 11px", borderRadius: 16,
              border: activeCat === c.id ? `2px solid ${c.color}` : `1.5px solid ${BD}`,
              background: activeCat === c.id ? c.color : "#fff",
              color: activeCat === c.id ? "#fff" : c.color,
              fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
            }}>
            {c.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({c.count})</span>
          </button>
        ))}
      </div>

      {/* Progress + control bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
        background: TLL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: TL }}>
        <div>
          <Bold>Progress:</Bold> {flippedCount} / {visibleCards.length} revealed
          <div style={{ width: 140, height: 5, background: "#fff", borderRadius: 3, marginTop: 4, overflow: "hidden" }}>
            <div style={{ width: `${visibleCards.length ? (flippedCount / visibleCards.length) * 100 : 0}%`,
              height: "100%", background: TL, transition: "width .3s" }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => flipAll(true)}  style={btnSm(TL,  true)}>Flip all</button>
          <button onClick={() => flipAll(false)} style={btnSm(TL, false)}>Reset</button>
        </div>
      </div>

      {/* Card grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
        {visibleCards.map(c => {
          const isFlip = !!flipped[c.id];
          const catColor = categories.find(x => x.id === c.cat)?.color || TL;
          return (
            <div key={c.id} onClick={() => toggle(c.id)}
              style={{
                position: "relative", minHeight: 180, cursor: "pointer",
                border: `1.5px solid ${isFlip ? catColor : BD}`,
                borderRadius: 10,
                background: isFlip ? "#fffdf6" : "#fff",
                padding: "12px 14px", transition: "all .2s",
                boxShadow: isFlip ? `0 2px 8px ${catColor}22` : "0 1px 3px #00000010",
                display: "flex", flexDirection: "column",
              }}>
              {/* Card header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                fontSize: 10, color: catColor, fontWeight: 700, letterSpacing: 0.5, marginBottom: 6 }}>
                <span>#{c.id} · {categories.find(x => x.id === c.cat).label.toUpperCase()}</span>
                <span style={{ fontSize: 10, color: "#999" }}>{isFlip ? "ANSWER ↺" : "Q · click ↻"}</span>
              </div>
              {/* Card body */}
              <div style={{ fontSize: 12.5, lineHeight: 1.55, color: GR, flex: 1 }}>
                {isFlip ? c.a : <span style={{ fontWeight: 600 }}>{c.q}</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer note */}
      <div style={{ marginTop: 6, padding: "9px 14px", background: GL, borderRadius: 8,
        fontSize: 11, color: G, textAlign: "center", lineHeight: 1.5 }}>
        💡 <Bold>Study tip:</Bold> Read the question, attempt your answer aloud, then flip to check.
        Use category filters to drill weak areas. Cards marked <em>(Ext.)</em> are Extended-tier only.
      </div>
    </div>
  );
}

const btnSm = (color, filled) => ({
  padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
  border: `1.5px solid ${color}`,
  background: filled ? color : "#fff",
  color: filled ? "#fff" : color,
});

function App() {
  const [active, setActive] = useState("essence");
  const tab = TABS.find(t => t.id === active);

  return (
    <div style={{ fontFamily: "'Segoe UI', Arial, sans-serif", maxWidth: 800, margin: "0 auto", padding: "20px 16px", color: GR }}>
