<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)

// ════════════════════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.7 Human Nutrition
// ════════════════════════════════════════════════════════════════════════════

// ── Balanced diet pie chart ─────────────────────────────────────────────────
function BalancedDietPie() {
  // 7 sectors covering 360°: carbs(120) protein(50) fat(40) fibre(35) vits(45) mins(35) water(35)
  // Use simpler approach: just visualise proportions with labelled coloured wedges
  const cx = 220, cy = 180, r = 130;
  const slices = [
    { label: "Carbohydrates", deg: 120, color: "#f4a261", note: "energy" },
    { label: "Proteins",      deg: 55,  color: "#e76f51", note: "growth · repair" },
    { label: "Lipids/Fats",   deg: 40,  color: "#f1c40f", note: "energy · insulation" },
    { label: "Fibre",         deg: 35,  color: "#52b788", note: "gut motility" },
    { label: "Vitamins",      deg: 40,  color: "#9b59b6", note: "small · vital" },
    { label: "Minerals",      deg: 30,  color: "#3498db", note: "small · vital" },
    { label: "Water",         deg: 40,  color: "#5dade2", note: "70% of body" },
  ];
  let acc = -90; // start from top
  const arc = (start, sweep) => {
    const s1 = (start * Math.PI) / 180;
    const s2 = ((start + sweep) * Math.PI) / 180;
    const x1 = cx + r * Math.cos(s1), y1 = cy + r * Math.sin(s1);
    const x2 = cx + r * Math.cos(s2), y2 = cy + r * Math.sin(s2);
    const large = sweep > 180 ? 1 : 0;
    return `M ${cx},${cy} L ${x1},${y1} A ${r},${r} 0 ${large} 1 ${x2},${y2} Z`;
  };
  return (
    <svg viewBox="0 0 700 380" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="380" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={G}>
        Balanced diet — 7 essential food groups
      </text>
      {slices.map((s, i) => {
        const path = arc(acc, s.deg);
        const mid = acc + s.deg / 2;
        const tx = cx + (r * 0.6) * Math.cos((mid * Math.PI) / 180);
        const ty = cy + (r * 0.6) * Math.sin((mid * Math.PI) / 180);
        const lx = cx + (r * 1.18) * Math.cos((mid * Math.PI) / 180);
        const ly = cy + (r * 1.18) * Math.sin((mid * Math.PI) / 180);
        const elem = (
          <g key={i}>
            <path d={path} fill={s.color} stroke="#fff" strokeWidth="2"/>
            <text x={tx} y={ty} textAnchor="middle" fontSize="10" fontWeight="700" fill="#fff">{s.label.split("/")[0]}</text>
            <text x={lx} y={ly} textAnchor={lx > cx ? "start" : "end"} fontSize="9" fill="#555">{s.note}</text>
          </g>
        );
        acc += s.deg;
        return elem;
      })}
      {/* Legend on the right */}
      <g transform="translate(440, 70)">
        <text x="0" y="0" fontSize="12" fontWeight="700" fill={G}>Functions in the body</text>
        {[
          ["Carbohydrates", "main energy source", "#f4a261"],
          ["Proteins",      "growth · tissue repair", "#e76f51"],
          ["Lipids/Fats",   "long-term energy · insulation", "#f1c40f"],
          ["Fibre",         "moves food through gut", "#52b788"],
          ["Vitamins",      "tiny doses · health", "#9b59b6"],
          ["Minerals",      "ions for cells & tissues", "#3498db"],
          ["Water",         "solvent · 70% body mass", "#5dade2"],
        ].map(([n, fn, col], i) => (
          <g key={i} transform={`translate(0, ${20 + i * 28})`}>
            <rect x="0" y="-9" width="14" height="14" fill={col} stroke="#999" strokeWidth="0.5"/>
            <text x="22" y="2" fontSize="10" fontWeight="700" fill={GR}>{n}</text>
            <text x="22" y="14" fontSize="9" fill="#666">{fn}</text>
          </g>
        ))}
      </g>
    </svg>
  );
}

// ── Digestive system overview ──────────────────────────────────────────────
function DigestiveSystemOverview() {

      {/* Stomach */}
      <path d="M 270 175 Q 240 180 240 220 Q 240 245 280 245 L 320 245 Q 340 245 345 220 L 345 185 Q 345 175 330 175 Z"

      {/* Liver (left of stomach) */}

function TeethTypes() {

      id: "sme_t_h1", diff: "hard", topic: "chemical", marks: 14, star: "★★★", src: "SME", ext: true,
      type: "standard",
      q: "SME Theory · Hard Q1 — Pepsin investigation + maltase (EXT for parts b/c)\n(a) Define the term CHEMICAL DIGESTION. [2]\n\n(b) Four test-tubes are set up at body temperature. Egg-white solution is cloudy because of its protein particles; the solution clears when protein is broken down.\n  Tube 1 — Egg white + pepsin: cloudy at 0 min → less cloudy at 5 min\n  Tube 2 — Egg white + pepsin + HCl: cloudy at 0 min → CLEAR at 5 min\n  Tube 3 — Egg white + BOILED pepsin + HCl: cloudy at 0 → cloudy at 5\n  Tube 4 — Egg white + HCl only: cloudy at 0 → cloudy at 5\n\n(b)(i) Explain the results for tubes 1, 2 and 3. [5]\n(b)(ii) Explain the PURPOSE of tube 4. [2]\n(b)(iii) Name the organ that produces pepsin. [1]\n\n(c) MALTASE is another digestive enzyme. Describe its action and state where in the alimentary canal it acts. [3]",
      hint: "Chemical digestion = enzymes break large insoluble → small soluble. Tube 1 slow (suboptimal pH), 2 fastest (optimum), 3 denatured by boiling. Tube 4 = control (no enzyme). Pepsin from stomach. Maltase: maltose → glucose, on ileum membrane.",
      a: "(a) Chemical digestion [2]:\n• The breakdown of LARGE, INSOLUBLE food molecules into SMALL, SOLUBLE molecules… [1]\n• … catalysed by ENZYMES. [1]\n\n(b)(i) Results explanation [5]:\n• Tube 1 (pepsin only): some digestion occurs (less cloudy) because pepsin is somewhat active at room pH, but it is FAR FROM ITS OPTIMUM pH (~2). The reaction is slow. [1]\n• Tube 2 (pepsin + HCl): full clearing — HCl provides the very LOW pH that is the OPTIMUM for pepsin. [1] The active site has the correct shape, the enzyme works fastest, and protein → soluble peptides. [1]\n• Tube 3 (BOILED pepsin + HCl): no clearing because BOILING DENATURES the enzyme. [1] The active site shape is permanently changed, so pepsin can no longer bind protein and digestion does not occur. [1]\n\n(b)(ii) Purpose of tube 4 [2]:\n• Acts as a CONTROL: it shows what happens with HCl ALONE (no enzyme). [1]\n• Confirms that the digestion seen in tube 2 is due to PEPSIN, not the HCl on its own. [1]\n\n(b)(iii) [1] STOMACH (specifically, the gastric / chief cells of the stomach lining).\n\n(c) Maltase [3]:\n• Maltase digests MALTOSE (a disaccharide). [1]\n• Breaks it into two GLUCOSE molecules. [1]\n• Acts on the membrane of the EPITHELIAL CELLS of the SMALL INTESTINE / ILEUM (it is a membrane-bound enzyme — sometimes called a 'brush border' enzyme). [1]"
    },
    {
      id: "sme_t_h2", diff: "hard", topic: "anatomy", marks: 13, star: "★★★", src: "SME", ext: true,
      type: "standard",
      q: "SME Theory · Hard Q2 — Pancreas + bread + protease (EXT for parts b/c)\nA diagram of the digestive system marks an organ X (located behind the stomach, with a duct connecting to the duodenum).\n(a)(i) Identify organ X. [1]\n(a)(ii) Describe the FUNCTION of organ X in digestion. [4]\n(b) When you chew a piece of bread for a while, a SWEET TASTE develops. Explain why. [3]\n(c) Protease enzymes can break down PROTEIN molecules but no other type of molecule. Explain why protease cannot break down other molecules. [4]",
      hint: "X = pancreas. Makes pancreatic juice (amylase, trypsin, lipase) → duodenum; alkaline juice neutralises acid. Bread has starch → salivary amylase → maltose (sweet). Active site is specific shape → only complementary substrate fits.",
      a: "(a)(i) [1] PANCREAS.\n\n(a)(ii) Function of pancreas in digestion [4]:\n• Produces PANCREATIC JUICE, which contains 3 main enzymes: AMYLASE, TRYPSIN and LIPASE. [1]\n• Pancreatic juice is delivered to the DUODENUM through the pancreatic duct. [1]\n• AMYLASE digests starch → maltose; TRYPSIN digests protein → peptides; LIPASE digests fat → fatty acids + glycerol. [1]\n• Pancreatic juice is ALKALINE (contains hydrogencarbonate ions) → helps neutralise the acidic chyme from the stomach so enzymes work at their optimum pH (~7-8). [1]\n• (Pancreas also produces hormones insulin and glucagon — endocrine, not digestion.)\n\n(b) Sweet taste from chewing bread [3]:\n• Bread contains a lot of STARCH, which is tasteless and large. [1]\n• Saliva contains SALIVARY AMYLASE, which catalyses the breakdown of STARCH into MALTOSE (a sugar). [1]\n• Maltose tastes SWEET → the longer you chew, the more starch is broken down and the sweeter the bread becomes. [1]\n\n(c) Protease specificity [4]:\n• Each enzyme has an ACTIVE SITE with a specific 3D shape. [1]\n• In protease, the active site is COMPLEMENTARY in shape to PEPTIDE BONDS in protein molecules (between amino acids). [1]\n• Other molecules — starch, fats — have DIFFERENT shapes and different bonds (glycosidic in starch; ester bonds in fats); they cannot fit into the active site. [1]\n• Without binding, no enzyme-substrate complex forms → no reaction → enzymes are SPECIFIC ('lock-and-key' principle). [1]"
    },
    {
      id: "sme_t_h3", diff: "hard", topic: "anatomy", marks: 11, star: "★★★", src: "SME", ext: true,
      type: "standard",
      q: "SME Theory · Hard Q3 — HCl, H. pylori and PPIs (EXT for part d)\n(a) Explain the importance of HYDROCHLORIC ACID in the stomach. [3]\n(b) Goblet cells normally secrete a layer of mucus that protects the stomach lining from gastric juice. The bacterium Helicobacter pylori can damage these goblet cells. A diagram compares a healthy stomach lining (intact mucus over epithelium) with an infected one (H. pylori has reached the goblet cells, mucus layer thinned). Explain how H. pylori may lead to a peptic ulcer. [3]\n(c) Proton-pump inhibitors (PPIs) suppress the cells of the stomach that produce HCl. Explain how PPIs could TREAT a peptic ulcer. [2]\n(d) Suggest the EFFECT of PPIs on digestion in the stomach. [3]",
      hint: "HCl: kills pathogens, optimum pH for pepsin, helps protein denature. H. pylori → less mucus → HCl/pepsin attack epithelium. PPIs ↓ acid → less attack on tissue. But also → pepsin no longer at optimum pH → less protein digestion + more pathogens survive.",
      a: "(a) Importance of HCl in stomach (any 3) [3]:\n• Provides the LOW pH (~pH 2) that is the OPTIMUM for PEPSIN (the protease) — pepsin works fastest in this acidic environment. [1]\n• KILLS most bacteria/pathogens swallowed with food (defence). [1]\n• Helps DENATURE proteins (unfold them), making peptide bonds more accessible to pepsin. [1]\n\n(b) H. pylori → peptic ulcer [3]:\n• H. pylori penetrates and DAMAGES the GOBLET CELLS in the stomach lining. [1]\n• These cells normally make MUCUS that protects the epithelium from HCl and pepsin; with fewer goblet cells, less mucus is produced. [1]\n• HCl and pepsin can now attack the EPITHELIAL cells directly → damage and erosion of the stomach wall → an ULCER forms. [1]\n\n(c) PPIs as treatment [2]:\n• PPIs reduce the production of HCl by the stomach lining. [1]\n• Less acid → less damage to the unprotected epithelium → ulcer can heal. [1]\n\n(d) Effect of PPIs on digestion [3]:\n• Less HCl → pH of stomach RISES above pepsin's OPTIMUM → pepsin works much MORE SLOWLY → less protein digestion in the stomach. [1]\n• Fewer SWALLOWED PATHOGENS are killed → increased risk of gut infections. [1]\n• Some downstream effects: less protein hydrolysis means more work later for trypsin in the duodenum; some patients may experience reduced absorption of vitamin B12, calcium and iron. [1]"
    },
    {
      id: "sme_t_h4", diff: "hard", topic: "chemical", marks: 14, star: "★★★", src: "SME", ext: true,
      type: "calc",
      q: "SME Theory · Hard Q4 — Amylase pH graph + starch digestion (EXT)\nA graph plots TIME taken for amylase to fully digest starch (y-axis, mins, 0-8) against pH of the starch solution (x-axis, 5-8). Data points: pH 5 → 7.5 min; pH 5.5 → 5.0 min; pH 6 → 3.0 min; pH 6.5 → 1.5 min; pH 7 → 1.5 min; pH 7.5 → 3.0 min; pH 8 → 6.0 min.\n\n(a)(i) Identify the OPTIMUM pH of amylase from the graph. [1]\n(a)(ii) Explain your answer. [2]\n(b) Calculate the PERCENTAGE DECREASE in time taken between pH 5 and pH 7. Show working. [3]\n(c) Describe and explain the SHAPE of the graph between pH 7 and 8. [2]\n(d) Outline the process of STARCH DIGESTION in the human body. [4]\n+ 2 marks for clarity/use of correct terminology overall = 14 total.",
      hint: "Optimum = lowest time. % decrease = (7.5-1.5)/7.5 ×100. Above pH 7, time rises = amylase denatures. Starch → maltose (mouth + duodenum) → glucose (ileum maltase).",
      a: "(a)(i) [1] OPTIMUM pH ≈ 6.5-7 (lowest time = fastest reaction; either 6.5 or 7 acceptable).\n\n(a)(ii) Explanation [2]:\n• At this pH, the active site of amylase is in its CORRECT SHAPE — fully complementary to starch. [1]\n• Substrate molecules bind most readily, so digestion is fastest → shortest time to fully digest. [1]\n\n(b) Percentage decrease in time, pH 5 → pH 7 [3]:\n• Decrease = 7.5 − 1.5 = 6.0 min [1]\n• % decrease = (6.0 ÷ 7.5) × 100 [1]\n• = 80 % [1]\n\n(c) Graph between pH 7 and 8 [2]:\n• Time INCREASES (from 1.5 min at pH 7 to 6.0 min at pH 8) → reaction is SLOWING DOWN. [1]\n• Above the optimum, the more alkaline pH disrupts bonds in the enzyme → the active site changes shape (DENATURES) → fewer enzyme-substrate complexes form → digestion is slower. [1]\n\n(d) Starch digestion in the human body [4]:\n• MOUTH: salivary glands secrete SALIVARY AMYLASE, which begins to break starch into MALTOSE. [1]\n• Stomach acid denatures salivary amylase — starch digestion pauses. [1]\n• DUODENUM: PANCREATIC AMYLASE (from pancreas, in alkaline pancreatic juice) continues to break starch into MALTOSE. [1]\n• ILEUM: MALTASE on the membrane of the epithelial cells of the villi breaks each maltose into two GLUCOSE molecules, which are absorbed into the blood by active transport / facilitated diffusion. [1]"
    },
    {
      id: "sme_t_h5", diff: "hard", topic: "anatomy", marks: 10, star: "★★★", src: "SME", ext: true,
      type: "standard",
      q: "SME Theory · Hard Q5 — Gallbladder, gallstones and fat-soluble vitamins (EXT)\n(a) Explain the PURPOSE of the gallbladder. [2]\n(b) The gallbladder may be surgically removed (cholecystectomy) due to gallstones. Doctors often recommend a LOW-FAT DIET after this surgery. Suggest a possible reason. [3]\n(c) FAT-SOLUBLE VITAMINS (e.g. vitamins A, D, E, K) are absorbed best alongside digested lipids. Based on parts (a)(b), explain why people without gallbladders may develop deficiencies in these vitamins. [2]\n(d) Vitamin D is fat-soluble. Suggest ONE possible long-term effect on a child's health if they have their gallbladder removed and develop vitamin D deficiency. [3]",
      hint: "Gall bladder stores + concentrates bile. Without it: bile is released continuously and in smaller amounts → less efficient emulsification of fats → diet should be low-fat. Less fat absorption → less fat-soluble vitamin absorption. Vit D needed for Ca → strong bones (rickets in children).",
      a: "(a) Purpose of gall bladder [2]:\n• Stores bile that is continually produced by the liver. [1]\n• Releases bile into the duodenum WHEN NEEDED, particularly after a fatty meal — bile then emulsifies fats and neutralises stomach acid. [1]\n\n(b) Why low-fat diet after gallbladder removal [3]:\n• Without a gall bladder, bile is no longer stored or concentrated; it flows continuously and in smaller amounts into the duodenum. [1]\n• When a fatty meal is eaten, there is not enough bile to emulsify all the fat at once → fat droplets remain large → low surface area → poor digestion by lipase. [1]\n• Eating a LOW-FAT diet keeps fat intake small enough to match the limited bile available, avoiding indigestion, fatty stools and discomfort. [1]\n\n(c) Why fat-soluble vitamins may become deficient [2]:\n• Less efficient fat digestion → less efficient ABSORPTION of fats. [1]\n• Fat-soluble vitamins are absorbed alongside the digested fats, so their absorption also falls → the body may not get enough → deficiency. [1]\n\n(d) Long-term effect of vitamin D deficiency in a child [3]:\n• Vitamin D is needed for the absorption of CALCIUM in the gut. [1]\n• Without enough vit D, less calcium is absorbed → bones do not grow strong → BONES BECOME SOFT and may BEND/DEFORM. [1]\n• This condition is called RICKETS — bowed legs, weak/painful bones, delayed growth. [1]"
    },

      id: "sme_t_h7", diff: "hard", topic: "practical", marks: 9, star: "★★★", src: "SME",
      type: "standard",
      q: "SME Theory · Hard Q7 — Snack bar food tests + lactase + deficiencies\nA student is testing a 60 g 'high-energy' snack bar suspected to contain starch and protein.\n\n(a) Describe the food tests they would use to confirm the presence of:\n  • starch\n  • protein\nFor each, give the reagent, method and the expected positive result. [4]\n\n(b) The bar also contains LACTOSE (milk sugar), digested by the enzyme LACTASE into smaller reducing sugars.\n  (b)(i) Name the SOLUTION used to test for reducing sugars and describe a POSITIVE result. [2]\n  (b)(ii) The optimum temperature for lactase is 37 °C. Describe what will happen to the enzyme and the rate of reaction if the temperature is RAISED TO 80 °C. [2]\n\n(c) A diet of only these snack bars could cause deficiencies. State:\n  (c)(i) The condition caused by lack of vitamin C. [1]\n  (c)(ii) The condition caused by lack of vitamin D. [1]\n  (c)(iii) ONE reason why fibre is needed in the diet. [1]",
      hint: "Starch: iodine → blue-black. Protein: biuret → purple/violet. Reducing sugar: Benedict's → orange/red. 80 °C → enzyme denatures → rate drops to zero. Vit C lack = scurvy. Vit D lack = rickets. Fibre prevents constipation.",
      a: "(a) Food tests [4]:\n• STARCH test: add a few drops of IODINE solution to a sample of the bar (or to a solution of it). [1] A POSITIVE result is a BLUE-BLACK colour. [1]\n• PROTEIN test (BIURET test): add a few drops of biuret reagent (or sodium hydroxide + dilute copper sulfate). [1] A positive result is a PURPLE / LILAC / VIOLET colour (changing from light blue). [1]\n\n(b)(i) Reducing sugar test [2]:\n• Reagent = BENEDICT'S SOLUTION (blue). Add to the sample, then HEAT in a water bath. [1]\n• Positive result = colour changes from blue → green → yellow → orange → BRICK-RED (red precipitate forms when more reducing sugar is present). [1]\n\n(b)(ii) Lactase at 80 °C [2]:\n• The enzyme is heated FAR ABOVE its optimum (37 °C) → the active site changes shape → the enzyme is DENATURED. [1]\n• The substrate (lactose) can no longer fit into the active site → the rate of reaction falls to (essentially) ZERO. [1]\n\n(c)(i) [1] Lack of vitamin C → SCURVY (bleeding gums, slow wound healing, weakness).\n(c)(ii) [1] Lack of vitamin D → RICKETS in children (or osteomalacia in adults) — soft, deformed bones from poor calcium absorption.\n(c)(iii) [1] Fibre helps the muscles of the gut wall to push food along (peristalsis) → prevents CONSTIPATION; also helps protect against bowel cancer."

      q: "PRACTICAL Q2 (Hodder p.114)\nSuggest THREE specific changes you could make to the energy-from-peanut experiment to make it more accurate, AND justify each one. [4]",
      hint: "Reduce heat losses, ensure complete combustion, repeat & average.",
      a: "[4 marks — any 4 of the following improvements]:\n• Use a CALORIMETER / shielded apparatus (e.g. wrap the boiling tube in a metal tube or use a copper calorimeter) → REDUCES heat loss to the surrounding air. [1]\n• Use a STIRRER to keep the water at a uniform temperature, ensuring the thermometer reads the true average. [1]\n• Use OXYGEN-RICH air (e.g. burn under a stream of oxygen) → ensures the food burns COMPLETELY (no unburnt material left). [1]\n• REPEAT the experiment several times with different peanuts and TAKE A MEAN → reduces effect of random variation. [1]\n• Use a LID on the apparatus to prevent water vapour from escaping (and carrying heat away). [1]\n• Use a SMALLER VOLUME of water → bigger ΔT → smaller % uncertainty in temperature reading."

    {
      id: "p_am1", diff: "medium", topic: "practical", marks: 5, star: "★★★", src: "Hodder",
      type: "standard",
      q: "PRACTICAL Q3 (Hodder p.124) — Salivary amylase on starch\nA student adds saliva to a starch solution at 37 °C. After 5 min:\n  • Iodine added to half → no blue-black colour\n  • Benedict's added to other half + heated → orange-red precipitate\nThe experiment is repeated with BOILED saliva: iodine gives blue-black; Benedict's stays blue.\n(a) What does the result with iodine in tube A show about starch? [1]\n(b) What does the Benedict's result in tube A show? [1]\n(c) Why does the boiled saliva give different results? [2]\n(d) Why is 37 °C chosen? [1]",
      hint: "Iodine + starch = blue-black; Benedict's + reducing sugar = red. Boiling denatures the enzyme. 37 °C = body temp, optimum.",
      a: "(a) [1] No blue-black with iodine → STARCH has been REMOVED. The amylase has digested the starch.\n\n(b) [1] Orange-red precipitate with Benedict's → REDUCING SUGAR is now present. The starch has been broken down INTO sugar (maltose, then perhaps glucose).\n\n(c) [2] The boiled saliva still leaves starch (blue-black with iodine) and gives no sugar (Benedict's stays blue). [1] This shows that AMYLASE (a protein) has been DENATURED by boiling — its active site has changed shape and it can no longer bind to starch, so digestion does not happen. [1]\n   This proves it WAS the amylase enzyme that was responsible — not water or some other component of saliva.\n\n(d) [1] 37 °C = human body temperature, the OPTIMUM temperature for amylase (it works fastest there because the enzyme molecules and substrate molecules collide most often). Higher temperatures would risk denaturing the enzyme; lower would slow the reaction."
    },
    {
      id: "p_am2", diff: "hard", topic: "practical", marks: 5, star: "★★", src: "Hodder",
      type: "standard",
      q: "PRACTICAL Q4 (Hodder p.125) — Visking-tubing model of digestion\nIn experiment 3 (modelling the action of amylase on starch with Visking tubing in a beaker of water), some reducing sugar remains INSIDE the Visking tubing after 20 minutes.\n(a) Explain why some reducing sugar is still inside the tubing. [2]\n(b) The starch never appears in the surrounding water. Why? [2]\n(c) What does the Visking tubing represent in the body, and what does the water represent? [1]",
      hint: "Diffusion takes time. Starch is too big to fit through the pores. Tubing = duodenum wall; water = blood.",
      a: "(a) [2]\n• 20 minutes is not long enough for ALL the sugar to diffuse out. [1]\n• At any point, some sugar is still in the tubing; diffusion will continue until the concentration is equal on both sides. [1]\n\n(b) [2]\n• Starch molecules are TOO LARGE to fit through the tiny PORES in the Visking tubing membrane. [1]\n• Only the small SUGAR molecules (made by amylase digestion) are small enough to diffuse through. This models exactly how the gut wall lets digested products through but holds back undigested food. [1]\n\n(c) [1]\n• The VISKING TUBING represents the WALL OF THE DUODENUM (or any small intestine wall) — partially permeable, lets small molecules through.\n• The DISTILLED WATER represents the BLOOD/circulation that carries digested products away."
    },
    {
      id: "p_pe1", diff: "medium", topic: "practical", marks: 6, star: "★★★", src: "Hodder",
      type: "standard",
      q: "PRACTICAL Q5 (Hodder p.126) — Pepsin on egg-white\nFour tubes are set up at 35 °C with cloudy egg-white suspension:\n  A: + pepsin only\n  B: + dilute HCl only\n  C: + pepsin + HCl\n  D: + BOILED pepsin + HCl\nAfter 15 min, only tube C goes clear.\n(a) Why does tube C go clear and the others stay cloudy? [2]\n(b) What does this tell us about pepsin? List THREE conclusions. [3]\n(c) Identify the variables in the experiment. Suggest which tube serves as the CONTROL, and explain why. [1]",
      hint: "Solid protein → soluble = clear. Pepsin needs acidic pH; boiling denatures it; HCl alone doesn't digest.",
      a: "(a) [2]\n• Egg-white suspension is cloudy because the protein particles are SOLID and SUSPENDED in water. [1]\n• In tube C, pepsin (active) + HCl (low pH) work together and break the protein down into small SOLUBLE peptides → no more solid particles → tube goes clear. [1]\n\n(b) Three conclusions [3]:\n• Pepsin only works in ACID conditions (compare A vs C: A had pepsin but no HCl → no digestion). [1]\n• It is the PEPSIN, not the HCl, that does the actual digesting (compare B vs C: B had HCl but no pepsin → no digestion). [1]\n• Pepsin is a PROTEIN (an enzyme) because BOILING DESTROYS its activity (compare D vs C). [1]\n\n(c) [1] Variables:\n• IV = combination of substances (pepsin / HCl / boiled pepsin) added.\n• DV = appearance of the tube (cloudy or clear) → measure of digestion.\n• CV = same volume of egg-white, same temperature (35 °C), same time.\n• CONTROL: tube A (pepsin only) and B (HCl only) act as PARTIAL controls — they show what happens with NO active digestion. Tube D (boiled pepsin + HCl) is the strongest control because everything is the same except the enzyme has been INACTIVATED, isolating the effect of active enzyme."
    },

      type: "standard",
      q: "ATP Q1(a)(iii)\nThe buffer solution is meant to KEEP THE pH CONSTANT throughout the experiment. Suggest and EXPLAIN a way to check that the buffer is doing its job effectively. [2]",

      a: "Method [1]: Use UNIVERSAL INDICATOR PAPER — or, better, a pH METER / pH probe — to measure the pH of the reaction mixture at the START of the experiment AND again at the END (or at several time intervals).\n\nReason [1]: If the pH reading is the SAME at the start and at the end (e.g. still pH 4 in the pH-4 setup), the buffer has resisted any change in pH and is working effectively. If pH has DRIFTED (e.g. risen as the reaction proceeds), the buffer is failing and the IV has not been controlled — invalidating the experiment.\n\n(A pH meter is more accurate than indicator paper because it gives a numerical value rather than a colour comparison.)"

      q: "ATP Q1(b)(i) — METHOD CHECK\nThe students' written method (abridged):\n  Step 1. Mix amylase + starch + buffer (total 20 cm³) inside the tubing. Start stopwatch.\n  Step 2. Withdraw < 0.5 cm³ from inside the tubing AND from the surrounding water using SEPARATE pipettes.\n  Step 3. Add 1 drop to a spotting tile + iodine; record colour.\n  Step 4. Repeat samples every 5 min.\n  Step 5. Add the rest of the dropping pipette to 2 cm³ of Benedict's solution; note the colour.\n  Step 6. Repeat 2-5 until no further colour change.\n\nAn IMPORTANT step has been MISSED OUT during STEP 5. Suggest what it is. [1]",

    {
      id: "atp_d_i", diff: "medium", topic: "practical", marks: 3, star: "★★★", src: "SME",
      type: "standard",
      q: "ATP Q1(d)(i) — RESULTS\nThe spotting-tile observations after iodine were:\n\n• pH 4: BLUE-BLACK at every time point (0, 5, 10, 15, 20 min) — no change.\n• pH 8: BLUE-BLACK at 0 min → SLIGHT BLUE at 5 min → RED-BROWN from 10 min onwards.\n• pH 10: BLUE-BLACK at 0 and 5 min → SLIGHT BLUE at 15 min → SLIGHT BLUE at 20 min.\n\nEXPLAIN the results at EACH pH level. [3]",
      hint: "Compare each pH to amylase's optimum (around pH 7). What does too acid or too alkaline do to enzymes?",
      a: "[3 marks — one per pH]:\n\n• pH 4 (acidic) [1]: Iodine stays BLUE-BLACK throughout → STARCH IS NOT DIGESTED. The pH is too far below amylase's OPTIMUM (~pH 7) — H⁺ ions disrupt the bonds in the active site, so the enzyme is DENATURED / inactive.\n\n• pH 8 (slightly alkaline) [1]: Iodine turns RED-BROWN by 10 min → starch has been fully digested. This is CLOSEST to amylase's optimum pH (~7), so the active site is the correct shape and digestion is fast.\n\n• pH 10 (strongly alkaline) [1]: Iodine still SLIGHT BLUE at 20 min → only PARTIAL digestion. The pH is above the optimum, so the enzyme is partly DENATURED — it still works but much more slowly than at pH 8."
    },

      q: "ATP Q1(e) — APPARATUS IMPROVEMENT\nThe students notice that the Benedict's test on the WATER OUTSIDE the Visking tubing only gives a very WEAK colour change (sometimes barely past blue) even when sugar has clearly been produced inside.\n\nSuggest and EXPLAIN a change to the EXPERIMENTAL EQUIPMENT that would increase the chances of a clearer, more definite POSITIVE Benedict's result outside the tubing. [3]",
      hint: "Sugar has to diffuse from inside the tubing into the water. What slows that down? Volume of water? Surface area of tubing? Time?",

      q: "NLCS Suppl. — Whole-organism integration\nDescribe the journey of a SLICE OF BREAD from being chewed in the mouth to its glucose entering a muscle cell to be respired. Mention all relevant enzymes, secretions, organs and transport systems in order. [6]",
      hint: "Mouth → oesophagus → stomach → duodenum → ileum → blood → liver → muscle cell.",
      a: "[6 marks for a full coherent narrative]:\n\n1. MOUTH: chewing breaks bread into small pieces (physical digestion); SALIVARY AMYLASE begins to digest starch into MALTOSE; saliva lubricates with mucus. [1]\n\n2. OESOPHAGUS: the bolus is pushed into the stomach by PERISTALSIS (waves of circular and longitudinal muscle contraction).\n\n3. STOMACH: muscular CHURNING mixes the food with gastric juice; HCl gives pH 2 and kills bacteria; PEPSIN starts protein digestion. (Salivary amylase is denatured here, so starch digestion pauses.) [1]\n\n4. DUODENUM (small intestine, part 1): bile (alkaline) NEUTRALISES the acid; pancreatic juice arrives, bringing PANCREATIC AMYLASE (continues starch → maltose), TRYPSIN (peptides), and LIPASE (fats; bile salts have already emulsified them). [1]\n\n5. ILEUM (small intestine, part 2): MALTASE on the membrane of the EPITHELIAL CELLS of the villi finishes the job — maltose → GLUCOSE. The glucose is absorbed by ACTIVE TRANSPORT and FACILITATED DIFFUSION into the blood capillaries inside each villus. [1]\n\n6. BLOOD: glucose enters the HEPATIC PORTAL VEIN → carried first to the LIVER. The liver may store some glucose as glycogen, and the rest passes into the general circulation via the hepatic vein → vena cava → heart → arteries → muscle. [1]\n\n7. MUSCLE CELL: glucose enters by facilitated diffusion. Inside the cytoplasm and mitochondria, GLUCOSE + OXYGEN → CO₂ + H₂O + ATP (aerobic respiration). The ATP powers muscle contraction. [1]\n\nKey idea: a SINGLE molecule (starch) is broken right down to its monomer (glucose) before being absorbed; the body then uses glucose for energy via respiration."

      q: "NLCS Suppl. — Why historical sailors got scurvy\nExplain why long-distance sailors in the 15th-18th centuries often developed SCURVY, and what was eventually done to prevent it. [3]",

      a: "[3 marks]:\n• Vitamin C is WATER-SOLUBLE and the body cannot store it for long — it must be supplied regularly in fresh food. [1]\n• On long sea voyages, sailors had no access to fresh fruit and vegetables (their preserved food — salted meat, dried biscuits — contained little or no vit C). After several months, vitamin C ran low → SCURVY (bleeding gums, weakness, tooth loss, eventually death). [1]\n• In 1747 James Lind showed that citrus fruits cured/prevented scurvy. The British Navy then issued LIME juice on long voyages (which is why British sailors became known as 'limeys'). Today scurvy is rare because most diets contain fresh fruit and vegetables. [1]"
    },
  ];

  // Topic palette
  const topics = [
    { id: "all",        label: "All topics",         color: RD },
    { id: "diet",       label: "Diet & deficiencies", color: G },
    { id: "vits-mins",  label: "Vitamins & minerals", color: AM },
    { id: "anatomy",    label: "Alimentary canal",   color: "#7d3c98" },
    { id: "physical",   label: "Physical digestion", color: "#1a7a6e" },
    { id: "chemical",   label: "Chemical digestion", color: PU },
    { id: "absorption", label: "Absorption",         color: "#3399cc" },
    { id: "practical",  label: "Practical",          color: RD },
  ];

  const diffs = [
    { id: "all",    label: "All",    color: RD,        bg: RL },
    { id: "easy",   label: "Easy",   color: "#1a7a3a", bg: "#e8f7ec" },
    { id: "medium", label: "Medium", color: "#b85c00", bg: "#fff4e6" },
    { id: "hard",   label: "Hard",   color: "#b02020", bg: "#fdf0f0" },
  ];

  const srcs = [
    { id: "all",    label: "All sources",  color: RD,        bg: RL,        title: "" },
    { id: "Hodder", label: "Hodder",       color: G,         bg: GL,        title: "Hodder textbook official questions (Test yourself + Exam-style + Practical)" },
    { id: "SME",    label: "SaveMyExams",  color: TL,        bg: TLL,       title: "Save My Exams Theory Questions (Easy / Medium / Hard)" },
    { id: "Suppl",  label: "NLCS suppl.",  color: "#7a6a40", bg: "#f6f1e3", title: "NLCS supplementary questions" },
  ];

  const filtered = qs.filter(q =>
    (diff === "all" || q.diff === diff) &&
    (topic === "all" || q.topic === topic) &&
    (src === "all" || q.src === src)
  );

  const totalMarks = filtered.reduce((s, q) => s + q.marks, 0);
  const revealedCount = filtered.filter(q => rev[q.id]).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Header */}
      <div style={{ background: RD, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📝 Exam Practice — Infinite Test Bank</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          Filter by source, difficulty &amp; topic · Try first, then reveal · ★★★ = frequently examined · <span style={{ background: "#fff", color: G, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>HODDER</span> = official textbook · <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = Save My Exams · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary
        </div>
      </div>

      {/* Source filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>SOURCE</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {srcs.map(s => {
            const count = qs.filter(q => s.id === "all" || q.src === s.id).length;
            return (
              <button key={s.id} onClick={() => setSrc(s.id)} title={s.title}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: src === s.id ? `2px solid ${s.color}` : `1.5px solid ${BD}`,
                  background: src === s.id ? s.color : "#fff",
                  color: src === s.id ? "#fff" : s.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {s.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Difficulty filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>DIFFICULTY</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {diffs.map(d => {
            const count = qs.filter(q => d.id === "all" || q.diff === d.id).length;
            return (
              <button key={d.id} onClick={() => setDiff(d.id)}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: diff === d.id ? `2px solid ${d.color}` : `1.5px solid ${BD}`,
                  background: diff === d.id ? d.color : "#fff",
                  color: diff === d.id ? "#fff" : d.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {d.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Topic filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>TOPIC</div>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {topics.map(t => {
            const count = qs.filter(q => t.id === "all" || q.topic === t.id).length;
            return (
              <button key={t.id} onClick={() => setTopic(t.id)}
                style={{
                  padding: "5px 10px", borderRadius: 14,
                  border: topic === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
                  background: topic === t.id ? t.color : "#fff",
                  color: topic === t.id ? "#fff" : t.color,
                  fontSize: 10.5, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {t.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        background: RL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: RD, flexWrap: "wrap", gap: 8 }}>
        <div>
          <Bold>{filtered.length}</Bold> question{filtered.length !== 1 ? "s" : ""} ·
          <Bold> /{totalMarks} marks total</Bold> ·
          <span style={{ color: "#666" }}> {revealedCount} revealed</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setRev({})} style={{
            padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
            border: `1.5px solid ${RD}`, background: "#fff", color: RD,
          }}>Hide all</button>
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "30px 20px", color: "#999", fontSize: 13, background: "#f8f8f6", borderRadius: 10 }}>
          No questions match the selected filters. Try a different combination.
        </div>
      )}

      {/* Question cards */}
      {filtered.map(q => {
        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 3, padding: "2px 7px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{q.diff.toUpperCase()}</span>
                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.type === "mcq" && <span title="Multiple Choice Question" style={{ background: "#fff", border: `1px solid ${RD}`, color: RD, borderRadius: 3, padding: "1px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>MCQ</span>}
                  {q.src && (() => {
                    const srcStyle = q.src === "Hodder"
                      ? { color: G,         label: "HODDER", title: "Hodder textbook official question" }
                      : q.src === "SME"
                      ? { color: TL,        label: "SME",    title: "Save My Exams Theory Question" }
                      :                       { color: "#7a6a40", label: "SUPPL",  title: "NLCS supplementary question" };
                    return (
                      <span title={srcStyle.title}
                        style={{ background: srcStyle.color, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                        {srcStyle.label}
                      </span>
                    );
                  })()}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

// ③ SUMMARY TAB — 1st-stage summary with collapsible sections
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const [open, setOpen] = useState({ s1: true, s2: false, s3: false, s4: false, s5: false, s6: false, s7: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${PU}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? PU : PL, color: open[id] ? "#fff" : PU, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#3a2a6a" }}>
        <strong>1st-stage summary</strong> — Chapter 7 condensed into key concepts, tables and diagrams. Use after reading <Bold>④ Textbook</Bold> in detail.
      </div>

      <Sec id="s1" title="① What is Nutrition? — Five Processes">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          Animals (unlike plants) cannot make their own food, so they must <KW c={PU}>ingest</KW> it. Once inside the body, food undergoes <Bold>five processes</Bold>:
        </div>
        <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.85 }}>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW c={PU}>Ingestion</KW> — taking food &amp; drink into the body through the mouth.</li>
            <li><KW c={PU}>Digestion</KW> — breakdown of food (physical &amp; chemical).</li>
            <li><KW c={PU}>Absorption</KW> — movement of nutrients from the intestine into the blood.</li>
            <li><KW c={PU}>Assimilation</KW> — uptake &amp; use of nutrients by cells.</li>
            <li><KW c={PU}>Egestion</KW> — passing out of undigested food as faeces.</li>
          </ul>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME mnemonic:</Bold> <KW c={TL}>I D A A E</KW> ("I Did All A E"). Don't confuse <Bold>egestion</Bold> (undigested food out) with <Bold>excretion</Bold> (metabolic waste out — urine, CO₂). Faeces are NOT a metabolic product.
        </div>
      </Sec>

      <Sec id="s2" title="② Balanced Diet — 7 Components">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A <KW c={PU}>balanced diet</KW> contains all essential nutrients in the correct proportions. Each component has a specific role:
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Component</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Function</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Sources</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Carbohydrate</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Energy (16 kJ/g)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Bread, rice, pasta, potatoes</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Protein</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Growth &amp; repair</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Meat, fish, eggs, pulses, nuts</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Lipid (fat/oil)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Energy storage (37 kJ/g), insulation, membranes</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Butter, oil, nuts, egg-yolk</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Vitamins</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Maintain health (small quantities)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Fruits, vegetables</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Minerals</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Maintain health (small quantities)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Dairy, meat, vegetables</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Fibre (roughage)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Bulk for peristalsis; prevents constipation</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Vegetables, wholegrains</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", fontWeight: 700, color: PU }}>Water</td><td style={{ padding: "6px 8px" }}>Solvent; chemical reactions in cells (~70% of tissue)</td><td style={{ padding: "6px 8px" }}>Drinks, fruits, vegetables</td></tr>
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 Energy values:</Bold> Fat <KW c={TL}>37 kJ/g</KW> &gt; protein/carbohydrate <KW c={TL}>16-17 kJ/g</KW>. Fat gives <Bold>more than twice</Bold> the energy of carbohydrate per gram.
        </div>
      </Sec>

      <Sec id="s3" title="③ Vitamins &amp; Minerals — Just Two of Each (IGCSE)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          IGCSE focuses on <Bold>vitamin C, vitamin D, calcium and iron</Bold>. Learn the function, source, and deficiency disease for each:
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Nutrient</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Function</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Source</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Deficiency</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Vitamin C</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Forms <KW c={PU}>collagen</KW> (skin, gums, blood vessels)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Citrus fruits, green veg</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}><KW c={RD}>Scurvy</KW> — bleeding gums, tooth loss</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Vitamin D</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Helps absorb <KW c={PU}>calcium</KW> for bones &amp; teeth</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Sunlight, oily fish, eggs, dairy</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}><KW c={RD}>Rickets</KW> — soft, deformed bones</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Calcium</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Strong <KW c={PU}>bones &amp; teeth</KW>; blood clotting; muscle contraction</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Milk, cheese, eggs</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Brittle bones, <KW c={RD}>osteoporosis</KW></td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", fontWeight: 700, color: PU }}>Iron</td><td style={{ padding: "6px 8px" }}>Makes <KW c={PU}>haemoglobin</KW> (in RBCs) for oxygen transport</td><td style={{ padding: "6px 8px" }}>Red meat, liver, spinach</td><td style={{ padding: "6px 8px" }}><KW c={RD}>Anaemia</KW> — tired, weak, pale</td></tr>
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 Linkage:</Bold> Vitamin D ↔ calcium. Without vitamin D, calcium isn't absorbed → bones soften → <KW c={TL}>rickets</KW>. So a calcium-rich diet alone won't fix rickets — vitamin D is needed too.
        </div>
      </Sec>

      <Sec id="s4" title="④ The Alimentary Canal — Anatomy &amp; Functions">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          The <KW c={PU}>alimentary canal</KW> is the tube food travels through. <KW c={PU}>Accessory organs</KW> (liver, gall bladder, pancreas, salivary glands) help digestion but food does NOT pass through them.
        </div>
        <DigestiveSystemOverview />
        <div style={{ marginTop: 12, fontSize: 12.5, color: GR, lineHeight: 1.85 }}>
          <Bold>Order of canal:</Bold> mouth → oesophagus → stomach → <Bold>duodenum</Bold> (small intestine, 1st part) → <Bold>ileum</Bold> (small intestine, 2nd part) → colon → rectum → anus.
          <br /><br />
          <Bold>Key functions:</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW c={PU}>Mouth</KW> — ingestion; chewing (physical); salivary <Bold>amylase</Bold> on starch.</li>
            <li><KW c={PU}>Oesophagus</KW> — connects mouth to stomach; <Bold>peristalsis</Bold>.</li>
            <li><KW c={PU}>Stomach</KW> — churning (physical); <Bold>HCl</Bold> + <Bold>pepsin</Bold> (protease); kills bacteria.</li>
            <li><KW c={PU}>Duodenum</KW> — receives <Bold>bile</Bold> (liver) and pancreatic juice; acid neutralised; chemical digestion completes.</li>
            <li><KW c={PU}>Ileum</KW> — <Bold>absorption</Bold> via villi.</li>
            <li><KW c={PU}>Colon</KW> — water absorption; faeces formed.</li>
            <li><KW c={PU}>Rectum</KW> — stores faeces.</li>
            <li><KW c={PU}>Anus</KW> — egestion.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="s5" title="⑤ Physical vs Chemical Digestion">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          These two types of digestion work <Bold>together</Bold> but are very different. The exam loves to test this distinction.
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Aspect</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Physical (mechanical)</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Chemical</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>What changes?</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Size of pieces (<KW c={TL}>no chemical change</KW>)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Molecules: large insoluble → small soluble</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Examples</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Chewing (teeth), churning (stomach), <Bold>emulsification</Bold> (bile)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Amylase, protease, lipase action</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", fontWeight: 700, color: PU }}>Why?</td><td style={{ padding: "6px 8px" }}>Increases <KW c={PU}>surface area</KW> for enzymes</td><td style={{ padding: "6px 8px" }}>Makes molecules <KW c={PU}>small &amp; soluble</KW> for absorption</td></tr>
            </tbody>
          </table>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 Trap:</Bold> <KW c={TL}>Emulsification by bile is PHYSICAL</KW>, not chemical. Bile contains <Bold>no enzymes</Bold>. It just breaks fat drops into smaller drops (more surface area) — like tearing paper into smaller pieces. The chemical break happens later, by lipase.
        </div>
      </Sec>

      <Sec id="s6" title="⑥ Digestive Enzymes — Sites, Substrates, Products">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          Three enzyme groups break down the three macronutrients. Memorise the <Bold>site of production</Bold>, <Bold>site of action</Bold>, substrate, and product:
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Enzyme</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Made by</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Acts in</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Reaction</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Amylase</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Salivary glands, pancreas</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Mouth, duodenum</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Starch → maltose</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Maltase <Ext /></td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Cells of small intestine</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Membranes of villi epithelium</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Maltose → glucose</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Pepsin <Ext /></td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Stomach lining</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Stomach (acidic, pH 2)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Protein → peptides</td></tr>
              <tr style={{ background: PL }}><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Trypsin <Ext /></td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Pancreas</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Duodenum (alkaline)</td><td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Protein → peptides</td></tr>
              <tr style={{ background: "#fff" }}><td style={{ padding: "6px 8px", fontWeight: 700, color: PU }}>Lipase</td><td style={{ padding: "6px 8px" }}>Pancreas</td><td style={{ padding: "6px 8px" }}>Duodenum</td><td style={{ padding: "6px 8px" }}>Lipid → fatty acids + glycerol</td></tr>
            </tbody>
          </table>
        </div>
        <EnzymeBreakdownDiagram />
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 HCl + pepsin combo:</Bold> stomach HCl gives <KW c={TL}>pH 2</KW> — pepsin's optimum. The same low pH <Bold>kills bacteria</Bold> in food. So HCl has TWO functions in the stomach. Don't list just one.
        </div>
      </Sec>

      <Sec id="s7" title="⑦ Absorption &amp; Villus Adaptations">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          The <KW c={PU}>ileum</KW> is where most absorption happens. It is structurally <Bold>brilliantly adapted</Bold>. Examiners ask "explain how the structure of the villus is related to its function" — earn full marks with these:
        </div>
        <VillusDiagram />
        <div style={{ marginTop: 12, fontSize: 12.5, color: GR, lineHeight: 1.85 }}>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Long ileum</Bold> + circular folds + <KW c={PU}>villi</KW> + <KW c={PU}>microvilli</KW> → huge <Bold>surface area</Bold>.</li>
            <li><Bold>Wall one cell thick</Bold> (epithelium) → <KW c={PU}>short diffusion distance</KW>.</li>
            <li><Bold>Dense capillary network</Bold> → carries glucose &amp; amino acids away → <KW c={PU}>maintains concentration gradient</KW>.</li>
            <li><Bold>Lacteal</Bold> in centre → carries fatty acids &amp; glycerol away into the lymphatic system.</li>
          </ul>
          <br />
          <Bold>What is absorbed where:</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Glucose, amino acids → blood capillaries (via active transport mostly).</li>
            <li>Fatty acids, glycerol → lacteal (lymphatic system).</li>
            <li>Water → mostly small intestine (~80%); rest in colon.</li>
          </ul>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 Active transport vs diffusion:</Bold> glucose crosses the epithelium <KW c={TL}>faster than fructose</KW> even though their diffusion rates are similar — evidence for <Bold>active transport</Bold>. Water can even move against an osmotic gradient. Examiners want you to mention BOTH diffusion AND active transport.
        </div>
      </Sec>
    </div>
  );
}

// ④ TEXTBOOK TAB — Hodder reference notes (Ch.7 Human Nutrition)
