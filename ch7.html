function TextbookTab() {
  const [open, setOpen] = useState({ t1: true, t2: false, t3: false, t4: false, t5: false, t6: false, t7: false, t8: false, t9: false, t10: false, t11: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${G}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? G : GL, color: open[id] ? "#fff" : G, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Reference notes for Chapter 7: Human Nutrition</strong>. Sections ①–⑨ are paraphrased from the <Bold>Hodder Cambridge IGCSE Biology</Bold> textbook (pages 107–127). Sections ⑩–⑪ summarise the <Bold>Save My Exams (SME)</Bold> revision notes (concise and exam-focused). Use the Summary tab for revision; come here for detail.
      </div>

      <Sec id="t1" title="① Diet — The Need for Food &amp; Balanced Diets">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>All living organisms need food. Plants make their own in the leaves; animals must take it in <Bold>"ready-made"</Bold> by eating plants or the bodies of other animals. Food is used for <Bold>three</Bold> main purposes:</p>
          <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
            <li><Bold>Growth</Bold> — substances for making new cells &amp; tissues.</li>
            <li><Bold>Energy</Bold> — for chemical reactions, movement, heartbeat, nerve impulses, and (in mammals) maintaining body temperature.</li>
            <li><Bold>Replacement of worn or damaged tissues</Bold> — e.g. red blood cells (millions break down each day), skin, wound repair.</li>
          </ul>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Key definition:</Bold> A <KW>balanced diet</KW> is a diet that contains all the essential nutrients in the correct proportions to maintain good health. The nutrients needed are <Bold>carbohydrate, fat, protein, vitamins, minerals, fibre (roughage) and water</Bold>.
          </div>

          <p style={{ marginTop: 10 }}>The diet must contain enough carbohydrate and fat to meet energy needs; enough protein to provide amino acids for growth and repair; vitamins, mineral ions, fibre and water. The composition of foods varies — e.g. white fish has &lt;3% fat, while oily fish like rohu/mackerel can have &gt;10%. Frying food increases its fat content.</p>
        </div>
      </Sec>

      <Sec id="t2" title="② Classes of Food — Carbohydrate, Fat, Protein">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>There are three main classes of food: <Bold>carbohydrates, proteins and fats</Bold>. The diet must also include salts (mineral ions), vitamins, water and vegetable fibre. Each class has different sources and roles.</p>

          <Bold>Carbohydrates</Bold>
          <p>Sugar and starch are important carbohydrates. Good sources of starch: potatoes, bread, maize, rice, cereals. Common sugars in our diet: sucrose (table sugar), glucose, fructose. Carbohydrates contain <Bold>C, H and O</Bold> (e.g. glucose C₆H₁₂O₆). When oxidised in respiration they release energy: <KW>1 g of carbohydrate gives ~16 kJ</KW>. Excess carbohydrate is converted in the liver to <Bold>glycogen</Bold> (stored in liver/muscles) or to <Bold>fat</Bold> (stored in fat deposits).</p>
          <p>Cellulose (in plant cell walls) is a carbohydrate, but humans cannot digest it. It is still important as <Bold>fibre / roughage</Bold>.</p>

          <Bold>Fats (lipids)</Bold>
          <p>Sources include butter, milk, cheese, egg-yolk, animal fat, palm oil, sunflower oil. Fats are used: in cell membranes; for long-term energy storage in fat deposits; for insulation. Energy content: <KW>1 g of fat gives 37 kJ</KW> — more than twice as much as the same mass of carbohydrate or protein.</p>

          <Bold>Proteins</Bold>
          <p>Proteins supply <Bold>amino acids</Bold> needed to build body structures (cells, muscle, blood, bones, hair, nails, enzymes, some hormones, plasma proteins). Sources: meat, fish, eggs, milk, cheese, soybeans, peanuts, pumpkin seeds, tofu, Quorn, falafel. Chemically, proteins differ from carbohydrates and fats because they contain <Bold>nitrogen</Bold> (and sometimes sulfur), as well as C, H and O. Energy: 1 g of protein gives ~17 kJ. Excess amino acids cannot be stored — the liver removes their amino (—NH₂) groups and converts the residue to glycogen (this is <Bold>deamination</Bold>).</p>
        </div>
      </Sec>

      <Sec id="t3" title="③ Vitamins — C and D">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Vitamins are organic substances vital in <Bold>small quantities</Bold>. They are not built into body structures and are not broken down for energy — they assist chemical reactions in cells, often working with enzymes. At least 15 vitamins are known. They are grouped as <Bold>water-soluble</Bold> (in green leaves, fruits, cereal grains) or <Bold>fat-soluble</Bold> (in animal fats &amp; vegetable oils). For IGCSE you must know <KW>vitamin C</KW> and <KW>vitamin D</KW>.</p>

          <Bold>Vitamin C (ascorbic acid)</Bold>
          <p>Sources: citrus fruits (oranges, lemons, limes), blackcurrants, guava, mango, cabbage, fresh green vegetables, potatoes. Function: needed to maintain healthy skin and gums — it is essential for forming <Bold>collagen</Bold>, the protein in connective tissue of skin and blood vessels. Deficiency causes <KW c={RD}>scurvy</KW>: fibres in connective tissue do not form properly → bleeding under the skin, swollen and bleeding gums, poor wound healing, joint pain, tiredness, weakness; in severe cases, teeth fall out. Cannot be stored in the body — daily intake needed. Historically common in sailors on long voyages without fresh produce.</p>

          <Bold>Vitamin D (calciferol)</Bold>
          <p>Sources: butter, milk, cheese, egg-yolk, oily fish (sardines, mackerel), fish-liver oil, liver. Vitamin D is the only vitamin the body can make itself: natural fats in the skin are changed to a form of vitamin D when the skin is exposed to <Bold>sunlight (UV)</Bold>. Function: helps the body absorb <Bold>calcium and phosphorus</Bold> through the gut wall. Deficiency causes <KW c={RD}>rickets</KW> in children: calcium is not deposited properly in bones → bones remain soft, deform under the body's weight, causing bow legs. Adults deficient in vitamin D are at higher risk of bone fractures.</p>

          <p>People at risk of vitamin D deficiency: those living far from the equator (winter sun is too weak Oct–Apr in much of western Europe), people with darker skin (melanin absorbs UV), and those whose clothing covers most skin. In these cases dietary vitamin D or supplements are essential.</p>
        </div>
      </Sec>

      <Sec id="t4" title="④ Mineral Ions — Calcium &amp; Iron">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Proteins, carbohydrates and fats supply C, H, O, N, S and P. Several other elements ("mineral ions" or "mineral salts") are needed and come from food. For IGCSE, learn <KW>calcium</KW> and <KW>iron</KW>.</p>

          <Bold>Calcium</Bold>
          <p>Sources: milk (liquid, skimmed, dried), cheese, eggs, fish, "hard" water. Calcium phosphate is deposited in bones and teeth, making them hard. Calcium is also vital for <Bold>blood clotting</Bold>, muscle contraction, and nerve impulse transmission. Deficiency: muscle aches and cramps; teeth and bones become soft; rickets in children (linked to vitamin D); osteoporosis (brittle bones) later in life. Vitamin D and bile salts are needed for efficient calcium absorption — many calcium salts are insoluble and may pass through the canal without being absorbed.</p>

          <Bold>Iron</Bold>
          <p>Sources: red meat, liver, kidney, eggs, groundnuts, wholegrains, spinach, green vegetables. Iron is part of <Bold>haemoglobin</Bold>, the pigment in red blood cells that transports oxygen. Millions of red blood cells break down each day; their iron is recycled by the liver, but some is lost in faeces (as bilirubin) and must be replaced. Adults need ~15 mg/day. Deficiency causes <KW c={RD}>iron-deficiency anaemia</KW> — fewer red blood cells &amp; less haemoglobin → reduced oxygen-carrying capacity → constant tiredness, weakness, irritability, pale appearance. Women are at higher risk because heavy periods cause iron loss.</p>
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Fibre, Water &amp; Varying Dietary Needs">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>Dietary fibre (roughage)</Bold>
          <p>The cell walls of plant tissues are made of <Bold>cellulose</Bold>, which humans cannot digest. The plant cell walls reach the colon undigested and form fibre. Fibre <Bold>increases the bulk</Bold> of the colon contents and helps it retain water — this softens the faeces and reduces the time taken for undigested material to pass out, helping prevent <Bold>constipation</Bold> and keeping the colon healthy. Good sources: vegetables, fruit, wholemeal bread, whole cereal grains. White flour and white bread are low in fibre.</p>

          <Bold>Water</Bold>
          <p>About 70% of body tissue is water; it is a vital part of cytoplasm. Body fluids (blood, lymph, tissue fluid) are mainly water. Water acts as a <Bold>solvent</Bold> and <Bold>transport medium</Bold>: digested food, salts and vitamins are carried in solution; excretory products like urea are removed in solution by the kidneys. Digestion uses water as a reactant (hydrolysis). We lose water by sweating, urinating, breathing and evaporation, so it must be replaced daily.</p>

          <Bold>Varying dietary needs</Bold>
          <p>Energy &amp; protein needs vary with:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Age</Bold> — children &amp; teenagers need more protein (proportionally) for growth; energy need rises into adulthood; energy needs decrease in older adults due to muscle loss and slower metabolism.</li>
            <li><Bold>Activity level</Bold> — manual workers and athletes need more energy than office workers.</li>
            <li><Bold>Sex</Bold> — males usually have higher energy needs than females (larger average body mass).</li>
            <li><Bold>Pregnancy</Bold> — increased energy plus extra calcium and iron needed for the foetus's growing bones, teeth and blood.</li>
            <li><Bold>Breastfeeding</Bold> — increased energy and extra calcium to make breast milk.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t6" title="⑥ The Digestive System &amp; Alimentary Canal">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>For food to be useful, it must be <Bold>digested</Bold> — made soluble and small enough to be absorbed into the bloodstream. The blood then delivers it to all the tissues for use.</p>

          <Bold>Key definitions</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Ingestion</KW> — taking substances (food, drink) into the body through the mouth.</li>
            <li><KW>Digestion</KW> — the breakdown of food.</li>
            <li><KW>Absorption</KW> — movement of nutrients from the intestines into the blood.</li>
            <li><KW>Assimilation</KW> — uptake and use of nutrients by cells.</li>
            <li><KW>Egestion</KW> — passing out of food that has not been digested or absorbed, as faeces, through the anus.</li>
            <li><KW>Chemical digestion</KW> — breakdown of large insoluble molecules into small soluble molecules.</li>
            <li><KW>Physical digestion</KW> — breakdown of food into smaller pieces without chemical change to the food molecules.</li>
          </ul>

          <p>The alimentary canal is a tube running from mouth to anus. The order of regions: <Bold>mouth → oesophagus → stomach → duodenum → ileum → colon → rectum → anus</Bold>. Accessory organs (do NOT contain food, but help digestion): <Bold>salivary glands, liver, gall bladder, pancreas</Bold>. The inside of the canal is lined with epithelium that produces <Bold>mucus</Bold> for lubrication and protection. The wall has many blood vessels close to the lining for absorbing nutrients.</p>
        </div>

        <DigestiveSystemOverview />
      </Sec>

      <Sec id="t7" title="⑦ Physical Digestion — Teeth, Stomach &amp; Bile">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Physical digestion breaks food into smaller pieces <Bold>without chemical change</Bold>. The smaller pieces have a <KW>greater surface area</KW> for enzyme action. It is carried out by:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Chewing</Bold> by teeth (mouth)</li>
            <li><Bold>Churning</Bold> by stomach muscles</li>
            <li><Bold>Emulsification</Bold> of fats by bile (duodenum)</li>
          </ul>

          <Bold>Types of human teeth</Bold>
          <p>Humans are omnivores. Teeth shapes match function: <Bold>incisors</Bold> (chisel-shaped, biting/cutting); <Bold>canines</Bold> (slightly more pointed than incisors, similar function — extra incisors); <Bold>premolars &amp; molars</Bold> (cusps with knobbly surfaces, crushing &amp; grinding food). Top incisors pass in front of bottom incisors when biting. Premolars and molars meet (cusps mesh) when jaws close, crushing food into small pieces.</p>

          <Bold>Tooth structure</Bold>
          <p>Above gum line is the <Bold>crown</Bold>, below is the <Bold>root</Bold>. Layers: <KW>enamel</KW> (hard outer layer of crown — protects); <KW>dentine</KW> (softer layer beneath enamel — protects nerves); <KW>pulp cavity</KW> (soft inner tissue with nerves and blood vessels); <KW>cement</KW> (covers root, anchors tooth in jawbone); the gum covers the jaw bone.</p>

          <Bold>The stomach</Bold>
          <p>Elastic muscular walls stretch as food enters. Muscles alternately contract and relax, churning and squeezing the food, mixing it with <KW>gastric juice</KW> (containing hydrochloric acid + pepsin). The mixture becomes a creamy liquid (chyme). A <Bold>pyloric sphincter</Bold> at the base lets liquid products through, into the duodenum, a little at a time. Mixed meals (protein + fat) may stay in the stomach 1–2 hours; pure carbohydrate meals less than an hour; water passes through quickly.</p>

          <Bold>Bile (Extended)</Bold> <Ext />
          <p>Bile is a green, watery, alkaline fluid <KW c={PU}>made in the liver</KW> and stored in the <KW c={PU}>gall bladder</KW>. It is sent to the duodenum through the bile duct. <Bold>Bile contains no enzymes.</Bold> Two roles in physical/chemical digestion:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Emulsification</Bold> — bile salts break large fat drops into many small ones (greater surface area for lipase). This is <KW c={PU}>physical digestion</KW> (no bonds broken).</li>
            <li><Bold>Neutralisation</Bold> — alkaline bile (with pancreatic juice's sodium hydrogencarbonate) neutralises the acidic mixture from the stomach so duodenum enzymes can work at their alkaline optimum pH.</li>
          </ul>

          <Bold>Peristalsis (Going further)</Bold>
          <p>The alimentary canal has two muscle layers — <Bold>circular muscle</Bold> (around the canal) and <Bold>longitudinal muscle</Bold> (along its length). When circular muscles in one area contract, that area narrows, pushing food forward. A wave of contraction passes along the canal — this is <KW>peristalsis</KW>. It moves food from the oesophagus through to the rectum.</p>
        </div>
      </Sec>

      <Sec id="t8" title="⑧ Chemical Digestion — Enzymes &amp; the Three Macronutrients">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><KW c={PU}>Chemical digestion</KW> breaks down large insoluble molecules into small soluble molecules using <Bold>enzymes</Bold>. Without it, large molecules cannot pass through the intestinal wall into the blood.</p>

          <Bold>The three enzyme groups</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Amylase</KW> — made by the <Bold>salivary glands</Bold> (acts in the mouth) and the <Bold>pancreas</Bold> (acts in the duodenum). Substrate: starch. Product: maltose. Optimum pH: neutral / slightly alkaline.</li>
            <li><KW>Protease</KW> — group includes <Bold>pepsin</Bold> (made in stomach lining, acts in stomach, optimum pH ~2 — acidic) and <Bold>trypsin</Bold> (made in pancreas, acts in duodenum, alkaline conditions). Substrate: protein. Product: peptides → amino acids.</li>
            <li><KW>Lipase</KW> — made in the <Bold>pancreas</Bold>, acts in the <Bold>duodenum</Bold>. Substrate: lipid (fat). Products: fatty acids + glycerol.</li>
          </ul>

          <Bold>Hydrochloric acid</Bold>
          <p>The stomach lining produces <KW>gastric juice</KW>, which contains protease (pepsin), mucus, and <KW>hydrochloric acid</KW>. The HCl has <Bold>two functions</Bold>: (1) gives the optimum acidic pH (~pH 2) for pepsin, and (2) <Bold>kills bacteria</Bold> taken in with food (denaturing their enzymes).</p>

          <Bold>Digestion of starch (Extended)</Bold> <Ext />
          <p>Starch is digested in <Bold>two places</Bold>: by salivary amylase in the mouth, and by pancreatic amylase in the duodenum. Amylase breaks starch → <KW c={PU}>maltose</KW> (a 12-carbon disaccharide). Maltose is still too big to be absorbed. The enzyme <KW c={PU}>maltase</KW>, present in the membranes of the epithelial cells of the villi (small intestine), breaks maltose → <KW c={PU}>glucose</KW> (a 6-carbon monosaccharide). Glucose can then pass through the wall.</p>
          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6, color: "#3a2a6a" }}>
            <Bold>Pathway:</Bold> starch <span style={{ fontSize: 14 }}>→</span> maltose <span style={{ fontSize: 14 }}>→</span> glucose &nbsp;(amylase, then maltase)
          </div>

          <Bold>Digestion of protein (Extended)</Bold> <Ext />
          <p>Protein → peptides → amino acids. <Bold>Pepsin</Bold> in the acidic stomach attacks proteins, breaking them into peptides. <Bold>Trypsin</Bold> from the pancreas, secreted in an inactive form and activated in the duodenum, continues breaking proteins → peptides in alkaline conditions. Finally, <Bold>peptidases</Bold> in the membranes of the villi epithelium break peptides → amino acids, which can then pass through the cell.</p>
          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6, color: "#3a2a6a" }}>
            <Bold>Pathway:</Bold> protein <span style={{ fontSize: 14 }}>→</span> peptides <span style={{ fontSize: 14 }}>→</span> amino acids &nbsp;(pepsin/trypsin, then peptidases)
          </div>

          <Bold>Digestion of fats</Bold>
          <p>In the duodenum, bile emulsifies fats (physical), increasing surface area. Lipase then chemically breaks lipid → <Bold>fatty acids + glycerol</Bold>.</p>
        </div>

        <EnzymeBreakdownDiagram />
      </Sec>

      <Sec id="t9" title="⑨ Absorption &amp; Assimilation — Villi, Lacteals, the Liver">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The small intestine consists of the <Bold>duodenum</Bold> and the <Bold>ileum</Bold>. Nearly all absorption of digested food and most of the water happens in the <KW>ileum</KW>. Some water is also absorbed in the <KW>colon</KW>.</p>

          <Bold>Adaptations of the ileum for absorption</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Long</Bold> — provides large surface area for absorption.</li>
            <li>Inner surface increased by <Bold>circular folds</Bold> bearing thousands of <KW>villi</KW> (~0.5 mm long, finger-like). Villi greatly increase surface area.</li>
            <li>Each epithelial cell on a villus has <KW>microvilli</KW> on its outer membrane — increase the cell's exposed surface ×20 more.</li>
            <li>The lining epithelium is <Bold>only one cell thick</Bold> — fluids pass through it rapidly (short diffusion distance).</li>
            <li>Each villus has a dense network of <KW>blood capillaries</KW> — carry away glucose and amino acids, maintaining a concentration gradient.</li>
            <li>A <KW>lacteal</KW> (a lymph capillary) runs through the centre of each villus — carries away fats (as fatty acids and glycerol re-formed into fats inside epithelial cells).</li>
          </ul>

          <Bold>What is absorbed where</Bold>
          <p>Glucose and amino acids → blood capillaries → <Bold>hepatic portal vein</Bold> → liver. The liver may store or alter the products before releasing them into general circulation. Fats: most fatty acids and glycerol are recombined into fats in the intestinal epithelium and pass into the lacteals → lymphatic system → bloodstream. Water-soluble vitamins diffuse into the epithelium; fat-soluble vitamins are carried in the fat droplets. Mineral ions are absorbed by <Bold>active transport</Bold>; calcium needs vitamin D for effective absorption.</p>

          <Bold>Active transport at the ileum</Bold>
          <p>Absorption is not just by diffusion. Although the mechanisms are not fully understood, <KW>active transport</KW> is involved. Even water can cross the epithelium against an osmotic gradient. Amino acids, sugars and salts are almost certainly taken up by active transport. <Bold>Glucose crosses the epithelium faster than fructose</Bold> even though their diffusion rates would be similar — strong evidence for active transport.</p>

          <Bold>Assimilation</Bold>
          <p>Once absorbed, nutrients are taken up by cells (assimilation). Glucose is oxidised in respiration to release energy. Amino acids are built into cell proteins (membrane proteins, enzymes, plasma proteins). Fats are built into membranes and stored. Excess amino acids cannot be stored — the liver removes the amino group (deamination) and converts the residue to glycogen.</p>

          <Bold>Egestion</Bold>
          <p>Material reaching the colon is water + undigested matter (mainly cellulose), mucus and dead lining cells. Bacteria in the colon digest some fibre. The colon absorbs water, bile salts (returned to liver) and forms semi-solid <Bold>faeces</Bold>, stored in the rectum and passed out at intervals through the anus. Faeces typically spend 12–24 h in the intestine. Egestion ≠ excretion: faeces are <Bold>not</Bold> a metabolic product.</p>
        </div>

        <VillusDiagram />
      </Sec>

      <Sec id="t10" title="⑩ SME Quick Reference — Diet &amp; Digestion (concise)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>SME presents the same content in a compact, exam-shaped form. Key compressions:</p>

          <Bold>Balanced diet (7 components)</Bold>
          <p>carbohydrate (energy), protein (growth/repair), lipid (energy + insulation), fibre (bulk), vitamins (small-quantity health), minerals (small-quantity health), water (chemical reactions).</p>

          <Bold>Two vitamins, two minerals</Bold>
          <p>Vit C → collagen → scurvy (bleeding gums, tooth loss). Vit D → Ca absorption → rickets in children, fractures in adults. Calcium → bones/teeth/clotting → osteoporosis if deficient. Iron → haemoglobin → anaemia if deficient.</p>

          <Bold>Five processes — IDAAE mnemonic</Bold>
          <p>Ingestion → Digestion → Absorption → Assimilation → Egestion. Egestion is undigested food, NOT excretion.</p>

          <Bold>Stomach tissues</Bold>
          <p>The stomach has three tissue types working together: <Bold>muscular</Bold> (smooth muscle — churns), <Bold>glandular</Bold> (secretes pepsin, HCl, mucus), <Bold>epithelial</Bold> (covers inside; protected by mucus). All three together ⇒ stomach is an <Bold>organ</Bold>.</p>

          <Bold>HCl — two roles</Bold>
          <p>(1) Optimum pH ~2 for pepsin. (2) Kills bacteria (denatures their enzymes).</p>

          <Bold>Bile — two roles (Extended)</Bold>
          <p>(1) Emulsifies fats (physical digestion — bigger surface area for lipase). (2) Alkaline — neutralises stomach acid so duodenum enzymes work.</p>
        </div>
        <StomachTissues />
      </Sec>

      <Sec id="t11" title="⑪ SME Examiner Tips &amp; Common Pitfalls">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>① Emulsification ≠ chemical digestion.</Bold> "Tearing paper into smaller pieces of paper" — same molecule, just smaller pieces. So bile = physical digestion, even though it leads to faster chemical digestion later by lipase.

          <p style={{ marginTop: 8 }}><Bold>② Egestion vs excretion.</Bold> Faeces are NOT a metabolic waste product (they're undigested food + dead cells). Excretion = removing metabolic waste (urea, CO₂). Don't mix them.</p>

          <p><Bold>③ Where does each enzyme work?</Bold> Many students lose marks by confusing where enzymes are made vs where they act. Salivary amylase: made in salivary glands, acts in mouth. Pancreatic amylase/lipase/trypsin: made in pancreas, act in duodenum. Pepsin: made in stomach lining, acts in stomach. Maltase &amp; peptidases: in membranes of villi epithelium, act on the membrane surface.</p>

          <p><Bold>④ The villus question.</Bold> "Explain how the structure of the villus is related to its function" comes up VERY often. Always link <Bold>structure → function</Bold>: large surface area (villi/microvilli) → fast absorption; one-cell-thick wall → short diffusion distance; capillary network → maintains concentration gradient; lacteal → carries fats away.</p>

          <p><Bold>⑤ Vitamin D ↔ calcium.</Bold> A common trap: "What causes rickets?" Answer specifically — vitamin D deficiency. Without vitamin D, dietary calcium can't be absorbed. So a calcium-rich diet alone can fail.</p>

          <p><Bold>⑥ Active transport.</Bold> Many students write only "diffusion" for absorption. Add active transport — proven by glucose absorbing faster than fructose, and water moving against osmotic gradient.</p>

          <p><Bold>⑦ Define "balanced diet" precisely.</Bold> Examiners want: "all essential nutrients in the correct proportions to maintain good health". Listing the 7 components alone is not enough — mention "correct proportions".</p>
        </div>
      </Sec>
    </div>
  );
}

    { src: "SME", cat: "Enzymes", front: "Why does starch digestion not continue in the stomach? (EXT)", back: <span>Because amylase and maltase are <KW c={PU}>denatured</KW> by stomach acid. They need an optimum pH of around <Bold>pH 7</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "True or False? Maltase breaks starch directly into glucose. (EXT)", back: <span><KW c={RD}>False.</KW> Maltase breaks <Bold>maltose → glucose</Bold>. The first step (starch → maltose) is done by amylase. (Extended Tier)</span> },

    /* — Maltase, trypsin, pepsin (Extended) (68-72) — */
    { src: "SME", cat: "Enzymes", front: "Where in the digestive system is maltase found? (EXT)", back: <span>In the <KW c={PU}>small intestine</KW>, embedded in the lining (membranes) of the <Bold>epithelial cells</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "True or False? Trypsin digests protein in the stomach. (EXT)", back: <span><KW c={RD}>False.</KW> Trypsin is a protease released into the <Bold>small intestine</Bold>. <Bold>Pepsin</Bold> is the protease in the acidic stomach. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "Name the protease found in gastric juice. (EXT)", back: <span><KW c={PU}>Pepsin</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "Describe the optimum conditions for trypsin. (EXT)", back: <span>Trypsin works best in <KW c={PU}>alkaline</KW> conditions of the small intestine, at body temperature (~<Bold>37 °C</Bold>). (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "Name two enzymes that digest proteins. (EXT)", back: <span><KW c={PU}>Pepsin</KW> (in the stomach) and <KW c={PU}>trypsin</KW> (in the small intestine). (Extended Tier)</span> },

    /* — Pepsin in small intestine + bile pH (Extended) (73-76) — */
    { src: "SME", cat: "Enzymes", front: "What happens to pepsin in the small intestine? (EXT)", back: <span>The <KW c={PU}>alkaline conditions denature pepsin</KW> — its active site changes shape so it can no longer fit the substrate. (Extended Tier)</span> },
    { src: "SME", cat: "Bile", front: "True or False? Bile neutralises HCl. (EXT)", back: <span><KW c={TL}>True.</KW> Bile is alkaline, so it neutralises stomach acid in the small intestine. This creates a suitable pH for the small-intestine enzymes. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "Why is an alkaline pH needed in the small intestine? (EXT)", back: <span>Because amylase, trypsin and lipase have an <KW c={PU}>alkaline optimum pH</KW> — that is where they work best. (Extended Tier)</span> },
    { src: "SME", cat: "Enzymes", front: "True or False? Small-intestine enzymes work best at acidic pH. (EXT)", back: <span><KW c={RD}>False.</KW> They work best at <KW c={PU}>slightly alkaline pH</KW> — hence the importance of bile neutralising stomach acid. (Extended Tier)</span> },

    /* — Absorption basics (77-81) — */
    { src: "SME", cat: "Absorption", front: "True or False? Water is only absorbed in the colon.", back: <span><KW c={RD}>False.</KW> <Bold>Most</Bold> water is absorbed in the <KW c={TL}>small intestine</KW>; some additional water is absorbed in the colon.</span> },
    { src: "SME", cat: "Absorption", front: "What nutrients are absorbed in the small intestine?", back: <span><KW c={TL}>Glucose, amino acids, fatty acids and glycerol</KW>.</span> },
    { src: "SME", cat: "Absorption", front: "True or False? Proteins are absorbed in the small intestine.", back: <span><KW c={RD}>False.</KW> Proteins are too large. They must first be broken down into <Bold>amino acids</Bold> before absorption.</span> },
    { src: "SME", cat: "Absorption", front: "Where is most digested food absorbed?", back: <span>In the <KW c={TL}>small intestine</KW> (mainly the ileum).</span> },
    { src: "SME", cat: "Absorption", front: "Define absorption (in digestion).", back: <span>The <KW c={TL}>movement</KW> of small, digested food molecules from the digestive system into the <Bold>blood</Bold>.</span> },

    /* — Villi (Extended) (82-87) — */
    { src: "SME", cat: "Absorption", front: "Name two features of the small intestine that increase surface area. (EXT)", back: <span>1. It is very <KW c={PU}>long</KW>.<br/>2. It has <KW c={PU}>villi</KW> (and the cells of the villi have <Bold>microvilli</Bold>). (Extended Tier)</span> },
    { src: "SME", cat: "Absorption", front: "List three structural features of villi that aid absorption. (EXT)", back: <span>1. <KW c={PU}>Large surface area</KW><br/>2. <KW c={PU}>Short diffusion distance</KW><br/>3. Well supplied with <KW c={PU}>blood capillaries</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Absorption", front: "True or False? A good blood supply to villi aids rapid absorption. (EXT)", back: <span><KW c={TL}>True.</KW> Blood supply (1) <Bold>shortens diffusion distance</Bold> between intestine and blood, and (2) maintains <Bold>concentration gradients</Bold> by carrying absorbed molecules away. (Extended Tier)</span> },
    { src: "SME", cat: "Absorption", front: "What is the function of microvilli? (EXT)", back: <span>They <KW c={PU}>further increase the surface area</KW> of villi, raising the rate at which nutrients are absorbed into the bloodstream. (Extended Tier)</span> },
    { src: "SME", cat: "Absorption", front: "True or False? Villi are surrounded by several layers of cells. (EXT)", back: <span><KW c={RD}>False.</KW> Villi are surrounded by a <KW c={PU}>single layer</KW> of cells — keeping the diffusion distance as short as possible. (Extended Tier)</span> },
    { src: "SME", cat: "Absorption", front: "What is the purpose of the lacteal in the villus? (EXT)", back: <span>The <KW c={PU}>lacteal</KW> runs through the centre of the villus and transports <Bold>fatty acids and glycerol</Bold> away from the small intestine in the <Bold>lymph</Bold>. (Extended Tier)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SUPPL — NLCS Jeju supplementary cards (Hodder textbook detail + tips)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "Suppl", cat: "Diet", front: "How much energy does 1 g of carbohydrate, fat, and protein provide?", back: <span>Carbohydrate: <KW c={TL}>~16 kJ</KW>. Protein: <KW c={TL}>~17 kJ</KW>. Fat: <KW c={TL}>~37 kJ</KW>. Fat gives more than 2× the energy per gram.</span> },
    { src: "Suppl", cat: "Diet", front: "Approximately how many kJ does an average adult need per day?", back: <span>About <KW c={TL}>12 000 kJ/day</KW> (varies with age, sex, activity). Hodder Table 7.1: 2400 kJ asleep + 3000 inactive awake + 6600 physically active.</span> },
    { src: "Suppl", cat: "Diet", front: "Why are children's protein needs proportionally higher than adults'?", back: <span>Children are <KW c={TL}>growing</KW> — they need extra amino acids to build new cells and tissues, on top of replacing worn ones.</span> },
    { src: "Suppl", cat: "Vitamins", front: "Why are sailors historically prone to scurvy?", back: <span>Long sea voyages (15th–18th century) made <KW c={TL}>fresh fruit and vegetables</KW> hard to preserve and access. Vitamin C cannot be stored, so weeks at sea = scurvy.</span> },
    { src: "Suppl", cat: "Vitamins", front: "Why are vitamins not used as a source of energy?", back: <span>They are <KW c={TL}>not broken down</KW> by the body. They assist chemical reactions (often as enzyme cofactors) and are needed in tiny amounts.</span> },
    { src: "Suppl", cat: "Alimentary canal", front: "What is the role of the epiglottis when swallowing?", back: <span>A flap of cartilage that <KW c={TL}>covers the windpipe (trachea)</KW> when swallowing — preventing food from entering the lungs (choking).</span> },
    { src: "Suppl", cat: "Alimentary canal", front: "Describe peristalsis in detail. (Going further)", back: <span>The canal has <KW c={TL}>circular and longitudinal muscle</KW>. Circular muscle behind the food contracts → narrows that section → pushes food forward. A wave of contraction passes along, carrying the food through.</span> },
    { src: "Suppl", cat: "Stomach", front: "How long does a mixed meal stay in the stomach?", back: <span>1–2 hours typically. A pure carbohydrate meal: under an hour. <KW c={TL}>Pyloric sphincter</KW> at the base controls release into the duodenum.</span> },
    { src: "Suppl", cat: "Bile", front: "What gives bile its green colour? (Going further)", back: <span><KW c={TL}>Bile pigments</KW>, formed from the breakdown of <Bold>haemoglobin</Bold> in the liver. They have no digestive function — they are excreted with the faeces.</span> },
    { src: "Suppl", cat: "Enzymes", front: "Why are enzymes from the duodenum optimum at alkaline pH?", back: <span>Because they work in the <KW c={TL}>duodenum</KW>, which is made alkaline by <Bold>bile</Bold> (alkaline) and <Bold>pancreatic juice</Bold> (sodium hydrogencarbonate). This neutralises stomach acid.</span> },
    { src: "Suppl", cat: "Practical", front: "Describe the peanut energy practical (formula and units).", back: <span>Burn a peanut under 20 cm³ water in a boiling tube. Energy released = <KW c={TL}>m × c × ΔT</KW> = mass(g) × 4.2 × ΔT(°C). To compare to "real" value (2385 kJ per 100 g), divide J by mass of nut (in g).</span> },
    { src: "Suppl", cat: "Practical", front: "Why are the values in the peanut energy practical too LOW?", back: <span>Heat is lost to the surroundings (air, glass, evaporation, incomplete combustion). Improvements: <KW c={TL}>insulate</KW> the boiling tube; use a <Bold>calorimeter</Bold>; minimise distance between flame &amp; tube.</span> },
    { src: "Suppl", cat: "Practical", front: "In the salivary amylase + iodine practical, what is the control?", back: <span>The tube with <KW c={TL}>boiled saliva</KW> (tube B). Boiling <Bold>denatures the enzyme</Bold>, so starch is NOT digested — proves it was the active enzyme (not just saliva fluid) that did the digestion.</span> },
    { src: "Suppl", cat: "Practical", front: "In the Visking-tubing experiment, why does sugar appear OUTSIDE the tubing but starch does not?", back: <span>Visking tubing is <KW c={TL}>partially permeable</KW>. <Bold>Glucose/maltose</Bold> are small enough to diffuse out into the surrounding water; <Bold>starch</Bold> molecules are too large to pass through.</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams official card" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = official Save My Exams card · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary card for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended Tier"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

      <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 12 }}>

          fontSize: 12, fontWeight: 600, color: G, textDecoration: "none",
          padding: "5px 10px 5px 6px", borderRadius: 6,
          border: `1px solid ${BD}`, background: "#fff", transition: "all .15s",

      </div>

            {/* Header */}

          <span className="chapter-title">{CHAPTER_META.title}</span>
        </div>
        <div className="chapter-subtitle">
          {CHAPTER_META.subtitle}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActive(t.id)} style={{
            padding: "9px 16px", borderRadius: 8,
            border: active === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
            background: active === t.id ? t.color : "#fff",
            color: active === t.id ? "#fff" : t.color,
            fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
          }}>
            {t.label}
          </button>

      </div>
      <div style={{ fontSize: 11, color: tab.color, marginBottom: 16, paddingLeft: 4 }}>{tab.sub}</div>

      {active === "essence"   && <EssenceTab />}

      <div style={{ marginTop: 24, padding: "10px 16px", background: "#f5f5f3", borderRadius: 8, fontSize: 11, color: "#999", textAlign: "center" }}>
        Hodder Cambridge IGCSE Biology Ch.{CHAPTER_META.number} · All English · NLCS Jeju — Extended (Paper 1, 4, 6)
      </div>

  );
