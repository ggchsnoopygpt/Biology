// ── Routes of transmission diagram ─────────────────────────────────────────
function TransmissionRoutesDiagram() {
  const routes = [
    { x: 130, label: "Air droplets", ex: "colds, flu, COVID-19", icon: "💨", colour: "#7aa8d4" },
    { x: 280, label: "Food / water", ex: "cholera, typhoid", icon: "💧", colour: "#52b788" },

  ];
  return (
    <svg viewBox="0 0 700 280" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>

      {routes.map((r, i) => (
        <g key={i}>
          <rect x={r.x - 55} y="100" width="110" height="60" rx="8" fill="#fff" stroke={r.colour} strokeWidth="1.5"/>

// ③ SUMMARY TAB
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const [open, setOpen] = useState({ s1: true, s2: false, s3: false, s4: false, s5: false, s6: false, s7: false, s8: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${PU}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? PU : PL, color: open[id] ? "#fff" : PU, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#3a2a6a" }}>
        <strong>1st-stage summary</strong> — Chapter 10 condensed into key concepts, diagrams and comparison tables. Use after reading <Bold>④ Textbook</Bold> in detail.
      </div>

      <Sec id="s1" title="① Pathogens — Disease-Causing Organisms">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A <KW c={PU}>pathogen</KW> is a <Bold>disease-causing organism</Bold>. A <KW c={PU}>transmissible disease</KW> is one in which the pathogen can be passed from one host to another. Four groups of pathogens dominate the IGCSE specification: <Bold>bacteria</Bold>, <Bold>viruses</Bold>, <Bold>fungi</Bold> and <Bold>protoctists</Bold>.
        </div>
        <PathogenGroupsTable />
        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>How pathogens harm the host:</Bold> ① by <KW c={AM}>damaging cells</KW> directly (e.g. viruses bursting cells when they replicate); ② by releasing <KW c={AM}>toxins</KW> — chemicals that interfere with normal cell function (e.g. tetanus toxin from <em>Clostridium</em> causes muscle spasms; just 0.000 23 g is fatal).
        </div>
      </Sec>

      <Sec id="s2" title="② Transmission — Direct vs Indirect Contact">
        <TransmissionRoutesDiagram />
        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Direct contact</strong>
          The pathogen passes <Bold>directly</Bold> in body fluids — blood, semen, saliva. Examples: HIV, gonorrhoea, hepatitis B &amp; C.
          <br /><br />
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Indirect contact (via a vector)</strong>
          The pathogen leaves the host and is carried by an intermediate medium — a <KW c={PU}>vector</KW>. Vectors may be:
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Air droplets</Bold> — cold, flu, COVID-19 (coughs and sneezes spray virus-laden droplets).</li>
            <li><Bold>Food / water</Bold> — cholera, typhoid, dysentery (faecal contamination).</li>
            <li><Bold>Contaminated surfaces</Bold> — athlete's foot, Salmonella (also spread via flies' feet).</li>
            <li><Bold>Insect bites</Bold> — malaria (mosquito), dengue (mosquito), sleeping sickness (tsetse fly).</li>
          </ul>
        </div>
      </Sec>

      <Sec id="s3" title="③ Body Defences — Three Layers">
        <BodyDefencesDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>① Mechanical barriers</strong>
          Physical structures that block entry: <KW>skin</KW> (outer epidermis is tough and dry; scabs seal cuts); <KW>nose hairs</KW> (filter incoming air); <KW>cilia</KW> in trachea and bronchi (sweep mucus + microbes upward to the throat).
          <br /><br />
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>② Chemical barriers</strong>
          Substances secreted by body cells that trap or destroy pathogens: <KW>mucus</KW> (sticky lining traps microbes); <KW>stomach acid</KW> (pH ≈ 2 kills swallowed bacteria); <KW>lysozyme</KW> in tears and saliva digests bacterial cell walls.
          <br /><br />
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>③ Cellular defences</strong>
          Two types of white blood cell take over when pathogens get past the first two layers: <KW>phagocytes</KW> (engulf and digest pathogens) and <KW>lymphocytes</KW> (make specific antibodies and become memory cells).
        </div>
        <PhagocytosisDiagram />
      </Sec>

      <Sec id="s4" title="④ Antigens, Antibodies and Specificity (EXT)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          Every cell carries <KW c={PU}>antigens</KW> on its surface — molecules (usually proteins) that act like an identity badge. Lymphocytes recognise antigens as <Bold>'self'</Bold> or <Bold>'foreign'</Bold>. Foreign antigens trigger production of <KW c={PU}>antibodies</KW> — Y-shaped proteins with a shape <KW>complementary</KW> to that specific antigen.
        </div>
        <AntibodyAntigenDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>How antibodies destroy pathogens:</strong>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Bind to antigens on the pathogen surface.</li>
            <li>Cause <KW c={PU}>agglutination</KW> — clumping pathogens together so they can't move freely.</li>
            <li>Signal <Bold>phagocytes</Bold> to come and engulf the clump.</li>
          </ul>
        </div>
        <AgglutinationDiagram />
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail — don't confuse the three "anti-" terms:</Bold>
        </div>
        <AntiTermsBox />
      </Sec>

      <Sec id="s5" title="⑤ Active Immunity — Memory Cells &amp; Long-Term Protection (EXT)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <KW c={PU}>Active immunity</KW> is the defence against a pathogen by <Bold>antibody production in the body</Bold>. The first encounter (the <Bold>primary response</Bold>) is slow — it can take days, during which time the person may feel ill. But some activated lymphocytes survive as <KW c={PU}>memory cells</KW> that retain the recipe for the specific antibody. A second exposure triggers the <Bold>secondary response</Bold>: memory cells divide rapidly, antibodies appear faster and at higher levels, and the pathogen is destroyed before symptoms appear.
        </div>
        <AntibodyResponseGraph />
        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Two routes to active immunity:</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Natural</Bold> — the body catches an infection and recovers.</li>
            <li><Bold>Artificial</Bold> — the body is given a <KW c={PU}>vaccine</KW> containing harmless antigens.</li>
          </ul>
          Both produce memory cells; the difference is whether you had to get ill first.
        </div>
      </Sec>

      <Sec id="s6" title="⑥ Vaccination — How It Works &amp; Herd Immunity (EXT)">
        <VaccinationFlowDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          A <KW c={PU}>vaccine</KW> is a preparation of harmless material from a pathogen, designed to trigger immunity without causing the disease. It may be:
          <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
            <li><Bold>Live attenuated</Bold> microorganisms (weakened but still alive — e.g. BCG against TB, oral polio).</li>
            <li><Bold>Killed</Bold> microorganisms (e.g. Salk polio injection, whooping-cough vaccine).</li>
            <li><Bold>Antigens</Bold> isolated from the pathogen.</li>
            <li><Bold>Toxoids</Bold> — inactivated bacterial toxins (e.g. tetanus, diphtheria).</li>
          </ul>
        </div>
        <HerdImmunityDiagram />
        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Herd immunity:</Bold> when a sufficiently large proportion of the population (typically &gt; 90 %) is immune, the pathogen cannot find enough susceptible hosts to spread. This indirectly protects unvaccinated individuals — vital for babies too young to be vaccinated and for people with weak immune systems.
        </div>
        <div style={{ marginTop: 8, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> the WHO eradicated <KW c={TL}>smallpox</KW> by 1980 — the first human disease ever eliminated by vaccination. This is the textbook real-world example of vaccination at scale.
        </div>
      </Sec>

      <Sec id="s7" title="⑦ Passive Immunity &amp; Breastfeeding">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <KW c={PU}>Passive immunity</KW> is a short-term defence in which antibodies are <Bold>received ready-made</Bold> from another individual, rather than produced by your own lymphocytes. It is FAST-acting (antibodies are immediately present) but SHORT-lasting because <Bold>no memory cells</Bold> are created.
        </div>
        <ActivePassiveCompareBox />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Two routes to passive immunity:</strong>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Natural</Bold> — antibodies cross the placenta from mother to fetus, and pass into a baby through breast milk. Essential during the first months of life while the infant's own immune system is immature.</li>
            <li><Bold>Artificial</Bold> — injection of antibody-rich serum (e.g. anti-tetanus serum after a deep wound). Used when there is no time to wait for the body's own response.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="s8" title="⑧ Cholera — A Case Study (EXT)">
        <CholeraDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Pathogen:</strong> the bacterium <em>Vibrio cholerae</em> — a comma-shaped, water-borne bacterium.
          <br /><br />
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>How it causes disease:</strong>
          <ol style={{ margin: "4px 0", paddingLeft: 22 }}>
            <li>Ingested in contaminated water or food → reaches the small intestine.</li>
            <li>Attaches to the intestinal wall and releases a <KW c={RD}>toxin</KW>.</li>
            <li>Toxin causes epithelial cells to pump <KW c={RD}>Cl⁻ ions</KW> into the lumen.</li>
            <li>Lumen now has low <KW c={RD}>water potential</KW>; water moves OUT of cells (and the blood) by <KW c={RD}>osmosis</KW>.</li>
            <li>Massive watery diarrhoea → loss of water and ions → <Bold>dehydration</Bold> and possible kidney failure.</li>
          </ol>
        </div>
        <div style={{ marginTop: 10, background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#1a3a2a", lineHeight: 1.7 }}>
          <Bold>Treatment:</Bold> <KW c={G}>oral rehydration therapy</KW> (ORS) — clean water + small amounts of salt and sugar. The sugar (glucose) is co-transported with Na⁺ across the gut wall and helps water re-absorption. Antibiotics such as tetracycline kill the bacteria.<br /><br />
          <Bold>Prevention:</Bold> CLEAN drinking water + effective sewage treatment. Cholera is fundamentally a disease of poor sanitation — when these basics are in place, outbreaks vanish.
        </div>
      </Sec>
    </div>
  );
}

// ④ TEXTBOOK TAB — Hodder complete notes

function TextbookTab() {
  const [open, setOpen] = useState({ t1: true, t2: false, t3: false, t4: false, t5: false, t6: false, t7: false, t8: false, t9: false, t10: false, t11: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${G}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? G : GL, color: open[id] ? "#fff" : G, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Reference notes for Chapter 10: Diseases and Immunity</strong>. Sections ①–⑨ are paraphrased from the <Bold>Hodder Cambridge IGCSE Biology</Bold> textbook (pages 169–182). Sections ⑩–⑪ summarise the <Bold>Save My Exams (SME)</Bold> revision notes (concise and exam-focused). Use sections ① and ③ for revision; come here for detail when you don't know something.
      </div>

      <Sec id="t1" title="① Focus &amp; Key Definitions — Pathogens and Transmissible Disease">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The 21st century has brought rapid advances in our understanding of infectious disease — but new pathogens still emerge. The COVID-19 pandemic was a global reminder that pathogen biology, transmission control, and vaccine development are some of the most important applications of biology.</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Key definitions:</Bold><br />
            • A <KW>pathogen</KW> is a <Bold>disease-causing organism</Bold>.<br />
            • A <KW>transmissible disease</KW> is one in which the pathogen can be <Bold>passed from one host to another</Bold>.
          </div>

          <p style={{ marginTop: 10 }}>Pathogens include many <Bold>bacteria</Bold>, <Bold>viruses</Bold> and some <Bold>fungi</Bold>, as well as several <Bold>Protoctista</Bold> and other organisms.</p>
        </div>
      </Sec>

      <Sec id="t2" title="② Groups of Pathogens — Bacteria, Viruses, Fungi, Protoctists">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Bacteria</Bold> are single-celled organisms. They may damage host cells directly, but the more common mechanism is the production of <KW>toxins</KW> — poisonous waste chemicals. Toxins damage cells, upset normal body systems and produce symptoms like fever, headache, tiredness, weakness and sometimes diarrhoea and vomiting. The toxin produced by <em>Clostridium</em> (the tetanus bacterium) is so potent that only <KW c={RD}>0.000 23 g</KW> (2.3 × 10⁻⁴ g) is fatal.</p>

          <p><Bold>Viruses</Bold> cause diseases in plants and animals. Human virus diseases include the common cold, COVID-19, poliomyelitis, measles, mumps, chickenpox, herpes, rubella, influenza and <KW c={RD}>acquired immune deficiency syndrome (AIDS)</KW>. Plant examples include tobacco mosaic virus, which causes mottling and discolouration of leaves and stunts plant growth.</p>

          <p><Bold>Fungi</Bold> mostly feed on dead organic matter (saprotrophs), but some are parasitic. Parasitic fungi grow into host tissues using <KW>hyphae</KW> and digest cells. If the mycelium spreads widely, it usually kills the host. Plant fungal diseases (blight, rusts, mildew) cause major crop losses. In animals, fungi cause <Bold>tinea / ringworm</Bold> (athlete's foot is one type) — easily spread by contact with infected towels or clothing, but usually treatable with fungicidal ointment.</p>

          <p><Bold>Protoctists</Bold> include the malaria parasite <em>Plasmodium</em> (spread by mosquitoes) and the amoeba that causes amoebic dysentery.</p>
        </div>
        <PathogenGroupsTable />
      </Sec>

      <Sec id="t3" title="③ Transmission — Direct &amp; Indirect Contact">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Pathogens spread between hosts either directly or indirectly. The means of transmission is called the <KW>vector</KW>.</p>

          <p><Bold>Direct contact</Bold> involves the transfer of pathogens in <Bold>body fluids</Bold> — blood, semen, saliva. Examples: <KW c={RD}>Human immunodeficiency virus (HIV)</KW> can be passed when drug users share needles, or by unprotected sex; surgeons must avoid direct contact with patient blood; the diseases hepatitis B and C, gonorrhoea and syphilis are also passed by body fluids.</p>

          <p><Bold>Indirect contact</Bold> covers everything else — contaminated surfaces, food, water, air droplets and insect vectors.</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Airborne / droplet / aerosol infection:</Bold> when we sneeze, cough, laugh, speak or breathe out, we release a fine spray of tiny droplets. They remain floating for a long time and may be inhaled by others or fall on food. Viral diseases (colds, flu, measles, chickenpox, COVID-19) and bacterial diseases (sore throat caused by Streptococcus) all spread this way. Bacteria often die when droplets evaporate; viruses can stay infectious. Crowded, warm, moist indoor places (buses, trains, cinemas) increase transmission.<br /><br />
            <Bold>Contamination by houseflies:</Bold> flies feed on rotting matter and faeces, then walk on food. They place their mouthparts on food, regurgitate digestive fluid and "drink" it back up — transferring bacteria to your food. Hairs on their bodies, faeces from their gut, and bacteria on their feet all contaminate food. Houseflies can spread food poisoning, amoebic dysentery and polio.
          </div>
        </div>
        <TransmissionRoutesDiagram />
      </Sec>

      <Sec id="t4" title="④ Controlling the Spread — Public Health Measures">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>There are several proven ways of stopping pathogens from spreading. These are the foundation of public health.</p>
        </div>
        <ControlMeasuresBox />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Water treatment:</Bold> on a small scale, simply boiling water kills any pathogens. Large-scale supplies are made safe by FILTRATION + <KW>chlorination</KW> (chlorine kills the pathogens). Untreated sewage must be kept out of the supply.</p>

          <p><Bold>Hygienic food preparation:</Bold> <em>Salmonella</em> is one of the commonest food-poisoning bacteria — present in raw poultry, meat and unpasteurised milk. To avoid disease, milk should be pasteurised; meat should be thoroughly cooked; frozen poultry must be fully defrosted before cooking (otherwise the centre stays cold and Salmonella survives); raw and cooked meat must be kept and handled SEPARATELY; people handling cooked food should not also handle raw meat without washing their hands.</p>

          <p><Bold>Personal hygiene:</Bold> Salmonella, typhoid and similar bacteria are present in the faeces of infected people. People recovering from these diseases may feel well but still carry bacteria in their faeces; if they handle food without thoroughly washing their hands, they can pass the bacteria to many other people. People who carry pathogens without showing symptoms are called <KW>carriers</KW> — once identified, they should not work in food preparation or healthcare.</p>

          <p><Bold>Waste disposal:</Bold> domestic waste should be stored in dustbins / refuse cans with closely fitting lids, then either burned or buried deeply enough to prevent rats and flies feeding on it.</p>

          <p><Bold>Sewage treatment:</Bold> sewage contains harmful intestinal bacteria. Treatment plants remove solid waste and destroy harmful microbes (often using helpful microbes in aerated tanks). The treated water is then safe to release into rivers.</p>
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Defences Against Diseases — Mechanical, Chemical, Cellular">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Mechanical barriers</Bold> are physical structures that stop pathogens entering the body. The outer layer of the <KW>epidermis</KW> of the skin is dry, dead and tough — most bacteria cannot get through, although they can live on the surface. If skin is cut, bacteria can reach deeper tissues; this is when blood-clotting and scab formation become important. Hairs in the nose filter inhaled air, trapping dust and microbes; breathing through the mouth bypasses this defence. Cilia lining the trachea and bronchi sweep mucus + trapped microbes back up to the throat for swallowing.</p>

          <p><Bold>Chemical barriers</Bold> are substances secreted by the body. The <KW c={RD}>acid in the stomach</KW> (pH ≈ 2) kills most bacteria taken in with food. <KW>Mucus</KW> produced by the lining of the trachea and bronchi traps many bacteria, and ciliated cells carry the trapped bacteria away from the lungs. <KW>Lysozyme</KW> in tears and saliva digests bacterial cell walls — protecting the eyes and mouth.</p>

          <p><Bold>Cellular defences:</Bold> if a pathogen gets past the mechanical and chemical barriers, the body has two more lines of defence — both made up of white blood cells produced in the bone marrow.</p>

          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Phagocytes</KW> engulf bacteria by <Bold>phagocytosis</Bold> and digest them with enzymes.</li>
            <li><KW>Lymphocytes</KW> produce <Bold>antibodies</Bold> — proteins that attach to bacteria, marking them for destruction. Antibodies also clump bacteria together and neutralise the toxins (poisonous proteins) they produce.</li>
          </ul>
        </div>
        <BodyDefencesDiagram />
        <PhagocytosisDiagram />
      </Sec>

      <Sec id="t6" title="⑥ Antibodies &amp; Immunity (EXT) — How the Specific Response Works">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginBottom: 6 }}>
            <Bold>Key definition:</Bold><br />
            <KW>Active immunity</KW> is the defence against a pathogen by <Bold>antibody production in the body</Bold>.
          </div>

          <p>On the surface of all cells there are chemical substances called <KW>antigens</KW> with specific shapes. <KW>Lymphocytes</KW> are a type of white blood cell that produce proteins called <KW>antibodies</KW>; the antibodies have shapes <Bold>complementary</Bold> to the antigens — they fit together precisely.</p>

          <p>Antibodies attack pathogens or any alien cells / proteins in the body, including cells carrying a virus, bacteria, cancer cells, or transplanted cells. They also <Bold>clump pathogens together</Bold> (agglutination) and <Bold>neutralise toxins</Bold>. Each antibody is highly <KW c={RD}>specific</KW>: an antibody made against a typhoid bacterium will not recognise a pneumonia bacterium.</p>

          <p>Some of the lymphocytes that produce the specific antibody stay in the lymph nodes as <KW>memory cells</KW>. They divide rapidly and make more antibodies if the same antigen enters the body again. This means that, once you have recovered from measles or chickenpox, you are very unlikely to catch the disease again — this is <KW>active immunity</KW>. Active immunity can also be gained by <Bold>vaccination</Bold>.</p>
        </div>
        <AntibodyAntigenDiagram />
        <AgglutinationDiagram />
        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Going further — B and T lymphocytes:</Bold> there are two main types of lymphocyte. Both divide rapidly when activated by a specific antigen. <Bold>B cells</Bold> (from BONE marrow) become short-lived <KW c={PU}>plasma cells</KW> that release antibodies into the blood. 'Killer' <Bold>T cells</Bold> (from THYMUS gland) carry receptors that match antibodies stuck on the surface of infected cells; killer T cells then destroy those cells by damaging their membrane. 'Helper' T cells stimulate B cells to divide and produce antibodies, and also stimulate phagocytes.
        </div>
      </Sec>

      <Sec id="t7" title="⑦ Vaccination (EXT) — Producing Immunity Without Illness">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The body's defences can be improved by <KW>vaccination</KW>. A harmless form of the pathogen (a bacterium or virus) is introduced into the body — by injection or by mouth. The foreign antigens trigger white blood cells to make specific antibodies and produce memory cells. If the person is later exposed to the real disease, the defences are already in place — the person is <KW>immune</KW>. Without vaccination, white blood cells must first be exposed to the pathogen before they make the antibody; if the disease is potentially lethal, the patient might die before defences are mounted.</p>

          <p>The injected or swallowed material is the vaccine — it may take one of several forms:</p>
          <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
            <li><Bold>Antigens</Bold> isolated from the pathogen.</li>
            <li>A <Bold>harmless (live attenuated) form of the microorganism</Bold> — e.g. BCG inoculation against tuberculosis; oral Sabin polio vaccine.</li>
            <li><Bold>Killed microorganisms</Bold> — e.g. Salk anti-polio vaccine, whooping-cough vaccine.</li>
            <li>A <KW>toxoid</KW> — the inactivated toxin from a bacterium (e.g. diphtheria, tetanus). A toxoid keeps the chemical shape of the toxin but is no longer harmful.</li>
          </ul>
        </div>
        <VaccinationFlowDiagram />
        <AntibodyResponseGraph />
      </Sec>

      <Sec id="t8" title="⑧ Preventing Spread Through Vaccination — Herd Immunity">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Routine vaccination not only protects the individual but also prevents the spread of an infectious disease. Diseases like <Bold>diphtheria</Bold> and <Bold>whooping cough</Bold> were once common and are now rare because of routine vaccination. <Bold>Smallpox</Bold> was wiped out throughout the world by a WHO vaccination programme between 1959 and 1980.</p>

          <p>A large proportion of a population needs to be immunised (ideally over 90 %) to prevent an epidemic. When mass vaccination fails, the population is at risk of infection and potential epidemics. The <Bold>MMR scare</Bold> in the UK (caused by a now-discredited claim linking MMR to autism) led many parents to refuse the vaccine; vaccination rates dropped below 90 % in some areas, leaving children at risk of measles, mumps and rubella. It took years for doctors to restore parents' trust in the safety of the MMR vaccine.</p>

          <p>When COVID-19 emerged in December 2019, no vaccine was available, and the virus spread rapidly around the world to become a pandemic. There is always a small risk of side-effects from vaccines, just as there is with all medicines — but these risks are <Bold>far lower</Bold> than the risk of catching the disease itself.</p>
        </div>
        <HerdImmunityDiagram />
      </Sec>

      <Sec id="t9" title="⑨ Passive Immunity &amp; Breastfeeding">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Some diseases can be prevented or cured by injecting a patient with <KW>serum</KW> from a person who has recovered from the disease. Serum is plasma with the fibrinogen (clotting protein) removed. People who have recently received an anti-tetanus inoculation will have anti-tetanus antibodies in their blood; their plasma can be donated and the antibodies extracted. These antibodies can then be used to protect a patient at risk of tetanus, for example after a deep wound. Antibodies against chickenpox and rabies can be produced in a similar way.</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>Key definition:</Bold> the temporary immunity gained by these methods is called <KW>passive immunity</KW>. It is temporary because the antibodies were NOT produced by the patient — and no memory cells are formed.
          </div>

          <p style={{ marginTop: 10 }}>Antibodies cross the placenta from the mother's blood to the developing fetus. Also, when a mother breast-feeds her baby, the milk contains some of the mother's antibodies. When a baby is very young, its immune responses are not fully developed, so these inherited antibodies give protection at a time when the infant is most vulnerable. This is another example of passive immunity — short-term protection without memory cells.</p>
        </div>
        <ActivePassiveCompareBox />
      </Sec>

      <Sec id="t10" title="⑩ Cholera (EXT) — A Case Study in Bacterial Disease">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Cholera is caused by the bacterium <em>Vibrio cholerae</em>, which causes serious watery diarrhoea. The bacteria grow well in dirty water — often water contaminated by sewage. They are transmitted when the water is drunk or used to wash food. Treatment involves <KW>rehydration</KW> and replacement of the salts lost (often given by a carefully controlled injection into the bloodstream). Antibiotics such as <Bold>tetracycline</Bold> kill the bacteria. Long-term control is to dispose of human sewage safely, making sure that drinking water is free from bacteria and food is not contaminated.</p>

          <p><Bold>How cholera causes diarrhoea:</Bold></p>
          <ol style={{ margin: "6px 0", paddingLeft: 22 }}>
            <li>When <em>Vibrio cholerae</em> are ingested, they reproduce in the small intestine and invade its epithelial cells.</li>
            <li>The embedded bacteria release <KW c={RD}>toxins</KW> (poisons) that irritate the intestinal lining.</li>
            <li>Toxins make the cells secrete large amounts of water and salts, including chloride ions, into the lumen.</li>
            <li>The salts in the lumen DECREASE the osmotic potential (i.e. LOWER the <KW c={RD}>water potential</KW>) of the gut contents.</li>
            <li>Water moves out of the surrounding tissues and blood into the lumen by <KW c={RD}>osmosis</KW>.</li>
            <li>Undigested food becomes much more watery → serious diarrhoea.</li>
            <li>Loss of body fluids and salts causes <KW c={RD}>dehydration</KW> and kidney failure if untreated.</li>
          </ol>
        </div>
        <CholeraDiagram />
        <div style={{ marginTop: 10, background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#1a3a2a", lineHeight: 1.7 }}>
          <Bold>Going further — Salmonella food poisoning:</Bold> Salmonella bacteria live in the gut of cattle, chickens and ducks without symptoms. Humans get food poisoning from contaminated milk, meat or eggs. Symptoms (diarrhoea, vomiting, abdominal pain) start 12–24 hours after eating contaminated food. The disease is unpleasant but not usually serious; elderly people and young children may become very ill. Drug-resistant Salmonella strains are increasing — possibly because antibiotics are routinely fed to farm animals to promote growth.
        </div>
      </Sec>

      <Sec id="t11" title="⑪ Going Further — History of Vaccination (Jenner &amp; Pasteur)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Edward Jenner (1749–1823)</Bold> introduced smallpox vaccination. He observed that milkmaids who had caught cowpox from infected cows did not develop smallpox even after exposure. In 1796, in a famous (and ethically questionable) experiment, he took fluid from a cowpox blister on a milkmaid's hand and inoculated a young boy with it; two months later he inoculated the boy with smallpox and showed that the boy was immune. The technique spread through Europe, cutting smallpox deaths by about two-thirds. We now know that closely related viruses (cowpox vs smallpox) share antigens, so memory cells made against the harmless cowpox virus also recognise smallpox. Such weakened versions of a pathogen are called <KW>attenuated</KW>.</p>

          <p><Bold>Louis Pasteur (1822–1895)</Bold> made major contributions to microbiology. He showed that fermentation was caused by living yeast, not by spontaneous decay; that boiling killed the microbes that caused souring of wine (<KW>pasteurisation</KW>); and that microbes do not arise spontaneously from decay (his famous flask experiments). He went on to investigate diseases of silkworms, anthrax in livestock and rabies, and persuaded doctors to <Bold>sterilise their instruments by boiling</Bold> — drastically reducing post-surgery infections. His work established the <Bold>germ theory of disease</Bold>.</p>

          <p>By 1967 the WHO had launched a global vaccination programme to eradicate smallpox. The plan was to trace every case, isolate patients, and vaccinate everyone at risk. By 1987 the disease had been wiped out — the first (and so far only) human disease eliminated by vaccination.</p>
        </div>
      </Sec>
    </div>
  );
}

function FlashcardTab() {
  const cards = [
    /* ═══════════════════════════════════════════════════════════════════════
       SME OFFICIAL — 33 cards (Save My Exams Cambridge IGCSE Biology, Ch.10)
       Matches the official SME flashcard deck card-by-card.
       ═══════════════════════════════════════════════════════════════════════ */
    /* — Pathogens & transmission (SME 1-4) — */
    { src: "SME", cat: "Pathogens",    front: "Define the term pathogen.", back: <span>A pathogen is an <KW c={TL}>organism that causes disease</KW>.</span> },
    { src: "SME", cat: "Pathogens",    front: "True or False? Transmissible diseases are not caused by pathogens.", back: <span><KW c={RD}>False.</KW> A transmissible disease is <Bold>caused by a pathogen</Bold> that can be <KW c={TL}>passed from one host to another</KW>.</span> },
    { src: "SME", cat: "Transmission", front: "How are pathogens transmitted directly?", back: <span>Pathogens can be transmitted directly by <KW c={TL}>direct physical contact</KW>; this can involve the <Bold>exchange of blood or other bodily fluids</Bold>.</span> },
    { src: "SME", cat: "Transmission", front: "True or False? A pathogen can be transmitted indirectly via contaminated surfaces, food, animals and air.", back: <span><KW c={TL}>True.</KW> A pathogen can be transmitted indirectly via contact with <Bold>contaminated surfaces</Bold>, <Bold>contaminated food</Bold>, <Bold>infected animals</Bold>, and <Bold>infected droplets in the air</Bold>.</span> },

    /* — Body defences (SME 5-7) — */
    { src: "SME", cat: "Defences",   front: "What are the body's defences against pathogens?", back: <span>Body defences against pathogens include:<br/>• <KW c={TL}>Skin</KW><br/>• <KW c={TL}>Hairs in the nose</KW><br/>• <KW c={TL}>Mucus</KW><br/>• <KW c={TL}>Stomach acid</KW><br/>• <KW c={TL}>White blood cells</KW></span> },
    { src: "SME", cat: "Defences",   front: "True or False? Skin is a physical barrier to pathogens.", back: <span><KW c={TL}>True.</KW> Skin is a <Bold>physical barrier</Bold> to pathogens. If it is <KW c={RD}>cut or grazed</KW> this provides an <Bold>entrance method for pathogens</Bold>.</span> },
    { src: "SME", cat: "Defences",   front: "Why do the nose and lining of the trachea produce mucus?", back: <span>Mucus is produced to <KW c={TL}>trap pathogens</KW>. Trapped pathogens can then be removed from the airways by <Bold>coughing</Bold>, <Bold>blowing the nose</Bold>, or <Bold>swallowing</Bold>.</span> },

    /* — Controlling spread (SME 8-12) — */
    { src: "SME", cat: "Control",  front: "Why is a clean water supply important for controlling the spread of disease?", back: <span>Water can become <KW c={RD}>contaminated with pathogens</KW>, which can infect people if the water is used to <Bold>wash hands</Bold>, for <Bold>drinking</Bold>, or for <Bold>cooking</Bold>.</span> },
    { src: "SME", cat: "Control",  front: "True or False? Good personal hygiene is not necessary for the control of disease.", back: <span><KW c={RD}>False.</KW> Good personal hygiene is necessary for the control of disease:<br/>• <KW c={TL}>Washing</KW> removes pathogens from the skin.<br/>• Using <KW c={TL}>tissues</KW> when sneezing or coughing (instead of hands) means pathogens can be disposed of within the tissue.</span> },
    { src: "SME", cat: "Control",  front: "What are three methods required for controlling the spread of disease?", back: <span>Methods for controlling the spread of disease include:<br/>• A <KW c={TL}>clean water supply</KW><br/>• <KW c={TL}>Hygienic food preparation</KW><br/>• <KW c={TL}>Good personal hygiene</KW><br/>• <KW c={TL}>Waste disposal</KW><br/>• <KW c={TL}>Sewage treatment</KW></span> },
    { src: "SME", cat: "Control",  front: "What is the importance of sewage treatment in controlling the spread of disease?", back: <span>Raw sewage should be treated to <KW c={TL}>remove solid waste</KW> and <KW c={TL}>kill pathogens</KW> before it is released into the environment. This prevents people from coming into contact with the pathogens in sewage.</span> },
    { src: "SME", cat: "Control",  front: "What are two effective methods of hygienic food preparation?", back: <span>Effective methods of hygienic food preparation include:<br/>• Keeping food <KW c={TL}>cold</KW> to prevent pathogens from growing/reproducing.<br/>• <KW c={TL}>Washing hands</KW> before preparing food.<br/>• <KW c={TL}>Cleaning surfaces</KW>, utensils and equipment before preparing food.<br/>• <KW c={TL}>Cooking</KW> food to the correct temperature to kill pathogens.<br/>• <KW c={TL}>Covering</KW> food to prevent contamination from flies, which carry pathogens.</span> },

    /* — Active immunity (SME 13-14, EXT) — */
    { src: "SME", cat: "Active Imm.", front: "Define the term active immunity. (EXT)", back: <span>Active immunity is a <KW c={PU}>defence against a pathogen by antibody production in the body</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Active Imm.", front: "How can active immunity be induced in the body? (EXT)", back: <span>Active immunity can be induced by:<br/>• <KW c={PU}>Infection with a pathogen</KW><br/>• <KW c={PU}>Vaccination</KW> (Extended Tier)</span> },

    /* — Antigens & antibodies (SME 15-18, EXT) — */
    { src: "SME", cat: "Antibodies", front: "What is an antigen? (EXT)", back: <span>Antigens are <KW c={PU}>molecules on the surface of cells</KW>. Each pathogen has its own antigens on its surface; the antigens of each pathogen have a <Bold>specific shape</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Antibodies", front: "What is the difference between an antigen and an antibody? (EXT)", back: <span>• An <KW c={PU}>antigen</KW> is a molecule found on the <Bold>surface of a cell</Bold>.<br/>• An <KW c={PU}>antibody</KW> is a <Bold>protein</Bold> that <Bold>binds to specific antigens</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Antibodies", front: "What is the role of antibodies in the immune response? (EXT)", back: <span>Antibodies bind to antigens, leading to:<br/>• The <KW c={PU}>direct destruction of pathogens</KW>.<br/>• The <KW c={PU}>marking of pathogens for destruction by phagocytes</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Antibodies", front: "True or False? Antibodies have specific shapes which are complementary to specific antigens. (EXT)", back: <span><KW c={TL}>True.</KW> Specific antibodies have <KW c={PU}>complementary shapes</KW> which fit specific antigens. (Extended Tier)</span> },

    /* — Vaccination (SME 19-24, EXT) — */
    { src: "SME", cat: "Vaccination", front: "What is vaccination? (EXT)", back: <span>Vaccination introduces <KW c={PU}>weakened pathogens or their antigens</KW> into the body in order to <Bold>induce immunity</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Vaccination", front: "True or False? Vaccination stimulates an immune response in the body. (EXT)", back: <span><KW c={TL}>True.</KW> Vaccination stimulates an <KW c={PU}>immune response</KW> that results in <Bold>active immunity</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Vaccination", front: "What role do white blood cells play in vaccination? (EXT)", back: <span>The role of white blood cells in vaccination is:<br/>• <KW c={PU}>Lymphocytes</KW> respond to the vaccine by producing <Bold>antibodies</Bold>.<br/>• <KW c={PU}>Memory cells</KW> are produced. (Extended Tier)</span> },
    { src: "SME", cat: "Vaccination", front: "How does vaccination lead to long-term immunity? (EXT)", back: <span>Vaccination leads to long-term immunity because it results in the production of <KW c={PU}>memory cells</KW>. When someone is infected again by the same pathogen, the <Bold>memory cells quickly produce the correct antibodies</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Vaccination", front: "True or False? Vaccines control the spread of disease. (EXT)", back: <span><KW c={TL}>True.</KW> Vaccinating a <KW c={PU}>large proportion of a population</KW> reduces the likelihood that a pathogen will spread; this is because <Bold>most people in the population will be immune</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Vaccination", front: "How does vaccination help control the spread of disease? (EXT)", back: <span>Vaccination helps to control the spread of disease because:<br/>• <KW c={PU}>Vaccinated people cannot spread</KW> the disease.<br/>• The disease <KW c={PU}>cannot spread to vaccinated people</KW>.<br/>• Levels of disease will be <Bold>low enough in a vaccinated population to protect those who cannot be vaccinated</Bold>. (Extended Tier)</span> },

    /* — Passive immunity (SME 25-28, EXT) — */
    { src: "SME", cat: "Passive Imm.", front: "Define the term passive immunity. (EXT)", back: <span>Passive immunity is a <KW c={PU}>short-term defence against a pathogen by antibodies acquired from another individual</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Passive Imm.", front: "How can passive immunity be gained? (EXT)", back: <span>Passive immunity can be gained as follows:<br/>• Through <KW c={PU}>breast milk</KW><br/>• Across the <KW c={PU}>placenta during pregnancy</KW><br/>• By <KW c={PU}>injection</KW> (Extended Tier)</span> },
    { src: "SME", cat: "Passive Imm.", front: "How does breastfeeding enable passive immunity in an infant? (EXT)", back: <span>Breastfeeding provides passive immunity to infants when <KW c={PU}>antibodies pass from mother to infant via breast milk</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Passive Imm.", front: "True or False? Memory cells are produced in passive immunity. (EXT)", back: <span><KW c={RD}>False.</KW> <Bold>Memory cells are not produced</Bold> in passive immunity. (Extended Tier)</span> },

    /* — Cholera (SME 29-33, EXT) — */
    { src: "SME", cat: "Cholera", front: "What is cholera? (EXT)", back: <span>Cholera is a disease caused by a <KW c={PU}>bacterium</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Cholera", front: "How is cholera transmitted? (EXT)", back: <span>Cholera is transmitted in <KW c={PU}>contaminated water</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Cholera", front: "True or False? Cholera bacteria secrete chloride ions into the intestine. (EXT)", back: <span><KW c={RD}>False.</KW> Cholera bacteria <Bold>secrete a toxin</Bold> that <KW c={PU}>causes secretion of chloride ions</KW> into the small intestine. (Extended Tier)</span> },
    { src: "SME", cat: "Cholera", front: "What effect do cholera bacterial toxins have on the small intestine? (EXT)", back: <span>The toxin secreted by cholera bacteria causes:<br/>1. Secretion of <KW c={PU}>chloride ions</KW> into the intestine.<br/>2. An <KW c={PU}>increased solute concentration</KW> in the intestine, due to the presence of chloride ions.<br/>3. Movement of <KW c={PU}>water into the gut by osmosis</KW>.<br/>4. <KW c={PU}>Diarrhoea</KW>, due to the increased water content of the intestine. (Extended Tier)</span> },
    { src: "SME", cat: "Cholera", front: "What are the symptoms of a cholera infection? (EXT)", back: <span>The symptoms of a cholera infection are:<br/>• <KW c={PU}>Diarrhoea</KW><br/>• <KW c={PU}>Dehydration</KW> (Extended Tier)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       NLCS SUPPLEMENTARY — extra cards covering Hodder content & exam depth
       beyond the official SME 33-card deck.
       ═══════════════════════════════════════════════════════════════════════ */

    /* — Pathogen groups & extra examples — */
    { src: "Suppl", cat: "Pathogens", front: "Name the four groups of organisms that include pathogens.", back: <span>1. <KW c={TL}>Bacteria</KW><br/>2. <KW c={TL}>Viruses</KW><br/>3. <KW c={TL}>Fungi</KW><br/>4. <KW c={TL}>Protoctista</KW> (protists)</span> },
    { src: "Suppl", cat: "Transmission", front: "Give one disease spread by droplets in the air.", back: <span><KW c={TL}>Common cold</KW>, <KW c={TL}>influenza</KW>, COVID-19, measles, chickenpox, or sore throat caused by Streptococcus.</span> },
    { src: "Suppl", cat: "Transmission", front: "Give one disease spread through contaminated food or water.", back: <span><KW c={TL}>Cholera</KW>, <KW c={TL}>typhoid</KW>, or <KW c={TL}>dysentery</KW>.</span> },

    /* — Defences (depth) — */
    { src: "Suppl", cat: "Defences", front: "State the three categories of body defence against pathogens.", back: <span>1. <KW c={TL}>Mechanical barriers</KW> (skin, nose hairs)<br/>2. <KW c={TL}>Chemical barriers</KW> (mucus, stomach acid)<br/>3. <KW c={TL}>Cells</KW> — white blood cells (phagocytosis + antibodies)</span> },
    { src: "Suppl", cat: "Defences", front: "How do nose hairs defend against pathogens?", back: <span>Hairs inside the nose make it <KW c={TL}>difficult for pathogens</KW> in inhaled air to pass through, so they are not breathed deep into the lungs.</span> },
    { src: "Suppl", cat: "Defences", front: "Why is stomach acid an effective chemical barrier?", back: <span>Stomach acid contains <KW c={TL}>hydrochloric acid</KW> at a very low pH (≈ pH 2). It is strong enough to <Bold>kill pathogens</Bold> taken in with food, water, or swallowed mucus.</span> },
    { src: "Suppl", cat: "Phagocytes", front: "Describe phagocytosis.", back: <span>A type of white blood cell (a <KW c={TL}>phagocyte</KW>) <Bold>engulfs</Bold> pathogenic cells and <Bold>digests</Bold> them with enzymes inside the phagocyte. This destroys the pathogen.</span> },

    /* — Antibody depth (EXT) — */
    { src: "Suppl", cat: "Antibodies", front: "What is an antitoxin? (EXT)", back: <span>An antitoxin is a <KW c={PU}>protein</KW> made by lymphocytes that <KW c={PU}>neutralises the toxins</KW> produced by bacteria. Different from a normal antibody, which acts on the bacterium itself. (Extended Tier)</span> },
    { src: "Suppl", cat: "Antibodies", front: "What is agglutination? (EXT)", back: <span>Agglutination is the <KW c={PU}>clumping together</KW> of pathogens caused by antibodies binding to their antigens. Clumped pathogens cannot move easily and many can be engulfed together by phagocytes. (Extended Tier)</span> },
    { src: "Suppl", cat: "Antibodies", front: "Why is each antibody specific to one type of antigen? (EXT)", back: <span>Because the shape of the antibody is <KW c={PU}>complementary</KW> to the shape of that particular antigen — much like a lock and key. Each lymphocyte produces only <Bold>one type</Bold> of antibody. (Extended Tier)</span> },

    /* — Active immunity dynamics (EXT) — */
    { src: "Suppl", cat: "Active Imm.", front: "How fast is active immunity, and how long does it last? (EXT)", back: <span>Active immunity is <KW c={PU}>slow-acting</KW> (the first response takes days) but provides <KW c={PU}>long-lasting</KW> immunity, often for many years or for life — because memory cells remain in the blood. (Extended Tier)</span> },
    { src: "Suppl", cat: "Active Imm.", front: "Why is the response to a second infection by the same pathogen faster? (EXT)", back: <span>Because <KW c={PU}>memory cells</KW> from the first infection have retained the instructions to produce the specific antibody. On second exposure, antibodies are produced <Bold>much faster</Bold> and in <Bold>much greater quantities</Bold>, destroying the pathogen before illness develops. (Extended Tier)</span> },

    /* — Vaccination depth (EXT) — */
    { src: "Suppl", cat: "Vaccination", front: "Describe the four-step process of vaccination. (EXT)", back: <span>1. A <KW c={PU}>weakened, dead or altered</KW> pathogen (with its antigens) is introduced into the body.<br/>2. The pathogen cannot cause illness but <KW c={PU}>triggers an immune response</KW>.<br/>3. Lymphocytes produce <Bold>complementary antibodies</Bold>.<br/>4. <Bold>Memory cells</Bold> form, giving long-lasting immunity. (Extended Tier)</span> },
    { src: "Suppl", cat: "Vaccination", front: "Define herd immunity. (EXT)", back: <span>When a <KW c={PU}>large enough percentage</KW> of a population is vaccinated, there are very few unvaccinated hosts left for the pathogen to infect. This protects even those who are <Bold>not vaccinated</Bold>. (Extended Tier)</span> },
    { src: "Suppl", cat: "Vaccination", front: "Why do some pathogens evade immunity even after infection? (EXT)", back: <span>Some pathogens <KW c={RD}>mutate</KW> quickly, changing the antigens on their cell surface. The memory cells made in the first infection no longer recognise the new antigens — so antibodies are not produced fast enough. (Extended Tier)</span> },

    /* — Pathogen examples / Hodder depth — */
    { src: "Suppl", cat: "Pathogens", front: "Give two examples of viral diseases mentioned in Hodder Ch.10.", back: <span>Any two of: <KW c={TL}>common cold, COVID-19, polio, measles, mumps, chickenpox, herpes, rubella, influenza, AIDS</KW> (HIV).</span> },
    { src: "Suppl", cat: "Pathogens", front: "What is a toxin, and why is it dangerous?", back: <span>A toxin is a <KW c={TL}>poisonous waste product</KW> made by some bacteria. Toxins damage host cells and disturb body systems, causing symptoms such as fever, headache, tiredness, diarrhoea or vomiting. The toxin from <Bold>Clostridium tetani</Bold> is so potent that as little as 0.000 23 g is fatal.</span> },
    { src: "Suppl", cat: "Pathogens", front: "Give an example of a parasitic fungus that infects humans.", back: <span><KW c={TL}>Tinea</KW> (ringworm) — including <Bold>athlete's foot</Bold> (tinea between the toes). The fungus grows in the epidermis, causing irritation and inflammation; it spreads via contact with infected towels or clothing.</span> },

    /* — Transmission detail — */
    { src: "Suppl", cat: "Transmission", front: "How does HIV spread by direct contact?", back: <span>HIV is transferred via <KW c={TL}>infected body fluids</KW> — most commonly through <Bold>shared needles</Bold> among drug users, <Bold>contaminated surgical wounds</Bold>, or <Bold>unprotected sex</Bold>. Transfer via saliva is now considered very low-risk.</span> },
    { src: "Suppl", cat: "Transmission", front: "How do houseflies spread bacteria onto food? (Hodder)", back: <span>Flies visit decaying food or faeces and pick up bacteria on their <KW c={TL}>mouthparts, hairs and feet</KW>. When they land on clean food they shed bacteria onto it, vomit digested liquid onto it, and leave a trail of faeces.</span> },
    { src: "Suppl", cat: "Transmission", front: "What is a 'carrier' of disease?", back: <span>A person who <KW c={TL}>carries pathogens without showing symptoms</KW>. Carriers are dangerous because they can infect others without knowing it; people identified as carriers should not work in food preparation.</span> },

    /* — Defences detail — */
    { src: "Suppl", cat: "Defences", front: "Describe how ciliated cells help defend against pathogens. (Hodder)", back: <span>Mucus in the <KW c={TL}>trachea and bronchi</KW> traps bacteria. The <Bold>ciliated cells</Bold> lining these airways then beat their cilia rhythmically to <KW c={TL}>sweep the mucus (and trapped bacteria) upward, away from the lungs</KW> toward the throat to be swallowed.</span> },
    { src: "Suppl", cat: "Defences", front: "How does the body defend against a bacterium on the hand vs in the stomach? (Hodder Q3)", back: <span><Bold>Hand:</Bold> the <KW c={TL}>skin epidermis</KW> acts as a mechanical barrier.<br/><Bold>Bronchus:</Bold> <KW c={TL}>mucus</KW> traps the bacterium and <Bold>cilia</Bold> sweep it back to the throat to be swallowed.<br/><Bold>Stomach:</Bold> <KW c={TL}>hydrochloric acid</KW> kills the bacterium.</span> },

    /* — Antibodies / lymphocytes EXT — */
    { src: "Suppl", cat: "Antibodies", front: "Compare what antibodies do to pathogens vs to toxins. (EXT)", back: <span><Bold>Pathogens:</Bold> antibodies attach to surface antigens → <KW c={PU}>agglutination</KW> + signal to phagocytes for destruction.<br/><Bold>Toxins:</Bold> a special class of antibody called an <KW c={PU}>antitoxin</KW> binds to the toxin molecule and <Bold>neutralises</Bold> it. (Extended Tier)</span> },
    { src: "Suppl", cat: "Antibodies", front: "Where are lymphocytes made, and where do memory cells stay? (Hodder, EXT)", back: <span>Lymphocytes are a type of white blood cell made in <KW c={PU}>bone marrow</KW>. After an infection, some lymphocytes that made the specific antibody remain in the <KW c={PU}>lymph nodes</KW> as <Bold>memory cells</Bold>, ready to divide rapidly on re-exposure. (Extended Tier)</span> },

    /* — Vaccination detail — */
    { src: "Suppl", cat: "Vaccination", front: "List four forms a vaccine can take. (Hodder)", back: <span>1. <KW c={TL}>Antigens</KW> from the pathogen.<br/>2. A <KW c={TL}>weakened (attenuated) live</KW> microorganism (e.g. Sabin polio, BCG TB).<br/>3. A <KW c={TL}>killed (inactivated)</KW> microorganism (e.g. Salk polio, whooping cough).<br/>4. An <KW c={TL}>inactivated toxin</KW> — a <Bold>toxoid</Bold> (e.g. tetanus, diphtheria).</span> },
    { src: "Suppl", cat: "Vaccination", front: "Why was MMR vaccination important, and what happened to it? (Hodder)", back: <span>MMR protects against <KW c={TL}>measles, mumps and rubella</KW> — all potentially life-threatening. A 1998 paper falsely linked MMR to autism; vaccination rates dropped below 90% in some areas, leading to renewed outbreaks. Years of work were needed to <Bold>restore parental confidence</Bold> in MMR.</span> },
    { src: "Suppl", cat: "Vaccination", front: "What does the antibody-level vs time graph after a vaccine booster show? (Hodder Q7, EXT)", back: <span><Bold>1st injection:</Bold> antibody levels rise <KW c={PU}>slowly</KW> after about a week (primary response), then fade.<br/><Bold>Booster:</Bold> memory cells respond <KW c={PU}>rapidly</KW> — antibodies rise to a much higher peak and persist longer (secondary response). This is why boosters are given. (Extended Tier)</span> },
    { src: "Suppl", cat: "Vaccination", front: "Give an example of a disease eradicated worldwide by vaccination.", back: <span><KW c={TL}>Smallpox</KW> — officially declared eradicated in 1980 (by 1987 in Hodder). The WHO programme traced every case, isolated patients, and vaccinated all people at risk. Smallpox is still the only human disease eradicated by vaccination.</span> },

    /* — Passive immunity detail — */
    { src: "Suppl", cat: "Passive Imm.", front: "How can passive immunity be given artificially?", back: <span>By <KW c={TL}>injecting serum</KW> containing antibodies from a person who has recovered from (or been vaccinated against) a disease. Example: <Bold>anti-tetanus serum</Bold> given after a dirty wound. The patient receives ready-made antibodies but makes no memory cells, so protection is short-term.</span> },
    { src: "Suppl", cat: "Passive Imm.", front: "Through what two routes do maternal antibodies reach a baby?", back: <span>1. Across the <KW c={TL}>placenta</KW> during pregnancy.<br/>2. Through <KW c={TL}>breast milk</KW> after birth.<br/>Both routes provide short-term passive immunity while the baby's own immune system matures.</span> },

    /* — Cholera detail — */
    { src: "Suppl", cat: "Cholera", front: "Name the pathogen that causes cholera.", back: <span><KW c={TL}>Vibrio cholerae</KW> — a comma-shaped bacterium (vibrio). It is spread through <Bold>water or food contaminated with sewage</Bold>.</span> },
    { src: "Suppl", cat: "Cholera", front: "Describe how Vibrio cholerae causes diarrhoea, step by step. (EXT)", back: <span>1. Bacteria <KW c={PU}>attach to the wall</KW> of the small intestine.<br/>2. They release a <KW c={PU}>toxin</KW>.<br/>3. The toxin stimulates intestinal cells to release <KW c={PU}>chloride ions</KW> into the lumen.<br/>4. This <KW c={PU}>lowers the water potential</KW> in the lumen.<br/>5. Water moves out of cells into the lumen by <KW c={PU}>osmosis</KW>.<br/>6. Watery faeces (severe diarrhoea) → loss of water and ions → dehydration. (Extended Tier)</span> },
    { src: "Suppl", cat: "Cholera", front: "How is severe diarrhoea (e.g. from cholera) treated?", back: <span>With <KW c={TL}>oral rehydration therapy (ORS)</KW> — a drink containing a small amount of <Bold>salt</Bold> (ions) and <Bold>sugar</Bold> (glucose) dissolved in clean water. Glucose co-transport pulls water and salt back across the gut wall, restoring hydration. Severe cases may also receive intravenous fluids and antibiotics (e.g. tetracycline).</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams official card" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = official Save My Exams card · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary card for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended Tier"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
