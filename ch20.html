function TextbookTab() {
  const section = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${G}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 14 };
  const h = { fontSize: 14, fontWeight: 800, color: G, marginBottom: 8, letterSpacing: 0.3 };
  const sub = { fontSize: 12, fontWeight: 700, color: G, marginTop: 10, marginBottom: 5 };
  const p = { fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8 };
  const ul = { fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8, paddingLeft: 20 };

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: G, fontWeight: 600 }}>
        📚 <Bold>Textbook</Bold> · complete Hodder notes for Chapter 20
      </div>

      {/* 1. FOOD SUPPLY */}
      <div style={section}>
        <div style={h}>1 · Food supply &amp; intensification of agriculture</div>

        <div style={sub}>1.1 Background</div>
        <p style={p}>
          A few thousand years ago, humans collected leaves, fruits, roots and hunted animals. Population size was limited by available food. Human waste and dead bodies passed naturally into the <KW>nitrogen cycle</KW> and humans fitted into the food web like any other animal. Once <KW>agriculture</KW> was developed, far larger populations could be supported — but the balance between humans and their environment was upset.
        </p>

        <div style={sub}>1.2 Mechanisation &amp; larger fields</div>
        <p style={p}>
          Forests and woodland are cut down for farmland. The World Wide Fund for Nature estimates that <Bold>27% of the Amazon will be without trees by 2030</Bold> if present rates continue. To work fields efficiently, <Bold>hedges are removed</Bold> to enlarge them and <KW>tractors and combine harvesters</KW> are used. Repeated ploughing of pasture has been shown to <Bold>reduce the number of soil species</Bold>.
        </p>

        <div style={sub}>1.3 Chemical fertilisers</div>
        <p style={p}>
          In a natural community the minerals removed and replaced in the soil are in balance. In agriculture, most of the crop is removed — so little or no organic matter is left for nitrifying bacteria to act on. On farms with animals, manure is ploughed back into the soil, replacing nitrates and giving good soil structure.
        </p>
        <p style={p}>
          When manure is not available, <KW>chemical fertilisers</KW> are used. Examples: <Bold>ammonium sulfate</Bold> (N and S), <Bold>ammonium nitrate</Bold> (N), <Bold>compound NPK fertiliser</Bold> (N, P, K). These boost yields but contain <Bold>no organic matter</Bold>, so they do not improve soil structure. Their use can also pollute rivers (eutrophication).
        </p>

        <div style={sub}>1.4 Pesticides — herbicides &amp; insecticides</div>
        <p style={p}>
          A <KW>pesticide</KW> is a chemical that destroys agricultural pests or competitors. <KW>Herbicides</KW> kill weeds (plants that compete for water, ions, light). <KW>Insecticides</KW> kill insects that eat or damage the plants.
        </p>
        <p style={p}>
          The trouble is that most pesticides <Bold>kill randomly</Bold> — they affect not just the pest, but also useful species like <Bold>bees</Bold> (pollination) and <Bold>ladybirds</Bold> (natural predators of aphids).
        </p>
        <p style={p}>
          <Ext /> In about 1960, <Bold>aldrin and dieldrin</Bold> were used to kill wireworms. Aldrin halved the soil-animal species in a pasture. Dieldrin was used as a seed dressing — but birds dug up and ate the dressed seed; <Bold>thousands of birds were poisoned</Bold>, and the carnivorous mammals and birds of prey that ate them were also killed. Both are now banned in many countries (India banned them in 2003), but still persist in the environment.
        </p>

        <div style={sub}>1.5 Selective breeding</div>
        <p style={p}>
          Farmers and breeders pick the offspring with the best characteristics (large fruit, high milk yield, disease resistance) and breed only from those individuals. After many generations, a <Bold>true-breeding variety</Bold> with the desired trait is produced. Drawbacks: the whole set of genes is transferred (some may be harmful in a homozygous state), and the genetic <Bold>variability</Bold> of the population is reduced — so future adaptation becomes harder.
        </p>

        <div style={sub}>1.6 Monoculture</div>
        <p style={p}>
          A <KW>monoculture</KW> is a dense crop of a single species (e.g. wheat, soybean). Advantages: high yield, easy to harvest with machines, more profitable. Disadvantages: prone to insect pests and fungal disease; <Bold>one disease can wipe out the entire crop</Bold>; loss of soil nutrients and soil erosion; native plant and animal communities are displaced — biodiversity falls.
        </p>

        <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 12px", marginTop: 8, fontSize: 12, lineHeight: 1.55, color: GR }}>
          <Bold>Case study — palm oil (SME)</Bold>: palm-oil plantations in Indonesia and Malaysia are a major modern monoculture. Production has risen rapidly over the last 30 years, but the conversion of rainforest into oil palm has caused massive habitat loss for orangutans and other rainforest species.
          <div style={{ marginTop: 6 }}>
            <Bold>The pesticide-resistance cascade</Bold>: where a single pest feeds on a vast monoculture, the pest population grows rapidly because food is abundant. Farmers spray repeatedly → harmless insects (pollinators, predators of pests) are killed → through natural selection the surviving pests become <Bold>resistant</Bold>, so the chemical loses its effectiveness. Higher and more frequent doses are then needed, worsening pollution.
          </div>
        </div>

        <div style={sub}>1.7 Intensive livestock production (factory farming)</div>
        <p style={p}>
          Chickens and calves are reared in large sheds rather than open fields. Advantages: high yield; many systems automated (milking, feeding, egg collection); animals are sheltered from weather and disease. Disadvantages: <Bold>slurry</Bold> (urine + faeces washed out with water) supplies excess nitrate and phosphate to nearby rivers → eutrophication; <Bold>overgrazing</Bold> compacts the soil so rain cannot penetrate, causing soil erosion; close confinement means animals are <Bold>more vulnerable to disease</Bold>.
        </p>

        <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 12px", marginTop: 8, fontSize: 12, lineHeight: 1.55, color: GR }}>
          <Bold>How intensive livestock raises yield — four mechanisms (SME)</Bold>
          <ul style={{ margin: "4px 0 0", paddingLeft: 16 }}>
            <li><Bold>Confined space</Bold> — animals move less, so less energy is wasted on muscular activity. More food energy is therefore converted into growth (biomass).</li>
            <li><Bold>High-energy feed</Bold> — concentrate diets (grain, soybean meal) deliver more energy per kg ingested than pasture grazing, accelerating growth.</li>
            <li><Bold>Routine antibiotics</Bold> — preventative dosing reduces disease in crowded sheds and limits energy lost to immune responses.</li>
            <li><Bold>Heated housing</Bold> — keeping sheds artificially warm cuts the energy animals spend regulating body temperature.</li>
          </ul>
          <div style={{ marginTop: 6 }}>
            <Bold>Trade-off</Bold>: cheaper food and year-round supply, but ethical concerns over welfare, antibiotic resistance, methane emissions and ecosystem damage from waste run-off.
          </div>
        </div>
      </div>

      {/* 2. HABITAT DESTRUCTION */}
      <div style={section}>
        <div style={h}>2 · Habitat destruction</div>

        <div style={sub}>2.1 Key definition</div>
        <p style={p}>
          <KW>Biodiversity</KW> = the number of different species that live in an area.
        </p>

        <div style={sub}>2.2 Removal of habitats</div>
        <p style={p}>
          Farmland is not a natural habitat, but historically <Bold>hedgerows, hay meadows and stubble fields</Bold> supported many plants and animals. Intensive farming has destroyed these habitats: hedges removed for larger fields; monocultures of grass have replaced hay meadows; winter wheat means no stubble fields in autumn. Populations of butterflies, wildflowers and birds have fallen.
        </p>
        <p style={p}>
          <Bold>Urbanisation</Bold> — town and city expansion — destroys natural habitat. Advice for farmers includes leaving <Bold>uncultivated strips</Bold> around fields and planting new hedgerows; these significantly raise insect populations.
        </p>

        <div style={sub}>2.3 Extraction of natural resources</div>
        <p style={p}>
          <Bold>Coal mining</Bold>: surface scraping and spoil heaps destroy habitats; spoil contains toxic metals preventing recolonisation. <Bold>Open-pit mining</Bold> (gold, iron, aluminium, silicon) leaves huge landscape scars and contaminates local water with toxic metals; sand &amp; gravel pits prevent habitats redeveloping. <Bold>Oil spillages</Bold> seep into soil/water — habitats destroyed.
        </p>
        <p style={p}>
          The <Bold>World Charter for Nature</Bold> (UN, 1982, reaffirmed at Rio 1992) calls for habitat conservation. <Bold>IUCN</Bold> and <Bold>UNEP</Bold> coordinate global action.
        </p>

        <div style={sub}>2.4 Deforestation — negative effects</div>
        <DeforestationSVG />
        <ul style={ul}>
          <li>Animals lose <Bold>shelter and food</Bold> — many species become extinct; reduced biodiversity.</li>
          <li><Bold>Soil erosion</Bold> — no roots to hold the soil; rivers and lakes silt up.</li>
          <li><Bold>Flooding</Bold> — soil cannot absorb rainwater; roots no longer slow run-off.</li>
          <li><Bold>CO₂ rise</Bold> — fewer trees photosynthesising; burning releases stored carbon → global warming.</li>
        </ul>
        <SoilErosionSVG />
        <p style={p}>
          Tropical forest soils are <Bold>nutrient-poor</Bold> — most organic matter is in the canopy. After felling and burning, the soil produces good crops for 1–2 years but the nutrients are then exhausted. The agricultural benefit is <Bold>short-lived</Bold> and the forest cannot recover.
        </p>

        <div style={sub}>2.5 Forests &amp; climate</div>
        <p style={p}>
          About half the rain over tropical forests comes from the trees' <Bold>transpiration</Bold>. Cloud from this water keeps the region cool and humid. When forest is cleared, cloud cover falls; daily temperature range widens; rainfall reduces. In NE Brazil, deforestation has reached 60% — if it exceeds this level the climate may permanently change to <Bold>unproductive desert</Bold>.
        </p>

        <div style={sub}>2.6 Forests &amp; biodiversity</div>
        <p style={p}>
          A pine wood has 1–2 tree species; a Borneo rainforest has ~3000 tree species and over 1000 animal species. Half the world's 10 million species live in tropical forests. Destroying these forests destroys vast biodiversity and drives extinction. The US National Cancer Institute has identified <Bold>3000 plants active against cancer cells</Bold>; 70% of them come from rainforests.
        </p>

        <div style={{ marginTop: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: G, marginBottom: 4, letterSpacing: 0.5 }}>SME — DEFORESTATION CONSEQUENCE SUMMARY</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11.5, lineHeight: 1.45 }}>
            <thead>
              <tr style={{ background: GL }}>
                <th style={{ border: `1px solid ${BD}`, padding: "5px 8px", textAlign: "left", color: G, width: "32%" }}>Effect</th>
                <th style={{ border: `1px solid ${BD}`, padding: "5px 8px", textAlign: "left", color: G }}>Mechanism</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px", fontWeight: 700 }}>Loss of biodiversity / extinction</td>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px" }}>Tropical rainforest holds enormous species diversity, much of it endemic; clearance removes habitat and the endemic species cannot survive elsewhere.</td>
              </tr>
              <tr style={{ background: "#fafafa" }}>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px", fontWeight: 700 }}>Soil erosion</td>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px" }}>Roots no longer stabilise the soil. Without root uptake, nitrate and other ions are <Bold>leached</Bold> by rain into rivers; the nutrient loss is essentially permanent.</td>
              </tr>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px", fontWeight: 700 }}>Flooding &amp; landslides</td>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px" }}>Loose unstable topsoil is washed away by rain; flash flooding and landslides become much more frequent in cleared areas.</td>
              </tr>
              <tr style={{ background: "#fafafa" }}>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px", fontWeight: 700 }}>Atmospheric CO₂ rise</td>
                <td style={{ border: `1px solid ${BD}`, padding: "5px 8px" }}>Less photosynthesis removes CO₂; burning of cleared timber (combustion) releases more CO₂ — enhancing the greenhouse effect and global warming.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style={{ background: "#fffbe6", border: `1px solid #f0c000`, borderLeft: `4px solid #f0c000`,
          borderRadius: 6, padding: "8px 12px", fontSize: 11.5, lineHeight: 1.6, color: GR, marginTop: 8 }}>
          💡 <Bold>Examiner Tip.</Bold> When asked about deforestation, link each effect to a <Bold>specific physical cause</Bold>: "no roots → soil washed away → river silts up → floods downstream". Vague answers like "it's bad for the environment" gain no marks.
        </div>
      </div>

      {/* 3. POLLUTION */}
      <div style={section}>
        <div style={h}>3 · Pollution</div>

        <div style={sub}>3.1 Sewage</div>
        <p style={p}>
          <Bold>Cholera and typhoid</Bold> bacteria pass out in human faeces; untreated sewage in drinking water spreads disease. Sewage is treated at works to remove solids and to break down organic matter using bacteria, but the resulting <Bold>nitrate and phosphate</Bold> still pass into rivers, encouraging excess plant growth.
        </p>

        <div style={sub}>3.2 Chemical waste</div>
        <p style={p}>
          Many industrial processes produce poisonous waste — electroplating produces copper and cyanide; the Ganga in India is polluted with heavy metals. Detergents containing <Bold>phosphate</Bold> are not removed by sewage treatment and end up in rivers, encouraging algal growth.
        </p>

        <div style={sub}>3.3 Bioaccumulation — Minamata Bay, mercury &amp; DDT</div>
        <BioaccumulationSVG />
        <p style={p}>
          In 1971 at <Bold>Minamata Bay (Japan)</Bold>, a factory discharged mercury into the sea. Although the sea concentration was very low, mercury was <Bold>concentrated as it passed up the food chain</Bold> (insecticide weakly in water → microscopic plants → microscopic animals → small fish → large fish → grebe). By the time it reached people eating local fish, the concentration was high enough to cause <Bold>brain damage, deformity and death</Bold>: 45 deaths and 120 serious illnesses. High mercury has also been detected in the Baltic Sea and the Great Lakes of North America.
        </p>

        <div style={sub}>3.4 Oil pollution &amp; marine debris</div>
        <p style={p}>
          Tanker collisions and oil-well spills release lethal oil onto the sea surface. Light oils float and create hazards for any organism using the habitat — birds become oiled, cannot fly, poison themselves trying to clean their feathers; filter-feeders and molluscs die from taking in oil. Marine habitats are increasingly contaminated with <Bold>untreated sewage, fertilisers, pesticides and plastics</Bold>.
        </p>

        <div style={sub}>3.5 Plastics and the environment</div>
        <p style={p}>
          Plastics are <KW>non-biodegradable</KW> — decomposers cannot break them down. They persist in landfill or as litter; bottles trap small animals; nylon nets trap seals and dolphins; over time plastics fragment into <Bold>microplastics</Bold> eaten by fish and birds — they stay in the stomach, blocking gills and causing sickness. <Bold>"Dead zones"</Bold> with no oxygen develop where fertilisers and sewage enter the sea.
        </p>
        <p style={p}>
          Bangladesh banned plastic bags in 2002. Ireland's bag fee cut single-use bag use from 1.2 billion to 230 million a year. Polythene waste is now recycled into car-seat covers, sports shoes, and even roads (<i>Plasphalt</i>).
        </p>

        <div style={sub}>3.6 Eutrophication</div>
        <EutrophicationSVG />
        <p style={p}>
          <KW>Eutrophication</KW> is the enrichment of natural waters with nutrients that allow it to support an increasing amount of plant life. It occurs naturally in inland waters, but very slowly. Human activity has greatly accelerated it. Plants need nitrates (for proteins) and other ions; growth is normally limited by ion supply.
        </p>
        <p style={p}>
          The <Bold>5-step sequence</Bold> (Going further EXT):
        </p>
        <ul style={ul}>
          <li>Excess nitrate and phosphate enter water (sewage, fertilisers, animal waste, detergents).</li>
          <li>Microscopic plants reproduce rapidly — an <Bold>algal bloom</Bold>.</li>
          <li>Microscopic animals cannot keep them in check; many algae die.</li>
          <li>Aerobic bacteria decompose the dead algae and use up oxygen.</li>
          <li>Fish suffocate from lack of O₂. The water is deoxygenated.</li>
        </ul>
        <p style={p}>
          <KW>BOD</KW> (biochemical oxygen demand) is the amount of oxygen used up by a sample of water in a fixed time — <Bold>higher BOD = more polluted water</Bold>. Eutrophication can be reduced by using low-phosphate detergents, slow-release fertilisers, and spreading animal waste on land rather than letting it reach rivers.
        </p>

        <div style={sub}>3.7 The greenhouse effect &amp; climate change</div>
        <GreenhouseSVG />
        <p style={p}>
          CO₂ in the atmosphere is influenced by: deforestation (less photosynthesis), combustion of fossil fuels, and more animals (including humans) respiring. CO₂ forms a layer that <Bold>traps long-wavelength heat radiation</Bold> from the warmed Earth. <KW>Methane</KW> is also a greenhouse gas — much more powerful than CO₂. CH₄ comes from anaerobic decay in <Bold>wet rice fields</Bold>, the <Bold>stomachs of cattle and termites</Bold>, and is released from extraction of oil and coal.
        </p>
        <p style={p}>
          The build-up of greenhouse gases causes the <KW>enhanced greenhouse effect</KW> — observable consequences include:
        </p>
        <ul style={ul}>
          <li>Polar ice caps melt → <Bold>flooding of low-lying land</Bold>.</li>
          <li>Weather conditions change — flooding or drought; arable land turns to desert; extreme weather more common.</li>
          <li>Species unable to survive higher temperatures become <Bold>extinct</Bold>.</li>
        </ul>
        <p style={p}>
          Since the Industrial Revolution, CO₂ has risen from 0.029% (1860) to over <Bold>0.039% / 407 ppm</Bold> (NOAA, 2018). Globally, temperature has risen <Bold>0.7–0.9 °C since 1880</Bold>; most of that rise has been recent. If warming continues, sea level could rise <Bold>0.2–1.5 m in 50–100 years</Bold>.
        </p>
        <ClimateGraphSVG />

        <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 12px", marginTop: 8, fontSize: 12, lineHeight: 1.55, color: GR }}>
          <Bold>Positive feedback — permafrost methane (SME)</Bold>: large amounts of methane are frozen in permafrost across the sub-polar regions (tundra, Siberia, northern Canada). Warming melts this permafrost, releasing methane — a much more powerful greenhouse gas than CO₂. The extra methane traps more heat → more warming → more permafrost thaws → still more methane released. This <Bold>self-amplifying loop</Bold> is one reason climate scientists worry about runaway warming.
        </div>
      </div>

      {/* 4. CONSERVATION */}
      <div style={section}>
        <div style={h}>4 · Conservation</div>

        <div style={sub}>4.1 Key definitions</div>
        <p style={p}>
          <KW>Sustainable resource</KW> = one produced as rapidly as it is removed from the environment, so that it does not run out. Forests and fish stocks <Bold>can</Bold> be sustainable if carefully managed.
        </p>

        <div style={sub}>4.2 Tomato fish project (ASTAF-PRO) <Ext /></div>
        <AquaponicSVG />
        <p style={p}>
          The German <Bold>ASTAF-PRO</Bold> project rears <Bold>Nile tilapia</Bold> and tomatoes together in a closed greenhouse system. Both grow best at 27 °C. Benefits: nearly emission-free; all water recycled (transpiration → condensed); solar panels heat the greenhouse. Fish water (rich in nutrients) is filtered and fed to tomato plants growing on <Bold>mineral wool (hydroponics)</Bold>; no peat needed. Sold as "fish tomatoes".
        </p>

        <div style={sub}>4.3 Conservation of forests</div>
        <ul style={ul}>
          <li><Bold>Education</Bold> — Rainforest Alliance trains farmers in Costa Rica to value local forestry.</li>
          <li><Bold>Protected areas</Bold> — Tree Preservation Orders (TPOs) prevent felling of named trees; Wildlife Alliance protects Southeast Asian forests.</li>
          <li><Bold>Legal quotas</Bold> — <i>Smartlogging</i> certificates track timber legally from felling to export; bamboo quotas in China protect giant panda food.</li>
          <li><Bold>Replanting</Bold> — Brazil (Conservation International + Ministry of Environment, 73 million trees by volunteers); India 2016 — 50 million trees in 24 hours; Pakistan 2017 — Billion Tree Tsunami.</li>
          <li><Bold>Recycling paper</Bold> — 1 tonne of recycled paper saves ~17 trees and cuts a country's timber imports.</li>
        </ul>

        <div style={sub}>4.4 Conservation of fish stocks</div>
        <ul style={ul}>
          <li><Bold>Education</Bold> — fishermen learn destructive methods (dynamite, cyanide) destroy reefs and ruin future catches.</li>
          <li><Bold>Closed seasons</Bold> — fishing banned during spawning (Ghana extended its 1-month to 2-month closed season in 2019).</li>
          <li><Bold>Marine protected areas</Bold> — legally-enforced no-fish zones allow stocks to rebuild.</li>
          <li><Bold>Net &amp; mesh control</Bold> — trawl nets banned over coral reefs; gillnets with LED lights reduce bycatch of turtles and dolphins; minimum mesh size lets undersized fish escape.</li>
          <li><Bold>Legal quotas</Bold> — EU Common Fisheries Policy sets species-by-species limits.</li>
          <li><Bold>Monitoring</Bold> — patrol vessels enforce licensing and quotas.</li>
        </ul>

        <div style={sub}>4.5 Endangering and extinction</div>
        <p style={p}>
          Factors that endanger species: <Bold>habitat destruction, introduction of foreign species, hunting, international trade, pollution, climate change</Bold>. The "background" extinction rate for birds is ~1 species per 100–1000 years; today, the rate is 10× to 1000× higher.
        </p>
        <p style={p}>
          Examples of extinction-by-introduction: <Bold>sea lampreys</Bold> entered the Great Lakes via shipping canals and reduced the trout fishery from 7 000 000 kg/yr to 136 000 kg/yr; <Bold>rats and goats</Bold> on Polynesian-colonised islands wiped out 85% of 1000 plant species. <Bold>Coral bleaching</Bold>: just a 1–2 °C rise can kill the symbiotic algae of corals, leading to reef collapse (Indian Ocean 1994; surveys 2005 showed extinctions and population crashes).
        </p>

        <div style={sub}>4.6 Conservation of species</div>
        <ul style={ul}>
          <li><Bold>Laws &amp; treaties</Bold>: <KW>CITES</KW> (Convention on International Trade in Endangered Species) restricts trade in ~5800 animal and ~30000 plant species — 183 countries by 2020. <Bold>IWC</Bold> (International Whaling Commission) declared a complete ban on whaling in 1982, still in place.</li>
          <li><Bold>Habitat protection</Bold>: national parks, wildlife sanctuaries, wetlands, bio-reserves (India). Wardens, restricted access, control of grazing.</li>
          <li><Bold>Education &amp; media</Bold>: documentaries, news, school programmes raise awareness.</li>
          <li><Bold>Captive breeding &amp; reintroduction</Bold>: lion-tailed macaque (India) — removed from "25 most endangered primates" list; white-rumped vulture (Nepal) — successfully bred &amp; released; sea eagles, red kites, ospreys reintroduced where they had died out.</li>
          <li><Bold>Seed banks &amp; gene banks</Bold>: Millennium Seed Bank Partnership (Kew, London) — 95 countries; goal: 25% of plant species, ~75 000 plant species in storage.</li>
        </ul>

        <div style={sub}>4.7 Use of AI &amp; IVF in captive breeding <Ext /></div>
        <p style={p}>
          <KW>Artificial insemination (AI)</KW> involves collecting sperm from a male and introducing it artificially into a female. Sperm can be <Bold>frozen and stored</Bold>, then transported to other centres — vital for boosting genetic diversity in isolated populations. Used successfully on Houbara bustard (Saudi Arabia).
        </p>
        <p style={p}>
          <KW>In vitro fertilisation (IVF)</KW> — 'in glass'. Fertility drugs cause the female to release several mature ova; ova are collected by <Bold>laparoscopy</Bold> through the abdominal wall, mixed with sperm in a Petri dish, and successfully dividing zygotes are returned to the uterus or stored. Used to breed white rhinos and tigers in captivity; eggs can be frozen and embryos transferred to surrogates.
        </p>

        <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 12px", marginTop: 8, fontSize: 12, lineHeight: 1.55, color: GR }}>
          <Bold>Why AI &amp; IVF help conservation — gene-pool logic (SME)</Bold>
          <ul style={{ margin: "4px 0 0", paddingLeft: 16 }}>
            <li><Bold>AI moves genes, not animals</Bold> — frozen sperm is shipped between zoos and reserves worldwide. The receiving female reproduces with a 'foreign' male without the cost, risk or stress of transporting either animal.</li>
            <li><Bold>IVF allows selection of known alleles</Bold> — biologists pair gametes from individuals with distant ancestry, maximising heterozygosity in the offspring and reducing the risk of inbreeding depression.</li>
            <li><Bold>Surrogate use</Bold> — embryos of very rare species can be implanted into close relatives that breed more easily, expanding the breeding population beyond the existing females.</li>
          </ul>
        </div>

        <div style={sub}>4.8 Why conserve? Reasons for conservation programmes</div>
        <ul style={ul}>
          <li><Bold>Maintain biodiversity</Bold> — preserve genetic resources for future crop improvement and drug discovery.</li>
          <li><Bold>Reduce extinction</Bold> — once a species is gone, its genes are <Bold>lost forever</Bold>.</li>
          <li><Bold>Protect vulnerable ecosystems</Bold> — wetlands, coral reefs, mangroves often need targeted help (e.g. Mekong delta in Vietnam).</li>
          <li><Bold>Maintain ecosystem functions</Bold> — pollination, nutrient cycles, water purification. Example: overfishing top-predator catfish in Thailand allowed jungle perch to eat herbivores, leading to <Bold>algal bloom and reef damage</Bold>.</li>
        </ul>

        <div style={sub}>4.9 Risks of small populations <Ext /></div>
        <p style={p}>
          A population can shrink due to predation, disease, food shortage or emigration. A small population has a <Bold>smaller gene pool and less genetic variation</Bold>, so it has less ability to adapt to environmental change by natural selection — and is at <Bold>greater risk of extinction</Bold>.
        </p>

        <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 12px", marginTop: 8, fontSize: 12, lineHeight: 1.55, color: GR }}>
          <Bold>Sustainable development — balancing conflicting demands (SME, EXT)</Bold>
          <div style={{ marginTop: 4 }}>
            <i>Sustainable development</i> = development that meets the needs of an increasing human population <Bold>without harming the environment</Bold>. Achieving it requires balancing competing interests:
          </div>
          <ul style={{ margin: "4px 0 0", paddingLeft: 16 }}>
            <li><Bold>Local users vs. large companies</Bold> — local people need forests and fish for daily subsistence; corporations want timber and large catches for profit.</li>
            <li><Bold>Humans vs. wildlife</Bold> — resource extraction must not destroy habitats or drive extinction of the species that share the area.</li>
            <li><Bold>Present vs. future generations</Bold> — harvesting everything available today (e.g. fishing all the cod we can) leaves nothing for our grandchildren.</li>
          </ul>
          <div style={{ marginTop: 6 }}>
            Sustainable development therefore needs cooperation at <Bold>local, national and international</Bold> levels — through education, quotas, protected areas and treaties (CITES, IWC, etc.).
          </div>
        </div>

        <div style={{ background: "#fffbe6", border: `1px solid #f0c000`, borderLeft: `4px solid #f0c000`,
          borderRadius: 6, padding: "8px 12px", fontSize: 11.5, lineHeight: 1.6, color: GR, marginTop: 8 }}>
          💡 <Bold>Examiner Tip.</Bold> Conservation answers need <Bold>specific named examples</Bold>: CITES, IWC, Millennium Seed Bank, Rainforest Alliance, Common Fisheries Policy. Generic "we should protect endangered animals" loses marks. Memorise one named species per technique: <i>lion-tailed macaque</i> (captive breeding), <i>Houbara bustard</i> (AI), <i>white rhino</i> (IVF), <i>Nile tilapia</i> (sustainable aquaculture).
        </div>
      </div>
    </div>
  );
}

// ⑤ SME FLASHCARD TAB — click-to-flip self-test

function FlashcardTab() {
  const [flipped, setFlipped] = useState({});
  const [topic, setTopic] = useState("all");
  const toggle = id => setFlipped(p => ({ ...p, [id]: !p[id] }));

  const cards = [
    // Agriculture & food production (1-8)

    { id: "f3",  topic: "agri",         front: "Advantages of large-scale crop monocultures.", back: "Farmers can choose the crop best suited to local conditions; yields are higher; the whole field can be treated with the same chemicals (fertiliser, herbicide, insecticide), making management efficient." },
    { id: "f4",  topic: "agri",         front: "True or False: Monocultures benefit wildlife.", back: "False — monocultures reduce biodiversity because only one plant species exists across a wide area, removing food and habitat for other organisms." },
    { id: "f5",  topic: "agri",         front: "Disadvantages of crop monocultures.", back: "Reduced biodiversity; the whole crop is vulnerable to the same pests and diseases; specific soil nutrients become depleted over repeated growing seasons." },
    { id: "f6",  topic: "agri",         front: "Define: intensive farming.", back: "A method of farming that aims to maximise production within a limited land area — for example, raising livestock in confined spaces." },
    { id: "f7",  topic: "agri",         front: "True or False: Allowing livestock to move freely increases food-production efficiency.", back: "False — restricting movement reduces energy lost in muscular activity, so more energy from food is used for growth instead." },
    { id: "f8",  topic: "agri",         front: "Drawbacks of keeping livestock in confined spaces.", back: "Disease spreads easily between animals; animals may become distressed (poor welfare); aggression in cramped conditions can lead to injury." },

    // Habitat destruction (9-12)
    { id: "f9",  topic: "habitat",      front: "Define: biodiversity.", back: "The number of different species found in a habitat." },
    { id: "f10", topic: "habitat",      front: "How do humans cause habitat destruction?", back: "By increasing land use for development and agriculture; by extracting resources (mining, deforestation); and by releasing pollution into freshwater or marine habitats." },
    { id: "f11", topic: "habitat",      front: "True or False: Human activities can alter food chains and webs.", back: "True — humans can remove species from food chains, disrupting food webs and damaging entire habitats." },
    { id: "f12", topic: "habitat",      front: "Harmful effects of deforestation.", back: "Biodiversity loss; extinction of species; soil erosion; flooding; rising atmospheric carbon dioxide." },

    // Pollution (13-14, 17 → 13-15)
    { id: "f13", topic: "pollution",    front: "Human activities that cause water pollution.", back: "Release of untreated sewage into waterways; run-off of agricultural chemicals (fertilisers, pesticides) into rivers and lakes." },
    { id: "f14", topic: "pollution",    front: "Consequences of untreated sewage entering water systems.", back: "Aerobic microorganisms use sewage nutrients for respiration, depleting dissolved oxygen and killing aquatic organisms; toxic chemicals in sewage poison aquatic life; dangerous pathogens may harm human health." },
    { id: "f15", topic: "pollution",    front: "How does plastic pollution affect terrestrial and aquatic environments?", back: "Plastics can injure wildlife (entanglement, ingestion); they fragment into microplastics that enter food chains; they degrade slowly and release toxic compounds into the environment." },

    // Eutrophication (15-16 → 16-17)
    { id: "f16", topic: "eutroph",      front: "Define: eutrophication. (EXT)", back: "The process in which increased nutrient availability in a body of water leads to a decrease in dissolved oxygen levels." },
    { id: "f17", topic: "eutroph",      front: "Describe the process of eutrophication. (EXT)", back: "(1) Nutrient run-off causes increased plant/algal growth at the surface; (2) Many aquatic plants die because surface growth blocks light and deeper plants cannot photosynthesise; (3) Bacteria decompose dead plants, using oxygen in aerobic respiration; (4) Dissolved oxygen drops sharply; (5) Other aquatic organisms suffocate and die." },

    // Greenhouse / climate change (18-21 → 18-21)
    { id: "f18", topic: "greenhouse",   front: "Human activities that raise atmospheric CO₂.", back: "Burning fossil fuels (coal, oil, gas); burning organic matter such as wood and other plant materials (e.g. forest clearance fires)." },
    { id: "f19", topic: "greenhouse",   front: "True or False: Methane is a greenhouse gas.", back: "True — methane traps more radiation per molecule than CO₂, making it a particularly powerful greenhouse gas." },
    { id: "f20", topic: "greenhouse",   front: "Human activities that raise atmospheric methane.", back: "Cattle farming (cows release methane while digesting grass); rice paddy cultivation (anaerobic decay in flooded fields); disposal of organic waste in landfill sites." },
    { id: "f21", topic: "greenhouse",   front: "How does releasing methane and CO₂ affect the environment?", back: "Both are greenhouse gases — their release causes an enhanced greenhouse effect, leading to climate change." },

    // Conservation (22-34 → 22-34)
    { id: "f22", topic: "conservation", front: "What makes a resource sustainable?", back: "A sustainable resource is one that can be produced (replenished) as rapidly as it is harvested, so it will not run out." },
    { id: "f23", topic: "conservation", front: "Examples of natural resources that can be managed sustainably.", back: "Forests and fish stocks." },
    { id: "f24", topic: "conservation", front: "How can forests be conserved? (EXT)", back: "Educating the public about the value of forests; designating forests as protected areas; introducing harvesting quotas (only a set amount of timber removed per year); replanting trees after felling." },
    { id: "f25", topic: "conservation", front: "How can fish stocks be conserved? (EXT)", back: "Educate the public; restrict the times of year when fishing is allowed; designate marine protected areas; control the net type and mesh size used; introduce fishing quotas; monitor fishing activity and fish populations." },
    { id: "f26", topic: "conservation", front: "What is an endangered species?", back: "A plant or animal species at risk of extinction." },
    { id: "f27", topic: "conservation", front: "Factors that cause species to become endangered.", back: "Climate change, habitat destruction, hunting, overharvesting, pollution, and introduced (invasive) species." },
    { id: "f28", topic: "conservation", front: "Methods used to conserve endangered species.", back: "Monitoring populations; protecting habitats; educating the public; captive breeding programmes; seed banks for plant species." },
    { id: "f29", topic: "conservation", front: "How do breeding programmes conserve endangered species?", back: "They increase reproductive success in captivity, raising population size and helping to maintain genetic diversity, which improves the species' chance of long-term survival." },
    { id: "f30", topic: "conservation", front: "True or False: A seed bank is a place where many plant species are grown in captivity.", back: "False — a seed bank is a collection of seeds from many plant species, stored under conditions that preserve them so that plants can be re-grown in the future." },
    { id: "f31", topic: "conservation", front: "Why is conservation important?", back: "It maintains or increases biodiversity; reduces extinction; protects vulnerable ecosystems; and maintains ecosystem functions on which humans depend." },
    { id: "f32", topic: "conservation", front: "What are ecosystem functions?", back: "Natural processes and features of ecosystems that benefit humans — for example nutrient cycling (locking up carbon in soil, maintaining soil fertility) and resource provision (food, medicines, fuel, useful genes)." },
    { id: "f33", topic: "conservation", front: "True or False: Artificial insemination and IVF are important for the conservation of endangered species.", back: "True — both are key techniques in captive breeding programmes, allowing reproduction between individuals that may not breed successfully in captivity, including across distant populations." },
    { id: "f34", topic: "conservation", front: "Why is maintaining a large population size essential to reducing extinction risk?", back: "Larger populations are more likely to be genetically diverse. Genetic diversity gives the population a better chance of containing alleles useful for surviving environmental change — so larger populations are less likely to go extinct." },
  ];

  const topics = [
    { id: "all", label: "All", count: cards.length },
    { id: "agri", label: "Agriculture", count: cards.filter(c => c.topic === "agri").length },
    { id: "habitat", label: "Habitat", count: cards.filter(c => c.topic === "habitat").length },
    { id: "pollution", label: "Pollution", count: cards.filter(c => c.topic === "pollution").length },
    { id: "eutroph", label: "Eutrophication", count: cards.filter(c => c.topic === "eutroph").length },
    { id: "greenhouse", label: "Greenhouse/Climate", count: cards.filter(c => c.topic === "greenhouse").length },
    { id: "conservation", label: "Conservation", count: cards.filter(c => c.topic === "conservation").length },
  ];

  const filtered = topic === "all" ? cards : cards.filter(c => c.topic === topic);
  const flippedCount = filtered.filter(c => flipped[c.id]).length;

  return (
    <div>
      <div style={{ background: TLL, border: `1px solid ${TL}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: TL, fontWeight: 600 }}>
        🃏 <Bold>SME Flashcards</Bold> · {cards.length} cards · click any card to flip
      </div>

      {/* Topic filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {topics.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{
            padding: "6px 10px", borderRadius: 6,
            border: topic === t.id ? `1.5px solid ${TL}` : `1px solid ${BD}`,
            background: topic === t.id ? TL : "#fff",
            color: topic === t.id ? "#fff" : TL,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>
        <span><Bold>{filtered.length}</Bold> cards · <Bold>{flippedCount}</Bold> revealed</span>
        <button onClick={() => setFlipped({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,
          borderRadius: 4, cursor: "pointer",
        }}>Reset all</button>
      </div>

      {/* Card grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))",
        gap: 10 }}>
        {filtered.map(c => {
          const isFlipped = flipped[c.id];
          return (
            <div key={c.id} onClick={() => toggle(c.id)} style={{
              background: isFlipped ? TLL : "#fff",
              border: `1.5px solid ${isFlipped ? TL : BD}`,
              borderRadius: 8, padding: "12px 14px",
              minHeight: 110, cursor: "pointer",
              transition: "all .15s",
              display: "flex", flexDirection: "column",
            }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: isFlipped ? TL : "#999",
                letterSpacing: 1, marginBottom: 6 }}>
                {isFlipped ? "DEFINITION" : "TERM / QUESTION"} · {c.id.toUpperCase()}
              </div>
              <div style={{ fontSize: isFlipped ? 11.5 : 13.5, lineHeight: 1.5, color: GR,
                fontWeight: isFlipped ? 500 : 700, flex: 1 }}>
                {isFlipped ? c.back : c.front}
              </div>
              <div style={{ fontSize: 9, color: "#bbb", marginTop: 8, textAlign: "right" }}>
                click to {isFlipped ? "show term" : "reveal"}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Save My Exams style · {CHAPTER_META.flashcardCount} cards total · self-testing mode
      </div>
    </div>
  );
}

      {active === "summary"   && <SummaryTab />}
      {active === "textbook"  && <TextbookTab />}
      {active === "flashcard" && <FlashcardTab />}

      <div style={{ marginTop: 24, padding: "10px 16px", background: "#f5f5f3", borderRadius: 8, fontSize: 11, color: "#999", textAlign: "center" }}>
        Hodder Cambridge IGCSE Biology Ch.{CHAPTER_META.number} · All English · NLCS Jeju — Extended (Paper 1, 4, 6)
      </div>
    </div>
  );
}


const __rootEl = document.getElementById('root');
const __root = ReactDOM.createRoot(__rootEl);
__root.render(<App />);
const __loader = document.getElementById('loader');
if (__loader) {
  setTimeout(() => {
    __loader.classList.add('hidden');
    setTimeout(() => __loader.remove(), 350);
  }, 100);
}
</script>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('nlcs-bio-theme', isDark ? 'dark' : 'light'); } catch(e) {}
    });
  })();
</script>
