<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>

);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════

};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters

  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.20
// ════════════════════════════════════════════════════════════════════════════

// ── Eutrophication flow chart ────────────────────────────────────────────────
function EutrophicationSVG() {
  return (
    <svg viewBox="0 0 720 480" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="480" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>
      <text x="360" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={PU}>
        Eutrophication — sequence of death in a water ecosystem
      </text>

      {/* Step 1 */}
      <rect x="120" y="50" width="480" height="50" rx="6" fill="#fde0e0" stroke={RD} strokeWidth="1.5"/>
      <text x="360" y="72" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>1 · Nitrate / phosphate runs into the water</text>
      <text x="360" y="89" textAnchor="middle" fontSize="10" fill={GR}>from fertilisers, untreated sewage, factory effluent or animal slurry</text>
      <line x1="360" y1="105" x2="360" y2="130" stroke={RD} strokeWidth="2.5" markerEnd="url(#arrPU)"/>

      {/* Step 2 */}
      <rect x="120" y="135" width="480" height="50" rx="6" fill="#e8f7ec" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="157" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>2 · Algae and aquatic plants grow rapidly (algal bloom)</text>
      <text x="360" y="174" textAnchor="middle" fontSize="10" fill={GR}>extra nutrients allow microscopic plants to multiply at the surface</text>
      <line x1="360" y1="190" x2="360" y2="215" stroke={PU} strokeWidth="2.5" markerEnd="url(#arrPU)"/>

      {/* Step 3 */}
      <rect x="120" y="220" width="480" height="50" rx="6" fill="#fff4e6" stroke={AM} strokeWidth="1.5"/>
      <text x="360" y="242" textAnchor="middle" fontSize="12" fontWeight="700" fill={AM}>3 · Surface mat blocks light from algae below</text>
      <text x="360" y="259" textAnchor="middle" fontSize="10" fill={GR}>plants below the bloom can no longer photosynthesise</text>
      <line x1="360" y1="275" x2="360" y2="300" stroke={PU} strokeWidth="2.5" markerEnd="url(#arrPU)"/>

      {/* Step 4 */}
      <rect x="120" y="305" width="480" height="50" rx="6" fill="#f5eef5" stroke={PU} strokeWidth="1.5"/>
      <text x="360" y="327" textAnchor="middle" fontSize="12" fontWeight="700" fill={PU}>4 · Algae die · bacteria decompose them &amp; respire</text>
      <text x="360" y="344" textAnchor="middle" fontSize="10" fill={GR}>aerobic decomposition uses up oxygen dissolved in the water</text>
      <line x1="360" y1="360" x2="360" y2="385" stroke={PU} strokeWidth="2.5" markerEnd="url(#arrPU)"/>

      {/* Step 5 */}
      <rect x="120" y="390" width="480" height="60" rx="6" fill="#fdf0f0" stroke={RD} strokeWidth="2"/>
      <text x="360" y="412" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>5 · Fish and other aerobic animals die from lack of oxygen</text>
      <text x="360" y="430" textAnchor="middle" fontSize="10" fill={GR}>the water becomes deoxygenated · whole ecosystem collapses</text>
      <text x="360" y="445" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">"dead zone" — high BOD (biochemical oxygen demand)</text>

      <defs>
        <marker id="arrPU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill={PU}/>
        </marker>
      </defs>
    </svg>
  );
}

// ── Greenhouse effect ────────────────────────────────────────────────────────
function GreenhouseSVG() {
  return (
    <svg viewBox="0 0 720 360" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="360" rx="12" fill="#e6f1ff" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        The greenhouse effect &amp; enhanced warming
      </text>

      {/* Sun */}
      <circle cx="120" cy="80" r="32" fill="#ffd866" stroke="#b8860b" strokeWidth="2"/>
      <text x="120" y="86" textAnchor="middle" fontSize="11" fontWeight="700" fill="#7a5300">SUN</text>

      {/* Greenhouse gas layer */}
      <rect x="60" y="160" width="600" height="40" rx="6" fill="#cbd6e8" stroke="#6f7d99" strokeWidth="1.5" strokeDasharray="6 3" opacity="0.85"/>
      <text x="360" y="184" textAnchor="middle" fontSize="11" fontWeight="700" fill="#3a4768">layer of greenhouse gases (CO₂, CH₄)</text>

      {/* Earth surface */}
      <rect x="40" y="290" width="640" height="55" rx="6" fill="#8a6a45" stroke="#5a4a30" strokeWidth="1.5"/>
      <text x="360" y="312" textAnchor="middle" fontSize="12" fontWeight="700" fill="#fff">Earth's surface</text>
      <text x="360" y="328" textAnchor="middle" fontSize="10" fill="#f5f2e8" fontStyle="italic">absorbs short waves, re-radiates as long waves (heat)</text>

      {/* Incoming short waves (penetrating) */}
      <g stroke="#f0a020" strokeWidth="2" fill="none">
        <path d="M 145 105 Q 160 130, 175 160 L 175 200 L 175 285"/>
        <path d="M 175 105 Q 195 135, 215 160 L 215 200 L 215 285"/>
        <path d="M 210 110 Q 235 140, 260 160 L 260 200 L 260 285"/>
      </g>
      <polygon points="175,285 171,278 179,278" fill="#f0a020"/>
      <polygon points="215,285 211,278 219,278" fill="#f0a020"/>
      <polygon points="260,285 256,278 264,278" fill="#f0a020"/>
      <text x="180" y="135" fontSize="10" fill="#9c6500" fontWeight="700">short waves</text>
      <text x="180" y="148" fontSize="9" fill="#666">(penetrate atmosphere)</text>

      {/* Outgoing long waves — most trapped */}
      <g stroke={RD} strokeWidth="2" fill="none">
        <path d="M 380 285 L 380 205" strokeDasharray="3 2"/>
        <path d="M 420 285 L 420 205" strokeDasharray="3 2"/>
        <path d="M 460 285 L 460 205" strokeDasharray="3 2"/>
        {/* trapped — bounce back */}

// ════════════════════════════════════════════════════════════════════════════

      </div>

      <div style={card}>
        <div style={h}>① INTENSIFICATION OF AGRICULTURE</div>
        <div style={li}>· <KW c={AM}>Modern machinery</KW> + larger fields (hedges removed) → faster, more efficient farming.</div>
        <div style={li}>· <KW c={AM}>Chemical fertilisers</KW> (NPK, ammonium nitrate, ammonium sulfate) replace minerals removed by crops — boost yield but no organic matter; can pollute rivers (eutrophication).</div>

        <div style={li}>· <KW c={AM}>Monoculture</KW> = dense single-species crop. Higher yield + machine-friendly, BUT very prone to pests/disease and reduces biodiversity.</div>
        <div style={li}>· <KW c={AM}>Intensive livestock production</KW> (factory farming) — high yield but slurry pollutes water, animals more disease-prone.</div>
      </div>

      <div style={card}>
        <div style={h}>② HABITAT DESTRUCTION &amp; DEFORESTATION</div>
        <div style={li}>· Reasons: <KW c={AM}>farming, urbanisation, mining, oil extraction, timber, firewood</KW>.</div>
        <div style={li}>· Effects of deforestation: loss of biodiversity, <Bold>soil erosion</Bold>, flooding, silting of rivers, less photosynthesis → rising atmospheric <Bold>CO₂</Bold>, drier local climate.</div>
        <div style={li}>· Tropical-forest soils are <Bold>nutrient-poor</Bold> — most nutrients are in the canopy; cleared land is fertile only for 1–2 years.</div>
        <div style={li}>· <KW c={AM}>Biodiversity</KW> = the number of different species living in an area. Forests host half the world's 10 million species.</div>
      </div>

      <div style={card}>
        <div style={h}>③ POLLUTION — SOURCES &amp; HARM</div>
        <div style={li}>· <KW c={AM}>Untreated sewage</KW> → spread of typhoid, cholera + nitrates/phosphates → eutrophication.</div>
        <div style={li}>· <KW c={AM}>Chemical waste</KW> (mercury, cyanide, copper) — Minamata Bay disaster (1971): factory mercury → fish → 45 deaths via <Bold>bioaccumulation</Bold>.</div>
        <div style={li}>· <KW c={AM}>Oil spills</KW> — kill seabirds, fish, intertidal life. Plastics — <Bold>non-biodegradable</Bold>, trap animals, fragment into microplastics, choke marine animals.</div>
        <div style={li}>· <KW c={AM}>Pesticides</KW> (e.g. DDT, dieldrin) — persist in environment, magnify up food chain, poison top predators (birds of prey, fish-eating birds).</div>
      </div>

      <div style={card}>
        <div style={h}>④ EUTROPHICATION (5-step chain)</div>
        <div style={li}>· <Bold>1</Bold> Nitrates &amp; phosphates from fertilisers/sewage/detergents enter water.</div>
        <div style={li}>· <Bold>2</Bold> <KW c={AM}>Algae bloom</KW> rapidly at surface.</div>
        <div style={li}>· <Bold>3</Bold> Surface mat <Bold>blocks light</Bold>; submerged plants &amp; algae die.</div>
        <div style={li}>· <Bold>4</Bold> Aerobic <Bold>bacteria decompose dead plants</Bold>, using up dissolved O₂.</div>
        <div style={li}>· <Bold>5</Bold> Water becomes deoxygenated → <KW c={AM}>fish suffocate</KW> → "dead zone". High BOD = polluted.</div>
      </div>

      <div style={card}>
        <div style={h}>⑤ GREENHOUSE EFFECT &amp; CLIMATE CHANGE</div>
        <div style={li}>· Main greenhouse gases: <KW c={AM}>CO₂</KW> (combustion, deforestation, respiration) and <KW c={AM}>CH₄</KW> (rice paddies, cattle stomachs, decay).</div>

      </div>

      <div style={card}>

        <div style={li}>· <KW c={AM}>Sustainable resource</KW> = one produced as rapidly as it is removed, so it does not run out.</div>
        <div style={li}>· <KW c={AM}>Biodiversity</KW> = number of different species in an area.</div>
        <div style={li}>· Reasons for conservation programmes: maintain biodiversity, reduce extinction, protect vulnerable ecosystems, maintain ecosystem functions.</div>
        <div style={li}>· If population falls → less <Bold>genetic variation</Bold> → less able to adapt → higher extinction risk.</div>
      </div>

      <div style={card}>
        <div style={h}>⑦ CONSERVATION STRATEGIES</div>
        <div style={li}>· <KW c={AM}>Forests</KW>: education (Rainforest Alliance), protected areas, legal quotas (Smartlogging), replanting, recycle paper.</div>
        <div style={li}>· <KW c={AM}>Fish stocks</KW>: education, closed seasons, marine protected areas, net &amp; mesh control, quotas (EU CFP), patrol monitoring.</div>
        <div style={li}>· <KW c={AM}>Species</KW>: laws (CITES, IWC), habitat protection, captive breeding (lion-tailed macaque, white-rumped vulture), seed banks (Millennium Seed Bank).</div>
        <div style={li}>· <KW c={AM}>AI (artificial insemination) &amp; IVF</KW> <Ext/> — used in captive breeding programmes for animals that won't mate naturally; can transport frozen sperm to other centres.</div>
      </div>

      <div style={{ background: AL, border: `1px solid ${AM}`, borderRadius: 8,
        padding: "12px 16px", marginTop: 14, fontSize: 12, color: GR }}>
        <Bold>Key word check</Bold>: monoculture, fertiliser, herbicide, insecticide, eutrophication, bioaccumulation, biodiversity, deforestation, non-biodegradable, sustainable resource, enhanced greenhouse effect, captive breeding, artificial insemination, in vitro fertilisation, CITES, seed bank, biochemical oxygen demand (BOD).
      </div>
    </div>
  );
}

      q: "Explain why captive breeding programmes use artificial insemination (AI) and IVF.",
      hint: "Reluctance + transport + freeze",
      a: <>Some animals are <Bold>reluctant to mate</Bold> in captivity [1]. AI involves collecting sperm from the male and introducing it into the female artificially [1]. Sperm can be <Bold>frozen and stored / transported</Bold> between centres, increasing genetic diversity [1]. <Bold>IVF</Bold> allows fertilised eggs to be developed even when females won't breed naturally, and embryos can be transferred to surrogate females [1].</> },

    { id: "m11", diff: "medium", topic: "conservation", marks: 4, star: "★★★",
      q: "Outline why pressure leads to destruction of tropical forests.",
      hint: "Timber, farming, fuel, growth",
      a: <>Forests are cut for: <Bold>timber</Bold> for building and furniture [1]; <Bold>land for agriculture</Bold> (cattle, soybean, palm oil) and for roads/settlements [1]; <Bold>firewood</Bold> [1]; pressure also comes from <Bold>population growth</Bold> and <Bold>greater demand for raw materials</Bold> (mining, oil) [1].</> },

    { id: "m12", diff: "medium", topic: "conservation", marks: 3, star: "★★★",
      q: "Give three important reasons to preserve tropical rainforests.",
      hint: "Biodiversity, climate, drugs",
      a: <>Any three: contain <Bold>vast biodiversity</Bold> (half the world's species) [1]; help <Bold>regulate climate</Bold> — absorb CO₂, transpire to make rainfall, reflect sunlight [1]; source of <Bold>medicines</Bold> (70% of anti-cancer plants come from rainforests) [1]; <Bold>prevent soil erosion</Bold> and protect watersheds [1].</> },

    { id: "m13", diff: "medium", topic: "conservation", marks: 3, star: "★★★",
      q: "Why is paper considered a sustainable resource?",
      hint: "Trees regrow + recycle",
      a: <>Paper is made from <Bold>wood pulp</Bold> [1]. New trees can be <Bold>replanted</Bold> at the same rate they are harvested, so the supply does not run out [1]. In addition, <Bold>waste paper is recycled</Bold> (1 tonne ≈ 17 trees saved), further reducing demand [1].</> },

    { id: "m14", diff: "medium", topic: "pollution", marks: 2, star: "★★★",
      q: "Mercury at 0.000 1 ppm in seawater eventually reached lethal levels in humans at Minamata Bay. Explain.",
      hint: "Bioaccumulation up food chain",
      a: <>Mercury is <Bold>not excreted</Bold> by the organisms that absorb it [1]. As each predator eats many prey, mercury becomes <Bold>more concentrated</Bold> at every step of the food chain (bioaccumulation / biomagnification), reaching toxic levels in fish eaten by humans [1].</> },

    { id: "m15", diff: "medium", topic: "habitat", marks: 4, star: "★★★",
      type: "calc",
      q: "Argentina spends $10 million per year dredging silt from the River Plate estuary. 80% of the sediment comes from a deforested region 1800 km upstream covering 4% of the river's catchment. (a) Calculate the cost of dredging attributable to that 4% of the catchment. (b) Suggest why the silt comes mostly from this small area.",
      hint: "% × total cost; tree roots gone",
      a: <>(a) 80% × $10 million = <Bold>$8 million per year</Bold> [2]. (b) That region has been <Bold>deforested and overgrazed</Bold> [1], so there are no roots to hold the soil and rainfall washes large amounts of topsoil into the rivers [1].</> },

    { id: "m16", diff: "medium", topic: "agri", marks: 3, star: "★★",
      q: "Describe how monocultures can affect communities of plants and animals.",
      hint: "Loss of diversity + chain effects",
      a: <>Monoculture <Bold>displaces native plant and animal communities</Bold>, so biodiversity falls in farmland [1]. <Bold>Pollinators and natural pest predators</Bold> lose food and shelter, so their numbers fall [1]. Wildlife is restricted to small areas of <Bold>uncultivated land</Bold>, where populations are isolated and vulnerable [1].</> },

    // ─────────────────── HARD / Extended ───────────────────
    { id: "h1", diff: "hard", topic: "pollution", ext: true, marks: 6, star: "★★★",
      q: "Compare and contrast the environmental impact of (i) using pesticides like dieldrin and (ii) using biological control to manage crop pests.",
      hint: "Persistence + non-target + research",
      a: <><Bold>Pesticides</Bold>: kill pests <Bold>quickly</Bold> [1] but are often <Bold>non-specific</Bold> — kill bees, ladybirds, soil invertebrates [1] and <Bold>persist in the environment</Bold>, bioaccumulating up the food chain so birds of prey are poisoned [1]. <Bold>Biological control</Bold>: introduces a natural predator/parasite of the pest, so it is <Bold>specific</Bold> and leaves no chemical residue [1]; however it requires <Bold>thorough research and testing</Bold> [1] — if released without care, the introduced species can become a pest itself or disrupt other food chains (e.g. Cactoblastis moth) [1].</> },

    { id: "h2", diff: "hard", topic: "eutroph", ext: true, marks: 6, star: "★★★",
      q: "Explain in detail how nitrates from fertilisers leaking into a river can lead to the deaths of fish.",
      hint: "Five-step chain, name bacteria",
      a: <>Nitrate (and phosphate) ions enrich the water, supplying nutrients that <Bold>aquatic algae use to grow rapidly</Bold> (algal bloom) [1]. The surface bloom <Bold>blocks sunlight</Bold>, so plants and algae below cannot photosynthesise and die [1]. <Bold>Aerobic bacteria</Bold> decompose the dead algae [1] and use <Bold>dissolved oxygen</Bold> in respiration [1]. The water becomes <Bold>deoxygenated</Bold> [1]. Fish and other aerobic animals <Bold>suffocate</Bold> because they cannot extract enough oxygen from the water [1].</> },

    { id: "h3", diff: "hard", topic: "conservation", ext: true, marks: 5, star: "★★★",
      q: "Explain why a small population is at greater risk of extinction than a large one.",
      hint: "Genetic variation + adaptation",
      a: <>A smaller population has a smaller <Bold>gene pool</Bold> and therefore <Bold>less genetic variation</Bold> [1]. With fewer alleles available, the species has <Bold>less chance of carrying advantageous alleles</Bold> that allow individuals to survive environmental change (new disease, climate shift) [1]. Inbreeding is more likely and may expose <Bold>harmful recessive alleles</Bold> [1]. The species' ability to adapt by <Bold>natural selection is reduced</Bold> [1], so even small changes can wipe the population out → extinction [1].</> },

    { id: "h4", diff: "hard", topic: "conservation", ext: true, marks: 6, star: "★★",
      q: "Define a sustainable resource using a named example, then explain how that resource is being managed sustainably.",
      hint: "Forest or fish + 2-3 methods",
      a: <>A sustainable resource is one <Bold>produced as rapidly as it is removed</Bold>, so it does not run out [1]. Named example: <Bold>commercial fish stocks</Bold> [1]. Management: <Bold>closed seasons</Bold> allow fish to spawn and breed without being caught [1]; <Bold>legal quotas</Bold> (e.g. EU Common Fisheries Policy) limit the tonnage and minimum size that can be landed [1]; <Bold>marine protected areas</Bold> exclude fishing entirely so populations rebuild [1]; <Bold>monitoring</Bold> by patrol vessels ensures rules are obeyed [1]. (Forest example with replanting + Smartlogging + protected areas also acceptable.)</> },

    { id: "h5", diff: "hard", topic: "greenhouse", ext: true, marks: 4, star: "★★★",
      q: "Explain why renewable energy sources are less likely to pollute than coal and oil.",
      hint: "No combustion + no CO₂",
      a: <>Renewables (solar, wind, hydro, tidal, wave) <Bold>do not burn fuel</Bold> [1], so they release <Bold>no CO₂</Bold> at the point of generation [1]. They also produce no SO₂ or NOₓ (acid-rain gases) [1] and no toxic particulates, smoke or fly ash, unlike combustion of coal or oil [1].</> },

    { id: "h6", diff: "hard", topic: "greenhouse", ext: true, marks: 4, star: "★★★",
      q: "Explain why CO₂ and methane are described as greenhouse gases.",
      hint: "Absorb long-wave radiation",
      a: <>They form a layer in the atmosphere [1] that <Bold>absorbs long-wavelength (infrared) radiation</Bold> re-emitted from the Earth's surface [1]. The trapped heat warms the lower atmosphere — similar to how the glass of a greenhouse traps heat [1]. This raises the surface temperature; an increase in their concentration leads to the <Bold>enhanced greenhouse effect</Bold> and global warming [1].</> },

    { id: "h7", diff: "hard", topic: "conservation", ext: true, marks: 6, star: "★★★",
      q: "Explain how the loss of a single plant species might affect (a) human health and (b) the prospect of developing new drought-resistant crop varieties.",
      hint: "Drugs + gene pool",
      a: <>(a) Many <Bold>modern medicines</Bold> are derived from plant compounds (e.g. quinine, aspirin, anti-cancer drugs from rainforest species) [1]. Loss of any species removes a <Bold>potentially valuable source of new drugs</Bold> [1]. (b) Crop breeders cross cultivated plants with <Bold>wild relatives</Bold> to introduce useful alleles (drought resistance, disease resistance, salt tolerance) [1]. Losing a wild species means <Bold>those alleles disappear from the global gene pool forever</Bold> [1] — they cannot be recovered [1] — so it becomes harder to breed new varieties able to withstand future climate change [1].</> },

    { id: "h8", diff: "hard", topic: "conservation", ext: true, marks: 6, star: "★★",
      q: "Explain how CITES and the WWF differ in their roles in conservation, and identify where their work overlaps.",
      hint: "Treaty vs charity",
      a: <><Bold>CITES</Bold> (Convention on International Trade in Endangered Species) is a <Bold>legal treaty between governments</Bold> [1] that <Bold>restricts or bans trade</Bold> in endangered animals and plants (e.g. snake skins, rhino horns) [1]. In 2020 it covered 183 countries and ~5800 animals and 30000 plants [1]. <Bold>WWF</Bold> (World Wide Fund for Nature) is an <Bold>NGO/charity</Bold> that raises money for conservation projects in over 100 countries [1]; it identifies threats, lobbies governments, runs awareness campaigns and supports habitat protection [1]. <Bold>Overlap</Bold>: both work to protect endangered species and their habitats; WWF supports policy and research that helps CITES enforce its bans [1].</> },

    { id: "h9", diff: "hard", topic: "pollution", ext: true, marks: 6, star: "★★",
      q: "Effects of non-biodegradable plastics on (i) terrestrial ecosystems and (ii) aquatic ecosystems.",
      hint: "Landfill / animals / soil vs trap / micro / gills",
      a: <>(i) <Bold>Terrestrial</Bold>: take up large amounts of <Bold>landfill space</Bold> [1]; attract <Bold>vermin and insects</Bold>, which may spread disease [1]; if burned they release <Bold>toxic fumes</Bold> (air pollution) [1]. (ii) <Bold>Aquatic</Bold>: trap and kill marine mammals/birds (nets, bottles) [1]; <Bold>microplastics</Bold> are eaten by fish, accumulate in stomachs and pass up the food chain [1]; plastics clog the <Bold>gills</Bold>, reducing gas exchange [1].</> },

    { id: "h10", diff: "hard", topic: "habitat", ext: true, marks: 5, star: "★★",
      q: "A farmer ploughs a steeply sloping field. Suggest in what direction the furrows should run and explain how this reduces soil erosion.",
      hint: "Contour ploughing",
      a: <>Furrows should run <Bold>across the slope (along the contours)</Bold>, not up–down [2]. Water that runs down the slope is <Bold>trapped by each furrow</Bold> [1] rather than rushing along gullies running downhill. This <Bold>slows the flow</Bold> so water has time to <Bold>soak into the soil</Bold> [1] instead of carrying topsoil away [1].</> },

    { id: "h11", diff: "hard", topic: "habitat", ext: true, marks: 4, star: "★★",
      q: "Suggest possible connections between (a) cutting down trees on hillsides and flooding in the valleys, and (b) clear-felling tropical forests and local climate change.",
      hint: "Roots, soil, transpiration, cloud",
      a: <>(a) Tree <Bold>roots bind the soil and absorb rainwater</Bold>; once trees are gone, water runs straight off the slope [1], carrying soil into rivers, which then silt up and <Bold>overflow into the valleys</Bold> [1]. (b) About half the rain over rainforest comes from <Bold>transpiration</Bold> of the trees themselves [1]; without trees, <Bold>cloud cover drops, less rainfall, daily temperature range widens</Bold> — the local climate becomes hotter and drier [1].</> },

    { id: "h12", diff: "hard", topic: "agri", ext: true, marks: 4, star: "★★",
      q: "Explain why intensive livestock production has both economic advantages and serious environmental drawbacks.",
      hint: "Yield + automation vs slurry, disease",
      a: <><Bold>Advantages</Bold>: very high yields of meat/milk/eggs per hectare [1]; many processes (feeding, milking, egg collection) can be <Bold>automated</Bold> — cheaper and less labour intensive [1]. <Bold>Drawbacks</Bold>: large quantities of slurry pollute water (eutrophication) [1]; animals in close confinement are <Bold>more vulnerable to disease</Bold> and have less disease resistance; the methods often raise welfare concerns [1].</> },

    { id: "h13", diff: "hard", topic: "eutroph", ext: true, marks: 4, star: "★★★",
      q: "What does biochemical oxygen demand (BOD) measure, and how does it indicate pollution?",
      hint: "O₂ used by sample over fixed time",
      a: <>BOD is the <Bold>amount of oxygen used up by a sample of water</Bold> over a <Bold>fixed period of time</Bold> at a fixed temperature [2]. A high BOD means many <Bold>aerobic micro-organisms are present and respiring rapidly</Bold> (decomposing organic pollution) [1]. The more polluted the water (sewage, slurry, dead algae), the <Bold>higher the BOD</Bold> — so BOD is used as an indicator of organic pollution [1].</> },

    { id: "h14", diff: "hard", topic: "pollution", ext: true, marks: 5, star: "★★",
      q: "Suggest why the introduction of foreign species can have catastrophic effects on native communities, using a named example.",
      hint: "No predators + unchecked + food-web",
      a: <>An introduced species usually has <Bold>no natural predators</Bold> in the new ecosystem [1], so its population grows unchecked [1] and it <Bold>outcompetes</Bold> native species for food or space [1]. Example: <Bold>brown tree snake on Guam</Bold> — accidentally introduced, it wiped out 10 of the 12 native bird species [1], which had been essential for seed dispersal and pollination, so even the forest plants suffered [1]. <i>(Other valid examples: rats on Galapagos; Opuntia in Australia; sea lamprey in Great Lakes.)</i></> },

    { id: "h15", diff: "hard", topic: "greenhouse", ext: true, marks: 4, star: "★★",
      q: "Are biofuels truly carbon neutral? Explain.",
      hint: "Photosynthesis vs harvesting + extraction",
      a: <>In theory yes — CO₂ released when biofuels are burned was previously <Bold>absorbed by the crop in photosynthesis</Bold> [1]. However: <Bold>harvesting, extraction and distillation</Bold> use fuel and produce CO₂ [1]; clearing forest to grow fuel crops <Bold>removes a carbon sink</Bold> and burning the cleared trees releases stored carbon [1]. Land used for fuel reduces land for food crops, raising food prices [1]. The net effect on atmospheric CO₂ is therefore <Bold>questionable</Bold>.</> },

    // ═══════════════ NEW SME QUESTIONS (Save My Exams 2026) ═══════════════
    // ───── EASY ─────
    { id: "e23", diff: "easy", topic: "agri", marks: 5, star: "★★★",
      type: "table",
      q: "Complete the table by stating one way each chemical is useful to humans: (a) antibiotic, (b) fertiliser, (c) herbicide, (d) insecticide, (e) pectinase.",
      hint: "Disease, nutrients, weeds, insects, juice clarity",
      a: <>(a) <Bold>Antibiotic</Bold> — kills bacteria / treats bacterial infections [1]. (b) <Bold>Fertiliser</Bold> — supplies mineral ions (N, P, K) to crops so they grow well and yield more [1]. (c) <Bold>Herbicide</Bold> — kills weeds that compete with crops for light, water and ions [1]. (d) <Bold>Insecticide</Bold> — kills insect pests that damage or eat the crop [1]. (e) <Bold>Pectinase</Bold> — breaks down pectin in plant cell walls to clarify and increase the yield of fruit juice [1].</> },

    { id: "e24", diff: "easy", topic: "pollution", marks: 4, star: "★★★",
      q: "State four sources of water pollution other than raw sewage.",
      hint: "Fertilisers, pesticides, industry, oil, plastic, thermal",
      a: <>Any four of: <Bold>chemical fertilisers</Bold> (nitrates / phosphates running off fields) [1]; <Bold>pesticides</Bold> (herbicides &amp; insecticides) [1]; <Bold>industrial discharge</Bold> (heavy metals such as mercury / cadmium / lead) [1]; <Bold>oil spills</Bold> from tankers / refineries [1]; <Bold>non-biodegradable plastics</Bold> and microplastics [1]; <Bold>hot water</Bold> from power stations (thermal pollution) [1]; <Bold>livestock slurry</Bold> from intensive farming [1].</> },

    { id: "e25", diff: "easy", topic: "pollution", marks: 1, star: "★★★",
      q: "Define the term pathogen.",
      hint: "Organism causing disease",
      a: <>A pathogen is a <Bold>disease-causing organism</Bold> (e.g. a bacterium, virus, fungus or protoctist) [1].</> },

    { id: "e26", diff: "easy", topic: "habitat", marks: 1, star: "★★★",
      q: "State the ecological importance of maintaining biodiversity in an area.",
      hint: "Stable ecosystem, food webs, services",
      a: <>High biodiversity gives a <Bold>more stable ecosystem</Bold> with complex food webs, so disturbance to one species has less impact, and it ensures continued ecosystem services (pollination, pest control, nutrient cycling, soil formation) [1].</> },

    { id: "e27", diff: "easy", topic: "conservation", marks: 4, star: "★★★", ext: true,
      q: "Give four examples of how forests can be managed sustainably.",
      hint: "Replant, quotas, selective, education",
      a: <>Any four: <Bold>replanting</Bold> trees at the same rate they are removed [1]; <Bold>selective logging</Bold> of mature trees only (Smartlogging) leaves younger trees intact [1]; <Bold>legal quotas</Bold> on the volume that can be cut each year [1]; <Bold>protected areas</Bold> / national parks where logging is banned [1]; <Bold>education</Bold> of local communities (Rainforest Alliance) [1]; <Bold>recycling</Bold> paper and wood products [1].</> },

    { id: "e28", diff: "easy", topic: "conservation", marks: 2, star: "★★★",
      q: "Lack of food can reduce the size of an animal population in an ecosystem. State two other factors that could decrease population size.",
      hint: "Predation, disease, abiotic",
      a: <>Any two of: <Bold>predation</Bold> [1]; <Bold>disease</Bold> [1]; <Bold>competition</Bold> for water, mates or space [1]; <Bold>unfavourable abiotic conditions</Bold> (drought, low temperature, lack of light) [1]; <Bold>habitat destruction</Bold> by humans [1]; <Bold>pollution</Bold> [1].</> },

    // ───── MEDIUM ─────
    { id: "m17", diff: "medium", topic: "conservation", marks: 2, star: "★★★",
      q: "The chimpanzee is endangered because its population has decreased greatly. Suggest two reasons why the chimpanzee population has decreased.",
      hint: "Habitat + hunting + disease",
      a: <>Any two of: <Bold>habitat destruction</Bold> by deforestation in central/western Africa [1]; <Bold>hunting</Bold> for bushmeat or capture for the pet trade [1]; <Bold>disease</Bold> (e.g. respiratory infections, Ebola) [1]; competition with humans for food / land [1].</> },

    { id: "m18", diff: "medium", topic: "conservation", marks: 2, star: "★★★",
      q: "Describe how a captive breeding programme can help to conserve chimpanzees in the wild.",
      hint: "Bred safely + released into wild",
      a: <>Chimpanzees are bred in <Bold>protected captivity (zoos / breeding centres)</Bold> away from poachers and habitat loss, so numbers can increase safely [1]. Healthy offspring can be <Bold>released back into the wild</Bold> to boost the wild population and its gene pool [1].</> },

    { id: "m19", diff: "medium", topic: "agri", marks: 1, star: "★★★",
      type: "calc",
      q: "Fig. 1 (energy mix, 2011): Coal 41%, Oil 23%, Natural gas 8%, Solid biomass &amp; waste 23%, Nuclear &amp; renewables 5%. Calculate the total percentage of energy that came from fossil fuels.",
      hint: "Coal + oil + natural gas",
      a: <>Fossil fuels = coal + oil + natural gas = 41 + 23 + 8 = <Bold>72%</Bold> [1].</> },

    { id: "m20", diff: "medium", topic: "greenhouse", marks: 3, star: "★★★",
      q: "In a simplified carbon cycle, arrows connect 'atmosphere ⇌ plants ⇌ animals' and 'fossil fuels → atmosphere'. (i) Name two processes (other than combustion) that release CO₂ into the atmosphere. (ii) Name one process that removes CO₂ from the atmosphere.",
      hint: "Respiration, decomposition / photosynthesis",
      a: <>(i) Any two of <Bold>respiration</Bold> (plants, animals, microbes) [1] and <Bold>decomposition / decay</Bold> of dead organisms by bacteria and fungi [1]. (ii) <Bold>Photosynthesis</Bold> by plants and algae fixes CO₂ into organic compounds [1].</> },

    { id: "m21", diff: "medium", topic: "habitat", marks: 2, star: "★★★",
      type: "calc",
      q: "Forest cleared per year in Brazil: 2006 = 14 286 km²; 2007 = 12 651; 2008 = 11 911; 2009 = 7 464; 2010 = 7 000. (a) Calculate the mean area removed per year (2006–2010). (b) Describe the trend.",
      hint: "Sum ÷ 5 → decreasing",
      a: <>(a) Total = 14 286 + 12 651 + 11 911 + 7 464 + 7 000 = 53 312 km². Mean = 53 312 ÷ 5 = <Bold>10 662 km² per year</Bold> (accept 10 660) [2]. (b) The area of forest removed each year is <Bold>decreasing</Bold> (deforestation rate is falling year on year) [1].</> },

    { id: "m22", diff: "medium", topic: "habitat", marks: 2, star: "★★",
      q: "Suggest two reasons why annual deforestation in Brazil declined between 2006 and 2010.",
      hint: "Policy + economy + protection",
      a: <>Any two of: stronger <Bold>government legislation</Bold> and enforcement against illegal logging [1]; expansion of <Bold>protected areas / national parks</Bold> [1]; international <Bold>pressure and trade restrictions</Bold> on beef and soy from cleared land [1]; reduced demand or falling commodity prices [1]; greater <Bold>public awareness</Bold> and consumer pressure (e.g. Rainforest Alliance) [1].</> },

    { id: "m23", diff: "medium", topic: "agri", marks: 5, star: "★★★", ext: true,
      q: "Cattle manure contains protein. Explain how this protein is converted into the ions that plants can absorb from the soil.",
      hint: "Decay → amino acids → ammonium → nitrite → nitrate",
      a: <><Bold>Decomposers</Bold> (saprophytic bacteria and fungi) digest manure using extracellular enzymes [1]. Proteins are broken down to <Bold>amino acids</Bold> [1]; deamination releases <Bold>ammonium (NH₄⁺) ions</Bold> [1]. <Bold>Nitrifying bacteria</Bold> in the soil convert ammonium first to <Bold>nitrite (NO₂⁻)</Bold> then to <Bold>nitrate (NO₃⁻)</Bold> [1]. Nitrate ions are taken up by plant roots by <Bold>active transport</Bold> and used to build amino acids and proteins [1].</> },

    { id: "m24", diff: "medium", topic: "agri", marks: 4, star: "★★★", ext: true,
      type: "calc",
      q: "Average root nodules per snap bean plant: Field 3 (large manure) = 155; Field 4 (no manure) = 95. (a) Calculate the percentage increase in nodule number when grown with large manure compared with no manure (2 s.f.). (b) Suggest the advantage to farmers of having many root nodules.",
      hint: "% increase = (155−95)/95 × 100",
      a: <>(a) Increase = 155 − 95 = 60. % increase = (60 ÷ 95) × 100 = 63.157…% = <Bold>63%</Bold> (2 s.f.) [3]. (b) Nodules contain <Bold>nitrogen-fixing bacteria</Bold> that convert atmospheric N₂ into ammonium / nitrates for the plant, so <Bold>less chemical fertiliser is needed</Bold> and yields stay high — saving money [1].</> },

    { id: "m25", diff: "medium", topic: "conservation", marks: 2, star: "★★",
      q: "Seeds of many endangered tree species are kept in seed banks. Suggest why it is important to collect seeds from many individual trees of each species rather than just one tree.",
      hint: "Genetic diversity",
      a: <>Different individuals carry <Bold>different alleles</Bold>, so collecting seeds from many trees preserves a <Bold>wider gene pool</Bold> [1]. A larger gene pool gives a better chance that some seeds will carry alleles for resistance to disease or climate change, so future populations can <Bold>adapt and avoid extinction</Bold> [1].</> },

    // ───── HARD ─────
    { id: "h16", diff: "hard", topic: "pollution", ext: true, marks: 3, star: "★★★",
      type: "calc",
      q: "Mean nitrate concentration: Site A (upstream of fertiliser factory) = 20 mg dm⁻³; Site B (downstream) = 63 mg dm⁻³. Calculate the percentage difference between A and B and state the nature of the difference.",
      hint: "% diff = (63−20)/20 × 100",
      a: <>Difference = 63 − 20 = 43 mg dm⁻³. % difference = (43 ÷ 20) × 100 = <Bold>215%</Bold> [2]. Site B (downstream of the factory) has a <Bold>much higher nitrate concentration</Bold> than Site A — the factory effluent is enriching the river with nitrates [1].</> },

    { id: "h17", diff: "hard", topic: "pollution", ext: true, marks: 3, star: "★★",
      q: "Tests showed high levels of cadmium (a heavy metal) in the water at Site B. Top carnivores contained the highest cadmium concentration, stored in fat. Suggest the risk this poses to the river ecosystem.",
      hint: "Bioaccumulation + biomagnification + top predator deaths",
      a: <>Cadmium is <Bold>not excreted or broken down</Bold>, so it accumulates in fat (bioaccumulation) [1]. At each step of the food chain, predators eat many prey, so cadmium becomes <Bold>more concentrated up the food chain</Bold> (biomagnification) [1]. Top carnivores reach <Bold>lethal levels</Bold> and die; loss of top predators destabilises the food web and reduces biodiversity throughout the river [1].</> },

    { id: "h18", diff: "hard", topic: "agri", ext: true, marks: 3, star: "★★★",
      q: "Explain three disadvantages of monoculture farming such as oil palm plantations.",
      hint: "Pests/disease + nutrients + biodiversity",
      a: <>Any three: a single crop is highly vulnerable to <Bold>pests and disease</Bold> that target that species — entire crop can be wiped out [1]; the same nutrients are removed every season, so <Bold>soil fertility falls</Bold> and large amounts of fertiliser are needed [1]; <Bold>biodiversity is severely reduced</Bold> — native plants and animals are displaced, pollinators and natural pest predators lose habitat [1]; reliance on a single product makes farmers <Bold>vulnerable to price collapse</Bold> in the world market [1].</> },

    { id: "h19", diff: "hard", topic: "pollution", ext: true, marks: 4, star: "★★",
      q: "Describe four results from the Pacific Ocean plastic-waste survey (1965–2015) shown in a typical bar chart: plastic concentration inside the Great Pacific Garbage Patch (GPGP) rose from ~0.4 to ~1.2 kg km⁻² and outside it rose from ~0.05 to ~0.35 kg km⁻².",
      hint: "Use figures + compare + describe trend",
      a: <>Plastic waste concentration <Bold>increased overall</Bold> across the whole study period (1965–2015) [1]. Concentrations were <Bold>always higher inside the GPGP than outside</Bold> in every time interval [1]. Inside the GPGP, levels were roughly stable around 0.4 kg km⁻² from 1965–1994, then rose sharply to ~1.2 kg km⁻² by 2015 — about a <Bold>threefold increase</Bold> [1]. Outside the GPGP the rise was more gradual: from ~0.05 to ~0.35 kg km⁻² — about a <Bold>sevenfold increase</Bold>, showing pollution is now spreading well beyond the patch itself [1].</> },

    { id: "h20", diff: "hard", topic: "pollution", ext: true, marks: 2, star: "★★",
      q: "Suggest two ways to reduce the quantity of plastic waste reaching the oceans.",
      hint: "Reduce + reuse + recycle + biodegradable",
      a: <>Any two of: <Bold>recycle</Bold> plastic into new products (bottles, fleece, building materials) [1]; <Bold>reuse</Bold> bottles, bags and containers (reusable shopping bags, deposit-return schemes) [1]; <Bold>ban or tax single-use plastics</Bold> (straws, bags, microbeads) [1]; develop <Bold>biodegradable</Bold> or plant-based alternatives [1]; improve <Bold>waste collection and disposal</Bold> in coastal regions [1].</> },

    // ═══════════════ MULTIPLE CHOICE QUESTIONS (Save My Exams 2026) ═══════════════
    // ───── EASY MCQ ─────
    { id: "mcq1", diff: "easy", topic: "agri", marks: 1, star: "★★★", type: "mcq",
      q: <>Which of the following would be a <Bold>negative</Bold> feature of monoculture crops on an ecosystem?<br/>A. Monoculture crops produce more food.<br/>B. Monoculture crops produce less food.<br/>C. The genetic variation of organisms is reduced.<br/>D. Crops need harvesting at the same time.</>,
      hint: "Single species → narrow gene pool",
      a: <><Bold>C</Bold> — monoculture grows only one species, so wild plant/animal communities are displaced and overall genetic diversity in that land falls sharply [1].</> },

    { id: "mcq2", diff: "easy", topic: "habitat", marks: 1, star: "★★★", type: "mcq",
      q: <>Which effect is <Bold>least likely</Bold> to result from deforestation?<br/>A. A greater risk of flooding.<br/>B. An increase in biodiversity.<br/>C. An increase in soil erosion.<br/>D. An increase in atmospheric carbon dioxide.</>,
      hint: "Deforestation always reduces biodiversity",
      a: <><Bold>B</Bold> — clearing trees removes habitats and food for many species, so biodiversity <Bold>decreases</Bold>, not increases [1]. A, C and D are all genuine consequences of deforestation.</> },

    { id: "mcq3", diff: "easy", topic: "agri", marks: 1, star: "★★★", type: "mcq",
      q: <>A non-selective herbicide is sprayed on a field; some runs off into a nearby stream. What is the effect on weeds in the field and plants in the stream?<br/>A. weeds more growth · stream less growth<br/>B. weeds less growth · stream more growth<br/>C. weeds less growth · stream less growth<br/>D. weeds more growth · stream more growth</>,
      hint: "Non-selective = kills all plants",
      a: <><Bold>C</Bold> — a non-selective herbicide kills <Bold>any plant</Bold> it contacts, so weeds in the field die and plants in the stream also die [1].</> },

    { id: "mcq4", diff: "easy", topic: "agri", marks: 1, star: "★★★", type: "mcq",
      q: <>Low concentrations of insecticide are sprayed on crops to raise yield, but insecticides also harm wildlife. Why?<br/>A. Insecticides kill other plants.<br/>B. Insecticides cause acid rain.<br/>C. Insecticides enter the food chain.<br/>D. Insecticides increase nitrates in the soil.</>,
      hint: "Bioaccumulation up the food chain",
      a: <><Bold>C</Bold> — insecticide residues are absorbed by insects (and other organisms), then build up in predators along the food chain (bioaccumulation), reaching toxic levels in top carnivores [1].</> },

    { id: "mcq5", diff: "easy", topic: "pollution", marks: 1, star: "★★★", type: "mcq",
      q: <>A factory empties pollutants into a river. Indicator species found near the outflow include rat-tailed maggot, sludge worm and blood worm; further downstream, mayfly nymph and stonefly nymph return. Which animal lives in the most polluted area?<br/>A. Shrimp<br/>B. Sludge worm<br/>C. Leech<br/>D. Snail</>,
      hint: "Tolerant of very low oxygen",
      a: <><Bold>B</Bold> — sludge worm (along with rat-tailed maggot and blood worm) tolerates very low oxygen levels and is found in the most polluted, organically-enriched zone right at the outflow [1].</> },

    { id: "mcq6", diff: "easy", topic: "conservation", marks: 1, star: "★★★", type: "mcq",
      q: <>What could help to prevent a species from becoming endangered?<br/>A. A captive breeding programme<br/>B. Deforestation<br/>C. Introduction of other species<br/>D. Pollution</>,
      hint: "Boosts numbers in protected settings",
      a: <><Bold>A</Bold> — captive breeding raises numbers in protected conditions and offspring can be released to boost wild populations [1]. B, C and D are all <Bold>causes</Bold> of endangerment.</> },

    { id: "mcq7", diff: "easy", topic: "conservation", marks: 1, star: "★★★", type: "mcq",
      q: <>What helps to maintain fish stocks?<br/>A. Fishing during all seasons<br/>B. Fishing in all areas of the oceans<br/>C. Maintaining protected areas<br/>D. Reducing the mesh size of nets</>,
      hint: "Sanctuaries allow rebuilding",
      a: <><Bold>C</Bold> — marine protected areas exclude fishing so populations can breed and recover [1]. A, B and smaller mesh sizes all <Bold>worsen</Bold> overfishing.</> },

    { id: "mcq8", diff: "easy", topic: "eutroph", marks: 1, star: "★★★", type: "mcq",
      q: <>During eutrophication, what is <Bold>directly</Bold> responsible for the rise in decomposers?<br/>A. A decrease in dissolved oxygen concentration<br/>B. An increase in nitrate concentration<br/>C. An increase in the population of algae<br/>D. An increase in the death of producers</>,
      hint: "Decomposers eat dead organic matter",
      a: <><Bold>D</Bold> — decomposers feed on <Bold>dead</Bold> producers (algae and underwater plants), so their numbers rise once these die off. (Higher nitrates and bigger algal blooms come earlier in the chain.)</> },

    // ───── MEDIUM MCQ ─────
    { id: "mcq9", diff: "medium", topic: "pollution", marks: 1, star: "★★★", type: "mcq",
      q: <>A graph shows the number of lichen species falling sharply as sulfur dioxide concentration rises. Which statement best describes it?<br/>A. Sulfur dioxide levels do not affect lichen growth.<br/>B. As sulfur dioxide levels increase, the number of lichen species decreases.<br/>C. Lichens cannot survive if there is any sulfur dioxide present.<br/>D. As sulfur dioxide levels increase, so does the number of lichen species.</>,
      hint: "Negative correlation, not zero tolerance",
      a: <><Bold>B</Bold> — there is a clear negative correlation. The curve does not reach zero immediately, so C is too strong; lichens are good indicators of air quality because they are sensitive (but not absolutely) to SO₂ [1].</> },

    { id: "mcq10", diff: "medium", topic: "pollution", marks: 1, star: "★★★", type: "mcq",
      q: <>Plastic pollution statements: (1) Animals try to eat plastic or become entangled in it; (2) It breaks down into micro-particles that wash into rivers; (3) As plastic breaks down it releases toxins; (4) Filter feeders such as mussels ingest microparticles, entering the food chain. Which statements apply to <Bold>both</Bold> marine and terrestrial habitats?<br/>A. 1, 2 and 3<br/>B. 2 and 4 only<br/>C. 1 and 3 only<br/>D. 3 only</>,
      hint: "Filter feeding = aquatic only",
      a: <><Bold>C</Bold> — entanglement/ingestion (1) and toxin release (3) happen on land and in water. Run-off to rivers (2) and filter feeding (4) are inherently aquatic [1].</> },

    { id: "mcq11", diff: "medium", topic: "agri", marks: 1, star: "★★★", type: "mcq",
      q: <>Which agricultural practice is most likely to cause <Bold>water pollution</Bold>?<br/>A. Cutting down trees to create space for crops.<br/>B. Adding fertilisers to the soil.<br/>C. Digging plant material into the crop.<br/>D. Growing high-yield crops.</>,
      hint: "Soluble nitrates and phosphates run off",
      a: <><Bold>B</Bold> — soluble nitrates and phosphates leach from soil into rivers and lakes, causing eutrophication [1]. Deforestation causes other harms but is not the main agricultural source of <Bold>water</Bold> pollution.</> },

    { id: "mcq12", diff: "medium", topic: "greenhouse", marks: 1, star: "★★★", type: "mcq",
      q: <>Which pair of gases <Bold>both</Bold> contribute to climate change?<br/>A. Oxygen and methane<br/>B. Sulfur dioxide and methane<br/>C. Carbon dioxide and methane<br/>D. Carbon dioxide and sulfur dioxide</>,
      hint: "Two main greenhouse gases",
      a: <><Bold>C</Bold> — CO₂ and CH₄ are the two main greenhouse gases that trap long-wavelength radiation, enhancing the greenhouse effect [1]. Sulfur dioxide causes acid rain, not climate change.</> },

    { id: "mcq13", diff: "medium", topic: "conservation", marks: 1, star: "★★★", type: "mcq",
      q: <>Which is a reason for conserving plant species?<br/>A. To obtain drugs for medicinal use.<br/>B. To decrease rainfall.<br/>C. To absorb oxygen from the air.<br/>D. To release carbon dioxide into the atmosphere.</>,
      hint: "Many medicines are plant-derived",
      a: <><Bold>A</Bold> — many medicines (quinine, aspirin, anti-cancer drugs) come from plant compounds. Losing a species removes a potential drug source [1]. Plants release O₂ and absorb CO₂, the opposite of C and D.</> },

    { id: "mcq14", diff: "medium", topic: "agri", marks: 1, star: "★★★", type: "mcq",
      q: <>What is a negative impact of large-scale monocultures?<br/>A. Crops need harvesting at the same time.<br/>B. Monocultures produce different types of food.<br/>C. Monocultures produce more food.<br/>D. The genetic variation of organisms is reduced.</>,
      hint: "One species → narrow gene pool + biodiversity loss",
      a: <><Bold>D</Bold> — only one species is grown, so the genetic variation of organisms in that landscape (including displaced wild species) falls sharply, making the system vulnerable to disease [1].</> },

    { id: "mcq15", diff: "medium", topic: "greenhouse", marks: 1, star: "★★★", type: "mcq",
      q: <>Which factors are believed to have contributed to the rise in sea levels?<br/>A. Pollution of the air by carbon dioxide only.<br/>B. Pollution of the air by carbon dioxide and methane.<br/>C. Pollution of the sea by plastics only.<br/>D. Pollution of the sea by insecticides and nuclear fall-out.</>,
      hint: "Two greenhouse gases drive warming → ice melts",
      a: <><Bold>B</Bold> — CO₂ and methane enhance the greenhouse effect; the resulting global warming melts polar ice and causes thermal expansion of seawater, raising sea levels [1].</> },

    { id: "mcq16", diff: "medium", topic: "eutroph", marks: 1, star: "★★★", type: "mcq",
      q: <>Sequence after fertiliser runoff enters a lake: fertiliser runoff → algal bloom → <Bold>X</Bold> → dissolved oxygen decreases → fish die. What is process X?<br/>A. Increased respiration by decomposers.<br/>B. Increased photosynthesis by algae.<br/>C. Increased feeding by fish.<br/>D. Increased nitrate absorption by plants.</>,
      hint: "What uses up the oxygen?",
      a: <><Bold>A</Bold> — algae below the bloom die; aerobic decomposers break them down and use up dissolved oxygen during respiration, so fish suffocate [1].</> },

    // ───── HARD MCQ ─────
    { id: "mcq17", diff: "hard", topic: "eutroph", marks: 1, star: "★★★", type: "mcq",
      q: <>A graph along a river shows dissolved oxygen (dashed line) and mineral ions (dotted line) at points A, B, C, D. Dissolved oxygen drops sharply just after A, reaches a minimum near C, then recovers. Mineral ions are low before A and spike high right after A. At which point does <Bold>raw sewage</Bold> enter the river?<br/>A · B · C · D</>,
      hint: "Sewage adds nutrients (mineral spike) and depletes O₂",
      a: <><Bold>A</Bold> — sewage immediately raises mineral ion (nitrate / phosphate) concentration. Microbial respiration on the organic content drops dissolved oxygen shortly afterwards. Further downstream, both recover as the pollution disperses [1].</> },

    { id: "mcq18", diff: "hard", topic: "pollution", marks: 1, star: "★★★", type: "mcq",
      q: <>Which describes the effect of nuclear fall-out pollution?<br/>A. Acid rain<br/>B. Deforestation<br/>C. Global warming<br/>D. Increased mutation rate</>,
      hint: "Ionising radiation alters DNA",
      a: <><Bold>D</Bold> — ionising radiation from radioactive fall-out damages DNA, raising the rate of mutation in exposed organisms (including humans) and increasing the risk of cancers and inherited disorders [1].</> },

    { id: "mcq19", diff: "hard", topic: "conservation", marks: 1, star: "★★★", ext: true, type: "mcq",
      q: <>Conservation technique statements: (1) Artificial insemination removes the need for male and female to be in the same area; (2) AI offspring have less genetic variation than their parents; (3) IVF produces large numbers of offspring without gametes fusing; (4) These techniques increase species resilience and lower extinction risk. Which statements are <Bold>false</Bold>?<br/>A. 1, 2 and 3<br/>B. 2 and 3 only<br/>C. 2 and 4 only<br/>D. 1, 3 and 4</>,
      hint: "AI/IVF still need gametes to fuse",
      a: <><Bold>B</Bold> — (1) and (4) are true: AI removes the need for natural mating and these methods do improve resilience. (2) is false — offspring inherit a <Bold>recombination</Bold> of parental alleles, so they show normal genetic variation. (3) is false — IVF means <Bold>in vitro</Bold> fertilisation, so gametes <Bold>do</Bold> fuse, just outside the body [1].</> },

    { id: "mcq20", diff: "hard", topic: "eutroph", marks: 1, star: "★★★", ext: true, type: "mcq",
      q: <>Rapid algal growth follows nitrate runoff into a reservoir. Changes: (1) increased aerobic respiration by decomposers; (2) decrease in dissolved oxygen; (3) fish and aquatic animals die; (4) producers die and decomposition increases. In which order do these occur?<br/>A. 1 → 2 → 4 → 3<br/>B. 3 → 1 → 2 → 4<br/>C. 4 → 1 → 2 → 3<br/>D. 4 → 3 → 1 → 2</>,
      hint: "Death of producers comes first, then bacteria",
      a: <><Bold>C</Bold> — order: producers below the surface die (light blocked) → decomposers respire on the dead matter → oxygen falls → fish suffocate [1].</> },

    { id: "mcq21", diff: "hard", topic: "conservation", marks: 1, star: "★★★", type: "mcq",
      q: <>Which is the correct definition of a <Bold>sustainable resource</Bold>?<br/>A. A resource that can be replaced.<br/>B. A resource that is running out.<br/>C. Making sure that needs are met for future generations.<br/>D. A resource that can be replenished as quickly as it is used.</>,
      hint: "Rate of replacement ≥ rate of removal",
      a: <><Bold>D</Bold> — a sustainable resource is produced at least as rapidly as it is removed, so the supply does not run out [1]. C describes sustainable <Bold>development</Bold>, a related but broader concept.</> },
  ];

  // Topic palette
  const topics = [
    { id: "all", label: "All topics", color: RD },
    { id: "agri", label: "Agriculture", color: "#b5540a" },
    { id: "habitat", label: "Habitat / Deforestation", color: "#2d6a4f" },
    { id: "pollution", label: "Pollution", color: "#9b2c2c" },
    { id: "eutroph", label: "Eutrophication", color: "#3a5fa8" },
    { id: "greenhouse", label: "Greenhouse / Climate", color: "#5b3fa6" },
    { id: "conservation", label: "Conservation", color: "#1a7a6e" },
  ];

  const diffs = [
    { id: "all",    label: "All",    color: RD,        bg: RL },
    { id: "easy",   label: "Easy",   color: "#1a7a3a", bg: "#e8f7ec" },
    { id: "medium", label: "Medium", color: "#b85c00", bg: "#fff4e6" },
    { id: "hard",   label: "Hard",   color: "#b02020", bg: "#fdf0f0" },
  ];

  const filtered = qs.filter(q =>
    (diff === "all" || q.diff === diff) &&
    (topic === "all" || q.topic === topic)
  );
  const totalMarks = filtered.reduce((s, q) => s + q.marks, 0);
  const revealedCount = filtered.filter(q => rev[q.id]).length;

  const dCount = id => id === "all" ? qs.length : qs.filter(q => q.diff === id).length;
  const tCount = id => id === "all" ? qs.length : qs.filter(q => q.topic === id).length;

  return (
    <div>
      {/* Header banner */}
      <div style={{ background: RL, border: `1px solid ${RD}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: RD, fontWeight: 600 }}>
        🎯 <Bold>Exam Practice — Infinite Test Bank</Bold> · filter by difficulty and topic
      </div>

      {/* Difficulty filter */}
      <div style={{ fontSize: 10, fontWeight: 700, color: "#888", letterSpacing: 1, marginBottom: 5 }}>DIFFICULTY</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {diffs.map(d => (
          <button key={d.id} onClick={() => setDiff(d.id)} style={{
            padding: "6px 12px", borderRadius: 6,
            border: diff === d.id ? `1.5px solid ${d.color}` : `1px solid ${BD}`,
            background: diff === d.id ? d.color : "#fff",
            color: diff === d.id ? "#fff" : d.color,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {d.label} ({dCount(d.id)})
          </button>
        ))}
      </div>

      {/* Topic filter */}
      <div style={{ fontSize: 10, fontWeight: 700, color: "#888", letterSpacing: 1, marginBottom: 5 }}>TOPIC</div>
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {topics.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{
            padding: "6px 10px", borderRadius: 6,
            border: topic === t.id ? `1.5px solid ${t.color}` : `1px solid ${BD}`,
            background: topic === t.id ? t.color : "#fff",
            color: topic === t.id ? "#fff" : t.color,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {t.label} ({tCount(t.id)})
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>
        <span><Bold>{filtered.length}</Bold> questions · <Bold>{totalMarks}</Bold> marks · <Bold>{revealedCount}</Bold> revealed</span>
        <button onClick={() => setRev({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,
          borderRadius: 4, cursor: "pointer",
        }}>Hide all</button>
      </div>

      {/* Question cards */}
      {filtered.map(q => {
        const dInfo = diffs.find(d => d.id === q.diff);
        const tInfo = topics.find(t => t.id === q.topic);
        const isRev = rev[q.id];
        return (
          <div key={q.id} style={{
            background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${tInfo.color}`,
            borderRadius: 8, padding: "12px 14px", marginBottom: 10,
          }}>
            <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: dInfo.bg, color: dInfo.color, borderRadius: 3 }}>{dInfo.label.toUpperCase()}</span>
              <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: "#f5f5f3", color: tInfo.color, borderRadius: 3, border: `1px solid ${tInfo.color}33` }}>{tInfo.label}</span>
              {q.ext && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: PL, color: PU, borderRadius: 3 }}>EXT</span>}
              {q.type && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: "#eef", color: "#446", borderRadius: 3 }}>{q.type.toUpperCase()}</span>}
              <span style={{ fontSize: 10, color: "#b85c00", marginLeft: 2 }}>{q.star}</span>
              <span style={{ marginLeft: "auto", fontSize: 10, fontWeight: 700, color: GR,
                background: "#f5f5f3", padding: "2px 8px", borderRadius: 4 }}>{q.marks} marks</span>
            </div>

            <div style={{ fontSize: 12.5, lineHeight: 1.55, color: GR, marginBottom: 8 }}>
              <Bold>Q{q.id.toUpperCase()}.</Bold> {q.q}
            </div>

            {!isRev && q.hint && (
              <div style={{ fontSize: 11, color: "#888", fontStyle: "italic", marginBottom: 8 }}>
                💡 Hint: {q.hint}
              </div>
            )}

            <button onClick={() => toggle(q.id)} style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 700,
              background: isRev ? "#f5f5f3" : RD, color: isRev ? GR : "#fff",
              border: isRev ? `1px solid ${BD}` : "none", borderRadius: 4, cursor: "pointer",
            }}>
              {isRev ? "Hide answer" : "Show answer"}
            </button>

            {isRev && (
              <div style={{ marginTop: 10, padding: "10px 12px", background: RL,
                borderRadius: 6, fontSize: 12, lineHeight: 1.6, color: GR, border: `1px solid ${RD}33` }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: RD, marginBottom: 4 }}>MODEL ANSWER</div>
                {q.a}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Infinite test mode: <Bold>{qs.length}</Bold> questions loaded · filters applied
      </div>
    </div>
  );
}

// ③ SUMMARY TAB — concept flow & key tables
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const section = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${PU}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 14 };
  const h = { fontSize: 13, fontWeight: 800, color: PU, marginBottom: 10, letterSpacing: 0.3 };
  const td = { padding: "7px 9px", fontSize: 11.5, color: GR, border: `1px solid ${BD}` };
  const th = { padding: "7px 9px", fontSize: 11, fontWeight: 700, color: "#fff", background: PU, border: `1px solid ${PU}`, textAlign: "left" };

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: PU, fontWeight: 600 }}>
        📊 <Bold>Summary</Bold> · concept flow, comparison tables, and big-picture overview
      </div>

      {/* Key terms table */}
      <div style={section}>
        <div style={h}>★ KEY TERMS — definitions you must know</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Term</th><th style={th}>Definition</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Monoculture</Bold></td><td style={td}>Dense population of a single crop species, planted repeatedly.</td></tr>
            <tr><td style={td}><Bold>Herbicide</Bold></td><td style={td}>Chemical that kills plants competing with the crop (weeds).</td></tr>
            <tr><td style={td}><Bold>Insecticide</Bold></td><td style={td}>Chemical that kills insect pests of the crop.</td></tr>
            <tr><td style={td}><Bold>Biodiversity</Bold></td><td style={td}>Number of different species living in an area.</td></tr>
            <tr><td style={td}><Bold>Deforestation</Bold></td><td style={td}>Large-scale removal of trees from a forest area.</td></tr>
            <tr><td style={td}><Bold>Eutrophication</Bold></td><td style={td}>Enrichment of water with nutrients, leading to excess plant growth and O₂ loss.</td></tr>
            <tr><td style={td}><Bold>BOD</Bold></td><td style={td}>Biochemical oxygen demand — O₂ used by a water sample in a fixed time. Higher = more polluted.</td></tr>
            <tr><td style={td}><Bold>Non-biodegradable</Bold></td><td style={td}>Material that decomposers cannot break down — persists in the environment.</td></tr>
            <tr><td style={td}><Bold>Enhanced greenhouse effect</Bold></td><td style={td}>Extra warming caused by human-driven build-up of greenhouse gases.</td></tr>

            <tr>
              <td style={td}>Animals sheltered from predators and bad weather.</td>

          The key examiner expectations: <KW c={PU}>nitrates &amp; phosphates</KW> from fertilisers / sewage / detergents → <Bold>algal bloom</Bold> → <Bold>light blocked</Bold> → submerged plants die → <Bold>bacteria decompose &amp; use O₂</Bold> → fish suffocate. The water is then said to be deoxygenated and has a <Bold>high BOD</Bold>.

        <GreenhouseSVG />
        <div style={{ fontSize: 11.5, color: GR, lineHeight: 1.65, marginTop: 6 }}>
          <Bold>Short waves penetrate</Bold> → Earth absorbs and re-emits <Bold>long waves</Bold> → trapped by greenhouse gases → surface warms. The <KW c={PU}>enhanced</KW> greenhouse effect comes from extra <Bold>CO₂</Bold> (fossil fuels, deforestation) and <Bold>CH₄</Bold> (rice paddies, cattle, oil/coal extraction).

        <ClimateGraphSVG />

      {/* Pesticides + bioaccumulation */}

      {/* Conservation strategies */}
      <div style={section}>

// ④ TEXTBOOK TAB — complete Hodder notes
