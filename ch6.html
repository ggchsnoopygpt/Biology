    /* — Glucose uses (10-15) — */
    { src: "SME", cat: "Glucose uses", front: "Name six uses of the glucose made in photosynthesis.", back: <span>1. <KW c={TL}>Respiration</KW> (energy)<br/>2. Converted to <KW c={TL}>sucrose</KW> for transport<br/>3. Stored as <KW c={TL}>starch</KW> (insoluble)<br/>4. Built into <KW c={TL}>cellulose</KW> for cell walls<br/>5. Converted to <KW c={TL}>fats &amp; oils</KW> (seeds)<br/>6. Combined with nitrate to make <KW c={TL}>amino acids → proteins</KW>.</span> },
    { src: "SME", cat: "Glucose uses", front: "Why is glucose stored as STARCH and not as glucose itself?", back: <span>Because starch is <KW c={TL}>insoluble</KW> — it has <Bold>no osmotic effect</Bold>. Storing soluble glucose would lower the cell's water potential, water would rush in by osmosis, and cells could burst.</span> },
    { src: "SME", cat: "Glucose uses", front: "What molecule is glucose converted to for transport in the plant?", back: <span><KW c={TL}>Sucrose</KW> — a soluble sugar that is moved through the <Bold>phloem</Bold> from leaves to the rest of the plant (translocation).</span> },
    { src: "SME", cat: "Glucose uses", front: "What carbohydrate is made for plant cell walls?", back: <span><KW c={TL}>Cellulose</KW> — long chains of glucose joined together. Provides the rigid cell wall.</span> },
    { src: "SME", cat: "Glucose uses", front: "What needs to combine with glucose to make amino acids?", back: <span><KW c={TL}>Nitrate ions</KW> (NO₃⁻) absorbed from the soil by the roots. The amino acids are then joined to form <Bold>proteins</Bold>.</span> },
    { src: "SME", cat: "Glucose uses", front: "Where in a plant might fats and oils be stored?", back: <span>In <KW c={TL}>seeds</KW> (e.g. sunflower, peanut, oilseed rape, olive). They are an energy-rich store for the embryo plant until photosynthesis starts.</span> },

    /* — Mineral ions (16-21) — */
    { src: "SME", cat: "Mineral ions", front: "Why does a plant need nitrate ions?", back: <span>To make <KW c={TL}>amino acids</KW>, which are then joined together to make <Bold>proteins</Bold> (for growth, enzymes, repair).</span> },
    { src: "SME", cat: "Mineral ions", front: "What deficiency symptom does a plant show if it lacks nitrate ions?", back: <span><KW c={RD}>Stunted growth</KW> (because proteins are needed for growth) plus <KW c={RD}>yellowing of older (lower) leaves</KW> as the plant moves nitrogen to new leaves.</span> },
    { src: "SME", cat: "Mineral ions", front: "Why does a plant need magnesium ions?", back: <span>To make <KW c={TL}>chlorophyll</KW> — the green pigment that transfers energy from light in photosynthesis.</span> },
    { src: "SME", cat: "Mineral ions", front: "What deficiency symptom does a plant show if it lacks magnesium ions?", back: <span><KW c={RD}>Yellowing between the veins</KW> (chlorosis), because the plant cannot make enough chlorophyll. Older leaves show it first.</span> },
    { src: "SME", cat: "Mineral ions", front: "How are mineral ions taken up by a plant?", back: <span>They are dissolved in soil water and absorbed through the <KW c={TL}>roots</KW> (especially through the root hair cells, by active transport).</span> },
    { src: "SME", cat: "Mineral ions", front: "True or False? Magnesium deficiency causes stunted growth.", back: <span><KW c={RD}>False.</KW> Magnesium deficiency causes <Bold>yellowing between veins</Bold> (because chlorophyll cannot be made). It's <KW c={TL}>nitrate</KW> deficiency that causes stunted growth.</span> },

    /* — Investigations (22-28) — */
    { src: "SME", cat: "Investigations", front: "How can you test a leaf for the presence of starch?", back: <span>1. Boil leaf in water (kills cells)<br/>2. Heat in <KW c={TL}>ethanol</KW> in a HOT WATER BATH (decolourises - removes chlorophyll)<br/>3. Soften in warm water<br/>4. Add <Bold>iodine solution</Bold>. Starch turns it <KW c={TL}>blue-black</KW>.</span> },
    { src: "SME", cat: "Investigations", front: "Why is ethanol heated in a water bath, NOT directly over a flame?", back: <span>Because ethanol is <KW c={RD}>highly flammable</KW>. <Bold>Switch off the Bunsen flame first</Bold>, then warm the ethanol in a beaker of HOT water. Direct heat could ignite the ethanol vapour.</span> },
    { src: "SME", cat: "Investigations", front: "What is destarching, and why is it done before a photosynthesis experiment?", back: <span>Destarching = leaving the plant in <KW c={TL}>darkness for 24-48 hours</KW>. Existing starch is converted to sucrose and used / transported away. After destarching, the leaf will only test positive for starch if photosynthesis happened during the experiment.</span> },
    { src: "SME", cat: "Investigations", front: "Describe the experiment to show that LIGHT is needed for photosynthesis.", back: <span>Destarch a leaf. Cover part of it with <KW c={TL}>foil/black paper</KW>. Expose to bright light for hours. Test for starch with iodine. <Bold>Only the uncovered part goes blue-black.</Bold></span> },
    { src: "SME", cat: "Investigations", front: "Describe the experiment to show that CHLOROPHYLL is needed for photosynthesis.", back: <span>Use a <KW c={TL}>variegated leaf</KW> (green + white patches). Destarch, expose to light, test for starch with iodine. <Bold>Only the green parts go blue-black</Bold> (white parts have no chlorophyll, so cannot photosynthesise).</span> },
    { src: "SME", cat: "Investigations", front: "Describe the experiment to show that CO₂ is needed for photosynthesis.", back: <span>Destarch a plant. Enclose one leaf in a flask with <KW c={TL}>soda lime</KW> (absorbs CO₂); enclose another with <KW c={TL}>sodium hydrogencarbonate</KW> (releases CO₂) as a control. Light, then iodine test. <Bold>Only the leaf with CO₂ shows starch.</Bold></span> },
    { src: "SME", cat: "Investigations", front: "How can you test that the gas given off by pondweed is OXYGEN?", back: <span>A <KW c={TL}>glowing splint</KW> placed in a tube of the gas <Bold>relights</Bold> — proving the gas is oxygen.</span> },

    /* — Rate of photosynthesis (29-33) — */
    { src: "SME", cat: "Rate", front: "What apparatus is used to measure the rate of photosynthesis?", back: <span>Submerged <KW c={TL}>pondweed (Cabomba / Elodea)</KW> in a beaker of dilute NaHCO₃. Count <Bold>bubbles of oxygen per minute</Bold> rising from the cut stem (or measure volume of gas collected).</span> },
    { src: "SME", cat: "Rate", front: "How does light intensity affect the rate of photosynthesis?", back: <span>As light intensity increases, the rate of photosynthesis <KW c={TL}>increases</KW>, until another factor (CO₂ or temperature) becomes limiting and the rate <Bold>levels off</Bold>.</span> },
    { src: "SME", cat: "Rate", front: "How does CO₂ concentration affect the rate of photosynthesis?", back: <span>Higher CO₂ = faster rate (when light is available). Atmospheric CO₂ is only <KW c={TL}>0.04%</KW>; raising it (e.g. to 0.1% in greenhouses) significantly increases yields.</span> },
    { src: "SME", cat: "Rate", front: "How does temperature affect the rate of photosynthesis?", back: <span>Optimum is around <KW c={TL}>25-30 °C</KW>. Above this, enzymes start to <KW c={RD}>denature</KW> and rate falls. Below optimum, enzymes have less kinetic energy → fewer collisions → slower rate.</span> },
    { src: "SME", cat: "Rate", front: "What relationship is used to convert lamp-distance into light intensity?", back: <span><KW c={TL}>Inverse-square law: I ∝ 1/D²</KW>. If the lamp is at distance D, the intensity is proportional to 1 divided by D squared.</span> },

    /* — Gas exchange & HC indicator (34-38) — */
    { src: "SME", cat: "Gas exchange", front: "Plants RESPIRE all the time and PHOTOSYNTHESISE only in light. What is the net gas exchange in BRIGHT LIGHT?", back: <span>Photosynthesis &gt; respiration. Net: leaf takes in <KW c={TL}>CO₂</KW> and releases <KW c={TL}>O₂</KW>.</span> },
    { src: "SME", cat: "Gas exchange", front: "What is the net gas exchange of a leaf in DARKNESS?", back: <span>Photosynthesis = zero. Only respiration. Net: leaf takes in <KW c={RD}>O₂</KW> and releases <KW c={RD}>CO₂</KW>.</span> },
    { src: "SME", cat: "Gas exchange", front: "What does hydrogencarbonate (HC) indicator detect, and what is its colour scale?", back: <span>HC indicator detects <KW c={TL}>CO₂ in solution</KW>. Colour scale: <Bold>yellow</Bold> (high CO₂) → orange → <Bold>red</Bold> (atmospheric, 0.04%) → magenta → <Bold>purple</Bold> (low CO₂).</span> },
    { src: "SME", cat: "Gas exchange", front: "In an HC indicator + leaf experiment in LIGHT, what colour does the indicator turn? Why?", back: <span>It turns <KW c={TL}>purple</KW>. Photosynthesis is faster than respiration, so CO₂ is removed from the indicator → it becomes alkaline → purple.</span> },
    { src: "SME", cat: "Gas exchange", front: "In an HC indicator + leaf experiment in DARKNESS, what colour does the indicator turn? Why?", back: <span>It turns <KW c={RD}>yellow</KW>. No photosynthesis (dark). Only respiration releases CO₂ into the indicator → acidic → yellow.</span> },

    /* — Limiting factors (39-42, EXT) — */
    { src: "SME", cat: "Limiting factors", front: "Define the term limiting factor. (EXT)", back: <span>A limiting factor is something present in the environment in such a <KW c={PU}>small amount</KW> that it <Bold>restricts the rate</Bold> of a process — increasing it would make the process go faster, until something else becomes limiting. (Extended Tier)</span> },
    { src: "SME", cat: "Limiting factors", front: "Name the three limiting factors of photosynthesis. (EXT)", back: <span>1. <KW c={PU}>Light intensity</KW><br/>2. <KW c={PU}>Carbon dioxide concentration</KW><br/>3. <KW c={PU}>Temperature</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "Limiting factors", front: "Why isn't water normally listed as a limiting factor of photosynthesis? (EXT)", back: <span>Because long before water levels would limit photosynthesis, the plant <KW c={PU}>wilts</KW> and <Bold>stomata close</Bold> — so it's lack of CO₂ (not water itself) that stops the reaction. (Extended Tier)</span> },
    { src: "SME", cat: "Limiting factors", front: "Why does a graph of rate vs light intensity LEVEL OFF at high intensity? (EXT)", back: <span>Because light is no longer the limiting factor — another factor (CO₂ concentration or temperature) has taken over as the new <KW c={PU}>limiting factor</KW>. (Extended Tier)</span> },

    /* — Leaf adaptations (43-47) — */
    { src: "SME", cat: "Leaf structure", front: "Why are leaves broad and flat?", back: <span>Provides a <KW c={TL}>large surface area</KW> for absorbing light and a short diffusion distance for gases.</span> },
    { src: "SME", cat: "Leaf structure", front: "Where in the leaf does most photosynthesis occur, and why?", back: <span>In the <KW c={TL}>palisade mesophyll layer</KW> — tall column cells packed with chloroplasts, located near the upper surface to capture the most light.</span> },
    { src: "SME", cat: "Leaf structure", front: "What is the function of the spongy mesophyll?", back: <span>Loosely packed cells with <KW c={TL}>large air spaces</KW> for fast diffusion of <Bold>CO₂ in</Bold> and <Bold>O₂ + water vapour out</Bold>.</span> },
    { src: "SME", cat: "Leaf structure", front: "What is the function of the stomata in a leaf?", back: <span>Pores in the lower epidermis that allow <KW c={TL}>gas exchange</KW>: CO₂ in for photosynthesis, O₂ out, and water vapour out (transpiration). Controlled by <Bold>guard cells</Bold>.</span> },
    { src: "SME", cat: "Leaf structure", front: "What carries water and minerals to the leaf, and what carries sucrose away?", back: <span><KW c={TL}>Xylem</KW> brings water + minerals up from roots. <KW c={TL}>Phloem</KW> takes sucrose away to other parts of the plant (translocation).</span> },

    /* — Additional SME cards from official flashcard PDF (definitions / equation extras) — */
    { src: "SME", cat: "Definition", front: "True or False? Photosynthesis can only occur when both light and chlorophyll are present.", back: <span><KW c={TL}>True.</KW> Both <Bold>light energy</Bold> (to drive the reaction) and <Bold>chlorophyll</Bold> (to capture that light) are required. Remove either one and photosynthesis stops.</span> },
    { src: "SME", cat: "Definition", front: "Which product of photosynthesis is the waste product of the reaction?", back: <span><KW c={TL}>Oxygen</KW> — released through the stomata. The plant uses some for its own respiration; the rest diffuses out.</span> },

    /* — Investigations: apparatus-specific extras — */
    { src: "SME", cat: "Investigations", front: "A destarched leaf is wrapped in foil for 24 hours, then tested with iodine. What colour does it go?", back: <span>It stays <KW c={RD}>orange/yellow-brown</KW> — it does <Bold>not</Bold> turn blue-black. The foil blocked light, so no photosynthesis happened, so no new starch was made.</span> },
    { src: "SME", cat: "Investigations", front: "Give one variable that should be kept constant when testing whether CO₂ is needed for photosynthesis.", back: <span>Any <Bold>one</Bold> of:<br/>• <KW c={TL}>Light intensity</KW> (or whether the leaf is in light)<br/>• Presence of <KW c={TL}>chlorophyll</KW><br/>• Room <KW c={TL}>temperature</KW>.</span> },
    { src: "SME", cat: "Investigations", front: "What is the purpose of placing a beaker of sodium hydroxide (NaOH) inside a sealed bell jar with a plant?", back: <span>NaOH <KW c={TL}>absorbs CO₂</KW> from the air inside the bell jar. With no CO₂ available, the plant cannot photosynthesise — proving CO₂ is needed for the reaction.</span> },
    { src: "SME", cat: "Investigations", front: "After a 'light is needed' experiment, what colour are the foil-covered regions of the leaf when iodine is added?", back: <span>They remain <KW c={RD}>orange-brown</KW> — no starch is present because those areas received no light, so no photosynthesis occurred.</span> },

    /* — Rate of photosynthesis: apparatus-based extras — */
    { src: "SME", cat: "Rate", front: "In the lamp + pondweed apparatus, what is the dependent variable?", back: <span>The <KW c={TL}>rate of photosynthesis</KW>, measured as the <Bold>volume of oxygen produced</Bold> in a fixed time period (or bubbles per minute).</span> },
    { src: "SME", cat: "Rate", front: "Give two control variables for the lamp + pondweed photosynthesis apparatus.", back: <span>Any TWO of:<br/>• <KW c={TL}>Temperature</KW> of the water (use a heat shield/water bath)<br/>• Same <KW c={TL}>species, length and age</KW> of pondweed in each repeat<br/>• Add <KW c={TL}>NaHCO₃</KW> to the water to keep CO₂ supply constant.</span> },
    { src: "SME", cat: "Rate", front: "When investigating the effect of TEMPERATURE on photosynthesis, why must light intensity be kept constant?", back: <span>Because light intensity also affects the rate (the <Bold>dependent variable</Bold>). If it varied, you couldn't tell whether a change in rate was due to temperature or to light — the experiment would be invalid.</span> },
    { src: "SME", cat: "Rate", front: "Predict how the rate of photosynthesis will change as CO₂ concentration is increased.", back: <span>The rate will <KW c={TL}>increase</KW> with increasing CO₂, until <Bold>another factor</Bold> (light intensity or temperature) becomes limiting. After that point the rate <Bold>levels off</Bold>.</span> },
    { src: "SME", cat: "Rate", front: "Why does bubble count from pondweed decrease as the lamp is moved further away?", back: <span>Greater distance → <KW c={TL}>lower light intensity</KW> reaching the pondweed → <Bold>slower rate of photosynthesis</Bold> → less oxygen produced per minute. (Inverse-square law: I ∝ 1/D².)</span> },
    { src: "SME", cat: "Rate", front: "What two pieces of information do you need to calculate a rate of photosynthesis from a gas-collection experiment?", back: <span>1. <KW c={TL}>Volume of gas</KW> (oxygen) collected.<br/>2. <KW c={TL}>Time period</KW> over which it was collected.<br/>Rate = volume ÷ time.</span> },

    /* — Gas exchange extras — */
    { src: "SME", cat: "Gas exchange", front: "Why do plants take in oxygen from the atmosphere?", back: <span>To carry out <KW c={TL}>aerobic respiration</KW> in their cells (just like animals do). Plants respire <Bold>24 hours a day</Bold>, even while photosynthesising.</span> },
    { src: "SME", cat: "Gas exchange", front: "True or False? In darkness, a plant has a net intake of carbon dioxide.", back: <span><KW c={RD}>False.</KW> In darkness there is no photosynthesis, only respiration. So the plant has a net intake of <Bold>oxygen</Bold> and a net release of <Bold>CO₂</Bold>.</span> },
    { src: "SME", cat: "Gas exchange", front: "True or False? CO₂ behaves as an acidic gas when dissolved in water.", back: <span><KW c={TL}>True.</KW> CO₂ + H₂O ⇌ H₂CO₃ (carbonic acid). This is why hydrogencarbonate indicator turns yellow (acidic) when CO₂ is high.</span> },

    /* — Limiting factors graph interpretation (EXT) — */
    { src: "SME", cat: "Limiting factors", front: "On a CO₂ vs rate-of-photosynthesis graph, what does it mean if the curve has levelled off at high CO₂? (EXT)", back: <span>CO₂ is no longer the <KW c={PU}>limiting factor</KW>. Some <Bold>other factor</Bold> — light intensity or temperature — has become the bottleneck and is now limiting the rate. (Extended Tier)</span> },

    /* — Leaf structure: labelling & comparison extras — */
    { src: "SME", cat: "Leaf structure", front: "On a leaf cross-section, a small pore in the lower epidermis flanked by two guard cells is labelled. What is it?", back: <span>A <KW c={TL}>stoma</KW> (plural: <Bold>stomata</Bold>), also called a <Bold>stomatal pore</Bold>. It opens and closes for gas exchange.</span> },
    { src: "SME", cat: "Leaf structure", front: "On a leaf cross-section, the thin waterproof layer above the upper epidermis is labelled. What is it?", back: <span>The <KW c={TL}>waxy cuticle</KW> — secreted by the upper epidermis. Transparent (lets light through) and waterproof (reduces water loss).</span> },
    { src: "SME", cat: "Leaf structure", front: "On a leaf cross-section, by what features can you identify a palisade cell?", back: <span>It is <KW c={TL}>tall and column-shaped</KW>, packed with <KW c={TL}>many chloroplasts</KW>, and arranged in a closely-packed layer just under the upper epidermis.</span> },
    { src: "SME", cat: "Leaf structure", front: "Which two transport tissues are found inside the vascular bundle of a leaf?", back: <span><KW c={TL}>Xylem</KW> (carries water + dissolved minerals from roots to leaves) and <KW c={TL}>Phloem</KW> (carries sucrose + amino acids away from leaves to the rest of the plant).</span> },
    { src: "SME", cat: "Leaf structure", front: "On a leaf cross-section, the single layer of flat cells immediately below the waxy cuticle is labelled. What is it?", back: <span>The <KW c={TL}>upper epidermis</KW> — a single layer of cells (no chloroplasts) that secretes the waxy cuticle and protects the inner tissues while letting light through.</span> },
    { src: "SME", cat: "Leaf structure", front: "Why is it beneficial for a leaf to be both broad AND thin in cross-section?", back: <span><Bold>Broad</Bold> = large <KW c={TL}>surface area</KW> for light absorption.<br/><Bold>Thin</Bold> = short <KW c={TL}>diffusion distance</KW> for CO₂ in and O₂ out, so gas exchange is fast.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       NLCS SUPPLEMENTARY — Hodder-specific content
       ═══════════════════════════════════════════════════════════════════════ */
    /* — Glucose chemistry & extra fates — */
    { src: "Suppl", cat: "Glucose uses", front: "Some plants produce a sugary liquid that attracts pollinators. What is it called?", back: <span><KW c={TL}>Nectar</KW> — a sugary solution made from glucose, secreted by special glands in flowers to attract pollinating insects (e.g. bees).</span> },
    { src: "Suppl", cat: "Glucose uses", front: "How is glucose converted to sucrose, and why is sucrose useful for transport?", back: <span>Two glucose units are joined → sucrose. Sucrose is a <KW c={TL}>disaccharide</KW> and is also <KW c={TL}>soluble</KW>, so it dissolves in the phloem sap and can be moved long distances.</span> },
    { src: "Suppl", cat: "Glucose uses", front: "What is translocation?", back: <span>The movement of <KW c={TL}>sucrose</KW> (and amino acids) through the <Bold>phloem</Bold> from where it's made (leaves = source) to where it's used or stored (sinks: roots, fruits, growing tips).</span> },

    /* — Mineral ions Hodder extras — */
    { src: "Suppl", cat: "Mineral ions", front: "What is NPK fertiliser?", back: <span>A balanced fertiliser containing <KW c={TL}>Nitrogen</KW>, <KW c={TL}>Phosphorus</KW>, and <KW c={TL}>Potassium</KW> — the three minerals taken up most heavily by crops. Replaces ions removed by harvesting.</span> },
    { src: "Suppl", cat: "Mineral ions", front: "What is hydroponics?", back: <span>Growing plants <KW c={TL}>without soil</KW> — roots dip into a recirculating nutrient solution containing all needed mineral ions. Used commercially for tomatoes, lettuces, herbs in greenhouses.</span> },
    { src: "Suppl", cat: "Mineral ions", front: "Name 4 salts used in a typical water-culture solution.", back: <span><KW c={TL}>KNO₃</KW> (K + nitrate)<br/><KW c={TL}>MgSO₄</KW> (Mg)<br/><KW c={TL}>KH₂PO₄</KW> (phosphate)<br/><KW c={TL}>Ca(NO₃)₂</KW> (calcium nitrate). Plus iron and trace elements.</span> },
    { src: "Suppl", cat: "Mineral ions", front: "Name 3 mineral ions besides nitrate &amp; magnesium that plants need (background).", back: <span><Bold>Phosphate</Bold> (PO₄³⁻) — for DNA, ATP, phospholipids.<br/><Bold>Potassium</Bold> (K⁺) — guard cell function, enzyme activation.<br/><Bold>Calcium</Bold> (Ca²⁺) — middle lamella between cell walls.</span> },

    /* — Practical Hodder extras — */
    { src: "Suppl", cat: "Investigations", front: "What is the purpose of using a CONTROL flask in the CO₂ experiment?", back: <span>To prove that the difference is due to the variable being tested (CO₂ presence/absence), <Bold>not</Bold> to other factors. The leaf with NaHCO₃ (CO₂ available) is the control showing that everything else is set up correctly.</span> },
    { src: "Suppl", cat: "Investigations", front: "What pondweed species is commonly used in school photosynthesis experiments?", back: <span><KW c={TL}>Cabomba</KW> (or <KW c={TL}>Elodea</KW> — the older name often still used in textbooks). Bubbles of oxygen are easy to count from a cut stem.</span> },
    { src: "Suppl", cat: "Investigations", front: "Why is sodium hydrogencarbonate (NaHCO₃) added to the water in the pondweed experiment?", back: <span>It dissolves to release <KW c={TL}>CO₂</KW>, ensuring CO₂ is plentiful so it does not become a <Bold>limiting factor</Bold>. This way, the experiment isolates the effect of light or temperature only.</span> },
    { src: "Suppl", cat: "Investigations", front: "Apart from counting bubbles, name a more reliable way to measure photosynthesis rate.", back: <span>Collect the gas in an <KW c={TL}>inverted measuring cylinder</KW> (or use a gas syringe / capillary-tube manometer). Measuring volume of O₂ per minute is more accurate than counting bubbles, which can vary in size.</span> },

    /* — Stomata mechanism EXT (Hodder) — */
    { src: "Suppl", cat: "Leaf structure", front: "Explain how a stoma OPENS in light. (EXT)", back: <span>1. In light, guard cells actively pump in <KW c={PU}>K⁺ ions</KW>.<br/>2. This lowers their water potential, so water enters by <KW c={PU}>osmosis</KW>.<br/>3. Guard cells become <Bold>turgid</Bold>.<br/>4. The <KW c={PU}>inner wall is thicker</KW> than the outer wall, so as the cell swells it curves outwards.<br/>5. The pore opens. (Extended Tier)</span> },
    { src: "Suppl", cat: "Leaf structure", front: "When does a stoma close, and why? (EXT)", back: <span>Closes in <Bold>darkness</Bold> (no photosynthesis needed) and during <Bold>drought</Bold> (to conserve water). K⁺ ions leave the guard cells → water leaves by osmosis → cells become <KW c={PU}>flaccid</KW> → pore closes. (Extended Tier)</span> },

    /* — Leaf structure Hodder extras — */
    { src: "Suppl", cat: "Leaf structure", front: "Compare PALISADE mesophyll with SPONGY mesophyll.", back: <span><Bold>Palisade:</Bold> upper, tall column cells, MANY chloroplasts, closely packed → main photosynthesis.<br/><Bold>Spongy:</Bold> lower, irregular cells, FEWER chloroplasts, large air spaces → gas exchange.</span> },
    { src: "Suppl", cat: "Leaf structure", front: "What is the cuticle, and why is it important?", back: <span>A waxy waterproof layer on the upper leaf surface, secreted by the upper epidermis. It is <KW c={TL}>transparent</KW> (lets light through), <Bold>waterproof</Bold> (reduces water loss), and impermeable to gases (so CO₂ enters mainly through stomata below).</span> },
    { src: "Suppl", cat: "Leaf structure", front: "Where in a leaf are the stomata, and why?", back: <span>Mostly on the <KW c={TL}>lower epidermis</KW>. Being on the underside means they are <Bold>shaded</Bold> and cooler, reducing water loss. The waxy cuticle on the top is therefore continuous and waterproof.</span> },
    { src: "Suppl", cat: "Leaf structure", front: "Why are xylem cells described as 'lignified', and what does that mean?", back: <span>Xylem walls are reinforced with <KW c={TL}>lignin</KW> — a tough, waterproof substance. This gives the xylem the <Bold>strength</Bold> to resist collapse as water is pulled up through it under tension. Xylem cells are also <Bold>dead and hollow</Bold> for unobstructed flow.</span> },

    /* — Limiting factors Hodder examples (EXT) — */
    { src: "Suppl", cat: "Limiting factors", front: "Give a real-world greenhouse example of controlling limiting factors. (EXT)", back: <span><KW c={PU}>Seychelles tomatoes</KW>: by controlling <Bold>light, CO₂ (≈ 0.1%) and temperature</Bold> in greenhouses, growers raised yields from <Bold>2.9 → 6.5 kg/m²</Bold> — more than double. (Extended Tier)</span> },
    { src: "Suppl", cat: "Limiting factors", front: "Why might CO₂ be the LIMITING FACTOR on a sunny summer day? (EXT)", back: <span>Because atmospheric CO₂ is only <KW c={PU}>0.04%</KW>. With plenty of light and warm temperature, photosynthesis is rapid, so CO₂ is used up faster than it can diffuse in — it becomes the bottleneck. (Extended Tier)</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams official card" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = official Save My Exams card · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary card for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended Tier"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
