<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;

    -webkit-text-size-adjust: 100%;

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .loader { position: fixed; inset: 0; background: #fafaf7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 100; transition: opacity 0.3s; }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-spinner { width: 36px; height: 36px; border: 3px solid #d8f3dc; border-top-color: #2d6a4f; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loader-text { font-size: 13px; color: #888; letter-spacing: 0.5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid #e4e4e0;
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }

  /* ═══════════════════════════════════════════════════════════════════════
     CHAPTER TITLE — punchy black on light, neon green on dark
     ═══════════════════════════════════════════════════════════════════════ */
  .chapter-title {
    display: inline-block;
    font-size: 26px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.5px;
    color: #1f4d36;
    -webkit-text-stroke: 0.3px #1f4d36;
  }
  html.dark .chapter-title {
    color: #b6ff3c;
    -webkit-text-stroke: 0.3px #b6ff3c;
    text-shadow:
      0 0 6px rgba(182, 255, 60, 0.85),
      0 0 14px rgba(182, 255, 60, 0.55),
      0 0 28px rgba(182, 255, 60, 0.35);
  }
  .chapter-kicker {
    font-size: 11px;
    color: #888;
    letter-spacing: 1.2px;
    margin-bottom: 6px;
    font-weight: 700;
  }
  html.dark .chapter-kicker {
    color: #b6ff3c;
    text-shadow: 0 0 8px rgba(182, 255, 60, 0.5);
  }
  .chapter-subtitle {
    font-size: 13px;
    color: #555;
    margin-top: 8px;
    font-weight: 500;
  }
  html.dark .chapter-subtitle { color: #b8b8b8; }

  /* ═══════════════════════════════════════════════════════════════════════
     DARK MODE
     ═══════════════════════════════════════════════════════════════════════ */
  html.dark { background: #1a1a1a; }
  html.dark body { background: #1a1a1a; color: #e8e8e8; }
  html.dark .loader { background: #1a1a1a; }

  html.dark .theme-toggle .icon-sun { display: block; }
  html.dark .theme-toggle .icon-moon { display: none; }

  /* ─── Pure white & off-white backgrounds → dark ─── */
  html.dark #root [style*="background: rgb(255, 255, 255)"],

  html.dark #root [style*="#fdf0f0"] { background: #2a1a1a !important; color: #e8e8e8 !important; }
  /* AL #fff3e0 - light amber */

  html.dark #root [style*="#fff3e0"] { background: #2a200f !important; color: #e8e8e8 !important; }
  /* PL #ede9fe - light purple */

  html.dark #root [style*="#ede9fe"] { background: #1f1c2e !important; color: #e8e8e8 !important; }
  /* GL #d8f3dc - light green */

  /* TLL #e6f4f2 - light teal */

  html.dark #root [style*="#e8f7ec"] { background: #182a1e !important; color: #e8e8e8 !important; }

  /* Default text */

  /* Grey text → light */

  html.dark #root [style*="color:#888"],
  html.dark #root [style*="color: #888"] { color: #999 !important; }

  html.dark #root [style*="color:#999"],
  html.dark #root [style*="color: #999"] { color: #888 !important; }

  /* Border default */
  html.dark #root [style*="rgb(228, 228, 224)"],
  html.dark #root [style*="#e4e4e0"] { border-color: #3a3a3a !important; }

  /* Dark text on colored backgrounds (exam card question text "#2a0000") → light */

  html.dark #root [style*="#2a0000"] { color: #f0d4d4 !important; }
  /* Dark amber text on AL background */
  html.dark #root [style*="rgb(42, 16, 0)"],
  html.dark #root [style*="#2a1000"] { color: #f0d8b5 !important; }
  /* Highlighted dark red */
  html.dark #root [style*="rgb(58, 0, 0)"],
  html.dark #root [style*="#3a0000"] { color: #f0c8c8 !important; }

  /* SVG diagrams: keep white card */
  html.dark #root svg[viewBox] {
    background: #fff;
    border-radius: 8px;
    padding: 4px;
  }

  html.dark ::-webkit-scrollbar-thumb { background: #444; }

  html.dark #root strong[style*="color: rgb(61, 61, 61)"],
  html.dark #root strong[style*="#3d3d3d"] { color: #f0f0f0 !important; }

  /* ═══════════════════════════════════════════════════════════════════════
     TAB COLORS — vibrant neon for the 5 main tab buttons
     ═══════════════════════════════════════════════════════════════════════ */
  /* Tab text color (when not active) */
  html.dark #root button[style*="color: rgb(181, 84, 10)"],
  html.dark #root button[style*="color:#b5540a"],
  html.dark #root button[style*="color: #b5540a"] { color: #ffa726 !important; }
  html.dark #root button[style*="color: rgb(176, 32, 32)"],
  html.dark #root button[style*="color:#b02020"],
  html.dark #root button[style*="color: #b02020"] { color: #ff6b6b !important; }
  html.dark #root button[style*="color: rgb(91, 63, 166)"],
  html.dark #root button[style*="color:#5b3fa6"],
  html.dark #root button[style*="color: #5b3fa6"] { color: #a78bfa !important; }
  html.dark #root button[style*="color: rgb(45, 106, 79)"],
  html.dark #root button[style*="color:#2d6a4f"],
  html.dark #root button[style*="color: #2d6a4f"] { color: #5dcaa5 !important; }
  html.dark #root button[style*="color: rgb(26, 122, 110)"],
  html.dark #root button[style*="color:#1a7a6e"],
  html.dark #root button[style*="color: #1a7a6e"] { color: #5eead4 !important; }

  /* Tab active background */
  html.dark #root button[style*="background: rgb(181, 84, 10)"] { background-color: #ffa726 !important; border-color: #ffa726 !important; }
  html.dark #root button[style*="background: rgb(176, 32, 32)"] { background-color: #ff6b6b !important; border-color: #ff6b6b !important; }
  html.dark #root button[style*="background: rgb(91, 63, 166)"] { background-color: #a78bfa !important; border-color: #a78bfa !important; }
  html.dark #root button[style*="background: rgb(45, 106, 79)"] { background-color: #5dcaa5 !important; border-color: #5dcaa5 !important; }
  html.dark #root button[style*="background: rgb(26, 122, 110)"] { background-color: #5eead4 !important; border-color: #5eead4 !important; }

  html.dark #root button[style*="background: rgb(176, 32, 32)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(91, 63, 166)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(45, 106, 79)"][style*="color: rgb(255, 255, 255)"],

  html.dark #root button[style*="2px solid rgb(91, 63, 166)"] { border-color: #a78bfa !important; }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 6,
  title: "Plant Nutrition",
  subtitle: "Photosynthesis · Chlorophyll · Mineral ions · Leaf structure · Limiting factors · Practical work",
  flashcardCount: 88,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.6 Plant Nutrition
// ════════════════════════════════════════════════════════════════════════════

// ── Photosynthesis word equation diagram ───────────────────────────────────
function PhotosynthesisWordEquation() {
  return (
    <svg viewBox="0 0 700 180" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="180" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={G}>
        Word equation for photosynthesis
      </text>

      {/* Reactants */}
      <rect x="30" y="65" width="120" height="50" rx="6" fill="#e6f0ff" stroke={PU} strokeWidth="1.5"/>
      <text x="90" y="88" textAnchor="middle" fontSize="11" fontWeight="700" fill={PU}>carbon</text>
      <text x="90" y="104" textAnchor="middle" fontSize="11" fontWeight="700" fill={PU}>dioxide</text>
      <text x="160" y="95" textAnchor="middle" fontSize="20" fontWeight="700" fill={GR}>+</text>
      <rect x="180" y="65" width="100" height="50" rx="6" fill="#e6f0ff" stroke={PU} strokeWidth="1.5"/>
      <text x="230" y="95" textAnchor="middle" fontSize="11" fontWeight="700" fill={PU}>water</text>

      {/* Arrow with light + chlorophyll labels */}
      <text x="370" y="60" textAnchor="middle" fontSize="11" fontWeight="700" fill={AM}>LIGHT energy</text>
      <line x1="305" y1="90" x2="430" y2="90" stroke={G} strokeWidth="2.5" markerEnd="url(#arrPh)"/>
      <text x="370" y="113" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>CHLOROPHYLL</text>

      {/* Products */}
      <rect x="450" y="65" width="100" height="50" rx="6" fill={GL} stroke={G} strokeWidth="1.5"/>
      <text x="500" y="95" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>glucose</text>
      <text x="560" y="95" textAnchor="middle" fontSize="20" fontWeight="700" fill={GR}>+</text>
      <rect x="580" y="65" width="100" height="50" rx="6" fill={GL} stroke={G} strokeWidth="1.5"/>
      <text x="630" y="95" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>oxygen</text>

      {/* Labels */}
      <text x="180" y="145" textAnchor="middle" fontSize="10" fontWeight="600" fill={PU}>raw materials (reactants)</text>
      <text x="515" y="145" textAnchor="middle" fontSize="10" fontWeight="600" fill={G}>products</text>
      <text x="370" y="160" textAnchor="middle" fontSize="9.5" fill="#777" fontStyle="italic">(light energy is NOT a raw material — it is energy, not a substance)</text>

      <defs>
        <marker id="arrPh" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill={G}/>
        </marker>
      </defs>
    </svg>
  );
}

// ── Balanced chemical equation (Extended) ───────────────────────────────────
function PhotosynthesisChemicalEquation() {
  return (
    <svg viewBox="0 0 700 160" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="160" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={PU}>
        Balanced chemical equation (Extended Tier)
      </text>
      <rect x="540" y="6" width="40" height="18" rx="3" fill={PU}/>
      <text x="560" y="19" textAnchor="middle" fontSize="10" fontWeight="700" fill="#fff">EXT</text>

      {/* Reactants */}
      <text x="80" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={PU}>6 CO₂</text>
      <text x="160" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={GR}>+</text>
      <text x="240" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={PU}>6 H₂O</text>

      {/* Arrow */}
      <text x="370" y="68" textAnchor="middle" fontSize="11" fontWeight="700" fill={AM}>light energy</text>
      <line x1="290" y1="85" x2="450" y2="85" stroke={G} strokeWidth="2.5" markerEnd="url(#arrPhE)"/>
      <text x="370" y="108" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>chlorophyll</text>

      {/* Products */}
      <text x="500" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={G}>C₆H₁₂O₆</text>
      <text x="595" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={GR}>+</text>
      <text x="650" y="90" textAnchor="middle" fontSize="22" fontWeight="700" fill={G}>6 O₂</text>

      <text x="350" y="140" textAnchor="middle" fontSize="11" fill="#666" fontStyle="italic">
        Atoms balance: 6 C — 6 C  ·  18 O — 6 + 12 = 18 O  ·  12 H — 12 H  ✓

      <defs>
        <marker id="arrPhE" markerWidth="10" markerHeight="10" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill={G}/>

      </defs>
    </svg>
  );
}

// ── Leaf cross-section diagram ──────────────────────────────────────────────
function LeafCrossSection() {
  return (
    <svg viewBox="0 0 720 420" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="420" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Cross-section through a dicotyledonous leaf
      </text>

      {/* Cuticle (waxy, top) */}
      <rect x="80" y="50" width="560" height="10" fill="#fff2c4" stroke="#c9a430" strokeWidth="1"/>
      <line x1="100" y1="60" x2="100" y2="65" stroke="#c9a430"/>
      <line x1="180" y1="60" x2="180" y2="65" stroke="#c9a430"/>
      <line x1="260" y1="60" x2="260" y2="65" stroke="#c9a430"/>

// ── CO₂ pathway in leaf ─────────────────────────────────────────────────────
function CO2PathwayDiagram() {
  return (

        How a CO₂ molecule reaches a chloroplast (diffusion pathway)
      </text>

      {/* Pathway: atmosphere → stoma → air space → mesophyll cell → chloroplast */}
      {/* Atmosphere */}
      <rect x="30" y="60" width="120" height="50" rx="6" fill="#cce6ff" stroke="#3366cc" strokeWidth="1.5"/>
      <text x="90" y="80" textAnchor="middle" fontSize="11" fontWeight="700" fill="#1a4d8a">① ATMOSPHERE</text>

      <rect x="200" y="60" width="120" height="50" rx="6" fill={GL} stroke={G} strokeWidth="1.5"/>
      <text x="260" y="80" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>② STOMA (open)</text>
      <text x="260" y="96" textAnchor="middle" fontSize="9" fill={GR}>between guard cells</text>
      <text x="260" y="106" textAnchor="middle" fontSize="9" fill={GR}>in lower epidermis</text>

      <line x1="325" y1="85" x2="365" y2="85" stroke={G} strokeWidth="2" markerEnd="url(#arrCO)"/>

      {/* Air space */}
      <rect x="370" y="60" width="120" height="50" rx="6" fill="#f0f0f0" stroke={GR} strokeWidth="1.5"/>
      <text x="430" y="80" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>③ AIR SPACE</text>
      <text x="430" y="96" textAnchor="middle" fontSize="9" fill={GR}>between spongy</text>
      <text x="430" y="106" textAnchor="middle" fontSize="9" fill={GR}>mesophyll cells</text>

      <text x="605" y="192" textAnchor="middle" fontSize="9" fill="#fff">CO₂ + H₂O → glucose + O₂</text>

      {/* Concentration gradient bar */}
      <text x="350" y="240" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>
        DIFFUSION GRADIENT — CO₂ moves from high to low concentration
      </text>
      <defs>
        <linearGradient id="gradCO" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stopColor="#3366cc"/>
          <stop offset="100%" stopColor={G}/>
        </linearGradient>
        <marker id="arrCO" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 9 3, 0 6" fill={G}/>
        </marker>
      </defs>
      <rect x="60" y="248" width="580" height="20" rx="4" fill="url(#gradCO)" opacity="0.8"/>

      <text x="600" y="263" textAnchor="end" fontSize="10" fontWeight="700" fill="#fff">LOW CO₂ (used up by photo)</text>

      {/* Bottom note */}
      <rect x="40" y="280" width="640" height="30" rx="4" fill={GL} stroke={G} strokeWidth="0.5"/>
      <text x="60" y="295" fontSize="10" fontWeight="700" fill={G}>WHY THIS WORKS:</text>
      <text x="60" y="307" fontSize="10" fill={GR}>
        Photosynthesis uses CO₂ in the chloroplast → keeps internal [CO₂] low → maintains the gradient → CO₂ keeps diffusing in.
      </text>
    </svg>
  );
}

    {
      id: "h_wx1", diff: "medium", topic: "practical", marks: 6, star: "★★★", src: "Hodder",
      type: "calc",
      q: "WORKED EXAMPLE (Hodder p.97)\nA student investigated the rate of photosynthesis in pondweed at different lamp distances. Results (bubbles per minute):\n\n  distance / cm | run 1 | run 2 | run 3\n      10       |  38   |  40   |  39\n      20       |  15   |  17   |  26\n      30       |   6   |   8   |   7\n      40       |   3   |   3   |   3\n      50       |   2   |   3   |   2\n\n(a) Identify the ANOMALOUS result and explain how to handle it. [2]\n(b) Calculate the mean number of bubbles/min for each distance, treating the anomaly correctly. [3]\n(c) State which distance gives the highest rate and briefly explain why. [1]",
      hint: "Look for one value that doesn't follow the trend in its row.",
      a: "(a) ANOMALY = the value 26 (run 3, distance 20 cm). [1]\n• It is much higher than the other two values for that distance (15 and 17), and breaks the smooth decreasing trend.\n• Action: EXCLUDE the anomaly from the mean. Use only run 1 and run 2 for distance 20 cm. [1]\n\n(b) MEANS [3 — 1 method, 2 values]:\n  10 cm → (38 + 40 + 39) ÷ 3 = 117 ÷ 3 = 39 bubbles/min\n  20 cm → (15 + 17) ÷ 2 = 32 ÷ 2 = 16 bubbles/min  ← only 2 sets of data\n  30 cm → (6 + 8 + 7) ÷ 3 = 21 ÷ 3 = 7 bubbles/min\n  40 cm → (3 + 3 + 3) ÷ 3 = 9 ÷ 3 = 3 bubbles/min\n  50 cm → (2 + 3 + 2) ÷ 3 = 7 ÷ 3 = 2.33 bubbles/min\n\n(c) Highest rate at 10 cm (39 bubbles/min). [1]\n• At 10 cm the lamp is closest → highest light intensity (rate ∝ 1/D²) → fastest rate of photosynthesis."
    },

                    );
                  })()}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

        </div>
        <PhotosynthesisWordEquation />
        <PhotosynthesisChemicalEquation />
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> chlorophyll's role is to <KW c={TL}>transfer the energy from light into chemical bonds</KW> in the glucose. Chlorophyll itself is NOT used up — it acts as an energy converter only. Use the verb "synthesise" in your definition for full marks.

        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>

        </div>
        <GlucoseFateDiagram />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Respiration</Bold> — broken down to release energy (ATP) for the cell.</li>
            <li><Bold>Sucrose</Bold> — soluble transport sugar, moved through the <KW>phloem</KW> (translocation) to other parts of the plant.</li>
            <li><Bold>Starch</Bold> — <KW c={PU}>insoluble</KW> storage carbohydrate, stored in leaves &amp; storage organs (potato tuber). Insoluble means <KW c={TL}>no osmotic effect</KW> on the cell.</li>
            <li><Bold>Cellulose</Bold> — built into <KW>cell walls</KW> for structural support.</li>
            <li><Bold>Fats &amp; oils</Bold> — energy-rich storage in seeds (sunflower, peanut, oilseed rape).</li>
            <li><Bold>Amino acids → proteins</Bold> — glucose + <KW c={PU}>nitrate ions</KW> from the soil are combined to make amino acids; amino acids are joined to make proteins.</li>
          </ul>
        </div>
        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> Why is starch — not glucose — used for storage? Because starch is <KW c={TL}>insoluble</KW>. Storing soluble glucose would lower the cell's water potential and make water rush in by osmosis (cells could burst). Insoluble starch has <Bold>no osmotic effect</Bold>.

      <Sec id="s3" title="③ Mineral Ions — Nitrate &amp; Magnesium">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>

        </div>

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>

                <th style={{ padding: "6px 8px", textAlign: "left" }}>Ion</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Used to make</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Deficiency symptom</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{ background: "#fff" }}>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Nitrate (NO₃⁻)</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>amino acids → <Bold>proteins</Bold></td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}><KW c={RD}>Stunted growth</KW> + yellowing of <Bold>older (lower)</Bold> leaves</td>
              </tr>
              <tr style={{ background: PL }}>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: 700, color: PU }}>Magnesium (Mg²⁺)</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}><Bold>chlorophyll</Bold></td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}><KW c={RD}>Chlorosis</KW> — yellowing <Bold>between veins</Bold></td>
              </tr>
            </tbody>
          </table>
        </div>

        <MineralDeficiencyDiagram />

        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Going further — water cultures &amp; hydroponics:</Bold> we know which ions are essential because researchers grow plants in solutions of pure salts (KNO₃, MgSO₄, K phosphate, Ca nitrate) and remove ions one at a time to see what happens. Modern <KW>hydroponics</KW> uses this principle commercially. Farmers add <KW>NPK fertiliser</KW> (Nitrogen, Phosphorus, Potassium) to replace ions taken up by crops.
        </div>
      </Sec>

      <Sec id="s4" title="④ Leaf Structure — Built for Photosynthesis">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          A leaf is an organ specialised to capture light and exchange gases. Each tissue has an <KW c={PU}>adaptation</KW> linked to a function:
        </div>
        <LeafCrossSection />
        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10.5, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Part</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Adaptation → Function</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Cuticle (waxy)", "Waterproof + transparent → reduces water loss; lets light through"],
                ["Upper epidermis", "Thin + transparent → maximum light passes to palisade layer"],
                ["Palisade mesophyll", "Tall column cells, MANY chloroplasts, packed near top → captures most light → main site of photosynthesis"],
                ["Spongy mesophyll", "Loose with AIR SPACES → fast diffusion of CO₂ in / O₂ out"],
                ["Vascular bundle (xylem + phloem)", "Xylem (lignin, dead) brings water; phloem carries away sucrose"],
                ["Lower epidermis + stomata", "Pores controlled by GUARD CELLS → CO₂ in, O₂ out, water vapour out"],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? PL : "#fff" }}>
                  {row.map((c, j) => (

          <Bold>Stomata mechanism (EXT):</Bold> in light, K⁺ ions move INTO the guard cells. Water follows by <KW c={PU}>osmosis</KW> → guard cells become <KW>turgid</KW>. The inner wall is <Bold>thicker</Bold> than the outer wall, so the cell curves outwards → stoma opens. In darkness, K⁺ leaves → cells become flaccid → pore closes.
        </div>
      </Sec>

      <Sec id="s5" title="⑤ Gas Exchange — Day vs Night">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Plants <Bold>respire all the time</Bold> (they need ATP day and night). They photosynthesise <Bold>only in light</Bold>. The net direction of gas flow depends on the relative rates:
        </div>

        <div style={{ marginTop: 8, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Condition</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Photosynthesis</th>

            <tbody>

                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>FAST</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>slow</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Net <KW c={TL}>CO₂ in</KW>, <KW c={TL}>O₂ out</KW></td>
              </tr>
              <tr style={{ background: PL }}>
                <td style={{ padding: "6px 8px", fontWeight: 700, color: PU, borderBottom: `1px solid ${BD}` }}>Compensation point</td>

                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>= Photosynthesis</td>

              <tr style={{ background: "#fff" }}>
                <td style={{ padding: "6px 8px", fontWeight: 700, color: PU, borderBottom: `1px solid ${BD}` }}>Darkness</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>ZERO</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>continuing</td>
                <td style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}` }}>Net <KW c={RD}>CO₂ out</KW>, <KW c={RD}>O₂ in</KW></td>
              </tr>
            </tbody>
          </table>
        </div>

        <HCIndicatorDiagram />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail — HC indicator colour scale:</Bold> hydrogencarbonate indicator goes <KW c={TL}>YELLOW</KW> (high CO₂) → orange → <KW c={RD}>RED</KW> (atmospheric, ≈ 0.04% CO₂) → magenta → <KW c={PU}>PURPLE</KW> (low CO₂). Memorise the order — common exam question.
        </div>
      </Sec>

      <Sec id="s6" title="⑥ Limiting Factors — Light, CO₂, Temperature (EXT)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          A <KW c={PU}>limiting factor</KW> is something present in the environment in such a small amount that it restricts the rate of a process (such as photosynthesis). Three factors can be limiting for photosynthesis:
        </div>
        <LimitingFactorsGraph />
        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Light intensity</Bold> — at low light, more light = faster rate. Above a certain intensity, light is no longer limiting (a different factor takes over).</li>
            <li><Bold>CO₂ concentration</Bold> — atmospheric is only 0.04%. Greenhouse growers raise CO₂ to ≈ 0.1% to lift yields.</li>
            <li><Bold>Temperature</Bold> — affects enzyme activity. Optimum around <Bold>25-30 °C</Bold>; above ~40 °C enzymes <KW c={RD}>denature</KW> and rate plummets.</li>
          </ul>
          <p><Bold>Note:</Bold> water is a raw material but is <KW c={RD}>not a limiting factor</KW> — under water stress the plant wilts and stomata close before water itself runs out.</p>
        </div>
        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Greenhouse example (Seychelles tomatoes):</Bold> control of all three factors at once raised tomato yield from <Bold>2.9 → 6.5 kg/m²</Bold> — more than double. Real engineering use of biology.
        </div>
      </Sec>

      <Sec id="s7" title="⑦ Practical Work — Five Classic Investigations">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 1: Is chlorophyll needed?</strong>
          Use a <KW c={PU}>variegated leaf</KW> (white &amp; green patches). Destarch in dark 24-48 h, expose to light, then test for starch with iodine. <Bold>Only the green parts go blue-black</Bold> — proving chlorophyll is essential.
        </div>
        <VariegatedLeafTest />
        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 2: Is light needed?</strong>
          Cover part of a destarched leaf with foil/black paper, expose to light. Test for starch — <Bold>only the uncovered part</Bold> is blue-black. Light is essential.
        </div>
        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 3: Is CO₂ needed?</strong>
          Destarch a plant. Enclose one leaf in a flask of <Bold>soda lime</Bold> (absorbs CO₂); enclose another with sodium hydrogencarbonate (releases CO₂) as a control. Expose to light → test for starch. Only the leaf with CO₂ available shows starch.
        </div>
        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 4: Is oxygen produced?</strong>
          Submerge pondweed (<Bold>Cabomba</Bold>) in a beaker of dilute NaHCO₃ solution. Bubbles rise from the cut stem. Collect gas → test with a <KW c={PU}>glowing splint</KW> → splint relights → gas is oxygen.
        </div>
        <PondweedBubbleExpt />
        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Practical 5: Effect of light intensity on rate</strong>
          Same pondweed apparatus. Move a lamp to different distances <KW c={PU}>D</KW> from the beaker. Count bubbles per minute. Use <KW>I ∝ 1/D²</KW> (inverse square law) to convert distance into relative light intensity. Plot rate against intensity.
        </div>
        <div style={{ marginTop: 10, background: RL, border: `1px solid ${RD}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a0000", lineHeight: 1.7 }}>
          <Bold>⚠️ Safety:</Bold> Ethanol used to decolourise leaves is <KW c={RD}>highly flammable</KW>. <Bold>Switch off the Bunsen flame</Bold> first; warm the ethanol in a beaker of HOT WATER (water bath), never directly over a flame. Use eye protection.
        </div>
      </Sec>
    </div>
  );
}

// ④ TEXTBOOK TAB — Hodder Ch.6 complete reference notes + SME concise theory
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  const [open, setOpen] = useState({ t1: true, t2: false, t3: false, t4: false, t5: false, t6: false, t7: false, t8: false, t9: false, t10: false, t11: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${G}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? G : GL, color: open[id] ? "#fff" : G, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Reference notes for Chapter 6: Plant Nutrition</strong>. Sections ①–⑨ are paraphrased from the <Bold>Hodder Cambridge IGCSE Biology</Bold> textbook (pages 84–106). Sections ⑩–⑪ summarise the <Bold>Save My Exams (SME)</Bold> revision notes (concise and exam-focused). Use sections ① and ③ for revision; come here for detail when you need it.
      </div>

      <Sec id="t1" title="① Definition &amp; Equations of Photosynthesis">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>All living organisms need a constant supply of energy. Animals eat ready-made food. Plants — and other photoautotrophs — make their own food from simple inorganic molecules using the energy in sunlight. This food-making process is called <KW>photosynthesis</KW> ("photo" = light, "synthesis" = make).</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Key definition:</Bold> Photosynthesis is the process by which plants <Bold>synthesise carbohydrates</Bold> from raw materials (carbon dioxide and water) using <KW>energy from light</KW>. <KW>Chlorophyll</KW> transfers the energy from light into chemical energy in molecules — used to form glucose.
          </div>

          <p style={{ marginTop: 10 }}>Photosynthesis is the source of nearly all the food on Earth (animals eat plants, or eat other animals that eat plants) and is the source of the oxygen we breathe. The raw materials are <Bold>carbon dioxide</Bold> (from the air, entering through stomata) and <Bold>water</Bold> (taken up from the soil through the roots). The products are <Bold>glucose</Bold> (a carbohydrate) and <Bold>oxygen</Bold> (a waste product, released through the stomata).</p>
        </div>

        <PhotosynthesisWordEquation />

        <div style={{ marginTop: 8, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The reaction needs an input of energy from light. Notice that the words "light" and "chlorophyll" are written above and below the arrow, not as products or reactants — they are <Bold>conditions</Bold> required for the reaction.</p>
        </div>

        <PhotosynthesisChemicalEquation />

        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Extended Tier:</Bold> the balanced chemical equation is <KW c={PU}>6 CO₂ + 6 H₂O → C₆H₁₂O₆ + 6 O₂</KW>. Six molecules of carbon dioxide combine with six molecules of water to give one molecule of glucose and six of oxygen. Memorise this exact equation including the "6"s.
        </div>
      </Sec>

      <Sec id="t2" title="② The Process — Where, How, and Role of Chlorophyll">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Photosynthesis takes place in <KW>chloroplasts</KW> — small disc-shaped organelles found mainly in <Bold>palisade mesophyll cells</Bold> in the leaf. Each chloroplast contains a green pigment called <KW>chlorophyll</KW>.</p>

          <p>Chlorophyll absorbs light, especially the red and blue wavelengths (it reflects green, which is why leaves look green). The energy from the absorbed light is used to <Bold>split water molecules</Bold> and combine the hydrogen with carbon dioxide to make glucose. Strictly: chlorophyll <KW>transfers the energy from light into chemical bonds</KW> in the glucose. Chlorophyll itself is not changed by the reaction.</p>

          <p>The oxygen produced comes from the splitting of water and is released as a waste product through the stomata.</p>
        </div>
      </Sec>

      <Sec id="t3" title="③ Plant's Use of the Products — Six Fates of Glucose">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The glucose made in photosynthesis is used in several ways:</p>
        </div>

        <GlucoseFateDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>1. Respiration.</Bold> Glucose is broken down (in the mitochondria) to release energy as ATP for cellular work. This happens in <Bold>all living plant cells</Bold>, day and night.</p>
          <p><Bold>2. Sucrose for transport.</Bold> Two glucose units are joined to form sucrose, which is <Bold>soluble</Bold> and easily transported in the <KW>phloem</KW> (translocation) from the leaves (the source) to other parts of the plant (sinks: roots, fruits, growing buds).</p>
          <p><Bold>3. Starch for storage.</Bold> Glucose is polymerised into <KW>starch</KW>, an <KW c={PU}>insoluble</KW> storage carbohydrate. Insoluble means it has <Bold>no osmotic effect</Bold> on the cell (no water rushes in). Starch is stored in leaves (overnight, when no glucose is being made), in seeds, and in storage organs like potato tubers and tap-roots.</p>
          <p><Bold>4. Cellulose for cell walls.</Bold> Glucose units are joined into long chains of <KW>cellulose</KW>, which forms the rigid cell wall of every plant cell. Cellulose makes up the bulk of dietary fibre (roughage) in our diet — humans cannot digest it.</p>
          <p><Bold>5. Fats and oils for energy storage in seeds.</Bold> Glucose can be converted into oils — sunflower, olive, peanut, oilseed rape. Seeds and the embryo plant rely on these stores until photosynthesis can begin.</p>
          <p><Bold>6. Amino acids and proteins.</Bold> Glucose is combined with <KW c={PU}>nitrate ions</KW> (NO₃⁻) absorbed from the soil to make <Bold>amino acids</Bold>. Amino acids are then joined to make <KW>proteins</KW> — used for growth, enzymes, and repair.</p>
          <p><Bold>(7. Bonus — Nectar.</Bold> Some flowers convert glucose into nectar, a sugary liquid that attracts pollinating insects.)</p>
        </div>

        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Why store as starch and not glucose?</Bold> Glucose is soluble — storing it would <KW>lower the cell's water potential</KW>, drawing water in by <KW>osmosis</KW> (cells could burst). Starch is insoluble, so storing it has no osmotic effect. This is one of the most-asked exam questions on plant nutrition.
        </div>
      </Sec>

      <Sec id="t4" title="④ Mineral Requirements — Nitrate, Magnesium &amp; NPK">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Glucose is just one of the molecules a plant needs. To make proteins (which contain N), to make chlorophyll (which contains Mg), to make DNA (which contains P), the plant needs <KW>mineral ions</KW> dissolved in soil water. These are taken up by the roots.</p>

          <p>You must know two ions in detail:</p>

          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Nitrate ions (NO₃⁻)</Bold> — used to make amino acids → proteins. <Bold>Deficiency:</Bold> proteins are needed for growth, so the plant shows <KW c={RD}>stunted growth</KW>. As the plant breaks down what nitrogen it has and recycles it to the new shoots, the older lower leaves go <KW c={RD}>yellow</KW>.</li>
            <li><Bold>Magnesium ions (Mg²⁺)</Bold> — used to make chlorophyll. <Bold>Deficiency:</Bold> the plant cannot make enough chlorophyll, so leaves go yellow between the veins (<KW c={RD}>chlorosis</KW>) — typically the lower leaves first because the plant moves Mg to the new leaves.</li>
          </ul>
        </div>

        <MineralDeficiencyDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Other mineral ions a plant needs (background, not memorised in detail):</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Phosphate (PO₄³⁻)</Bold> — DNA, ATP, phospholipids in membranes.</li>
            <li><Bold>Potassium (K⁺)</Bold> — guard cell function, enzyme activation.</li>
            <li><Bold>Calcium (Ca²⁺)</Bold> — middle lamella between cell walls.</li>
            <li><Bold>Iron (Fe)</Bold> — needed (in tiny amounts) to make chlorophyll.</li>
          </ul>
          <p>Farmers add <KW>NPK fertiliser</KW> (Nitrogen, Phosphorus, Potassium) to replace the mineral ions taken up by crops year after year.</p>
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Going Further — Water Cultures &amp; Hydroponics">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>How do we know which mineral ions a plant needs? In the 19th century researchers grew plants in <Bold>water cultures</Bold> — beakers of distilled water containing pure salts in known concentrations. By leaving out one salt at a time, they could find out which ion was missing if the plant grew poorly.</p>

          <p>A typical water culture solution contains: <Bold>KNO₃</Bold> (potassium nitrate — supplies K⁺ and NO₃⁻), <Bold>MgSO₄</Bold> (magnesium sulfate — supplies Mg²⁺), <Bold>KH₂PO₄</Bold> (potassium phosphate), <Bold>Ca(NO₃)₂</Bold> (calcium nitrate), and tiny amounts of iron and trace elements. Aerate the solution to provide oxygen for the roots.</p>

          <p>Today this technique is used commercially — it is called <KW>hydroponics</KW>. Plants are grown without soil, with their roots dipping into a recirculating nutrient solution. Tomatoes, lettuces and herbs are grown commercially this way, especially in greenhouses. Water and minerals can be controlled exactly, no soil-borne pests, and yields are very high.</p>
        </div>
      </Sec>

      <Sec id="t6" title="⑥ Practical Work — Five Classic Photosynthesis Experiments">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Each experiment shows that ONE thing is needed for photosynthesis — by removing it and showing photosynthesis stops. The presence of starch is taken as evidence that photosynthesis has occurred (glucose is converted to starch in leaves).</p>

          <Bold>Test for starch — iodine test</Bold>
          <ol style={{ paddingLeft: 18 }}>
            <li>Boil leaf in water (~30 s) — kills the cells, breaks the cuticle.</li>
            <li>Heat in <KW c={RD}>ethanol</KW> in a hot-water bath (NOT direct flame — ethanol is highly flammable). This decolourises the leaf — chlorophyll dissolves out.</li>
            <li>Soften leaf in warm water (ethanol makes it brittle).</li>
            <li>Spread on a white tile and add iodine solution (yellow-brown) — turns <KW c={PU}>blue-black</KW> wherever starch is present.</li>
          </ol>
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Destarching:</Bold> the plant is kept in the dark for 24-48 h before each experiment so any existing starch is converted to sucrose and used / transported away. The leaf will then test negative for starch unless photosynthesis has occurred during the experiment itself.</p>
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Experiment 1: Is chlorophyll needed?</strong>
          Use a <KW>variegated leaf</KW> (e.g. variegated geranium, with green and white patches). Destarch, expose to light, then test for starch. Result: only the green parts go blue-black. The white parts (no chlorophyll) cannot photosynthesise.
        </div>

        <VariegatedLeafTest />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Experiment 2: Is light needed?</strong>
          Cover part of a destarched leaf with a strip of foil or black paper (a "stencil"). Expose to bright light for several hours. Test for starch. Result: the covered area is iodine-yellow, the exposed area is blue-black. Light is essential.
        </div>

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Experiment 3: Is carbon dioxide needed?</strong>
          Destarch a potted plant. Enclose two leaves separately in conical flasks. In one flask, place <KW>soda lime</KW> (which <Bold>absorbs CO₂</Bold>); in the other, place sodium hydrogencarbonate (which <Bold>releases CO₂</Bold>). Seal both, keep in light. Test for starch. Only the leaf with CO₂ available shows starch.
        </div>

        <CO2PathwayDiagram />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Experiment 4: Is oxygen produced?</strong>
          Submerge sprigs of pondweed (<Bold>Cabomba</Bold>, formerly Elodea) in a beaker of dilute sodium hydrogencarbonate solution (provides extra CO₂). Cover with a funnel and a test tube full of water. Bubbles rise from the cut stem and collect in the test tube. When enough has collected, test the gas with a <KW>glowing splint</KW> — splint relights → gas is oxygen.
        </div>

        <PondweedBubbleExpt />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Experiment 5: Effect of light intensity on rate</strong>
          Same pondweed apparatus. Place a lamp at distance D from the beaker. Count bubbles per minute (or measure volume of gas collected). Repeat at different distances. Use the inverse-square law: <KW>I ∝ 1/D²</KW> (because the same amount of light spreads over an area that grows with D²). Plot rate vs intensity → curve shows rising rate that levels off when another factor becomes limiting.
        </div>
      </Sec>

      <Sec id="t7" title="⑦ Gaseous Exchange in Leaves">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Plants <Bold>respire all the time</Bold> (every cell needs ATP, day and night). They <Bold>photosynthesise only in the light</Bold>. Both processes exchange gases with the atmosphere through the stomata.</p>

          <p>The NET direction depends on the relative rates:</p>

          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Bright light</Bold> — photosynthesis FASTER than respiration. Net: leaf <KW>takes in CO₂, releases O₂</KW>.</li>
            <li><Bold>Compensation point</Bold> — at low light, photosynthesis = respiration. NO net exchange (gases produced by one are used by the other).</li>
            <li><Bold>Darkness / night</Bold> — photosynthesis = zero. Only respiration. Net: leaf <KW c={RD}>takes in O₂, releases CO₂</KW>.</li>
          </ul>

          <p>To detect this gas exchange we use <KW>hydrogencarbonate indicator</KW> (HC indicator). HC indicator is sensitive to CO₂ in solution.</p>
        </div>

        <HCIndicatorDiagram />

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>HC indicator colour scale:</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Yellow</Bold> = highest CO₂ (acidic)</li>
            <li><Bold>Orange</Bold> = above atmospheric CO₂</li>
            <li><Bold>Red / orange-red</Bold> = atmospheric CO₂ (≈ 0.04%)</li>
            <li><Bold>Magenta / pink</Bold> = below atmospheric CO₂</li>
            <li><Bold>Purple</Bold> = lowest CO₂ (alkaline)</li>
          </ul>
          <p><Bold>Three-tube experiment:</Bold> Tube A leaf in light → goes <KW>purple</KW> (CO₂ removed by photosynthesis &gt; respiration). Tube B leaf in dark → goes <KW>yellow</KW> (only respiration releases CO₂). Tube C no leaf (control) → stays red.</p>
        </div>
      </Sec>

      <Sec id="t8" title="⑧ Limiting Factors (EXT)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>Definition:</Bold> a <KW c={PU}>limiting factor</KW> is something present in the environment in such small amounts that it restricts the rate of a process (here, photosynthesis). When a limiting factor is increased, the rate of the process increases — until something else takes over as the new limiting factor.
        </div>

        <LimitingFactorsGraph />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>The three limiting factors for photosynthesis:</Bold>
          <ol style={{ paddingLeft: 18 }}>
            <li><Bold>Light intensity.</Bold> At low light, doubling the light doubles the rate. But above a certain intensity (the "light saturation point"), light is no longer the limiter — CO₂ or temperature becomes limiting and the curve levels off.</li>
            <li><Bold>CO₂ concentration.</Bold> Atmospheric CO₂ is only 0.04%. Increasing it (e.g. to 0.1% in a greenhouse) raises the rate sharply when light is plentiful. Greenhouses sometimes pipe CO₂ from boilers or natural-gas burners into the air.</li>
            <li><Bold>Temperature.</Bold> Photosynthesis depends on enzymes. Optimum is around <Bold>25-30 °C</Bold>; above ~40 °C enzymes <KW c={RD}>denature</KW> and the rate falls sharply.</li>
          </ol>
          <p><Bold>Note:</Bold> water is a raw material but is <KW c={RD}>not normally listed as a limiting factor</KW>. Long before water levels limit photosynthesis, the plant wilts and stomata close — so CO₂ supply (not water) is what stops the reaction.</p>
        </div>

        <div style={{ marginTop: 10, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Greenhouse case study:</Bold> in the Seychelles, a tomato grower controlled all three factors (light, CO₂, temperature) inside greenhouses. Yield rose from <Bold>2.9 to 6.5 kg/m²</Bold>. Carrot growers similarly found that CO₂ enrichment to 0.1% gave heavier carrots than air controls. Real-world application of the limiting-factor concept.
        </div>
      </Sec>

      <Sec id="t9" title="⑨ Leaf Structure &amp; Adaptations">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The leaf is a flat, broad organ packed with chloroplasts and well supplied with water. Its structure is exquisitely adapted for capturing light and exchanging gases.</p>
        </div>

        <LeafCrossSection />

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: G, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Tissue</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Adaptation</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Function</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Cuticle", "Waxy, thin, transparent", "Waterproofing; lets light through"],
                ["Upper epidermis", "Thin, transparent, no chloroplasts", "Light passes through to mesophyll below"],
                ["Palisade mesophyll", "Tall column cells, MANY chloroplasts, packed near upper surface", "Main site of photosynthesis — captures most light"],
                ["Spongy mesophyll", "Loosely packed cells with large air spaces; some chloroplasts", "Diffusion of CO₂ in and O₂ out; water vapour out"],
                ["Xylem (in vein)", "Long, hollow, thick lignified walls; dead cells", "Carries WATER and minerals UP from roots to leaf"],
                ["Phloem (in vein)", "Living, with sieve plates", "Carries SUCROSE (translocation) from leaf to rest of plant"],
                ["Lower epidermis", "Thin layer of cells", "Protects underside; contains stomata"],
                ["Stomata (with guard cells)", "Pores controlled by curved guard cells", "Open in light: CO₂ in, O₂/H₂O out. Close at night / drought."],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? GL : "#fff" }}>
                  {row.map((c, j) => (
                    <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? G : GR }}>{c}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <StomaOpenClosed />

        <div style={{ marginTop: 10, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>How stomata open (EXT):</Bold> in light, the guard cells actively pump <KW c={PU}>K⁺ ions</KW> in. This lowers their water potential, so water enters by <KW>osmosis</KW> → guard cells swell &amp; become turgid. Because the inner wall (lining the pore) is <Bold>thicker</Bold> than the outer wall, the cells curve OUTWARDS as they swell — opening the stoma. At night the K⁺ is pumped out, water leaves, the cells go flaccid and the pore closes.
        </div>

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <Bold>Why broad &amp; flat?</Bold> A wide, thin leaf has a large <KW>surface-area-to-volume ratio</KW> — perfect for capturing light over a big area, and short diffusion paths for CO₂ and O₂. The vein system delivers water across the whole blade and removes sucrose efficiently.
        </div>
      </Sec>

      <Sec id="t10" title="⑩ SME — Photosynthesis &amp; Investigations (concise)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p style={{ background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px" }}>
            <Bold>SME definition (memorise):</Bold> Photosynthesis is the process by which plants <KW c={TL}>synthesise carbohydrates</KW> from <KW c={TL}>raw materials using energy from light</KW>.
          </p>

          <p><Bold>Raw materials:</Bold> <KW c={TL}>carbon dioxide</KW> (entering through stomata, fastest in moist soil) + <KW c={TL}>water</KW> (taken up through roots).</p>

          <p><Bold>Products:</Bold> <KW c={TL}>glucose</KW> (then converted to starch / sucrose / cellulose / proteins / fats) + <KW c={TL}>oxygen</KW> (waste).</p>

          <p><Bold>Chlorophyll's role:</Bold> a green pigment in the chloroplast that <KW c={TL}>transfers the energy from light into chemical bonds</KW> within glucose molecules. <Bold>Note:</Bold> chlorophyll is NOT a reactant or product — it is a catalyst (it is not used up).</p>

          <p><Bold>Three classic investigations</Bold> (use a destarched leaf and the iodine starch test):</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Light needed?</Bold> Cover part of leaf with foil → only uncovered part stains blue-black.</li>
            <li><Bold>Chlorophyll needed?</Bold> Use a variegated leaf → only green parts stain blue-black.</li>
            <li><Bold>CO₂ needed?</Bold> One leaf with soda lime (no CO₂), one with NaHCO₃ (CO₂ available) → only the leaf with CO₂ shows starch.</li>
          </ul>

          <p><Bold>Rate of photosynthesis</Bold> can be investigated by counting bubbles of oxygen released by pondweed (<Bold>Cabomba</Bold>) in different conditions:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Light intensity</Bold> — change distance of lamp; rate ∝ 1/D².</li>
            <li><Bold>CO₂ concentration</Bold> — vary the concentration of NaHCO₃ in the water.</li>
            <li><Bold>Temperature</Bold> — use water baths; bubbles per minute increases up to ~30 °C, then falls.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t11" title="⑪ SME — Mineral Ions, Limiting Factors, Leaf Structure (concise)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Mineral ions:</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li><KW c={TL}>Nitrate</KW> (NO₃⁻) — to make amino acids → proteins. Deficiency: <Bold>stunted growth + yellowing of older lower leaves</Bold>.</li>
            <li><KW c={TL}>Magnesium</KW> (Mg²⁺) — to make chlorophyll. Deficiency: <Bold>yellowing between veins</Bold> (chlorosis).</li>
          </ul>

          <p><Bold>Gas exchange &amp; HC indicator:</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li>HC indicator detects CO₂. Colour scale: <KW c={TL}>YELLOW</KW> (highest CO₂) → orange → <KW c={TL}>RED</KW> (atmospheric, 0.04%) → magenta → <KW c={TL}>PURPLE</KW> (lowest CO₂).</li>
            <li>Tube of HC indicator + leaf in <Bold>LIGHT</Bold> → goes <KW c={TL}>purple</KW> (photosynthesis &gt; respiration; CO₂ removed).</li>
            <li>Tube of HC indicator + leaf in <Bold>DARK</Bold> → goes <KW c={TL}>yellow</KW> (only respiration; CO₂ released).</li>
            <li>Control tube (no leaf) → stays <KW c={TL}>red</KW>.</li>
          </ul>

          <p style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", marginTop: 8 }}>
            <Bold>EXT — Limiting factors:</Bold> a factor that, when increased, raises the rate of a process. For photosynthesis: <KW c={PU}>light intensity</KW>, <KW c={PU}>CO₂ concentration</KW>, <KW c={PU}>temperature</KW>. Increase one and the rate rises until another becomes limiting (the curve flattens).
          </p>

          <p style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", marginTop: 8 }}>
            <Bold>EXT — Balanced equation:</Bold> <KW c={PU}>6 CO₂ + 6 H₂O → C₆H₁₂O₆ + 6 O₂</KW> (light, chlorophyll). Memorise the "6"s.
          </p>

          <p><Bold>Leaf adaptations summary table</Bold> (for exams):</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Broad &amp; flat</Bold> → large surface area for light absorption.</li>
            <li><Bold>Thin</Bold> → short diffusion distance for gases.</li>
            <li><Bold>Cuticle &amp; upper epidermis transparent</Bold> → light passes through to palisade.</li>
            <li><Bold>Palisade mesophyll near top, packed with chloroplasts</Bold> → main photosynthesis site.</li>
            <li><Bold>Spongy mesophyll with air spaces</Bold> → gas diffusion.</li>
            <li><Bold>Stomata in lower epidermis</Bold> → CO₂ in, O₂ out, controlled by guard cells.</li>
            <li><Bold>Xylem brings water + minerals</Bold>; <Bold>phloem removes sucrose</Bold>.</li>
          </ul>
        </div>
      </Sec>
    </div>
  );
}
