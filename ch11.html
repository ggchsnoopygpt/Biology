// ── Inspired vs expired air comparison ─────────────────────────────────────
function InspiredVsExpiredAirDiagram() {
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>

      {/* Two columns */}
      {[
        { x: 100, label: "Inspired (inhaled)", colour: G, vals: { O2: 21, CO2: 0.04, N2: 78, H2O: "low / varies", T: "ambient" } },
        { x: 400, label: "Expired (exhaled)", colour: RD, vals: { O2: 16, CO2: 4.0, N2: 78, H2O: "high / saturated", T: "body ~37 °C" } },
      ].map((col, ci) => (
        <g key={ci}>
          {/* Column heading */}
          <rect x={col.x - 60} y="50" width="220" height="38" rx="6" fill={col.colour} />
          <text x={col.x + 50} y="74" textAnchor="middle" fontSize="13" fontWeight="700" fill="#fff">{col.label}</text>

          {/* Body — values */}
          <rect x={col.x - 60} y="92" width="220" height="225" rx="6" fill="#fff" stroke={col.colour} strokeWidth="1.5"/>

          {/* O2 */}
          <text x={col.x - 50} y="115" fontSize="11" fontWeight="700" fill={G}>Oxygen (O₂)</text>
          <text x={col.x + 150} y="115" textAnchor="end" fontSize="11" fontWeight="700" fill={GR}>{col.vals.O2}%</text>
          <rect x={col.x - 50} y="120" width="200" height="6" rx="3" fill="#eee"/>
          <rect x={col.x - 50} y="120" width={col.vals.O2 * 200 / 100} height="6" rx="3" fill={G}/>

          {/* CO2 */}

          <text x={col.x + 150} y="155" textAnchor="end" fontSize="11" fontWeight="700" fill={GR}>{col.vals.CO2}%</text>
          <rect x={col.x - 50} y="160" width="200" height="6" rx="3" fill="#eee"/>
          <rect x={col.x - 50} y="160" width={col.vals.CO2 * 30} height="6" rx="3" fill={RD}/>

          {/* N2 */}
          <text x={col.x - 50} y="195" fontSize="11" fontWeight="700" fill="#3d6a90">Nitrogen (N₂)</text>
          <text x={col.x + 150} y="195" textAnchor="end" fontSize="11" fontWeight="700" fill={GR}>{col.vals.N2}%</text>
          <rect x={col.x - 50} y="200" width="200" height="6" rx="3" fill="#eee"/>
          <rect x={col.x - 50} y="200" width={col.vals.N2 * 200 / 100} height="6" rx="3" fill="#3d6a90"/>

          {/* H2O */}
          <text x={col.x - 50} y="235" fontSize="11" fontWeight="700" fill="#7aa8d4">Water vapour</text>
          <text x={col.x + 150} y="235" textAnchor="end" fontSize="10" fontWeight="600" fill={GR}>{col.vals.H2O}</text>

          {/* Temp */}
          <text x={col.x - 50} y="265" fontSize="11" fontWeight="700" fill={AM}>Temperature</text>
          <text x={col.x + 150} y="265" textAnchor="end" fontSize="10" fontWeight="600" fill={GR}>{col.vals.T}</text>

          {/* Particles */}
          <text x={col.x - 50} y="295" fontSize="11" fontWeight="700" fill="#7a6a40">Dust / microbes</text>
          <text x={col.x + 150} y="295" textAnchor="end" fontSize="10" fontWeight="600" fill={GR}>{ci === 0 ? "may be present" : "filtered out"}</text>
        </g>
      ))}

      {/* Bottom note */}
      <rect x="20" y="330" width="660" height="20" rx="4" fill={PL} stroke={PU} strokeWidth="0.8"/>
      <text x="350" y="345" textAnchor="middle" fontSize="11" fontWeight="700" fill={PU}>
        Differences are caused by respiration in body cells + lung filtration &amp; warming
      </text>
    </svg>
  );
}

          ↓<br/>
          <Bold>Ventilation</Bold> = diaphragm + intercostal muscles change thoracic volume → pressure changes → air moves in &amp; out.<br/>
          ↓<br/>
          <Bold>Diffusion at alveoli</Bold> across thin moist walls into capillary blood.<br/>
          ↓<br/>
          <Bold>Blood transport</Bold> carries O₂ to body cells, removes CO₂ from them.<br/>
          ↓<br/>
          <Bold>Cellular respiration</Bold> uses O₂, produces CO₂ → cycle continues.<br/>
          <span style={{ color: "#666" }}>(Exercise demands more O₂ &amp; produces more CO₂ → brain increases breathing rate &amp; depth.)</span>
        </div>
      </div>
    </div>
  );
}

// ④ TEXTBOOK TAB
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      {/* Header banner */}
      <div style={{ background: G, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📖 Textbook — Hodder IGCSE Biology Ch.11</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          Full reference notes · Look up any topic you don't fully understand
        </div>
      </div>

      {/* 11.1 Why gas exchange */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.1 · Why animals need gas exchange</div>
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          All living cells must release energy from food by <KW>aerobic respiration</KW>:
          glucose + oxygen → carbon dioxide + water + energy (ATP).
          So cells continuously NEED OXYGEN and continuously PRODUCE CARBON DIOXIDE.
          Small organisms (e.g. <em>Amoeba</em>) exchange these gases directly through their cell surface — their
          {" "}<Bold>surface-area-to-volume ratio</Bold> is huge.
          {" "}Large animals like humans have a low SA:V ratio, so most cells lie too deep for direct diffusion.
          They therefore need a <KW>specialised gas-exchange surface</KW> (the lungs) and a transport system
          (blood) to carry gases between this surface and the cells.
        </div>
      </section>

      {/* 11.2 Pathway */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.2 · The Human Breathing System</div>
        <BreathingSystemDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          Air enters the body through the <Bold>nasal cavity</Bold> (or mouth):
          nasal hairs trap large particles; the lining is rich in capillaries that <Bold>warm</Bold> the air
          and <Bold>moisten</Bold> it with mucus.
          Air then passes through the <Bold>larynx</Bold> (voice box) and into the <KW>trachea</KW>.
          <br/><br/>
          The trachea is reinforced by C-shaped rings of <KW>cartilage</KW> — a tough, flexible connective tissue.
          The 'C' shape allows the oesophagus behind to bulge during swallowing,
          while the cartilage prevents the trachea from collapsing inwards when pressure drops during inhalation.
          <br/><br/>
          The trachea divides into two <KW>bronchi</KW>, one entering each lung.
          Each bronchus branches repeatedly into smaller <KW>bronchioles</KW> (which have NO cartilage but contain smooth muscle).
          Bronchioles terminate in clusters of microscopic air sacs called <KW>alveoli</KW> — there are about
          {" "}300 – 500 million in an adult, giving a total surface area of roughly <Bold>80 m²</Bold>
          (about the size of half a tennis court).
          <br/><br/>
          The lungs themselves sit in the <Bold>thoracic cavity</Bold>, surrounded by two thin layers called <Bold>pleural membranes</Bold>;
          a thin film of fluid (the <Bold>pleural fluid</Bold>) between them lubricates the lungs as they expand and contract.
          The thorax is bounded above by the rib cage (with intercostal muscles between the ribs)
          and below by the <KW>diaphragm</KW>, a sheet of muscle.
          The flat bone at the FRONT of the rib cage is called the <Bold>sternum</Bold>.
        </div>
        <SMENoteBox title="Quick-reference: structures of the breathing system">
          <Bold>Ribs</Bold> — bony cage protecting the lungs and heart.{" "}
          <Bold>Intercostal muscles</Bold> — between the ribs; control rib movement for inhalation/exhalation.{" "}
          <Bold>Diaphragm</Bold> — sheet of muscle + connective tissue below the lungs; changes thorax volume.{" "}
          <Bold>Trachea</Bold> — windpipe connecting mouth/nose to the lungs.{" "}
          <Bold>Larynx</Bold> — voice box; air passing over the vocal cords creates sound.{" "}
          <Bold>Bronchus (plural: bronchi)</Bold> — large tubes branching off the trachea, one to each lung.{" "}
          <Bold>Bronchioles</Bold> — smaller branches inside the lung, ending in alveoli.{" "}
          <Bold>Alveoli</Bold> — tiny air sacs where gas exchange occurs. About <Bold>350 million</Bold> in total, providing a total absorbing surface of about <Bold>90 m²</Bold> (Hodder).
        </SMENoteBox>
      </section>

      {/* 11.3 Alveoli */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.3 · Alveoli — The Gas-Exchange Surface</div>
        <AlveolusGasExchangeDiagram />
        <AlveolarFeaturesBox />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          Each alveolus is a tiny bag of air surrounded by a network of <KW>capillaries</KW>.
          Both the alveolar wall and the capillary wall are just <Bold>one cell thick</Bold>,
          so the total diffusion distance between air and blood is only about 0.5 µm.
          A thin film of fluid lines the alveolus — gases <Bold>dissolve</Bold> in this fluid before crossing the membrane.
          <br/><br/>
          <Bold>Gas movement:</Bold>
          Blood arriving from the rest of the body is LOW in O₂ and HIGH in CO₂.
          The alveolar air, refreshed by ventilation, is HIGH in O₂ and LOW in CO₂.
          So:
          <ul style={{ marginTop: 4, paddingLeft: 22, lineHeight: 1.7 }}>
            <li><Bold>O₂ diffuses from alveolus → blood</Bold> (down its gradient) and binds to haemoglobin in red blood cells.</li>
            <li><Bold>CO₂ diffuses from blood → alveolus</Bold> (down its gradient) and is exhaled.</li>
          </ul>
          The blood leaves the lung <Bold>oxygenated</Bold> (bright red) and travels to the heart, then to body cells.
        </div>
        <SMENoteBox title="Exchange surfaces share common features">
          The features that make alveoli efficient gas-exchange surfaces are the SAME features that make villi (small intestine) and root hair cells (plants) good exchange surfaces:
          {" "}<Bold>large surface area</Bold>, <Bold>thin walls</Bold>, <Bold>good blood supply</Bold>, <Bold>steep concentration gradient</Bold>.
          If you learn one, you have learnt them all — the principles of diffusion are universal.
        </SMENoteBox>
      </section>

      {/* 11.4 Ventilation */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.4 · Ventilation — Breathing In and Out</div>
        <VentilationMechanicsDiagram />
        <PressureVolumeBox />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          Ventilation = the physical movement of air in and out of the lungs.
          It works by changing the <Bold>volume of the thoracic cavity</Bold>,
          which in turn changes the <Bold>pressure</Bold> inside it (Boyle's law: volume × pressure is constant for a fixed mass of gas).
          Because air always moves from HIGH to LOW pressure, the right volume change drives air either in or out.
          <br/><br/>
          <Bold>Inhalation (active):</Bold>
          The <KW>external intercostal muscles</KW> CONTRACT, pulling the ribcage <Bold>up and out</Bold>.
          At the same time the <KW>diaphragm</KW> CONTRACTS and FLATTENS, moving downwards.
          Both actions <Bold>increase thoracic volume</Bold> → pressure inside the lungs falls below atmospheric →
          air is pushed in by atmospheric pressure outside.
          <br/><br/>
          <Bold>Exhalation (passive at rest):</Bold>
          The intercostal muscles and the diaphragm RELAX.
          The ribs fall back down and in; the diaphragm domes upward again.
          Thoracic volume <Bold>decreases</Bold> → pressure rises above atmospheric → air is forced out.
          The lungs' natural elastic recoil also helps push air out.
          <br/><br/>
          <Bold>Antagonistic muscles <Ext /></Bold>:
          The two sets of intercostal muscles (external + internal) act antagonistically.
          During NORMAL exhalation, only the externals are involved (relaxing).
          During FORCED or rapid exhalation (e.g. coughing, exercise), the INTERNAL intercostals contract,
          pulling the ribs down and in to push air out faster.
        </div>
        <SMENoteBox title="Why TWO sets of intercostal muscles?">
          Muscles can only PULL on bones — they cannot push. So one set must pull the ribs UP (external intercostals, on the OUTSIDE of the rib cage) and another set must pull the ribs DOWN (internal intercostals, on the INSIDE of the rib cage).
          This is an example of an <Bold>antagonistic pair</Bold>: two muscles working in opposite directions to control movement.
        </SMENoteBox>
        <SMENoteBox title="Cartilage rings in the trachea & bronchi (Extended)">
          The trachea and bronchi are surrounded by <Bold>C-shaped rings of cartilage</Bold>.
          Their function is to <Bold>support the airways and keep them open</Bold> at all times.
          During inhalation, pressure inside the airways drops below atmospheric pressure;
          without the rigid cartilage rings, the airway walls would <Bold>collapse inwards</Bold> like a sucked-in straw, blocking airflow.
          The 'C' (rather than full ring) leaves a gap behind the trachea so the oesophagus can bulge during swallowing.
        </SMENoteBox>
      </section>

      {/* 11.5 Composition of inspired vs expired air */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.5 · Differences Between Inspired and Expired Air</div>
        <InspiredVsExpiredAirDiagram />
        <CO2TestDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          <Bold>Five differences:</Bold>
          <ol style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Less O₂ in expired air</Bold> (≈ 16 % vs 21 %): because some O₂ has diffused into the blood for respiration.</li>
            <li><Bold>More CO₂ in expired air</Bold> (≈ 4 % vs 0.04 %, i.e. about 100 × more): CO₂ from respiring tissues has diffused into the blood and then into the alveoli.</li>
            <li><Bold>More water vapour in expired air</Bold> (≈ 1 – 5 % vs 0.2 – 4 %): alveolar surfaces are moist, so air leaving them is saturated.</li>
            <li><Bold>Higher temperature in expired air</Bold> (~37 °C body temperature): air is warmed as it passes through the airways.</li>
            <li><Bold>Cleaner expired air</Bold>: dust, microbes and large particles have been trapped by mucus and removed. (Nitrogen stays at <Bold>78 %</Bold> — it is too unreactive to be used by the body.)</li>
          </ol>
          <br/>
          <Bold>Practical test for CO₂:</Bold> bubble inhaled and exhaled air through two boiling tubes of <KW>limewater</KW>
          (clear calcium hydroxide solution) using a T-tube with one-way valves.
          Inspired air bubbled through one tube → stays clear.
          Expired air bubbled through the other → limewater turns <Bold>milky/cloudy</Bold> within seconds.
          An alternative is hydrogencarbonate indicator: yellow = high CO₂, red = atmospheric CO₂, purple = low CO₂.
        </div>
        <InspExpReasonsTable />
      </section>

      {/* 11.6 Defence */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.6 · Protection of the Gas-Exchange System</div>
        <MucusCiliaDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          The airways are constantly exposed to dust, pollen and microbes in the air we breathe.
          Three defences work together:
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Nasal hairs</Bold> filter out the largest particles entering the nose.</li>
            <li><Bold>Goblet cells</Bold> in the trachea, bronchi and large bronchioles secrete sticky <KW>mucus</KW> that traps small dust particles and microorganisms.</li>
            <li><Bold>Ciliated epithelial cells</Bold> have tiny hair-like <KW>cilia</KW> that beat in coordinated waves. They sweep the mucus + trapped particles UPWARDS towards the throat.</li>
          </ul>
          The mucus is then SWALLOWED. In the stomach, hydrochloric acid (pH ≈ 2) kills the trapped microbes.
          This entire conveyor system is called the <Bold>mucociliary escalator</Bold>.
        </div>
        <SMENoteBox title="Examiner's 3-mark answer formula (mucus & cilia)">
          The "function of cilia and mucus" is a frequent 3-mark Extended question. Examiners want THREE precise statements:
          {" "}<Bold>(1)</Bold> Mucus is produced by goblet cells and TRAPS bacteria, dust and particles.
          {" "}<Bold>(2)</Bold> The cilia BEAT (in coordinated waves).
          {" "}<Bold>(3)</Bold> The beating pushes the mucus AWAY FROM the lungs, UP towards the throat.
          Most marks are lost from vague answers like "cilia move mucus" — always state WHERE it goes and WHY it matters.
        </SMENoteBox>
      </section>

      {/* 11.7 Exercise */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.7 · Effects of Physical Activity on Breathing</div>
        <ExerciseBreathingGraph />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
          During exercise, muscles respire faster to generate energy.
          They use more O₂ and produce more CO₂.
          Sensors in major arteries and in the brain detect the increase in blood CO₂ (and the resulting pH change).
          The brain then sends nerve signals to the diaphragm and intercostal muscles to:
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Increase the rate</Bold> of breathing (more breaths per minute).</li>
            <li><Bold>Increase the depth</Bold> of breathing (more air moved per breath).</li>
          </ul>
          After exercise stops, breathing remains elevated for several minutes — the <KW>oxygen debt</KW>.
          During vigorous exercise some muscle cells respire ANAEROBICALLY, producing <Bold>lactic acid</Bold>.
          Extra oxygen is needed afterwards to break this lactic acid down, hence the prolonged heavy breathing.
          Lactic acid lowers the pH of cells and would otherwise <Bold>denature enzymes</Bold> needed for normal cell reactions.
        </div>
        <ExerciseMechanismFlow />
        <SMENoteBox title="Don't confuse respiration with breathing!">
          <Bold>Respiration</Bold> = a series of chemical reactions INSIDE cells that release energy from glucose (happens in mitochondria; not visible).
          {" "}<Bold>Breathing (= ventilation)</Bold> = the mechanical movement of air in and out of the lungs (visible).
          Breathing SUPPORTS respiration by supplying O₂ and removing CO₂, but they are not the same process.
          Examiners commonly penalise students who write "the lungs respire" or "breathing produces energy".
        </SMENoteBox>
      </section>

      {/* 11.8 Investigating exercise (practical) */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.8 · Practical — Investigating Effects of Exercise</div>
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          <Bold>Common experimental design:</Bold>
          <ol style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li>Measure RESTING breathing rate (count breaths for 1 minute, sitting).</li>
            <li>Carry out a fixed exercise (e.g. 3 minutes of step-ups or running on the spot).</li>
            <li>Immediately measure breathing rate again.</li>
            <li>Continue measuring every minute until rate returns to baseline.</li>
          </ol>
          <Bold>Variables to control</Bold>: type and intensity of exercise, environmental temperature, the same subject (or compare averages of multiple subjects), measurement method.
          <br/><br/>
          <Bold>Limitations</Bold>: breathing rate can be consciously altered when watched; depth of breathing is hard to measure by sight; observer error in counting at high rates.
          Heart rate measurement (or a pulse oximeter for O₂ saturation) is often more reliable.
        </div>
      </section>

      {/* 11.9 Bell-jar model (Hodder) */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.9 · The Bell-Jar Model of Breathing</div>
        <BellJarModelDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          The <KW>bell-jar model</KW> is a simple piece of apparatus that demonstrates how movement of the diaphragm causes inspiration and expiration. The parts of the model map onto parts of the real breathing system:
          <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 8, fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: GL }}>
                <th style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "left", color: G }}>Model part</th>
                <th style={{ padding: "6px 10px", border: `1px solid ${BD}`, textAlign: "left", color: G }}>Real-life equivalent</th>
              </tr>
            </thead>
            <tbody>
              <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Glass tubing</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Trachea</td></tr>
              <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Y-piece</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Bronchi (left and right)</td></tr>
              <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Balloons</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Lungs</td></tr>
              <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Bell jar</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Thoracic cavity / rib cage</td></tr>
              <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Rubber sheet</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Diaphragm</td></tr>
            </tbody>
          </table>
          <br/>
          <Bold>How it works:</Bold> pulling the rubber sheet DOWN increases the volume inside the jar, lowers pressure, and air rushes in through the tubing — the balloons inflate. Releasing the sheet decreases the volume, raises pressure, and air is pushed back out — the balloons deflate.
          <br/><br/>
          <Bold>Limitations of the model (common Hodder/CIE exam question):</Bold>
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li>The bell jar is RIGID, but the real rib cage MOVES (intercostal muscles lift the ribs up and out). The model cannot show this.</li>
            <li>The model has NO intercostal muscles — only the rubber sheet acts as a 'muscle'.</li>
            <li>Balloons inflate from one end only. Real alveoli are millions of tiny branching sacs — vastly more surface area, not modelled here.</li>
            <li>No gas exchange takes place in the model. The balloons just expand and contract.</li>
            <li>The rubber sheet is pulled by an external handle; the diaphragm contracts on its own.</li>
          </ul>
        </div>
        <SMENoteBox title="Common Hodder/CIE exam style: bell-jar limitations">
          Expect a 3-mark "State three ways in which this model does not represent breathing in a human" question. Pair each missing feature with the real-life equivalent: <Bold>rigid jar</Bold> vs moving ribs · <Bold>passive rubber sheet</Bold> vs active diaphragm · <Bold>no gas exchange</Bold> · <Bold>no antagonistic intercostals</Bold> · <Bold>no branching airways / alveoli</Bold>.
        </SMENoteBox>
      </section>

      {/* 11.10 Spirometer & lung volumes (Hodder) */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.10 · Lung Volumes and the Spirometer</div>
        <LungVolumesDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          A <KW>spirometer</KW> (with a kymograph or a digital read-out) measures the volume of air a person breathes in and out over time. The volunteer breathes through a mouthpiece into a hinged chamber filled with medical oxygen; a soda-lime filter removes the CO₂ they exhale so it is not re-breathed. A pen attached to the chamber draws a line on a slowly rotating drum, or the same data is plotted on screen.
          <br/><br/>
          <Bold>Key lung volumes (adult, at rest):</Bold>
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Tidal volume</Bold> — air moved in or out in one normal, quiet breath, about <Bold>500 cm³</Bold>.</li>
            <li><Bold>Vital capacity</Bold> — the MAX volume of air you can expire after the deepest possible inspiration. Typically <Bold>2.5 to 5.0 L</Bold>, depending on sex, size and fitness.</li>
            <li><Bold>Residual volume</Bold> — air that ALWAYS stays in the lungs and cannot be expelled even with maximum effort, about <Bold>1.5 L</Bold>.</li>
            <li><Bold>Total lung capacity</Bold> = vital capacity plus residual, about <Bold>5 L</Bold>.</li>
          </ul>
          <Bold>Breathing rate</Bold>: at rest about 12 breaths per minute; during exercise it can exceed 20 breaths per minute, and depth (tidal volume) also increases.
        </div>

        <SpirometerTraceDiagram />
        <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 6 }}>
          <Bold>Reading a spirometer trace (Hodder Worked Example):</Bold>
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Depth of one breath</Bold> = volume at one PEAK minus volume at the next TROUGH. Example: peak W = 2.8 dm³, trough V = 2.3 dm³, so depth = <Bold>0.5 dm³ per breath</Bold>.</li>
            <li><Bold>Breathing rate</Bold> = count of peaks (or troughs) in a known time, divided by the time in minutes. Example: 20 troughs in 2 minutes = <Bold>10 breaths per minute</Bold>.</li>
            <li><Bold>Volume of O₂ used</Bold> = volume at start of period minus volume at end of period. The downward drift of the trace IS the O₂ consumed, because exhaled CO₂ is absorbed by soda lime. Example: 2.3 minus 1.25 = 1.05 dm³ over 2 minutes = <Bold>0.525 L per minute</Bold>.</li>
          </ul>
        </div>
        <SMENoteBox title="Hodder practical safety note">
          The volunteer must NOT see the trace being produced (it can affect their breathing pattern). Medical oxygen has high purity and is toxic if inhaled for too long. If the volunteer feels dizzy, remove the mouthpiece IMMEDIATELY and rest.
        </SMENoteBox>
      </section>

      {/* 11.11 Diseases & smoking */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.11 · Lung Disease &amp; Smoking (background)</div>
        <div style={{ fontSize: 13, lineHeight: 1.7 }}>
          <Bold>COPD</Bold> (Chronic Obstructive Pulmonary Disease) is an umbrella term covering chronic bronchitis (chronic inflammation of the bronchi and excess mucus) and <Bold>emphysema</Bold>
          (destruction of alveolar walls → loss of surface area and elastic recoil).
          Both reduce the lungs' ability to exchange gases efficiently.
          <br/><br/>
          <Bold>Smoking</Bold> is the main cause of COPD and lung cancer. Tobacco smoke contains:
          <ul style={{ paddingLeft: 22, lineHeight: 1.8, marginTop: 4 }}>
            <li><Bold>Tar</Bold> — accumulates in airways, paralyses cilia, increases mucus → 'smoker's cough'; contains carcinogens that cause cancer.</li>
            <li><Bold>Nicotine</Bold> — highly addictive; raises heart rate and constricts blood vessels.</li>
            <li><Bold>Carbon monoxide</Bold> — binds irreversibly to haemoglobin, reducing O₂ transport capacity.</li>
          </ul>
          The COPD vs urban/rural data in some exam questions reflects differences in indoor air pollution
          (e.g. cooking on biomass fires) and smoking rates — important context for Q1 of Medium-level practice.
        </div>
      </section>

      {/* Glossary */}
      <section>
        <div style={{ fontSize: 15, fontWeight: 700, color: G, marginBottom: 4 }}>11.12 · Key Terms (mini-glossary)</div>
        <div style={{ background: "#fff", border: `1.5px solid ${G}`, borderRadius: 10, padding: "12px 16px", fontSize: 12.5, lineHeight: 1.8 }}>
          <Bold>Ventilation</Bold> — the movement of air in and out of the lungs.<br/>
          <Bold>Gas exchange</Bold> — the diffusion of O₂ and CO₂ between alveolar air and capillary blood.<br/>
          <Bold>Alveolus</Bold> — a microscopic air sac in the lung where gas exchange occurs.<br/>
          <Bold>Trachea</Bold> — the windpipe; supported by cartilage rings.<br/>
          <Bold>Bronchus / Bronchi</Bold> — main airways branching from the trachea, one to each lung.<br/>
          <Bold>Bronchiole</Bold> — small branching airways inside the lung; no cartilage.<br/>
          <Bold>Diaphragm</Bold> — sheet of muscle below the lungs that flattens (contracts) for inhalation.<br/>
          <Bold>Intercostal muscles</Bold> — muscles between the ribs (external + internal sets — antagonistic).<br/>
          <Bold>Concentration gradient</Bold> — a difference in concentration between two regions; gases diffuse down it.<br/>
          <Bold>Cartilage</Bold> — tough, flexible connective tissue that keeps the trachea and bronchi open.<br/>
          <Bold>Mucus</Bold> — sticky fluid secreted by goblet cells that traps inhaled particles.<br/>
          <Bold>Cilia</Bold> — tiny hair-like projections that beat to sweep mucus up the airways.<br/>
          <Bold>Goblet cell</Bold> — a specialised epithelial cell that secretes mucus.<br/>
          <Bold>Oxygen debt <Ext /></Bold> — extra O₂ consumed after exercise to break down lactic acid produced anaerobically.<br/>
          <Bold>Emphysema <Ext /></Bold> — disease where alveolar walls are damaged → loss of surface area + elastic recoil.<br/>
          <Bold>Sternum</Bold> — the flat bone at the front of the rib cage to which the ribs attach.<br/>
          <Bold>Pleural membranes / pleural fluid</Bold> — two thin layers around the lungs with fluid between them; reduce friction during breathing.<br/>
          <Bold>Antagonistic muscles <Ext /></Bold> — a pair of muscles that work in opposite directions (e.g. external + internal intercostals).<br/>
          <Bold>Chemoreceptor <Ext /></Bold> — sensory cell that detects chemical changes (e.g. CO₂ level or pH) in the blood; those controlling breathing are in the medulla oblongata.<br/>
          <Bold>Forced exhalation <Ext /></Bold> — active breathing-out powered by the internal intercostals (e.g. during exercise or coughing).
        </div>
      </section>
    </div>
  );
}
