<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #fafaf7;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  .loader { position: fixed; inset: 0; background: #fafaf7; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; z-index: 100; transition: opacity 0.3s; }
  .loader.hidden { opacity: 0; pointer-events: none; }
  .loader-spinner { width: 36px; height: 36px; border: 3px solid #d8f3dc; border-top-color: #2d6a4f; border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loader-text { font-size: 13px; color: #888; letter-spacing: 0.5px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Theme toggle */
  .theme-toggle {
    position: fixed;
    top: max(env(safe-area-inset-top), 14px);
    right: 14px;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.92);
    border: 1px solid #e4e4e0;
    cursor: pointer;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }
  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }

  /* ═══════════════════════════════════════════════════════════════════════
     DARK MODE
     ═══════════════════════════════════════════════════════════════════════ */
  html.dark { background: #1a1a1a; }
  html.dark body { background: #1a1a1a; color: #e8e8e8; }
  html.dark .loader { background: #1a1a1a; }
  html.dark .loader-text { color: #999; }
  html.dark .theme-toggle { background: rgba(40, 40, 40, 0.92); border-color: #3a3a3a; }
  html.dark .theme-toggle svg { stroke: #f3d488; }
  html.dark .theme-toggle .icon-sun { display: block; }
  html.dark .theme-toggle .icon-moon { display: none; }

  /* ─── Pure white & off-white backgrounds → dark ─── */
  html.dark #root [style*="background: rgb(255, 255, 255)"],
  html.dark #root [style*="background:#fff"],
  html.dark #root [style*="background: #fff"] {
    background: #2a2a2a !important;
  }
  html.dark #root [style*="rgb(245, 245, 243)"],
  html.dark #root [style*="#f5f5f3"] { background: #232323 !important; }
  html.dark #root [style*="rgb(248, 248, 246)"],
  html.dark #root [style*="#f8f8f6"] { background: #252525 !important; }
  html.dark #root [style*="rgb(250, 250, 247)"],
  html.dark #root [style*="#fafaf7"] { background: #1a1a1a !important; }

  /* ─── Pastel backgrounds (exam cards, flashcard backs) → dark ─── */
  /* RL #fdf0f0 - light red/pink (exam card hard) */
  html.dark #root [style*="rgb(253, 240, 240)"],
  html.dark #root [style*="#fdf0f0"] { background: #2a1a1a !important; color: #e8e8e8 !important; }
  /* AL #fff3e0 - light amber */
  html.dark #root [style*="rgb(255, 243, 224)"],
  html.dark #root [style*="#fff3e0"] { background: #2a200f !important; color: #e8e8e8 !important; }
  /* PL #ede9fe - light purple */
  html.dark #root [style*="rgb(237, 233, 254)"],
  html.dark #root [style*="#ede9fe"] { background: #1f1c2e !important; color: #e8e8e8 !important; }
  /* GL #d8f3dc - light green */
  html.dark #root [style*="rgb(216, 243, 220)"],
  html.dark #root [style*="#d8f3dc"] { background: #182a1e !important; color: #e8e8e8 !important; }
  /* TLL #e6f4f2 - light teal */

  html.dark #root [style*="#e6f4f2"] { background: #1a2a28 !important; color: #e8e8e8 !important; }
  /* Flashcard back: #fffdf6 - cream */
  html.dark #root [style*="rgb(255, 253, 246)"],
  html.dark #root [style*="#fffdf6"] { background: #2a2820 !important; color: #e8e8e8 !important; }
  /* Exam card backgrounds (e8f7ec, fff4e6, fdf0f0 used in diffMeta.bg) */
  html.dark #root [style*="rgb(232, 247, 236)"],
  html.dark #root [style*="#e8f7ec"] { background: #182a1e !important; color: #e8e8e8 !important; }
  html.dark #root [style*="rgb(255, 244, 230)"],
  html.dark #root [style*="#fff4e6"] { background: #2a200f !important; color: #e8e8e8 !important; }

  /* Default text */
  html.dark #root > div { color: #e8e8e8 !important; }

  /* Grey text → light */
  html.dark #root [style*="color: rgb(61, 61, 61)"],
  html.dark #root [style*="color:#3d3d3d"],
  html.dark #root [style*="color: #3d3d3d"] { color: #e8e8e8 !important; }
  html.dark #root [style*="color: rgb(102, 102, 102)"],
  html.dark #root [style*="color:#666"],

  html.dark #root [style*="color: rgb(136, 136, 136)"],
  html.dark #root [style*="color:#888"],
  html.dark #root [style*="color: #888"] { color: #999 !important; }
  html.dark #root [style*="color: rgb(153, 153, 153)"],
  html.dark #root [style*="color:#999"],
  html.dark #root [style*="color: #999"] { color: #888 !important; }

  /* Border default */
  html.dark #root [style*="rgb(228, 228, 224)"],
  html.dark #root [style*="#e4e4e0"] { border-color: #3a3a3a !important; }

  /* Dark text on colored backgrounds (exam card question text "#2a0000") → light */
  html.dark #root [style*="rgb(42, 0, 0)"],
  html.dark #root [style*="#2a0000"] { color: #f0d4d4 !important; }
  /* Dark amber text on AL background */

  html.dark #root [style*="#2a1000"] { color: #f0d8b5 !important; }
  /* Highlighted dark red */
  html.dark #root [style*="rgb(58, 0, 0)"],

  html.dark #root strong[style*="#3d3d3d"] { color: #f0f0f0 !important; }

  /* ═══════════════════════════════════════════════════════════════════════
     TAB COLORS — vibrant neon for the 5 main tab buttons
     ═══════════════════════════════════════════════════════════════════════ */
  /* Tab text color (when not active) */
  html.dark #root button[style*="color: rgb(181, 84, 10)"],
  html.dark #root button[style*="color:#b5540a"],
  html.dark #root button[style*="color: #b5540a"] { color: #ffa726 !important; }
  html.dark #root button[style*="color: rgb(176, 32, 32)"],
  html.dark #root button[style*="color:#b02020"],
  html.dark #root button[style*="color: #b02020"] { color: #ff6b6b !important; }
  html.dark #root button[style*="color: rgb(91, 63, 166)"],
  html.dark #root button[style*="color:#5b3fa6"],
  html.dark #root button[style*="color: #5b3fa6"] { color: #a78bfa !important; }
  html.dark #root button[style*="color: rgb(45, 106, 79)"],
  html.dark #root button[style*="color:#2d6a4f"],
  html.dark #root button[style*="color: #2d6a4f"] { color: #5dcaa5 !important; }
  html.dark #root button[style*="color: rgb(26, 122, 110)"],
  html.dark #root button[style*="color:#1a7a6e"],
  html.dark #root button[style*="color: #1a7a6e"] { color: #5eead4 !important; }

  /* Tab active background */
  html.dark #root button[style*="background: rgb(181, 84, 10)"] { background-color: #ffa726 !important; border-color: #ffa726 !important; }
  html.dark #root button[style*="background: rgb(176, 32, 32)"] { background-color: #ff6b6b !important; border-color: #ff6b6b !important; }
  html.dark #root button[style*="background: rgb(91, 63, 166)"] { background-color: #a78bfa !important; border-color: #a78bfa !important; }
  html.dark #root button[style*="background: rgb(45, 106, 79)"] { background-color: #5dcaa5 !important; border-color: #5dcaa5 !important; }
  html.dark #root button[style*="background: rgb(26, 122, 110)"] { background-color: #5eead4 !important; border-color: #5eead4 !important; }

  /* Active tab: white text → dark text on neon bg */
  html.dark #root button[style*="background: rgb(181, 84, 10)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(176, 32, 32)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(91, 63, 166)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(45, 106, 79)"][style*="color: rgb(255, 255, 255)"],
  html.dark #root button[style*="background: rgb(26, 122, 110)"][style*="color: rgb(255, 255, 255)"] {
    color: #1a1a1a !important;
  }

  /* Tab borders */
  html.dark #root button[style*="2px solid rgb(181, 84, 10)"] { border-color: #ffa726 !important; }
  html.dark #root button[style*="2px solid rgb(176, 32, 32)"] { border-color: #ff6b6b !important; }
  html.dark #root button[style*="2px solid rgb(91, 63, 166)"] { border-color: #a78bfa !important; }
  html.dark #root button[style*="2px solid rgb(45, 106, 79)"] { border-color: #5dcaa5 !important; }
  html.dark #root button[style*="2px solid rgb(26, 122, 110)"] { border-color: #5eead4 !important; }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 2,
  title: "Organisation of the Organism",
  subtitle: "Cells · Specialised Cells · Tissues, Organs, Systems · Microscope & Magnification",
  flashcardCount: 50,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];
// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.2
// ════════════════════════════════════════════════════════════════════════════

// ── Animal cell vs Plant cell side-by-side ─────────────────────────────────
function AnimalVsPlantCell() {
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Generalised Animal Cell vs Plant Cell
      </text>

      {/* ── ANIMAL CELL ── */}
      <text x="160" y="48" textAnchor="middle" fontFamily="sans-serif" fontSize="13" fontWeight="700" fill={RD}>Animal cell</text>
      {/* membrane (irregular round) */}
      <ellipse cx="160" cy="200" rx="120" ry="100" fill="#fff7f0" stroke={RD} strokeWidth="2"/>
      {/* nucleus */}
      <circle cx="170" cy="180" r="32" fill="#f9e1d5" stroke={RD} strokeWidth="1.5"/>
      <circle cx="170" cy="180" r="8" fill={RD} opacity="0.6"/>
      {/* mitochondria */}
      <ellipse cx="100" cy="240" rx="14" ry="6" fill="#ffd9c2" stroke={RD} strokeWidth="1"/>
      <ellipse cx="220" cy="245" rx="14" ry="6" fill="#ffd9c2" stroke={RD} strokeWidth="1"/>
      <ellipse cx="200" cy="135" rx="12" ry="5" fill="#ffd9c2" stroke={RD} strokeWidth="1"/>
      {/* ribosomes (dots) */}
      {[[120,150],[140,260],[195,265],[230,170],[110,200],[180,250]].map(([x,y],i) => (
        <circle key={i} cx={x} cy={y} r="2.2" fill={RD}/>
      ))}
      {/* Labels */}
      <line x1="50" y1="125" x2="115" y2="170" stroke={RD} strokeWidth="0.8"/>
      <text x="48" y="122" textAnchor="end" fontFamily="sans-serif" fontSize="10" fill={GR}>cell membrane</text>
      <line x1="270" y1="180" x2="200" y2="180" stroke={RD} strokeWidth="0.8"/>
      <text x="275" y="184" fontFamily="sans-serif" fontSize="10" fill={GR}>nucleus</text>
      <line x1="50" y1="240" x2="86" y2="240" stroke={RD} strokeWidth="0.8"/>
      <text x="48" y="244" textAnchor="end" fontFamily="sans-serif" fontSize="10" fill={GR}>mitochondrion</text>
      <line x1="270" y1="245" x2="234" y2="245" stroke={RD} strokeWidth="0.8"/>
      <text x="275" y="249" fontFamily="sans-serif" fontSize="10" fill={GR}>cytoplasm</text>
      <line x1="270" y1="280" x2="220" y2="270" stroke={RD} strokeWidth="0.8"/>
      <text x="275" y="284" fontFamily="sans-serif" fontSize="10" fill={GR}>ribosome</text>

      {/* ── PLANT CELL ── */}
      <text x="540" y="48" textAnchor="middle" fontFamily="sans-serif" fontSize="13" fontWeight="700" fill={G}>Plant cell (palisade)</text>
      {/* cell wall (outer rectangle, square corners) */}
      <rect x="470" y="80" width="140" height="240" rx="6" fill="#e8f5e8" stroke={G} strokeWidth="2.5"/>
      {/* membrane (just inside wall) */}
      <rect x="476" y="86" width="128" height="228" rx="4" fill="none" stroke={G} strokeWidth="1" strokeDasharray="3,2"/>
      {/* large central vacuole */}
      <rect x="490" y="125" width="100" height="170" rx="14" fill="#f0fbf0" stroke={G} strokeWidth="1.5" opacity="0.6"/>
      {/* chloroplasts (around edge) */}
      {[[490,110],[540,110],[585,110],[490,300],[540,310],[585,300],[480,180],[480,240],[600,180],[600,240]].map(([x,y],i) => (
        <ellipse key={i} cx={x} cy={y} rx="9" ry="5" fill={GM} stroke={G} strokeWidth="1"/>
      ))}
      {/* nucleus pressed to side */}
      <circle cx="595" cy="160" r="14" fill="#f9e1d5" stroke={G} strokeWidth="1.5"/>
      <circle cx="595" cy="160" r="4" fill={G} opacity="0.5"/>
      {/* Labels */}
      <line x1="425" y1="100" x2="468" y2="92" stroke={G} strokeWidth="0.8"/>
      <text x="423" y="103" textAnchor="end" fontFamily="sans-serif" fontSize="10" fill={GR}>cell wall</text>
      <line x1="425" y1="140" x2="476" y2="120" stroke={G} strokeWidth="0.8"/>
      <text x="423" y="143" textAnchor="end" fontFamily="sans-serif" fontSize="10" fill={GR}>cell membrane</text>
      <line x1="425" y1="180" x2="490" y2="180" stroke={G} strokeWidth="0.8"/>
      <text x="423" y="184" textAnchor="end" fontFamily="sans-serif" fontSize="10" fill={GR}>chloroplast</text>
      <line x1="425" y1="220" x2="500" y2="220" stroke={G} strokeWidth="0.8"/>

      <line x1="630" y1="160" x2="610" y2="160" stroke={G} strokeWidth="0.8"/>
      <text x="635" y="164" fontFamily="sans-serif" fontSize="10" fill={GR}>nucleus</text>
      <line x1="630" y1="220" x2="600" y2="240" stroke={G} strokeWidth="0.8"/>
      <text x="635" y="224" fontFamily="sans-serif" fontSize="10" fill={GR}>cytoplasm</text>

      {/* central note */}
      <rect x="305" y="155" width="80" height="90" rx="8" fill="#fff" stroke={GR} strokeDasharray="4,3" strokeWidth="1"/>
      <text x="345" y="178" textAnchor="middle" fontFamily="sans-serif" fontSize="10" fontWeight="700" fill={GR}>Plant only:</text>
      <text x="345" y="196" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill={G}>+ cell wall</text>
      <text x="345" y="210" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill={G}>+ chloroplast</text>

      <text x="345" y="236" textAnchor="middle" fontFamily="sans-serif" fontSize="9" fill={G}>vacuole</text>
    </svg>
  );
}

// ── Bacterial cell diagram ─────────────────────────────────────────────────
function BacterialCell() {
  return (
    <svg viewBox="0 0 680 280" style={{ width: "100%", maxWidth: 680, display: "block", margin: "10px auto" }}>
      <rect width="680" height="280" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="340" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Generalised Bacterial Cell (Prokaryote)
      </text>

      {/* outer cell wall */}
      <ellipse cx="340" cy="155" rx="190" ry="75" fill="#fff5e6" stroke={AM} strokeWidth="2.5"/>
      {/* cell membrane (inner) */}
      <ellipse cx="340" cy="155" rx="184" ry="69" fill="#fffaf0" stroke={AM} strokeWidth="1" strokeDasharray="3,2"/>
      {/* circular DNA (coiled) */}
      <path d="M280 130 Q300 110, 320 130 T360 130 T400 130 Q420 145, 400 160 T360 160 T320 160 T280 160 Q260 145, 280 130 Z"
        fill="none" stroke="#7b3fbf" strokeWidth="2.5"/>
      {/* plasmids (small loops) */}
      <circle cx="240" cy="180" r="9" fill="none" stroke="#c54f8e" strokeWidth="2"/>
      <circle cx="430" cy="180" r="9" fill="none" stroke="#c54f8e" strokeWidth="2"/>

// ── Levels of organisation hierarchy ───────────────────────────────────────
function OrganisationLevels() {
  const levels = [
    { name: "Cell",         desc: "Smallest unit of life",                        ex: "Muscle cell · Palisade cell",      color: "#1a7a6e" },
    { name: "Tissue",       desc: "Group of similar cells with shared function",  ex: "Muscle · Epidermis · Xylem",        color: "#2d6a4f" },
    { name: "Organ",        desc: "Group of tissues working for one job",         ex: "Stomach · Heart · Leaf · Root",     color: "#5b3fa6" },
    { name: "Organ system", desc: "Group of organs with related functions",        ex: "Digestive · Circulatory · Shoot",   color: "#b5540a" },
    { name: "Organism",     desc: "Independent living thing — all systems",       ex: "A human · A flowering plant",        color: "#b02020" },
  ];
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Levels of Organisation — Cell → Organism
      </text>

      {levels.map((lv, i) => {
        const y = 50 + i * 58;
        return (
          <g key={i}>
            {/* arrow chain */}
            {i < levels.length - 1 && (
              <path d={`M120 ${y + 36} L120 ${y + 56}`} stroke={GR} strokeWidth="1.5" markerEnd="url(#arrow)"/>
            )}
            {/* circle marker */}
            <circle cx="120" cy={y + 18} r="22" fill={lv.color}/>
            <text x="120" y={y + 23} textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill="#fff">{i + 1}</text>
            {/* level box */}
            <rect x="155" y={y} width="525" height="46" rx="8" fill="#fff" stroke={lv.color} strokeWidth="1.5"/>
            <text x="170" y={y + 18} fontFamily="Georgia,serif" fontSize="13" fontWeight="700" fill={lv.color}>{lv.name}</text>
            <text x="170" y={y + 35} fontFamily="sans-serif" fontSize="10" fill={GR}>{lv.desc}</text>
            <text x="500" y={y + 18} fontFamily="sans-serif" fontSize="10" fontWeight="700" fill={lv.color}>Examples:</text>
            <text x="500" y={y + 35} fontFamily="sans-serif" fontSize="10" fill={GR}>{lv.ex}</text>
          </g>
        );
      })}
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill={GR}/>
        </marker>
      </defs>
    </svg>
  );
}

// ── Magnification worked-example (step by step) ────────────────────────────
function MagnificationWorkedExample() {
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={PU}>
        Magnification — Step-by-Step Calculation
      </text>

      {/* Problem box */}
      <rect x="20" y="40" width="660" height="44" rx="6" fill="#fff" stroke={PU} strokeWidth="1.2"/>
      <text x="35" y="60" fontFamily="sans-serif" fontSize="12" fontWeight="700" fill={PU}>Problem:</text>
      <text x="35" y="78" fontFamily="sans-serif" fontSize="11" fill={GR}>A drawing of a cell is 4.5 cm wide. The actual cell is 30 μm wide. Find the magnification.</text>

      {/* Step 1: identify */}
      <rect x="20" y="100" width="210" height="100" rx="8" fill={AL} stroke={AM} strokeWidth="1.5"/>
      <text x="35" y="120" fontFamily="sans-serif" fontSize="11" fontWeight="700" fill={AM}>STEP 1 — Identify</text>
      <text x="35" y="140" fontFamily="sans-serif" fontSize="10" fill={GR}>Image (I) = 4.5 cm</text>
      <text x="35" y="156" fontFamily="sans-serif" fontSize="10" fill={GR}>Actual (A) = 30 μm</text>
      <text x="35" y="178" fontFamily="sans-serif" fontSize="10" fontWeight="700" fill={AM}>⚠ Different units!</text>
      <text x="35" y="192" fontFamily="sans-serif" fontSize="9" fill={GR}>Must convert before dividing.</text>

      {/* Arrow */}
      <line x1="232" y1="150" x2="248" y2="150" stroke={GR} strokeWidth="1.5" markerEnd="url(#mw1)"/>

      {/* Step 2: convert */}
      <rect x="252" y="100" width="210" height="100" rx="8" fill={GL} stroke={G} strokeWidth="1.5"/>
      <text x="267" y="120" fontFamily="sans-serif" fontSize="11" fontWeight="700" fill={G}>STEP 2 — Convert units</text>
      <text x="267" y="140" fontFamily="sans-serif" fontSize="10" fill={GR}>4.5 cm → mm × 10</text>
      <text x="267" y="155" fontFamily="sans-serif" fontSize="10" fill={GR}>= 45 mm</text>
      <text x="267" y="173" fontFamily="sans-serif" fontSize="10" fill={GR}>45 mm → μm × 1000</text>
      <text x="267" y="188" fontFamily="sans-serif" fontSize="10" fontWeight="700" fill={G}>= 45 000 μm</text>

      {/* Arrow */}
      <line x1="464" y1="150" x2="480" y2="150" stroke={GR} strokeWidth="1.5" markerEnd="url(#mw1)"/>

      {/* Step 3: apply formula */}
      <rect x="484" y="100" width="196" height="100" rx="8" fill={PL} stroke={PU} strokeWidth="1.5"/>
      <text x="499" y="120" fontFamily="sans-serif" fontSize="11" fontWeight="700" fill={PU}>STEP 3 — Apply M = I÷A</text>
      <text x="499" y="140" fontFamily="sans-serif" fontSize="10" fill={GR}>M = 45 000 ÷ 30</text>
      <text x="499" y="160" fontFamily="sans-serif" fontSize="13" fontWeight="700" fill={PU}>M = ×1500</text>
      <text x="499" y="182" fontFamily="sans-serif" fontSize="9" fill={GR}>(no units — magnification</text>
      <text x="499" y="194" fontFamily="sans-serif" fontSize="9" fill={GR}>is a pure number)</text>

      {/* Common errors box */}
      <rect x="20" y="220" width="660" height="120" rx="8" fill={RL} stroke={RD} strokeWidth="1.5"/>
      <text x="35" y="240" fontFamily="sans-serif" fontSize="12" fontWeight="700" fill={RD}>⚠ Common Errors to Avoid</text>
      <text x="35" y="260" fontFamily="sans-serif" fontSize="10" fill={GR}>• Forgetting to convert: 4.5 ÷ 30 = 0.15 — NOT a magnification (less than 1!)</text>
      <text x="35" y="278" fontFamily="sans-serif" fontSize="10" fill={GR}>• Writing units on the answer: "×1500 μm" is wrong — should be "×1500"</text>
      <text x="35" y="296" fontFamily="sans-serif" fontSize="10" fill={GR}>• Mixing up I and A: M is always image (large) ÷ actual (small) → answer ≥ 1</text>
      <text x="35" y="314" fontFamily="sans-serif" fontSize="10" fill={GR}>• Sense check: most school cell drawings give magnifications between ×100 and ×2000</text>
      <text x="35" y="332" fontFamily="sans-serif" fontSize="10" fontWeight="700" fill={RD}>If your answer is &lt; 1 or &gt; 50 000 — recheck the units!</text>

      <defs>
        <marker id="mw1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill={GR}/>
        </marker>
      </defs>
    </svg>
  );
}

              )}
            </div>
          </div>
        );
      })}

      {/* Footer note for adding more */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

    </div>
  );

  const Def = ({ term, children }) => (

        <strong>Complete reference for Chapter 2</strong> — every concept, every diagram, every definition.<br/>
        Use this as a lookup when something is unclear. Sections marked <span style={{ background: PL, color: PU, padding: "1px 5px", borderRadius: 3, fontWeight: 700, fontSize: 10 }}>EXT</span> are Extended-tier only.
      </div>

      {/* Expand-all toggle */}

          {showAll ? "Collapse all" : "Expand all"}
        </button>
      </div>

      {/* ───── Section 1: Introduction & Cell Concept ───── */}
      <Sec id="t1" title="1 · The Cell — The Basic Unit of Life" page="24">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          When a thin slice of plant or animal tissue is examined under a microscope, it appears to be made of thousands of small box-like or rounded units. These tiny units are called <KW>cells</KW> — the building blocks of every living organism.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Plant tissue is firm enough to slice with a razor blade. Animal tissue is soft, so it must first be soaked in melted wax; once the wax solidifies, thin sections can be cut. After cutting, the wax is dissolved away. Specimens are usually <KW>stained</KW> (e.g. methylene blue, iodine) to show the structures inside the cell.
        </p>
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Cells vary widely in size and shape depending on their function, but most share certain features: a <KW>cell membrane</KW>, <KW>cytoplasm</KW>, and (usually) a <KW>nucleus</KW>.
        </p>
        <Tip>
          When the textbook says a slice is "60 times larger than life", it tells you the magnification of the image — that's how big the picture is compared with the real specimen. You'll do these calculations later.
        </Tip>
      </Sec>

      {/* ───── Section 2: Animal Cell Parts ───── */}
      <Sec id="t2" title="2 · Animal Cell Structure" page="26">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A typical animal cell has the following structures:
        </p>
        <Def term="Cell membrane">A thin <Bold>partially permeable</Bold> layer surrounding the cytoplasm. It controls which substances enter or leave the cell — oxygen, food and water are allowed in; waste products leave; harmful substances are kept out.</Def>
        <Def term="Cytoplasm">A jelly-like substance (mostly water with dissolved salts and sugars). It contains organelles and is the <Bold>site of most chemical reactions</Bold>. Some enzymes float freely; others are attached to membrane systems.</Def>
        <Def term="Nucleus">A round structure inside the cytoplasm. It contains <KW>chromosomes</KW> made of <KW>DNA</KW>. The nucleus controls which enzymes the cell makes — and therefore <Bold>controls cell activities, development and division</Bold>. A cell without a nucleus cannot reproduce.</Def>
        <Def term="Mitochondria">Tiny oval/rod-shaped organelles. They have an outer membrane and an inner folded membrane. Mitochondria carry out <KW>aerobic respiration</KW> — they release energy from food. Most numerous in cells with high energy demands (muscle, sperm). <Bold>Prokaryotes do not have mitochondria.</Bold></Def>
        <Def term="Ribosomes">Small dot-like structures attached to membranes or free in cytoplasm. They are the site of <KW>protein synthesis</KW>.</Def>

        <CellDivisionDiagram />
        <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, marginTop: 8 }}>
          When a cell divides, the <Bold>nucleus divides first</Bold>, followed by the cytoplasm pinching in two. This produces two daughter cells, one or both of which may divide again, while the other may become a specialised cell.
        </p>
        <Tip>
          Examiners love asking why the nucleus is essential. The answer: it controls the cell's chemistry (via enzymes) and is required for cell division. Without it, the cell cannot reproduce.
        </Tip>
      </Sec>

      {/* ───── Section 3: Plant Cell Parts ───── */}
      <Sec id="t3" title="3 · Plant Cell Structure" page="27">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          A plant cell has all the features of an animal cell <Bold>plus three extras</Bold> — a cell wall, chloroplasts, and a large permanent vacuole.
        </p>
        <Def term="Cell wall">A tough non-living layer made of <KW>cellulose</KW>, located outside the membrane. It is <Bold>fully (freely) permeable</Bold> — water and dissolved substances pass through it. It prevents the cell from bursting and gives the plant support.</Def>
        <Def term="Vacuole">A large fluid-filled space surrounded by a membrane (the <em>tonoplast</em>). It contains <KW>cell sap</KW> — a watery solution of sugars, salts and sometimes pigments. The vacuole pushes the cytoplasm against the cell wall, making the cell <Bold>turgid</Bold>. Animal cells may sometimes have small temporary vacuoles, but never a large permanent one.</Def>
        <Def term="Chloroplasts">Disc-shaped organelles found in <Bold>some</Bold> plant cells (especially leaf cells), but not in roots or other parts away from light. They contain the green pigment <KW>chlorophyll</KW> which absorbs light energy for <KW>photosynthesis</KW>.</Def>
        <AnimalVsPlantCell />
        <Tip>
          Two common student errors: (1) saying animal cells have no cell membrane — they do, but it's the only outer boundary. (2) saying plant cells don't have a cell membrane — they do, pressed tightly against the inside of the wall.
        </Tip>
      </Sec>

      {/* ───── Section 4: Bacterial Cell ───── */}
      <Sec id="t4" title="4 · Bacterial Cell Structure" page="29">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Bacteria are very small — usually less than <KW>0.01 mm</KW> long — and visible only under high magnification. They are single-celled <KW>prokaryotes</KW>: cells without a true nucleus or any membrane-bound organelles.
        </p>
        <BacterialCell />
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginTop: 8 }}>
          A bacterial cell has:
        </p>
        <Def term="Cell wall">A tough layer surrounding the cell membrane. <Bold>NOT made of cellulose</Bold> — it is made of a complex mixture of proteins, sugars and fats (peptidoglycan).</Def>
        <Def term="Cell membrane">Partially permeable, just below the cell wall. Controls movement of substances.</Def>
        <Def term="Cytoplasm">May contain food reserves such as <KW>glycogen</KW>, fats and sugars stored as granules.</Def>
        <Def term="Ribosomes">Small ribosomes (smaller than those in plant/animal cells), free in the cytoplasm. Site of <KW>protein synthesis</KW>.</Def>
        <Def term="Circular DNA">A single chromosome of <Bold>circular DNA</Bold>, coiled into a small region of the cell. <Bold>Not surrounded by a nuclear membrane</Bold> — this is a defining feature of prokaryotes.</Def>
        <Def term="Plasmids">Small extra rings of DNA. They carry useful genes (e.g. antibiotic resistance) and are widely used by scientists in <KW c={PU}>genetic engineering</KW> to insert foreign genes into bacteria.</Def>
        <Def term="Flagella (some)">Whip-like extensions that flick to move the bacterium through liquid.</Def>
        <Tip>
          The most common exam mistake: writing that bacteria "have a nucleus." They don't. They have circular DNA <em>without</em> a nuclear membrane. Also: bacterial cell walls are <em>not</em> made of cellulose (only plants are).
        </Tip>

        <div style={{ marginTop: 14, padding: "10px 14px", background: "#f7f9fc", borderRadius: 8, border: `1px solid ${BD}` }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 6 }}>Examples of bacteria</strong>
          <ul style={{ margin: 0, paddingLeft: 18, fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
            <li><KW>Lactobacillus</KW> — a rod-shaped bacterium used to make <Bold>yoghurt from milk</Bold>.</li>
            <li><KW>Pneumococcus</KW> — a spherical bacterium that acts as the pathogen causing <Bold>pneumonia</Bold>.</li>
          </ul>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Other organelles seen at high magnification</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Under an <KW>electron microscope</KW>, plant and animal cells reveal additional structures (not seen in prokaryotes):
          </p>
          <ul style={{ margin: "6px 0 0 0", paddingLeft: 18, fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
            <li><KW>Rough Endoplasmic Reticulum (RER)</KW> — a system of membranes studded with <Bold>ribosomes</Bold>; looks rough under the microscope. Site of protein assembly and transport.</li>
            <li><KW>Vesicles</KW> — small circular structures that move through the cytoplasm carrying substances between organelles.</li>
          </ul>
        </div>
      </Sec>

      {/* ───── Section 5: Specialised Cells ───── */}
      <Sec id="t5" title="5 · Specialised Cells" page="33">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          When cells stop dividing they become <KW>specialised</KW> for one job — they develop a distinct shape and special chemical reactions. This is sometimes called the <em>division of labour</em>: each type of cell does one thing very well, and depends on others for the rest.
        </p>
        <SpecialisedCells />

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Ciliated cells</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Found in the <KW>lining of the trachea, bronchi and nose</KW>. The cytoplasmic projections, <KW>cilia</KW>, beat continuously to push a stream of <Bold>mucus + trapped dust + bacteria</Bold> away from the lungs and up to the throat, where it is swallowed.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Root hair cells</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Found in the <KW>root tip epidermis</KW>. Each cell has a long, thin extension that pushes between soil particles, providing a <Bold>large surface area</Bold> for absorbing water and mineral ions. The very thin cell wall offers a <Bold>short diffusion path</Bold>.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Palisade mesophyll cells</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Found just beneath the upper epidermis of leaves. They are <KW>columnar (long)</KW> and <KW>packed with chloroplasts</KW> — the highest concentration of chlorophyll in the leaf. Their job is to <Bold>photosynthesise</Bold>, using CO₂, water and light to make glucose.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Neurones (nerve cells)</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Specialised to <Bold>conduct electrical impulses</Bold> along their <KW>fibre</KW>. They are often very long, connecting distant parts of the body to the central nervous system (e.g. foot to spinal cord).
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Red blood cells</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Tiny disc-like cells with <KW>NO nucleus when mature</KW> — leaving extra space for the red pigment <KW>haemoglobin</KW>. Haemoglobin combines reversibly with oxygen, so red blood cells <Bold>transport oxygen</Bold> around the body.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Sperm cells (male gametes)</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Three regions: an oval <KW>head</KW> with a nucleus and an <KW>acrosome</KW> tip (which secretes enzymes to digest cells around an egg and the egg membrane); a <KW>mid-piece</KW> packed with mitochondria for energy; and a <KW>tail</KW> for swimming. Function: <Bold>fertilise the egg</Bold>.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Egg cells (female gametes / ova)</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Larger than sperm, spherical, with a large amount of cytoplasm containing <KW>yolk droplets</KW> (protein and fat) to feed the early embryo. Surrounded by a jelly-like coat called the <KW>zona pellucida</KW>, with <KW>follicle cells</KW> on the outside. After fertilisation by a single sperm, the cell membrane <Bold>changes so that no further sperm can enter</Bold>. Function: <Bold>reproduction</Bold>.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Xylem vessels (plant)</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            Long hollow tubes that <Bold>conduct water through the plant</Bold> and provide <KW>support</KW>. Adaptations:
          </p>
          <ul style={{ margin: "6px 0 0 0", paddingLeft: 18, fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
            <li><KW>No top and bottom walls</KW> between vessels — gives a <Bold>continuous column of water</Bold> from root to leaf</li>
            <li>Cells are <KW>dead</KW> with <Bold>no organelles or cytoplasm</Bold> — allows free passage of water</li>
            <li>Walls thickened with <KW>lignin</KW> — gives strength to support the plant</li>
          </ul>
        </div>

        <Tip>
          For exam questions on adaptation, always link <em>structure</em> directly to <em>function</em>: "the cell has X, which lets it do Y because Z." Vague answers ("it is well-adapted") earn no marks.
        </Tip>
      </Sec>

      {/* ───── Section 6: Tissues, Organs, Systems, Organisms ───── */}
      <Sec id="t6" title="6 · Tissues, Organs, Organ Systems & Organisms" page="35">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          Multicellular organisms are too large for individual cells to survive alone. Cells are organised into ever-larger functional units:
        </p>
        <OrganisationLevels />
        <LeafTissueOrgan />

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Tissues</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: "0 0 6px 0" }}>
            A <KW>tissue</KW> is a group of cells with similar structures working together to perform a shared function. Common types include <Bold>epithelium</Bold> (sheets and linings, e.g. mouth lining, trachea), <Bold>tubes</Bold> (e.g. kidney tubules), <Bold>muscle</Bold>, and <Bold>glands</Bold> (e.g. salivary). In plants, examples include <Bold>epidermis</Bold>, <Bold>xylem</Bold>, <Bold>phloem</Bold> and <Bold>palisade tissue</Bold>.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Organs</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            An <KW>organ</KW> is a structure made of several tissues working together for a specific function. The <Bold>stomach</Bold> contains epithelial tissue (lining), gland tissue (digestive juices), and muscle tissue (churning). It is supplied by blood vessels and nerves. Other examples: heart, lungs, intestines, brain, eyes. In plants: root, stem, leaves.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Organ systems</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            An <KW>organ system</KW> is a group of organs with related functions. Examples: <Bold>circulatory</Bold> (heart + blood vessels), <Bold>nervous</Bold> (brain + spinal cord + nerves), <Bold>digestive</Bold> (mouth + stomach + intestines + liver + pancreas). In plants, the <Bold>shoot system</Bold> = stem + leaves + buds.
          </p>
        </div>

        <div style={{ marginTop: 12 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 4 }}>Organisms</strong>
          <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, margin: 0 }}>
            An <KW>organism</KW> is a living thing with an organised structure that can react to stimuli, reproduce, grow, adapt, and maintain homeostasis. The full hierarchy in a human body: <em>cell → tissue (e.g. muscle) → organ (e.g. stomach) → organ system (digestive) → organism (human).</em>
          </p>
        </div>

        <div style={{ marginTop: 14 }}>
          <strong style={{ color: G, fontSize: 13, display: "block", marginBottom: 6 }}>Reference table — major organ systems</strong>
          <div style={{ overflow: "auto", border: `1px solid ${BD}`, borderRadius: 8 }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11.5, minWidth: 480 }}>
              <thead>
                <tr style={{ background: GL }}>
                  <th style={{ textAlign: "left", padding: "7px 10px", color: G, fontWeight: 700, borderBottom: `1.5px solid ${G}`, width: "30%" }}>Organ system</th>
                  <th style={{ textAlign: "left", padding: "7px 10px", color: G, fontWeight: 700, borderBottom: `1.5px solid ${G}`, width: "40%" }}>Example organs</th>
                  <th style={{ textAlign: "left", padding: "7px 10px", color: G, fontWeight: 700, borderBottom: `1.5px solid ${G}`, width: "30%" }}>Tissue examples</th>
                </tr>
              </thead>
              <tbody>
                {[
                  ["Shoot system (plant)",   "Leaf, stem, flower, fruit",                       "Epidermis, mesophyll, xylem, phloem"],
                  ["Root system (plant)",    "Root, tuber",                                     "Xylem, phloem, ground tissue"],
                  ["Digestive",              "Oesophagus, stomach, small + large intestine",    "Muscle, connective, nerve, epithelial"],
                  ["Circulatory",            "Heart, veins, arteries",                          "Muscle, connective, nerve, epithelial"],
                  ["Immune",                 "Thymus, spleen",                                   "Bone marrow"],
                  ["Respiratory",            "Trachea, bronchi, lungs",                          "Connective, muscle, epithelial"],
                  ["Excretory",              "Liver, kidney, skin, lungs",                       "Muscle, connective, epithelial, nerve"],
                  ["Nervous",                "Brain, spinal cord",                               "Nerve"],
                  ["Reproductive",           "Ovary, uterus, vagina, testes, penis",             "Muscle, connective, nerve"],
                ].map((r, i) => (
                  <tr key={i} style={{ background: i % 2 ? "#fafaf7" : "#fff" }}>
                    <td style={{ padding: "6px 10px", borderBottom: `1px solid ${BD}`, color: G, fontWeight: 600 }}>{r[0]}</td>
                    <td style={{ padding: "6px 10px", borderBottom: `1px solid ${BD}`, color: GR }}>{r[1]}</td>
                    <td style={{ padding: "6px 10px", borderBottom: `1px solid ${BD}`, color: GR }}>{r[2]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>

        <Tip>
          Exam definitions must be precise. "A tissue is many cells" earns 0 marks. The key phrases: "<em>similar structure</em>", "<em>shared function</em>", "<em>working together</em>". Memorise the wording exactly.
        </Tip>
      </Sec>

      {/* ───── Section 7: Microscope & Magnification ───── */}
      <Sec id="t7" title="7 · The Microscope & Magnification" page="37">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Most cells are too small for the naked eye. A hand lens has a magnification of about ×20. A school <KW>light microscope</KW> usually magnifies up to ×400, but the best can go to ×1500. <KW>Electron microscopes</KW> can magnify hundreds of thousands of times and reveal the structure of organelles.
        </p>
        <MicroscopeDiagram />
        <p style={{ fontSize: 12.5, color: GR, lineHeight: 1.7, marginTop: 8 }}>
          The light microscope has two convex lenses: an <KW>eyepiece</KW> (usually ×10) and a choice of <KW>objective lenses</KW> (commonly ×4, ×10, ×40) on a rotating nosepiece. Light passes from a mirror or lamp, through the specimen on the <Bold>stage</Bold>, then through the lenses. The <Bold>focusing dial</Bold> moves the stage up/down for a sharp image.
        </p>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Calculating magnification</strong>
          Total magnification = <KW>eyepiece × objective</KW>. Example: ×10 eyepiece + ×40 objective → total = ×400.
        </div>

        <div style={{ marginTop: 10, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          When you draw what you see, your drawing is usually larger than the microscope image, so the total magnification of the drawing is even bigger.
        </div>

        <Def term="Magnification">The observed (image) size divided by the actual size of the specimen. <Bold>It has no units</Bold> — write it as "×400", not "×400 mm".</Def>

        <MagnificationTriangle />
        <MagnificationWorkedExample />

        <div style={{ marginTop: 10, background: GL, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Worked example</strong>
          A drawing of a cell is 6 cm wide. Its actual size is 0.1 mm.<br/>
          → Convert: 6 cm = 60 mm.<br/>
          → Magnification = image ÷ actual = 60 ÷ 0.1 = <KW>×600</KW>.
        </div>

        <Tip>
          Always check both measurements are in the <em>same unit</em> before dividing. The most common error is dividing 6 cm by 0.1 mm directly — wrong by a factor of 10. Also: magnification has <em>no units</em>.
        </Tip>
      </Sec>

      {/* ───── Section 8: Size Units ───── */}
      <Sec id="t8" title="8 · Size of Specimens — Converting mm and μm" page="39">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 8 }}>
          Cell organelles are often too small to measure in millimetres, so a smaller unit — the <KW>micrometre (μm)</KW> — is used.
        </p>
        <SizeScale />

        <div style={{ marginTop: 12, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, color: "#5a3a00", lineHeight: 1.8 }}>
          <strong style={{ color: AM, display: "block", marginBottom: 4 }}>Conversions to memorise:</strong>
          1 metre = 1 000 000 μm<br/>
          1 centimetre = 10 000 μm<br/>
          <Bold>1 millimetre = 1 000 μm</Bold> (most useful)<br/>
          So 0.05 mm = 50 μm; 750 μm = 0.75 mm = 0.075 cm.
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: G, display: "block", marginBottom: 4 }}>Worked examples</strong>
          1) The tail of a sperm cell is 0.05 mm long. Length in μm? → 0.05 × 1000 = <KW>50 μm</KW>.<br/>
          2) An amoeba is 750 μm long. Length in cm? → 750 ÷ 10 000 = <KW>0.075 cm</KW>.<br/>
          3) Drawing of a red blood cell is 14 mm wide. Actual cell is 7 μm. Magnification?<br/>
          → Convert 14 mm = 14 000 μm. → 14 000 ÷ 7 = <KW>×2000</KW>.
        </div>

        <Tip>
          Quick check: if you're calculating magnification and the answer comes out less than ×1, you've forgotten to convert. The magnification of a drawing of a cell is almost always at least several hundred.
        </Tip>
      </Sec>
    </div>
  );
}

    // ── Extra Specialised (3) ──
    { id: 46, cat: "specialised", q: "Explain why ciliated cells contain many mitochondria.",
      a: <>The cilia beat continuously to move mucus, requiring lots of <KW>energy</KW>. Mitochondria carry out <Bold>aerobic respiration</Bold> to release this energy.</> },
    { id: 47, cat: "specialised", q: "Why does the sperm cell's mid-piece contain so many mitochondria?",
      a: <>The mitochondria release <KW>energy by aerobic respiration</KW> to power the <Bold>tail's swimming motion</Bold> as the sperm travels to the egg.</> },
    { id: 48, cat: "specialised", q: "Why are mature xylem vessels DEAD with no cytoplasm?",
      a: <>Empty hollow tubes give a <KW>continuous water column</KW> from root to leaf with <Bold>no obstruction</Bold>. Lignified walls also provide structural support.</> },

    // ── Extra Microscope (2) ──
    { id: 49, cat: "microscope", q: "Convert 0.0025 cm to micrometres (μm).",
      a: <>0.0025 cm × 10 000 = <KW>25 μm</KW>. Or: 0.0025 cm → 0.025 mm → 25 μm.</> },
    { id: 50, cat: "microscope", q: "An electron micrograph shows a 1 μm scale bar that measures 5 mm long. What is the magnification?",
      a: <>Image of scale bar = 5 mm = <KW>5000 μm</KW>. Mag = 5000 ÷ 1 = <Bold>×5000</Bold>.</> },
  ];

  // count cards per category
  categories.forEach(c => {
    c.count = c.id === "all" ? cards.length : cards.filter(x => x.cat === c.id).length;
  });

  const visibleCards = activeCat === "all" ? cards : cards.filter(c => c.cat === activeCat);
  const flippedCount = visibleCards.filter(c => flipped[c.id]).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Header banner */}
      <div style={{ background: TL, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📇 Save My Exams · 50 Flashcards</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>Click any card to flip · Filter by category · Track your progress</div>
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        {categories.map(c => (
          <button key={c.id} onClick={() => setActiveCat(c.id)}
            style={{
              padding: "6px 11px", borderRadius: 16,
              border: activeCat === c.id ? `2px solid ${c.color}` : `1.5px solid ${BD}`,
              background: activeCat === c.id ? c.color : "#fff",
              color: activeCat === c.id ? "#fff" : c.color,
              fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
            }}>
            {c.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({c.count})</span>
          </button>
        ))}
      </div>

      {/* Progress + control bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
        background: TLL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: TL }}>
        <div>
          <Bold>Progress:</Bold> {flippedCount} / {visibleCards.length} revealed
          <div style={{ width: 140, height: 5, background: "#fff", borderRadius: 3, marginTop: 4, overflow: "hidden" }}>
            <div style={{ width: `${visibleCards.length ? (flippedCount / visibleCards.length) * 100 : 0}%`,
              height: "100%", background: TL, transition: "width .3s" }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => flipAll(true)}  style={btnSm(TL,  true)}>Flip all</button>
          <button onClick={() => flipAll(false)} style={btnSm(TL, false)}>Reset</button>
        </div>
      </div>

      {/* Card grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
        {visibleCards.map(c => {
          const isFlip = !!flipped[c.id];
          const catColor = categories.find(x => x.id === c.cat)?.color || TL;
          return (
            <div key={c.id} onClick={() => toggle(c.id)}
              style={{
                position: "relative", minHeight: 180, cursor: "pointer",
                border: `1.5px solid ${isFlip ? catColor : BD}`,
                borderRadius: 10,
                background: isFlip ? "#fffdf6" : "#fff",
                padding: "12px 14px", transition: "all .2s",
                boxShadow: isFlip ? `0 2px 8px ${catColor}22` : "0 1px 3px #00000010",
                display: "flex", flexDirection: "column",
              }}>
              {/* Card header */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                fontSize: 10, color: catColor, fontWeight: 700, letterSpacing: 0.5, marginBottom: 6 }}>
                <span>#{c.id} · {categories.find(x => x.id === c.cat).label.toUpperCase()}</span>
                <span style={{ fontSize: 10, color: "#999" }}>{isFlip ? "ANSWER ↺" : "Q · click ↻"}</span>
              </div>
              {/* Card body */}
              <div style={{ fontSize: 12.5, lineHeight: 1.55, color: GR, flex: 1 }}>
                {isFlip ? c.a : <span style={{ fontWeight: 600 }}>{c.q}</span>}
              </div>
            </div>
          );
        })}
      </div>

      {/* Footer note */}
      <div style={{ marginTop: 6, padding: "9px 14px", background: GL, borderRadius: 8,
        fontSize: 11, color: G, textAlign: "center", lineHeight: 1.5 }}>
        💡 <Bold>Study tip:</Bold> Read the question, attempt your answer aloud, then flip to check.
        Use category filters to drill weak areas.
      </div>
    </div>
  );
}

const btnSm = (color, filled) => ({
  padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
  border: `1.5px solid ${color}`,
  background: filled ? color : "#fff",
  color: filled ? "#fff" : color,
});
