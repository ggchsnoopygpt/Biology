<style>

  .theme-toggle:hover { transform: scale(1.08); }
  .theme-toggle svg { width: 18px; height: 18px; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke: #2d6a4f; }

  .theme-toggle .icon-moon { display: block; }

  /* ═══════════════════════════════════════════════════════════════════════

    font-weight: 900;

     ═══════════════════════════════════════════════════════════════════════ */

  /* ═══════════════════════════════════════════════════════════════════════
     TAB COLORS — vibrant neon for the 5 main tab buttons
     ═══════════════════════════════════════════════════════════════════════ */
  /* Tab text color (when not active) */
  html.dark #root button[style*="color: rgb(181, 84, 10)"],
  html.dark #root button[style*="color:#b5540a"],

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 17,
  title: "Inheritance",
  subtitle: "Chromosomes · Genes · DNA · Mitosis · Meiosis · Monohybrid · Sex linkage",
  flashcardCount: 81,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.17
// ════════════════════════════════════════════════════════════════════════════

// ── Chromosome structure ─────────────────────────────────────────────────────
function ChromosomeStructureSVG() {
  return (
    <svg viewBox="0 0 700 320" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="320" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Structure of a Chromosome (replicated, ready to divide)
      </text>

      {/* Left chromatid */}
      <path d="M 230 70 Q 215 75 218 100 L 222 150 Q 220 160 225 168 L 222 175 Q 218 240 232 280" fill="none" stroke="#4488cc" strokeWidth="22" strokeLinecap="round"/>
      {/* Right chromatid */}
      <path d="M 290 70 Q 305 75 302 100 L 298 150 Q 300 160 295 168 L 298 175 Q 302 240 288 280" fill="none" stroke="#cc4444" strokeWidth="22" strokeLinecap="round"/>

      {/* Centromere */}
      <ellipse cx="260" cy="170" rx="40" ry="10" fill="#fff" stroke={GR} strokeWidth="1.5"/>
      <text x="380" y="155" fontSize="12" fontWeight="700" fill={GR}>centromere</text>
      <text x="380" y="170" fontSize="10" fill="#666">point of attachment</text>
      <line x1="305" y1="170" x2="375" y2="160" stroke={GR} strokeWidth="1"/>

      {/* Chromatids label */}
      <text x="100" y="120" fontSize="12" fontWeight="700" fill="#4488cc">chromatid 1</text>
      <text x="100" y="135" fontSize="10" fill="#666">(identical copy)</text>
      <line x1="155" y1="120" x2="218" y2="115" stroke={GR} strokeWidth="1"/>

      <text x="100" y="220" fontSize="12" fontWeight="700" fill="#cc4444">chromatid 2</text>
      <text x="100" y="235" fontSize="10" fill="#666">(identical copy)</text>
      <line x1="155" y1="225" x2="296" y2="230" stroke={GR} strokeWidth="1"/>

      {/* Genes on chromatid - shown as bands */}
      <rect x="214" y="85" width="14" height="6" fill="#fff"/>
      <rect x="214" y="110" width="14" height="6" fill="#ffe066"/>
      <rect x="214" y="135" width="14" height="6" fill="#fff"/>
      <rect x="214" y="200" width="14" height="6" fill="#88dd88"/>
      <rect x="214" y="230" width="14" height="6" fill="#fff"/>
      <rect x="214" y="255" width="14" height="6" fill="#ff8844"/>

      <rect x="292" y="85" width="14" height="6" fill="#fff"/>
      <rect x="292" y="110" width="14" height="6" fill="#ffe066"/>
      <rect x="292" y="135" width="14" height="6" fill="#fff"/>
      <rect x="292" y="200" width="14" height="6" fill="#88dd88"/>
      <rect x="292" y="230" width="14" height="6" fill="#fff"/>
      <rect x="292" y="255" width="14" height="6" fill="#ff8844"/>

      {/* Gene callout */}
      <text x="380" y="260" fontSize="12" fontWeight="700" fill={AM}>gene</text>

      <line x1="310" y1="258" x2="375" y2="263" stroke={GR} strokeWidth="1"/>

      <text x="500" y="125" fontSize="11" fill={GR}>• A chromosome is a long DNA</text>
      <text x="500" y="140" fontSize="11" fill={GR}>  molecule packed with proteins.</text>
      <text x="500" y="160" fontSize="11" fill={GR}>• It carries many genes in a</text>

// ── Sex determination Punnett ────────────────────────────────────────────────
function SexDeterminationSVG() {
  return (
    <svg viewBox="0 0 700 380" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="380" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>

      <circle cx="180" cy="80" r="32" fill="#cce4ff" stroke="#4488cc" strokeWidth="1.5"/>
      <text x="180" y="78" textAnchor="middle" fontSize="13" fontWeight="700" fill="#4488cc">♂ FATHER</text>
      <text x="180" y="95" textAnchor="middle" fontSize="13" fontWeight="700" fill={GR}>XY</text>

      <text x="350" y="85" textAnchor="middle" fontSize="20" fontWeight="700" fill={GR}>×</text>

      <circle cx="520" cy="80" r="32" fill="#ffd6e0" stroke="#cc4488" strokeWidth="1.5"/>
      <text x="520" y="78" textAnchor="middle" fontSize="13" fontWeight="700" fill="#cc4488">♀ MOTHER</text>
      <text x="520" y="95" textAnchor="middle" fontSize="13" fontWeight="700" fill={GR}>XX</text>

      {/* Gametes */}
      <text x="40" y="155" fontSize="11" fontWeight="700" fill="#666">GAMETES</text>
      {/* Father's sperm */}
      <line x1="180" y1="115" x2="140" y2="155" stroke={GR} strokeWidth="1.2"/>

// ── DNA → mRNA → Protein (EXT) ───────────────────────────────────────────────
function DnaProteinSVG() {

      </text>

      {/* Stage 1: DNA */}
      <text x="80" y="55" fontSize="11" fontWeight="700" fill={PU}>① DNA in nucleus</text>
      {/* Two DNA strands */}
      <line x1="60" y1="70" x2="60" y2="220" stroke="#4488cc" strokeWidth="2"/>

      {[
        ["C","G",85],["A","T",110],["T","A",135],["G","C",160],["C","G",185],["A","T",210]

        <g key={i}>
          <line x1="60" y1={y} x2="100" y2={y} stroke="#aaa" strokeWidth="1.2"/>
          <rect x="55" y={y-7} width="14" height="14" fill="#ffe066"/>

      <text x="80" y="240" fontSize="10" textAnchor="middle" fill="#666">double helix</text>

      {/* Arrow 1 */}
      <path d="M 130 145 L 175 145" stroke={PU} strokeWidth="2" markerEnd="url(#arrow1)"/>
      <defs>
        <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
          <path d="M0,0 L0,6 L9,3 z" fill={PU}/>
        </marker>
      </defs>
      <text x="152" y="138" textAnchor="middle" fontSize="10" fill={PU}>unwinds,</text>
      <text x="152" y="151" textAnchor="middle" fontSize="10" fill={PU}>copied</text>

      {/* Stage 2: mRNA */}
      <text x="220" y="55" fontSize="11" fontWeight="700" fill={PU}>② mRNA (single strand)</text>
      <line x1="220" y1="70" x2="220" y2="220" stroke="#cc4488" strokeWidth="2"/>

        ["G",85],["U",110],["A",135],["C",160],["G",185],["U",210]

      {/* Triplet brackets */}
      <path d="M 235 78 L 250 78 L 250 138 L 235 138" fill="none" stroke="#666" strokeWidth="1"/>

      <path d="M 235 153 L 250 153 L 250 213 L 235 213" fill="none" stroke="#666" strokeWidth="1"/>
      <text x="270" y="190" fontSize="10" fontWeight="700" fill={GR}>triplet 2</text>

      {/* Arrow 2 */}
      <path d="M 320 145 L 365 145" stroke={PU} strokeWidth="2" markerEnd="url(#arrow1)"/>
      <text x="342" y="138" textAnchor="middle" fontSize="10" fill={PU}>read at</text>
      <text x="342" y="151" textAnchor="middle" fontSize="10" fill={PU}>ribosome</text>

      {/* Stage 3: amino acids */}
      <text x="430" y="55" fontSize="11" fontWeight="700" fill={PU}>③ Amino acids → Protein</text>
      <circle cx="430" cy="100" r="22" fill="#88dd88" stroke={G} strokeWidth="1.5"/>
      <text x="430" y="104" textAnchor="middle" fontSize="10" fontWeight="700" fill={G}>Gly</text>
      <circle cx="490" cy="120" r="22" fill="#88dd88" stroke={G} strokeWidth="1.5"/>
      <text x="490" y="124" textAnchor="middle" fontSize="10" fontWeight="700" fill={G}>Val</text>
      <circle cx="550" cy="100" r="22" fill="#88dd88" stroke={G} strokeWidth="1.5"/>
      <text x="550" y="104" textAnchor="middle" fontSize="10" fontWeight="700" fill={G}>Ala</text>
      <circle cx="610" cy="130" r="22" fill="#88dd88" stroke={G} strokeWidth="1.5"/>
      <text x="610" y="134" textAnchor="middle" fontSize="10" fontWeight="700" fill={G}>Ser</text>

      <line x1="452" y1="100" x2="468" y2="120" stroke={G} strokeWidth="2"/>
      <line x1="512" y1="120" x2="528" y2="100" stroke={G} strokeWidth="2"/>
      <line x1="572" y1="100" x2="588" y2="130" stroke={G} strokeWidth="2"/>

      <text x="520" y="170" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>chain of amino acids</text>
      <text x="520" y="185" textAnchor="middle" fontSize="10" fill="#666">= a PROTEIN</text>

      {/* Bottom info box */}
      <rect x="40" y="275" width="630" height="130" rx="8" fill="#fff" stroke={PU} strokeWidth="1.5"/>
      <text x="355" y="295" textAnchor="middle" fontSize="12" fontWeight="700" fill={PU}>The Triplet Code — every 3 DNA bases = 1 amino acid</text>
      <text x="55" y="318" fontSize="11" fill={GR}>• DNA stays in the <tspan fontWeight="700">nucleus</tspan>. mRNA carries the code OUT through nuclear pores to the cytoplasm.</text>
      <text x="55" y="338" fontSize="11" fill={GR}>• mRNA attaches to a <tspan fontWeight="700" fill={PU}>RIBOSOME</tspan>. The ribosome reads triplets and links the matching amino acids.</text>
      <text x="55" y="358" fontSize="11" fill={GR}>• Different sequences of amino acids → different shapes → different proteins (enzymes, antibodies, receptors).</text>
      <text x="55" y="378" fontSize="11" fill={GR}>• Gene expression: every cell has ALL the genes, but only those <tspan fontWeight="700" fill={PU}>switched on</tspan> are expressed → cell specialisation.</text>
      <text x="55" y="398" fontSize="11" fill={GR}>• mRNA bases: A, C, G, <tspan fontWeight="700" fill="#cc4488">U</tspan> (not T). U pairs with the DNA template base A.</text>
    </svg>
  );
}

            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Chromosomes</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>46 → 46 (no change)</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>46 → 23 (HALVED)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 6 }}>Genetics</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>IDENTICAL (clones)</td><td style={{ border: `1px solid ${BD}`, padding: 6, textAlign: "center" }}>VARIED (recombination)</td></tr>

          </tbody>
        </table>
      </Card>

      <Card title="⑤ STEM CELLS — What &amp; Why" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li>Stem cells are <KW c={AM}>UNSPECIALISED</KW> cells that divide by mitosis and can develop into many types of specialised cell.</li>
          <li>Examples: <Bold>basal cells of skin</Bold> (→ skin cells), <Bold>red bone marrow</Bold> cells (→ all blood cells), <Bold>embryonic stem cells</Bold> (→ any cell type).</li>
          <li>Uses: treat leukaemia (bone marrow transplant); research into spinal cord injury, diabetes, etc.</li>
          <li>Ethical issue: embryonic stem cells destroy embryos → adult stem cells avoid this.</li>
        </ul>
      </Card>

      <Card title="⑥ MONOHYBRID CROSS — The two-step recipe" color={AM} bg={AL}>
        <ol style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Letters:</Bold> capital = dominant, lowercase = same letter for recessive (e.g. B / b — NEVER B / w).</li>
          <li><Bold>Parents</Bold> → write genotypes (e.g. Bb × Bb).</li>
          <li><Bold>Gametes</Bold> → each parent gives ONE allele (circle them).</li>
          <li><Bold>Punnett square</Bold> → write parent 1's gametes along top, parent 2's down the side; fill in four cells.</li>
          <li><Bold>Genotype ratio</Bold>: e.g. 1 BB : 2 Bb : 1 bb. <Bold>Phenotype ratio</Bold>: e.g. 3 black : 1 brown.</li>
          <li>Bb × bb (test cross) → 1 : 1 ratio; tells you the unknown parent's genotype.</li>
        </ol>
      </Card>

      <Card title="⑦ THE FAMOUS RATIOS — Memorise these" color={AM} bg={AL}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead><tr><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Cross</th><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Phenotype ratio</th></tr></thead>
          <tbody>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Bb × Bb</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>3 dominant : 1 recessive</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Bb × bb (test cross)</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>1 : 1</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>BB × Bb</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>all dominant (BB or Bb)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>BB × bb (P generation)</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>all heterozygous Bb (all dominant)</td></tr>
            <tr><td style={{ border: `1px solid ${BD}`, padding: 5 }}>Co-dominance — pink × pink (CʀCᴡ × CʀCᴡ)</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>1 red : 2 pink : 1 white</td></tr>
          </tbody>
        </table>
      </Card>

      <Card title="⑧ CO-DOMINANCE — ABO Blood Groups" color={AM} bg={AL}>
        <div style={{ marginBottom: 5 }}>Three alleles: <KW c={AM}>Iᴬ, Iᴮ, Iᴼ</KW>. Each person carries <Bold>2 of the 3</Bold>.</div>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginBottom: 5 }}>
          <thead><tr><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Genotype</th><th style={{ border: `1px solid ${BD}`, padding: 5, color: AM }}>Blood group</th></tr></thead>

            <tr><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>IᴼIᴼ</td><td style={{ border: `1px solid ${BD}`, padding: 5, textAlign: "center" }}>O</td></tr>
          </tbody>
        </table>
        <div><Bold>Rule:</Bold> Iᴬ and Iᴮ are co-dominant (both shown in AB). Iᴼ is recessive to both.</div>
      </Card>

      <Card title="⑨ SEX LINKAGE — Why males are more affected" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>Sex-linked characteristic</Bold>: the gene is on a <KW c={AM}>sex chromosome</KW> (almost always X).</li>
          <li>X chromosome carries many genes; Y is small and carries few. A male's single X has <Bold>no matching Y partner</Bold> for these genes.</li>
          <li>If a recessive allele is on the X: <Bold>males will show it whenever they inherit it</Bold> (only one copy needed); <Bold>females need two copies</Bold> (one on each X).</li>
          <li>Examples: <KW c={AM}>red–green colour blindness</KW>, haemophilia, Duchenne muscular dystrophy.</li>
          <li>Notation: Xᶜ = X carrying colour-blind allele. ♀ XᶜXᶜ = affected; ♀ XᶜX = carrier; ♂ XᶜY = affected.</li>
        </ul>
      </Card>

      <Card title="⑩ PEDIGREE DIAGRAMS — Reading rules" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li>□ = male, ○ = female, ■ ● = affected, ◐ = carrier, horizontal line = marriage, vertical line = offspring.</li>
          <li>If <Bold>two unaffected parents</Bold> have an affected child → the trait is <KW c={AM}>RECESSIVE</KW> and both parents are carriers.</li>
          <li>If the trait <Bold>skips generations</Bold> → likely recessive.</li>
          <li>If <Bold>only males</Bold> are affected, passed through unaffected mothers → likely <KW c={AM}>sex-linked recessive</KW> (e.g. colour blindness).</li>
          <li>If <Bold>every affected person has an affected parent</Bold> → likely dominant.</li>
        </ul>
      </Card>

      <Card title="⑪ SME STUDY TIPS — Useful mental models" color={AM} bg={AL}>
        <ul style={{ margin: 0, paddingLeft: 18 }}>
          <li><Bold>"Zoom model"</Bold> — when locating DNA / genes / bases, picture a camera zooming in: cell → nucleus → chromosome → gene → DNA bases. Useful for "where is...?" questions.</li>
          <li><Bold>"Ha-ploid = Ha-lf"</Bold> — easy mnemonic for HAploid = HAlf the normal chromosome number (diploid → halved → haploid).</li>
          <li><Bold>Bases ≠ amino acids.</Bold> DNA/RNA is made of BASES (A, T/U, C, G); proteins are made of AMINO ACIDS. Each triplet (3 bases) → 1 amino acid.</li>
          <li><Bold>Choose distinct letters</Bold> in Punnett squares: T/t and A/a are clear; C/c and S/s can look identical in handwriting and cost you marks.</li>
          <li><Bold>Differ chromosome number ≠ human number.</Bold> Mouse 40, garden pea 14, fruit fly 8 — read questions carefully before assuming 46.</li>
        </ul>
      </Card>

      <div style={{ marginTop: 14, padding: "12px 16px", background: AL, borderRadius: 10, fontSize: 12, color: AM, border: `1.5px solid ${AM}` }}>
        🎯 <Bold>Examiner traps:</Bold> (1) "Gene ≠ allele" — gene is a length of DNA coding for a protein; allele is an alternative version of that gene. (2) "Phenotype ≠ genotype" — phenotype is what you SEE; genotype is the letters (alleles) inside. (3) "BB and Bb look the same" — both are black; only test cross with bb reveals the difference. (4) "Use SAME letter — B/b, not B/w." (5) Sex chromosomes are pair 23 of 23; do NOT call them "the 46th chromosome." (6) For sex-linked, ALWAYS write Xᶜ (carrying the allele ON the X), never just c by itself.
      </div>
    </div>
  );
}

      type: "standard",
      q: "SME Theory Q-M6 (muntjac deer chromosomes + meiosis, 10 marks)\nThe Indian muntjac (Muntiacus muntjak) has the LOWEST chromosome number of any mammal. A karyotype shows a female muntjac has 6 chromosomes total (2 large autosomes + 2 small autosomes + 2 sex chromosomes shown as identical X's). A male karyotype shows the same autosomes but a different sex-chromosome pair (one X, one much smaller Y).\n  (a) State the diploid chromosome number for the female muntjac.  [1]\n  (b) Describe how the sex chromosomes of the male muntjac differ from those of the female.  [2]\n  (c) Explain how MEIOSIS results in variation among offspring. Use the words 'chromosome' and 'gametes' in your answer.  [4]  EXT\n  (d) New alleles can also be a source of variation. Describe how new alleles are formed.  [3]",

      a: "(a) [1] Diploid number = 6 chromosomes (3 pairs).\n\n(b) [2]\n• Female: TWO IDENTICAL sex chromosomes (both X) — equal size and shape. [1]\n• Male: TWO DIFFERENT sex chromosomes — one X and one Y. The Y chromosome is much SMALLER than the X. [1]\n\n(c) Meiosis → variation [4]  EXT\n• During meiosis, homologous chromosomes (one MATERNAL and one PATERNAL of each pair) line up and are sorted RANDOMLY into the daughter cells. [1]\n• This RANDOM ASSORTMENT means each gamete receives a different combination of maternal and paternal CHROMOSOMES. [1]\n• Therefore the GAMETES produced are GENETICALLY DIFFERENT from each other. [1]\n• At fertilisation, any sperm can fuse with any egg by CHANCE — combining two random sets of chromosomes — so offspring inherit unique combinations of alleles, generating variation in the species. [1]\n\n(d) New alleles [3]\n• New alleles arise by MUTATION — a random change in the DNA. [1]\n• A mutation alters the SEQUENCE OF BASES in a gene (e.g. one base swapped for another, or a base added/deleted). [1]\n• This changed base sequence is then a NEW VERSION of the gene — i.e. a new allele — which may code for a slightly different protein and can be passed on through gametes if it occurs in cells that produce them. [1]"

    {

      hint: "F1 = blend (orange) → CO-DOMINANCE. F1 = RY. Cross 2 = RR : RY : RY : YY → 1 red : 2 orange : 1 yellow. Cross 3 = ½ RR : ½ RY → red : orange. Cross 4 = ½ RY : ½ YY → orange : yellow.",
      a: "(a) Cross 1 genetic diagram [3]  EXT\n• Parents: RR × YY.\n• Gametes: RR → all R; YY → all Y. [1]\n• Offspring genotype: all RY. [1]\n• Offspring phenotype: all ORANGE. [1]\n\n(b) Crosses 2, 3, 4 [3]  EXT\n• Cross 2 (RY × RY) → 1 RR : 2 RY : 1 YY (phenotype 1 red : 2 orange : 1 yellow). [1]\n• Cross 3 (RY × RR) → ½ RR : ½ RY (phenotype 1 red : 1 orange). [1]\n• Cross 4 (RY × YY) → ½ RY : ½ YY (phenotype 1 orange : 1 yellow). [1]\n\n(c) Why R and Y are not dominant/recessive [3]  EXT\n• If one allele were dominant, the F1 heterozygote (RY) would show ONLY the dominant parent's colour (either all red OR all yellow) — but in fact F1 are ORANGE, a NEW intermediate/blended phenotype. [1]\n• The orange phenotype only appears in HETEROZYGOTES (RY) — both alleles are contributing to the phenotype TOGETHER. [1]\n• This is therefore CO-DOMINANCE (or incomplete dominance): neither allele masks the other; both are expressed equally in the heterozygote. [1]"

    },

                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>

                    <span title={q.src === "Hodder" ? "Hodder textbook official question" : q.src === "SME" ? "Save My Exams style question" : "NLCS supplementary question"}

      </div>
    </div>
  );
}

          Females are <KW c={PU}>XX</KW>, males are <KW c={PU}>XY</KW>. All ova carry an X. Half the sperm carry X, half carry Y. <Bold>The father's sperm decides the baby's sex.</Bold> The ratio of male : female is 1 : 1.
        </div>
        <div style={{ ...sub }}>⚠️ Common trap</div>
        <div style={text}>A couple having four girls does not mean the father makes only X sperm — it is just chance. Each fertilisation is an independent 50:50 event.</div>
      </div>

      {/* 3. DNA → PROTEIN (EXT) */}
      <div style={box}>
        <div style={head}>3 · From gene to protein <Ext /></div>
        <DnaProteinSVG />
        <div style={{ ...text, marginTop: 10 }}>
          The sequence of bases in DNA codes for the sequence of amino acids in a protein. A triplet of bases = one amino acid. DNA stays in the nucleus; an <KW c={PU}>mRNA</KW> copy carries the code to a <KW c={PU}>ribosome</KW> in the cytoplasm, which assembles the amino-acid chain.
        </div>
        <div style={sub}>Gene expression</div>
        <div style={text}>
          All body cells contain the same genes, but each cell only <Bold>expresses (switches on)</Bold> the genes it needs — that is why stomach cells make pepsin but red-bone-marrow cells make haemoglobin.
        </div>
      </div>

      {/* 4. MITOSIS vs MEIOSIS — master table */}
      <div style={box}>
        <div style={head}>4 · Mitosis vs Meiosis — the master comparison</div>
        <MitosisMeiosisSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 10 }}>
          <thead><tr><th style={th}>Feature</th><th style={th}>Mitosis</th><th style={th}>Meiosis</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Type of division</Bold></td><td style={td}>Nuclear division giving identical cells</td><td style={td}>Reduction division (diploid → haploid)</td></tr>
            <tr><td style={td}><Bold>Daughter cells</Bold></td><td style={td}>2 cells, genetically <Bold>identical</Bold></td><td style={td}>4 cells, genetically <Bold>different</Bold></td></tr>
            <tr><td style={td}><Bold>Chromosome no.</Bold></td><td style={td}>Stays the same (46 → 46)</td><td style={td}>Halved (46 → 23)</td></tr>
            <tr><td style={td}><Bold>Where</Bold></td><td style={td}>Body (somatic) cells</td><td style={td}>Testes &amp; ovaries (anthers/ovules in plants)</td></tr>
            <tr><td style={td}><Bold>Purpose</Bold></td><td style={td}>Growth · repair · replacement · asexual reproduction</td><td style={td}>Producing gametes for sexual reproduction</td></tr>
            <tr><td style={td}><Bold>Variation</Bold></td><td style={td}>None (clones)</td><td style={td}>Yes — homologous chromosomes assort randomly</td></tr>
          </tbody>
        </table>
        <div style={{ ...sub }}>Stem cells</div>
        <div style={text}>
          <KW c={PU}>Stem cells</KW> are unspecialised cells that divide by mitosis to produce daughter cells that can become specialised. Two sources: <Bold>red bone marrow</Bold> (blood cells) and <Bold>basal cells of the skin</Bold>.
        </div>
      </div>

      {/* 5. MONOHYBRID INHERITANCE */}
      <div style={box}>
        <div style={head}>5 · Monohybrid inheritance — the 3:1 recipe</div>
        <MonohybridSVG />
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 10 }}>
          <thead><tr><th style={th}>Term</th><th style={th}>Meaning</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>Genotype</Bold></td><td style={td}>The genetic make-up (the alleles present): BB, Bb or bb.</td></tr>
            <tr><td style={td}><Bold>Phenotype</Bold></td><td style={td}>The observable features (black or brown coat).</td></tr>
            <tr><td style={td}><Bold>Homozygous</Bold></td><td style={td}>Two identical alleles (BB or bb) — pure-breeding.</td></tr>
            <tr><td style={td}><Bold>Heterozygous</Bold></td><td style={td}>Two different alleles (Bb) — not pure-breeding.</td></tr>
            <tr><td style={td}><Bold>Dominant</Bold></td><td style={td}>Allele expressed if present (capital letter, B).</td></tr>
            <tr><td style={td}><Bold>Recessive</Bold></td><td style={td}>Only expressed when no dominant allele present (lower-case, b).</td></tr>
          </tbody>
        </table>
        <div style={sub}>🍳 The 5-step recipe (use this every time)</div>
        <ol style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li><Bold>Choose symbols</Bold> — capital for dominant, same letter lower-case for recessive (B / b).</li>
          <li><Bold>Write parents</Bold> — phenotype <Bold>and</Bold> genotype: Black Bb × Black Bb.</li>
          <li><Bold>Circle gametes</Bold> — each parent gives one allele per gamete.</li>
          <li><Bold>Draw Punnett square</Bold> — fill in the four offspring boxes.</li>
          <li><Bold>State ratio</Bold> — 1 BB : 2 Bb : 1 bb → phenotypes <Bold>3 black : 1 brown</Bold>.</li>
        </ol>
      </div>

      {/* 6. FAMOUS RATIOS */}
      <div style={box}>
        <div style={head}>6 · The four ratios you must recognise instantly</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Ratio</th><th style={th}>Cross</th><th style={th}>Phenotypes</th></tr></thead>
          <tbody>
            <tr><td style={td}><Bold>3 : 1</Bold></td><td style={td}>Bb × Bb (both heterozygous)</td><td style={td}>3 dominant : 1 recessive</td></tr>
            <tr><td style={td}><Bold>1 : 1</Bold></td><td style={td}>Bb × bb (test cross)</td><td style={td}>½ dominant : ½ recessive</td></tr>
            <tr><td style={td}><Bold>All dominant</Bold></td><td style={td}>BB × bb</td><td style={td}>100% heterozygous dominant (F1)</td></tr>
            <tr><td style={td}><Bold>1 : 2 : 1</Bold></td><td style={td}>Co-dominance heterozygote × heterozygote</td><td style={td}>red : pink : white</td></tr>
          </tbody>
        </table>
      </div>

      {/* 7. TEST CROSS */}
      <div style={box}>
        <div style={head}>7 · The test cross (back-cross)</div>
        <div style={text}>
          <Bold>Problem:</Bold> a black mouse could be <Bold>BB</Bold> or <Bold>Bb</Bold> — you can't tell by looking.<br />
          <Bold>Solution:</Bold> cross it with a known homozygous recessive (<Bold>bb</Bold>):
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 10 }}>
          <thead><tr><th style={th}>If black parent is...</th><th style={th}>All offspring are...</th><th style={th}>You conclude...</th></tr></thead>
          <tbody>
            <tr><td style={td}>BB × bb</td><td style={td}><Bold>100% black</Bold> (all Bb)</td><td style={td}>Black parent was homozygous BB</td></tr>
            <tr><td style={td}>Bb × bb</td><td style={td}><Bold>50% black : 50% brown</Bold></td><td style={td}>Black parent was heterozygous Bb</td></tr>
          </tbody>
        </table>
      </div>

      {/* 8. CO-DOMINANCE */}
      <div style={box}>
        <div style={head}>8 · Co-dominance — ABO blood groups</div>
        <CoDominanceSVG />
        <div style={{ ...text, marginTop: 10 }}>
          <KW c={PU}>Co-dominance</KW>: both alleles in a heterozygote contribute to the phenotype. ABO has <Bold>three</Bold> alleles: I<sup>A</sup>, I<sup>B</sup>, I<sup>O</sup>. I<sup>A</sup> and I<sup>B</sup> are co-dominant; both are dominant to I<sup>O</sup>.
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 10 }}>
          <thead><tr><th style={th}>Phenotype</th><th style={th}>Possible genotypes</th></tr></thead>
          <tbody>
            <tr><td style={td}>A</td><td style={td}>I<sup>A</sup>I<sup>A</sup> or I<sup>A</sup>I<sup>O</sup></td></tr>
            <tr><td style={td}>B</td><td style={td}>I<sup>B</sup>I<sup>B</sup> or I<sup>B</sup>I<sup>O</sup></td></tr>
            <tr><td style={td}>AB</td><td style={td}>I<sup>A</sup>I<sup>B</sup> (co-dominant)</td></tr>
            <tr><td style={td}>O</td><td style={td}>I<sup>O</sup>I<sup>O</sup></td></tr>
          </tbody>
        </table>
        <div style={sub}>Plant example</div>
        <div style={text}>
          Geranium: red allele C<sup>R</sup> × white allele C<sup>W</sup> → heterozygote C<sup>R</sup>C<sup>W</sup> is <Bold>pink</Bold>. F2 ratio is <Bold>1 red : 2 pink : 1 white</Bold>.
        </div>
      </div>

      {/* 9. SEX LINKAGE */}
      <div style={box}>
        <div style={head}>9 · Sex linkage — colour blindness</div>
        <SexLinkedSVG />
        <div style={{ ...text, marginTop: 10 }}>
          A <KW c={PU}>sex-linked characteristic</KW> is one whose gene is on a sex chromosome — usually the X. The Y is shorter and lacks the matching allele, so a male with one recessive X<sup>c</sup> <Bold>always shows the condition</Bold>. A female needs both X chromosomes to carry it (X<sup>c</sup>X<sup>c</sup>), so females are usually <Bold>carriers</Bold>.
        </div>
        <div style={sub}>The four genotypes you must know</div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead><tr><th style={th}>Genotype</th><th style={th}>Sex</th><th style={th}>Phenotype</th></tr></thead>
          <tbody>
            <tr><td style={td}>X<sup>C</sup>X<sup>C</sup></td><td style={td}>Female</td><td style={td}>Normal vision (homozygous)</td></tr>
            <tr><td style={td}>X<sup>C</sup>X<sup>c</sup></td><td style={td}>Female</td><td style={td}>Normal vision but <Bold>carrier</Bold></td></tr>
            <tr><td style={td}>X<sup>c</sup>X<sup>c</sup></td><td style={td}>Female</td><td style={td}>Colour-blind (rare)</td></tr>
            <tr><td style={td}>X<sup>C</sup>Y</td><td style={td}>Male</td><td style={td}>Normal vision</td></tr>
            <tr><td style={td}>X<sup>c</sup>Y</td><td style={td}>Male</td><td style={td}>Colour-blind</td></tr>
          </tbody>
        </table>
      </div>

      {/* 10. PEDIGREE */}
      <div style={box}>
        <div style={head}>10 · Reading a pedigree diagram</div>
        <PedigreeSVG />
        <div style={{ ...text, marginTop: 10 }}>
          Pedigrees show how a condition runs through a family. <Bold>Squares = males</Bold>, <Bold>circles = females</Bold>, <Bold>filled = affected</Bold>, <Bold>half-filled = carrier</Bold>.
        </div>
        <div style={sub}>How to deduce the inheritance pattern</div>
        <ol style={{ ...text, paddingLeft: 22, margin: 0 }}>
          <li>If two <Bold>unaffected</Bold> parents have an <Bold>affected</Bold> child → the allele is <Bold>recessive</Bold> (both parents are carriers).</li>
          <li>If <Bold>every</Bold> affected child has at least one affected parent → likely <Bold>dominant</Bold>.</li>
          <li>If males are affected far more often than females → likely <Bold>X-linked recessive</Bold>.</li>
          <li>For cystic fibrosis, two carrier parents (Cc × Cc) give a <Bold>1-in-4</Bold> chance per child.</li>
        </ol>
      </div>

      {/* 11. MENDEL (EXT) */}
      <div style={box}>
        <div style={head}>11 · Mendel's contribution <Ext /></div>
        <MendelSVG />
        <div style={{ ...text, marginTop: 10 }}>
          Mendel studied pea plants (<i>Pisum sativum</i>) with seven clear-cut, pure-breeding traits. By counting offspring across two generations he discovered:
        </div>
        <ul style={{ ...text, paddingLeft: 22, marginTop: 6 }}>
          <li>Traits do not blend — they keep their identity.</li>
          <li>One characteristic can be hidden in F1 but reappears in F2.</li>
          <li>The F2 ratio is consistently <Bold>3 dominant : 1 recessive</Bold>.</li>
          <li>Two different characteristics are inherited independently of each other.</li>
        </ul>
        <div style={sub}>Mendel's two laws</div>
        <ul style={{ ...text, paddingLeft: 22, marginTop: 0 }}>
          <li><Bold>Law of segregation:</Bold> only one allele of a pair is in each gamete.</li>
          <li><Bold>Law of independent assortment:</Bold> different gene pairs are inherited independently.</li>
        </ul>
      </div>
    </div>
  );
}

function TextbookTab() {
  const box = { border: `1.5px solid ${BD}`, borderRadius: 12, padding: "16px 18px", background: "#fff", marginBottom: 14 };
  const head = { fontSize: 14, fontWeight: 800, color: G, marginBottom: 10, paddingBottom: 6, borderBottom: `2px solid ${GL}` };
  const sub = { fontSize: 13, fontWeight: 700, color: G, marginTop: 12, marginBottom: 6 };

  const focus = { background: "#fffbeb", border: `1.5px solid #f0c14b`, borderRadius: 8, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: "#8a6d1f", lineHeight: 1.55 };
  const going = { background: "#e8f5e9", border: `1.5px solid ${GM}`, borderLeft: `4px solid ${GM}`, borderRadius: 8, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: G, lineHeight: 1.6 };

  return (
    <div>
      {/* INTRO */}
      <div style={{ ...box, background: GL, border: `1.5px solid ${G}` }}>
        <div style={{ fontSize: 15, fontWeight: 800, color: G, marginBottom: 8 }}>
          📗 Chapter 17 · Inheritance (Hodder pp. 280–298)
        </div>
        <div style={{ ...text, color: G }}>
          We often talk about people inheriting characteristics — curly hair, brown eyes, height. This chapter explores <Bold>how</Bold> we inherit them. The branch of biology that studies heredity is called <Bold>genetics</Bold>.
        </div>
      </div>

      {/* SECTION 1 — Chromosomes, genes and proteins */}
      <div style={box}>
        <div style={head}>17.1 · Chromosomes, genes and proteins</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What are chromosomes made of? · What are genes and alleles? · How is sex inherited in humans? · <Ext /> How does base sequence determine protein? · How does DNA control cell function? · What is a haploid/diploid nucleus?
        </div>
        <div style={defBox}>
          <Bold>Gene</Bold> — a length of DNA that codes for a protein.<br />
          <Bold>Allele</Bold> — an alternative form of a gene.
        </div>
        <div style={text}>
          A chromosome is a DNA molecule made up of sections called <Bold>genes</Bold>. Inside the nucleus are thread-like structures called <KW>chromosomes</KW>, most easily seen when a cell is dividing. Each chromosome makes a copy of itself before division (two <Bold>chromatids</Bold> joined at a <Bold>centromere</Bold>) — though those terms are not required by the syllabus.
        </div>
        <ChromosomeStructureSVG />
        <div style={{ ...text, marginTop: 10 }}>
          A human body cell nucleus contains <Bold>46 chromosomes</Bold>, arranged as 23 <Bold>homologous pairs</Bold>. The 23rd pair are the sex chromosomes — the only pair that does not always match. The Y chromosome is much smaller than the X.
        </div>

        <div style={sub}>Number of chromosomes</div>
        <div style={defBox}>
          <Bold>Haploid nucleus</Bold> — a nucleus containing a single set of unpaired chromosomes (e.g. sperm, ovum).<br />
          <Bold>Diploid nucleus</Bold> — a nucleus containing two sets of chromosomes (e.g. body cells).
        </div>
        <div style={text}>
          Each species has a fixed chromosome number: humans 46, mice 40, garden peas 14. All body cells of a species have the same number. Of your 46, 23 came from your mother and 23 from your father. Each pair is called a <Bold>homologous pair</Bold>.
        </div>

        <div style={sub}>Alleles</div>
        <div style={text}>
          Genes occupying corresponding positions on homologous chromosomes and controlling the same characteristic are called <KW>alleles</KW> (from <i>allelomorph</i> = alternative form). For example, eye colour has alternative alleles for brown and blue. Often there are more than two alleles — human <Bold>ABO blood groups</Bold> are controlled by three alleles, although only two can be present in one <KW>genotype</KW>.
        </div>

        <div style={sub}>The inheritance of sex</div>
        <SexDeterminationSVG />
        <div style={{ ...text, marginTop: 10 }}>
          The sex chromosomes determine whether you are male or female. <Bold>Females are XX, males are XY.</Bold> A process in the ovary called meiosis produces gametes with half the chromosome number. Each ovum carries one X. In the testes, meiosis gives 50% X-sperm and 50% Y-sperm. If an X-sperm fertilises the ovum → XX → girl. If a Y-sperm fertilises → XY → boy. The ratio of male to female babies is <Bold>1 : 1</Bold>.
        </div>

        <div style={going}>
          <Bold>The genetic code (Going Further — Extended)</Bold>
          <div style={{ marginTop: 6 }}>
            Each nucleotide carries one of four bases (A, T, C, G). The base sequence is a code that instructs cells to make specific proteins. A <Bold>triplet</Bold> of bases codes for one amino acid (e.g. CGA → alanine, CAT → valine, CCA → glycine). A gene is a sequence of triplets — insulin (51 amino acids) needs 153 bases in DNA.
          </div>
          <div style={{ marginTop: 6 }}>
            Cell chemistry is controlled by enzymes, and enzymes are proteins. So the genetic code determines which proteins (especially enzymes) are made — and through that, the cell's structure and function. Other proteins coded by DNA include antibodies, membrane carriers and neurotransmitter receptors.
          </div>
        </div>

        <div style={sub}>The manufacture of proteins in cells <Ext /></div>
        <DnaProteinSVG />
        <div style={{ ...text, marginTop: 10 }}>
          DNA stays in the nucleus, but proteins are needed elsewhere. A molecule called <KW>messenger RNA (mRNA)</KW> carries the code out. mRNA is smaller than DNA, single-stranded, and uses uracil (U) instead of thymine — U pairs with A.
        </div>
        <ol style={{ ...text, paddingLeft: 22 }}>
          <li>The DNA helix unwinds; bases are exposed.</li>
          <li>mRNA nucleotides line up against the DNA bases (complementary base pairing).</li>
          <li>The mRNA molecule leaves the nucleus through a nuclear pore.</li>
          <li>In the cytoplasm it attaches to a <KW>ribosome</KW>.</li>
          <li>The ribosome reads the mRNA in triplets and links the correct amino acids in order to build the protein.</li>
        </ol>

        <div style={sub}>Gene expression <Ext /></div>
        <div style={text}>
          All body cells contain the same genes. But cells have different jobs — stomach cells make pepsin, bone-marrow cells make haemoglobin. Each specialised cell only <Bold>expresses (switches on)</Bold> the genes needed for its function. This is why every cell carries the same DNA, yet cells look and behave very differently.
        </div>
      </div>

      {/* SECTION 2 — MITOSIS */}
      <div style={box}>
        <div style={head}>17.2 · Mitosis</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> What is mitosis? · Its role in growth, repair, replacement &amp; asexual reproduction · What happens to the chromosomes before and during mitosis? · What are stem cells?
        </div>
        <div style={defBox}>
          <Bold>Mitosis</Bold> — nuclear division giving rise to genetically identical cells.
        </div>
        <div style={text}>
          We all started as a single cell (zygote). That cell divided to two, four, eight... building the millions of cells that now form us. Cells wear out and must be replaced. <Bold>Growth, repair, replacement of worn-out cells</Bold> and <Bold>asexual reproduction</Bold> all depend on mitosis.
        </div>

        <div style={sub}>Cell division</div>
        <div style={text}>
          Before mitosis, each chromosome makes an exact copy of itself — this is <Bold>replication</Bold>. During mitosis, the copies separate so each daughter cell still has 46 chromosomes. Both daughter cells may divide again, but usually one becomes <KW>specialised</KW> (loses the ability to divide) while the other retains the power to divide — this drives growth.
        </div>
        <CellDivisionSVG />
        <div style={{ ...text, marginTop: 10 }}>
          In animal cells the cytoplasm pinches off between the two nuclei. In plant cells (with a rigid cell wall) a new cell wall forms between the daughters and new vacuoles develop. Organelles like mitochondria and chloroplasts can divide and are shared between the daughter cells.
        </div>

        <div style={sub}>Stem cells</div>
        <div style={text}>
          <KW>Stem cells</KW> are <Bold>unspecialised cells</Bold> that divide by mitosis to produce daughter cells that <Bold>can become specialised</Bold> for specific functions. Two key sources in adults:
        </div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li><Bold>Basal cells of the skin</Bold> — keep dividing to make new skin cells.</li>
          <li><Bold>Red bone marrow</Bold> — divides constantly to produce all blood cell types.</li>
        </ul>
        <div style={text}>
          Adult stem cells normally produce only one tissue type. Culture of stem cells could lead to therapies — introducing healthy stem cells to replace diseased or damaged ones.
        </div>

        <div style={going}>
          <Bold>Going Further — Embryonic stem cells</Bold>
          <div style={{ marginTop: 6 }}>
            Cells from early embryos can develop into almost any kind of cell, but their use raises ethical concerns. Scientists are learning to reprogram skin cells into other types, and bone-marrow cells are used routinely to treat leukaemia. Adult stem cells avoid the ethical problem because cells able to become whole organisms are not destroyed.
          </div>
        </div>
      </div>

      {/* SECTION 3 — MEIOSIS */}
      <div style={box}>
        <div style={head}>17.3 · Meiosis</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> How is meiosis involved in gamete production? · What is meiosis?
        </div>
        <div style={defBox}>
          <Bold>Meiosis</Bold> — a reduction division in which the chromosome number is halved from diploid to haploid, resulting in genetically different cells.
        </div>
        <div style={text}>
          Meiosis takes place in the <Bold>testes and ovaries</Bold> of mammals, and the <Bold>anthers and ovules</Bold> of flowering plants. The cells produced are <KW>gametes</KW>: sperm and egg in mammals; pollen-grain nucleus and ovule in plants.
        </div>
        <div style={text}>
          Gametes are haploid — they have half the normal chromosome number. If they weren't, the chromosome number would double every generation. Each human sperm carries 23 chromosomes, each ovum 23, so at fertilisation the diploid number 46 is restored.
        </div>
        <MitosisMeiosisSVG />

        <div style={sub}>Mitosis vs Meiosis — comparison</div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 6 }}>
            <thead>
              <tr>
                <th style={{ background: GL, color: G, padding: "7px 10px", border: `1px solid ${BD}`, textAlign: "left" }}>Meiosis</th>
                <th style={{ background: GL, color: G, padding: "7px 10px", border: `1px solid ${BD}`, textAlign: "left" }}>Mitosis</th>
              </tr>
            </thead>
            <tbody>
              <tr><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Final stages of division → gametes</td><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Division of somatic (body) cells</td></tr>
              <tr><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Only half (haploid) chromosomes passed on</td><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Full set (diploid) passed to each daughter</td></tr>
              <tr><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Homologous chromosomes randomly assorted</td><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Chromosomes &amp; genes in each daughter identical</td></tr>
              <tr><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>New organisms show variation from parents and each other</td><td style={{ padding: "7px 10px", border: `1px solid ${BD}`, verticalAlign: "top" }}>Asexual offspring are clones — identical to parent</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      {/* SECTION 4 — MONOHYBRID INHERITANCE */}
      <div style={box}>
        <div style={head}>17.4 · Monohybrid inheritance</div>
        <div style={focus}>
          <Bold>Focus points:</Bold> Define key terms · Cross homozygous × homozygous · Cross heterozygous · Interpret pedigrees · Predict ratios · Use Punnett squares · <Ext /> Test cross · Co-dominance · Sex linkage · ABO inheritance · Why males are more often colour-blind.
        </div>
        <div style={defBox}>
          <Bold>Inheritance</Bold> — the transmission of genetic information from generation to generation.<br />
          <Bold>Genotype</Bold> — the genetic make-up of an organism in terms of the alleles present.<br />
          <Bold>Phenotype</Bold> — the observable features of an organism.<br />
          <Bold>Homozygous</Bold> — having two identical alleles of a particular gene.<br />
          <Bold>Heterozygous</Bold> — having two different alleles of a particular gene.<br />
          <Bold>Dominant</Bold> — an allele that is expressed if it is present in the genotype.<br />
          <Bold>Recessive</Bold> — an allele only expressed when no dominant allele of the gene is present.
        </div>

        <div style={sub}>Patterns of inheritance</div>
        <div style={text}>
          An allele in a mother's body cells for brown eyes may be on a chromosome in each ovum she produces. If the father's sperm carries an allele for brown eyes on the matching chromosome, the zygote will receive an allele for brown eyes from each parent. As the embryo develops, the alleles instruct iris cells to produce brown pigment (melanin).
        </div>

        <div style={sub}>Single-factor inheritance</div>
        <div style={text}>
          Suppose a blue-eyed mother and brown-eyed father have a child. The child receives a blue allele from mother and a brown allele from father. The child has <Bold>brown eyes</Bold> because the brown allele is <Bold>dominant</Bold>. The blue allele is present but not expressed — it is <Bold>recessive</Bold>.
        </div>
        <div style={text}>
          Key points: (i) each characteristic has a pair of alleles, one from each parent; (ii) alleles for the same characteristic carry the same letter; (iii) dominant = capital letter, recessive = lower-case letter.
        </div>

        <div style={sub}>Breeding true — genotype and phenotype</div>
        <div style={text}>
          A white rabbit must be <Bold>bb</Bold> (homozygous recessive). A black rabbit can be <Bold>BB</Bold> (homozygous dominant, pure-breeding) <Bold>or</Bold> <Bold>Bb</Bold> (heterozygous). BB and Bb rabbits look the same — same <Bold>phenotype</Bold> — but have different <Bold>genotypes</Bold>.
        </div>

        <div style={sub}>Pedigree diagrams and inheritance</div>
        <PedigreeSVG />
        <div style={{ ...text, marginTop: 10 }}>
          Pedigree diagrams are family trees showing how a genetic condition runs through generations. <Bold>Squares</Bold> = males, <Bold>circles</Bold> = females, <Bold>filled symbols</Bold> = affected, <Bold>half-filled</Bold> = carrier.
        </div>
        <div style={text}>
          <Bold>Cystic fibrosis</Bold> is caused by a recessive allele. Symptoms include very sticky mucus that blocks airways, reduces gas exchange, traps microbes (more chest infections), blocks pancreatic ducts and reproductive ducts. People with CF have two recessive alleles (cc). <Bold>Carriers (Cc) show no symptoms</Bold> but can pass the allele to children. About 1 in 25 Europeans is a carrier. If two carriers have a child, the chance of CF is <Bold>1 in 4</Bold>.
        </div>

        <div style={sub}>The 3 : 1 ratio</div>
        <MonohybridSVG />
        <div style={{ ...text, marginTop: 10 }}>
          Cross a homozygous black mouse (BB) with a homozygous brown mouse (bb). All F1 are <Bold>Bb</Bold> (heterozygous black). When two F1 (Bb × Bb) are crossed:
        </div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li>B sperm × B ovum → BB (black)</li>
          <li>B sperm × b ovum → Bb (black)</li>
          <li>b sperm × B ovum → bB (black)</li>
          <li>b sperm × b ovum → bb (brown)</li>
        </ul>
        <div style={text}>
          Three genotypes: BB, Bb, bb. Two phenotypes: black (BB and Bb) and brown (bb). The expected ratio is <Bold>3 black : 1 brown</Bold>. In real life, a mouse with 16 babies might have 14 black and 2 brown — chance plays a role. The ratio shows what we expect <Bold>on average across many offspring</Bold>.
        </div>

        <div style={sub}>Punnett squares</div>
        <div style={text}>
          A <KW>Punnett square</KW> is a box divided into four compartments. Place the gametes of one parent across the top and the gametes of the other parent down the side. Fill in the boxes to find all possible offspring genotypes. For Tt × Tt: TT, Tt, tT, tt → phenotype ratio <Bold>3 tall : 1 dwarf</Bold>.
        </div>

        <div style={going}>
          <Bold>Worked example — Cystic fibrosis (Hodder p.293)</Bold>
          <div style={{ marginTop: 6 }}>
            For CC × CC: 100% CC (all healthy). For Cc × CC: 50% CC, 50% Cc (all healthy, but half carriers). For Cc × Cc: 25% CC, 50% Cc, 25% cc → <Bold>1 in 4 chance of CF</Bold>. For Cc × cc: 50% Cc (carriers), 50% cc (affected) — a <Bold>1 : 1</Bold> ratio.
          </div>
        </div>

        <div style={sub}>The test-cross (back-cross) <Ext /></div>
        <div style={text}>
          A black mouse could be BB or Bb. To find out, cross it with a known homozygous recessive (bb):
        </div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li>If BB × bb → all offspring are Bb (all black) → the unknown was <Bold>BB</Bold>.</li>
          <li>If Bb × bb → 50% Bb (black) and 50% bb (brown) → the unknown was <Bold>Bb</Bold>.</li>
        </ul>
      </div>

      {/* SECTION 5 — CO-DOMINANCE */}
      <div style={box}>
        <div style={head}>17.5 · Co-dominance <Ext /></div>
        <div style={defBox}>
          <Bold>Co-dominance</Bold> — a situation in which both alleles in heterozygous organisms contribute to the phenotype.
        </div>
        <CoDominanceSVG />
        <div style={{ ...text, marginTop: 10 }}>
          The human <Bold>ABO blood groups</Bold> are an example of co-dominance. There are four phenotypes (A, B, AB and O) controlled by three alleles: I<sup>A</sup>, I<sup>B</sup> and I<sup>O</sup>. I<sup>A</sup> and I<sup>B</sup> are co-dominant (a person with both has antigens A and B = blood group AB). Both I<sup>A</sup> and I<sup>B</sup> are dominant to I<sup>O</sup>.
        </div>
        <div style={text}>
          A person with group A could be I<sup>A</sup>I<sup>A</sup> or I<sup>A</sup>I<sup>O</sup>. Group B could be I<sup>B</sup>I<sup>B</sup> or I<sup>B</sup>I<sup>O</sup>. Group AB is only I<sup>A</sup>I<sup>B</sup>. Group O is only I<sup>O</sup>I<sup>O</sup>.
        </div>
        <div style={text}>
          Two parents (group A: I<sup>A</sup>I<sup>O</sup> × group B: I<sup>B</sup>I<sup>O</sup>) can have a child of group O if both pass on the I<sup>O</sup> allele.
        </div>

        <div style={sub}>Plant example</div>
        <div style={text}>
          In geraniums, the gene for flower colour has alleles C<sup>R</sup> (red) and C<sup>W</sup> (white). Pure-breeding red (C<sup>R</sup>C<sup>R</sup>) × pure-breeding white (C<sup>W</sup>C<sup>W</sup>) gives all <Bold>pink</Bold> F1 (C<sup>R</sup>C<sup>W</sup>) — both alleles contribute. Self-pollinating the pink F1 produces an F2 ratio of <Bold>1 red : 2 pink : 1 white</Bold>.
        </div>

        <div style={going}>
          <Bold>Going Further — Incomplete dominance &amp; sickle-cell <Ext /></Bold>
          <div style={{ marginTop: 6 }}>
            'Incomplete dominance' is sometimes used as an alternative to co-dominance, when the dominant allele does not completely hide the recessive. <Bold>Sickle-cell anaemia</Bold> is caused by recessive Hb<sup>S</sup> alleles. Hb<sup>S</sup>Hb<sup>S</sup> → distorted red blood cells, severe anaemia. Hb<sup>A</sup>Hb<sup>S</sup> heterozygotes have <Bold>sickle-cell trait</Bold> with mild symptoms — the normal Hb<sup>A</sup> allele is not completely dominant.
          </div>
        </div>
      </div>

      {/* SECTION 6 — SEX LINKAGE */}
      <div style={box}>
        <div style={head}>17.6 · Sex linkage <Ext /></div>
        <div style={defBox}>
          <Bold>Sex-linked characteristic</Bold> — a feature in which the gene responsible is located on a sex chromosome, which makes it more common in one sex than the other.
        </div>
        <SexLinkedSVG />
        <div style={{ ...text, marginTop: 10 }}>
          The X and Y chromosomes carry genes for sexual development, but the X also carries many other genes. The Y is much shorter and lacks most of these genes. So if a male (XY) inherits a recessive allele on his single X, there is no second X to mask it — he <Bold>always</Bold> shows the trait. A female (XX) needs the recessive allele on <Bold>both</Bold> X chromosomes to show it; one normal X is enough to make her a carrier with no symptoms.
        </div>

        <div style={sub}>Example — Colour blindness</div>
        <div style={text}>
          Consider a carrier mother X<sup>C</sup>X<sup>c</sup> × normal father X<sup>C</sup>Y. The Punnett square gives:
        </div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li>X<sup>C</sup>X<sup>C</sup> — normal-vision female</li>
          <li>X<sup>C</sup>X<sup>c</sup> — carrier female (normal vision)</li>
          <li>X<sup>C</sup>Y — normal-vision male</li>
          <li>X<sup>c</sup>Y — colour-blind male</li>
        </ul>
        <div style={text}>
          So 2 normal-vision females, 1 normal male, 1 colour-blind male — <Bold>males inherit colour blindness more frequently</Bold>. If a gene is only on the Y chromosome, only males can ever show the condition.
        </div>
      </div>

      {/* GOING FURTHER — MENDEL */}
      <div style={box}>
        <div style={head}>17.7 · Ideas about heredity — Gregor Mendel (1822–1884) <Ext /></div>
        <MendelSVG />
        <div style={going}>
          <div style={{ marginTop: 0 }}>
            Mendel was an Augustinian monk in Brünn (now Brno). He was the first scientist to make a <Bold>systematic study</Bold> of single-character inheritance, using pure-breeding varieties of pea plant (<i>Pisum sativum</i>). Self-pollinating pea plants made his crosses controllable.
          </div>
        </div>
        <div style={sub}>What Mendel did</div>
        <div style={text}>
          He chose pure-breeding pairs with sharply contrasting traits (e.g. tall vs dwarf, round vs wrinkled seed, green vs yellow seed). He crossed them by hand: opened buds, removed stamens, dusted pollen onto stigmas. The first generation (<Bold>F1</Bold>) always showed only one of the two traits — the other had vanished.
        </div>
        <div style={text}>
          He let F1 self-pollinate to make F2. The 'missing' trait <Bold>reappeared</Bold>. He named the expressed trait <Bold>dominant</Bold> and the hidden one <Bold>recessive</Bold>. Counting F2 plants he found ratios close to <Bold>3 : 1</Bold> in every cross:
        </div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li>Tall vs dwarf: 787 : 277 ≈ 2.84 : 1</li>
          <li>Round vs wrinkled: 5474 : 1850 ≈ 2.96 : 1</li>
          <li>Yellow vs green seed: 6022 : 2001 ≈ 3.01 : 1</li>
        </ul>
        <div style={text}>
          Two-thirds of F2 tall plants did not breed true — they produced the 3:1 ratio again, like F1 heterozygotes. Mendel's letters A, Ab and b stand for the same idea as our BB, Bb and bb. He didn't know about DNA — he never refers to AA or bb directly — but he correctly deduced that gametes carry only <Bold>one</Bold> factor for each characteristic.
        </div>

        <div style={sub}>Mendel's laws</div>
        <ul style={{ ...text, paddingLeft: 22 }}>
          <li><Bold>Law of segregation:</Bold> 'Of a pair of contrasted characters only one can be represented in the gamete.'</li>
          <li><Bold>Law of independent assortment:</Bold> 'Each of a pair of contrasting characters may be combined with either of another pair.'</li>
        </ul>
        <div style={text}>
          Mendel published in 1866 in the <i>Transactions of the Brünn Natural History Society</i>. Few people read it; the importance of his work was only realised when it was rediscovered in 1900. His maths-based descriptive approach (the gametes are the vehicles; traits keep their identity; they can be inherited independently) became the foundation of modern genetics.
        </div>
      </div>

      {/* SME THEORY NOTES — Examiner Tips & Definitions ─────────────────── */}
      <div style={{ ...box, background: TLL, border: `1.5px solid ${TL}` }}>
        <div style={{ ...head, color: TL, borderBottom: `2px solid ${TL}` }}>📑 SME Theory Notes — Examiner Tips &amp; Distinctive Phrasings</div>
        <div style={{ ...text, color: TL, marginBottom: 10 }}>
          The Save My Exams Theory Notes for <i>Inheritance, Genes &amp; Cell Division</i> give the same syllabus content as the textbook above but reinforce a few useful study tools and exam phrasings. Read these in addition to the Hodder notes.
        </div>

        <div style={{ ...sub, color: TL }}>1 · The "Zoom model" of the cell</div>
        <div style={text}>
          Picture a camera that can <Bold>zoom out</Bold> to see a whole organism and <Bold>zoom in</Bold> to see individual molecules. Reading right-to-left through the cell hierarchy: organism → <KW c={TL}>cell</KW> → nucleus → <KW c={TL}>chromosome</KW> (a long strand of DNA wrapped around proteins) → <KW c={TL}>gene</KW> (a length of DNA on the chromosome) → <KW c={TL}>DNA bases</KW> (A, T, C, G). Useful when an exam question asks you to describe where DNA, genes or proteins are located.
        </div>

        <div style={{ ...sub, color: TL }}>2 · "Ha-ploid = Half" mnemonic</div>
        <div style={text}>
          A simple way to remember the difference: <KW c={TL}>Ha</KW>ploid = <KW c={TL}>Ha</KW>lf the normal number of chromosomes. Diploid (2 sets) → halves → haploid (1 set). Note: the human diploid number is 46, but other species are different (mouse 40, garden pea 14, fruit fly 8). <Bold>Read exam questions carefully</Bold> to see which species is being discussed.
        </div>

        <div style={{ ...sub, color: TL }}>3 · "Bases" vs "amino acids" — a classic mix-up <Ext /></div>
        <div style={text}>
          Be precise: DNA / mRNA is made of <KW c={TL}>BASES</KW> (A, T/U, C, G). Proteins are made of <KW c={TL}>AMINO ACIDS</KW>. The DNA base sequence is <Bold>converted into</Bold> the protein's amino-acid sequence via transcription (DNA → mRNA bases) and translation (mRNA bases → amino-acid chain). Different base sequences → different amino-acid sequences → different protein <Bold>shapes</Bold> → different functions.
        </div>

        <div style={{ ...sub, color: TL }}>4 · Gene expression — the formal definition <Ext /></div>
        <div style={text}>
          <Bold>Expression</Bold> of a gene means whether that gene is <KW c={TL}>transcribed and translated</KW> in a particular cell. Most genes in a particular cell are NOT expressed (they are 'switched off') because making unused proteins would waste energy and resources. Only the genes whose proteins are vital to that cell's function are 'switched on'. This is how DNA <Bold>controls cell function</Bold> — by controlling which proteins are produced (enzymes, antibodies, receptors for neurotransmitters).
        </div>

        <div style={{ ...sub, color: TL }}>5 · Differences between mitosis &amp; meiosis — be SPECIFIC <Ext /></div>
        <div style={text}>
          Exam questions love this comparison. Memorise these four differences:
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse", marginTop: 6, fontSize: 12 }}>
          <thead><tr>
            <th style={{ background: TL, color: "#fff", padding: "6px 10px", border: `1px solid ${BD}`, fontSize: 11.5, fontWeight: 700, textAlign: "left" }}>Mitosis</th>
            <th style={{ background: TL, color: "#fff", padding: "6px 10px", border: `1px solid ${BD}`, fontSize: 11.5, fontWeight: 700, textAlign: "left" }}>Meiosis</th>
          </tr></thead>
          <tbody>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>TWO daughter cells produced</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>FOUR daughter cells produced</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Daughter cells are DIPLOID</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Daughter cells are HAPLOID</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Genetically IDENTICAL to each other and to parent</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Genetically DIFFERENT from each other and from parent</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>ONE cell division</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>TWO cell divisions</td></tr>
          </tbody>
        </table>

        <div style={{ ...sub, color: TL }}>6 · Choosing letters in a Punnett square</div>
        <div style={text}>
          If the question lets you choose the letter, pick one where the <Bold>capital and lowercase look very different</Bold> by hand. For example, <KW c={TL}>T / t</KW> and <KW c={TL}>A / a</KW> are clear, but <Bold>C / c</Bold> and <Bold>S / s</Bold> can look identical in messy handwriting — examiners may not be able to tell which allele is dominant. This costs marks.
        </div>

        <div style={{ ...sub, color: TL }}>7 · SME worked examples — three monohybrid crosses you must master</div>
        <div style={text}>
          The SME notes drill three pea-plant crosses (T = tall dominant, t = short recessive). Make sure you can produce each without thinking:
        </div>
        <ul style={{ ...text, paddingLeft: 22, marginTop: 4 }}>
          <li><Bold>TT × tt</Bold> → all offspring Tt (heterozygous) → 100% tall. (F1 of a pure-breed cross.)</li>
          <li><Bold>Tt × Tt</Bold> → offspring 1 TT : 2 Tt : 1 tt → phenotype ratio <Bold>3 tall : 1 short</Bold> = 25% chance of a short plant. (F2.)</li>
          <li><Bold>Tt × tt</Bold> → offspring 2 Tt : 2 tt → phenotype ratio <Bold>1 tall : 1 short</Bold> = 50% short. (Test cross.)</li>
        </ul>
      </div>

      {/* REVISION CHECKLIST */}
      <div style={{ ...box, background: GL, border: `1.5px solid ${G}` }}>
        <div style={head}>✓ Revision checklist (Hodder p.298)</div>
        <ul style={{ ...text, color: G, paddingLeft: 22 }}>
          <li>Chromosomes contain DNA carrying information in the form of genes.</li>
          <li>A gene is a length of DNA that codes for a protein.</li>
          <li>An allele is an alternative form of a gene.</li>
          <li>Sex in humans is determined by X and Y chromosomes — Males XY, Females XX.</li>
          <li>Mitosis is nuclear division giving rise to genetically identical cells. Important in growth, repair, replacement and asexual reproduction.</li>
          <li>Exact replication of chromosomes occurs before mitosis.</li>
          <li>During mitosis, the copies of chromosomes separate, maintaining the chromosome number.</li>
          <li>Stem cells are unspecialised cells that divide by mitosis and can become specialised.</li>
          <li>Meiosis is reduction division: chromosome number halved from diploid to haploid, daughters genetically different.</li>
          <li>Meiosis produces gametes.</li>
          <li>Inheritance is the transmission of genetic information from generation to generation.</li>
          <li>Genotype = make-up; phenotype = observable features.</li>
          <li>Homozygous = two identical alleles (pure-breeding). Heterozygous = two different alleles (not pure-breeding).</li>
          <li>Dominant allele is always expressed; recessive only when no dominant allele present.</li>
          <li>Pedigree diagrams show how genetic conditions are inherited.</li>
          <li>Punnett squares predict offspring genotypes and ratios.</li>
          <li><Ext /> A test-cross identifies an unknown genotype.</li>
          <li><Ext /> Co-dominance: both alleles contribute to the phenotype. ABO blood groups are an example.</li>
          <li><Ext /> Sex-linked: gene on a sex chromosome, more common in one sex. Colour blindness is an example.</li>
          <li><Ext /> Sequences of bases control amino-acid order → protein structure → cell function.</li>
          <li><Ext /> Protein synthesis involves mRNA and ribosomes.</li>
          <li><Ext /> All cells contain the same genes but only express the ones they need.</li>
        </ul>
      </div>
    </div>
  );
}
