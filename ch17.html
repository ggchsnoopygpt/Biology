    { src: "SME", cat: "DNA-Protein", front: "20 / 66 — Describe protein synthesis events in the cytoplasm. (EXT)", back: <span>Translation in the cytoplasm:<br/>• The <KW c={PU}>mRNA passes through ribosomes</KW>.<br/>• The ribosome <Bold>assembles amino acids into protein molecules</Bold>.<br/>• The specific sequence of amino acids is determined by the <Bold>sequence of bases in the mRNA</Bold>.</span> },
    { src: "SME", cat: "DNA-Protein", front: "21 / 66 — Where in a cell does translation occur? (EXT)", back: <span>Translation occurs in the <KW c={PU}>cytoplasm</KW> of the cell, specifically at <Bold>ribosomes</Bold>.</span> },
    { src: "SME", cat: "DNA-Protein", front: "22 / 66 — True or False? The whole length of DNA is copied during protein synthesis. (EXT)", back: <span><Bold>FALSE.</Bold> DNA is transcribed and translated <KW c={PU}>one gene at a time</KW>. Each gene produces a different protein.</span> },
    { src: "SME", cat: "DNA-Protein", front: "23 / 66 — True or False? All genes in a cell are expressed at all times. (EXT)", back: <span><Bold>FALSE.</Bold> Most genes in a cell are <KW c={PU}>not expressed ("switched off")</KW> to conserve energy and resources.</span> },
    { src: "SME", cat: "DNA-Protein", front: "24 / 66 — How does DNA control cell function? (EXT)", back: <span>DNA controls cell function by <KW c={PU}>controlling the production of proteins</KW> through gene expression.</span> },
    { src: "SME", cat: "DNA-Protein", front: "25 / 66 — Three examples of proteins produced through gene expression? (EXT)", back: <span>Three types of proteins:<br/>• <KW c={PU}>Enzymes</KW><br/>• <KW c={PU}>Membrane carriers</KW><br/>• <KW c={PU}>Receptors for neurotransmitters</KW></span> },
    { src: "SME", cat: "Chromosomes", front: "26 / 66 — What is a DIPLOID nucleus? (EXT)", back: <span>A diploid nucleus contains <KW c={PU}>two sets of chromosomes</KW>, totalling <Bold>46 chromosomes</Bold> in humans.</span> },
    { src: "SME", cat: "Chromosomes", front: "27 / 66 — What is a HAPLOID nucleus? (EXT)", back: <span>A haploid nucleus contains <KW c={PU}>one set of unpaired chromosomes</KW>, totalling <Bold>23 chromosomes</Bold> in human gametes.</span> },
    { src: "SME", cat: "Chromosomes", front: "28 / 66 — How many different chromosomes do humans have? (EXT)", back: <span>Humans have <KW c={PU}>23 different chromosomes</KW> in each cell. In a diploid cell, each chromosome comes in a <Bold>pair</Bold>.</span> },
    { src: "SME", cat: "Chromosomes", front: "29 / 66 — True or False? All the cells in humans are diploid. (EXT)", back: <span><Bold>FALSE.</Bold> Most body cells are diploid, but <KW c={PU}>gametes (sex cells) are haploid</KW>.</span> },
    { src: "SME", cat: "Chromosomes", front: "30 / 66 — Total number of chromosomes in a human diploid cell? (EXT)", back: <span>A human diploid cell has a total of <KW c={PU}>46 chromosomes</KW> (23 pairs).</span> },
    { src: "SME", cat: "Mitosis", front: "31 / 66 — Define MITOSIS. (EXT)", back: <span>Mitosis is <KW c={PU}>nuclear division that results in genetically identical cells</KW>. It is used for <Bold>growth, repair, and asexual reproduction</Bold>.</span> },
    { src: "SME", cat: "Mitosis", front: "32 / 66 — True or False? Mitosis results in genetically diverse cells. (EXT)", back: <span><Bold>FALSE.</Bold> Mitosis results in <KW c={PU}>genetically identical cells</KW>.</span> },
    { src: "SME", cat: "Mitosis", front: "33 / 66 — What happens to chromosomes before mitosis? (EXT)", back: <span>Before mitosis each chromosome <KW c={PU}>replicates</KW>, producing two identical copies of each chromosome — <Bold>one for each daughter cell</Bold>.</span> },
    { src: "SME", cat: "Mitosis", front: "34 / 66 — Why is mitosis important in the body? (EXT)", back: <span>Mitosis produces new cells for:<br/>• <KW c={PU}>Growth</KW><br/>• <Bold>Repair</Bold> of damaged tissues<br/>• <Bold>Replacement</Bold> of cells<br/>• <Bold>Asexual reproduction</Bold></span> },
    { src: "SME", cat: "Mitosis", front: "35 / 66 — What is the outcome of a mitotic division? (EXT)", back: <span>A mitotic division produces <KW c={PU}>two genetically identical daughter cells</KW>. The daughters are identical to each other <Bold>and to the parent cell</Bold>.</span> },
    { src: "SME", cat: "Mitosis", front: "36 / 66 — Which cells are NOT produced by mitosis in animals and plants? (EXT)", back: <span><KW c={PU}>Gametes</KW> — sperm, egg cells, pollen and ovules — are NOT produced by mitosis. They are produced by <Bold>meiosis</Bold>.</span> },
    { src: "SME", cat: "Mitosis", front: "37 / 66 — Chromosome count in a human cell produced by mitosis? (EXT)", back: <span>Human cells produced by mitosis contain <KW c={PU}>23 pairs (46 chromosomes)</KW>.</span> },
    { src: "SME", cat: "Mitosis", front: "38 / 66 — What are STEM CELLS? (EXT)", back: <span>Stem cells are <KW c={PU}>unspecialised cells</KW> that divide by mitosis to produce daughter cells that <Bold>can become specialised</Bold> for specific functions.</span> },
    { src: "SME", cat: "Meiosis", front: "39 / 66 — Define MEIOSIS. (EXT)", back: <span>Meiosis is a <KW c={PU}>reduction division</KW> in which the chromosome number is <Bold>halved from diploid to haploid</Bold>, resulting in genetically different cells. The cells produced are <Bold>gametes</Bold>.</span> },
    { src: "SME", cat: "Meiosis", front: "40 / 66 — What is the purpose of meiosis? (EXT)", back: <span>Meiosis is essential for <KW c={PU}>sexual reproduction</KW> as it produces gametes (sperm and egg cells) with <Bold>half the normal chromosome number</Bold>.</span> },
    { src: "SME", cat: "Meiosis", front: "41 / 66 — True or False? Meiosis results in genetically identical cells. (EXT)", back: <span><Bold>FALSE.</Bold> Meiosis results in <KW c={PU}>genetically different cells</KW>.</span> },
    { src: "SME", cat: "Meiosis", front: "42 / 66 — What happens to chromosome number during meiosis? (EXT)", back: <span>The chromosome number is <KW c={PU}>halved from diploid (46) to haploid (23)</KW>. For this reason meiosis is known as <Bold>reduction division</Bold>.</span> },
    { src: "SME", cat: "Meiosis", front: "43 / 66 — Why is meiosis crucial for sexual reproduction? (EXT)", back: <span>Meiosis ensures that gametes have <KW c={PU}>half the chromosome number</KW>, allowing for the <Bold>correct chromosome number after fertilisation</Bold>.</span> },
    { src: "SME", cat: "Definitions", front: "44 / 66 — Define HOMOZYGOUS and HETEROZYGOUS.", back: <span>• <KW c={TL}>Homozygous</KW>: two <Bold>identical</Bold> alleles of a particular gene.<br/>• <KW c={TL}>Heterozygous</KW>: two <Bold>different</Bold> alleles of a particular gene.</span> },
    { src: "SME", cat: "Definitions", front: "45 / 66 — Define GENOTYPE.", back: <span>The genotype is the <KW c={TL}>genetic make-up of an organism</KW>, including the types of alleles present.</span> },
    { src: "SME", cat: "Definitions", front: "46 / 66 — Define PHENOTYPE.", back: <span>The phenotype is the <KW c={TL}>observable characteristics</KW> of an organism. Can be visibly observed (e.g. eye colour) or tested for (e.g. blood type).</span> },
    { src: "SME", cat: "Monohybrid", front: "47 / 66 — What is a Punnett square used for?", back: <span>A Punnett square is a diagram which shows the <KW c={TL}>potential allele combinations</KW> that can result from a <Bold>genetic cross between two individuals</Bold>.</span> },
    { src: "SME", cat: "Monohybrid", front: "48 / 66 — True or False? Only ONE recessive allele is needed for it to be expressed in the phenotype.", back: <span><Bold>FALSE.</Bold> <KW c={TL}>TWO recessive alleles</KW> are needed in the genotype for the recessive trait to be expressed in the phenotype.</span> },
    { src: "SME", cat: "Monohybrid", front: "49 / 66 — How are dominant and recessive alleles usually represented in a Punnett square?", back: <span>• <KW c={TL}>Dominant alleles</KW> → <Bold>CAPITAL letter</Bold><br/>• <KW c={TL}>Recessive alleles</KW> → <Bold>lower-case letter</Bold></span> },
    { src: "SME", cat: "Monohybrid", front: "50 / 66 — TT (tall pea) × tt (short pea): what are the offspring genotypes?", back: <span>All offspring would be <KW c={TL}>heterozygous Tt</KW>. Each offspring inherits a <Bold>T allele from the tall parent</Bold> and a <Bold>t allele from the short parent</Bold>.</span> },
    { src: "SME", cat: "Monohybrid", front: "51 / 66 — Tt × Tt: what is the phenotype ratio?", back: <span><KW c={TL}>3 : 1</KW> (3 tall : 1 short).<br/>Cross gives: 1 TT (tall), 2 Tt (tall), 1 tt (short).</span> },
    { src: "SME", cat: "Monohybrid", front: "52 / 66 — Homozygous dominant × homozygous recessive: probability of dominant phenotype?", back: <span><KW c={TL}>100%</KW> probability that offspring will display the dominant phenotype. All offspring will be <Bold>heterozygous</Bold>.</span> },
    { src: "SME", cat: "Monohybrid", front: "53 / 66 — Heterozygous × heterozygous: probability of homozygous recessive genotype?", back: <span><KW c={TL}>1/4, 0.25 or 25%</KW> probability of offspring having a homozygous recessive genotype.</span> },
    { src: "SME", cat: "Monohybrid", front: "54 / 66 — Two heterozygous parents: predicted ratio of dominant vs recessive in offspring?", back: <span>The predicted ratio is <KW c={TL}>3 : 1</KW> dominant : recessive characteristic.</span> },
    { src: "SME", cat: "Pedigree", front: "55 / 66 — What is a PEDIGREE DIAGRAM?", back: <span>A <KW c={TL}>family tree diagram</KW> used to trace the pattern of inheritance of a specific characteristic (usually a disease) through <Bold>generations of a family</Bold>.</span> },
    { src: "SME", cat: "Co-dominance", front: "56 / 66 — Define CO-DOMINANCE. (EXT)", back: <span>Co-dominance occurs when <KW c={PU}>both alleles of a genotype in heterozygous organisms are expressed</KW> in the phenotype.</span> },
    { src: "SME", cat: "Co-dominance", front: "57 / 66 — True or False? Co-dominance results in the expression of one allele over the other. (EXT)", back: <span><Bold>FALSE.</Bold> Co-dominance results in <KW c={PU}>both alleles being expressed equally</KW> in the phenotype.</span> },
    { src: "SME", cat: "Co-dominance", front: "58 / 66 — What are the alleles for blood group? (EXT)", back: <span>The alleles for blood group are <KW c={PU}>I<sup>A</sup>, I<sup>B</sup> and I<sup>O</sup></KW>.</span> },
    { src: "SME", cat: "Co-dominance", front: "59 / 66 — Relationship between I^A, I^B and I^O alleles? (EXT)", back: <span>• <KW c={PU}>I<sup>A</sup> and I<sup>B</sup> are co-dominant</KW> with each other.<br/>• <KW c={PU}>I<sup>A</sup> and I<sup>B</sup> are both dominant to I<sup>O</sup></KW>.</span> },
    { src: "SME", cat: "Co-dominance", front: "60 / 66 — True or False? A person with blood type AB has genotype I^A I^B. (EXT)", back: <span><Bold>TRUE.</Bold> A person with blood type AB has the genotype <KW c={PU}>I<sup>A</sup>I<sup>B</sup></KW>.</span> },
    { src: "SME", cat: "Sex-linkage", front: "61 / 66 — What is a SEX-LINKED CHARACTERISTIC? (EXT)", back: <span>A sex-linked characteristic is one where the alleles controlling the trait are found on the <KW c={PU}>sex chromosomes</KW>, typically the <Bold>X chromosome</Bold>. Sex linkage makes the characteristic <Bold>more common in one sex than the other</Bold>.</span> },
    { src: "SME", cat: "Sex-linkage", front: "62 / 66 — Why are males more likely to show sex-linked recessive conditions? (EXT)", back: <span>Males only have <KW c={PU}>ONE X chromosome</KW>, so a recessive allele on that chromosome will <Bold>always be expressed</Bold> (no second X to mask it).</span> },
    { src: "SME", cat: "Sex-linkage", front: "63 / 66 — Define CARRIER in the context of sex-linked traits. (EXT)", back: <span>A carrier is a female with <KW c={PU}>one recessive allele</KW> for a sex-linked trait that is <Bold>masked by a dominant allele</Bold>. She doesn't have the condition but <Bold>can pass it on to offspring</Bold>.</span> },
    { src: "SME", cat: "Sex-linkage", front: "64 / 66 — Probability that a son born to a carrier female will have colour blindness? (EXT)", back: <span><KW c={PU}>50%</KW>. Carrier mother X<sup>B</sup>X<sup>b</sup> × any father → half her sons are X<sup>B</sup>Y (normal), half are X<sup>b</sup>Y (colour-blind). The father's vision is irrelevant — sons inherit only Y from him.</span> },
    { src: "SME", cat: "Sex-linkage", front: "65 / 66 — True or False? The Y chromosome carries as many genes as the X. (EXT)", back: <span><Bold>FALSE.</Bold> The Y chromosome is <KW c={PU}>much smaller and carries fewer genes</KW> than the X chromosome.</span> },
    { src: "SME", cat: "Sex-linkage", front: "66 / 66 — Normal-vision father × carrier mother: probability of a carrier child? (EXT)", back: <span><KW c={PU}>25%</KW> chance of producing a carrier child.<br/>Cross: X<sup>B</sup>Y × X<sup>B</sup>X<sup>b</sup> → 1 X<sup>B</sup>X<sup>B</sup>, 1 X<sup>B</sup>X<sup>b</sup> (carrier), 1 X<sup>B</sup>Y, 1 X<sup>b</sup>Y → 1 in 4 is a carrier daughter.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       NLCS SUPPLEMENTARY — 15 cards (extras for deeper coverage)
       ═══════════════════════════════════════════════════════════════════════ */
    { src: "Suppl", cat: "Chromosomes", front: "S1 — How many chromosomes do mouse, garden pea and fruit fly cells have?", back: <span>Mouse: <KW c={TL}>40</KW> · Garden pea: <KW c={TL}>14</KW> · Fruit fly: <KW c={TL}>8</KW> · Kangaroo: 12 · Domestic fowl: 36 · Human: 46. Each species has a fixed number.</span> },
    { src: "Suppl", cat: "Chromosomes", front: "S2 — What are HOMOLOGOUS chromosomes?", back: <span>Pairs of chromosomes that are the <KW c={TL}>same SIZE and SHAPE</KW>, one from each parent, carrying the same genes at corresponding positions (though the <Bold>alleles may differ</Bold>).</span> },
    { src: "Suppl", cat: "DNA-Protein", front: "S3 — Why does insulin's gene need 153 bases? (EXT)", back: <span>Insulin is a small protein with <KW c={PU}>51 amino acids</KW>. Each amino acid is coded by a <Bold>triplet (3 bases)</Bold>, so 51 × 3 = <Bold>153 bases</Bold>. (Haemoglobin is bigger — 574 amino acids → 1722 bases.)</span> },
    { src: "Suppl", cat: "Mitosis", front: "S4 — In a plant cell, what is different about mitotic division?", back: <span>The rigid <KW c={TL}>cell wall</KW> stops the cytoplasm pinching off. Instead, a <Bold>new cell wall</Bold> develops between the daughter nuclei, and a new vacuole forms in each daughter.</span> },
    { src: "Suppl", cat: "Mitosis", front: "S5 — Where would you see lots of mitosis in a plant?", back: <span><KW c={TL}>Root tips and shoot buds</KW> — the regions of active growth. Onion root tips (×250) are a classic microscope preparation.</span> },
    { src: "Suppl", cat: "Mitosis", front: "S6 — Why does specialisation usually FOLLOW mitosis?", back: <span>One daughter cell often <KW c={TL}>differentiates</KW> — changes shape and structure to do a specific job, losing the ability to divide. The other daughter keeps dividing to continue growth.</span> },
    { src: "Suppl", cat: "Mitosis", front: "S7 — Name two sources of stem cells in adults.", back: <span>1. <KW c={TL}>Red bone marrow</KW> (produces blood cells).<br/>2. <KW c={TL}>Basal cells of the skin</KW> (produce new skin cells).</span> },
    { src: "Suppl", cat: "Meiosis", front: "S8 — Why MUST gametes be haploid?", back: <span>If gametes were diploid, the chromosome number would <KW c={RD}>double every generation</KW>. Haploid gametes (23 + 23) restore the diploid 46 at fertilisation — the species number stays constant.</span> },
    { src: "Suppl", cat: "Meiosis", front: "S9 — How does meiosis produce variation?", back: <span><KW c={TL}>Homologous chromosomes are randomly assorted</KW> between gametes — each gamete gets a different mixture of maternal and paternal chromosomes. Plus random fertilisation = huge variation.</span> },
    { src: "Suppl", cat: "Monohybrid", front: "S10 — Why might a Bb × Bb cross give 14 black : 2 brown instead of 12 : 4?", back: <span>The 3:1 ratio is an <KW c={TL}>expected ratio</KW> — it is what we'd see if every box of the Punnett square were filled equally. In reality, fertilisation is a matter of <Bold>chance</Bold>. You need a large sample to see the true ratio.</span> },
    { src: "Suppl", cat: "Monohybrid", front: "S11 — What is the F1 and F2 generation?", back: <span><KW c={TL}>F1 (first filial)</KW>: the offspring of the parental cross.<br/><KW c={TL}>F2 (second filial)</KW>: the offspring you get when F1 are crossed with each other. The famous 3:1 ratio is the <Bold>F2 ratio</Bold>.</span> },
    { src: "Suppl", cat: "Monohybrid", front: "S12 — What is a TEST CROSS (back-cross)? (EXT)", back: <span>Cross an unknown-genotype dominant individual with a <KW c={PU}>known homozygous recessive (bb)</KW>.<br/>• All offspring dominant → unknown was BB.<br/>• 50:50 ratio → unknown was Bb.</span> },
    { src: "Suppl", cat: "Co-dominance", front: "S13 — Sickle-cell anaemia: genotype for full disease vs the trait? (EXT)", back: <span>Hb<sup>S</sup>Hb<sup>S</sup> = <KW c={RD}>full sickle-cell anaemia</KW> (severe, distorted red cells).<br/>Hb<sup>A</sup>Hb<sup>S</sup> = <KW c={PU}>sickle-cell TRAIT</KW> (mild — incomplete dominance because Hb<sup>A</sup> doesn't fully mask Hb<sup>S</sup>).</span> },
    { src: "Suppl", cat: "Pedigree", front: "S14 — Cystic fibrosis: carrier frequency in Europeans, and risk for two carriers?", back: <span>~<KW c={TL}>1 in 25 Europeans</KW> is a heterozygous carrier (Cc). For two carriers (Cc × Cc) the chance of an affected (cc) child is <Bold>1 in 4 (25%)</Bold>.</span> },
    { src: "Suppl", cat: "Mendel", front: "S15 — Why was Mendel's pea plant a good experimental organism? (EXT)", back: <span>1. <KW c={PU}>Self-pollinating</KW> → pure-breeding lines easy to establish.<br/>2. <Bold>Clear contrasting characteristics</Bold> (tall vs dwarf, round vs wrinkled — no in-between).<br/>3. <Bold>Many seeds per cross</Bold> → reliable ratios.<br/>4. <Bold>Short generation time</Bold> — multiple crosses per year.</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams official flashcard PDF — Inheritance, Genes & Cell Division (66 cards)" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. First 66 cards = <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> official PDF (<i>Inheritance, Genes &amp; Cell Division</i>). <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = 15 NLCS supplementary cards for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.front.includes("(EXT)") || c.front.includes("Extended Tier") || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended"));
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function App() {

  const tab = TABS.find(t => t.id === active);

  return (
    <div style={{ fontFamily: "'Segoe UI', Arial, sans-serif", maxWidth: 800, margin: "0 auto", padding: "20px 16px", color: GR }}>
      {/* Top nav: Index button on the left */}
      <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 12 }}>
        <a href="contents.html" style={{
          display: "inline-flex", alignItems: "center", gap: 4,
          fontSize: 12, fontWeight: 600, color: G, textDecoration: "none",
          padding: "5px 10px 5px 6px", borderRadius: 6,
          border: `1px solid ${BD}`, background: "#fff", transition: "all .15s",
        }}>
          <span style={{ fontSize: 14, lineHeight: 1 }}>‹</span>
          <span>Index</span>
        </a>
      </div>

            {/* Header */}
      <div style={{ marginBottom: 20, borderBottom: `2px solid ${G}`, paddingBottom: 14 }}>
        <div className="chapter-kicker">IGCSE BIOLOGY · HODDER Ch.{CHAPTER_META.number} · NLCS JEJU</div>
        <div>
          <span className="chapter-title">{CHAPTER_META.title}</span>
        </div>
        <div className="chapter-subtitle">
          {CHAPTER_META.subtitle}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActive(t.id)} style={{
            padding: "9px 16px", borderRadius: 8,
            border: active === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
            background: active === t.id ? t.color : "#fff",
            color: active === t.id ? "#fff" : t.color,
            fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
          }}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 11, color: tab.color, marginBottom: 16, paddingLeft: 4 }}>{tab.sub}</div>

      {active === "essence"   && <EssenceTab />}
      {active === "exam"      && <ExamTab />}
      {active === "summary"   && <SummaryTab />}
      {active === "textbook"  && <TextbookTab />}
      {active === "flashcard" && <FlashcardTab />}

      <div style={{ marginTop: 24, padding: "10px 16px", background: "#f5f5f3", borderRadius: 8, fontSize: 11, color: "#999", textAlign: "center" }}>
        Hodder Cambridge IGCSE Biology Ch.{CHAPTER_META.number} · All English · NLCS Jeju — Extended (Paper 1, 4, 6)
      </div>
    </div>
  );
}


const __rootEl = document.getElementById('root');
const __root = ReactDOM.createRoot(__rootEl);
__root.render(<App />);
const __loader = document.getElementById('loader');
if (__loader) {
  setTimeout(() => {
    __loader.classList.add('hidden');
    setTimeout(() => __loader.remove(), 350);
  }, 100);
}
</script>

<script>
  (function() {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('nlcs-bio-theme', isDark ? 'dark' : 'light'); } catch(e) {}
    });
  })();
</script>

</body>
</html>
