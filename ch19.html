<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════

  title: "Organisms and their Environment",

  flashcardCount: 55,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters

const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },

// ════════════════════════════════════════════════════════════════════════════

// ── Food chain (land): producer → herbivore → carnivore → carnivore ──────────
function FoodChainSVG() {
  return (
    <svg viewBox="0 0 720 200" style={{ width: "100%", maxWidth: 720, display: "block", margin: "10px auto" }}>
      <rect width="720" height="200" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="360" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Food Chain — energy flow follows the arrows
      </text>

      {/* Boxes */}
      <g>
        {/* Producer */}
        <rect x="30" y="70" width="120" height="70" rx="8" fill={GL} stroke={G} strokeWidth="1.5"/>
        <text x="90" y="95" textAnchor="middle" fontSize="13" fontWeight="700" fill={G}>grass</text>
        <text x="90" y="112" textAnchor="middle" fontSize="10" fill={GR}>(producer)</text>
        <text x="90" y="128" textAnchor="middle" fontSize="9" fill="#666">trophic level 1</text>

        {/* arrow 1 */}
        <line x1="155" y1="105" x2="195" y2="105" stroke={G} strokeWidth="2.5" markerEnd="url(#arrG)"/>
        <text x="175" y="95" textAnchor="middle" fontSize="9" fill={G}>eaten by</text>

        {/* Primary consumer */}
        <rect x="200" y="70" width="120" height="70" rx="8" fill="#fef3e9" stroke={AM} strokeWidth="1.5"/>
        <text x="260" y="92" textAnchor="middle" fontSize="13" fontWeight="700" fill={AM}>grasshopper</text>
        <text x="260" y="108" textAnchor="middle" fontSize="9" fill={GR}>primary consumer</text>
        <text x="260" y="121" textAnchor="middle" fontSize="9" fill="#666">(herbivore)</text>
        <text x="260" y="134" textAnchor="middle" fontSize="9" fill="#666">trophic level 2</text>

        {/* arrow 2 */}
        <line x1="325" y1="105" x2="365" y2="105" stroke={G} strokeWidth="2.5" markerEnd="url(#arrG)"/>

        {/* Secondary consumer */}
        <rect x="370" y="70" width="120" height="70" rx="8" fill="#fef3e9" stroke={AM} strokeWidth="1.5"/>
        <text x="430" y="92" textAnchor="middle" fontSize="13" fontWeight="700" fill={AM}>lizard</text>
        <text x="430" y="108" textAnchor="middle" fontSize="9" fill={GR}>secondary consumer</text>
        <text x="430" y="121" textAnchor="middle" fontSize="9" fill="#666">(carnivore)</text>
        <text x="430" y="134" textAnchor="middle" fontSize="9" fill="#666">trophic level 3</text>

        {/* arrow 3 */}
        <line x1="495" y1="105" x2="535" y2="105" stroke={G} strokeWidth="2.5" markerEnd="url(#arrG)"/>

        {/* Tertiary consumer */}
        <rect x="540" y="70" width="150" height="70" rx="8" fill={RL} stroke={RD} strokeWidth="1.5"/>
        <text x="615" y="92" textAnchor="middle" fontSize="13" fontWeight="700" fill={RD}>hawk</text>
        <text x="615" y="108" textAnchor="middle" fontSize="9" fill={GR}>tertiary consumer</text>

        <text x="615" y="134" textAnchor="middle" fontSize="9" fill="#666">trophic level 4</text>
      </g>

      <text x="360" y="172" textAnchor="middle" fontSize="11" fill={PU} fontStyle="italic">
        Arrow always points from food → eater (direction of energy flow)
      </text>
      <text x="360" y="188" textAnchor="middle" fontSize="9" fill="#666">

}

      <text x="120" y="200" textAnchor="middle" fontSize="9" fill="#666">narrower at the top</text>

      {/* MIDDLE: Inverted pyramid */}

      <text x="360" y="62" textAnchor="middle" fontSize="9" fill="#666">(e.g. one tree, many insects)</text>

        <rect x="280" y="80" width="160" height="22" fill={RL} stroke={RD} strokeWidth="1"/>

// ① QUICK ESSENCE TAB — last-minute 5-min review
// ════════════════════════════════════════════════════════════════════════════
function EssenceTab() {
  const card = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${AM}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 12 };
  const h = { fontSize: 13, fontWeight: 800, color: AM, marginBottom: 8, letterSpacing: 0.3 };
  const li = { fontSize: 12.5, lineHeight: 1.65, marginBottom: 5, color: GR };

  return (
    <div>
      <div style={{ background: AL, border: `1px solid ${AM}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: AM, fontWeight: 600 }}>
        ⚡ <Bold>The 5-minute Essence</Bold> — read this the morning of the exam
      </div>

      <div style={card}>
        <div style={h}>① ENERGY FLOW &amp; FOOD CHAINS</div>
        <div style={li}>· The <KW c={AM}>Sun</KW> is the source of nearly all energy in biological systems.</div>
        <div style={li}>· <KW c={AM}>Producers</KW> (green plants) trap light by <Bold>photosynthesis</Bold> → chemical energy.</div>
        <div style={li}>· <KW c={AM}>Food chain</KW> = transfer of energy from one organism to the next, starting with a producer. Arrow points <Bold>food → eater</Bold>.</div>
        <div style={li}>· <KW c={AM}>Trophic level</KW> = position in the chain. Producer → primary consumer (herbivore) → secondary → tertiary (carnivores).</div>
        <div style={li}>· <KW c={AM}>Food web</KW> = many interconnected food chains.</div>
        <div style={li}>· <KW c={AM}>Decomposer</KW> = bacteria/fungi feeding on dead/waste organic material.</div>
      </div>

      <div style={card}>
        <div style={h}>② PYRAMIDS</div>
        <div style={li}>· <KW c={AM}>Pyramid of numbers</KW> — count of organisms at each level. Can be <Bold>inverted</Bold> (e.g. one tree → many caterpillars → many fleas).</div>
        <div style={li}>· <KW c={AM}>Pyramid of biomass</KW> <Ext/> — dry mass per m². <Bold>Almost always the correct pyramid shape</Bold>.</div>
        <div style={li}>· <KW c={AM}>Pyramid of energy</KW> <Ext/> — energy at each level. <Bold>Most accurate</Bold>; always correctly shaped.</div>
      </div>

      <div style={card}>
        <div style={h}>③ ENERGY TRANSFER EFFICIENCY <Ext/></div>
        <div style={li}>· Only ~<KW c={AM}>1%</KW> of sunlight is used in photosynthesis.</div>
        <div style={li}>· About <KW c={AM}>90% of energy is lost</KW> at each trophic level (respiration as heat, faeces, movement, undigested material).</div>
        <div style={li}>· This is why food chains rarely exceed <Bold>5 trophic levels</Bold>.</div>
        <div style={li}>· Feeding plants <Bold>directly</Bold> to humans is far more energy-efficient than feeding plants to livestock first.</div>
      </div>

      <div style={card}>
        <div style={h}>④ HUMAN IMPACT</div>
        <div style={li}>· <KW c={AM}>Overharvesting</KW> (bushmeat, overfishing) drives species to extinction and reduces biodiversity.</div>
        <div style={li}>· Heavy nets damage coral reefs; targeting top predators causes lower fish to overgraze (e.g. Great Barrier Reef).</div>
        <div style={li}>· <KW c={AM}>Introducing foreign species</KW> (rats on Galapagos; Opuntia cactus in Australia) disrupts native food webs — they have no predators.</div>
      </div>

      <div style={card}>
        <div style={h}>⑤ CARBON CYCLE</div>
        <div style={li}>· <KW c={AM}>Removes CO₂</KW>: photosynthesis (plants).</div>
        <div style={li}>· <KW c={AM}>Adds CO₂</KW>: respiration (all organisms), combustion (fossil fuels), decomposition.</div>
        <div style={li}>· <KW c={AM}>Fossilisation</KW> traps carbon in coal, oil, natural gas for millions of years.</div>
        <div style={li}>· Increased combustion + deforestation → rising atmospheric CO₂.</div>
      </div>

      <div style={card}>
        <div style={h}>⑥ NITROGEN CYCLE <Ext/></div>
        <div style={li}>· Plants make amino acids and proteins from nitrates (NO₃⁻).</div>
        <div style={li}>· <KW c={AM}>Nitrifying bacteria</KW>: ammonia → nitrites → nitrates (<Bold>nitrification</Bold>).</div>
        <div style={li}>· <KW c={AM}>Nitrogen-fixing bacteria</KW>: N₂ gas → ammonia (in soil OR in legume root nodules).</div>
        <div style={li}>· <KW c={AM}>Denitrifying bacteria</KW>: nitrates → N₂ gas (removes nitrates from soil).</div>
        <div style={li}>· <Bold>Decomposers</Bold> release ammonia from dead organisms and urea.</div>
      </div>

      <div style={card}>
        <div style={h}>⑦ POPULATIONS</div>
        <div style={li}>· <KW c={AM}>Population</KW> = one species, same area, same time.</div>
        <div style={li}>· <KW c={AM}>Community</KW> = all populations in an ecosystem.</div>
        <div style={li}>· <KW c={AM}>Ecosystem</KW> = community + non-living environment, interacting.</div>
        <div style={li}>· Population grows when <Bold>birth rate &gt; death rate</Bold>.</div>
        <div style={li}>· Factors affecting growth: <Bold>food supply, competition, predation, disease</Bold>.</div>
      </div>

      <div style={card}>
        <div style={h}>⑧ SIGMOID GROWTH CURVE <Ext/></div>
        <div style={li}>· <KW c={AM}>A · Lag phase</KW> — small population, slow start.</div>
        <div style={li}>· <KW c={AM}>B · Exponential (log) phase</KW> — rapid doubling.</div>
        <div style={li}>· <KW c={AM}>C · Stationary phase</KW> — birth rate = death rate (limiting factors apply).</div>
        <div style={li}>· <KW c={AM}>D · Death phase</KW> — death &gt; birth (food, waste, disease, predation).</div>
      </div>

      <div style={{ background: AL, border: `1px solid ${AM}`, borderRadius: 8,
        padding: "12px 16px", marginTop: 14, fontSize: 12, color: GR }}>
        <Bold>Key word check</Bold>: producer, consumer, herbivore, carnivore, decomposer, trophic level, food chain, food web, pyramid of biomass, biomass, population, community, ecosystem, nitrification, nitrogen fixation, denitrification, decomposition, sigmoid curve.
      </div>
    </div>
  );
}

    { id: "e16", diff: "easy", topic: "carbon", marks: 2, star: "★★★",

    { id: "e18", diff: "easy", topic: "foodchain", marks: 3, star: "★★★",

    { id: "e19", diff: "easy", topic: "foodchain", marks: 2, star: "★★★",

    { id: "e20", diff: "easy", topic: "energy", marks: 1, star: "★★★",

    { id: "m2", diff: "medium", topic: "energy", ext: true, marks: 4, star: "★★★",
      q: "Explain why food chains rarely have more than 5 trophic levels.",
      hint: "10% rule",
      a: <>Energy is lost between each trophic level [1]. About <Bold>90% is lost</Bold> at each step via respiration as heat, faeces, urine, undigested material and movement [1]. Only ~10% becomes new tissue and is available to the next level [1]. After 4-5 steps, <Bold>too little energy remains</Bold> to support another consumer [1].</> },

    { id: "m3", diff: "medium", topic: "energy", ext: true, marks: 3, star: "★★",
      q: "A cow eats grass. Describe what happens to the energy in the grass.",
      hint: "60 + 30 + 10",
      a: <>· About <Bold>60% is not digested</Bold> and passes out in faeces [1]. · About <Bold>30% is used in respiration</Bold> for movement and other life processes (lost as heat) [1]. · Less than <Bold>10% becomes new animal tissue</Bold> (growth) [1].</> },

    { id: "m4", diff: "medium", topic: "carbon", marks: 4, star: "★★★",
      q: "Describe how carbon atoms cycle between green plants, animals and the atmosphere.",
      hint: "Photosynthesis + eaten + respiration",
      a: <>Plants absorb CO₂ from the air and use it in <Bold>photosynthesis</Bold> to build carbohydrates and other organic compounds [1]. Animals <Bold>eat plants</Bold> (or other animals) and carbon becomes part of animal tissue [1]. Both plants and animals carry out <Bold>respiration</Bold>, releasing CO₂ back to the atmosphere [1]. <Bold>Decomposers / combustion of fossil fuels</Bold> also return CO₂ [1].</> },

    { id: "m5", diff: "medium", topic: "carbon", marks: 3, star: "★★",
      q: "How is carbon trapped and effectively removed from the carbon cycle for long periods?",
      hint: "Fossils",
      a: <>When dead organisms are buried and conditions <Bold>prevent decomposition</Bold> (e.g. water-logged, anaerobic) [1] their carbon becomes <Bold>compressed and trapped</Bold> [1] forming <Bold>fossil fuels</Bold> (coal, oil, natural gas) over millions of years [1].</> },

    { id: "m6", diff: "medium", topic: "nitrogen", ext: true, marks: 3, star: "★★★",
      q: "Outline the differences between nitrifying, nitrogen-fixing and denitrifying bacteria.",
      hint: "What does each do?",
      a: <>· <Bold>Nitrifying bacteria</Bold> — convert ammonia → nitrites → nitrates (oxidation) [1]. · <Bold>Nitrogen-fixing bacteria</Bold> — convert nitrogen gas (N₂) from air → ammonia/ammonium compounds (live free in soil or in legume root nodules) [1]. · <Bold>Denitrifying bacteria</Bold> — break down nitrates back into N₂ gas, removing nitrates from the soil [1].</> },

    { id: "m7", diff: "medium", topic: "nitrogen", ext: true, marks: 3, star: "★★★",
      q: "Describe the role of microorganisms in the nitrogen cycle.",
      hint: "Decomposition + nitrification + fixation",
      a: <>· <Bold>Decomposers</Bold> break down proteins in dead organisms and waste (urea), releasing <Bold>ammonia</Bold> into the soil [1]. · <Bold>Nitrifying bacteria</Bold> oxidise ammonia → nitrites → <Bold>nitrates</Bold>, which plants absorb [1]. · <Bold>Nitrogen-fixing bacteria</Bold> in soil or in legume root nodules convert N₂ gas into compounds plants can use [1].</> },

    { id: "m8", diff: "medium", topic: "populations", marks: 3, star: "★★",
      q: "If there are 12,000 live births in a population of 400,000 in 1 year, calculate the birth rate per 1,000.",
      hint: "Births ÷ population × 1000",

    { id: "m9", diff: "medium", topic: "sigmoid", ext: true, marks: 4, star: "★★★",
      q: "Describe the four phases of a sigmoid (S-shaped) growth curve.",
      hint: "Lag, log, stationary, death",
      a: <>· <Bold>A · Lag phase</Bold> — small population, slow growth as individuals adjust [1]. · <Bold>B · Exponential / log phase</Bold> — rapid doubling, plenty of resources [1]. · <Bold>C · Stationary phase</Bold> — limiting factors apply (food, space, waste, disease); birth rate = death rate [1]. · <Bold>D · Death phase</Bold> — death rate exceeds birth rate; population falls [1].</> },

    { id: "m10", diff: "medium", topic: "human", marks: 4, star: "★★",
      q: "Explain why introducing rats to the Galapagos Islands damaged the native food web.",
      hint: "No predators + new prey",
      a: <>The rats had <Bold>no natural predators</Bold> on the islands [1] so their population grew rapidly [1]. They fed on <Bold>eggs of birds, reptiles and tortoises</Bold> and on young animals [1]. Native species were unable to defend themselves and many <Bold>became endangered</Bold>, disrupting the food web [1].</> },

    { id: "m11", diff: "medium", topic: "pyramids", ext: true, marks: 3, star: "★★",
      q: "A pyramid of numbers for one oak tree, 1000 caterpillars and 200 birds is drawn. Describe and explain its shape.",

    { id: "m12", diff: "medium", topic: "human", marks: 3, star: "★★",
      q: "Suggest two effects of overfishing on the marine ecosystem.",
      hint: "Population + habitat",
      a: <>· Target fish populations <Bold>fall below sustainable levels</Bold> (e.g. herring, bluefin tuna, cod) [1]. · Heavy nets dragged on the seabed <Bold>destroy habitats</Bold> such as coral reefs [1]. · Removing top predators (e.g. grouper) lets prey species <Bold>overgraze reefs</Bold>, damaging the ecosystem [1]. (Any 3)</> },

    { id: "m13", diff: "medium", topic: "energy", ext: true, marks: 3, star: "★★",
      q: "Explain why it is more energy-efficient for humans to eat plants directly than to feed plants to animals first.",
      hint: "10% rule",
      a: <>Only ~10% of plant energy is converted into animal tissue [1]; the rest is lost as <Bold>heat (respiration), faeces and movement</Bold> [1]. Eating plants directly <Bold>avoids one trophic level loss</Bold> and gives ~10× more usable energy [1].</> },

    { id: "m14", diff: "medium", topic: "populations", marks: 4, star: "★★",
      q: "Describe the predator-prey relationship between lynxes and snowshoe hares.",
      hint: "Time lag",
      a: <>· When the hare population is high, lynxes have abundant food so their numbers <Bold>increase</Bold> [1]. · More lynxes <Bold>reduce the hare population</Bold> [1]. · With fewer hares, lynxes starve and their numbers <Bold>fall</Bold> [1]. · Hares then recover, and the cycle repeats — there is a <Bold>time lag</Bold> between the two curves [1].</> },

    { id: "m15", diff: "medium", topic: "carbon", marks: 3, star: "★★",
      q: "Describe how decomposers contribute to the carbon cycle.",
      hint: "Dead organisms → CO2",
      a: <>Decomposers (bacteria and fungi) feed on <Bold>dead organisms and waste</Bold> [1]. They secrete extracellular enzymes and respire the organic compounds [1], releasing <Bold>CO₂ back to the atmosphere</Bold> and recycling minerals into the soil [1].</> },

    // ── SME MCQ-derived (Medium) ──
    { id: "m16", diff: "medium", topic: "pyramids", marks: 3, star: "★★★",

    { id: "m17", diff: "medium", topic: "populations", marks: 3, star: "★★",

    { id: "m18", diff: "medium", topic: "foodchain", marks: 2, star: "★★★",
      q: "In a marine food web: algae → small invertebrates → mussels/lugworms/limpets → crabs → seagulls; also crabs eat lugworms, limpets and mussels; lobsters eat mussels; whelks eat mussels. Which organism feeds on the greatest variety of prey, and why is this advantageous?",

    { id: "m19", diff: "medium", topic: "nitrogen", ext: true, marks: 4, star: "★★★",
      q: "A nitrogen-cycle diagram shows: nitrogen in atmosphere ↔ nitrate ions ↔ plants → animals → ammonium ions ← (also from plants). Match the following processes to arrows W, X, Y, Z where W = atmosphere → plants (via nitrates), X = ammonium → nitrate, Y = animals/plants → ammonium, Z = nitrate → atmosphere. Name the type of bacteria responsible for each.",
      hint: "Fixing, nitrifying, decomposer, denitrifying",
      a: <>· <Bold>W = nitrogen-fixing bacteria</Bold> (atmospheric N₂ → ammonium → plants) [1]. · <Bold>X = nitrifying bacteria</Bold> (ammonium → nitrites → nitrates) [1]. · <Bold>Y = decomposer bacteria</Bold> (break down dead matter and urea to release ammonium ions) [1]. · <Bold>Z = denitrifying bacteria</Bold> (nitrate → N₂ gas in anaerobic soils) [1].</> },

    { id: "m20", diff: "medium", topic: "carbon", marks: 2, star: "★★★",
      q: "Identify ONE process that releases CO₂ into the atmosphere AND ONE that removes CO₂ from the atmosphere. Justify both.",
      hint: "Living vs photosynthesis",
      a: <>· <Bold>Releases CO₂:</Bold> respiration (or combustion, decay) — organic carbon is oxidised to CO₂ which is exhaled or released to the air [1]. · <Bold>Removes CO₂:</Bold> photosynthesis — green plants fix CO₂ into glucose using light energy [1].</> },

    { id: "m21", diff: "medium", topic: "foodchain", marks: 2, star: "★★",
      q: "In a desert food web, hawks eat desert snakes, large lizards and kangaroo rats; desert foxes eat large lizards, desert snakes and kangaroo rats; desert snakes eat kangaroo rats; large lizards eat small lizards; small lizards and kangaroo rats eat desert plants. Identify all the secondary consumers and justify.",
      hint: "Eats a primary consumer",
      a: <>Secondary consumers are <Bold>large lizards and desert snakes</Bold> [1] because they eat primary consumers (small lizards / kangaroo rats which eat plants). Hawks and foxes feed on these secondary consumers too, so they act as <Bold>tertiary consumers</Bold> in those chains rather than secondary only [1].</> },

    { id: "m22", diff: "medium", topic: "energy", marks: 2, star: "★★★",
      q: "Energy flow: Sun → grass → rabbit → fox. State the FORM of energy at point 1 (between Sun and grass) and at point 3 (between rabbit and fox).",

      a: <>· Point 1: <Bold>light energy</Bold> [1] (from the Sun, captured by chlorophyll). · Point 3: <Bold>chemical energy</Bold> [1] (energy stored in molecules of the rabbit's body tissue, transferred when the fox eats it).</> },

    { id: "m23", diff: "medium", topic: "foodchain", marks: 2, star: "★★",
      q: "In a small food web, a fox eats rabbits and mice; an owl eats mice and grasshoppers; a blackbird eats grasshoppers; rabbits eat grass; mice eat grass and wheat; grasshoppers eat wheat. Which animal feeds at BOTH the secondary and tertiary consumer levels? Explain.",
      hint: "Check what it eats — primary AND secondary consumers",
      a: <>The <Bold>fox</Bold> [1]. It is a <Bold>secondary consumer</Bold> when it eats rabbits (rabbits = primary consumer), and a <Bold>tertiary consumer</Bold> when it eats mice that have eaten grasshoppers/wheat — so the fox sits at two trophic levels in this web [1]. (Owl also qualifies; key is the dual position.)</> },

    // ─────────────────── HARD ───────────────────
    { id: "h1", diff: "hard", topic: "nitrogen", ext: true, marks: 9, star: "★★★",
      q: "Describe how gaseous nitrogen (N₂) can become part of a protein molecule in the muscle of a mouse.",
      hint: "Full nitrogen cycle path",
      a: <>· Atmospheric N₂ is converted to ammonia/ammonium compounds by <Bold>nitrogen-fixing bacteria</Bold> (free-living in soil or in legume root nodules) [1]. · Lightning also fixes small amounts of N₂ → nitrates [1]. · <Bold>Nitrifying bacteria</Bold> oxidise ammonia → nitrites (NO₂⁻) [1] → <Bold>nitrates (NO₃⁻)</Bold> [1]. · Nitrates are <Bold>absorbed by plant roots</Bold> (active transport) [1]. · The plant combines nitrates with carbohydrates to make <Bold>amino acids</Bold> [1] which are joined into <Bold>plant proteins</Bold> [1]. · A herbivore (e.g. seed-eating mouse) eats the plant; proteins are <Bold>digested to amino acids</Bold> and absorbed [1]. · The mouse <Bold>reassembles amino acids</Bold> into muscle protein at the ribosomes [1].</> },

    { id: "h2", diff: "hard", topic: "foodchain", marks: 6, star: "★★★",
      type: "diagram",
      q: "In 1937, two male and six female pheasants were introduced to an island off the coast of N. America with no predators. Population: 1937=24, 1938=65, 1939=253, 1940=563, 1941=1122, 1942=1611. Plot a graph and state whether it shows any part of a sigmoid curve.",
      hint: "Lag → log",
      a: <>· Axes: x = year (1937-1942) [1], y = population (0-1700+) [1]. · Points plotted accurately [1] and joined with smooth curve [1]. · The curve shows a <Bold>lag phase</Bold> (1937-1938, slow start) [1] followed by an <Bold>exponential/log phase</Bold> (1939 onwards, rapid increase). · The data <Bold>does NOT yet show stationary or death phases</Bold> — the island still has resources [1].</> },

    { id: "h3", diff: "hard", topic: "human", marks: 6, star: "★★",
      q: "Using Figure 19.7 (a food web), suggest the effects on other organisms if: (i) rats become infected with a disease and die [3], (ii) eagles are hunted to extinction [3].",
      hint: "Knock-on effects",
      a: <><Bold>(i) Rats die out:</Bold> · Mongooses, snakes and eagles lose a major food source so their numbers <Bold>fall</Bold> [1]. · These predators may switch to <Bold>eating more beetles and hares</Bold> [1]. · Beetle and hare numbers initially fall then recover as predator numbers drop [1]. <Bold>(ii) Eagles extinct:</Bold> · Snakes and mongooses have <Bold>no top predator</Bold>, their numbers increase [1]. · They eat more rats and hares → those populations <Bold>fall</Bold> [1]. · Reduced rat populations affect beetles (less competition) and vegetation may recover slightly [1].</> },

    { id: "h4", diff: "hard", topic: "sigmoid", ext: true, marks: 6, star: "★★★",
      type: "table",
      q: "Two species of Paramecium are grown together. P. aurelia outcompetes P. caudatum so caudatum drops to zero by day 16. (a) Suggest why both populations increase 0-3 days. (b) Why does P. caudatum decrease after day 5? (c) Which phase represents exponential growth of P. aurelia (in days)?",
      hint: "Competition + log phase",
      a: <><Bold>(a)</Bold> Plenty of food and space, low population so <Bold>no competition</Bold> yet — both grow in their lag/log phases [2]. <Bold>(b)</Bold> P. aurelia <Bold>takes up food more rapidly</Bold> than P. caudatum, so caudatum is <Bold>out-competed</Bold>; food becomes a limiting factor for caudatum and its death rate rises [2]. <Bold>(c)</Bold> Exponential growth of P. aurelia is roughly between <Bold>days 2-6</Bold> (steep upward part of curve) [2].</> },

    { id: "h5", diff: "hard", topic: "carbon", marks: 5, star: "★★",
      q: "Explain how burning fossil fuels affects the carbon cycle and the atmosphere.",
      hint: "Combustion + CO2 balance",
      a: <>Burning fossil fuels (coal, oil, gas) <Bold>oxidises trapped carbon</Bold> (C + O₂ → CO₂) [1]. This carbon had been <Bold>removed from the cycle for millions of years</Bold> by fossilisation [1]. So combustion <Bold>adds CO₂ faster than photosynthesis removes it</Bold> [1]. Atmospheric CO₂ concentration <Bold>rises</Bold> [1], enhancing the greenhouse effect and contributing to <Bold>climate change</Bold> [1].</> },

    { id: "h6", diff: "hard", topic: "energy", ext: true, marks: 5, star: "★★",
      q: "A food chain starts with grass containing 100 units of energy. After locust → lizard → snake → mongoose, only 0.01 units remain. Explain why so little energy reaches the top, and what this means for top predators.",
      hint: "Each step ~10%",
      a: <>· Energy is lost as <Bold>heat from respiration</Bold>, in faeces (undigested), in urine, and in movement [1]. · Only ~10% is converted into new tissue at each trophic level [1]. · 100 → 10 → 1 → 0.1 → 0.01 units shows the <Bold>cumulative loss</Bold> [1]. · Top predators (mongoose) need to <Bold>cover large areas</Bold> to find enough food [1] and exist in <Bold>small numbers</Bold> — they are especially vulnerable to habitat loss and overhunting [1].</> },

    { id: "h7", diff: "hard", topic: "human", marks: 5, star: "★★",
      q: "Explain why colonisation of islands with goats and cats often damages the native food web.",
      hint: "Introduced species + no predators",
      a: <>· Goats and cats had <Bold>no natural predators</Bold> on the islands [1] so their populations grew quickly [1]. · <Bold>Goats overgrazed</Bold> native vegetation, removing the food/habitat of native herbivores [1]. · <Bold>Cats preyed on</Bold> native birds, reptiles and small mammals that had not evolved defences [1]. · The native species declined or became extinct, <Bold>reducing biodiversity</Bold> and disrupting food webs [1].</> },

    { id: "h8", diff: "hard", topic: "pyramids", ext: true, marks: 4, star: "★★",
      q: "Explain the difference between a pyramid of biomass and a pyramid of energy, and why a pyramid of energy is generally considered the most accurate.",
      hint: "Biomass = snapshot; energy = flow",
      a: <>· <Bold>Pyramid of biomass</Bold> shows the <Bold>dry mass</Bold> of organisms at each trophic level at one moment [1]. · <Bold>Pyramid of energy</Bold> shows the <Bold>energy passing through</Bold> each level over a period of time (per unit area per year) [1]. · Biomass can sometimes be misleading (e.g. small but fast-growing phytoplankton turn over rapidly), but a pyramid of energy <Bold>accounts for productivity</Bold> [1] and is <Bold>always correctly shaped</Bold> as energy is always lost upwards [1].</> },

    { id: "h9", diff: "hard", topic: "nitrogen", ext: true, marks: 5, star: "★★",
      q: "On nitrate-deficient soil, clover (a legume) stands out as dark green and healthy against pale-green grass. Suggest why.",
      hint: "Legumes have nitrogen-fixing bacteria",
      a: <>· Clover is a <Bold>leguminous plant</Bold> with <Bold>root nodules</Bold> containing <Bold>nitrogen-fixing bacteria</Bold> [1]. · These bacteria fix N₂ from air into <Bold>ammonia compounds</Bold> available to the clover [1]. · So clover obtains enough nitrogen to make plenty of <Bold>amino acids → proteins → chlorophyll</Bold> [1]. · The grass lacks this symbiosis and depends only on soil nitrates, which are <Bold>limited</Bold> [1]. · The grass produces less chlorophyll and looks <Bold>pale (yellowish)</Bold> [1].</> },

    { id: "h10", diff: "hard", topic: "populations", marks: 5, star: "★★",
      q: "Describe and explain the changes that take place during all four phases of a sigmoid growth curve for a Paramecium culture.",
      hint: "Lag → log → stationary → death + reasons",
      a: <>· <Bold>Lag</Bold> — population small, doubling has little visible effect [1]. · <Bold>Log/exponential</Bold> — each generation doubles; nutrients plentiful, no competition; growth is rapid [1]. · <Bold>Stationary</Bold> — limiting factors apply: food runs short, competition, waste build-up, disease; birth rate = death rate [1]. · <Bold>Death</Bold> — death rate now exceeds birth rate; numbers fall as food is exhausted, toxins build up, disease spreads [1]. · Reason this is a simplified model: in nature conditions <Bold>fluctuate</Bold> and the stationary phase is rarely reached [1].</> },

    { id: "h11", diff: "hard", topic: "energy", ext: true, marks: 5, star: "★★",
      q: "Discuss the energy efficiency of keeping battery hens vs free-range hens.",
      hint: "Movement + heat loss",
      a: <>· Battery hens are kept in <Bold>small cages</Bold> at warm temperatures [1] so they <Bold>lose less heat</Bold> to the atmosphere [1] and <Bold>use less energy in movement</Bold> [1]. · More of the food they eat goes into <Bold>growth (meat) and egg production</Bold>, making the process more energy-efficient [1]. · However, this is widely considered <Bold>inhumane</Bold>, and feeding plants directly to humans is even more efficient [1].</> },

    { id: "h12", diff: "hard", topic: "human", marks: 4, star: "★★",
      q: "Why does overhunting of grouper fish in the Great Barrier Reef cause damage beyond just reduced grouper numbers?",
      hint: "Top predator removed",
      a: <>· Grouper are <Bold>top predators</Bold>; removing them means their prey are no longer controlled [1]. · Fish lower down the food chain <Bold>increase in numbers</Bold> [1]. · These fish <Bold>overgraze the reef</Bold>, damaging coral and the habitat of many species [1]. · Grouper are <Bold>slow to mature</Bold>, so populations recover slowly and the species becomes endangered [1].</> },

    { id: "h13", diff: "hard", topic: "carbon", marks: 6, star: "★★",
      q: "Describe how the same carbon atom could move from atmospheric CO₂ → wheat grain → muscle of a mouse → back into the atmosphere.",
      hint: "Trace step by step",
      a: <>· CO₂ enters a wheat leaf through stomata; in <Bold>photosynthesis</Bold> it is fixed into glucose [1]. · Glucose is converted to <Bold>starch in the grain</Bold> [1]. · Mouse eats the grain; starch is digested to glucose, absorbed and either respired or used to make <Bold>amino acids → muscle protein</Bold> [1]. · Some glucose is <Bold>respired</Bold> in the mouse's cells, releasing CO₂ [1]. · The CO₂ is <Bold>exhaled</Bold>, returning to the atmosphere [1]. · Alternatively, when the mouse dies, <Bold>decomposers</Bold> break down its tissues and respire, releasing CO₂ [1].</> },

    // ── SME MCQ-derived (Hard) ──
    { id: "h14", diff: "hard", topic: "populations", marks: 4, star: "★★★",
      q: "In a habitat, the number of carnivores has been stable for a long time. At time X, ALL the herbivores are suddenly removed. Sketch (in words) and explain the shape of the carnivore population curve from time X onward.",
      hint: "Stay steady briefly → then crash",
      a: <>· Immediately after X the carnivore numbers <Bold>stay roughly constant for a short time</Bold> [1] as carnivores already alive continue to live. · Carnivores then have <Bold>no food</Bold> (no herbivores to eat) [1] so they <Bold>starve and/or migrate</Bold>, and the population <Bold>falls steeply toward zero</Bold> [1]. · The graph therefore shows a brief plateau followed by a <Bold>steep decline</Bold> (cannot increase or stay high) [1].</> },

    { id: "h15", diff: "hard", topic: "sigmoid", ext: true, marks: 3, star: "★★★",
      q: "On the world human population curve (1650 → 2000), a point X is marked on the steeply-rising portion just before 2000 (around 5-7 billion). Name this stage of the sigmoid curve and justify, then state what the next stage will look like if resources become limiting.",
      hint: "Steep rise = log; flat top = stationary",
      a: <>Point X is in the <Bold>exponential (log) phase</Bold> [1] — the gradient is steepest, indicating rapid doubling [1]. If resources (food, space, water) become limiting, the curve will <Bold>flatten into a stationary phase</Bold> where birth rate ≈ death rate [1].</> },

    { id: "h16", diff: "hard", topic: "energy", ext: true, marks: 3, star: "★★★",
      q: "Explain the BEST reason why most food chains have no more than five trophic levels. (Address why options like '20% × 5 = 100%' or 'pyramid-of-numbers count = 1' are NOT the correct explanation.)",
      hint: "Energy loss, not arithmetic",
      a: <>Correct reason: at each trophic level <Bold>~90% of energy is lost</Bold> via heat (respiration), faeces, urine and movement [1]. By the 5th level, the energy remaining is <Bold>too small to support another consumer</Bold> [1]. The '20% × 5 = 100%' answer is mathematically wrong (each step is a 90% loss, not an additive subtraction), and biomass count of 1 is a consequence not a cause [1].</> },

    { id: "h17", diff: "hard", topic: "pyramids", ext: true, marks: 3, star: "★★★",
      type: "calc",
      q: "A food chain has: 1 oak tree (biomass = 400 000 kg), 9 000 aphids (biomass = 900 kg), 120 predatory midges (biomass = 45 kg). Calculate the percentage of biomass transferred from aphids to midges.",
      hint: "(midge biomass / aphid biomass) × 100",
      a: <>% transfer = (midge biomass ÷ aphid biomass) × 100 [1] = (45 ÷ 900) × 100 [1] = <Bold>5 %</Bold> [1].</> },

    { id: "h18", diff: "hard", topic: "populations", ext: true, marks: 4, star: "★★",
      type: "calc",
      q: "A scientist grows bacteria in ideal conditions. Each cell divides every 30 minutes. Starting with 10 cells, calculate the population after 8 hours, assuming 10% of cells die in the final minutes. Show working.",
      hint: "Doublings = 16; multiply then take 90%",
      a: <>· Number of 30-min periods in 8 h = 8 × 2 = <Bold>16 doublings</Bold> [1]. · Population before deaths = 10 × 2¹⁶ = 10 × 65 536 = <Bold>655 360 cells</Bold> [1]. · 10% die, so 90% survive: 655 360 × 0.9 [1] = <Bold>589 824 cells</Bold> [1].</> },

    { id: "h19", diff: "hard", topic: "sigmoid", ext: true, marks: 3, star: "★★",
      q: "A population growth curve for an insect introduced to an island shows: ~0 insects at day 0, gradual rise to day 100, very steep rise from day 100 to ~180, then levelling near 100 insects/m² by day 250. State the day on which resources such as food FIRST begin to limit growth, and justify.",
      hint: "Where does the gradient start to fall?",
      a: <>Resources begin to limit growth at <Bold>~150 days</Bold> [1] — this is the <Bold>point of inflection</Bold> where the curve stops accelerating and starts to flatten [1]. Before this point growth is still exponential (resources unlimited); after this point competition / food shortage slows the rate of increase [1].</> },

    // ════════════════════════════════════════════════════
    // ── SME Theory Questions (structured exam-style) ──
    // ════════════════════════════════════════════════════

    // ── EASY (SME Theory) ──
    { id: "e23", diff: "easy", topic: "trophic", marks: 7, star: "★★★",
      q: "Rabbits are herbivores. (a) Define herbivore [2]. (b) A rabbit population graph fluctuates yearly. State TWO factors that could CAUSE an increase in a rabbit population [2]. (c) Since 1800 the human population has grown rapidly. State THREE ways in which this growth has affected marine ecosystems [3].",
      hint: "Eats plants · food/no predator · overfishing/pollution/habitat loss",
      a: <><Bold>(a)</Bold> An animal that gets its <Bold>energy by eating plants</Bold> [1] (a primary consumer that feeds on producers) [1]. <Bold>(b)</Bold> Any 2 of: <Bold>more food / vegetation available</Bold> [1]; <Bold>fewer predators</Bold> [1]; less disease; favourable weather; higher birth rate / lower death rate [1 each]. <Bold>(c)</Bold> Any 3 of: <Bold>overfishing</Bold> reducing fish stocks [1]; <Bold>pollution</Bold> (sewage, oil spills, plastic, agricultural runoff) [1]; <Bold>habitat destruction</Bold> (coral reefs, mangroves) [1]; rising ocean temperatures / acidification from CO₂ [1].</> },

    { id: "e24", diff: "easy", topic: "carbon", marks: 5, star: "★★★",
      type: "matching",
      q: "Match each carbon-cycle process to its description: Combustion · Decomposition · Feeding · Photosynthesis · Respiration ↔ (i) breakdown of dead or waste organic matter, (ii) burning, (iii) chemical reactions in cells that break down nutrients to release energy, (iv) ingestion of organic material, (v) manufacture of carbohydrates from raw materials using light energy.",
      hint: "Burning = combustion; light energy = photosynthesis",
      a: <>· Combustion → <Bold>burning</Bold> [1] · Decomposition → <Bold>breakdown of dead or waste organic matter</Bold> [1] · Feeding → <Bold>ingestion of organic material</Bold> [1] · Photosynthesis → <Bold>manufacture of carbohydrates from raw materials using light energy</Bold> [1] · Respiration → <Bold>chemical reactions in cells that break down nutrients to release energy</Bold> [1].</> },

    { id: "e25", diff: "easy", topic: "energy", ext: true, marks: 11, star: "★★★",
      q: "Arctic wolves live in tundra in Canada/Alaska. (a)(i) State TWO visible features that identify them as mammals [2]. (a)(ii) Define adaptive feature [3]. (b) State THREE conditions that limit plant growth in the tundra [3]. (c) Explain why the number of Arctic wolves in the tundra is small [3].",
      hint: "Hair + give birth to live young; cold/light/short season; long chain + low productivity",
      a: <><Bold>(a)(i)</Bold> Any 2: <Bold>body covered in hair / fur</Bold> [1]; <Bold>visible external ears (pinnae)</Bold> [1]; four limbs; mammary glands (if visible) [1 each]. <Bold>(a)(ii)</Bold> An <Bold>inherited feature</Bold> [1] that <Bold>helps the organism survive</Bold> in its environment [1] and <Bold>increases its chance of reproducing</Bold> (fitness) [1]. <Bold>(b)</Bold> Any 3: <Bold>low temperatures</Bold> (slow enzyme reactions) [1]; <Bold>short day-length / low light intensity</Bold> [1]; <Bold>short growing season</Bold> [1]; few nutrients in thin soil; permafrost limits roots [1 each]. <Bold>(c)</Bold> Wolves are top of a <Bold>long food chain</Bold> [1]; only ~10% of energy is passed up at each trophic level [1]; the tundra has <Bold>low primary productivity</Bold>, so very little energy reaches the top level → only a small number can be supported [1].</> },

    { id: "e26", diff: "easy", topic: "foodchain", marks: 7, star: "★★★",
      type: "table",
      q: "A food web shows: corn plant → grasshopper, corn plant → vole; grasshopper → hawk; vole → hawk; vole → snake; snake → hawk. (i) For each organism (corn plant, vole, grasshopper, hawk) tick whether it is a producer, herbivore and/or secondary consumer [3]. (ii) How many trophic levels are in the food web [1]? (iii) Name one organism feeding at MORE than one trophic level [1]. (iv) State the term for an organism that feeds on dead/waste material [1]. (v) State the principal energy source for food webs [1].",
      hint: "Hawk eats vole AND snake",
      a: <><Bold>(i)</Bold> Corn plant — producer ✓ [1]. Vole — herbivore ✓ [1]. Grasshopper — herbivore ✓, secondary consumer ✗. Hawk — secondary consumer ✓ [1]. <Bold>(ii)</Bold> <Bold>4 trophic levels</Bold> (producer → primary → secondary → tertiary) [1]. <Bold>(iii)</Bold> <Bold>Hawk</Bold> (eats vole as a secondary consumer, eats snake as a tertiary consumer) [1]. <Bold>(iv)</Bold> <Bold>Decomposer</Bold> [1]. <Bold>(v)</Bold> <Bold>The Sun</Bold> (light energy) [1].</> },

    { id: "e27", diff: "easy", topic: "carbon", marks: 6, star: "★★★",
      q: "A carbon cycle diagram has: CO₂ in air ↔ carbon compounds in plants (arrow K from CO₂ down to plants); arrow L from plants to animals; arrow J from fossil fuels to CO₂ in air; arrow M from animals up to CO₂. (i) Where on the diagram would you draw 'respiration in plants' [1]? (ii) Identify processes J, L, M [3]. (iii) State the TWO products of photosynthesis (process K) [2].",
      hint: "K = photosynthesis (CO2 in); plants→air = respiration",
      a: <><Bold>(i)</Bold> An arrow from <Bold>'carbon compounds in plants' → 'CO₂ in atmosphere'</Bold> [1]. <Bold>(ii)</Bold> J = <Bold>combustion</Bold> (burning fossil fuels) [1]. L = <Bold>feeding / ingestion</Bold> [1]. M = <Bold>respiration</Bold> (in animals) [1]. <Bold>(iii)</Bold> <Bold>Glucose / carbohydrate</Bold> [1] and <Bold>oxygen</Bold> [1].</> },

    { id: "e28", diff: "easy", topic: "nitrogen", ext: true, marks: 3, star: "★★★",
      q: "On a nitrogen-cycle diagram: arrow 1 goes from N₂ in air → ammonium ions (NH₄⁺); arrow 2 goes from proteins/amino acids → ammonium ions; arrow 3 goes from ammonium → nitrite → nitrate ions. Name processes 1, 2 and 3.",
      hint: "Fixation · decomposition · nitrification",
      a: <>1 = <Bold>nitrogen fixation</Bold> (by nitrogen-fixing bacteria or lightning) [1]. 2 = <Bold>decomposition</Bold> (by decomposer bacteria/fungi breaking down dead protein) [1]. 3 = <Bold>nitrification</Bold> (by nitrifying bacteria oxidising ammonium → nitrites → nitrates) [1].</> },

    // ── MEDIUM (SME Theory) ──
    { id: "m24", diff: "medium", topic: "carbon", marks: 8, star: "★★★",
      q: "A carbon cycle diagram has CO₂ in air (top) linked to carbon compounds in fossil fuels (left, arrow R), plants (centre, arrows S and T), animals (centre-right, arrow V) and dead organisms (right, arrow W); arrow U links plants → animals. (a)(i) Name process U [1]. (ii) Name the group of organisms responsible for process W [1]. (iii) List the TWO letters that identify respiration [2]. (iv) State the letter that identifies photosynthesis [1]. (b) Write the word equation for aerobic respiration [2]. (c) Suggest THREE reasons why mean atmospheric CO₂ has risen over the last 100 years [3].",
      hint: "U = feeding; W = decomposers (decay returns CO₂)",
      a: <><Bold>(a)(i)</Bold> U = <Bold>feeding / ingestion</Bold> [1]. <Bold>(ii)</Bold> W = <Bold>decomposers</Bold> (bacteria and fungi) [1]. <Bold>(iii)</Bold> Respiration = <Bold>T and V</Bold> (plants → air, animals → air) [2]. <Bold>(iv)</Bold> Photosynthesis = <Bold>S</Bold> (CO₂ → plants) [1]. <Bold>(b)</Bold> glucose + oxygen → carbon dioxide + water [2]. <Bold>(c)</Bold> Any 3 of: <Bold>burning of fossil fuels</Bold> (coal, oil, gas) for energy/transport [1]; <Bold>deforestation</Bold> reduces CO₂ uptake by photosynthesis [1]; <Bold>industrialisation</Bold> increases combustion [1]; population growth → more energy demand [1]; cement manufacture and other industrial processes [1].</> },

    { id: "m25", diff: "medium", topic: "foodchain", marks: 5, star: "★★★",
      q: "An African grassland food web: star grass → topi, Thomson's gazelle; red oat grass → mice, grasshoppers; topi/Thomson's gazelle → cheetahs, lions, serval cats; mice/grasshoppers → serval cats, tawny eagles; vultures → eat dead mammals. (a) Name the trophic level of: (i) star grass [1]; (ii) topi [1]. (b) Name the type of organism that vultures represent in this web [1]. (c) State the principal source of energy [1] AND state what happens to energy when it leaves a food web [1].",
      hint: "Vulture = scavenger; energy → heat",
      a: <><Bold>(a)(i)</Bold> Star grass — <Bold>producer</Bold> [1]. <Bold>(ii)</Bold> Topi — <Bold>primary consumer / herbivore</Bold> [1]. <Bold>(b)</Bold> Vulture = <Bold>scavenger / decomposer</Bold> (feeds on dead organisms) [1]. <Bold>(c)</Bold> Principal source = <Bold>the Sun (light)</Bold> [1]. When energy leaves a food web it is <Bold>lost as heat</Bold> (mostly from respiration) to the surroundings [1].</> },

    { id: "m26", diff: "medium", topic: "energy", ext: true, marks: 6, star: "★★★",
      q: "Using the same African grassland food web (4 trophic levels). (a) Explain why there are no MORE than four trophic levels in this food web [3]. (b) Salmon farms feed salmon on high-protein animal-based feed, making the fish behave as secondary consumers. Describe the disadvantages of intensive farming such as salmon farming for producing human food [3].",
      hint: "10% rule × 4 levels; ethics + pollution + disease",
      a: <><Bold>(a)</Bold> · Energy is <Bold>lost at every trophic level</Bold> (heat from respiration, faeces, urine, movement) [1] · Only ~10% transfers to the next level [1] · After 4 levels too little energy remains to support a 5th [1]. <Bold>(b)</Bold> Any 3: feeding fish to fish is <Bold>energy-inefficient</Bold> (one more trophic level) [1]; <Bold>waste/faeces pollute</Bold> the surrounding water (eutrophication) [1]; <Bold>disease and parasites</Bold> spread quickly in dense pens [1]; antibiotic / pesticide use risks resistance and contaminates wild fish [1]; escaped fish out-compete wild populations [1]; high welfare concerns / unnatural living conditions [1].</> },

    { id: "m27", diff: "medium", topic: "endangered", marks: 5, star: "★★",
      q: "A species is endangered when it is at risk of extinction. (a) From the food chain ‘fig tree → caterpillars → blackbirds → hawks’, state (i) the principal source of energy for this food chain [1] and (ii) the type of organism that gains its energy from dead organic material [1]. (b) Explain TWO ways in which a species could become endangered [4 — 2 marks each — but score one for each explanation pair, total max 4].",
      hint: "Habitat loss + over-harvest + pollution + introduced species",
      a: <><Bold>(a)(i)</Bold> The <Bold>Sun</Bold> (light) [1]. <Bold>(ii)</Bold> <Bold>Decomposer</Bold> (bacteria/fungi) [1]. <Bold>(b)</Bold> Any 2 with explanation: <Bold>habitat destruction</Bold> (deforestation, drainage of wetlands) removes shelter/food [2]; <Bold>over-hunting / overfishing</Bold> faster than reproduction [2]; <Bold>pollution</Bold> (pesticides, oil spills) directly kills or poisons food [2]; <Bold>climate change</Bold> shifts habitat conditions [2]; <Bold>introduced species</Bold> out-compete or prey on natives [2]. One way to conserve: protected reserves / breeding programmes / seed banks / legislation [bonus 1].</> },

    { id: "m28", diff: "medium", topic: "adapt", ext: true, marks: 5, star: "★★",
      q: "Adaptive features are inherited features that increase an organism's fitness. (a) State what is meant by 'fitness' in this context [1]. (b) The jerboa (a desert rodent) is nocturnal. Suggest TWO adaptive features that help it survive: (i) very high daytime temperatures [2]; (ii) very little or no light at night [2].",
      hint: "Reproductive success; burrow + light fur; large eyes + ears",
      a: <><Bold>(a)</Bold> Fitness = the <Bold>chance of an organism surviving and reproducing</Bold> (passing its genes to the next generation) [1]. <Bold>(b)(i)</Bold> Any 2: <Bold>nocturnal activity</Bold> — feeds at night to avoid heat [1]; lives in <Bold>burrows</Bold> underground that stay cool [1]; <Bold>pale fur</Bold> reflects heat / camouflage; large surface-area ears for heat loss [1]. <Bold>(b)(ii)</Bold> Any 2: <Bold>large eyes</Bold> with many rods for low-light vision [1]; <Bold>large external ears (pinnae)</Bold> for acute hearing [1]; <Bold>long whiskers / vibrissae</Bold> to detect surroundings; strong sense of smell [1].</> },

    { id: "m29", diff: "medium", topic: "pyramids", marks: 8, star: "★★★",
      type: "table",
      q: "A desert biomass survey: producers 480, herbivores 220, detritivores 120, carnivores 40 (g/m²). (i) The pyramid of biomass already has 'producers' (480) and a 'herbivores + detritivores' bar. Sketch what bar still needs to be added [2]. (ii) The scientist included detritivores WITH herbivores in the bar. Suggest what he discovered that made him decide this [1]. (iii) Explain why ecosystems rarely have more than 4-5 trophic levels [2]. (iv) Explain THREE advantages of using a pyramid of biomass rather than a pyramid of numbers [3].",
      hint: "Carnivore bar on top; detritivores eat plant matter; energy loss; biomass accounts for size",
      a: <><Bold>(i)</Bold> Add a top bar for <Bold>carnivores at 40 g/m²</Bold> [1] — narrower than the bars below [1]. <Bold>(ii)</Bold> The detritivores were <Bold>feeding mainly on dead PLANT material</Bold> (not animals), so they occupy the same trophic level as herbivores [1]. <Bold>(iii)</Bold> About <Bold>90% of energy is lost</Bold> at each level (heat, faeces, urine, movement) [1]; after 4-5 levels too little remains to support another consumer [1]. <Bold>(iv)</Bold> Pyramid of biomass: takes <Bold>size of organism into account</Bold> [1]; usually a regular pyramid shape (not inverted as for one tree → many insects) [1]; better reflects the actual <Bold>amount of living material / energy</Bold> at each level [1].</> },

    { id: "m30", diff: "medium", topic: "carbon", ext: true, marks: 8, star: "★★★",
      q: "A pyramid of biomass shows levels A (narrowest, top) > B > C > D (widest, bottom), linked to CO₂ in atmosphere and fossil fuels by various arrows. Arrow X shows transfer of carbon from decomposers → CO₂ in atmosphere. (i) State the principal source of energy required for trophic level D [1]. (ii) Which letter represents the primary consumers [1]? (iii) How is carbon transferred from producers to primary consumers [1]? (iv) Explain why trophic level A is smaller than trophic level B [3]. (v) Define decomposer [1]. (vi) Name process X [1].",

    { id: "h21", diff: "hard", topic: "populations", marks: 12, star: "★★★",

      a: <><Bold>(a)</Bold> Arctic plants → lemmings → snowy owls [1]. <Bold>(b)(i)</Bold> Lemmings <Bold>reproduce rapidly</Bold>; bigger population means even more births (positive feedback / log phase) [1]. <Bold>(ii)</Bold> Either: <Bold>too many lemmings</Bold> → food (plants) runs out, starvation [1]; <Bold>predator (owl) numbers rise</Bold> after lemming peak and eat many lemmings; disease spread in dense population [1]. <Bold>(iii)</Bold> When lemming numbers <Bold>rise</Bold>, owls have more food → owl numbers <Bold>increase</Bold> [1]; with a <Bold>time lag</Bold> behind the prey peak [1]; when lemmings crash, owls starve and numbers fall [1]. <Bold>(iv)</Bold> If owls removed: lemmings have <Bold>no predator</Bold> → numbers rise <Bold>more rapidly</Bold> [1]; population grows above the previous peak [1]; but eventually limited by <Bold>food (plant) shortage</Bold> and disease → still crashes, but to a different cycle pattern [1]. <Bold>(c)(i)</Bold> The <Bold>Sun</Bold> [1]. <Bold>(ii)</Bold> <Bold>Photosynthesis</Bold> [1].</> },

      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>

          <button key={t.id} onClick={() => setTopic(t.id)} style={{

        ))}
      </div>

      {/* Stats */}

        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>

        <button onClick={() => setRev({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,

        }}>Hide all</button>
      </div>

      {/* Question cards */}
      {filtered.map(q => {
        const dInfo = diffs.find(d => d.id === q.diff);

        return (
          <div key={q.id} style={{
            background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${tInfo.color}`,

                background: "#f5f5f3", color: tInfo.color, borderRadius: 3, border: `1px solid ${tInfo.color}33` }}>{tInfo.label}</span>
              {q.ext && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: PL, color: PU, borderRadius: 3 }}>EXT</span>}
              {q.type && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 6px",
                background: "#eef", color: "#446", borderRadius: 3 }}>{q.type.toUpperCase()}</span>}
              <span style={{ fontSize: 10, color: "#b85c00", marginLeft: 2 }}>{q.star}</span>
              <span style={{ marginLeft: "auto", fontSize: 10, fontWeight: 700, color: GR,
                background: "#f5f5f3", padding: "2px 8px", borderRadius: 4 }}>{q.marks} marks</span>
            </div>

            <div style={{ fontSize: 12.5, lineHeight: 1.55, color: GR, marginBottom: 8 }}>
              <Bold>Q{q.id.toUpperCase()}.</Bold> {q.q}
            </div>

            {!isRev && q.hint && (
              <div style={{ fontSize: 11, color: "#888", fontStyle: "italic", marginBottom: 8 }}>
                💡 Hint: {q.hint}
              </div>
            )}

            <button onClick={() => toggle(q.id)} style={{
              padding: "5px 12px", fontSize: 11, fontWeight: 700,
              background: isRev ? "#f5f5f3" : RD, color: isRev ? GR : "#fff",
              border: isRev ? `1px solid ${BD}` : "none", borderRadius: 4, cursor: "pointer",
            }}>
              {isRev ? "Hide answer" : "Show answer"}
            </button>

            {isRev && (
              <div style={{ marginTop: 10, padding: "10px 12px", background: RL,
                borderRadius: 6, fontSize: 12, lineHeight: 1.6, color: GR, border: `1px solid ${RD}33` }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: RD, marginBottom: 4 }}>MODEL ANSWER</div>
                {q.a}
              </div>
            )}
          </div>
        );
      })}

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Infinite test mode: <Bold>{qs.length}</Bold> questions loaded · filters applied
      </div>
    </div>
  );
}

          Most animals eat more than one food, so several chains link into a <Bold>web</Bold>. If one population is removed, <Bold>everything connected to it is affected</Bold>. For example, if rats die, mongooses/snakes/eagles eat more beetles and hares; if eagles vanish, snakes and mongooses increase.

          <Bold>Matter is recycled</Bold> (C, N, P, water, minerals); <Bold>energy flows one way</Bold> from the sun through producers and consumers and is eventually lost as heat. Decomposers are <Bold>essential</Bold> — without them, dead matter and nutrients would accumulate and producers would run out of raw materials.

            <li><Bold>Disease</Bold> — spreads rapidly in dense populations (pandemics, epidemics).</li>

        </table>
      </div>
    </div>
  );
}

// ④ TEXTBOOK TAB — full Hodder notes
// ════════════════════════════════════════════════════════════════════════════
function TextbookTab() {
  const section = { background: "#fff", border: `1.5px solid ${BD}`, borderLeft: `4px solid ${G}`,
    borderRadius: 8, padding: "14px 16px", marginBottom: 14 };
  const h = { fontSize: 14, fontWeight: 800, color: G, marginBottom: 8, letterSpacing: 0.3 };
  const sub = { fontSize: 12, fontWeight: 700, color: G, marginTop: 10, marginBottom: 5 };
  const p = { fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8 };
  const ul = { fontSize: 12, lineHeight: 1.7, color: GR, marginBottom: 8, paddingLeft: 20 };

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: G, fontWeight: 600 }}>
        📚 <Bold>Textbook</Bold> · complete Hodder notes for Chapter 19
      </div>

      {/* 1. Energy flow */}
      <div style={section}>
        <div style={h}>1 · Energy flow</div>

        <div style={sub}>1.1 Dependence on sunlight</div>
        <p style={p}>
          Nearly every form of energy used by living things on Earth originates from <KW>the Sun</KW>. The exceptions are atomic energy and tidal power. Animals get their energy by eating either plants or other animals; ultimately every animal depends on plants. Plants use sunlight in <KW>photosynthesis</KW> to convert light energy into <Bold>chemical energy</Bold>, stored in molecules such as carbohydrates, fats and proteins.
        </p>
        <p style={p}>
          Many human foods illustrate this dependence: wheat-grass-flowering plants (photosynthesis) → wheat grains/cow/nectar → flour/milk/bees → bread/cheese/honey.
        </p>
        <p style={p}>
          <Bold>Fossil fuels</Bold> — coal comes from ancient tree-like plants that absorbed sunlight; petroleum was formed from algae buried in the sea. Today, energy from sunlight can be harvested directly (solar panels) or via growing crops (starch, sugar, oil, wood) — for example, fermenting sugar cane into ethanol for fuel. Eventually all chemical energy is lost from organisms to the environment, mostly as heat. Unlike matter, <Bold>energy flow is one-way, not cyclic</Bold>.
        </p>
      </div>

      {/* 2. Food chains and webs */}
      <div style={section}>
        <div style={h}>2 · Food chains and food webs</div>

        <div style={sub}>2.1 Key definitions</div>
        <ul style={ul}>
          <li><KW>Food chain</KW> — transfer of energy (as food) from one organism to the next, beginning with a producer.</li>
          <li><KW>Food web</KW> — a network of interconnected food chains.</li>
          <li><KW>Producer</KW> — organism that makes its own organic nutrients, usually using energy from sunlight via photosynthesis.</li>
          <li><KW>Consumer</KW> — organism that gets its energy by feeding on other organisms.</li>
          <li><KW>Herbivore</KW> — animal that eats plants.</li>
          <li><KW>Carnivore</KW> — animal that eats other animals.</li>
          <li><KW>Decomposer</KW> — organism (bacteria/fungi) that gets its energy from dead or waste organic material.</li>
          <li><KW>Trophic level</KW> — position of an organism in a food chain, food web or ecological pyramid.</li>
        </ul>

        <div style={sub}>2.2 The basic food chain</div>
        <FoodChainSVG />
        <p style={p}>
          A food chain like grass → grasshopper → lizard → hawk shows the flow of energy. <Bold>Arrows always point from food to eater</Bold>. The first organism is always a producer; herbivores are primary consumers; carnivores that eat herbivores are secondary consumers; carnivores that eat them are tertiary consumers.
        </p>

        <div style={sub}>2.3 Plankton — the base of aquatic food chains</div>
        <p style={p}>
          In the surface waters of seas and lakes, microscopic single-celled algae (<KW>phytoplankton</KW>) photosynthesise and form the producer level. They are eaten by small animals (zooplankton, mainly crustacea), which are eaten by small fish like carp, which are eaten by larger carnivores like catfish.
        </p>

        <div style={sub}>2.4 Pyramids of numbers</div>
        <p style={p}>
          Drawing the food chain as horizontal bars whose width represents the number of organisms gives a <KW>pyramid of numbers</KW>. There are usually large numbers of organisms at the start of a chain and fewer at the top.
        </p>
        <p style={p}>
          Sometimes a pyramid of numbers is <Bold>inverted</Bold>: one box tree may feed hundreds of caterpillars; a bird may carry hundreds of fleas. The numbers don't reflect the energy involved.
        </p>

        <div style={sub}>2.5 Pyramids of biomass <Ext/></div>
        <p style={p}>
          A way around the inverted-pyramid problem is to use <KW>biomass</KW> — the dry mass of living organisms at each level. A <Bold>pyramid of biomass is nearly always correctly pyramid-shaped</Bold>, because there is less living mass at each higher trophic level.
        </p>

        <div style={sub}>2.6 Pyramids of energy <Ext/></div>
        <p style={p}>
          The most accurate is a <KW>pyramid of energy</KW>: the amount of energy at each trophic level (per area per year). Producers always hold the most energy; each level above has less because of losses.
        </p>
        <PyramidsSVG />

        <div style={sub}>2.7 Food webs</div>
        <FoodWebSVG />
        <p style={p}>
          Real ecosystems are not single chains — most animals eat many things, so chains link into webs. If one species is removed (e.g. rats die out in India because of cattle drug residues killing vultures who fed on the cattle), the populations of every connected species change in some way.
        </p>

        <div style={sub}>2.8 Reasoning about interdependence</div>
        <p style={p}>
          Exam questions often ask you to predict what happens to other organisms when one population is disturbed. Work through the web step by step. Imagine a web in which <Bold>earthworms</Bold> are the food of frogs, mice and sparrows, and earthworms feed on grass:
        </p>
        <ul style={ul}>
          <li>If earthworm numbers <Bold>fall</Bold>, fewer animals graze the grass → grass population <Bold>increases</Bold>.</li>
          <li>Frogs and mice rely only on earthworms → their numbers <Bold>decrease significantly</Bold>.</li>
          <li>Sparrows eat earthworms <Bold>and</Bold> caterpillars → their numbers fall only slightly because they still have another food source.</li>
        </ul>
        <p style={p}>
          Most disturbances of this kind come from <KW>human impact</KW> — either overharvesting a food species or introducing foreign species — and the <Bold>knock-on effects</Bold> spread far through the connected chains.
        </p>

        <div style={{ background: "#fffbe6", border: `1px solid #f0c000`, borderLeft: `4px solid #f0c000`,
          borderRadius: 6, padding: "8px 12px", fontSize: 11.5, lineHeight: 1.6, color: GR, marginTop: 8 }}>
          💡 <Bold>Examiner Tip.</Bold> Avoid writing that a species "dies out" — extinction from a single change is rare. Use <Bold>increase</Bold> or <Bold>decrease</Bold>, and always give the reason (more food, less competition, lost predator, etc.). Tie every change back to a specific feeding relationship visible in the web.
        </div>
      </div>

      {/* 3. Human impact */}
      <div style={section}>
        <div style={h}>3 · Effects of overharvesting &amp; introduced species</div>

        <div style={sub}>3.1 Overharvesting</div>
        <p style={p}>
          <KW>Overharvesting</KW> reduces a species' numbers to the point of endangerment or extinction, <Bold>reducing biodiversity</Bold>. Animals are harvested for food (e.g. bushmeat — primates in Africa), body parts (tusks of elephants, horns of rhinos, fur of tigers), or as pets (reptiles, birds, fish). Hunting is often unregulated and rare species suffer.
        </p>

        <div style={sub}>3.2 Overfishing</div>
        <p style={p}>
          Commercial fleets now catch more fish than populations can replace. Stocks of herring (North Sea), halibut (Pacific), anchovies (Peruvian coast) and bluefin tuna (Atlantic) have crashed; in 1965 1.3 million tonnes of North Sea herring were caught, but by 1977 only 44,000 tonnes — about 3%. Blue whale populations fell from ~2,000,000 to below 25,000 due to hunting for blubber.
        </p>
        <p style={p}>
          Heavy nets dragged across the sea floor <Bold>wreck coral reefs</Bold>, destroying habitats for many species. Targeting top predators (like grouper) lets fish lower in the chain overgraze the reef — happening on the Great Barrier Reef.
        </p>

        <div style={sub}>3.3 Introducing foreign species</div>
        <p style={p}>
          Introduced species often have no natural predators and outcompete native ones. Examples:
        </p>
        <ul style={ul}>
          <li><Bold>Rats on the Galapagos Islands</Bold> (introduced by pirates/whalers) — ate eggs of birds, reptiles, tortoises; many native species became endangered.</li>
          <li><Bold>Prickly pear cactus (Opuntia) in Australia, 1839</Bold> — introduced as a living fence; with no herbivores to eat it, it grew out of control and made millions of acres unusable. A moth (Cactoblastis cactorum) from Argentina was introduced to control it; that worked in Australia but caused new problems elsewhere (the moth threatens native cacti in the US and West Indies).</li>
        </ul>
      </div>

      {/* 4. Energy transfer */}
      <div style={section}>
        <div style={h}>4 · Energy transfer between organisms <Ext/></div>

        <div style={sub}>4.1 Use of sunlight by plants</div>
        <EnergyTransferSVG />
        <p style={p}>
          Of the Sun's energy falling on grassland:
        </p>
        <ul style={ul}>
          <li>~20% is reflected by vegetation,</li>
          <li>~39% used to evaporate water (transpiration),</li>
          <li>~40% warms plants, soil and air,</li>
          <li>only about <KW>1%</KW> is captured in photosynthesis.</li>
        </ul>
        <p style={p}>
          The 1% varies with vegetation, water and temperature; sugar cane in ideal conditions reaches 3%, sugar beet ~9% at peak growth. Irrigation and fertilisers help maximise efficiency.
        </p>

        <div style={sub}>4.2 From plants to herbivores</div>
        <p style={p}>
          On land, herbivores eat only a small proportion of available plants — about 2% in deciduous forest, 40% on grazing land. In water, phytoplankton are eaten whole by zooplankton (90%+). Unused plant material is broken down by decomposers.
        </p>
        <p style={p}>
          When a cow eats grass: ~60% passes undigested in faeces, ~30% is used in respiration (heat/movement), and <Bold>less than 10% becomes new animal tissue</Bold>. This is why we say energy transfer is ~10% efficient.
        </p>

        <div style={sub}>4.3 The 5-level limit</div>
        <p style={p}>
          About 90% of energy is lost at each trophic level, so very little energy reaches the top. Example chain (grass = 100 units): grass 100 → locust 10 → lizard 1 → snake 0.1 → mongoose 0.01. After 5 steps there is too little energy left to support another consumer.
        </p>

        <div style={sub}>4.4 Energy in agriculture</div>
        <p style={p}>
          Feeding plants to animals to make meat, milk and eggs is wasteful — only ~10% conversion. It is more efficient to eat bread from wheat than to feed wheat to hens and eat the chicken/eggs.
        </p>
        <p style={p}>
          <Bold>Battery hens</Bold>: kept in small cages so they lose less heat and move less; more food energy goes into growth and eggs. Energy-efficient but widely considered inhumane. Producing fertiliser is also energy-costly — making 1 tonne of nitrogen fertiliser uses the equivalent of burning ~5 tonnes of coal.
        </p>

        <div style={{ background: "#fffbe6", border: `1px solid #f0c000`, borderLeft: `4px solid #f0c000`,
          borderRadius: 6, padding: "8px 12px", fontSize: 11.5, lineHeight: 1.6, color: GR, marginTop: 8 }}>
          💡 <Bold>Examiner Tip.</Bold> Match your energy-loss explanation to the organism in the question. Plants do <Bold>not</Bold> produce urine or faeces, so listing "urine" or "egestion" loses marks if the question is about a producer. For plants, valid losses are <Bold>respiration (heat)</Bold>, <Bold>uneaten parts</Bold> (roots, bark) and energy used during the plant's own life processes. For animals, all four routes apply — heat, faeces, urine and movement.
        </div>
      </div>

      {/* 5. Nutrient cycles */}
      <div style={section}>
        <div style={h}>5 · Nutrient cycles</div>

        <div style={sub}>5.1 The carbon cycle</div>
        <CarbonCycleSVG />
        <p style={p}>
          Carbon is part of every compound in living organisms. Plants get carbon from atmospheric CO₂; animals get carbon by eating plants. The cycle revolves around what happens to CO₂:
        </p>
        <ul style={ul}>
          <li><Bold>Removes CO₂</Bold>: <KW>photosynthesis</KW> by green plants — carbon is built first into carbohydrate, then into starch, cellulose, proteins, etc.</li>
          <li><Bold>Adds CO₂</Bold>: <KW>respiration</KW> (all organisms), <KW>combustion</KW> (burning of wood, coal, oil, gas), and <KW>decomposition</KW> by decomposers (bacteria and fungi).</li>
        </ul>
        <p style={p}>
          <Bold>Fossilisation</Bold>: any condition stopping fast decomposition (e.g. water-logged bogs, deep burial) can produce <KW>fossil fuels</KW> like coal, oil and natural gas. Carbon is trapped for millions of years until combustion releases it.
        </p>

        <div style={sub}>5.2 Decomposition</div>
        <p style={p}>
          When an organism dies, enzymes in its cells are no longer controlled and begin <Bold>auto-digestion</Bold>. Scavengers (e.g. blowfly larvae) consume soft tissues; earthworms eat dead leaves. Finally <KW>decomposers</KW> (saprophytic bacteria and fungi) invade — they secrete extracellular enzymes onto dead matter and reabsorb soluble digestion products. When the decomposers themselves die, auto-digestion releases nitrates, sulfates, phosphates back into the soil. Producers then take these up.
        </p>
        <p style={p}>
          Speed of decay depends on: abundance of microorganisms, <Bold>temperature</Bold> (higher = faster respiration), <Bold>water</Bold> (needed for life processes), and <Bold>oxygen</Bold> (aerobic respiration). Anaerobic decay is slow and incomplete (e.g. peat bogs).
        </p>

        <div style={sub}>5.3 Combustion</div>
        <p style={p}>
          When carbon-containing fuels burn: C + O₂ → CO₂. Hydrocarbon fuels (coal, petroleum) come from ancient organisms that only partly decomposed. Burning them releases stored carbon to the atmosphere — far faster than photosynthesis can remove it. This is the main reason for rising atmospheric CO₂.
        </p>

        <div style={sub}>5.4 The nitrogen cycle <Ext/></div>
        <NitrogenCycleSVG />
        <p style={p}>
          Nitrogen is needed for amino acids and proteins. Air is 78% N₂, but plants cannot use N₂ gas directly. The nitrogen cycle relies heavily on <Bold>bacteria</Bold>.
        </p>

        <p style={p}><Bold>Decomposition — releases ammonia.</Bold></p>
        <p style={p}>
          When plants and animals die, <KW>saprophytic bacteria</KW> decompose the protein. A key product is ammonia (NH₃), which dissolves to give ammonium ions (NH₄⁺). The excretory products of animals — ammonia, urea, uric acid — are also broken down by soil bacteria.
        </p>

        <p style={p}><Bold>Nitrification — ammonia to nitrates.</Bold></p>
        <p style={p}>
          <KW>Nitrifying bacteria</KW> live in soil and oxidise ammonia compounds:
        </p>
        <ul style={ul}>
          <li>Nitrite bacteria: NH₄⁺ → NO₂⁻ (nitrites)</li>
          <li>Nitrate bacteria: NO₂⁻ → NO₃⁻ (nitrates)</li>
        </ul>
        <p style={p}>
          Plants take up nitrates much more readily than ammonia, so nitrifying bacteria <Bold>increase soil fertility</Bold>.
        </p>

        <p style={p}><Bold>Nitrogen fixation — converting atmospheric N₂.</Bold></p>
        <p style={p}>
          <KW>Nitrogen-fixing bacteria</KW> absorb N₂ from air spaces in the soil and convert it into ammonia compounds. Some live free in soil; others live in <Bold>root nodules of leguminous plants</Bold> (peas, beans, clover). This symbiosis lets legumes thrive on nitrate-poor soils — that is why farmers grow them in crop rotations.
        </p>

        <p style={p}><Bold>Lightning</Bold> also fixes a small amount: high temperature makes N₂ and O₂ combine into nitrogen oxides, which dissolve in rain to form nitrates.</p>

        <p style={p}><Bold>Uptake by plants.</Bold> Plants absorb nitrates through roots and combine them with carbohydrates to make amino acids and proteins. Animals then eat plants and digest the proteins.</p>

        <p style={p}><Bold>Denitrification</Bold> — removes nitrates.</p>
        <p style={p}>
          <KW>Denitrifying bacteria</KW> break down nitrates to N₂ gas, which escapes to the air. This is a <Bold>loss</Bold> from the cycle, reducing soil fertility and slowing plant growth.
        </p>
        <p style={p}>
          These bacteria work in <Bold>anaerobic conditions</Bold>, so farmers can slow them down by <Bold>aerating the soil</Bold> — improving drainage to stop waterlogging, and turning the soil over (ploughing) so oxygen reaches deeper layers.
        </p>

        <p style={p}><Bold>Leaching</Bold> (Going Further): Nitrates dissolve very easily; rainwater can wash them out of soil into run-off and deep soil layers, removing them from the reach of roots.</p>
      </div>

      {/* 6. Populations */}
      <div style={section}>
        <div style={h}>6 · Populations</div>

        <div style={sub}>6.1 Key definitions</div>
        <ul style={ul}>
          <li><KW>Population</KW> — group of organisms of one species, in the same area, at the same time.</li>
          <li><KW>Community</KW> — all the populations of different species in an ecosystem.</li>
          <li><KW>Ecosystem</KW> — community + non-living environment (air, water, soil, light), interacting.</li>
        </ul>

        <div style={sub}>6.2 Distribution in an ecosystem</div>
        <p style={p}>
          Organisms are not spread evenly: each occupies habitats suiting its way of life. Limpets and barnacles cling to rocks between tides; sardines feed on plankton near the surface; rays feed on the sea floor.
        </p>

        <div style={sub}>6.3 Factors affecting population growth</div>
        <p style={p}>
          A population grows when <KW>birth rate &gt; death rate</KW>. Four key factors limit growth:
        </p>
        <ul style={ul}>
          <li><Bold>Food supply</Bold> — abundance allows more breeding; shortage causes starvation, lower reproduction, or emigration.</li>
          <li><Bold>Competition</Bold> — for food, space, shelter, mates. Can be within a species (intraspecific) or between species (interspecific).</li>
          <li><Bold>Predation</Bold> — predators reduce prey numbers. There is a <Bold>time lag</Bold>: prey rise → predators rise → prey fall → predators fall.</li>
          <li><Bold>Disease</Bold> — spreads quickly in dense populations. Examples: olive trees killed by Xylella, Cavendish bananas threatened by fungus, COVID-19 in humans.</li>
        </ul>
        <PredatorPreySVG />
        <p style={p}>
          A famous case: Hudson's Bay Company records show <Bold>snowshoe hare</Bold> and <Bold>Canada lynx</Bold> populations oscillating with ~10-year cycles between 1845 and 1945.
        </p>

        <div style={sub}>6.4 Human population (Going Further)</div>
        <p style={p}>
          In AD 1000 there were ~300 million people. By 1984, 4.7 billion; by 2019, 7.7 billion. The greatest surge has been in the last 300 years. Birth rates have fallen but death rates have fallen faster, driving rapid growth.
        </p>
        <p style={p}>
          <Bold>Reasons</Bold>: better nutrition, sanitation, vaccines (smallpox eradicated 1977), antibiotics. The reduction in deaths from infectious disease accounts for ~75% of the fall in mortality.
        </p>
        <p style={p}>
          As communities grow wealthier, birth rates drop because of: longer education, better living conditions, less reliance on children for labour, and family planning.
        </p>

        <div style={sub}>6.5 Sigmoid growth curve <Ext/></div>
        <SigmoidCurveSVG />
        <p style={p}>
          In a closed culture (e.g. <i>Paramecium</i> in nutrient broth) the population shows a four-phase <KW>sigmoid (S-shaped) curve</KW>:
        </p>
        <ul style={ul}>
          <li><Bold>A · Lag phase</Bold> — population is small, even doubling shows little overall increase.</li>
          <li><Bold>B · Exponential / log phase</Bold> — continuous doubling gives logarithmic growth (64 → 128 → 256 → 512 → 1024). Resources are plentiful.</li>
          <li><Bold>C · Stationary phase</Bold> — limiting factors (food, space, waste, disease) bring birth rate and death rate into balance.</li>
          <li><Bold>D · Death phase</Bold> — death rate exceeds birth rate; population falls because food runs out, toxins build up or disease spreads.</li>
        </ul>
        <p style={p}>
          This model is simplified. In nature, conditions change all the time, and populations rarely reach a steady stationary phase. <Bold>Limiting factors</Bold> include both <Bold>abiotic</Bold> (rainfall, temperature, light intensity) and <Bold>biotic</Bold> (food, predators, parasites, diseases, nest sites) factors. The size of an animal population is also affected by <Bold>immigration</Bold> (in) and <Bold>emigration</Bold> (out).
        </p>

        <div style={sub}>6.6 Competition between species</div>
        <p style={p}>
          When two species of <i>Paramecium</i> (<i>P. aurelia</i> and <i>P. caudatum</i>) are grown together in laboratory conditions, <i>P. aurelia</i> takes up food faster. <i>P. caudatum</i> follows the sigmoid curve at first but is then <Bold>out-competed</Bold> and its population drops to zero by day 16. This illustrates that <Bold>competition for resources</Bold> is a major limiting factor.
        </p>
      </div>
    </div>
  );
}

    { id: "nitrogen", label: "Nitrogen cycle", count: cards.filter(c => c.topic === "nitrogen").length },
    { id: "populations", label: "Populations", count: cards.filter(c => c.topic === "populations").length },
    { id: "sigmoid", label: "Sigmoid curve", count: cards.filter(c => c.topic === "sigmoid").length },
  ];

  const filtered = topic === "all" ? cards : cards.filter(c => c.topic === topic);
  const flippedCount = filtered.filter(c => flipped[c.id]).length;

  return (
    <div>
      <div style={{ background: TLL, border: `1px solid ${TL}`, borderRadius: 8,
        padding: "10px 14px", marginBottom: 14, fontSize: 12, color: TL, fontWeight: 600 }}>
        🃏 <Bold>SME Flashcards</Bold> · {cards.length} cards · click any card to flip
      </div>

      {/* Topic filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        {topics.map(t => (
          <button key={t.id} onClick={() => setTopic(t.id)} style={{
            padding: "6px 10px", borderRadius: 6,
            border: topic === t.id ? `1.5px solid ${TL}` : `1px solid ${BD}`,
            background: topic === t.id ? TL : "#fff",
            color: topic === t.id ? "#fff" : TL,
            fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>
            {t.label} ({t.count})
          </button>
        ))}
      </div>

      {/* Stats */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 12px", background: "#f7f7f4", borderRadius: 6, fontSize: 11,
        color: GR, marginBottom: 14, border: `1px solid ${BD}` }}>
        <span><Bold>{filtered.length}</Bold> cards · <Bold>{flippedCount}</Bold> revealed</span>
        <button onClick={() => setFlipped({})} style={{
          padding: "4px 10px", fontSize: 10, fontWeight: 700,
          background: "#fff", color: GR, border: `1px solid ${BD}`,
          borderRadius: 4, cursor: "pointer",
        }}>Reset all</button>
      </div>

      {/* Card grid */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))",
        gap: 10 }}>
        {filtered.map(c => {
          const isFlipped = flipped[c.id];
          return (
            <div key={c.id} onClick={() => toggle(c.id)} style={{
              background: isFlipped ? TLL : "#fff",
              border: `1.5px solid ${isFlipped ? TL : BD}`,
              borderRadius: 8, padding: "12px 14px",
              minHeight: 110, cursor: "pointer",
              transition: "all .15s",
              display: "flex", flexDirection: "column",
            }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: isFlipped ? TL : "#999",
                letterSpacing: 1, marginBottom: 6 }}>
                {isFlipped ? "DEFINITION" : "TERM / QUESTION"} · {c.id.toUpperCase()}
              </div>
              <div style={{ fontSize: isFlipped ? 11.5 : 13.5, lineHeight: 1.5, color: GR,
                fontWeight: isFlipped ? 500 : 700, flex: 1 }}>
                {isFlipped ? c.back : c.front}
              </div>
              <div style={{ fontSize: 9, color: "#bbb", marginTop: 8, textAlign: "right" }}>
                click to {isFlipped ? "show term" : "reveal"}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 16, padding: "10px 14px", background: "#f7f7f4",
        borderRadius: 6, fontSize: 10, color: "#888", textAlign: "center", border: `1px solid ${BD}` }}>
        Save My Exams style · {CHAPTER_META.flashcardCount} cards total · self-testing mode
      </div>
    </div>
  );
}
