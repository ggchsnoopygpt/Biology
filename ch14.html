function FlashcardTab() {
  const cards = [
    // ════════════════════════════════════════════════════════════════════════
    // SAVE MY EXAMS — 66 official flashcards (Coordination, Response & Homeostasis)
    // ════════════════════════════════════════════════════════════════════════

    // ── SME 1-4: nervous system organisation ──
    { src: "SME", q: "What is the role of the NERVOUS SYSTEM?", a: "The nervous system COORDINATES and REGULATES body functions in response to CHANGES in the environment. It uses ELECTRICAL IMPULSES (fast, precise) — receiving stimuli, processing them in the CNS, and triggering responses in effectors." },
    { src: "SME", q: "TRUE or FALSE? Information passes along neurones in the form of ELECTRICAL IMPULSES.", a: "TRUE. Information is passed along neurones and between the different parts of the nervous system in the form of ELECTRICAL IMPULSES." },
    { src: "SME", q: "Which two components make up the CENTRAL NERVOUS SYSTEM (CNS)?", a: "The CNS is made up of: (1) the BRAIN, and (2) the SPINAL CORD. The CNS receives information from receptors, processes it, and sends out coordinated responses." },
    { src: "SME", q: "What does the PERIPHERAL NERVOUS SYSTEM (PNS) consist of?", a: "The PNS consists of the NERVES outside of the brain and spinal cord. These nerves (made of bundles of neurones) carry impulses between the CNS and the receptors/effectors throughout the body." },

    // ── SME 5-7: neurone types (image cards described in text) ──
    { src: "SME", q: "How can you IDENTIFY a SENSORY NEURONE from a diagram?", a: "A SENSORY neurone has its CELL BODY in the MIDDLE of its length (on a side branch). The impulse travels from receptor → along axon → past cell body → to CNS. The cell body is the distinguishing feature." },
    { src: "SME", q: "How can you IDENTIFY a RELAY NEURONE from a diagram?", a: "A RELAY (intermediate) neurone is SHORT and has a SMALL CELL BODY at one end with MANY DENDRITES. It connects sensory to motor neurones inside the CNS." },
    { src: "SME", q: "How can you IDENTIFY a MOTOR NEURONE from a diagram?", a: "A MOTOR neurone has a LONG AXON with a LARGE CELL BODY at ONE END (inside the CNS). The impulse travels from cell body → along the long axon → to an effector (muscle or gland)." },
    { src: "SME", q: "TRUE or FALSE? A nerve impulse travels TOWARDS the cell body in ALL neurones.", a: "FALSE. The impulse travels TOWARDS the cell body in SENSORY neurones, but AWAY FROM the cell body in MOTOR and RELAY neurones. Direction depends on the position of the cell body." },

    // ── SME 9-14: reflex arc ──
    { src: "SME", q: "What are REFLEX ACTIONS?", a: "Reflex actions are AUTOMATIC, RAPID responses to a stimulus that do NOT involve CONSCIOUS THOUGHT. They are protective — bypass the conscious brain to save time." },
    { src: "SME", q: "Write a FLOW DIAGRAM to represent a REFLEX ARC.", a: "RECEPTOR → SENSORY neurone → RELAY neurone → MOTOR neurone → EFFECTOR. (The full sequence often shown as: STIMULUS → receptor → sensory → relay → motor → effector → RESPONSE.)" },
    { src: "SME", q: "TRUE or FALSE? Sensory neurones in a reflex arc connect receptor cells with the CONSCIOUS BRAIN.", a: "FALSE. Sensory neurones in a reflex arc connect receptor cells with RELAY neurones in the CNS. Some reflex arcs do involve the brain, but those brain regions are NOT connected with conscious thought." },
    { src: "SME", q: "What is a RELAY NEURONE?", a: "A relay neurone is a neurone WITHIN the CNS that CONNECTS sensory neurones to motor neurones. It coordinates the reflex response at the spinal cord level." },
    { src: "SME", q: "What is the role of a MOTOR NEURONE in a reflex arc?", a: "Motor neurones in reflex arcs connect RELAY NEURONES with EFFECTORS (muscles or glands). They carry the impulse OUT of the CNS to make the effector produce the response." },
    { src: "SME", q: "TRUE or FALSE? Effectors are muscles and sense organs.", a: "FALSE. Effectors are MUSCLES and GLANDS. Muscles produce movement; glands produce secretions (hormones, enzymes, sweat etc.). Sense organs are receptors, not effectors." },

    // ── SME 15-20: synapse (EXT mostly) ──
    { src: "SME", q: "Define the term SYNAPSE.", a: "A synapse is a JUNCTION between two neurones, where a very small GAP (synaptic cleft) exists between one neurone and the next." },
    { src: "SME", q: "Define the term NEUROTRANSMITTER. (EXT)", a: "Neurotransmitters are CHEMICAL SIGNALLING MOLECULES used to transfer signals between neurones at SYNAPSES." },
    { src: "SME", q: "TRUE or FALSE? Electrical impulses can JUMP across the gap at a synapse. (EXT)", a: "FALSE. Electrical impulses CANNOT directly jump the gap at synapses. Electrical signals are CONVERTED into CHEMICAL signals (neurotransmitters) which DIFFUSE across the synaptic gap to the next neurone." },
    { src: "SME", q: "Describe the EVENTS that take place at a SYNAPSE. (EXT)", a: "(1) Neurotransmitters are released from VESICLES in the pre-synaptic neurone. (2) Neurotransmitters DIFFUSE across the gap between neurones. (3) Neurotransmitters BIND to RECEPTOR MOLECULES on the second (post-synaptic) neurone. (4) A NEW ELECTRICAL IMPULSE is generated in the second neurone." },
    { src: "SME", q: "TRUE or FALSE? Neurotransmitters move across synapses by ACTIVE TRANSPORT. (EXT)", a: "FALSE. Neurotransmitters move across the gap at a synapse by DIFFUSION — from a HIGH concentration (vesicles) to a LOW concentration (post-synaptic membrane). No ATP needed." },
    { src: "SME", q: "TRUE or FALSE? Synapses ensure that nerve impulses can only travel in ONE DIRECTION. (EXT)", a: "TRUE. One key role of a synapse is to ensure that impulses travel in ONE DIRECTION only. Vesicles are only on the pre-synaptic side and receptors are only on the post-synaptic side." },

    // ── SME 21-24: sense organs ──
    { src: "SME", q: "What are SENSE ORGANS?", a: "Sense organs are GROUPS of RECEPTOR CELLS that respond to SPECIFIC STIMULI. Each sense organ is specialised to detect one or two types of stimulus." },
    { src: "SME", q: "Name the MAIN SENSE ORGANS and the STIMULI they respond to.", a: "EYES → light. EARS → sound. SKIN → touch and temperature. NOSE → chemicals in the air. TONGUE → chemicals in food and drink. Each contains receptor cells linked to sensory neurones." },
    { src: "SME", q: "TRUE or FALSE? Receptor cells in sense organs connect to MOTOR NEURONES.", a: "FALSE. Receptor cells in the sense organs connect to SENSORY NEURONES. Sensory neurones carry the impulse from the receptor to the CNS." },
    { src: "SME", q: "TRUE or FALSE? The sense organs are part of the CENTRAL NERVOUS SYSTEM.", a: "FALSE. The sense organs are NOT part of the CNS. The CNS is the brain and spinal cord. Sense organs contain receptor cells that are connected to the PERIPHERAL nervous system (PNS)." },

    // ── SME 25-27: eye structure ──
    { src: "SME", q: "Identify the eye structures: A=front transparent layer, B=transparent disc behind iris, C=coloured ring, D=light-sensitive back layer, E=carries impulses to brain.", a: "A = CORNEA (front transparent layer — refracts light). B = LENS (focuses light onto retina). C = IRIS (coloured ring — controls pupil size). D = RETINA (light-sensitive back layer with rods and cones). E = OPTIC NERVE (carries impulses to brain)." },
    { src: "SME", q: "What is the function of the CORNEA?", a: "The function of the cornea is to REFRACT LIGHT into the eye. It does most of the bending of light (about two-thirds of total refraction); the lens fine-tunes the focus." },
    { src: "SME", q: "TRUE or FALSE? The OPTIC NERVE carries impulses to the SPINAL CORD.", a: "FALSE. The optic nerve carries impulses to the BRAIN — specifically the visual cortex at the back of the cerebrum, where images are interpreted." },

    // ── SME 28-29: pupil reflex ──
    { src: "SME", q: "What happens during the PUPIL REFLEX in DIM LIGHT?", a: "In dim light the PUPIL DILATES to allow as much light into the eye as possible. EXT: the RADIAL muscles in the iris CONTRACT and the CIRCULAR muscles RELAX." },
    { src: "SME", q: "If the PUPIL is CONSTRICTED, what level of light is the iris responding to?", a: "The iris is responding to BRIGHT LIGHT (the pupil is constricted to protect the retina from too much light). EXT: the pupil is constricted because the RADIAL muscles RELAX and the CIRCULAR muscles CONTRACT." },

    // ── SME 30-33: accommodation EXT ──
    { src: "SME", q: "Define ACCOMMODATION in the context of eye function. (EXT)", a: "Accommodation is the process by which the LENS of the eye CHANGES ITS SHAPE to focus on objects at DIFFERENT DISTANCES (near vs far)." },
    { src: "SME", q: "What is the role of the CILIARY MUSCLE in accommodation? (EXT)", a: "The ciliary muscles CONTRACT or RELAX to change the SHAPE of the LENS during accommodation. Contracting = lens fatter; relaxing = lens thinner." },
    { src: "SME", q: "What happens to ciliary muscles, suspensory ligaments and lens when focusing on a NEAR object? (EXT)", a: "Near object: CILIARY muscles CONTRACT → SUSPENSORY LIGAMENTS LOOSEN (slacken) → LENS becomes THICKER (more curved) → INCREASED refraction of light → close object focused on retina." },
    { src: "SME", q: "TRUE or FALSE? When focusing on a DISTANT object, the ciliary muscles RELAX and the suspensory ligaments LOOSEN. (EXT)", a: "FALSE. For a distant object: CILIARY muscles RELAX, but SUSPENSORY LIGAMENTS TIGHTEN. This pulls on the lens, making it THINNER (less curved) → reduced refraction → distant object focused on retina." },

    // ── SME 34-36: rods/cones/fovea EXT ──
    { src: "SME", q: "What is the function of CONE CELLS? (EXT)", a: "Cone cells ABSORB light of different COLOURS/WAVELENGTHS, providing COLOUR vision. There are three types of cones (sensitive to red, green, blue wavelengths)." },
    { src: "SME", q: "How are ROD and CONE cells DISTRIBUTED in the eye? (EXT)", a: "RODS — found all over the retina, EXCEPT at the BLIND SPOT. CONES — concentrated in the FOVEA (the central pit of the retina, directly behind the lens)." },
    { src: "SME", q: "What is the function of the FOVEA? (EXT)", a: "The fovea is a region of the retina with the HIGHEST DENSITY of CONE cells. Its function is to form SHARP, COLOURED images (greatest visual detail). You instinctively turn your eye to put what you want to see onto the fovea." },

    // ── SME 37-39: hormones & endocrine ──
    { src: "SME", q: "Define the term HORMONE.", a: "A hormone is a CHEMICAL SUBSTANCE, produced by a GLAND and carried by the BLOOD, which ALTERS the ACTIVITY of one or more TARGET ORGANS." },
    { src: "SME", q: "How are HORMONES TRANSPORTED around the body?", a: "Hormones are carried around the body in the BLOOD (the bloodstream / plasma). They reach all tissues but only affect cells with the matching RECEPTORS — the target organs." },
    { src: "SME", q: "What is the ENDOCRINE SYSTEM?", a: "The endocrine system is composed of GLANDS that SECRETE HORMONES directly into the BLOODSTREAM. (Distinct from exocrine glands, which secrete into ducts.)" },

    // ── SME 40-44: endocrine glands & adrenaline ──
    { src: "SME", q: "Identify the gland: A=behind stomach (insulin/glucagon), B=on top of kidneys, C=in male reproductive system.", a: "A = PANCREAS (produces insulin and glucagon). B = ADRENAL GLAND (produces adrenaline). C = TESTES (produce testosterone). All are major endocrine glands." },
    { src: "SME", q: "What is the function of ADRENALINE in the body?", a: "Adrenaline is the 'FIGHT OR FLIGHT' hormone. It prepares the body for action. Effects: INCREASED heart rate, INCREASED breathing rate, INCREASED pupil diameter (dilates pupils). Also diverts blood to muscles." },
    { src: "SME", q: "TRUE or FALSE? The effects of HORMONES are FASTER than that of the nervous system.", a: "FALSE. Hormones act SLOWER than the nervous system (seconds to minutes vs milliseconds), but their effects last LONGER. Nervous = fast/brief; hormonal = slow/long-lasting." },
    { src: "SME", q: "From where is the hormone GLUCAGON secreted? (EXT)", a: "Glucagon is secreted by the PANCREAS (specifically the alpha cells of the islets of Langerhans). It raises blood glucose when it is too low." },
    { src: "SME", q: "What is the role of ADRENALINE in the control of METABOLISM? (EXT)", a: "Adrenaline increases METABOLIC ACTIVITY by: (1) INCREASING blood glucose concentration (glycogen → glucose in liver), and (2) INCREASING heart rate. This delivers MORE GLUCOSE to MUSCLES for respiration — preparing the body for vigorous activity." },

    // ── SME 45-50: homeostasis, insulin, diabetes EXT ──
    { src: "SME", q: "Define the term HOMEOSTASIS.", a: "Homeostasis is the MAINTENANCE of a CONSTANT INTERNAL ENVIRONMENT within narrow limits. Examples: blood glucose, body temperature, water/ion concentration, pH." },
    { src: "SME", q: "What is the function of the hormone INSULIN?", a: "The function of insulin is to LOWER blood glucose (sugar) concentration. Released by the pancreas when blood glucose is too high; targets the liver and muscle cells to take up glucose and convert it to glycogen for storage." },
    { src: "SME", q: "Define the term NEGATIVE FEEDBACK. (EXT)", a: "Negative feedback describes a CONTROL MECHANISM that functions to REVERSE any change in conditions, returning them to the SET POINT. The change triggers a response that opposes it." },
    { src: "SME", q: "In the blood-glucose feedback loop, label A-D: blood glucose rises → A → B → blood glucose falls → C → D → blood glucose rises. (EXT)", a: "A = release of INSULIN from the pancreas. B = uptake of GLUCOSE from the blood by the cells (liver/muscle). C = release of GLUCAGON from the pancreas. D = GLYCOGEN is broken down into GLUCOSE (in the liver)." },
    { src: "SME", q: "What is the role of the LIVER in glucose regulation? (EXT)", a: "The liver stores and releases glucose: (1) GLUCOSE → GLYCOGEN (stored in liver cells) in response to INSULIN. (2) GLYCOGEN → GLUCOSE (released into blood) in response to GLUCAGON." },
    { src: "SME", q: "TRUE or FALSE? Type 1 diabetes is treated with INSULIN INJECTIONS and by monitoring and controlling DIET. (EXT)", a: "TRUE. Type 1 diabetes is treated by INJECTING INSULIN (insulin cannot be taken as a tablet — stomach enzymes would digest it). Monitoring diet allows the CORRECT INSULIN DOSE to be matched to the carbohydrate intake." },

    // ── SME 51-57: skin & thermoregulation EXT ──
    { src: "SME", q: "Identify the skin structures: A=muscle attached to hair, B=releases sweat, C=protein filament from epidermis, D=carries blood. (EXT)", a: "A = HAIR ERECTOR MUSCLE. B = SWEAT GLAND. C = HAIR. D = BLOOD VESSEL. All key structures involved in thermoregulation." },
    { src: "SME", q: "How does SWEATING increase HEAT LOSS from the body? (EXT)", a: "Sweat is released onto the skin surface by sweat glands. When sweat EVAPORATES, it transfers HEAT ENERGY AWAY from the skin (latent heat of vaporisation), cooling the body." },
    { src: "SME", q: "How does SHIVERING contribute to TEMPERATURE REGULATION? (EXT)", a: "Shivering = rapid involuntary MUSCLE CONTRACTIONS. These contractions GENERATE HEAT through RESPIRATION (respiration is exothermic). This helps RAISE the core body temperature when it is too low." },
    { src: "SME", q: "TRUE or FALSE? Hair erector muscles in the skin CONTRACT in response to COLD temperatures. (EXT)", a: "TRUE. Hair erector muscles CONTRACT in cold conditions, pulling hairs UPRIGHT. The raised hairs trap a layer of AIR — providing INSULATION (effective in furry mammals; in humans this just makes 'goose bumps')." },
    { src: "SME", q: "Define VASODILATION. (EXT)", a: "Vasodilation is a COOLING mechanism in which the DIAMETER of SKIN ARTERIOLES INCREASES (widens). This increases BLOOD FLOW to capillaries near the skin surface, transferring heat to the environment by RADIATION." },
    { src: "SME", q: "TRUE or FALSE? When a person enters a COLDER environment, blood flow to the surface of the skin is REDUCED. (EXT)", a: "TRUE. This is VASOCONSTRICTION — the diameter of skin arterioles DECREASES, reducing blood flow to surface capillaries. Less heat lost by radiation → body conserves heat." },
    { src: "SME", q: "TRUE or FALSE? CONSTRICTION OF THE CAPILLARIES reduces blood flow to the skin surface. (EXT)", a: "FALSE. CAPILLARIES do NOT have a muscle layer and cannot constrict. Constriction occurs in the ARTERIOLES that supply the skin capillaries — reducing blood flow to the skin surface." },

    // ── SME 58-61: tropisms ──
    { src: "SME", q: "Define GRAVITROPISM (or GEOTROPISM).", a: "Gravitropism (also called geotropism) is the DIRECTIONAL GROWTH RESPONSE of plants towards or away from GRAVITY. ROOTS grow downwards (positive gravitropism). SHOOTS grow upwards (negative gravitropism)." },
    { src: "SME", q: "Define PHOTOTROPISM.", a: "Phototropism is the DIRECTIONAL GROWTH of plants towards or away from LIGHT. SHOOTS grow towards light (positive phototropism), allowing maximum photosynthesis." },
    { src: "SME", q: "TRUE or FALSE? In an investigation into the effect of GRAVITY on newly germinated seedlings, the DEPENDENT VARIABLE is the direction of gravity.", a: "FALSE. The dependent variable is the LENGTH and/or DIRECTION of growth of the newly grown ROOTS and SHOOTS. The direction of gravity is the INDEPENDENT variable." },
    { src: "SME", q: "Which variables need to be CONTROLLED in an investigation into the effect of LIGHT on newly germinated seedlings?", a: "Controlled variables include: (1) DIRECTION OF GRAVITY (keep seedlings upright). (2) TEMPERATURE. (3) WATER AVAILABILITY (how damp the cotton wool is). (4) TYPE / SIZE / AGE of seedlings." },

    // ── SME 62-66: auxin & phototropism EXT ──
    { src: "SME", q: "TRUE or FALSE? Phototropism is an example of CHEMICAL CONTROL of plant growth. (EXT)", a: "TRUE. Phototropism is a growth response controlled by the plant chemical (hormone) AUXIN. Auxin diffuses through the shoot tip and controls cell elongation." },
    { src: "SME", q: "TRUE or FALSE? Auxin is PRODUCED on the SHADY side of a plant shoot. (EXT)", a: "FALSE. Auxin is PRODUCED in the SHOOT TIP before DIFFUSING to the shady side of the plant. (Production = tip; ACCUMULATION = shady side after lateral diffusion.)" },
    { src: "SME", q: "What happens to AUXIN DISTRIBUTION when light shines on ONE SIDE of a shoot? (EXT)", a: "When light shines on one side, the auxin produced in the tip MOVES AWAY from the light and ACCUMULATES on the SHADED side. So auxin concentration is HIGHER on the shaded side." },
    { src: "SME", q: "What effect does AUXIN have on cells in the SHOOTS of plants? (EXT)", a: "Auxin STIMULATES CELL ELONGATION in plant shoots. Cells in the region just below the tip stretch and lengthen, making the shoot grow longer." },
    { src: "SME", q: "How does AUXIN DISTRIBUTION in response to light lead to PHOTOTROPISM? (EXT)", a: "Auxin ACCUMULATES on the SHADED side of the shoot. Cells on the SHADY SIDE elongate FASTER than cells on the lit side. The shoot's shaded side grows longer than the lit side → the shoot BENDS TOWARDS THE LIGHT." },

    // ════════════════════════════════════════════════════════════════════════
    // NLCS SUPPLEMENTARY — 42 additional cards (synapse, eye detail, glucose,
    // diabetes, skin, tropism, auxin extras and examiner traps)
    // ════════════════════════════════════════════════════════════════════════

    // ── Suppl: coordination concept ──
    { src: "Suppl", q: "What is COORDINATION in biology?", a: "Coordination is the way the body's organs WORK TOGETHER to respond to changes (stimuli) in the environment. It depends on receiving information, processing it, and producing an appropriate response. Done by the nervous system and the endocrine (hormone) system." },
    { src: "Suppl", q: "What is a STIMULUS, RECEPTOR, EFFECTOR and RESPONSE?", a: "STIMULUS — a change in the environment (internal or external). RECEPTOR — a cell or organ that DETECTS the stimulus. EFFECTOR — a muscle or gland that DOES something (the response). RESPONSE — the action produced." },

    // ── Suppl: neurones structure ──
    { src: "Suppl", q: "What is the function of the MYELIN SHEATH around a neurone's axon?", a: "Myelin is a fatty INSULATING layer that surrounds the axon. It SPEEDS UP the transmission of impulses (impulses jump from gap to gap along the myelin). It also reduces signal loss between neighbouring neurones." },
    { src: "Suppl", q: "What is the difference between a NERVE and a NEURONE?", a: "A NEURONE is a SINGLE nerve CELL. A NERVE is a BUNDLE of many neurones (usually hundreds or thousands) wrapped in connective tissue. Like a 'cable' (nerve) containing many 'wires' (neurones)." },

    // ── Suppl: reflex arc detail ──
    { src: "Suppl", q: "Why is a REFLEX ACTION FASTER than a voluntary action?", a: "Because the impulse takes a SHORTER PATHWAY: it goes through only 3 neurones (sensory → relay → motor) in the spinal cord, BYPASSING the conscious brain. The brain receives a copy of the impulse AFTERWARDS, so you feel the pain after withdrawing. This saves vital milliseconds." },
    { src: "Suppl", q: "Give two everyday examples of REFLEX ACTIONS.", a: "(1) Knee-jerk reflex (tapping below the knee makes leg kick). (2) Withdrawal from heat/pain (pulling hand away from hot object). Also: blinking, sneezing, coughing, swallowing, pupil reflex, salivating when smelling food." },
    { src: "Suppl", q: "Which part of the CNS handles the simple WITHDRAWAL REFLEX?", a: "The SPINAL CORD — specifically the GREY MATTER, where the relay neurone is found. The impulse never reaches the brain before the response is produced. The brain only learns about it a fraction of a second later." },

    // ── Suppl: synapse extras EXT ──
    { src: "Suppl", q: "How can DRUGS affect synapses? (EXT)", a: "Many drugs work by altering synaptic transmission: BLOCKING the receptor sites (e.g. some painkillers), MIMICKING neurotransmitters (e.g. nicotine, heroin), or PREVENTING reuptake (e.g. some antidepressants). This explains why drugs can affect nervous-system function." },

    // ── Suppl: eye anatomy ──
    { src: "Suppl", q: "Where is the BLIND SPOT and why does it exist?", a: "The blind spot is where the OPTIC NERVE leaves the back of the eye. At that point there is NO retina, so no rods or cones — therefore no light detection. The brain normally fills in the gap from the other eye and from memory, so we don't notice it." },
    { src: "Suppl", q: "What does the IRIS do, and what is its other obvious feature?", a: "The iris is a ring of muscle that controls how much light enters the eye (by changing pupil size). Its other feature: PIGMENT that gives the eye its COLOUR (blue, brown, green, etc.). The hole in the middle is the pupil." },
    { src: "Suppl", q: "What is the role of the CORNEA in focusing?", a: "The cornea does MOST of the refraction (bending of light) when light enters the eye — about two-thirds of the total. It has a FIXED curvature, so its refraction is constant. The lens then does the FINE-TUNING to focus on near vs far objects." },
    { src: "Suppl", q: "Why does the image on the retina appear UPSIDE DOWN?", a: "Because light from above and below the object crosses over as it passes through the lens (just like a pinhole camera). The brain learns to interpret this inverted image as 'right way up' — we never see it as upside-down." },

    // ── Suppl: pupil reflex extras ──
    { src: "Suppl", q: "Why is the PUPIL REFLEX described as a REFLEX ACTION?", a: "Because it is AUTOMATIC, INVOLUNTARY, RAPID, and PROTECTIVE — exactly the criteria of a reflex. The receptor (retina) detects bright light → sensory neurone → CNS (brain) → motor neurone → iris muscles contract or relax. We can't 'choose' the size of our pupil." },
    { src: "Suppl", q: "What do you mean by ANTAGONISTIC muscles in the iris?", a: "Antagonistic muscles work in OPPOSING PAIRS — when one contracts, the other relaxes, and vice versa. In the iris: circular muscles run AROUND the pupil; radial muscles run OUTWARDS like spokes. They cannot both pull the pupil at once; one always relaxes." },

    // ── Suppl: accommodation extras EXT ──
    { src: "Suppl", q: "Why do we get PRESBYOPIA (long-sightedness with age)? (EXT)", a: "As we age, the lens becomes LESS ELASTIC and the ciliary muscles weaken. The lens can no longer become FAT enough to focus on close objects — so reading glasses (convex) are needed to do the extra refracting. Most people over 45 need them." },

    // ── Suppl: rods vs cones extras ──
    { src: "Suppl", q: "Why can't we see COLOURS at night?", a: "Because only RODS are sensitive enough to respond to dim light, and rods only detect light/dark — NOT colour. Cones need more light to fire, so at night the cones are silent and only rods provide vision — in shades of grey." },
    { src: "Suppl", q: "Why can't we see FINE DETAIL in the dark?", a: "Because (1) the cones (which give the sharpest, central vision) are not active in dim light, and (2) the rods are spread out and several rods often share one neurone — so brain combines a wider area, losing detail. We see general shapes and movement but no fine print at night." },

    // ── Suppl: endocrine concept ──
    { src: "Suppl", q: "Where is each gland LOCATED? Adrenal, pancreas, ovary, testis.", a: "ADRENAL — one on top of each KIDNEY. PANCREAS — behind the stomach. OVARY — pair in the lower abdomen (women). TESTIS — pair in the scrotum (men). Each releases its hormone(s) directly into the bloodstream." },
    { src: "Suppl", q: "What hormone does the OVARY make and what does it do?", a: "OESTROGEN — controls female secondary sexual characteristics (breast development, widening of hips, body hair pattern) at puberty. Also involved in the menstrual cycle (covered in Ch.16)." },
    { src: "Suppl", q: "What hormone does the TESTIS make and what does it do?", a: "TESTOSTERONE — controls male secondary sexual characteristics (growth of facial/body hair, voice deepening, muscle growth, sperm production) at puberty." },

    // ── Suppl: adrenaline detail EXT ──
    { src: "Suppl", q: "Why does ADRENALINE cause GLUCOSE to RISE in the blood? (EXT)", a: "Adrenaline causes the LIVER to convert stored GLYCOGEN into GLUCOSE, which is released into the blood. This provides extra fuel for muscles for the 'fight or flight' response, allowing them to respire more rapidly and contract more strongly." },
    { src: "Suppl", q: "List FIVE specific effects of ADRENALINE on the body.", a: "(1) Heart beats FASTER and HARDER. (2) Breathing FASTER and DEEPER. (3) Blood glucose RISES (glycogen → glucose). (4) Pupils DILATE. (5) Blood diverts FROM gut and skin TO muscles, brain, heart. (Also: hair stands on end, sweating.)" },

    // ── Suppl: nervous vs endocrine comparison ──
    { src: "Suppl", q: "Give THREE differences between NERVOUS and ENDOCRINE (hormonal) systems.", a: "(1) SIGNAL: nerves use electrical impulses; hormones are chemicals in blood. (2) SPEED: nerves very FAST (milliseconds); hormones SLOWER (seconds to minutes). (3) DURATION: nervous response very BRIEF; hormone response usually LONGER-lasting. (4) PRECISION: nerves target a specific muscle/gland; hormones travel everywhere but affect specific target organs." },
    { src: "Suppl", q: "Which would you use to (a) BLINK, (b) GROW TALLER?", a: "(a) BLINK — NERVOUS system (a reflex action, requires fast precise action of eyelid muscles). (b) GROW TALLER — ENDOCRINE system (growth hormone, oestrogen/testosterone act over months and years — slow continuous change is hormone territory)." },

    // ── Suppl: homeostasis EXT ──
    { src: "Suppl", q: "Name FOUR things kept constant by HOMEOSTASIS. (EXT)", a: "(1) BLOOD GLUCOSE concentration. (2) BODY TEMPERATURE (around 37°C). (3) WATER and ION concentration in body fluids (osmoregulation). (4) BLOOD pH (around 7.4). Also: CO₂, urea levels. All maintained by negative feedback." },
    { src: "Suppl", q: "Why is NEGATIVE FEEDBACK OSCILLATING? (EXT)", a: "Because the response is triggered AFTER the change has happened, and continues a little too long, so the level slightly overshoots in the opposite direction. Then it triggers correction in the other direction. The result is a small wave around the set point — never perfectly flat, but kept within a narrow range." },

    // ── Suppl: blood glucose detail EXT ──
    { src: "Suppl", q: "What is GLYCOGEN and where is it stored? (EXT)", a: "Glycogen is a STORAGE FORM of glucose: a large branched polysaccharide. It is stored mainly in LIVER and MUSCLE cells. The liver's glycogen can be released back as glucose to the blood (under glucagon control); muscle glycogen is used locally by the muscle itself." },
    { src: "Suppl", q: "What happens to blood glucose AFTER EATING A MEAL? (EXT)", a: "Glucose RISES (absorbed from gut). The PANCREAS detects the rise and releases INSULIN. Insulin causes LIVER and MUSCLE cells to take up glucose and convert it to GLYCOGEN for storage. Blood glucose falls back to ~5 mmol/L. Body cells also use glucose for respiration." },
    { src: "Suppl", q: "What happens to blood glucose if you SKIP A MEAL or EXERCISE HARD? (EXT)", a: "Glucose FALLS as it's used by respiring cells. The PANCREAS releases GLUCAGON. Glucagon causes the LIVER to break down GLYCOGEN back into GLUCOSE, which enters the blood. Blood glucose rises back to normal." },

    // ── Suppl: diabetes EXT ──
    { src: "Suppl", q: "What is TYPE 1 DIABETES? (EXT)", a: "Type 1 diabetes is when the pancreas FAILS to produce INSULIN (the insulin-secreting beta cells in the islets of Langerhans are destroyed). Without insulin, blood glucose stays HIGH after meals — leading to glucose in urine, thirst, frequent urination, and tiredness. Usually starts in childhood." },
    { src: "Suppl", q: "Why does sugar/glucose appear in the URINE of a diabetic? (EXT)", a: "Because blood glucose rises so high that, when blood passes through the kidney, more glucose enters the filtrate than the kidney tubules can reabsorb. The excess spills over into the urine. A 'sweet urine' was the original test for diabetes (the word diabetes mellitus means 'siphon, sweet')." },

    // ── Suppl: skin structure ──
    { src: "Suppl", q: "Name the structures in mammalian skin (from outside in).", a: "EPIDERMIS (outer protective layer with hairs sticking out), DERMIS (thicker living layer containing hair follicles, sweat glands, blood vessels, sensory nerve endings, erector muscles), SUB-CUTANEOUS FAT (insulating layer below)." },
    { src: "Suppl", q: "What is the function of SUBCUTANEOUS FAT?", a: "Subcutaneous fat is a layer of fatty tissue beneath the dermis. Its functions: (1) INSULATION — reduces heat loss to the environment. (2) ENERGY STORE. (3) PROTECTION — cushions underlying tissues from physical impact." },

    // ── Suppl: thermoregulation extras EXT ──
    { src: "Suppl", q: "Where in the brain is BODY TEMPERATURE monitored? (EXT)", a: "In the THERMOREGULATORY CENTRE of the HYPOTHALAMUS. It detects the temperature of blood flowing through it AND receives signals from temperature sensors in the skin. It coordinates the appropriate responses (sweating, shivering, vasodilation, vasoconstriction)." },

    // ── Suppl: tropisms extras ──
    { src: "Suppl", q: "Define TROPISM.", a: "A tropism is a GROWTH RESPONSE of a plant in which the DIRECTION of growth is determined by the DIRECTION of an external STIMULUS. Slow but unmistakable. POSITIVE = growth towards the stimulus; NEGATIVE = growth away from it." },
    { src: "Suppl", q: "Why is positive PHOTOTROPISM in shoots ADVANTAGEOUS to a plant?", a: "It directs leaves towards the brightest light, MAXIMISING photosynthesis and so increasing the plant's food production. Plants that don't respond to light may be shaded by competitors and grow weakly." },
    { src: "Suppl", q: "Why is positive GRAVITROPISM in roots ADVANTAGEOUS?", a: "It directs roots DOWN into the soil where they can absorb WATER and MINERAL IONS, and anchor the plant firmly against wind. Without gravitropism, roots might grow sideways or upwards out of the soil — a disaster for the plant." },

    // ── Suppl: auxin extras EXT ──
    { src: "Suppl", q: "What is AUXIN and where is it MADE? (EXT)", a: "Auxin (specifically IAA — indole-3-acetic acid) is a plant HORMONE. It is produced in the GROWING TIPS of shoots and roots. It moves down from the tip into the region behind, where cells are still elongating. It controls phototropism and gravitropism." },
    { src: "Suppl", q: "Why does auxin cause SHOOTS and ROOTS to bend in OPPOSITE directions for gravity? (EXT)", a: "When a seedling is laid on its side, auxin accumulates on the LOWER side of both shoot and root. In SHOOTS, auxin STIMULATES elongation — lower side grows longer → shoot bends UP. In ROOTS, auxin INHIBITS elongation — lower side grows LESS → root bends DOWN. Opposite effect of the same hormone in different tissues." },
    { src: "Suppl", q: "How are SYNTHETIC AUXINS (like 2,4-D) used as WEEDKILLERS? (EXT)", a: "Sprayed on fields. At high concentrations, auxin causes UNCONTROLLED, lethal growth. BROAD-leaved weeds (dandelions, daisies — dicots) absorb a lot through their wide leaves and DIE. NARROW-leaved crops (wheat, grass — monocots) absorb little and SURVIVE. A SELECTIVE herbicide." },

    // ── Suppl: exam booster / common errors ──
    { src: "Suppl", q: "EXAMINER TRAP: 'The pancreas detects high blood glucose and the liver releases insulin.' What's wrong?", a: "WRONG. The PANCREAS detects high blood glucose AND releases INSULIN. The LIVER is the TARGET — it responds to insulin by storing glucose as glycogen. Pancreas = source of insulin; liver = target of insulin. Confusing them loses easy marks." },
    { src: "Suppl", q: "EXAMINER TRAP: 'In dim light the circular muscles of the iris contract.' What's wrong?", a: "WRONG. In dim light the RADIAL muscles contract (and circular muscles relax), making the pupil DILATE to let more light in. Circular muscles contract in BRIGHT light to constrict the pupil. Many students get the muscle pair backwards." },
    { src: "Suppl", q: "EXAMINER TRAP: 'When focusing on a near object, the lens becomes thinner.' What's wrong?", a: "WRONG. For NEAR objects the lens becomes FATTER (more curved) — ciliary muscles CONTRACT, suspensory ligaments LOOSEN. Thinner lens = DISTANT object. Easy to get the wrong way around if you don't visualise it carefully." },
    { src: "Suppl", q: "EXAMINER TRAP: 'Auxin is made on the shaded side of a shoot.' What's wrong?", a: "WRONG. Auxin is MADE in the SHOOT TIP. It then DIFFUSES sideways and ACCUMULATES on the shaded side because light causes lateral transport away from the lit side. Production location (tip) ≠ accumulation location (shaded side)." },
  ];

  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [shuffleSeed, setShuffleSeed] = useState(0);

  // Deterministic shuffle based on seed
  const order = (() => {
    if (shuffleSeed === 0) return cards.map((_, i) => i);
    const arr = cards.map((_, i) => i);
    let seed = shuffleSeed;
    for (let i = arr.length - 1; i > 0; i--) {
      seed = (seed * 9301 + 49297) % 233280;
      const j = Math.floor((seed / 233280) * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  })();

  const card = cards[order[idx]];
  const total = cards.length;

  const next = () => { setFlipped(false); setIdx((idx + 1) % total); };
  const prev = () => { setFlipped(false); setIdx((idx - 1 + total) % total); };
  const shuffle = () => { setFlipped(false); setIdx(0); setShuffleSeed(Date.now() % 1000000 + 1); };
  const reset   = () => { setFlipped(false); setIdx(0); setShuffleSeed(0); };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Header */}
      <div style={{ background: TL, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>🎴 SME Flashcards — Click to flip</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          {total} cards total · <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SME</span> = 18 official-style cards · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 10 }}>SUPPL</span> = NLCS extra · Tap card to flip
        </div>
      </div>

      {/* Counter + buttons */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div style={{ fontSize: 12, color: TL, fontWeight: 700 }}>
          Card {idx + 1} / {total}
          {shuffleSeed !== 0 && <span style={{ color: "#888", marginLeft: 8, fontWeight: 500 }}>(shuffled)</span>}
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={shuffle} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>🔀 Shuffle</button>
          <button onClick={reset} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer", border: `1.5px solid ${BD}`, background: "#fff", color: "#666" }}>↺ Reset</button>
        </div>
      </div>

      {/* Card */}
      <div
        onClick={() => setFlipped(!flipped)}
        style={{
          background: flipped ? TLL : "#fff",
          border: `2px solid ${TL}`,
          borderRadius: 14,
          padding: "32px 24px",
          minHeight: 220,
          cursor: "pointer",
          textAlign: "center",
          display: "flex",
          flexDirection: "column",
          justifyContent: "center",
          transition: "all .2s",
          boxShadow: "0 2px 8px rgba(0,0,0,0.04)",
          position: "relative",
        }}>
        {/* Source badge - top right */}
        <div style={{ position: "absolute", top: 10, right: 12 }}>
          <span style={{
            background: card.src === "SME" ? TL : "#7a6a40",
            color: "#fff", borderRadius: 3,
            padding: "2px 7px", fontSize: 9, fontWeight: 700, letterSpacing: 0.5,
          }}>
            {card.src === "SME" ? "SME" : "SUPPL"}
          </span>
        </div>
        <div style={{ fontSize: 10, color: TL, fontWeight: 700, letterSpacing: 1, marginBottom: 12 }}>
          {flipped ? "ANSWER" : "QUESTION"}
        </div>
        <div style={{ fontSize: 16, lineHeight: 1.6, color: GR, fontWeight: flipped ? 400 : 600 }}>
          {flipped ? card.a : card.q}
        </div>
        <div style={{ fontSize: 10, color: "#aaa", marginTop: 18, fontStyle: "italic" }}>
          {flipped ? "Tap to see the question" : "Tap to reveal the answer"}
        </div>
      </div>

      {/* Nav buttons */}
      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 4 }}>
        <button onClick={prev} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${TL}`, background: "#fff", color: TL }}>← Prev</button>
        <button onClick={next} style={{ padding: "10px 22px", borderRadius: 8, fontSize: 13, fontWeight: 700, cursor: "pointer", border: "none", background: TL, color: "#fff" }}>Next →</button>
      </div>

      {/* Footer */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: TLL, borderRadius: 8, fontSize: 11, color: TL, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Tip:</Bold> Try answering aloud before flipping. Cards marked <Bold>(EXT)</Bold> are Extended-tier content.
      </div>
    </div>
  );
}
