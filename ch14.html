<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber

const PL = "#ede9fe";  // light purple

const RL = "#fdf0f0";  // light red

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,

const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>

// ════════════════════════════════════════════════════════════════════════════

// SVG DIAGRAMS — freshly redesigned for Ch.14

// ── Reusable arrow marker defs (used across multiple diagrams) ──────────────
function ArrowDefs() {
  return (
    <defs>
      <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={G}/>
      </marker>
      <marker id="arrowR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={RD}/>
      </marker>
      <marker id="arrowP" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={PU}/>
      </marker>
      <marker id="arrowA" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill={AM}/>
      </marker>

}

// ── Nervous system overview (CNS + PNS) ──────────────────────────────────────
function NervousSystemDiagram() {
  return (
    <svg viewBox="0 0 700 360" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <ArrowDefs/>
      <rect width="700" height="360" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="24" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Organisation of the Human Nervous System
      </text>

      {/* CNS box (centre) */}
      <rect x="290" y="60" width="120" height="80" rx="10" fill={GL} stroke={G} strokeWidth="2"/>
      <text x="350" y="85" textAnchor="middle" fontSize="13" fontWeight="700" fill={G}>CNS</text>
      <text x="350" y="103" textAnchor="middle" fontSize="11" fill={GR}>• brain</text>
      <text x="350" y="120" textAnchor="middle" fontSize="11" fill={GR}>• spinal cord</text>
      <text x="350" y="135" textAnchor="middle" fontSize="9" fill="#777" fontStyle="italic">processes information</text>

      {/* PNS box (right) */}
      <rect x="500" y="60" width="170" height="80" rx="10" fill={AL} stroke={AM} strokeWidth="2"/>
      <text x="585" y="85" textAnchor="middle" fontSize="13" fontWeight="700" fill={AM}>PNS</text>
      <text x="585" y="103" textAnchor="middle" fontSize="11" fill={GR}>nerves connecting</text>
      <text x="585" y="118" textAnchor="middle" fontSize="11" fill={GR}>the body to the CNS</text>
      <text x="585" y="135" textAnchor="middle" fontSize="9" fill="#777" fontStyle="italic">sensory + motor fibres</text>

      {/* Receptors box (left) */}
      <rect x="30" y="60" width="170" height="60" rx="10" fill="#fff" stroke={GR} strokeWidth="1.5"/>
      <text x="115" y="82" textAnchor="middle" fontSize="12" fontWeight="700" fill={GR}>RECEPTORS</text>
      <text x="115" y="100" textAnchor="middle" fontSize="10" fill={GR}>eye · ear · skin · nose · tongue</text>

      {/* Effectors box (left lower) */}
      <rect x="30" y="200" width="170" height="60" rx="10" fill="#fff" stroke={GR} strokeWidth="1.5"/>
      <text x="115" y="222" textAnchor="middle" fontSize="12" fontWeight="700" fill={GR}>EFFECTORS</text>
      <text x="115" y="240" textAnchor="middle" fontSize="10" fill={GR}>muscles · glands</text>

      {/* Receptor → CNS (sensory impulses) */}
      <line x1="200" y1="90" x2="285" y2="90" stroke={G} strokeWidth="2" markerEnd="url(#arrowG)"/>

      <text x="230" y="180" textAnchor="middle" fontSize="10" fill={RD} fontWeight="700">MOTOR</text>
      <text x="230" y="195" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">CNS → response</text>

      {/* CNS ↔ PNS */}
      <line x1="410" y1="100" x2="498" y2="100" stroke={GR} strokeWidth="1.5" strokeDasharray="3 3"/>

      {/* Flow row at bottom */}
      <g transform="translate(40, 290)">
        <rect x="0" y="0" width="80" height="34" rx="6" fill="#fff" stroke={GR} strokeWidth="1.2"/>
        <text x="40" y="22" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>STIMULUS</text>

        <line x1="80" y1="17" x2="105" y2="17" stroke={G} strokeWidth="1.5" markerEnd="url(#arrowG)"/>

        <rect x="110" y="0" width="80" height="34" rx="6" fill={GL} stroke={G} strokeWidth="1.2"/>

        <rect x="220" y="0" width="80" height="34" rx="6" fill={GL} stroke={G} strokeWidth="1.2"/>
        <text x="260" y="22" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>CNS</text>

    </svg>

// ── Synapse diagram ──────────────────────────────────────────────────────────
function SynapseDiagram() {

        the junction between two neurones (EXT)

      {/* Vesicles with neurotransmitter */}

      <circle cx="380" cy="155" r="2" fill={AM}/>
      <circle cx="410" cy="150" r="8" fill="#fff" stroke={AM} strokeWidth="1.5"/>

      <circle cx="405" cy="208" r="3" fill={AM}/>
      <circle cx="430" cy="205" r="3" fill={AM}/>

      <text x="350" y="260" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>POST-synaptic neurone</text>
      <text x="350" y="278" textAnchor="middle" fontSize="9" fill="#666">(receives the impulse)</text>

      {/* Receptor proteins on post-synaptic membrane */}
      <rect x="282" y="219" width="10" height="6" fill={G}/>
      <rect x="318" y="219" width="10" height="6" fill={G}/>
      <rect x="354" y="219" width="10" height="6" fill={G}/>
      <rect x="390" y="219" width="10" height="6" fill={G}/>

      <text x="100" y="115" fontSize="10" fontWeight="700" fill={PU}>of impulse</text>
      <text x="100" y="275" fontSize="9" fontStyle="italic" fill="#666">(one way only)</text>

      {/* Labels right side */}
      <text x="475" y="92" fontSize="10" fontWeight="700" fill="#a04a1a">mitochondrion</text>
      <line x1="475" y1="90" x2="415" y2="90" stroke="#a04a1a" strokeWidth="0.6"/>
      <text x="475" y="105" fontSize="9" fill="#666">(makes ATP)</text>

      <text x="475" y="150" fontSize="10" fontWeight="700" fill={AM}>vesicle</text>
      <line x1="475" y1="148" x2="418" y2="150" stroke={AM} strokeWidth="0.6"/>
      <text x="475" y="163" fontSize="9" fill="#666">stores neurotransmitter</text>

      <text x="475" y="205" fontSize="10" fontWeight="700" fill={AM}>neurotransmitter</text>
      <text x="475" y="218" fontSize="9" fill="#666">(diffuses across gap)</text>

      <text x="475" y="245" fontSize="10" fontWeight="700" fill={G}>receptor protein</text>
      <line x1="475" y1="243" x2="438" y2="225" stroke={G} strokeWidth="0.6"/>
      <text x="475" y="258" fontSize="9" fill="#666">(only on post-syn side)</text>

      {/* Numbered steps box */}
      <g transform="translate(40, 335)">
        <text x="0" y="0" fontSize="10" fontWeight="700" fill={PU}>STEPS:</text>
        <text x="50" y="0" fontSize="10" fill={GR}>

        </text>
        <text x="50" y="14" fontSize="10" fill={GR}>
          ④ binds receptor proteins on post-syn side → ⑤ new impulse fires in next neurone
        </text>
      </g>
    </svg>
  );
}

// ── Blood glucose regulation (negative feedback) ─────────────────────────────
function BloodGlucoseDiagram() {
  return (
    <svg viewBox="0 0 700 380" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <ArrowDefs/>
      <rect width="700" height="380" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>

      </text>

      {/* Central "normal" bar */}
      <rect x="240" y="170" width="220" height="36" rx="18" fill={GL} stroke={G} strokeWidth="2"/>
      <text x="350" y="187" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>NORMAL BLOOD GLUCOSE</text>
      <text x="350" y="201" textAnchor="middle" fontSize="10" fill={GR}>≈ 90 mg per 100 cm³</text>

      {/* TOO HIGH (top branch) */}
      <rect x="260" y="50" width="180" height="40" rx="6" fill={RL} stroke={RD} strokeWidth="1.5"/>
      <text x="350" y="68" textAnchor="middle" fontSize="11" fontWeight="700" fill={RD}>BLOOD GLUCOSE TOO HIGH</text>
      <text x="350" y="82" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">(e.g. after a sugary meal)</text>

      {/* TOO LOW (bottom branch) */}
      <rect x="260" y="290" width="180" height="40" rx="6" fill={AL} stroke={AM} strokeWidth="1.5"/>
      <text x="350" y="308" textAnchor="middle" fontSize="11" fontWeight="700" fill={AM}>BLOOD GLUCOSE TOO LOW</text>
      <text x="350" y="322" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">(e.g. exercise / not eaten)</text>

      {/* High → pancreas → insulin → liver → glycogen */}
      <line x1="350" y1="90" x2="350" y2="165" stroke={RD} strokeWidth="2" markerEnd="url(#arrowR)"/>
      <g transform="translate(20, 110)">
        <rect x="0" y="0" width="180" height="50" rx="5" fill="#fff" stroke={G} strokeWidth="1.2"/>
        <text x="10" y="16" fontSize="10" fontWeight="700" fill={G}>① Pancreas → INSULIN</text>
        <text x="10" y="30" fontSize="9" fill={GR}>insulin travels to liver</text>
        <text x="10" y="42" fontSize="9" fill={GR}>via the blood</text>
      </g>
      <line x1="200" y1="135" x2="265" y2="115" stroke={RD} strokeWidth="1.5" strokeDasharray="3 2"/>

      <g transform="translate(460, 110)">
        <rect x="0" y="0" width="220" height="50" rx="5" fill="#fff" stroke={G} strokeWidth="1.2"/>
        <text x="10" y="16" fontSize="10" fontWeight="700" fill={G}>② Liver: glucose → glycogen</text>
        <text x="10" y="30" fontSize="9" fill={GR}>(glucose taken UP by liver/cells</text>
        <text x="10" y="42" fontSize="9" fill={GR}>and STORED as glycogen)</text>
      </g>
      <line x1="455" y1="115" x2="445" y2="135" stroke={RD} strokeWidth="1.5" strokeDasharray="3 2"/>

      {/* Low → pancreas → glucagon → liver → glucose */}
      <line x1="350" y1="290" x2="350" y2="215" stroke={AM} strokeWidth="2" markerEnd="url(#arrowA)"/>
      <g transform="translate(20, 230)">
        <rect x="0" y="0" width="180" height="50" rx="5" fill="#fff" stroke={AM} strokeWidth="1.2"/>
        <text x="10" y="16" fontSize="10" fontWeight="700" fill={AM}>③ Pancreas → GLUCAGON</text>
        <text x="10" y="30" fontSize="9" fill={GR}>glucagon travels to liver</text>
        <text x="10" y="42" fontSize="9" fill={GR}>via the blood</text>
      </g>
      <line x1="200" y1="245" x2="265" y2="265" stroke={AM} strokeWidth="1.5" strokeDasharray="3 2"/>

      <g transform="translate(460, 230)">
        <rect x="0" y="0" width="220" height="50" rx="5" fill="#fff" stroke={AM} strokeWidth="1.2"/>
        <text x="10" y="16" fontSize="10" fontWeight="700" fill={AM}>④ Liver: glycogen → glucose</text>
        <text x="10" y="30" fontSize="9" fill={GR}>(stored glycogen broken down,</text>
        <text x="10" y="42" fontSize="9" fill={GR}>glucose RELEASED to blood)</text>
      </g>
      <line x1="455" y1="265" x2="445" y2="245" stroke={AM} strokeWidth="1.5" strokeDasharray="3 2"/>

      {/* Equation strip at bottom */}
      <g transform="translate(60, 350)">
        <text x="0" y="0" fontSize="10" fontWeight="700" fill={PU}>SUMMARY:</text>
        <text x="70" y="0" fontSize="10" fill={GR}>glucose ⇌ glycogen ·</text>
        <text x="220" y="0" fontSize="10" fontWeight="700" fill={RD}>insulin →</text>
        <text x="275" y="0" fontSize="10" fill={GR}>store ·</text>
        <text x="320" y="0" fontSize="10" fontWeight="700" fill={AM}>glucagon →</text>
        <text x="395" y="0" fontSize="10" fill={GR}>release</text>
        <text x="445" y="0" fontSize="10" fontStyle="italic" fill="#666">(both made by the PANCREAS)</text>
      </g>
    </svg>
  );
}

        </ul>

e = fast (almost instantaneous); hormone = slower (seconds–minutes). [1]\n  • DURATION: nerve = short-lasting; hormone = longer-lasting. [1]\n  • SPECIFICITY: nerve = very specific target (one effector); hormone = often affects many target organs."

            <li>If the variable goes <Bold>below</Bold> the set point → response brings it UP.</li>
            <li>The correction is OPPOSITE to the change — so it's called <KW c={G}>NEGATIVE feedback</KW>.</li>

          </ul>
          <Bold>Type 1 diabetes:</Bold> β-cells fail → no insulin → uncontrolled high blood glucose. Treated by <KW c={G}>insulin injections</KW> + diet + monitoring. Insulin must be injected because it's a PROTEIN (would be digested if swallowed).

        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, marginTop: 8 }}>
          <thead>
            <tr style={{ background: PL }}>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Too HOT — body LOSES heat</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Too COLD — body CONSERVES heat</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ padding: "8px", border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • <Bold>VASODILATION</Bold> — arterioles widen → more blood near surface → more heat lost by radiation<br/>
                • Sweat glands produce MORE sweat → evaporation removes latent heat<br/>
                • Hair erector muscles RELAX → hairs lie FLAT → less insulation
              </td>
              <td style={{ padding: "8px", border: `1px solid ${BD}`, verticalAlign: "top" }}>
                • <Bold>VASOCONSTRICTION</Bold> — arterioles narrow → less blood near surface → less heat lost<br/>
                • Sweating reduced<br/>
                • Hair erector muscles CONTRACT → hairs stand UP → trap air = insulation<br/>
                • <Bold>SHIVERING</Bold> — muscle contractions release heat from respiration
              </td>
            </tr>
          </tbody>
        </table>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, marginTop: 10, fontSize: 12 }}>
          ⚠️ Capillaries do not actually MOVE in/out of the skin — only the <Bold>arterioles</Bold> supplying them change diameter. The thermoregulatory centre is in the <Bold>brain</Bold> (hypothalamus).
        </div>
      </div>

      {/* 14. Tropisms */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 10 }}>14. TROPISMS — PLANT GROWTH RESPONSES</div>
        <TropismsDiagram/>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 8 }}>
          <thead>
            <tr style={{ background: PL }}>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Stimulus</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Shoot</th>
              <th style={{ padding: "8px", color: PU, fontWeight: 700, border: `1px solid ${PU}`, textAlign: "left" }}>Root</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Light (Phototropism)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>POSITIVE (grows towards light)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Usually NEGATIVE / none</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Gravity (Gravitropism)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>NEGATIVE (grows away from gravity — upwards)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>POSITIVE (grows towards gravity — downwards)</td></tr>
          </tbody>
        </table>
        <div style={{ fontSize: 11, color: GR, marginTop: 8, fontStyle: "italic" }}>
          "Positive" = grows TOWARDS the stimulus. "Negative" = grows AWAY from the stimulus.
        </div>
      </div>

      {/* 15. Auxin EXT */}
      <div style={{ background: "#fff", border: `1.5px solid ${PU}`, borderRadius: 8, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: PU, marginBottom: 8 }}>15. AUXIN — THE GROWTH HORMONE <Ext/></div>
        <AuxinDiagram/>
        <div style={{ background: GL, padding: "10px 12px", borderRadius: 6, marginTop: 10, fontSize: 12, color: GR, lineHeight: 1.65 }}>
          <Bold>How auxin produces phototropism in a shoot:</Bold>
          <ol style={{ margin: "6px 0 0 18px" }}>
            <li>Auxin is produced in the <Bold>tip</Bold> of the shoot.</li>
            <li>When light comes from one side, auxin moves to the <Bold>shaded side</Bold>.</li>
            <li>Higher auxin on the shaded side → cells there <Bold>elongate more</Bold>.</li>
            <li>Uneven growth → shoot <Bold>bends towards the light</Bold> (positive phototropism).</li>
          </ol>
          <Bold>Use as weedkiller:</Bold> synthetic auxins (e.g. <KW c={G}>2,4-D</KW>) at HIGH concentrations cause uncontrolled growth that kills broad-leaved weeds but not narrow-leaved crops (selective herbicide).
        </div>
      </div>

      {/* Common confusion box */}
      <div style={{ background: AL, border: `1.5px solid ${AM}`, borderRadius: 8, padding: "12px 16px" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: AM, marginBottom: 8 }}>⚠️ KEY DISTINCTIONS &amp; EXAM TRAPS</div>
        <ul style={{ margin: "0 0 0 18px", fontSize: 12, color: GR, lineHeight: 1.7 }}>
          <li><Bold>Glucagon ≠ glycogen.</Bold> Glucagon = HORMONE that raises sugar. Glycogen = the STORE of carbohydrate in the liver.</li>
          <li><Bold>Reflex arc order:</Bold> stimulus → receptor → SENSORY → RELAY → MOTOR → effector → response. Don't forget the relay.</li>
          <li><Bold>Iris muscles:</Bold> BRIGHT → CIRCULAR contracts (pupil small). DIM → RADIAL contracts (pupil large).</li>
          <li><Bold>Accommodation:</Bold> the lens changes SHAPE, not size. NEAR → fatter. FAR → thinner.</li>
          <li><Bold>Synapses</Bold> are ONE-WAY only — vesicles + transmitter on PRE side; receptors on POST side.</li>
          <li><Bold>Adrenaline</Bold> is a hormone, but its release is triggered by a NERVOUS signal from the brain — a mixed example.</li>
          <li><Bold>Tropism direction:</Bold> positive = TOWARDS, negative = AWAY. Roots positive to gravity; shoots negative to gravity.</li>
          <li><Bold>Capillaries</Bold> in skin do NOT move — only arterioles narrow/widen (vasoconstriction/vasodilation).</li>
        </ul>
      </div>
    </div>
  );
}

function TextbookTab() {
  const Section = ({ n, title, children }) => (

  const Def = ({ term, children }) => (

      <Bold>{term}:</Bold> {children}
    </div>
  );

  const Practical = ({ title, children }) => (
    <div style={{ background: "#fff4e6", border: `1.5px solid ${AM}`, borderRadius: 6, padding: "10px 14px", margin: "10px 0", fontSize: 12, color: GR, lineHeight: 1.6 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: AM, marginBottom: 4, letterSpacing: 1 }}>🔬 PRACTICAL / CLINICAL · {title}</div>
      {children}
    </div>
  );

  return (
    <div style={{ background: GL, border: `2px solid ${G}`, borderRadius: 10, padding: "18px 22px" }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: G, marginBottom: 6, letterSpacing: 1 }}>
        📘 TEXTBOOK · HODDER CAMBRIDGE IGCSE BIOLOGY · CHAPTER 14
      </div>
      <div style={{ fontSize: 11, color: GR, marginBottom: 14, fontStyle: "italic" }}>
        Complete notes. Open by topic when something needs deeper revision.
      </div>

      {/* SECTION 1: Coordination & the nervous system */}
      <Section n="1" title="Coordination &amp; the Nervous System">
        <p>
          To stay alive, an organism must be able to detect changes in its environment and respond appropriately. The systems that achieve this are called <Bold>coordination systems</Bold>. In humans, there are two: the <KW>nervous system</KW> (fast, electrical) and the <KW>endocrine (hormonal) system</KW> (slower, chemical). They both connect <Bold>receptors</Bold> (cells that detect stimuli) to <Bold>effectors</Bold> (muscles or glands that produce a response).
        </p>
        <Def term="Stimulus">A change in the environment, either internal (e.g. blood glucose rising) or external (e.g. light, sound, heat).</Def>
        <Def term="Receptor">A cell or structure that detects a particular stimulus and converts it into a nerve impulse.</Def>
        <Def term="Effector">A muscle that contracts, or a gland that secretes, to produce the response.</Def>

        <SubH>The two divisions of the nervous system</SubH>
        <NervousSystemDiagram/>
        <ul style={{ margin: "8px 0 0 18px" }}>
          <li><Bold>Central Nervous System (CNS)</Bold> — the <KW>brain</KW> and <KW>spinal cord</KW>. This is the "control centre" where decisions are made and reflex arcs are completed.</li>
          <li><Bold>Peripheral Nervous System (PNS)</Bold> — all the nerves that branch out from the CNS to the rest of the body. The PNS carries information IN (from receptors) and OUT (to effectors).</li>
        </ul>

        <SubH>Neurones — the wires of the body</SubH>
        <p>
          Nerves are made of bundles of <KW>neurones</KW> (nerve cells). A neurone is a long, thin cell specialised to carry electrical <Bold>impulses</Bold> rapidly from one part of the body to another. There are three types:
        </p>
        <NeuroneTypesDiagram/>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Sensory neurones</Bold> carry impulses FROM receptors TO the CNS. Their cell body sits in a small swelling called a <KW>ganglion</KW> just outside the spinal cord.</li>
          <li><Bold>Relay neurones</Bold> (also called intermediate neurones) lie ENTIRELY within the CNS. They link sensory and motor neurones.</li>
          <li><Bold>Motor neurones</Bold> carry impulses FROM the CNS TO an effector (muscle or gland). Their cell body lies inside the CNS (in the grey matter of the spinal cord or in the brain).</li>
        </ol>
        <p>
          All neurones share the same basic parts: a <Bold>cell body</Bold> containing the nucleus, branching <Bold>dendrites</Bold> that receive impulses, and a long fibre called the <Bold>axon</Bold> that carries the impulse along. Most axons are wrapped in a fatty <KW>myelin sheath</KW> which insulates the axon and lets impulses travel much faster (up to ~120 m s⁻¹ in fully myelinated fibres).
        </p>
      </Section>

      {/* SECTION 2: Reflex arc */}
      <Section n="2" title="Reflex Actions &amp; the Reflex Arc">
        <p>
          Some responses are too important to wait for the brain to think them through. If your hand touches a hot stove, every fraction of a second of delay means more burn damage. The body solves this with <KW>reflex actions</KW>: pre-wired, automatic, fast responses that bypass conscious thought.
        </p>
        <Def term="Reflex action">A means of automatically and rapidly integrating and coordinating stimuli with the responses of effectors. Reflex actions are rapid, automatic and involuntary — they do not require conscious thought.</Def>

        <SubH>Voluntary vs involuntary responses</SubH>
        <p>
          Not every nervous response is a reflex. Two broad categories:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Voluntary responses</Bold> — you make a CONSCIOUS DECISION; the action starts in the brain. Example: reaching out to pick up a cup of coffee. These responses often take longer because the brain weighs up consequences before acting.</li>
          <li><Bold>Involuntary (reflex) responses</Bold> — the BRAIN IS NOT THE COORDINATOR; you are not even aware the action has happened until after it is done. They are rapid, automatic, and usually essential to survival (avoiding pain, protecting eyes, etc.).</li>
        </ul>

        <SubH>The reflex arc</SubH>
        <p>
          The neural pathway that carries the impulses is called a <KW>reflex arc</KW>. A typical reflex arc involves exactly five components in a fixed order:
        </p>
        <ReflexArcDiagram/>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Stimulus</Bold> — e.g. a sharp pin pricks the skin.</li>
          <li><Bold>Receptor</Bold> — pain/pressure receptor in the skin detects the stimulus and generates a nerve impulse.</li>
          <li><Bold>Sensory neurone</Bold> — carries the impulse to the spinal cord.</li>
          <li><Bold>Relay neurone</Bold> — passes the impulse on within the spinal cord. (Connections to other neurones can also alert the brain, which is why you eventually FEEL the pain — but that signal travels separately.)</li>
          <li><Bold>Motor neurone</Bold> — carries the impulse out from the spinal cord.</li>
          <li><Bold>Effector</Bold> — usually a muscle (e.g. biceps in the arm) that contracts.</li>
          <li><Bold>Response</Bold> — the hand is jerked away from the pin.</li>
        </ol>
        <p>
          Memorise this seven-step order. Cambridge marks <Bold>each step separately</Bold>, and missing out the relay neurone is one of the most common mistakes.
        </p>

        <SubH>Other examples of reflexes</SubH>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Knee-jerk reflex</Bold> — tapping the tendon just below the kneecap stretches the thigh muscle; the spinal cord triggers a contraction → leg kicks up. Used by doctors to check spinal cord function.</li>
          <li><Bold>Pupil reflex</Bold> — bright light → pupil constricts to protect retina (see Section 4).</li>
          <li><Bold>Blinking reflex</Bold> — object approaches the eye → eyelid closes.</li>
          <li><Bold>Coughing, sneezing, swallowing</Bold> — all protective reflexes.</li>
        </ul>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Reflexes do NOT involve the brain for the action itself.</Bold> The arc is completed in the spinal cord, which is why someone with a damaged spinal cord may still show the reflex below the damage even though they cannot feel the stimulus (the pain signal cannot reach the brain).
        </div>
      </Section>

      {/* SECTION 3: Synapses EXT */}
      <Section n="3" title={<>Synapses <Ext/></>}>
        <p>
          Where one neurone meets the next there is a tiny gap called a <KW>synapse</KW>. The impulse cannot jump this gap as an electrical signal; instead a <Bold>chemical messenger</Bold> carries it across.
        </p>
        <Def term="Synapse">A junction between two neurones. A tiny gap (the synaptic cleft) separates the two cells, and impulses are transmitted by a chemical called a NEUROTRANSMITTER.</Def>
        <SynapseDiagram/>
        <SubH>Step-by-step: how a synapse works</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>An impulse arrives at the end of the <Bold>pre-synaptic</Bold> neurone (the side carrying the impulse in).</li>
          <li>Small membrane-bound packets called <KW>vesicles</KW> move to the membrane.</li>
          <li>Each vesicle fuses with the membrane and releases its contents — a <KW>neurotransmitter</KW> chemical — into the synaptic cleft (gap).</li>
          <li>The neurotransmitter <Bold>diffuses</Bold> across the cleft (this takes a fraction of a millisecond).</li>
          <li>On the other side, it binds to <KW>receptor proteins</KW> on the membrane of the <Bold>post-synaptic</Bold> neurone.</li>
          <li>Binding triggers a NEW electrical impulse in the post-synaptic neurone. The neurotransmitter is then quickly broken down or reabsorbed, ready for the next signal.</li>
        </ol>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Synapses are one-way.</Bold> Only the pre-synaptic side has vesicles full of neurotransmitter. Only the post-synaptic side has the right receptor proteins. So impulses can only travel pre → post; they cannot flow backwards through a synapse.
        </div>

        <SubH>Drugs that act on synapses</SubH>
        <p>
          Many medical and recreational drugs work by interfering with synapses, because the precise timing and amount of neurotransmitter is what gives the nervous system its control. Two main ways:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Mimic drugs</Bold> have a molecular shape similar to a natural neurotransmitter, so they bind to the receptor and trigger an impulse — even when the body wasn't signalling. Nicotine works this way at certain synapses.</li>
          <li><Bold>Blocker drugs</Bold> fit the receptor but do NOT trigger an impulse. They occupy the receptor and prevent the real transmitter from binding — so impulses stop. Many painkillers and anaesthetics work this way.</li>
        </ul>
      </Section>

      {/* SECTION 4: Sense organs - the eye */}
      <Section n="4" title="Sense Organs — the Eye">
        <p>
          A <KW>sense organ</KW> is a group of receptor cells that respond to a specific stimulus (light, sound, touch, taste, smell, temperature). The eye is the receptor for light.
        </p>
        <Def term="Sense organ">Groups of receptor cells responding to specific stimuli such as light, sound, touch, temperature and chemicals.</Def>

        <SubH>The five main sense organs</SubH>
        <p>
          Each sense organ is specialised to detect one kind of stimulus. The receptor cells convert the stimulus into electrical impulses that travel along sensory neurones to the CNS.
        </p>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 6 }}>
          <thead>
            <tr style={{ background: GL }}>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Sense organ</th>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Sensitive to</th>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Sense</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "5px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Skin</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Pressure, heat, cold, pain</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Touch, temperature</td></tr>
            <tr><td style={{ padding: "5px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Tongue</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Chemicals in food and drink</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Taste</td></tr>
            <tr><td style={{ padding: "5px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Nose</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Chemicals in the air</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Smell</td></tr>
            <tr><td style={{ padding: "5px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Ear</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Sound waves; movement / position</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Hearing &amp; balance</td></tr>
            <tr><td style={{ padding: "5px 8px", border: `1px solid ${BD}`, fontWeight: 700 }}>Eye</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Light</td><td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Sight</td></tr>
          </tbody>
        </table>
        <p style={{ marginTop: 8 }}>
          The eye is studied in most detail because it shows clearly how a sense organ is built around specialised receptor cells (rods and cones), connected through a sensory neurone (the optic nerve) to the brain. The general route is the same for any sense: <Bold>stimulus → receptor cell → sensory neurone → CNS → response.</Bold>
        </p>

        <SubH>Structure of the eye</SubH>
        <EyeDiagram/>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Cornea</Bold> — the transparent dome at the front of the eye. Does most of the focusing (refraction) of light entering the eye, and protects the inside.</li>
          <li><Bold>Iris</Bold> — the coloured ring of muscle. Controls how much light enters by changing the size of the central hole, the pupil.</li>
          <li><Bold>Pupil</Bold> — the hole in the middle of the iris. Looks black because there is very little light reflected from inside the eye.</li>
          <li><Bold>Lens</Bold> — a transparent, biconvex (fatter in the middle) disc behind the pupil. Fine-tunes the focusing; changes shape for near and far vision (accommodation).</li>
          <li><Bold>Ciliary muscles</Bold> — a ring of muscle around the lens. Contracts and relaxes to change the shape of the lens.</li>
          <li><Bold>Suspensory ligaments</Bold> — fibres that connect the ciliary muscles to the edge of the lens. They transmit the pull of the muscles to the lens.</li>
          <li><Bold>Retina</Bold> — the light-sensitive layer at the back of the eye. Contains rods and cones.</li>
          <li><Bold>Fovea</Bold> — a small region of the retina directly opposite the lens, densely packed with cones. Sharpest, most colourful vision.</li>
          <li><Bold>Optic nerve</Bold> — carries impulses from the retina to the brain. Where the optic nerve leaves there are no rods or cones — this creates a "blind spot".</li>
        </ul>

        <SubH>The pupil reflex</SubH>
        <p>
          When you walk from a dim room into bright sunlight, your pupils quickly become smaller; in dim light they enlarge again. This is the <KW>pupil reflex</KW>, controlled by two sets of antagonistic muscles in the iris:
        </p>
        <PupilReflexDiagram/>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Circular muscles</Bold> form a ring around the pupil. When they CONTRACT, they squeeze the pupil SMALLER.</li>
          <li><Bold>Radial muscles</Bold> run outwards from the pupil like spokes of a wheel. When they CONTRACT, they pull the pupil OPEN (larger).</li>
        </ul>
        <p>
          The two sets are <Bold>antagonistic</Bold> — they work in opposite directions, so one contracts while the other relaxes:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Bright light</Bold> → circular CONTRACT, radial RELAX → pupil <KW c={RD}>SMALLER</KW>. Less light enters, protecting the retina from damage.</li>
          <li><Bold>Dim light</Bold> → circular RELAX, radial CONTRACT → pupil <KW c={RD}>LARGER</KW>. More light enters, so you can still see.</li>
        </ul>

        <SubH>Accommodation <Ext/></SubH>
        <p>
          <KW>Accommodation</KW> is the ability of the eye to change focus from distant to near objects (and back). The lens does this by changing its <Bold>shape</Bold> (NOT its size or position). Both the ciliary muscles and the suspensory ligaments are involved.
        </p>
        <AccommodationDiagram/>
        <p><Bold>Focusing on a DISTANT object:</Bold></p>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Ciliary muscles RELAX → the ring of muscle gets WIDER.</li>
          <li>This pulls the suspensory ligaments TIGHT.</li>
          <li>The tight ligaments pull the lens THINNER / FLATTER (less convex).</li>
          <li>The thin lens refracts light less strongly — enough to focus the (nearly parallel) rays from a distant object on the retina.</li>
        </ol>
        <p><Bold>Focusing on a NEAR object:</Bold></p>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Ciliary muscles CONTRACT → the ring of muscle gets NARROWER.</li>
          <li>The suspensory ligaments are now SLACK.</li>
          <li>With less pull on it, the lens springs back into a FATTER / more rounded shape.</li>
          <li>The fatter lens refracts light more strongly — enough to focus the diverging rays from a near object on the retina.</li>
        </ol>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Counter-intuitive.</Bold> When the ciliary muscles CONTRACT, the ligaments BECOME SLACK and the lens BECOMES FATTER. People expect "contract" to mean "tighter" all the way through — but the ring shape means contraction makes the ring SMALLER, releasing tension on the ligaments. Memorise the final lens shape rather than the muscle action.
        </div>

        <SubH>Rods and cones — distribution and function</SubH>
        <p>
          The retina contains two types of photoreceptor cells:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Rods</Bold> — very sensitive to LOW light intensity. They produce only black-and-white (greyscale) signals. They are distributed throughout the retina but are absent from the fovea. Rods give us most of our PERIPHERAL and NIGHT vision.</li>
          <li><Bold>Cones</Bold> — only work in BRIGHT light. There are three types of cone (responding to red, green and blue light), which is why we see in colour. Cones are concentrated at the <KW>fovea</KW>, the small spot at the centre of the retina opposite the lens.</li>
        </ul>
        <p>
          This explains some everyday observations: dim stars are easier to see if you look slightly TO THE SIDE (image falls on rod-rich peripheral retina); in very dim light, the world looks almost colourless because only rods are firing.
        </p>
        <Practical title="Pupil reflex demonstration">
          Sit a partner in dim light for 30 s. Look at the size of their pupil. Suddenly shine a torch on one eye and observe — the pupil constricts within a second. Both pupils contract (the "consensual" reflex), showing the reflex pathway connects via the brain.
        </Practical>
      </Section>

      {/* SECTION 5: Hormones */}
      <Section n="5" title="Hormones &amp; the Endocrine System">
        <p>
          Hormones are the second great coordination system. They are slower than nervous signals but their effects can last much longer and reach widespread targets — perfect for processes that need sustained, body-wide control (growth, metabolism, reproduction).
        </p>
        <Def term="Hormone">A chemical substance, produced by a gland (an endocrine gland), carried by the blood, which alters the activity of one or more specific target organs.</Def>
        <p>
          The key parts of the definition: hormones are <Bold>chemicals</Bold>, they are produced by <Bold>glands</Bold>, they are carried in <Bold>blood</Bold>, and they only affect specific <Bold>target organs</Bold> (cells that have the right receptors).
        </p>

        <SubH>The endocrine glands and their hormones</SubH>
        <EndocrineGlandsDiagram/>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Pituitary gland</Bold> — sometimes called the "master gland" because it controls many other glands. Sits at the base of the brain. (Not on the IGCSE core list of hormones to memorise, but you should recognise its position and role.)</li>
          <li><Bold>Thyroid gland</Bold> — in the front of the neck. Produces <KW>thyroxine</KW>, which controls the body's overall metabolic rate.</li>
          <li><Bold>Adrenal glands</Bold> — one on top of each kidney. Produce <KW>adrenaline</KW>.</li>
          <li><Bold>Pancreas</Bold> — behind the stomach. Produces <KW>insulin</KW> and <KW>glucagon</KW> <Ext/>. (The pancreas is unusual — it is both an endocrine gland AND a digestive gland producing pancreatic juice. Different cells do different jobs.)</li>
          <li><Bold>Ovaries</Bold> (in females, in the lower abdomen) — produce <KW>oestrogen</KW>.</li>
          <li><Bold>Testes</Bold> (in males, in the scrotum) — produce <KW>testosterone</KW>.</li>
        </ul>

        <SubH>How hormones reach the right cell</SubH>
        <p>
          Endocrine glands have a very rich blood supply because they need to release hormones straight into the bloodstream. Once in the blood (specifically the plasma), the hormone is carried EVERYWHERE in the body — but it only has an effect on cells with the matching <KW>receptor proteins</KW> for that hormone. These receptors may be on the cell surface membrane or inside the cell. The shape of the receptor must be <Bold>complementary</Bold> to the hormone, just like an enzyme's active site matches a substrate; only target cells respond.
        </p>
        <p>
          Levels of hormones in the blood do not rise forever — the <Bold>liver</Bold> continuously breaks down or modifies excess hormone molecules, so that the response ends once the gland stops secreting. This is why hormonal effects, although longer-lasting than nerve impulses, are not permanent.
        </p>

        <SubH>Adrenaline — the "fight-or-flight" hormone</SubH>
        <p>
          When you are frightened, threatened or about to do something exciting, the brain sends a nervous signal to your adrenal glands, which release <KW>adrenaline</KW> into the bloodstream. This is an unusual example — the release is triggered by a nervous signal, but the messenger itself is chemical, so adrenaline is still classed as a hormone.
        </p>
        <p>Adrenaline prepares the body for vigorous physical action — running away from a threat or fighting it ("fight or flight"). It causes:</p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>↑ <Bold>Heart rate</Bold> — heart pumps harder and faster → more blood delivered per minute.</li>
          <li>↑ <Bold>Breathing rate and depth</Bold> → more oxygen taken in.</li>
          <li><Bold>Dilates pupils</Bold> → more light enters the eye → better vision.</li>
          <li>↑ <Bold>Blood glucose</Bold> <Ext/> — adrenaline causes the liver to break down stored glycogen into glucose, which is released into the blood. Combined with the higher rate of blood flow, this delivers more glucose AND more oxygen to muscle cells, which can respire faster and produce more ATP for muscle contraction.</li>
          <li>Diverts blood AWAY from gut and skin TOWARDS muscles.</li>
        </ul>
        <p>
          These effects can be felt as a racing heart, faster breathing, and the urge to move. They are the body's chemical preparation for crisis.
        </p>
      </Section>

      {/* SECTION 6: Endocrine vs nervous + homeostasis */}
      <Section n="6" title="Comparing Nervous &amp; Endocrine Systems">
        <p>
          Both systems coordinate the body, but they have very different properties — and using the right one for the right job is essential.
        </p>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 8 }}>
          <thead>
            <tr style={{ background: GL }}>
              <th style={{ padding: "8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Feature</th>
              <th style={{ padding: "8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Nervous system</th>
              <th style={{ padding: "8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Endocrine (hormonal) system</th>
            </tr>
          </thead>
          <tbody>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Signal type</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Electrical impulses</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Chemical hormones</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Transport</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Along nerves (neurones)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>In the blood plasma</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Speed of response</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Very fast (milliseconds to seconds)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Slower (seconds to days)</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Duration of response</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Short-lived</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Longer-lasting</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Area affected</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Specific cells / muscles / glands (localised)</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Widespread — many organs across the body</td></tr>
            <tr><td style={{ padding: "6px 10px", border: `1px solid ${BD}`, fontWeight: 700 }}>Example</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Knee-jerk reflex; pupil contraction</td><td style={{ padding: "6px 10px", border: `1px solid ${BD}` }}>Insulin lowering blood glucose; oestrogen in puberty</td></tr>
          </tbody>
        </table>
        <p style={{ marginTop: 8 }}>
          The two systems often work together — adrenaline is a classic example. The brain (nervous) signals the adrenal gland to release adrenaline (hormone), which then has effects all over the body for several minutes — a fast trigger with a longer-lasting effect.
        </p>
      </Section>

      {/* SECTION 7: Homeostasis EXT */}
      <Section n="7" title={<>Homeostasis — Keeping Things Constant <Ext/></>}>
        <p>
          Cells of the body can only work properly within narrow limits. If body temperature, blood glucose, water content, or pH drift too far, enzymes stop working and the cells start to die. <KW>Homeostasis</KW> is the process of keeping these conditions constant despite a changing environment.
        </p>
        <Def term="Homeostasis">The maintenance of a constant internal environment in the body.</Def>

        <SubH>Set points &amp; negative feedback</SubH>
        <p>
          For each controlled variable there is a <KW>set point</KW> — the value the body works to keep things close to. (Body temperature: 37 °C. Blood glucose: ~90 mg/100 cm³. Blood pH: 7.4.) Receptors continuously monitor the variable. If it drifts AWAY from the set point, a response is triggered that brings it BACK.
        </p>
        <NegativeFeedbackDiagram/>
        <p>
          Because the correction always OPPOSES the change (the response goes in the negative direction relative to the deviation), this is called <KW>negative feedback</KW>.
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>Variable rises ABOVE set point → response brings it DOWN.</li>
          <li>Variable falls BELOW set point → response brings it UP.</li>
        </ul>
        <p>
          You will see this pattern again and again — in blood glucose control, in temperature regulation, in water balance. Always look for: a SENSOR, a SET POINT, and a RESPONSE that opposes the change.
        </p>
      </Section>

      {/* SECTION 8: Blood glucose & diabetes EXT */}
      <Section n="8" title={<>Blood Glucose Control &amp; Diabetes <Ext/></>}>
        <p>
          The body needs a steady supply of glucose for respiration, but glucose levels in the blood can swing wildly with food intake and exercise. The pancreas keeps blood glucose within tight limits using two antagonistic hormones: <KW>insulin</KW> and <KW>glucagon</KW>.
        </p>
        <BloodGlucoseDiagram/>

        <SubH>When blood glucose RISES (e.g. after a meal)</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Carbohydrates are digested and glucose is absorbed into the blood from the small intestine.</li>
          <li>The PANCREAS detects the rise and releases <KW>insulin</KW> into the bloodstream.</li>
          <li>Insulin travels to the LIVER (and muscle cells) and causes them to take up glucose from the blood.</li>
          <li>The liver converts glucose into <KW c={AM}>glycogen</KW>, a polysaccharide stored in liver and muscle cells.</li>
          <li>Blood glucose FALLS back to the set point.</li>
        </ol>

        <SubH>When blood glucose FALLS (e.g. between meals or during exercise)</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>The PANCREAS detects the fall and releases <KW>glucagon</KW> into the bloodstream.</li>
          <li>Glucagon travels to the LIVER.</li>
          <li>The liver breaks GLYCOGEN back down into glucose.</li>
          <li>Glucose is released into the blood and blood glucose RISES back to the set point.</li>
        </ol>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>Glucagon vs glycogen — easy to confuse.</Bold> <Bold>Glucagon</Bold> is the HORMONE released by the pancreas to raise blood sugar. <Bold>Glycogen</Bold> is the carbohydrate STORE in the liver and muscle. Glucagon converts glycogen back into glucose.
        </div>

        <SubH>Type 1 diabetes</SubH>
        <p>
          In <KW>Type 1 diabetes</KW> the islet cells (β-cells) of the pancreas FAIL — usually because the body's own immune system mistakenly destroys them. Without insulin:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>Liver and muscle cells cannot take up glucose → glucose stays in the blood.</li>
          <li>Blood glucose can rise to dangerously high levels (<Bold>hyperglycaemia</Bold>).</li>
          <li>The kidneys cannot reabsorb all the glucose from the filtrate → glucose appears in the URINE (glucose in urine is a key diagnostic).</li>
          <li>Excess water is drawn out with the glucose → frequent urination → thirst (other classic symptoms).</li>
          <li>Cells starve of glucose → tiredness, weight loss.</li>
        </ul>
        <Practical title="Treatment of Type 1 diabetes">
          Patients self-inject INSULIN (typically before meals) to allow their cells to take up glucose. They also monitor blood glucose regularly using a finger-prick blood test or continuous glucose monitor, and control their diet (avoiding sudden sugar spikes). Insulin cannot be taken as a pill because it is a <Bold>protein</Bold> — the stomach and small intestine would digest it into amino acids before it could enter the blood intact.
        </Practical>
      </Section>

      {/* SECTION 9: Temperature regulation EXT */}
      <Section n="9" title={<>Temperature Regulation &amp; the Skin <Ext/></>}>
        <p>
          Humans are <Bold>endothermic</Bold> — we maintain a constant core temperature of about 37 °C regardless of the surroundings. This is essential because enzymes have an optimum temperature; even a 5 °C drop or rise can be dangerous.
        </p>

        <SubH>Structure of the skin</SubH>
        <SkinDiagram/>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Epidermis</Bold> — the thin outer layer. The outermost cells are dead and contain keratin, forming a waterproof barrier.</li>
          <li><Bold>Dermis</Bold> — the thicker living layer beneath. Contains <KW>hair follicles</KW>, <KW>sweat glands</KW>, <KW>sensory receptors</KW> (touch, pressure, pain, temperature) and a rich supply of <KW>capillaries</KW>.</li>
          <li><Bold>Hair erector muscles</Bold> — small muscles attached to each hair follicle. When they contract, the hair stands up.</li>
          <li><Bold>Sub-cutaneous fat</Bold> — a layer of fat tissue beneath the dermis. Acts as INSULATION and an energy store.</li>
        </ul>

        <SubH>When the body is too HOT</SubH>
        <ThermoregulationDiagram/>
        <p>
          Temperature receptors in the skin (and the <KW>thermoregulatory centre</KW> in the brain, which monitors blood temperature) detect that the body is too warm. The brain coordinates the response:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>VASODILATION</Bold> — the arterioles supplying skin capillaries WIDEN. More blood flows close to the surface. Heat is lost by RADIATION (and a little by conduction/convection) to the cooler air. The skin looks flushed/pink.</li>
          <li><Bold>Increased sweating</Bold> — sweat glands produce more sweat which spreads over the skin. As water evaporates from the skin, it takes <KW>latent heat</KW> from the body → cools it. The same principle a fan or wet towel uses.</li>
          <li><Bold>Hair erector muscles RELAX</Bold> → hairs lie flat → less air is trapped near the skin → less insulation → more heat lost. (In humans this effect is small because we have so little body hair — but it works well in furry mammals.)</li>
          <li>Behavioural: remove clothing, drink cool water, move to shade.</li>
        </ul>

        <SubH>When the body is too COLD</SubH>
        <p>
          When body temperature falls, the opposite responses are triggered:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>VASOCONSTRICTION</Bold> — the arterioles supplying skin capillaries NARROW. Less blood flows near the surface → less heat is lost. The skin looks pale.</li>
          <li><Bold>Sweat production decreases</Bold> → less heat lost by evaporation.</li>
          <li><Bold>Hair erector muscles CONTRACT</Bold> → hairs stand UP → trap a layer of insulating air close to the skin. In humans we feel this as "goosebumps".</li>
          <li><Bold>SHIVERING</Bold> — rapid involuntary contractions of skeletal muscles release HEAT from respiration. This is a powerful warming response.</li>
          <li>Behavioural: put on more clothes, curl up to reduce surface area, exercise.</li>
        </ul>
        <div style={{ background: RL, borderLeft: `3px solid ${RD}`, padding: "8px 12px", borderRadius: 4, margin: "8px 0", fontSize: 12 }}>
          ⚠️ <Bold>"Capillaries dilating" is wrong.</Bold> Capillaries cannot move or change diameter — they are passive tubes. What actually changes is the diameter of the <Bold>arterioles</Bold> feeding the capillaries. When the arterioles dilate, more blood flows through the skin capillaries (which themselves stayed put). Use VASODILATION and VASOCONSTRICTION, never "capillaries moving up and down".
        </div>
        <p>
          Behind the capillary network in the skin there are <KW>shunt vessels</KW> — direct connections between the arteriole and the venule that bypass the surface capillaries. When the body is cold, more blood is diverted through the shunt vessels (skipping the surface capillaries), keeping warmth deep inside the body. When the body is hot, more blood passes through the surface capillaries instead of the shunt vessels, helping it lose heat. The redirection is what vasoconstriction and vasodilation effectively achieve.
        </p>
      </Section>

      {/* SECTION 10: Tropisms */}
      <Section n="10" title="Tropisms in Plants">
        <p>
          Plants cannot move from place to place, but they CAN respond to their environment by growing in particular directions. These directional growth responses are called <KW>tropisms</KW>.
        </p>
        <Def term="Phototropism">A response in which parts of a plant grow towards or away from the direction from which light is coming.</Def>
        <Def term="Gravitropism">A response in which parts of a plant grow towards or away from gravity.</Def>
        <p>
          A response is described as <Bold>positive</Bold> if growth is TOWARDS the stimulus and <Bold>negative</Bold> if growth is AWAY from it.
        </p>
        <TropismsDiagram/>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Shoots</Bold> are usually POSITIVELY phototropic (grow towards light → maximise photosynthesis) and NEGATIVELY gravitropic (grow up, away from gravity).</li>
          <li><Bold>Roots</Bold> are POSITIVELY gravitropic (grow down, towards gravity → anchorage and access to water) and may be slightly negatively phototropic (grow away from light → towards moister soil).</li>
        </ul>

        <SubH>Why tropisms matter</SubH>
        <p>
          Tropisms allow a plant to settle into the best position for survival, even though it cannot uproot and walk. Phototropism puts leaves where they will catch the most light; gravitropism puts roots in soil for water and anchorage. Without these responses, a seed germinating randomly underground would have no way of getting its shoot up to the light.
        </p>
        <Practical title="Investigating phototropism with a clinostat">
          Three identical seedling pots are placed in light-proof boxes:
          <ul style={{ margin: "4px 0 4px 18px" }}>
            <li><Bold>Set-up A</Bold> — pot in box with a SINGLE slit cut on one side. Light enters from only one direction.</li>
            <li><Bold>Set-up B</Bold> — pot mounted on a <KW>clinostat</KW> (a slow-rotating turntable) inside the same kind of box. The pot spins slowly, so EVERY side of the seedling is exposed to the slit-light equally — the effect of one-sided light is cancelled out.</li>
            <li><Bold>Set-up C</Bold> — pot in complete darkness (no slit).</li>
          </ul>
          <Bold>Results after several days:</Bold>
          <ul style={{ margin: "4px 0 0 18px" }}>
            <li>A — shoots bend and grow towards the slit (positive phototropism).</li>
            <li>B — shoots grow STRAIGHT UP (no curving), because no side gets more light than another.</li>
            <li>C — shoots grow tall, spindly and pale (etiolated) as they "search" for light.</li>
          </ul>
          The clinostat in B is the control that shows it is specifically the DIRECTION of light, not just its presence, that causes the bending.
        </Practical>
        <Practical title="Investigating gravitropism">
          Lay damp cotton wool in two petri dishes, and place three bean seedlings in each pointing in different directions (radicle = root tip; plumule = shoot tip):
          <ul style={{ margin: "4px 0 4px 18px" }}>
            <li>Seedling A — radicle facing DOWN.</li>
            <li>Seedling B — radicle facing HORIZONTAL.</li>
            <li>Seedling C — radicle facing UP.</li>
          </ul>
          Cover both dishes, place one on its side and mount the other on a clinostat. Both go in a LIGHT-PROOF box (so any growth is due to gravity, not light). Leave for 2 days.
          <br/><br/>
          <Bold>Results:</Bold>
          <ul style={{ margin: "4px 0 0 18px" }}>
            <li>Static dish — ALL radicles end up pointing DOWN, ALL plumules end up pointing UP, regardless of original orientation. Roots are positively gravitropic; shoots are negatively gravitropic.</li>
            <li>Clinostat dish — seedlings continue growing in whatever direction they were placed. The constant rotation cancels gravity's net effect, so no curving occurs.</li>
          </ul>
        </Practical>
      </Section>

      {/* SECTION 11: Auxin EXT */}
      <Section n="11" title={<>Auxin — the Plant Hormone <Ext/></>}>
        <p>
          The control of tropisms is achieved by a plant hormone called <KW>auxin</KW> (also called IAA, indole-3-acetic acid). Like animal hormones, auxin is a chemical messenger — produced in one place, transported elsewhere, and producing an effect at the target.
        </p>
        <AuxinDiagram/>

        <SubH>Three key facts about auxin</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Auxin is produced in the <Bold>TIP</Bold> of a growing shoot (and of a root).</li>
          <li>Auxin moves DOWN from the tip into the zone behind the tip where cells are growing — the <KW>meristem</KW>, the region just behind the tip where new cells divide and elongate. Only the meristem (not mature tissue further down) can respond to auxin by elongating.</li>
          <li>In shoots, auxin causes cells to <Bold>elongate</Bold> (grow longer). In roots, auxin actually <Bold>inhibits</Bold> elongation. This OPPOSITE effect in roots and shoots is crucial for explaining why they respond differently to the same stimulus.</li>
        </ol>
        <p>
          A crucial distinction in Cambridge answers: auxin causes <Bold>cell elongation</Bold>, NOT cell division. Existing cells get longer; no new cells are added. Saying "auxin causes more cells to be made" is wrong and loses marks.
        </p>

        <SubH>How auxin produces phototropism in a shoot</SubH>
        <ol style={{ margin: "4px 0 8px 18px" }}>
          <li>Light comes from one side. The shoot tip detects the direction.</li>
          <li>Auxin produced in the tip migrates from the lit side to the <KW>shaded side</KW>.</li>
          <li>On the shaded side, the higher auxin concentration speeds up cell elongation.</li>
          <li>Cells on the shaded side become longer than those on the lit side → the shoot BENDS TOWARDS the light (positive phototropism).</li>
        </ol>
        <p>Classic experiments (Boysen-Jensen, Went, etc.) showed that:</p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>A shoot with its TIP REMOVED does not bend (no auxin produced).</li>
          <li>A shoot with its tip CAPPED with opaque foil does not bend in side-light (tip can't detect light direction).</li>
          <li>A shoot with a transparent cap or a glass slide separating tip and stem DOES still bend (auxin still moves through).</li>
        </ul>

        <SubH>Three-seedling auxin experiment</SubH>
        <p>
          A classic exam-style set-up uses three seedlings in a light-tight box with a slit on one side:
        </p>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, marginTop: 6 }}>
          <thead>
            <tr style={{ background: GL }}>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Treatment</th>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Auxin distribution</th>
              <th style={{ padding: "6px 8px", color: G, fontWeight: 700, border: `1px solid ${G}`, textAlign: "left" }}>Result</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}><Bold>A:</Bold> tip cut off; side-lit</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>No auxin produced at all</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>No elongation; stem does not grow</td>
            </tr>
            <tr>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}><Bold>B:</Bold> tip covered with opaque cap; side-lit</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Equal on both sides (tip can't sense light)</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Stem grows STRAIGHT UP — no bending</td>
            </tr>
            <tr>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}><Bold>C:</Bold> intact tip; side-lit</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>More auxin on the shaded side</td>
              <td style={{ padding: "5px 8px", border: `1px solid ${BD}` }}>Shaded side cells elongate more → stem BENDS towards light</td>
            </tr>
          </tbody>
        </table>
        <p style={{ marginTop: 8 }}>
          Reading these three results together is the standard exam evidence chain: A shows auxin is needed for growth; B shows the TIP is needed to sense light direction; C shows the response is caused by an UNEVEN distribution of auxin produced in the tip.
        </p>

        <SubH>How auxin produces gravitropism</SubH>
        <p>
          When a seedling is placed on its side, gravity causes auxin to accumulate on the LOWER side of both the shoot and the root.
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li>In the SHOOT — auxin stimulates elongation, so the lower side grows faster than the upper side → shoot bends UPWARDS (away from gravity = negative gravitropism).</li>
          <li>In the ROOT — auxin INHIBITS elongation, so the lower side grows more SLOWLY than the upper side → root bends DOWNWARDS (towards gravity = positive gravitropism).</li>
        </ul>

        <SubH>Synthetic auxins as weedkillers</SubH>
        <p>
          Synthetic versions of auxin (such as <KW>2,4-dichlorophenoxyacetic acid (2,4-D)</KW>) can be sprayed on fields as <Bold>selective herbicides</Bold>. At the high concentrations used, auxin overstimulates growth, causing the plant to grow itself to death. Crucially:
        </p>
        <ul style={{ margin: "4px 0 8px 18px" }}>
          <li><Bold>Broad-leaved</Bold> weeds (dicots — daisies, dandelions, thistles) absorb a LOT of the spray because their wide flat leaves catch it.</li>
          <li><Bold>Narrow-leaved</Bold> crops like wheat, barley and grasses (monocots) absorb much less because their leaves are upright and narrow.</li>
        </ul>
        <p>
          Result: weeds receive a lethal dose while the crop barely notices — a selective herbicide that increases crop yields. Widely used in cereal agriculture worldwide.
        </p>
      </Section>
    </div>
  );
}
