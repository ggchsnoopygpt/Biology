<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════

const CHAPTER_META = {
  number: 4,

};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters

const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },

  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];
// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.4
// ════════════════════════════════════════════════════════════════════════════

// ── Polymer concept: monomers chain together ──────────────────────────────
function PolymerConcept() {
  return (
    <svg viewBox="0 0 700 240" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="240" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Polymer = chain of repeating monomers (sub-units)
      </text>

      {/* Monomers (left) */}
      <text x="120" y="60" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>Monomers (sub-units)</text>
      {[0,1,2,3].map(i => (
        <g key={i}>
          <circle cx={60 + i*40} cy="90" r="14" fill="#fff" stroke={G} strokeWidth="2"/>
          <text x={60 + i*40} y="94" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>•</text>
        </g>
      ))}

      {/* Arrow */}
      <path d="M250 90 L320 90" stroke={G} strokeWidth="2.5" markerEnd="url(#pmArr)"/>
      <text x="285" y="80" textAnchor="middle" fontSize="11" fontWeight="700" fill={G}>join</text>
      <text x="285" y="105" textAnchor="middle" fontSize="9" fill="#666">(many bonds)</text>

      {/* Polymer (right) */}
      <text x="500" y="60" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>Polymer (large molecule)</text>
      {[0,1,2,3,4,5,6].map(i => (
        <g key={i}>
          <circle cx={360 + i*32} cy="90" r="11" fill={GL} stroke={G} strokeWidth="1.5"/>
          {i < 6 && <line x1={371 + i*32} y1="90" x2={381 + i*32} y2="90" stroke={G} strokeWidth="2"/>}
        </g>
      ))}

      {/* Examples table */}
      <rect x="30" y="135" width="640" height="90" rx="6" fill="#fff" stroke={G} strokeWidth="1"/>
      <text x="350" y="155" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>Examples in living things</text>

      <text x="100" y="180" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>Carbohydrate</text>
      <text x="100" y="197" textAnchor="middle" fontSize="10" fill="#555">glucose → starch</text>
      <text x="100" y="212" textAnchor="middle" fontSize="10" fill="#555">glucose → cellulose</text>

      <text x="280" y="180" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>Protein</text>
      <text x="280" y="197" textAnchor="middle" fontSize="10" fill="#555">amino acids → protein</text>
      <text x="280" y="212" textAnchor="middle" fontSize="10" fill="#555">(haemoglobin, enzymes)</text>

      <text x="460" y="180" textAnchor="middle" fontSize="11" fontWeight="700" fill={GR}>Fat (NOT a polymer)</text>
      <text x="460" y="197" textAnchor="middle" fontSize="10" fill="#555">3 fatty acids + glycerol</text>
      <text x="460" y="212" textAnchor="middle" fontSize="10" fill="#555">(only 4 sub-units)</text>

      <text x="610" y="180" textAnchor="middle" fontSize="11" fontWeight="700" fill={PU}>DNA<tspan dx="3" fontSize="8" fill={PU}>EXT</tspan></text>
      <text x="610" y="197" textAnchor="middle" fontSize="10" fill="#555">nucleotides →</text>
      <text x="610" y="212" textAnchor="middle" fontSize="10" fill="#555">two strands</text>

      <defs>
        <marker id="pmArr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <polygon points="0 0, 8 4, 0 8" fill={G}/>
        </marker>
      </defs>
    </svg>
  );
}

// ── Glucose ring + maltose formation ──────────────────────────────────────
function GlucoseAndMaltose() {
  return (
    <svg viewBox="0 0 700 280" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="280" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="700" fill={G}>
        Glucose (monosaccharide) → Maltose (disaccharide)
      </text>

      {/* Single glucose: hexagon */}
      <text x="130" y="60" textAnchor="middle" fontSize="12" fontWeight="700" fill={G}>Glucose monomer</text>
      <polygon points="80,90 130,72 180,90 180,140 130,158 80,140" fill="#fff" stroke={G} strokeWidth="2.5"/>
      <text x="130" y="120" textAnchor="middle" fontSize="14" fontWeight="700" fill={G}>C₆H₁₂O₆</text>
      <text x="130" y="180" textAnchor="middle" fontSize="10" fill="#666">single 6-carbon ring</text>
      <text x="130" y="195" textAnchor="middle" fontSize="10" fill="#666">soluble in water</text>

      {/* Plus */}
      <text x="225" y="125" textAnchor="middle" fontSize="22" fontWeight="700" fill={G}>+</text>

      {/* Second glucose */}
      <polygon points="250,90 300,72 350,90 350,140 300,158 250,140" fill="#fff" stroke={G} strokeWidth="2.5"/>
      <text x="300" y="120" textAnchor="middle" fontSize="14" fontWeight="700" fill={G}>C₆H₁₂O₆</text>

      {/* Arrow with enzyme */}
      <path d="M380 115 L450 115" stroke={G} strokeWidth="2.5" markerEnd="url(#gmArr)"/>
      <text x="415" y="105" textAnchor="middle" fontSize="10" fontStyle="italic" fill={G}>enzyme</text>
      <text x="415" y="130" textAnchor="middle" fontSize="9" fill="#666">+ removes H₂O</text>

      {/* Maltose: two joined hexagons */}
      <polygon points="475,90 510,72 545,90 545,140 510,158 475,140" fill={GL} stroke={G} strokeWidth="2.5"/>
      <line x1="545" y1="115" x2="565" y2="115" stroke={G} strokeWidth="2.5"/>

          {/* Right sugar */}

      <text x="495" y="92" textAnchor="middle" fontSize="13" fontWeight="700" fill={PU}>Base-pairing rule</text>
      <text x="495" y="115" textAnchor="middle" fontSize="14" fontWeight="700" fill={GR}>A pairs with T</text>
      <text x="495" y="138" textAnchor="middle" fontSize="14" fontWeight="700" fill={GR}>C pairs with G</text>
      <text x="495" y="165" textAnchor="middle" fontSize="11" fill="#555">Same shape &amp; size → fits in helix without distortion</text>
      <text x="495" y="183" textAnchor="middle" fontSize="11" fill="#555">⇒ number of A = number of T,  number of C = number of G</text>

      {/* RIGHT: helix visual */}

      {/* Twisted ladder using sine curves */}
      {[0,1,2,3,4,5,6].map(i => {
        const y = 240 + i*15;
        const offset = Math.sin(i * 0.9) * 35;

          </g>
        );
      })}
      <text x="495" y="355" textAnchor="middle" fontSize="9" fill={GR}>Like a twisted rope ladder; bases = rungs</text>
    </svg>
  );
}

                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {s.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Difficulty filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>DIFFICULTY</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {diffs.map(d => {
            const count = qs.filter(q => d.id === "all" || q.diff === d.id).length;
            return (
              <button key={d.id} onClick={() => setDiff(d.id)}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: diff === d.id ? `2px solid ${d.color}` : `1.5px solid ${BD}`,
                  background: diff === d.id ? d.color : "#fff",
                  color: diff === d.id ? "#fff" : d.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {d.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Topic filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>TOPIC</div>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {topics.map(t => {
            const count = qs.filter(q => t.id === "all" || q.topic === t.id).length;
            return (
              <button key={t.id} onClick={() => setTopic(t.id)}
                style={{
                  padding: "5px 10px", borderRadius: 14,
                  border: topic === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
                  background: topic === t.id ? t.color : "#fff",
                  color: topic === t.id ? "#fff" : t.color,
                  fontSize: 10.5, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {t.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        background: RL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: RD, flexWrap: "wrap", gap: 8 }}>
        <div>
          <Bold>{filtered.length}</Bold> question{filtered.length !== 1 ? "s" : ""} ·
          <Bold> /{totalMarks} marks total</Bold> ·
          <span style={{ color: "#666" }}> {revealedCount} revealed</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setRev({})} style={{
            padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
            border: `1.5px solid ${RD}`, background: "#fff", color: RD,
          }}>Hide all</button>
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "30px 20px", color: "#999", fontSize: 13, background: "#f8f8f6", borderRadius: 10 }}>
          No questions match the selected filters. Try a different combination.
        </div>
      )}

      {/* Question cards */}
      {filtered.map(q => {
        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 3, padding: "2px 7px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{q.diff.toUpperCase()}</span>
                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.src && (
                    <span title={q.src === "SME" ? "Save My Exams official question" : "NLCS supplementary question"}
                      style={{ background: q.src === "SME" ? TL : "#7a6a40", color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                      {q.src === "SME" ? "SME" : "SUPPL"}
                    </span>
                  )}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500 }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note for adding more */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

// ③ SUMMARY TAB

function SummaryTab() {
  const [open, setOpen] = useState({ s1: true, s2: false, s3: false, s4: false, s5: false, s6: false, s7: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${PU}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>

      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#3a2a6a" }}>
        <strong>1st-stage summary</strong> — Chapter 4 condensed into key concepts, diagrams, and comparison tables. Use after reading <Bold>④ Textbook</Bold> in detail.
      </div>

      <Sec id="s1" title="① The Three Main Biological Molecules — Big Picture">
        <p style={{ fontSize: 13, color: GR, lineHeight: 1.7, marginBottom: 10 }}>
          All living things are built mainly from three families of molecules: <KW c={PU}>carbohydrates</KW>, <KW c={PU}>fats (lipids)</KW> and <KW c={PU}>proteins</KW>. Many of these are built from smaller, repeated sub-units (monomers) joined into long chains (polymers). DNA is a fourth crucial molecule — covered separately at <Ext/>.
        </p>
        <PolymerConcept />
        <NutrientElementsTable />
      </Sec>

      <Sec id="s2" title="② Carbohydrates — Sugars and their Polymers">
        <GlucoseAndMaltose />
        <PolysaccharideTypes />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Three levels of carbohydrate:</strong>
          <Bold>Monosaccharide</Bold> — single sugar unit (e.g. <KW c={PU}>glucose</KW>, fructose). Soluble. Formula C₆H₁₂O₆.<br/>
          <Bold>Disaccharide</Bold> — two sugar units joined (e.g. <KW c={PU}>maltose</KW>, sucrose). Soluble. Formula C₁₂H₂₂O₁₁.<br/>
          <Bold>Polysaccharide</Bold> — many sugar units joined (e.g. <KW c={PU}>starch, glycogen, cellulose</KW>). Insoluble.
        </div>

        <div style={{ marginTop: 12, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Memory hook for storage:</Bold> insoluble = good. If glucose were stored as glucose, it would dissolve in cells and pull water in by osmosis (cell swells). Locking it up as starch (plants) or glycogen (animals) avoids this — and they can be quickly broken back to glucose when energy is needed.
        </div>
      </Sec>

      <Sec id="s3" title="③ Fats and Oils — Glycerol + Fatty Acids">
        <FatMoleculeDiagram />
        <FatVsCarbStorage />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Definition:</strong>
          A fat (or oil) molecule is built from <KW>1 glycerol</KW> + <KW>3 fatty acids</KW>. Fats and oils are not polymers — they have just <Bold>4</Bold> sub-units in total. The difference between fat and oil is just temperature: oils are liquid, fats are solid at room temperature.
        </div>

        <div style={{ marginTop: 12, fontSize: 12.5, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Why fats are special:</strong>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Energy density: ~38 kJ/g — twice as much as carbs (~17 kJ/g) → best LONG-TERM energy store</li>
            <li>Insoluble in water → does not affect cell water balance</li>
            <li>Forms part of all <Bold>cell membranes</Bold> (and the membranes of organelles like the nuclear membrane and mitochondria)</li>
            <li>Insulates the body (under-skin fat layer) and physically protects organs</li>
          </ul>
        </div>
      </Sec>

      <Sec id="s4" title="④ Proteins — Chains of Amino Acids">
        <ProteinChainDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Definition:</strong>
          A protein is a polymer made from a <KW c={PU}>chain of amino acids</KW> linked by chemical bonds. There are about <KW>20</KW> different amino acids, and each protein has its own <Bold>specific sequence</Bold> of amino acids.
        </div>

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Functions of proteins (high-yield exam answers)</strong>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Type of protein</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Example</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Function</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Structural",       "keratin · collagen · cell membrane proteins", "make hair, skin, ligaments and parts of cell membranes / chromosomes"],
                ["Enzymes",          "amylase · lipase · catalase",                  "speed up reactions in digestion, respiration, etc. (Chapter 5)"],
                ["Transport",        "haemoglobin",                                  "carries oxygen in red blood cells"],
                ["Hormones",         "insulin",                                      "lowers blood-glucose level after a meal"],
                ["Antibodies",       "immunoglobulin (IgG)",                         "bind to pathogens to mark them for destruction by white blood cells"],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? PL : "#fff" }}>
                  {row.map((c, j) => (
                    <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? PU : GR }}>{c}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 12, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Why so many proteins?</Bold> 20 amino acids × any sequence × any length = a virtually infinite number of possible proteins. Polysaccharides like starch are limited because they are made from only ONE type of sugar.
        </div>

        <div style={{ marginTop: 14, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Inside one amino acid:</strong>
          Every amino acid has the same four parts attached to a central carbon — an <KW c={PU}>amino group (NH₂)</KW>, a <KW c={PU}>carboxyl group (COOH)</KW>, a <Bold>hydrogen atom</Bold>, and a <KW>variable R group</KW> (the "side chain"). The <Bold>R group is what makes each of the 20 amino acids different</Bold>.
        </div>
        <AminoAcidStructure />
      </Sec>

      <Sec id="s5" title="⑤ DNA Structure (EXT)">
        <DnaNucleotide />
        <DnaDoubleHelix />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.7 }}>
          <strong style={{ color: PU, display: "block", marginBottom: 4 }}>Definition (EXT):</strong>
          DNA is made of two long strands of <KW c={PU}>nucleotides</KW> twisted into a <KW c={PU}>double helix</KW>. Each nucleotide = <Bold>phosphate</Bold> + <Bold>deoxyribose sugar</Bold> + <Bold>one organic base</Bold> (A, T, C or G). The two strands are held together by <KW c={PU}>hydrogen bonds</KW> between the paired bases: <KW>A pairs with T</KW>, and <KW>C pairs with G</KW>.
        </div>

        <div style={{ marginTop: 10, fontSize: 12.5, color: GR, lineHeight: 1.7, background: "#f5f3fa", padding: "8px 12px", borderRadius: 6, border: `1px solid ${PU}` }}>
          <Bold>Backbone analogy:</Bold> the alternating <KW c={PU}>phosphate–sugar</KW> units form the two <Bold>sides</Bold> of a twisted ladder, and the <KW c={PU}>base pairs</KW> form the <Bold>rungs</Bold> between them.
        </div>

        <div style={{ marginTop: 12, background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#3a2a6a", lineHeight: 1.7 }}>
          <Bold>Examiner's tip:</Bold> for IGCSE you only need to use the LETTERS A, T, C, G — not the full names (adenine, thymine, cytosine, guanine). Always make A pair with T and C pair with G — losing this is the easiest exam mark in the chapter to drop.
        </div>
      </Sec>

      <Sec id="s6" title="⑥ Food Tests — The Five You Must Know">
        <FoodTestSummary />

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <strong style={{ color: PU, fontSize: 13, display: "block", marginBottom: 6 }}>Quick-recall colour-change table</strong>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: PU, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Nutrient</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Reagent</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Heat?</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Positive result</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Starch",         "iodine solution",                "No",  "blue-black"],
                ["Reducing sugar", "Benedict's solution",            "YES", "brick-red precipitate"],
                ["Protein",        "biuret (NaOH + CuSO₄)",          "No",  "purple / violet"],
                ["Fat / oil",      "ethanol then add to water",      "No",  "milky-white emulsion"],
                ["Vitamin C",      "DCPIP (blue dye)",               "No",  "decolourises (blue → colourless)"],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? PL : "#fff" }}>
                  {row.map((c, j) => (
                    <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? PU : GR }}>{c}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 12, overflowX: "auto" }}>
          <strong style={{ color: TL, fontSize: 13, display: "block", marginBottom: 6 }}>📐 Precise volumes &amp; conditions (SME-detail)</strong>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11, color: GR }}>
            <thead>
              <tr style={{ background: TL, color: "#fff" }}>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Test</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Reagent volume</th>
                <th style={{ padding: "6px 8px", textAlign: "left" }}>Conditions</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Benedict's (reducing sugar)", "a few cm³ of Benedict's into the sample",        "water bath at ~80 °C for ~5 min"],
                ["Iodine (starch)",             "a few drops of iodine solution onto sample",      "room temperature, no heat"],
                ["Biuret (protein)",            "a few drops of biuret reagent",                   "room temperature, no heat"],
                ["Ethanol (fat / lipid)",       "~2 cm³ ethanol + equal volume of cold water",     "shake, no flame (ethanol is flammable)"],
                ["DCPIP (vitamin C)",           "~1 cm³ of blue DCPIP solution",                   "add food drop-by-drop until decolourised"],
              ].map((row, i) => (
                <tr key={i} style={{ background: i % 2 ? TLL : "#fff" }}>
                  {row.map((c, j) => (
                    <td key={j} style={{ padding: "6px 8px", borderBottom: `1px solid ${BD}`, fontWeight: j === 0 ? 700 : 400, color: j === 0 ? TL : GR }}>{c}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 12, background: RL, border: `1px solid ${RD}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a0000", lineHeight: 1.7 }}>
          <Bold>Safety reminders:</Bold> wear eye protection always. Sodium hydroxide (biuret) is corrosive. Ethanol (fat test) is highly flammable — never use a Bunsen flame, only a hot-water bath. Iodine and DCPIP stain skin and clothes. Heated tubes (Benedict's) — point AWAY from face.
        </div>

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME Examiner Tip:</Bold> when describing a food test in an exam answer, ALWAYS state the <Bold>starting colour</Bold> of the reagent AND the <Bold>colour after a positive result</Bold>. e.g. &quot;blue → brick-red precipitate&quot; not just &quot;red&quot;. Each colour is worth a separate mark.
        </div>
      </Sec>

      <Sec id="s7" title="⑦ Synthesis &amp; Conversion in Cells (Going Further)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.7 }}>
          Cells can build (synthesise) and break down their proteins, fats and carbohydrates — and they can convert one type into another (with limits).
          <ul style={{ marginTop: 8, paddingLeft: 18 }}>
            <li><Bold>All cells</Bold>: build proteins from amino acids · build fats from glycerol + fatty acids</li>
            <li><Bold>Animal cells</Bold>: change carbs ↔ fats · break protein down into carbs · CANNOT make protein without amino acids in the diet</li>
            <li><Bold>Plant cells</Bold>: synthesise starch and cellulose from glucose · build their OWN amino acids using sugars + mineral ions (especially nitrate ions for the N atom)</li>
            <li><Bold>Green plant cells</Bold>: even make glucose from CO₂ + water using sunlight (photosynthesis — Chapter 6)</li>
          </ul>
        </div>

        <div style={{ marginTop: 12, background: AL, border: `1px solid ${AM}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#5a3a00", lineHeight: 1.7 }}>
          <Bold>Why this matters in nutrition:</Bold> humans must eat protein because we cannot synthesise amino acids from carbs or fats. Lack of protein in the diet (e.g. kwashiorkor) causes growth failure and tissue wasting — explored further in Chapter 7 (Human nutrition).
        </div>
      </Sec>
    </div>
  );
}

function TextbookTab() {
  const [open, setOpen] = useState({ t1: true, t2: false, t3: false, t4: false, t5: false, t6: false, t7: false, t8: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${G}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? G : GL, color: open[id] ? "#fff" : G, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Hodder Cambridge IGCSE Biology — Chapter 4: Biological Molecules</strong>. Full reference notes paraphrased from the textbook, organised for lookup. Use sections ① and ③ for revision; come here for detail when you don't know something.
      </div>

      <Sec id="t1" title="① Introduction — Why Living Things Need Biological Molecules">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Living organisms need to take in and use a variety of chemical substances to grow, repair themselves and release energy for life processes. These substances enter and leave cells by the transport processes of the previous chapter (diffusion, osmosis, active transport).</p>

          <p>The element <KW>carbon</KW> is found in EVERY biological molecule. Carbon atoms can join up into long chains or rings, so biological molecules can be very large. Many of these large molecules are built from repeating sub-units (called <KW>monomers</KW>) joined into long chains called <KW>polymers</KW> ('poly' = many).</p>

          <p>The key elements involved are:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Carbon (C)</Bold> — present in all biological molecules</li>
            <li><Bold>Hydrogen (H)</Bold> — present in all biological molecules</li>
            <li><Bold>Oxygen (O)</Bold> — present in all biological molecules</li>
            <li><Bold>Nitrogen (N)</Bold> — present in proteins (and DNA)</li>
            <li><Bold>Sulfur (S) / Phosphorus (P)</Bold> — sometimes present in proteins; phosphorus also in DNA</li>
          </ul>

          <p>Three main families of biological molecule are studied in this chapter: <KW>carbohydrates</KW>, <KW>fats / oils</KW> and <KW>proteins</KW>. A fourth (<KW c={PU}>DNA</KW>) is studied at Extended tier <Ext/>.</p>
        </div>
        <PolymerConcept />
      </Sec>

      <Sec id="t2" title="② Carbohydrates — Sugars and their Polymers">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Carbohydrates may be simple, soluble sugars or complicated insoluble materials like starch and cellulose. All carbohydrates contain only <KW>carbon, hydrogen and oxygen</KW>. A common simple sugar is <KW>glucose</KW>, with chemical formula <Bold>C₆H₁₂O₆</Bold>. The glucose molecule is usually drawn as a hexagonal ring shape.</p>

          <p>Sugars with a single carbon ring are called <KW>monosaccharides</KW> (e.g. glucose, fructose). Two glucose molecules joined together form one molecule of <KW>maltose</KW>, with formula <Bold>C₁₂H₂₂O₁₁</Bold>; this happens during digestion in reverse, releasing one molecule of water (H₂O). Sugars with two carbon rings are called <KW>disaccharides</KW> (e.g. maltose, sucrose). Both monosaccharides and disaccharides dissolve readily in water.</p>
        </div>
        <GlucoseAndMaltose />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p style={{ marginTop: 12 }}>When many sugar units join together (sometimes hundreds, sometimes thousands), the result is a giant molecule called a <KW>polysaccharide</KW>. The three most important polysaccharides are:</p>

          <ul style={{ paddingLeft: 18 }}>
            <li><Bold>Glycogen</Bold> — found in animal cells; a highly branched polymer of glucose used as a short-term energy store (especially in liver and muscle).</li>
            <li><Bold>Starch</Bold> — made of hundreds of glucose molecules; the main long-term storage substance in plant cells (potato tubers, seeds, chloroplasts).</li>
            <li><Bold>Cellulose</Bold> — even longer chains of glucose. The chains lie alongside each other and are bundled together to form microscopic <KW>fibres</KW>; layers of these fibres make up the cell wall in plant cells, providing strength.</li>
          </ul>

          <p>All three polysaccharides are <Bold>insoluble in water</Bold> — perfect for storage (no osmotic problems) or for structural use (cellulose).</p>
        </div>
        <PolysaccharideTypes />
      </Sec>

      <Sec id="t3" title="③ Fats and Oils — Lipids">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Fats are a solid form of a group of molecules called <KW>lipids</KW>. When liquid at room temperature these same molecules are called <KW>oils</KW>. Fats and oils contain only <KW>carbon, hydrogen and oxygen</KW>, but the proportion of oxygen is lower than in carbohydrates.</p>

          <p>One molecule of fat (or oil) is built from <KW>three fatty acid molecules</KW> joined to <KW>one molecule of glycerol</KW>. Note that fats are NOT polymers — they only have 4 sub-units in total (1 glycerol + 3 fatty acids).</p>
        </div>
        <FatMoleculeDiagram />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> the proper biological name for this molecule (one glycerol + three fatty acids) is a <KW c={TL}>triglyceride</KW>. Most fats and oils in the body are triglycerides. The fatty acid tails can vary in length and structure, which is what makes different fats and oils slightly different (e.g. solid vs liquid at room temperature).
        </div>

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p style={{ marginTop: 12 }}><Bold>Roles of fats in living organisms:</Bold></p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Fats and oils form part of every cell membrane and the internal membranes of organelles (e.g. nuclear membrane, mitochondrial membranes)</li>
            <li>Droplets of fat or oil stored in the cytoplasm form a long-term <Bold>energy store</Bold> (around 38 kJ/g — over twice as much energy per gram as carbohydrate)</li>
            <li>Under-skin fat layer provides <Bold>insulation</Bold> against heat loss</li>
            <li>Fat around organs provides <Bold>physical protection</Bold></li>
          </ul>
        </div>
        <FatVsCarbStorage />
      </Sec>

      <Sec id="t4" title="④ Proteins — Amino Acid Chains">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Some proteins are part of cell <Bold>structures</Bold> — for example the cell membrane, mitochondria, ribosomes and chromosomes. Another important group of proteins are the <KW>enzymes</KW> (Chapter 5), which are present in membranes, mitochondria, vacuoles and the fluid part of the cytoplasm. Enzymes control the chemical reactions that keep the cell alive.</p>

          <p>Although there are many different types of protein, all of them contain <KW>carbon, hydrogen, oxygen and nitrogen</KW>; many also contain <Bold>sulfur</Bold> (and DNA-associated proteins also contain phosphorus). Their molecules are made up of long chains of simpler chemicals called <KW>amino acids</KW>.</p>

          <p>There are about <Bold>20 different amino acids</Bold> in animal proteins (examples include alanine, leucine, valine, glutamine, cysteine, glycine and lysine). A small protein molecule may consist of a chain of a hundred or more amino acids — for example glycine–valine–valine–cysteine–leucine–glutamine–… Each type of protein has its amino acids arranged in a specific <KW>sequence</KW>; this sequence determines what protein it becomes.</p>
        </div>
        <ProteinChainDiagram />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p style={{ margin: 0 }}><Bold>What does an amino acid look like?</Bold> Every amino acid has the same four parts attached to a central carbon atom: an <KW>amino group (NH₂)</KW>, a <KW>carboxyl group (COOH)</KW>, a <Bold>hydrogen atom</Bold>, and a variable <KW>R group</KW> (also called the side chain). The R group is the only part that differs between the 20 amino acids — and it determines the chemistry of each one.</p>
        </div>
        <AminoAcidStructure />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> when amino acids join into a short chain it is called a <KW c={TL}>peptide</KW>; longer chains form <KW c={TL}>proteins</KW>. The amino acids can be arranged in any order in the chain — even a small change in order produces a completely different protein with a different function. This is why the human body can make hundreds of thousands of distinct proteins from just ~20 building blocks.
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Synthesis &amp; Conversion in Cells (Going Further)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Cells can build up (synthesise) or break down their proteins, fats and carbohydrates, and they can change one type of molecule into another. For example:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Animal cells synthesise <Bold>glycogen</Bold> from glucose by joining glucose molecules together</li>
            <li>Plant cells synthesise <Bold>starch</Bold> and <Bold>cellulose</Bold> from glucose</li>
            <li>All cells can make <Bold>proteins</Bold> from amino acids</li>
            <li>All cells can build up <Bold>fats</Bold> from glycerol and fatty acids</li>
            <li>Animal cells can convert carbohydrates ↔ fats and protein → carbohydrate, but they CANNOT make proteins unless they are supplied with amino acids in the diet</li>
            <li>Plant cells can make their own <Bold>amino acids</Bold> using sugars (carbon backbone) and <Bold>mineral ions from the soil</Bold>, especially nitrate ions (NO₃⁻) which provide the nitrogen atom</li>
            <li>Green plant cells can even make <Bold>glucose</Bold> from CO₂ and water using sunlight (photosynthesis — Chapter 6)</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t6" title="⑥ DNA Structure (EXT)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>A DNA molecule is made up of long chains of <KW c={PU}>nucleotides</KW>, formed into two strands. A nucleotide is a 5-carbon sugar molecule (deoxyribose) joined to a phosphate group (–PO₃) and an organic <KW c={PU}>base</KW>. In DNA the sugar is <Bold>deoxyribose</Bold> and the organic base is one of <KW c={PU}>A (adenine)</KW>, <KW c={PU}>T (thymine)</KW>, <KW c={PU}>C (cytosine)</KW> or <KW c={PU}>G (guanine)</KW>.</p>
          <p style={{ background: PL, padding: "8px 12px", borderRadius: 6, fontSize: 12 }}><Bold>Note (exam):</Bold> for IGCSE you only need to be able to STATE THE LETTERS A, T, C and G — not the full names of the bases.</p>
        </div>
        <DnaNucleotide />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The nucleotides are joined by their phosphate groups to make a long chain, often thousands of nucleotides long. The phosphate and sugar molecules are the same all the way down the chain (this is called the <Bold>sugar–phosphate backbone</Bold>); only the bases vary.</p>

          <p>The DNA in a chromosome is made of two strands held together by chemical bonds between the bases. The sizes of the molecules ensure that:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li><KW c={PU}>A always pairs with T</KW></li>
            <li><KW c={PU}>C always pairs with G</KW></li>
          </ul>
          <p>The double strand is twisted into a <KW c={PU}>helix</KW>, like a twisted rope ladder, with the base pairs forming the rungs.</p>

          <p style={{ background: PL, padding: "8px 12px", borderRadius: 6, fontSize: 12, marginTop: 8 }}><Bold>Chargaff's rule:</Bold> in any DNA sample, the amount of A always equals the amount of T, and the amount of C always equals the amount of G — a direct consequence of the pairing rules. This rule provided crucial evidence for the double-helix structure deduced by Watson, Crick, Wilkins and Franklin in the early 1950s.</p>
        </div>
        <DnaDoubleHelix />

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail:</Bold> the chemical bonds that hold the two strands together (between the paired bases) are <KW c={TL}>hydrogen bonds</KW>. State this term explicitly for full marks at Extended tier. The <KW c={TL}>sugar–phosphate backbone</KW> forms the two sides of the &quot;ladder&quot;; the base pairs (A–T, C–G) form the &quot;rungs&quot;.
        </div>

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME Examiner Tip:</Bold> you do NOT need to learn the full names of the bases — only the LETTERS A, T, C and G. The most commonly asked DNA question is &quot;which base pairs with which?&quot; — make sure you can write A↔T and C↔G without thinking.
        </div>
      </Sec>

      <Sec id="t7" title="⑦ Practical Work — Food Tests">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>General safety:</Bold> wear eye protection at all times. Take care with iodine (stains skin/clothes) and with hot water in water-baths. Sodium hydroxide (biuret) is an irritant. DCPIP stains skin/clothes. Ethanol (fat test) is HIGHLY FLAMMABLE — never use near a naked flame.</p>

          <p style={{ marginTop: 10 }}><Bold>1) Test for STARCH:</Bold> shake a small amount of starch powder (or food sample) in a test tube with some warm water to make a suspension. Add 3–4 drops of <KW>iodine solution</KW>. A <KW>blue-black</KW> colour indicates starch is present. (Note: there is a slightly different method for testing leaves for starch — covered in Chapter 6.)</p>

          <p style={{ marginTop: 10 }}><Bold>2) Test for REDUCING SUGAR:</Bold> heat 2 cm³ of glucose (or food) solution with an equal volume of <KW>Benedict's solution</KW> in a test tube. Place the tube in a beaker of boiling water (water-bath). The solution will change from clear blue → cloudy green → yellow → orange → finally to a <KW>brick-red precipitate</KW> of copper(I) oxide if a reducing sugar is present. Glucose, fructose and maltose are reducing sugars; sucrose is NOT.</p>

          <p style={{ marginTop: 10 }}><Bold>3) Test for PROTEIN (biuret test):</Bold> place 2 cm³ of 1% albumen solution (egg-white protein) in a test tube. Add 2 cm³ of dilute sodium hydroxide solution (CARE: irritant), followed by 2 cm³ of 1% copper sulfate solution. A <KW>purple/violet</KW> colour indicates protein. (If you run the copper sulfate in slowly without mixing, a violet 'halo' forms where the two liquids meet.) NO heating is required.</p>

          <p style={{ marginTop: 10 }}><Bold>4) Test for FAT/OIL (emulsion test):</Bold> shake two drops of cooking oil with about 5 cm³ of ethanol in a DRY test tube until the fat dissolves. Pour this solution into another test tube containing a few cm³ of water. A <KW>milky-white emulsion</KW> forms if fat or oil is present.</p>

          <p style={{ marginTop: 10 }}><Bold>5) Test for VITAMIN C:</Bold> using a plastic syringe, suck up 2 cm³ of fresh lemon juice. Place 2 cm³ of a 0.1% solution of <KW>DCPIP</KW> (a blue dye) in a test tube. Add the lemon juice drop-by-drop. The DCPIP becomes <KW>colourless</KW> quite suddenly as enough vitamin C is added. Make a note of the volume of juice used. Repeat with another juice (e.g. orange) — if more drops are needed, that juice contains LESS vitamin C.</p>
        </div>

        <FoodTestSummary />

        <div style={{ marginTop: 12, fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p><Bold>Application of the food tests:</Bold> the tests can be used on samples of any food (milk, potato, raisins, onion, beans, egg-yolk, peanuts, etc.) to find out which biological molecules are present. Crush solid samples in a mortar and shake with warm water to make a suspension; pour small amounts into separate test tubes for the starch / reducing-sugar / protein tests. For the fat test, crush a separate portion in ETHANOL (not water) and filter; pour the clear filtrate into water — a milky colour indicates fat.</p>
        </div>

        <div style={{ marginTop: 10, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME Examiner Tip:</Bold> when describing a food test in an exam answer, ALWAYS state the <Bold>starting colour</Bold> of the reagent AND the <Bold>colour after a positive result</Bold>. e.g. &quot;the solution turns from blue to brick-red&quot; — not just &quot;it turns red&quot;. Each colour can be a separate mark.
        </div>

        <div style={{ marginTop: 8, background: TLL, border: `1px solid ${TL}`, borderRadius: 6, padding: "10px 14px", fontSize: 12, color: "#0d4a40", lineHeight: 1.7 }}>
          <Bold>🎯 SME-detail — precise conditions:</Bold> Benedict's test uses a water bath at <Bold>~80 °C for ~5 minutes</Bold>. Lipid test uses <Bold>~2 cm³ of ethanol</Bold> + an equal volume of <Bold>cold water</Bold>. DCPIP test uses <Bold>~1 cm³ of DCPIP solution</Bold> with food added drop-by-drop. (Iodine and biuret tests need no specific volume — &quot;a few drops&quot; is fine.)
        </div>
      </Sec>

      <Sec id="t8" title="⑧ Revision Checklist (Hodder, end of chapter)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>After studying Chapter 4 you should know and understand the following:</p>
          <ul style={{ paddingLeft: 18 }}>
            <li>Living matter is made up of several important types of molecule, including proteins, fats and carbohydrates.</li>
            <li>All three types of molecule contain carbon, hydrogen and oxygen atoms. Proteins also contain nitrogen and sometimes phosphorus or sulfur.</li>
            <li>Carbohydrates are made from simple sugar units, often glucose.</li>
            <li>Carbohydrates are used as an energy source; glycogen and starch make good storage molecules. Cellulose gives plant cell walls their strength.</li>
            <li>Fats are made from fatty acids and glycerol.</li>
            <li>Proteins are made of chains of amino acids.</li>
            <li>Membranes outside and inside the cell are made of proteins and fats.</li>
            <li>Food tests are used to identify the main biological molecules.</li>
            <li><Ext/> DNA is another important biological molecule. It has a very distinctive shape, made up of nucleotides containing bases, which always pair up in the same way: A with T, and C with G.</li>
          </ul>
        </div>
      </Sec>
    </div>
  );
}

    { src: "Suppl", cat: "Carbohydrates", front: "True or False? Starch is soluble in water.", back: <span><KW c={RD}>False.</KW> Starch is <Bold>insoluble</Bold> in water — this is why it is a good storage molecule (it doesn't dissolve in cells or affect water balance).</span> },

    /* — Fats depth — */
    { src: "Suppl", cat: "Fats", front: "What is the difference between a fat and an oil?", back: <span>They are the <Bold>same family of molecules</Bold>. <KW c={TL}>Fats</KW> are SOLID at room temperature; <KW c={TL}>oils</KW> are LIQUID at room temperature. Otherwise structurally similar.</span> },
    { src: "Suppl", cat: "Fats", front: "State three functions of fats in organisms.", back: <span>1. <Bold>Long-term energy store</Bold> (~38 kJ/g, more than 2× carbs)<br/>2. Form part of <KW c={TL}>cell membranes</KW> (and internal membranes)<br/>3. Provide <KW c={TL}>insulation</KW> under skin and physical protection around organs</span> },
    { src: "Suppl", cat: "Fats", front: "Why are fats a better long-term energy store than carbohydrates?", back: <span>Fats release <KW c={TL}>about 38 kJ/g</KW> — over twice as much energy per gram as carbs (~17 kJ/g). They are also <Bold>insoluble</Bold>, so they do not affect cell water balance.</span> },
    { src: "Suppl", cat: "Fats", front: "Where in a cell are fats found?", back: <span>1. As <KW c={TL}>droplets</KW> stored in the cytoplasm (energy reserve).<br/>2. As part of the <KW c={TL}>cell membrane</KW> and the membranes of organelles (e.g. nuclear membrane, mitochondria).</span> },

    /* — Proteins depth — */
    { src: "Suppl", cat: "Proteins", front: "Name three examples of proteins in the body.", back: <span>1. <KW c={TL}>Enzymes</KW> (e.g. amylase) — speed up reactions<br/>2. <KW c={TL}>Haemoglobin</KW> — carries oxygen in red blood cells<br/>3. <KW c={TL}>Antibodies</KW> — defend against pathogens<br/>(also: muscle, hair, hormones like insulin, cell-membrane proteins)</span> },
    { src: "Suppl", cat: "Proteins", front: "Why are there so many different proteins?", back: <span>Because there are <Bold>about 20 different amino acids</Bold> and the <KW c={TL}>sequence</KW> in which they are joined can vary in millions of ways. Each unique sequence produces a different protein with a different function.</span> },
    { src: "Suppl", cat: "Proteins", front: "Why must humans eat protein in their diet?", back: <span>Animal cells <KW c={RD}>cannot</KW> make amino acids from carbs or fats. So we must obtain amino acids by <Bold>eating protein-rich foods</Bold> (meat, eggs, fish, beans, etc.). Plants can make their own amino acids from glucose + nitrate ions.</span> },

    /* — Food tests depth — */
    { src: "Suppl", cat: "Food tests", front: "Why is heat needed for the Benedict's test but NOT for the biuret test?", back: <span>Benedict's solution <Bold>requires heating</Bold> in a water-bath to drive the reaction with reducing sugar that produces the brick-red copper(I) oxide precipitate. The biuret test happens at room temperature — heating is unnecessary and could interfere.</span> },
    { src: "Suppl", cat: "Food tests", front: "Why must ethanol (fat test) be kept away from naked flames?", back: <span>Ethanol is <KW c={RD}>highly flammable</KW>. Always use a hot-water bath, never a Bunsen burner directly. Risk of fire/explosion.</span> },
    { src: "Suppl", cat: "Food tests", front: "Why must eye protection be worn for the biuret test?", back: <span>Because the test uses <KW c={RD}>sodium hydroxide</KW>, which is corrosive/an irritant. Splashes can damage the eyes.</span> },
    { src: "Suppl", cat: "Food tests", front: "Sucrose gives a NEGATIVE Benedict's test. Why?", back: <span>Because sucrose is a <Bold>non-reducing sugar</Bold>. Only reducing sugars (glucose, fructose, maltose) react with Benedict's. To detect sucrose, you must first hydrolyse it (boil with hydrochloric acid) — which breaks it into glucose + fructose — then test.</span> },
    { src: "Suppl", cat: "Food tests", front: "How can DCPIP be used to compare vitamin C content of two juices quantitatively?", back: <span>Add each juice <Bold>drop-by-drop</Bold> to a fixed volume of DCPIP and count the drops needed to decolourise it. The juice that needs <KW c={TL}>FEWER drops</KW> has MORE vitamin C per drop.</span> },
    { src: "Suppl", cat: "Food tests", front: "Why might starch test positive but reducing sugar test negative on the same food?", back: <span>Starch is a <Bold>polymer of glucose</Bold>, but starch ITSELF is not a reducing sugar — only individual sugar units (monosaccharides &amp; some disaccharides) react with Benedict's. The glucose is locked up inside the starch polymer.</span> },

    /* — DNA Extended depth — */
    { src: "Suppl", cat: "DNA EXT", front: "What does the abbreviation 'DNA' stand for? (EXT)", back: <span><KW c={PU}>Deoxyribonucleic acid</KW> — named after the sugar (deoxyribose) and the acidic phosphate group it contains.</span> },
    { src: "Suppl", cat: "DNA EXT", front: "What is a nucleotide? (EXT)", back: <span>A nucleotide is the <Bold>sub-unit (monomer) of DNA</Bold>. It has THREE parts:<br/>1. A <KW c={PU}>phosphate group</KW> (–PO₃)<br/>2. A 5-carbon sugar called <KW c={PU}>deoxyribose</KW><br/>3. One <KW c={PU}>organic base</KW> (A, T, C or G)</span> },
    { src: "Suppl", cat: "DNA EXT", front: "What holds the two strands of DNA together? (EXT)", back: <span><KW c={PU}>Chemical bonds between paired bases</KW> — between A and T on one rung, and between C and G on another. The bases stick INWARDS from the two sugar–phosphate backbones.</span> },
    { src: "Suppl", cat: "DNA EXT", front: "If a DNA sample contains 30% adenine, what % of cytosine is present? (EXT)", back: <span>%A = 30%, so %T = 30% (because A = T).<br/>Remaining = 100 − 30 − 30 = 40% (this is C + G).<br/>Because C = G, %C = 40 ÷ 2 = <KW c={PU}>20%</KW>.</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,      title: "Save My Exams official card" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = official Save My Exams card · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary card for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.cat.includes("EXT") || c.front.includes("EXT") || c.front.includes("Extended Tier");
          const sm = sourceMeta[c.src];
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{c.src === "SME" ? "SME" : "SUPPL"}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", alignItems: "center", whiteSpace: "pre-line" }}>
                  {c.front}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

      {/* Top nav: Index button on the left */}
      <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 12 }}>

          fontSize: 12, fontWeight: 600, color: G, textDecoration: "none",
          padding: "5px 10px 5px 6px", borderRadius: 6,
          border: `1px solid ${BD}`, background: "#fff", transition: "all .15s",
        }}>
          <span style={{ fontSize: 14, lineHeight: 1 }}>‹</span>
          <span>Index</span>

      </div>

            {/* Header */}
      <div style={{ marginBottom: 20, borderBottom: `2px solid ${G}`, paddingBottom: 14 }}>
        <div className="chapter-kicker">IGCSE BIOLOGY · HODDER Ch.{CHAPTER_META.number} · NLCS JEJU</div>

          <span className="chapter-title">{CHAPTER_META.title}</span>
        </div>

          {CHAPTER_META.subtitle}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 4, flexWrap: "wrap" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setActive(t.id)} style={{
            padding: "9px 16px", borderRadius: 8,
            border: active === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
            background: active === t.id ? t.color : "#fff",
            color: active === t.id ? "#fff" : t.color,
            fontSize: 12, fontWeight: 700, cursor: "pointer", transition: "all .15s",
          }}>
            {t.label}
          </button>
        ))}
      </div>
      <div style={{ fontSize: 11, color: tab.color, marginBottom: 16, paddingLeft: 4 }}>{tab.sub}</div>

      {active === "essence"   && <EssenceTab />}
      {active === "exam"      && <ExamTab />}
      {active === "summary"   && <SummaryTab />}

      <div style={{ marginTop: 24, padding: "10px 16px", background: "#f5f5f3", borderRadius: 8, fontSize: 11, color: "#999", textAlign: "center" }}>
        Hodder Cambridge IGCSE Biology Ch.{CHAPTER_META.number} · All English · NLCS Jeju — Extended (Paper 1, 4, 6)
      </div>

  );
}
