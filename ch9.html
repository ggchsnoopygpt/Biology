function TextbookTab() {
  const [open, setOpen] = useState({ t1: true, t2: false, t3: false, t4: false, t5: false, t6: false, t7: false, t8: false, t9: false, t10: false, t11: false });
  const tog = k => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${G}`, borderRadius: 10, overflow: "hidden", marginBottom: 12 }}>
      <button onClick={() => tog(id)} style={{ width: "100%", background: open[id] ? G : GL, color: open[id] ? "#fff" : G, border: "none", padding: "11px 16px", textAlign: "left", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", justifyContent: "space-between" }}>
        {title}<span>{open[id] ? "▲" : "▼"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 16px", background: "#fff" }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 8, padding: "10px 16px", marginBottom: 12, fontSize: 12, color: "#1a3a2a" }}>
        <strong>Reference notes for Chapter 9: Transport in Animals</strong>. Sections ①–⑨ are paraphrased from the <Bold>Hodder Cambridge IGCSE Biology</Bold> textbook (pages 146–166). Section ⑩ summarises the <Bold>Save My Exams (SME)</Bold> revision notes (concise &amp; exam-focused). Section ⑪ collects the key diagrams from this chapter. Use the Summary tab for revision; come here for detail.
      </div>

      <Sec id="t1" title="① The Circulatory System — overview">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>An animal as large as a human cannot rely on diffusion to deliver oxygen, food and hormones to every cell — molecules would take far too long to travel. Instead, mammals have a <KW>circulatory system</KW>: a network of blood vessels with a muscular pump (the heart) and valves that ensure blood flows in one direction only.</p>

          <Bold>The three components</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Blood vessels</KW> — closed tubes that carry blood. Arteries leave the heart, veins return to the heart, and capillaries form a delicate exchange network in every organ.</li>
            <li><KW>Pump</KW> — the heart, made of muscle that contracts rhythmically. The contraction generates pressure that drives blood around the system.</li>
            <li><KW>Valves</KW> — found inside the heart (between atria and ventricles, and at the base of the aorta and pulmonary artery) and inside veins. They prevent backflow.</li>
          </ul>

          <Bold>How blood flows through an organ</Bold>
          <p>Blood enters an organ through an <Bold>artery</Bold>. This artery divides into smaller and smaller branches called <KW>arterioles</KW>, which finally split into a dense network of microscopic <KW>capillaries</KW> threading between every cell of the tissue. Capillaries reconnect into wider <KW>venules</KW>, which then combine into a <Bold>vein</Bold> that takes the blood out of the organ and back towards the heart.</p>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <DoubleCirculationSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t2" title="② Single circulation (fish) vs Double circulation (mammals)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>Single circulation — fish</Bold>
          <p>Fish have the simplest circulatory system of all the vertebrates. The heart has only <KW>two chambers</KW>: one atrium (which receives blood from the body) and one ventricle (which pumps blood out). The ventricle sends blood to the gills, where it is oxygenated. From the gills it flows directly on to the rest of the body before returning to the heart. The blood passes through the heart <Bold>once per circuit</Bold>, so this is called a <KW>single circulation</KW>.</p>
          <p>The problem: as blood passes through the tiny capillaries in the gills, <Bold>most of its pressure is lost</Bold>. It then has to flow through all the other organs on this same low-pressure trip. This makes fish circulation inefficient — delivery to tissues is slow.</p>

          <Bold>Double circulation — mammals</Bold>
          <p>Mammals have a <KW>four-chambered heart</KW> and a <KW>double circulation</KW>. The blood passes through the heart <Bold>twice</Bold> per complete circuit of the body. On average a red blood cell takes around 45 seconds to complete one full lap.</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>The <KW>RIGHT side</KW> of the heart receives <Bold>deoxygenated</Bold> blood from the body and pumps it to the lungs — the <KW>pulmonary circulation</KW>.</li>
            <li>The <KW>LEFT side</KW> receives <Bold>oxygenated</Bold> blood from the lungs and pumps it around the body — the <KW>systemic circulation</KW>.</li>
          </ul>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>Advantage of double circulation (EXT)</Bold> — after going through the lungs, blood pressure has dropped. Returning to the heart allows the pressure to be <Bold>raised again</Bold> before delivery to the body. The result is fast, high-pressure delivery of oxygen and glucose to every organ, supporting the high metabolic rate of mammals.
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <SingleVsDoubleSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t3" title="③ The Mammalian Heart — structure">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The heart is a muscular pump in the chest. On a standard diagram, the heart is shown as if you were looking at a person from the front — so the LEFT side of the heart is drawn on the RIGHT of the page, and vice versa. Always pay attention to this convention.</p>

          <Bold>Four chambers</Bold>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Atria</KW> (singular: atrium) — the two upper chambers. Thin-walled because they only need to push blood into the ventricles below them.</li>
            <li><KW>Ventricles</KW> — the two lower chambers. Thick muscular walls because they pump blood out of the heart into arteries.</li>
          </ul>

          <Bold>The septum</Bold>
          <p>A muscular wall called the <KW>septum</KW> separates the left side from the right side. It is critical because it prevents <Bold>oxygenated and deoxygenated blood from mixing</Bold>. Without the septum the two would mix in the heart, and the blood delivered to the body would not be fully oxygenated.</p>

          <Bold>The valves</Bold>
          <p>All four valves of the heart serve one purpose: to prevent blood flowing backwards.</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Atrioventricular (AV) valves</KW> — between each atrium and its ventricle. The right AV valve is the <Bold>tricuspid</Bold> (3 flaps); the left AV valve is the <Bold>bicuspid</Bold> (2 flaps). Open when atria contract; close when ventricles contract.</li>
            <li><KW>Semilunar (SL) valves</KW> — three "half-moon" pockets at the base of the aorta and pulmonary artery. They open when ventricles contract to let blood out, then close as the ventricles relax to stop blood flowing back into the heart.</li>
          </ul>
          <p>The AV valves are anchored by <Bold>tendons</Bold> ("heart strings") to the ventricle walls. These prevent the valve flaps from being pushed inside-out by the high pressure when the ventricles contract.</p>

          <Bold>Coronary arteries</Bold>
          <p>The heart muscle has its own blood supply via the <KW>coronary arteries</KW> — small arteries that branch off the aorta just above the heart and run across its surface. They deliver oxygen and glucose to the cardiac muscle and remove waste. Blockage of a coronary artery causes coronary heart disease (Section ⑥).</p>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <HeartStructureSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t4" title="④ The Cardiac Cycle &amp; why the left ventricle is thicker (Extended)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>Why is the left ventricle wall ~3× thicker than the right? (EXT)</Bold> <Ext/>
          <p>Both ventricles pump the <em>same volume</em> of blood every beat — the difference is the pressure needed:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>The <Bold>right ventricle</Bold> only sends blood to the lungs (right next to the heart) at <Bold>low pressure</Bold> — the alveolar capillaries are extremely delicate and would burst at high pressure.</li>
            <li>The <Bold>left ventricle</Bold> sends blood to <Bold>every organ in the body</Bold>, against high resistance. It must generate a much higher pressure, so its muscular wall is correspondingly thicker.</li>
          </ul>
          <p>The ventricle walls in general are thicker than the atrial walls because <Bold>ventricles pump blood OUT of the heart</Bold> (into arteries against high resistance), while atria only push blood a short distance down into the ventricles below them.</p>

          <Bold>Steps of the cardiac cycle (EXT)</Bold> <Ext/>
          <ol style={{ margin: "4px 0", paddingLeft: 22 }}>
            <li><Bold>Deoxygenated blood</Bold> from the body enters the <KW>right atrium</KW> via the <KW>vena cava</KW>. <Bold>Oxygenated blood</Bold> from the lungs enters the <KW>left atrium</KW> via the <KW>pulmonary vein</KW>.</li>
            <li>The atria fill and contract simultaneously — the AV valves open, and blood is forced down into the ventricles.</li>
            <li>The ventricles contract — the AV valves slam shut (producing the "<em>lub</em>" sound). The SL valves are forced open and blood is squeezed out: <Bold>right ventricle → pulmonary artery → lungs</Bold>; <Bold>left ventricle → aorta → body</Bold>.</li>
            <li>The ventricles relax — pressure inside the ventricles drops below pressure in the arteries. The SL valves close (producing the "<em>dub</em>" sound) to stop the blood flowing back into the heart.</li>
            <li>As the ventricles relax further, the AV valves re-open. Blood flows passively into the atria and on into the ventricles, ready for the next beat.</li>
          </ol>

          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>Why pressure must be LOW in the lungs:</Bold> alveolar capillaries are one cell thick. High pressure here would burst them, flood the alveoli with blood (pulmonary oedema) and stop gas exchange.
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <CardiacCycleSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t5" title="⑤ Monitoring the heart · effect of exercise">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>There are three standard ways to monitor heart activity in the classroom or clinic:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Pulse rate</KW> — feel the ripple of pressure caused by the heartbeat as blood is forced through an artery. Easiest places: the <Bold>radial artery</Bold> in the wrist or the <Bold>carotid artery</Bold> in the neck. <Bold>Never use the thumb</Bold> — it has its own pulse and you will count it instead of the patient's.</li>
            <li><KW>Stethoscope</KW> — amplifies the sounds of the heart valves opening and closing. A healthy heart produces a regular "<em>lub-dub</em>": the "lub" is the AV valves closing as the ventricles contract; the "dub" is the SL valves closing as the ventricles relax. Irregular or muffled sounds may indicate faulty valves.</li>
            <li><KW>ECG (electrocardiogram)</KW> — electrodes stuck to the chest, arms and legs detect the electrical activity that triggers heart contractions. The trace is shown on a screen or printout, and unusual patterns help identify heart problems.</li>
          </ul>

          <Bold>The effect of physical activity on heart rate</Bold>
          <p>A typical resting heart rate is around <Bold>70 bpm</Bold>, but it varies with age, sex and fitness — slower in fit people, faster in young people, and slightly faster in females than males. During exercise the rate can climb to around <Bold>200 bpm</Bold>.</p>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 6 }}>
            <Bold>Why exercise raises heart rate (EXT)</Bold> <Ext/> — working muscles need more <Bold>oxygen and glucose</Bold> for increased respiration, and need to remove <Bold>more carbon dioxide and other waste</Bold>. The heart speeds up to deliver these faster. After exercise stops, the rate stays high for a while to <Bold>repay the oxygen debt</Bold> — the extra oxygen is used to break down the lactic acid that built up during periods of anaerobic respiration. A fit person returns to their resting rate faster.
          </div>

          <Bold>Practical: investigating exercise &amp; pulse rate</Bold>
          <p>Take your resting pulse at the wrist (count beats in 15 seconds, multiply by 4; repeat 3 times for an average). Exercise for 2 minutes (running on the spot). Sit immediately and measure pulse rate every minute for 10 minutes. Plot pulse rate against time, with the resting rate drawn as a horizontal reference line. Pulse will be much higher than resting straight after exercise, then drop gradually — a fit person's drops faster than an unfit person's.</p>
        </div>
      </Sec>

      <Sec id="t6" title="⑥ Coronary Heart Disease (CHD) — causes, risk factors, prevention">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>What goes wrong</Bold>
          <p>Deposits of a fatty substance called <KW>atheroma</KW> (mainly cholesterol with some white blood cells) build up patches in the lining of medium and large arteries. The patches grow with age and may eventually join up into bigger plaques. Two consequences:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>The artery <Bold>narrows</Bold>, and its wall becomes <Bold>less elastic</Bold>. Blood flow through it is restricted.</li>
            <li>The rough surface of a plaque can trigger a <Bold>blood clot</Bold>. If a clot blocks the artery completely, no oxygen reaches the cells downstream and they die.</li>
          </ul>
          <p>When this happens in a <KW>coronary artery</KW>, the cardiac muscle is starved of oxygen:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Partial blockage</Bold> → <KW>angina</KW>, severe chest pain during exercise (a warning sign).</li>
            <li><Bold>Complete blockage</Bold> → <KW>heart attack</KW> (myocardial infarction). Cells can no longer respire or contract, and the heart may stop beating.</li>
          </ul>
          <p>A clot lodged in arteries supplying the brain causes a <Bold>stroke</Bold>, which is just as serious.</p>

          <Bold>Risk factors</Bold>
          <p>Risk factors are split into ones you can change and ones you can't.</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Diet</KW> high in <Bold>saturated animal fat</Bold> and excess calories → high blood cholesterol → more atheroma. Obesity adds extra strain on the heart.</li>
            <li><KW>Smoking</KW> — nicotine narrows blood vessels and raises blood pressure; carbon monoxide and other chemicals damage the artery lining, allowing atheroma to form. Smokers are 2-3× more likely than non-smokers of similar age to die of a heart attack.</li>
            <li><KW>Stress</KW> raises blood pressure (via stress hormones), which speeds atheroma formation in the coronary arteries.</li>
            <li><KW>Lack of exercise</KW> — heart muscle loses tone, becomes less efficient. Lack of exercise also slows blood flow, possibly allowing more atheroma deposition.</li>
            <li><KW>Genetics</KW>, <KW>age</KW> and <KW>sex</KW> — these you can't change. CHD runs in families. Risk rises with age. Males are more at risk than pre-menopausal females, partly because the hormone <KW>oestrogen</KW> offers some protection to females until later in life.</li>
          </ul>

          <Bold>Prevention</Bold>
          <p>Reduce the changeable risk factors: a balanced low-saturated-fat diet (more fruit/veg, less red meat, butter, eggs), quitting smoking, regular vigorous exercise, and managing stress. Exercise improves the tone of skeletal and cardiac muscle, leading to better coronary blood flow.</p>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <CoronaryAtheromaSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t7" title="⑦ Blood vessels — arteries, veins, capillaries (Extended)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <Bold>Arteries</Bold> carry blood AWAY from the heart at high pressure.
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Walls are <KW>thick</KW>, <KW>muscular</KW>, and contain <KW>elastic fibres</KW>. The elastic fibres stretch as the pressure surges with each heartbeat, then recoil — this smooths out the flow and keeps blood pressure up between beats.</li>
            <li>Lumen is <KW>narrow</KW> to maintain high pressure.</li>
            <li><Bold>No valves</Bold> (except at the very base of the aorta and pulmonary artery, where the SL valves stop backflow into the heart).</li>
            <li>Blood is <Bold>oxygenated</Bold> — except the <Bold>pulmonary artery</Bold>, which carries deoxygenated blood from the right ventricle to the lungs.</li>
          </ul>

          <Bold>Veins</Bold> return blood TO the heart at low pressure.
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Walls are <KW>thin</KW>, with less muscle and elastic fibre.</li>
            <li>Lumen is <KW>wide</KW> to reduce resistance and ease flow.</li>
            <li><KW>Valves</KW> at intervals along the inside prevent backflow. Contraction of body muscles (especially in the legs) squeezes the thin-walled veins and helps blood return to the heart against gravity.</li>
            <li>Blood is <Bold>deoxygenated</Bold> — except the <Bold>pulmonary vein</Bold>, which carries oxygenated blood from the lungs to the left atrium.</li>
          </ul>

          <Bold>Capillaries</Bold> are the exchange vessels.
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Walls are only <KW>one cell thick</KW> (endothelium only — no muscle or elastic tissue). This means the diffusion distance is minimal, allowing fast exchange of oxygen, CO₂, glucose and waste products with the surrounding tissues.</li>
            <li>The walls are slightly "<KW>leaky</KW>" — there are gaps between cells through which plasma escapes to form <Bold>tissue fluid</Bold> (bathing all the body's cells). White blood cells can squeeze out between cells to attack pathogens in the tissues.</li>
            <li>Lumen is so narrow that red blood cells must travel through in single file. This slows flow → more time for exchange.</li>
            <li>Capillaries form a dense network — no living cell in the body is more than a fraction of a millimetre from one.</li>
          </ul>

          <p>Arteries branch into smaller <KW>arterioles</KW>, which split further into capillaries. On the way back, capillaries unite into <KW>venules</KW> which combine to form veins.</p>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <BloodVesselsSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t8" title="⑧ Main blood vessels of the body (with liver — Extended)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>You need to be able to name the main vessels going into and coming out of each major organ.</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><Bold>Heart</Bold> — IN: <KW>vena cava</KW> (deoxy from body) &amp; <KW>pulmonary vein</KW> (oxy from lungs). OUT: <KW>aorta</KW> (oxy to body) &amp; <KW>pulmonary artery</KW> (deoxy to lungs). There are actually two vena cavae (one from upper body, one from lower) and two pulmonary arteries and veins (one set per lung).</li>
            <li><Bold>Lungs</Bold> — IN: pulmonary artery (deoxy). OUT: pulmonary vein (oxy).</li>
            <li><Bold>Kidneys</Bold> — IN: <KW>renal artery</KW>. OUT: <KW>renal vein</KW>. Blood is filtered in the kidney to remove urea and excess water.</li>
            <li><Bold>Gut (stomach + intestines)</Bold> — IN: <KW>mesenteric artery</KW>. OUT: <KW>hepatic portal vein</KW> — does not go straight back to the heart, but takes absorbed nutrients to the liver first.</li>
          </ul>

          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>The liver is special</Bold> <Ext/> — it has <em>two</em> incoming blood vessels:
            <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
              <li><KW c={PU}>Hepatic artery</KW> — brings oxygenated blood from the heart (off the aorta) to keep liver cells respiring.</li>
              <li><KW c={PU}>Hepatic portal vein</KW> — brings deoxygenated, nutrient-rich blood from the gut. After a meal this blood is loaded with glucose, amino acids and other absorbed molecules, which the liver processes (storing as glycogen, deaminating excess amino acids etc).</li>
            </ul>
            Blood leaves via the <KW c={PU}>hepatic vein</KW>, which drains into the vena cava.
          </div>

          <p style={{ marginTop: 8 }}>Note: most veins carry deoxygenated blood and most arteries carry oxygenated blood — the two famous exceptions are the pulmonary artery (deoxy) and pulmonary vein (oxy). The hepatic portal vein is also deoxygenated but unusual in that it connects two capillary beds (gut → liver), not the usual capillary bed → heart route.</p>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <CirculationMapSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t9" title="⑨ Blood components · WBC types · clotting (Extended)">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>Blood consists of about <Bold>5–6 litres</Bold> in an adult, made up of cells suspended in a liquid:</p>

          <Bold>Plasma — about 55% of blood by volume</Bold>
          <p>A straw-coloured liquid (water with many dissolved substances). It transports:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Carbon dioxide</KW> — from respiring tissues to the lungs (mostly as hydrogencarbonate ions).</li>
            <li><KW>Digested food</KW> — glucose, amino acids, lipids — absorbed in the gut and delivered to cells.</li>
            <li><KW>Urea</KW> — the nitrogenous waste from amino acid breakdown, carried from the liver to the kidneys.</li>
            <li><KW>Hormones</KW> — chemical messengers from endocrine glands to their target organs.</li>
            <li><KW>Mineral ions</KW> — Na⁺, K⁺, Ca²⁺, Cl⁻, HCO₃⁻ — needed for many body processes.</li>
            <li><KW>Heat</KW> — distributed from active organs (muscles, liver) to maintain a steady body temperature.</li>
          </ul>

          <Bold>Red blood cells (RBCs)</Bold>
          <p>About <Bold>5 billion per cm³</Bold>. They are small <KW>biconcave discs</KW>, have <Bold>NO nucleus</Bold>, and are packed with the protein <KW>haemoglobin</KW> (which contains iron). Haemoglobin combines reversibly with oxygen:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>In the lungs (high O₂) → <Bold>oxyhaemoglobin</Bold> forms. Blood is bright red.</li>
            <li>In respiring tissues (low O₂) → oxyhaemoglobin breaks down, releasing oxygen. Blood is darker red.</li>
          </ul>
          <p>The biconcave shape gives a large surface area for fast O₂ uptake; the lack of nucleus leaves more room for haemoglobin. RBCs live about 4 months before being broken down in the liver. The iron is recycled; the haem is converted into the yellow pigment <Bold>bilirubin</Bold>, excreted in bile. About 1% of RBCs are replaced each day (by the red bone marrow in the ribs, vertebrae and sternum).</p>

          <Bold>White blood cells (WBCs)</Bold>
          <p>About 1 WBC for every 600 RBCs. Larger than RBCs, all have a <Bold>nucleus</Bold>. They defend the body against pathogens by:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li><KW>Phagocytosis</KW> — engulfing and digesting pathogens whole.</li>
            <li><KW>Antibody production</KW> — making proteins that mark pathogens for destruction or neutralise toxins.</li>
          </ul>

          <div style={{ background: PL, border: `1px solid ${PU}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>Two types of WBC (EXT)</Bold> <Ext/>
            <ul style={{ margin: "6px 0", paddingLeft: 18 }}>
              <li><KW c={PU}>Phagocytes</KW> — large cells with a <Bold>multi-lobed nucleus</Bold> and <Bold>granular cytoplasm</Bold>. They have a sensitive cell-surface membrane that detects chemicals from pathogens, then engulf the pathogen and release digestive enzymes to destroy it. Phagocytes can squeeze between capillary walls into the tissues to attack infection.</li>
              <li><KW c={PU}>Lymphocytes</KW> — round cells with a <Bold>large round nucleus</Bold> filling almost the whole cell, and <Bold>clear non-granular cytoplasm</Bold>. They produce <Bold>antibodies</Bold> (mark pathogens for destruction) and <Bold>antitoxins</Bold> (neutralise toxins released by pathogens).</li>
            </ul>
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <PhagocytosisSVG />
          </div>

          <Bold>Platelets</Bold>
          <p>Tiny fragments of cells (not whole cells), formed in the bone marrow. Their role is to trigger <Bold>blood clotting</Bold> at wounds.</p>

          <Bold>How blood clots (Extended)</Bold> <Ext/>
          <ol style={{ margin: "4px 0", paddingLeft: 22 }}>
            <li>When a blood vessel is cut, platelets gather and stick to the damaged walls. They release chemicals.</li>
            <li>The chemicals trigger a series of enzyme reactions that convert soluble <KW c={PU}>fibrinogen</KW> (a protein in plasma) into insoluble <KW c={PU}>fibrin</KW> threads.</li>
            <li>The fibrin threads form a <Bold>mesh</Bold> across the wound. Red blood cells become trapped in this mesh, forming a <Bold>clot</Bold>.</li>
            <li>The clot dries into a <Bold>scab</Bold>, which protects the wound from pathogens entering and stays in place while new skin grows underneath.</li>
          </ol>

          <div style={{ background: GL, border: `1px solid ${G}`, borderRadius: 6, padding: "10px 14px", fontSize: 12.5, marginTop: 8 }}>
            <Bold>Two roles of the clot:</Bold> (1) prevent further loss of blood through the wound; (2) prevent <Bold>pathogens</Bold> (bacteria, viruses) entering the body.
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "14px 0" }}>
            <BloodClottingSVG />
          </div>
        </div>
      </Sec>

      <Sec id="t10" title="⑩ SME notes summary — exam-focused points">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>The Save My Exams notes condense the same content into bullet form. Headline points to drill before exams:</p>
          <ul style={{ margin: "4px 0", paddingLeft: 18 }}>
            <li>Circulatory system = blood vessels + pump + valves; valves ensure <Bold>one-way flow</Bold>.</li>
            <li>"<Bold>A-A</Bold>" memory: <em>A</em>rteries carry blood <em>A</em>way from the heart.</li>
            <li>Fish = 2-chamber heart, single circ, <Bold>once</Bold> through heart. Mammals = 4-chamber, double circ, <Bold>twice</Bold> through heart.</li>
            <li>Double circulation advantage (EXT): re-pressurises blood after the lungs → faster delivery.</li>
            <li>Septum = wall keeping left and right halves separated → prevents mixing of oxy and deoxy blood.</li>
            <li>AV valves: tricuspid (R), bicuspid (L). SL valves: only 2 arteries in the body contain valves — the aorta and pulmonary artery.</li>
            <li>Heart is supplied by <Bold>coronary arteries</Bold>. Blockage by atheroma → angina (partial) or heart attack (complete).</li>
            <li>Reduce CHD risk by: quitting smoking, reducing animal fats, regular exercise, managing stress.</li>
            <li>Cardiac cycle (EXT): atria contract → ventricles contract (AV close, "lub") → ventricles relax (SL close, "dub").</li>
            <li>Monitoring: pulse rate (radial/carotid, not thumb!), stethoscope, ECG.</li>
            <li>Exercise (EXT): HR ↑ to deliver more O₂/glucose; remains high after to repay <Bold>oxygen debt</Bold> (break down lactic acid).</li>
            <li>Capillary wall = ONE cell thick, with gaps. Walls allow plasma to leak out → tissue fluid.</li>
            <li>Order: artery → arteriole → capillary → venule → vein.</li>
            <li>Liver vessels (EXT): hepatic artery (oxy IN), hepatic portal vein (gut nutrients IN), hepatic vein (OUT).</li>
            <li>Blood = plasma 55% + cells 45%. Plasma transports CO₂, food, urea, hormones, ions, heat.</li>
            <li>RBC: biconcave, NO nucleus, haemoglobin → oxyhaemoglobin in lungs.</li>
            <li>WBC types (EXT): phagocyte (multi-lobed nucleus, granular cytoplasm) — phagocytosis; lymphocyte (round nucleus, clear cytoplasm) — antibodies, antitoxins.</li>
            <li>Platelets = fragments of cells, trigger clotting.</li>
            <li>Clotting (EXT): platelets release chemicals → soluble <Bold>fibrinogen</Bold> → insoluble <Bold>fibrin</Bold> mesh → traps RBCs → clot → dries to scab.</li>
            <li>Clot roles: stop blood loss + stop pathogen entry.</li>
          </ul>
        </div>
      </Sec>

      <Sec id="t11" title="⑪ Key diagrams collected here">
        <div style={{ fontSize: 13, color: GR, lineHeight: 1.75 }}>
          <p>All the chapter's main diagrams in one place for fast review.</p>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><DoubleCirculationSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><SingleVsDoubleSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><HeartStructureSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><CardiacCycleSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><CoronaryAtheromaSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><BloodVesselsSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><CirculationMapSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><BloodComponentsSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><PhagocytosisSVG /></div>
          <div style={{ display: "flex", justifyContent: "center", margin: "12px 0" }}><BloodClottingSVG /></div>
        </div>
      </Sec>
    </div>
  );
}

    { src: "SME", cat: "Blood", front: "What is the function of platelets?", back: <span>Cell fragments that help <KW c={TL}>blood to clot</KW> at wounds. Trigger the cascade that forms a clot, sealing the wound.</span> },

    /* — Two types of WBC (Extended) (51-54) — */
    { src: "SME", cat: "WBC types", front: "What does a PHAGOCYTE look like? (EXT)", back: <span><KW c={PU}>Multi-lobed nucleus</KW> + <KW c={PU}>granular cytoplasm</KW>. Has a sensitive cell-surface membrane that detects pathogens. (Extended Tier)</span> },
    { src: "SME", cat: "WBC types", front: "What does a phagocyte do? (EXT)", back: <span>Carries out <KW c={PU}>phagocytosis</KW>: engulfs pathogens and releases <Bold>digestive enzymes</Bold> to destroy them. (Extended Tier)</span> },
    { src: "SME", cat: "WBC types", front: "What does a LYMPHOCYTE look like? (EXT)", back: <span><KW c={PU}>Large round nucleus</KW> filling almost the whole cell + <KW c={PU}>clear, non-granular cytoplasm</KW>. (Extended Tier)</span> },
    { src: "SME", cat: "WBC types", front: "What does a lymphocyte do? (EXT)", back: <span>Produces <KW c={PU}>antibodies</KW> to destroy pathogens, and <KW c={PU}>antitoxins</KW> to neutralise toxins released by pathogens. (Extended Tier)</span> },

    /* — Clotting (55-58) — */
    { src: "SME", cat: "Clotting", front: "Why is blood clotting important?", back: <span>1. <KW c={TL}>Prevents continued blood loss</KW> from wounds<br/>2. <KW c={TL}>Prevents pathogens entering</KW> through the wound. The scab seals the cut while new skin grows underneath.</span> },
    { src: "SME", cat: "Clotting", front: "Describe how a clot forms. (EXT)", back: <span>1. Platelets arrive at the wound and release <Bold>chemicals</Bold>.<br/>2. Chemicals trigger enzymes that convert soluble <KW c={PU}>fibrinogen</KW> → insoluble <KW c={PU}>fibrin</KW>.<br/>3. Fibrin forms a <Bold>mesh</Bold> trapping red blood cells → clot.<br/>4. Clot dries → <Bold>scab</Bold>. (Extended Tier)</span> },
    { src: "SME", cat: "Clotting", front: "Soluble fibrin___ becomes insoluble fibr___. Fill in the blanks. (EXT)", back: <span>Soluble <KW c={PU}>fibrinogen</KW> → insoluble <KW c={PU}>fibrin</KW>. Remember: -ogen = soluble precursor (in plasma); -in = the insoluble fibre mesh that traps red cells. (Extended Tier)</span> },
    { src: "SME", cat: "Clotting", front: "Why does a clot eventually become a scab?", back: <span>The clot <KW c={TL}>dries out</KW> in air, hardening into a protective scab. The scab stays in place until <Bold>new skin</Bold> has grown underneath, then falls off naturally.</span> },

    /* — Misc (59-60) — */
    { src: "SME", cat: "Blood", front: "Where in the bone are red and white blood cells made?", back: <span>In the <KW c={TL}>red bone marrow</KW> of some bones in the skeleton — including ribs, vertebrae and sternum.</span> },
    { src: "SME", cat: "Blood", front: "What is oxyhaemoglobin and when does it form?", back: <span><KW c={TL}>Oxyhaemoglobin</KW> = haemoglobin combined with oxygen. Forms in the <Bold>lungs</Bold> (high O₂) and breaks down in <Bold>respiring tissues</Bold> (low O₂), releasing oxygen to those cells.</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME DIAGRAM — picture-based flashcards (redesigned from the official
       Save My Exams set: heart labels, valve types, vessel cross-sections,
       capillary adaptation, liver vessels, blood-cell identification).
       ═══════════════════════════════════════════════════════════════════════ */

    /* — Heart anatomy labels A-D — */
    { src: "SME", cat: "SME Diagram", front: "What are the structures labelled A–D in this heart diagram?",
      frontDiagram: <FCHeartLabelsADSVG/>,
      back: <span><KW c={TL}>A</KW> = right atrium<br/><KW c={TL}>B</KW> = right ventricle<br/><KW c={TL}>C</KW> = one-way valve (atrioventricular / tricuspid valve)<br/><KW c={TL}>D</KW> = septum</span> },

    /* — Two types of valve (EXT) — */
    { src: "SME", cat: "SME Diagram", ext: true, front: "What two types of valve are labelled X and Y? (EXT)",
      frontDiagram: <FCHeartValvesXYSVG/>,
      back: <span><KW c={PU}>X</KW> = semilunar valve (at the base of the aorta)<br/><KW c={PU}>Y</KW> = atrioventricular valve (between atrium and ventricle). (Extended Tier)</span> },

    /* — Artery cross-section — */
    { src: "SME", cat: "SME Diagram", front: "What three features tell you this blood vessel is an ARTERY?",
      frontDiagram: <FCArteryXSSVG/>,
      back: <span>It is an <KW c={TL}>artery</KW> because:<br/>• the wall is <Bold>thick</Bold> (lots of muscle &amp; elastic tissue)<br/>• the <Bold>lumen is narrow</Bold> — to keep pressure high<br/>• <Bold>no valves</Bold> are present along its length</span> },

    /* — Vein cross-section — */
    { src: "SME", cat: "SME Diagram", front: "What features tell you this blood vessel is a VEIN?",
      frontDiagram: <FCVeinXSSVG/>,
      back: <span>It is a <KW c={TL}>vein</KW> because:<br/>• the wall is <Bold>thin</Bold> (little muscle)<br/>• the <Bold>lumen is wide</Bold> — for large volume / low resistance flow</span> },

    /* — Vein: missing feature — */
    { src: "SME", cat: "SME Diagram", front: "Which key feature of veins CANNOT be seen in this cross-section?",
      frontDiagram: <FCVeinXSSVG/>,
      back: <span>The <KW c={TL}>valves</KW> are missing from this view. In a longitudinal section you would see semilunar-like flaps along the vein, preventing the backflow of low-pressure blood.</span> },

    /* — Heart vessels A-D — */
    { src: "SME", cat: "SME Diagram", front: "Name the four blood vessels labelled A–D entering/leaving the heart.",
      frontDiagram: <FCHeartVesselsADSVG/>,
      back: <span><KW c={TL}>A</KW> = pulmonary artery (deoxy to lungs)<br/><KW c={TL}>B</KW> = vena cava (deoxy in from body)<br/><KW c={TL}>C</KW> = aorta (oxy out to body)<br/><KW c={TL}>D</KW> = pulmonary vein (oxy in from lungs)</span> },

    /* — Capillary adaptations (EXT) — */
    { src: "SME", cat: "SME Diagram", ext: true, front: "Which capillary adaptations can you see in this diagram? (EXT)",
      frontDiagram: <FCCapillaryAdaptSVG/>,
      back: <span>Visible adaptations:<br/>• walls only <KW c={PU}>one cell thick</KW>, made of flattened endothelial cells — reduces the diffusion distance<br/>• a <KW c={PU}>narrow lumen</KW> forcing RBCs into single file — maximises contact between blood and the wall<br/><br/>Not visible here: <Bold>gaps between the cells</Bold> that make capillary walls leaky. (Extended Tier)</span> },

    /* — Hepatic vessels A-C (EXT) — */
    { src: "SME", cat: "SME Diagram", ext: true, front: "Identify hepatic blood vessels A, B and C in this circulation diagram. (EXT)",
      frontDiagram: <FCLiverVesselsACSVG/>,
      back: <span><KW c={PU}>A</KW> = hepatic vein (liver → vena cava)<br/><KW c={PU}>B</KW> = hepatic artery (aorta → liver, oxygenated)<br/><KW c={PU}>C</KW> = hepatic portal vein (gut → liver, nutrient-rich). (Extended Tier)</span> },

    /* — Blood components X and Y — */
    { src: "SME", cat: "SME Diagram", front: "Identify the two cell types X and Y in this blood-sample diagram.",
      frontDiagram: <FCBloodCompXYSVG/>,
      back: <span><KW c={TL}>X</KW> = red blood cell (biconcave, no nucleus, packed with haemoglobin)<br/><KW c={TL}>Y</KW> = white blood cell (larger, with a nucleus)<br/><br/>The yellow background is <Bold>plasma</Bold>; the small blue fragments are <Bold>platelets</Bold>.</span> },

    /* — Blood cell types A-C (EXT) — */
    { src: "SME", cat: "SME Diagram", ext: true, front: "Identify the three blood cell types labelled A, B and C. (EXT)",
      frontDiagram: <FCBloodCellsACSVG/>,
      back: <span><KW c={PU}>A</KW> = lymphocyte (round nucleus filling most of the cell — produces antibodies)<br/><KW c={PU}>B</KW> = phagocyte (multi-lobed nucleus, granular cytoplasm — engulfs pathogens)<br/><KW c={PU}>C</KW> = red blood cell (biconcave, no nucleus). (Extended Tier)</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SME EXTRAS — additional cards from the official Save My Exams set
       covering renal vein, exercise investigation (practical) and CHD diet.
       ═══════════════════════════════════════════════════════════════════════ */

    /* — Renal vein T/F — */
    { src: "SME", cat: "Named vessels", front: "True or False: the renal vein carries oxygenated blood away from the kidneys.", back: <span><KW c={RD}>FALSE.</KW> The renal vein carries <Bold>deoxygenated</Bold> blood away from the kidneys. (The renal artery brings oxygenated blood IN; the kidney removes urea and excess water, then the renal vein returns the deoxygenated, filtered blood to the vena cava.)</span> },

    /* — High-quality diet reduces CHD — */
    { src: "SME", cat: "CHD", front: "How does a high-quality (healthy) diet reduce the risk of CHD?", back: <span>A good diet helps to:<br/>• <KW c={TL}>reduce blood cholesterol</KW> (less saturated fat) → less atheroma<br/>• <KW c={TL}>reduce blood pressure</KW> (less salt, more fruit/veg)<br/>• <KW c={TL}>aid weight loss</KW> → lower strain on the heart<br/><br/>All three lower the chance of fatty plaques narrowing the coronary arteries.</span> },

    /* — Investigation: design — */
    { src: "SME", cat: "Monitoring", front: "Describe a procedure to investigate the effect of exercise on heart rate.", back: <span>1. Measure <KW c={TL}>resting heart rate</KW> at the wrist (pulse, beats per minute).<br/>2. <KW c={TL}>Exercise</KW> for a fixed time (e.g. 2 min of step-ups).<br/>3. <KW c={TL}>Re-measure</KW> heart rate immediately afterwards.<br/>4. <KW c={TL}>Repeat</KW> several times (rest in between) and average.<br/><br/>Can be extended: vary the exercise intensity and plot a graph.</span> },

    /* — Investigation: dependent variable — */
    { src: "SME", cat: "Monitoring", front: "When investigating exercise vs heart rate, what is the DEPENDENT variable?", back: <span>The <KW c={TL}>dependent variable</KW> is <Bold>heart rate</Bold> (measured in beats per minute) — it depends on what you do to the independent variable (exercise intensity / duration).</span> },

    /* — Investigation: control variables — */
    { src: "SME", cat: "Monitoring", front: "List variables that must be CONTROLLED in an investigation of exercise intensity vs heart rate.", back: <span>Variables to control:<br/>• the <KW c={TL}>same person</KW> being tested<br/>• the <KW c={TL}>type of exercise</KW> (e.g. step-ups, not running)<br/>• the <KW c={TL}>duration of exercise</KW> (e.g. 2 min)<br/>• the <KW c={TL}>method of measuring</KW> heart rate<br/>• the <KW c={TL}>rest period</KW> between repeats</span> },

    /* ═══════════════════════════════════════════════════════════════════════
       SUPPL — NLCS Jeju supplementary cards (Hodder textbook detail + tips)
       ═══════════════════════════════════════════════════════════════════════ */

    /* — Hodder heart anatomy detail (61-65) — */
    { src: "Suppl", cat: "Heart", front: "Hodder: why is the heart drawn 'reversed' on diagrams?", back: <span>The heart is drawn as if it were inside a person <KW c={TL}>facing you</KW>. So the LEFT side of the heart appears on the RIGHT of the page, and vice versa. Always check labels carefully.</span> },
    { src: "Suppl", cat: "Heart", front: "Hodder: how thick is the left ventricle wall compared to the right?", back: <span>About <KW c={TL}>3× thicker</KW>. Sometimes called the "large left ventricle" — both pump the same volume, but the left needs much more pressure.</span> },
    { src: "Suppl", cat: "Heart", front: "Hodder: how does the SL valve actually work?", back: <span>Three "<KW c={TL}>half-moon</KW>" pockets at the artery base. When blood flows out, the pockets press flat against the wall. If blood tries to flow back, the pockets <Bold>fill up and meet in the middle</Bold>, blocking the flow.</span> },
    { src: "Suppl", cat: "Heart", front: "Hodder: how many times does a red blood cell complete the circulation per minute?", back: <span>About <KW c={TL}>once every 45 seconds</KW>. So a single RBC may travel around the body more than 1000 times per day.</span> },
    { src: "Suppl", cat: "Heart", front: "Hodder: what is the 'pacemaker' of the heart?", back: <span>A small group of <KW c={TL}>specialised muscle cells</KW> at the top of the right atrium. It generates the natural rhythm of the heart (~40 bpm intrinsic rate; nerves and adrenaline adjust it for the body's needs).</span> },

    /* — Hodder cardiac cycle / sounds (66-68) — */
    { src: "Suppl", cat: "Cardiac cycle", front: "Hodder: which valve sound is the FIRST and which is the SECOND?", back: <span><KW c={TL}>First ('lub')</KW> = AV valves closing as ventricles contract.<br/><KW c={TL}>Second ('dub')</KW> = SL valves closing as ventricles relax.</span> },
    { src: "Suppl", cat: "Cardiac cycle", front: "What might cause unclear 'lub' or 'dub' sounds?", back: <span><KW c={TL}>Faulty valves</KW>. The doctor uses a stethoscope to listen for irregularities — this is a basic check during a physical examination.</span> },
    { src: "Suppl", cat: "Cardiac cycle", front: "Hodder: what controls the rate of the heartbeat besides the pacemaker?", back: <span>Two sets of <KW c={TL}>nerves</KW> from the brain (one speeds it up, one slows it down) — these respond to blood pressure / O₂ / CO₂ levels via receptors. Also the hormone <KW c={TL}>adrenaline</KW> from the adrenal glands speeds up and strengthens the heartbeat.</span> },

    /* — Hodder CHD detail (69-72) — */
    { src: "Suppl", cat: "CHD", front: "Hodder: what is the difference between atheroma and a blood clot?", back: <span><KW c={TL}>Atheroma</KW> = fatty plaque deposit in the artery wall (slow build-up of cholesterol + WBCs).<br/><KW c={TL}>Blood clot</KW> = sudden formation of a fibrin/RBC clot, often triggered by the rough surface of an atheroma. Either or both can block the artery.</span> },
    { src: "Suppl", cat: "CHD", front: "Hodder: what is a stroke, and how is it related to clots?", back: <span>A stroke happens when a blood clot blocks an artery in the <KW c={TL}>brain</KW>, killing part of the brain. The mechanism (clot from atheroma) is similar to a heart attack but the affected organ differs.</span> },
    { src: "Suppl", cat: "CHD", front: "Hodder: why is the link between smoking and CHD only a CORRELATION?", back: <span>Ethically you cannot do controlled experiments on humans (forcing some to smoke). All evidence comes from <KW c={TL}>long-term observational studies</KW>. A correlation doesn't strictly prove cause — but combined evidence (CO damaging artery linings, smoking linked to lung cancer etc) makes the case very strong.</span> },
    { src: "Suppl", cat: "CHD", front: "Going further: why does oestrogen protect females from CHD?", back: <span><KW c={TL}>Oestrogen</KW> helps maintain healthy artery walls and a favourable cholesterol profile. After menopause, oestrogen levels drop and female CHD rates rise to match males'.</span> },

    /* — Hodder blood vessels (73-76) — */
    { src: "Suppl", cat: "Vessels", front: "Hodder: how narrow is a capillary?", back: <span>Often only about <KW c={TL}>0.001 mm</KW> in diameter — narrower than a single red blood cell, which must <Bold>squeeze through in single file</Bold>. This slows the flow, allowing more time for exchange.</span> },
    { src: "Suppl", cat: "Vessels", front: "Hodder: what is tissue fluid, and how is it formed?", back: <span>Plasma forced out through the capillary walls by blood pressure (at the arterial end). It is <KW c={TL}>like plasma but with less protein</KW> (proteins are too large to escape). Bathes the body cells, supplying O₂ and nutrients; later most of it leaks back into the capillary at the venous end.</span> },
    { src: "Suppl", cat: "Vessels", front: "Hodder: how do white blood cells get out of capillaries into infected tissue?", back: <span>They <KW c={TL}>squeeze between the cells</KW> of the capillary wall (a process called diapedesis). The leaky walls of capillaries make this possible. They then patrol the tissue, ingesting bacteria.</span> },
    { src: "Suppl", cat: "Vessels", front: "Why is venous blood movement helped by skeletal muscle? (Going further)", back: <span>Contracting body muscles (e.g. calf muscles when walking) <KW c={TL}>squeeze the thin-walled veins</KW>. With valves preventing backflow, this pushes the blood towards the heart — sometimes called the "muscle pump".</span> },

    /* — Hodder liver / circulation (77-80) — */
    { src: "Suppl", cat: "Named vessels", front: "Why does the hepatic portal vein go to the LIVER first (not straight to the heart)?", back: <span>Because the liver <KW c={TL}>processes absorbed nutrients</KW> before they reach the rest of the body. It stores excess glucose as glycogen, deaminates excess amino acids to make urea, and detoxifies harmful substances absorbed from the gut. (Extended Tier)</span> },
    { src: "Suppl", cat: "Named vessels", front: "Hodder: how many pulmonary arteries and pulmonary veins are there?", back: <span><KW c={TL}>Two of each</KW> — one set per lung. There are also <Bold>two vena cavae</Bold>: one returns blood from the lower body, the other from the upper body. So the heart actually has 6 great vessels.</span> },
    { src: "Suppl", cat: "Named vessels", front: "Why is the pulmonary ARTERY unusual?", back: <span>It is the only artery in the body that carries <KW c={TL}>deoxygenated</KW> blood (from the right ventricle to the lungs). Its pair, the pulmonary VEIN, is similarly unusual — the only vein carrying oxygenated blood.</span> },
    { src: "Suppl", cat: "Named vessels", front: "Hodder: are arteries shown red and veins blue accurate?", back: <span>The colour convention is just for diagrams — real arteries and veins aren't literally red and blue. Oxygenated blood is <KW c={TL}>brighter red</KW>; deoxygenated blood is <KW c={TL}>darker red</KW>. Veins look bluish through the skin only because of how light passes through tissue.</span> },

    /* — Hodder blood detail (81-85) — */
    { src: "Suppl", cat: "Blood", front: "Hodder: how many red blood cells in 1 cm³ of blood?", back: <span>About <KW c={TL}>5 billion</KW> (5 × 10⁹) per cm³. A whole adult has 5–6 litres of blood, so the total is around 25 trillion RBCs.</span> },
    { src: "Suppl", cat: "Blood", front: "Hodder: how long does a red blood cell live, and what happens to it?", back: <span>About <KW c={TL}>4 months</KW>. Then broken down in the liver. The iron is <Bold>recycled</Bold>; the haem becomes the yellow pigment <Bold>bilirubin</Bold>, excreted in bile. About 1% of RBCs are replaced every day.</span> },
    { src: "Suppl", cat: "Blood", front: "Hodder: where are red and white blood cells made?", back: <span>In the <KW c={TL}>red bone marrow</KW> of certain bones — particularly the ribs, vertebrae and sternum.</span> },
    { src: "Suppl", cat: "Blood", front: "Hodder: ratio of WBCs to RBCs?", back: <span>About <KW c={TL}>1 WBC for every 600 RBCs</KW>. WBCs are larger and have a nucleus; RBCs have no nucleus and are smaller.</span> },
    { src: "Suppl", cat: "Blood", front: "Going further: what is the role of the foramen ovale in a fetus?", back: <span>A <KW c={TL}>hole between the right and left atria</KW> in the fetus. It allows blood to <Bold>bypass the lungs</Bold>, because fetal blood is oxygenated by the placenta. After birth the foramen ovale closes; failure to close = "hole in the heart".</span> },

    /* — Hodder clotting / immunity (86-90) — */
    { src: "Suppl", cat: "Clotting", front: "Hodder: how does a clot prevent infection?", back: <span>The <KW c={TL}>fibrin mesh and trapped RBCs</KW> physically block the wound, preventing pathogens entering. White blood cells (engulfed in or near the clot) destroy any bacteria that have already got in.</span> },
    { src: "Suppl", cat: "WBC types", front: "What are antibodies and antitoxins?", back: <span><KW c={TL}>Antibodies</KW> = proteins made by lymphocytes that attach to specific pathogens, marking them for destruction or making them clump together.<br/><KW c={TL}>Antitoxins</KW> = proteins that neutralise the toxins released by pathogens.</span> },
    { src: "Suppl", cat: "WBC types", front: "How can phagocytes escape into infected tissue?", back: <span>By <KW c={TL}>squeezing between capillary wall cells</KW> ("diapedesis"). The leaky capillary walls allow this, so phagocytes patrol everywhere in the body.</span> },
    { src: "Suppl", cat: "WBC types", front: "Hodder: which type of WBC is more numerous?", back: <span>The <KW c={TL}>phagocytes and lymphocytes</KW> are the two most numerous types of WBC. There are other minor types (e.g. monocytes, eosinophils), but only phagocytes and lymphocytes are required for IGCSE Extended.</span> },
    { src: "Suppl", cat: "Clotting", front: "Why is haemophilia a serious condition?", back: <span>Haemophilia is a genetic condition where one of the <KW c={TL}>clotting cascade enzymes</KW> is missing or faulty. So when a person is wounded, the clot doesn't form properly → continuous bleeding even from small cuts. Sufferers need clotting-factor injections.</span> },
  ];

  const [filter, setFilter] = useState("All");
  const [srcFilter, setSrcFilter] = useState("All");
  const [flipped, setFlipped] = useState({});
  const categories = ["All", ...Array.from(new Set(cards.map(c => c.cat)))];
  const sources = ["All", "SME", "Suppl"];
  const visible = cards.filter(c =>
    (filter === "All" || c.cat === filter) &&
    (srcFilter === "All" || c.src === srcFilter)
  );

  const sourceMeta = {
    SME:   { color: TL,        label: "SME",   bg: TLL,       title: "Save My Exams card" },
    Suppl: { color: "#7a6a40", label: "SUPPL", bg: "#f6f1e3", title: "NLCS supplementary card" },
  };

  return (
    <div>
      <div style={{ background: TL, color: "#fff", padding: "12px 18px", borderRadius: 10, marginBottom: 14, fontSize: 13, lineHeight: 1.55 }}>
        <strong>🃏 Flashcards.</strong> Click any card to flip. <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = Save My Exams card · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary card for deeper coverage.
      </div>

      {/* Source filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>SOURCE:</span>
        {sources.map(s => (
          <button key={s} onClick={() => { setSrcFilter(s); setFlipped({}); }} style={{
            padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 700, cursor: "pointer",
            border: `1.5px solid ${TL}`,
            background: srcFilter === s ? TL : "#fff",
            color: srcFilter === s ? "#fff" : TL,
          }}>
            {s === "All" ? `All (${cards.length})` : `${s} (${cards.filter(c => c.src === s).length})`}
          </button>
        ))}
      </div>

      {/* Category filter */}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14, alignItems: "center" }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: GR, marginRight: 4 }}>TOPIC:</span>
        {categories.map(cat => {
          const count = cat === "All"
            ? cards.filter(c => srcFilter === "All" || c.src === srcFilter).length
            : cards.filter(c => c.cat === cat && (srcFilter === "All" || c.src === srcFilter)).length;
          return (
            <button key={cat} onClick={() => { setFilter(cat); setFlipped({}); }} style={{
              padding: "5px 11px", borderRadius: 6, fontSize: 11.5, fontWeight: 600, cursor: "pointer",
              border: `1.5px solid ${TL}`,
              background: filter === cat ? TL : "#fff",
              color: filter === cat ? "#fff" : TL,
              opacity: count === 0 ? 0.4 : 1,
            }}>{cat} ({count})</button>
          );
        })}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 12 }}>
        {visible.map((c, i) => {
          const key = `${filter}-${srcFilter}-${i}`;
          const isFlipped = !!flipped[key];
          const isExt = c.ext === true || (typeof c.front === "string" && (c.front.includes("(EXT)") || c.front.includes("Extended Tier"))) || (c.back && c.back.props && typeof c.back.props.children === "object" && JSON.stringify(c.back.props.children).includes("Extended Tier"));
          const sm = sourceMeta[c.src];
          const hasDiag = !!(c.frontDiagram || c.backDiagram);
          return (
            <div key={key} onClick={() => setFlipped({ ...flipped, [key]: !isFlipped })} style={{
              background: isFlipped ? sm.bg : "#fff", border: `2px solid ${sm.color}`, borderRadius: 10,
              padding: 14, minHeight: hasDiag ? 320 : 160, cursor: "pointer", transition: "all 0.2s",
              display: "flex", flexDirection: "column", justifyContent: "space-between"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, gap: 6 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: sm.color, textTransform: "uppercase", letterSpacing: 0.5, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {c.cat} · #{i + 1}
                </div>
                <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                  {hasDiag && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: AM, color: "#fff" }}>DIAGRAM</span>}
                  {isExt && <span style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: PU, color: "#fff" }}>EXT</span>}
                  <span title={sm.title} style={{ fontSize: 9, fontWeight: 700, padding: "2px 5px", borderRadius: 3, background: sm.color, color: "#fff" }}>{sm.label}</span>
                </div>
              </div>
              {!isFlipped ? (
                <div style={{ fontSize: 13.5, fontWeight: 600, color: GR, lineHeight: 1.5, flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", whiteSpace: "pre-line" }}>
                  <div>{c.front}</div>
                  {c.frontDiagram && <div style={{ marginTop: 8 }}>{c.frontDiagram}</div>}
                </div>
              ) : (
                <div style={{ fontSize: 12.5, color: GR, lineHeight: 1.65, flex: 1 }}>
                  {c.back}
                  {c.backDiagram && <div style={{ marginTop: 8 }}>{c.backDiagram}</div>}
                </div>
              )}
              <div style={{ fontSize: 10, color: sm.color, textAlign: "right", marginTop: 8, fontWeight: 600 }}>
                {isFlipped ? "▲ click to hide" : "▼ click to reveal"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
