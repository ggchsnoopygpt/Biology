  /* ═══════════════════════════════════════════════════════════════════════

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ── Colour palette ──────────────────────────────────────────────────────────
const G = "#2d6a4f";   // forest green (chapter colour)
const GL = "#d8f3dc";  // light green
const GM = "#52b788";  // mid green
const AM = "#b5540a";  // amber
const AL = "#fff3e0";  // light amber
const PU = "#5b3fa6";  // purple
const PL = "#ede9fe";  // light purple
const RD = "#b02020";  // red
const RL = "#fdf0f0";  // light red
const GR = "#3d3d3d";  // dark grey text
const BD = "#e4e4e0";  // border

// ── Highlight / keyword helper ───────────────────────────────────────────────
const KW = ({ c = G, children }) => (
  <span style={{ background: c === G ? GL : c === AM ? AL : c === PU ? PL : RL,
    color: c, fontWeight: 700, borderRadius: 3, padding: "1px 5px", fontSize: "0.95em" }}>
    {children}
  </span>
);
const Bold = ({ children }) => <strong style={{ color: GR }}>{children}</strong>;
const Ext = () => (
  <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: PL, color: PU, fontWeight: 700, marginLeft: 4 }}>EXT</span>
);

// ── Tab config ───────────────────────────────────────────────────────────────
const TL = "#1a7a6e";   // teal (flashcard tab)
const TLL = "#e6f4f2";  // light teal

// ════════════════════════════════════════════════════════════════════════════
// CHAPTER METADATA — only edit this block when creating a new chapter
// ════════════════════════════════════════════════════════════════════════════
const CHAPTER_META = {
  number: 9,
  title: "Transport in Animals",
  subtitle: "Circulation · Heart · Blood vessels · Blood components · Clotting · CHD",
  flashcardCount: 105,
};

// ════════════════════════════════════════════════════════════════════════════
// TABS — standard 5-tab structure, identical across all chapters
// Do NOT modify this array; only CHAPTER_META above is chapter-specific.
// ════════════════════════════════════════════════════════════════════════════
const TABS = [
  { id: "essence",   label: "① Quick Essence",  color: AM, bg: AL,  sub: "Last-minute 5-min review" },
  { id: "exam",      label: "② Exam Practice",  color: RD, bg: RL,  sub: "Past & predicted questions" },
  { id: "summary",   label: "③ Summary",        color: PU, bg: PL,  sub: "Concept flow & key tables" },
  { id: "textbook",  label: "④ Textbook",       color: G,  bg: GL,  sub: "Hodder complete notes" },
  { id: "flashcard", label: "⑤ SME Flashcard",  color: TL, bg: TLL, sub: "Save My Exams · click to flip" },
];

// ════════════════════════════════════════════════════════════════════════════
// SVG DIAGRAMS — freshly redesigned for Ch.9 Transport in Animals
// ════════════════════════════════════════════════════════════════════════════

// ── Double circulation overview ─────────────────────────────────────────────
function DoubleCirculationSVG() {
  return (
    <svg viewBox="0 0 700 460" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="460" rx="12" fill="#fafafa" stroke={G} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={G}>
        Double circulation — two loops, heart in the middle
      </text>

      {/* Lungs at top */}
      <rect x="260" y="40" width="180" height="50" rx="10" fill="#ffe8e8" stroke={RD} strokeWidth="1.5"/>
      <text x="350" y="62" textAnchor="middle" fontSize="13" fontWeight="700" fill={RD}>LUNGS</text>
      <text x="350" y="78" textAnchor="middle" fontSize="10" fill="#666">pulmonary capillaries · gas exchange</text>

      {/* Heart in middle */}
      <g transform="translate(280,180)">
        <path d="M 70,30 C 70,5 30,5 30,30 C 30,5 -10,5 -10,30 C -10,55 30,85 30,85 C 30,85 70,55 70,30 Z" fill="#ffcdd2" stroke={RD} strokeWidth="2"/>
        <line x1="30" y1="0" x2="30" y2="85" stroke={GR} strokeWidth="1" strokeDasharray="3,2"/>
        <text x="0" y="-6" textAnchor="middle" fontSize="10" fontWeight="700" fill="#3399cc">RIGHT</text>
        <text x="60" y="-6" textAnchor="middle" fontSize="10" fontWeight="700" fill={RD}>LEFT</text>
        <text x="30" y="105" textAnchor="middle" fontSize="13" fontWeight="700" fill={RD}>HEART</text>
        <text x="30" y="120" textAnchor="middle" fontSize="9.5" fill="#666">four chambers</text>
      </g>

      {/* Body at bottom */}
      <rect x="220" y="340" width="260" height="60" rx="10" fill="#fff3e0" stroke={AM} strokeWidth="1.5"/>
      <text x="350" y="365" textAnchor="middle" fontSize="13" fontWeight="700" fill={AM}>BODY TISSUES</text>
      <text x="350" y="382" textAnchor="middle" fontSize="10" fill="#666">muscles · brain · gut · kidneys · skin · etc.</text>

      {/* Pulmonary loop: right heart → lungs → left heart (blue going up, red coming down) */}
      {/* deoxy up to lungs */}
      <path d="M 280,180 Q 220,140 260,90" fill="none" stroke="#3399cc" strokeWidth="6" markerEnd="url(#arrUp)"/>
      <text x="200" y="135" fontSize="10.5" fontWeight="700" fill="#3399cc">Pulmonary</text>
      <text x="200" y="148" fontSize="10.5" fontWeight="700" fill="#3399cc">artery</text>
      <text x="180" y="162" fontSize="9" fill="#666">(deoxygenated)</text>
      {/* oxy back from lungs */}
      <path d="M 440,90 Q 480,140 410,180" fill="none" stroke={RD} strokeWidth="6" markerEnd="url(#arrDown)"/>
      <text x="465" y="135" fontSize="10.5" fontWeight="700" fill={RD}>Pulmonary</text>
      <text x="475" y="148" fontSize="10.5" fontWeight="700" fill={RD}>vein</text>
      <text x="465" y="162" fontSize="9" fill="#666">(oxygenated)</text>

      {/* Systemic loop: left heart → body → right heart */}
      {/* oxy down to body */}
      <path d="M 410,275 Q 470,310 410,340" fill="none" stroke={RD} strokeWidth="6" markerEnd="url(#arrDown)"/>
      <text x="465" y="305" fontSize="10.5" fontWeight="700" fill={RD}>Aorta</text>
      <text x="455" y="320" fontSize="9" fill="#666">(oxygenated)</text>
      {/* deoxy up from body */}
      <path d="M 290,340 Q 230,310 280,275" fill="none" stroke="#3399cc" strokeWidth="6" markerEnd="url(#arrUp)"/>
      <text x="170" y="305" fontSize="10.5" fontWeight="700" fill="#3399cc">Vena</text>
      <text x="170" y="318" fontSize="10.5" fontWeight="700" fill="#3399cc">cava</text>
      <text x="160" y="332" fontSize="9" fill="#666">(deoxygenated)</text>

      {/* Loop labels on the sides */}
      <text x="80" y="130" fontSize="12" fontWeight="700" fill={RD} transform="rotate(-90,80,130)">PULMONARY CIRCULATION</text>
      <text x="80" y="335" fontSize="12" fontWeight="700" fill={AM} transform="rotate(-90,80,335)">SYSTEMIC CIRCULATION</text>

      {/* Key */}
      <g transform="translate(40,420)">
        <rect x="0" y="0" width="20" height="10" fill={RD}/>
        <text x="26" y="9" fontSize="10" fill={GR}>oxygenated blood</text>

          <path d="M 0 0 L 10 5 L 0 10 Z" fill={RD}/>
        </marker>
      </defs>
    </svg>
  );
}

// ── Single (fish) vs double (mammal) circulation comparison ─────────────────
function SingleVsDoubleSVG() {
  return (
    <svg viewBox="0 0 700 350" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="350" rx="12" fill="#fafafa" stroke={PU} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={PU}>
        Single circulation (fish) vs Double circulation (mammal)
      </text>

      {/* LEFT: fish single circulation */}
      <g transform="translate(20,50)">
        <text x="155" y="0" textAnchor="middle" fontSize="13" fontWeight="700" fill={G}>FISH — single circulation</text>
        <text x="155" y="15" textAnchor="middle" fontSize="10" fill="#666">2-chambered heart · blood passes heart ONCE per circuit</text>

        {/* Gills */}
        <rect x="100" y="35" width="110" height="36" rx="8" fill="#ffe8e8" stroke={RD} strokeWidth="1.5"/>

// ── Coronary artery & atheroma ──────────────────────────────────────────────
function CoronaryAtheromaSVG() {
  return (
    <svg viewBox="0 0 700 380" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="380" rx="12" fill="#fafafa" stroke={RD} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={RD}>
        Coronary heart disease — atheroma in a coronary artery
      </text>

      {/* Three stages: A normal | B atheroma forming | C clot blocks vessel */}
      {[0,1,2].map(i => {
        const x0 = 30 + i * 225;
        const labels = ["A. Normal artery", "B. Atheroma forming", "C. Clot blocks vessel"];
        const subs = ["smooth lining · open lumen", "fatty plaque builds up · narrows lumen", "rough surface → clot → heart attack"];
        return (
          <g key={i} transform={`translate(${x0},60)`}>
            <text x="100" y="0" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>{labels[i]}</text>
            <text x="100" y="14" textAnchor="middle" fontSize="9.5" fill="#666">{subs[i]}</text>

            {/* artery wall - longitudinal section */}
            <rect x="10" y="40" width="180" height="14" fill="#d49a82" stroke="#7a3c2f" strokeWidth="1"/>
            <rect x="10" y="130" width="180" height="14" fill="#d49a82" stroke="#7a3c2f" strokeWidth="1"/>
            {/* lumen background */}
            <rect x="10" y="54" width="180" height="76" fill="#ffe8e8"/>

            {i === 0 && (
              <>
                {/* smooth lining + blood cells */}
                <line x1="10" y1="54" x2="190" y2="54" stroke="#a05050" strokeWidth="1"/>
                <line x1="10" y1="130" x2="190" y2="130" stroke="#a05050" strokeWidth="1"/>
                {[0,1,2,3,4,5,6].map(j => (
                  <ellipse key={j} cx={25 + j*22} cy={92 + (j%2)*8} rx="9" ry="5" fill={RD} stroke="#7a0000" strokeWidth="0.5"/>
                ))}
                <path d="M 50,92 L 170,92" fill="none" stroke={RD} strokeWidth="2" markerEnd="url(#flowArrow)"/>
                <text x="100" y="170" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">good flow</text>
              </>
            )}

            {i === 1 && (
              <>
                {/* plaque bulging into lumen */}
                <path d="M 10,54 L 30,54 Q 60,72 100,72 Q 140,72 170,60 L 190,54 L 190,54" fill="#ffd54f" stroke="#a07000" strokeWidth="0.8"/>
                <path d="M 10,130 L 40,130 Q 70,110 100,108 Q 140,108 170,118 L 190,130" fill="#ffd54f" stroke="#a07000" strokeWidth="0.8"/>
                <text x="100" y="86" textAnchor="middle" fontSize="8" fill="#a07000">PLAQUE</text>
                {[0,1,2,3].map(j => (
                  <ellipse key={j} cx={45 + j*30} cy="92" rx="7" ry="4" fill={RD} stroke="#7a0000" strokeWidth="0.5"/>
                ))}
                <path d="M 50,92 L 160,92" fill="none" stroke={RD} strokeWidth="1.5" markerEnd="url(#flowArrow)"/>
                <text x="100" y="170" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">flow restricted → ANGINA</text>
              </>
            )}

            {i === 2 && (
              <>
                {/* large plaque + clot completely blocks */}
                <path d="M 10,54 L 30,54 Q 70,80 100,86 Q 140,86 170,68 L 190,54" fill="#ffd54f" stroke="#a07000" strokeWidth="0.8"/>
                <path d="M 10,130 L 40,130 Q 80,105 100,100 Q 140,100 170,120 L 190,130" fill="#ffd54f" stroke="#a07000" strokeWidth="0.8"/>
                {/* clot */}
                <ellipse cx="100" cy="93" rx="35" ry="10" fill="#7a0000" stroke="#3d0000" strokeWidth="1"/>
                <text x="100" y="96" textAnchor="middle" fontSize="9" fontWeight="700" fill="#fff">CLOT</text>
                <text x="100" y="170" textAnchor="middle" fontSize="9" fill={RD} fontStyle="italic" fontWeight="700">BLOCKED → HEART ATTACK</text>
              </>
            )}

            <text x="100" y="200" textAnchor="middle" fontSize="9" fill="#444">artery wall (top &amp; bottom)</text>
          </g>
        );
      })}

      <defs>
        <marker id="flowArrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill={RD}/>
        </marker>
      </defs>

      {/* risk factors mini box */}
      <g transform="translate(80,310)">
        <rect x="0" y="0" width="540" height="50" rx="6" fill={RL} stroke={RD} strokeWidth="1"/>
        <text x="270" y="17" textAnchor="middle" fontSize="11" fontWeight="700" fill={RD}>Major risk factors for coronary heart disease</text>
        <text x="270" y="33" textAnchor="middle" fontSize="10" fill={GR}>POOR DIET (saturated fat) · SMOKING · STRESS · LACK OF EXERCISE · AGE · GENDER (male) · GENETICS</text>
        <text x="270" y="46" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">Diet + exercise + not smoking are the modifiable ones</text>
      </g>
    </svg>
  );
}

// ── Blood clotting (fibrinogen → fibrin → clot) ───────────────────────────
function BloodClottingSVG() {
  return (
    <svg viewBox="0 0 700 400" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="400" rx="12" fill="#fafafa" stroke={RD} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={RD}>
        Blood clotting — from wound to scab in 3 stages
      </text>

      {/* Three stages side by side */}
      {[0,1,2].map(i => {
        const x0 = 30 + i * 225;
        const titles = ["① Wound opens", "② Platelets release chemicals", "③ Fibrin mesh traps RBCs"];
        return (
          <g key={i} transform={`translate(${x0},50)`}>
            <text x="100" y="0" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>{titles[i]}</text>

            {/* skin top/bottom */}
            <rect x="0" y="50" width="200" height="20" fill="#f5d4a0" stroke="#7a5500" strokeWidth="0.8"/>
            <rect x="0" y="220" width="200" height="20" fill="#f5d4a0" stroke="#7a5500" strokeWidth="0.8"/>
            <text x="100" y="64" textAnchor="middle" fontSize="8" fill="#7a5500">skin</text>

            {/* blood vessel walls */}
            <line x1="0" y1="100" x2="200" y2="100" stroke="#9c5050" strokeWidth="1.5"/>
            <line x1="0" y1="190" x2="200" y2="190" stroke="#9c5050" strokeWidth="1.5"/>

            {/* wound break */}
            {i >= 0 && (
              <>
                <path d="M 80,70 L 100,140 L 90,180 L 120,220 L 120,70 L 80,70 Z" fill="#ffe8e8" stroke={RD} strokeWidth="1"/>
                <text x="100" y="148" textAnchor="middle" fontSize="9" fill={RD} fontStyle="italic">wound</text>
              </>
            )}

            {/* blood cells inside vessel */}
            {[0,1,2,3,4,5,6,7].map(j => {
              const cx = 20 + (j%4) * 45;
              const cy = 120 + Math.floor(j/4) * 40;
              // skip cells in the wound region
              if (cx > 70 && cx < 130) return null;
              return <ellipse key={j} cx={cx} cy={cy} rx="8" ry="5" fill={RD} stroke="#7a0000" strokeWidth="0.5"/>;
            })}

            {/* Stage-specific overlay */}
            {i === 1 && (
              <>
                {/* platelets */}
                {[0,1,2,3,4,5].map(j => (
                  <circle key={j} cx={85 + (j%3)*10} cy={130 + Math.floor(j/3)*30} r="3.5" fill="#d4b350" stroke="#7a5500" strokeWidth="0.4"/>
                ))}
                <text x="100" y="105" textAnchor="middle" fontSize="9" fill="#7a5500" fontWeight="700">platelets gather</text>
                <text x="100" y="215" textAnchor="middle" fontSize="9" fill="#a04000" fontStyle="italic">+ release chemicals</text>
              </>
            )}

            {i === 2 && (
              <>
                {/* fibrin mesh */}
                {[0,1,2,3,4,5,6,7,8].map(j => (
                  <line key={j}
                    x1={75 + j*5} y1="100"
                    x2={120 - j*4} y2="180"
                    stroke="#7a3c2f" strokeWidth="0.8"/>
                ))}
                {[0,1,2,3,4,5,6].map(j => (
                  <line key={j}
                    x1={75} y1={100 + j*12}
                    x2={120} y2={100 + j*12 + 5}
                    stroke="#7a3c2f" strokeWidth="0.8"/>
                ))}
                {/* trapped RBCs */}
                {[0,1,2,3].map(j => (
                  <ellipse key={j} cx={90 + (j%2)*15} cy={120 + Math.floor(j/2)*30} rx="7" ry="4" fill={RD} stroke="#7a0000" strokeWidth="0.5"/>
                ))}
                <text x="100" y="252" textAnchor="middle" fontSize="9" fill="#7a3c2f" fontWeight="700">CLOT</text>
              </>
            )}

            <text x="100" y="278" textAnchor="middle" fontSize="9" fill="#666" fontStyle="italic">
              {i === 0 ? "RBCs flow free in vessel" : i === 1 ? "soluble fibrinogen still in plasma" : "fibrin = insoluble mesh"}
            </text>
          </g>
        );
      })}

      {/* Reaction summary at bottom */}
      <g transform="translate(50,310)">
        <rect x="0" y="0" width="600" height="70" rx="6" fill={RL} stroke={RD} strokeWidth="1"/>
        <text x="300" y="22" textAnchor="middle" fontSize="12" fontWeight="700" fill={RD}>
          The key conversion (Extended)
        </text>
        <text x="300" y="44" textAnchor="middle" fontSize="13" fill={GR}>
          <tspan fontWeight="700" fill="#a07000">FIBRINOGEN</tspan>
          <tspan fill="#666"> (soluble, in plasma) </tspan>
          <tspan fontWeight="700" fill={RD}> → </tspan>
          <tspan fontWeight="700" fill="#7a3c2f">FIBRIN</tspan>
          <tspan fill="#666"> (insoluble mesh → traps RBCs → CLOT → dries → SCAB)</tspan>
        </text>
        <text x="300" y="60" textAnchor="middle" fontSize="9.5" fill="#666" fontStyle="italic">
          Triggered by chemicals released from platelets when a vessel is cut
        </text>
      </g>
    </svg>
  );
}

// ── Cardiac cycle diagram (atria contract → ventricles contract → relax) ──
function CardiacCycleSVG() {
  return (
    <svg viewBox="0 0 700 320" style={{ width: "100%", maxWidth: 700, display: "block", margin: "10px auto" }}>
      <rect width="700" height="320" rx="12" fill="#fafafa" stroke={RD} strokeWidth="1.5"/>
      <text x="350" y="22" textAnchor="middle" fontFamily="Georgia,serif" fontSize="14" fontWeight="700" fill={RD}>
        Cardiac cycle — three phases of one heartbeat (Extended)
      </text>

      {[0,1,2].map(i => {
        const x0 = 30 + i * 225;
        const titles = ["Phase 1: Atria contract", "Phase 2: Ventricles contract", "Phase 3: Ventricles relax"];
        const subs = ["AV valves OPEN · SL closed", "AV valves CLOSE · SL OPEN", "AV valves open · SL close"];
        return (
          <g key={i} transform={`translate(${x0},55)`}>
            <text x="100" y="0" textAnchor="middle" fontSize="11" fontWeight="700" fill={RD}>{titles[i]}</text>
            <text x="100" y="14" textAnchor="middle" fontSize="9.5" fill="#666">{subs[i]}</text>

            {/* simple heart outline */}
            <g transform="translate(50,30)">
              <rect x="0" y="0" width="100" height="50" rx="5" fill="#ffe0e0" stroke={RD} strokeWidth="1"/>
              <line x1="50" y1="0" x2="50" y2="50" stroke={GR} strokeWidth="0.5" strokeDasharray="2,2"/>
              {/* atria (top half) */}
              {/* ventricles (bottom half) */}
              <rect x="0" y="60" width="100" height="90" rx="5" fill="#ffcdd2" stroke={RD} strokeWidth="1.5"/>
              <line x1="50" y1="60" x2="50" y2="150" stroke={GR} strokeWidth="0.5" strokeDasharray="2,2"/>

              {/* phase-specific: atria contraction lines */}
              {i === 0 && (
                <>
                  <text x="50" y="30" textAnchor="middle" fontSize="10" fontWeight="700" fill={RD}>squeeze ↓</text>
                  <text x="50" y="100" textAnchor="middle" fontSize="9" fill="#666">filling</text>
                  <line x1="25" y1="50" x2="25" y2="60" stroke={G} strokeWidth="2.5"/>
                  <text x="22" y="68" fontSize="7" fill={G}>AV ↓</text>
                </>
              )}
              {i === 1 && (
                <>
                  <text x="50" y="30" textAnchor="middle" fontSize="9" fill="#666">filling</text>
                  <text x="50" y="100" textAnchor="middle" fontSize="10" fontWeight="700" fill={RD}>squeeze ↑</text>
                  {/* AV valves closed */}
                  <line x1="22" y1="55" x2="78" y2="55" stroke={RD} strokeWidth="2"/>
                  <text x="50" y="51" textAnchor="middle" fontSize="7" fill={RD}>AV closed</text>
                  {/* SL valves open at top → arrow up */}
                  <path d="M 50,0 L 50,-12" stroke={RD} strokeWidth="2" markerEnd="url(#cdArr)"/>
                  <text x="65" y="-8" fontSize="7" fill={RD}>SL open</text>
                </>
              )}
              {i === 2 && (
                <>
                  <text x="50" y="30" textAnchor="middle" fontSize="9" fill="#666">fills again</text>
                  <text x="50" y="100" textAnchor="middle" fontSize="9" fill="#666">relax · refill</text>
                  {/* SL valves closed at top */}
                  <line x1="42" y1="3" x2="58" y2="3" stroke={RD} strokeWidth="2"/>
                  <text x="80" y="6" fontSize="7" fill={RD}>SL closed</text>
                  {/* AV valves open */}
                  <line x1="25" y1="55" x2="35" y2="65" stroke={G} strokeWidth="2"/>
                  <line x1="65" y1="65" x2="75" y2="55" stroke={G} strokeWidth="2"/>
                </>
              )}
            </g>

            <text x="100" y="220" textAnchor="middle" fontSize="9" fill={GR} fontStyle="italic">
              {i === 0 ? "blood pushed atrium → ventricle" : i === 1 ? "blood pushed into aorta / PA" : "fills from veins"}
            </text>
          </g>
        );
      })}

      <defs>
        <marker id="cdArr" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 Z" fill={RD}/>
        </marker>
      </defs>

      <text x="350" y="280" textAnchor="middle" fontSize="10" fill={GR}>
        "lub" sound = AV valves closing (phase 2 start) · "dub" sound = SL valves closing (phase 3 start)
      </text>
    </svg>
  );
}

// ── ATP1: pulse rate decay graph (Hard 1) ───────────────────────────────────
function ATPPulseGraphSVG() {
  // Data points: t=0 → 156, t=1 → 108, t=2 → 78, t=3 → 66, t=4 → 62, t=5 → 62
  // Plot on a coordinate grid 60-160 bpm vs 0-5 min
  const xs = [0, 1, 2, 3, 4, 5];
  const ys = [156, 108, 78, 66, 62, 62];
  // Map to SVG coords: x from 60 (t=0) to 380 (t=5); y from 30 (160 bpm) to 230 (60 bpm)
  const px = t => 60 + t * 64;
  const py = bpm => 30 + (160 - bpm) * 2;
  const points = xs.map((t, i) => `${px(t)},${py(ys[i])}`).join(" ");
  return (
    <svg viewBox="0 0 420 280" style={{ width: "100%", maxWidth: 420, display: "block", margin: "8px auto" }}>
      <rect width="420" height="280" rx="8" fill="#fafafa" stroke={RD} strokeWidth="1"/>

        Pulse rate / bpm vs time after exercise / min
      </text>
      {/* Gridlines */}
      <g stroke="#e0e0e0" strokeWidth="0.5">
        {[0,1,2,3,4,5].map(t => <line key={t} x1={px(t)} y1="30" x2={px(t)} y2="230"/>)}
        {[60,80,100,120,140,160].map(bpm => <line key={bpm} x1="60" y1={py(bpm)} x2="380" y2={py(bpm)}/>)}
      </g>
      {/* Axes */}
      <line x1="60" y1="30" x2="60" y2="230" stroke={GR} strokeWidth="1.5"/>
      <line x1="60" y1="230" x2="380" y2="230" stroke={GR} strokeWidth="1.5"/>
      {/* Axis labels */}
      {[60,80,100,120,140,160].map(bpm => (
        <g key={bpm}>
          <line x1="56" y1={py(bpm)} x2="60" y2={py(bpm)} stroke={GR} strokeWidth="1"/>
          <text x="50" y={py(bpm)+3} textAnchor="end" fontSize="9" fill={GR}>{bpm}</text>
        </g>
      ))}
      {[0,1,2,3,4,5].map(t => (
        <g key={t}>
          <line x1={px(t)} y1="230" x2={px(t)} y2="234" stroke={GR} strokeWidth="1"/>
          <text x={px(t)} y="246" textAnchor="middle" fontSize="9" fill={GR}>{t}</text>
        </g>
      ))}
      <text x="20" y="130" fontSize="10" fontWeight="700" fill={GR} transform="rotate(-90,20,130)">pulse rate / bpm</text>
      <text x="220" y="265" textAnchor="middle" fontSize="10" fontWeight="700" fill={GR}>time after exercise / min</text>
      {/* Line of best fit (smooth curve) */}
      <polyline points={points} fill="none" stroke={RD} strokeWidth="1.8"/>
      {/* Plotted points (crosses) */}
      {xs.map((t, i) => (
        <g key={i} stroke={RD} strokeWidth="1.8">
          <line x1={px(t)-4} y1={py(ys[i])-4} x2={px(t)+4} y2={py(ys[i])+4}/>
          <line x1={px(t)-4} y1={py(ys[i])+4} x2={px(t)+4} y2={py(ys[i])-4}/>
        </g>
      ))}
    </svg>
  );
}

    { id: "SME",    label: "SME Theory",   color: TL,        bg: TLL,       title: "Save My Exams Theory Questions (Easy / Medium / Hard)" },
    { id: "SME-ATP", label: "SME ATP",     color: "#5b3fa6", bg: PL,        title: "Save My Exams Alternative to Practical (Paper 6) — investigative skills" },
    { id: "SME-MCQ", label: "SME MCQ",     color: "#b85c00", bg: "#fff4e6", title: "Save My Exams Multiple Choice — Paper 1 single-mark items" },
    { id: "Suppl",  label: "NLCS suppl.",  color: "#7a6a40", bg: "#f6f1e3", title: "NLCS supplementary questions" },
  ];

  const filtered = qs.filter(q =>
    (diff === "all" || q.diff === diff) &&
    (topic === "all" || q.topic === topic) &&
    (src === "all" || q.src === src)
  );

  const totalMarks = filtered.reduce((s, q) => s + q.marks, 0);
  const revealedCount = filtered.filter(q => rev[q.id]).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Header */}
      <div style={{ background: RD, color: "#fff", borderRadius: 10, padding: "12px 18px", fontSize: 13, lineHeight: 1.55 }}>
        <div style={{ fontWeight: 700, marginBottom: 3 }}>📝 Exam Practice — Infinite Test Bank</div>
        <div style={{ fontSize: 12, opacity: 0.95 }}>
          Filter by source, difficulty &amp; topic · Try first, then reveal · ★★★ = frequently examined · <span style={{ background: "#fff", color: G, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>HODDER</span> = official textbook · <span style={{ background: "#fff", color: TL, fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SME</span> = Save My Exams · <span style={{ background: "#fff", color: "#7a6a40", fontWeight: 700, padding: "1px 5px", borderRadius: 3, fontSize: 11 }}>SUPPL</span> = NLCS supplementary
        </div>
      </div>

      {/* Source filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>SOURCE</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {srcs.map(s => {
            const count = qs.filter(q => s.id === "all" || q.src === s.id).length;
            return (
              <button key={s.id} onClick={() => setSrc(s.id)} title={s.title}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: src === s.id ? `2px solid ${s.color}` : `1.5px solid ${BD}`,
                  background: src === s.id ? s.color : "#fff",
                  color: src === s.id ? "#fff" : s.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {s.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Difficulty filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>DIFFICULTY</div>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {diffs.map(d => {
            const count = qs.filter(q => d.id === "all" || q.diff === d.id).length;
            return (
              <button key={d.id} onClick={() => setDiff(d.id)}
                style={{
                  padding: "6px 12px", borderRadius: 6,
                  border: diff === d.id ? `2px solid ${d.color}` : `1.5px solid ${BD}`,
                  background: diff === d.id ? d.color : "#fff",
                  color: diff === d.id ? "#fff" : d.color,
                  fontSize: 11, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {d.label} <span style={{ opacity: 0.8, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Topic filter */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#666", marginBottom: 5, letterSpacing: 0.5 }}>TOPIC</div>
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
          {topics.map(t => {
            const count = qs.filter(q => t.id === "all" || q.topic === t.id).length;
            return (
              <button key={t.id} onClick={() => setTopic(t.id)}
                style={{
                  padding: "5px 10px", borderRadius: 14,
                  border: topic === t.id ? `2px solid ${t.color}` : `1.5px solid ${BD}`,
                  background: topic === t.id ? t.color : "#fff",
                  color: topic === t.id ? "#fff" : t.color,
                  fontSize: 10.5, fontWeight: 700, cursor: "pointer", transition: "all .15s",
                }}>
                {t.label} <span style={{ opacity: 0.75, fontWeight: 500 }}>({count})</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Stats bar */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
        background: RL, borderRadius: 8, padding: "8px 14px", fontSize: 12, color: RD, flexWrap: "wrap", gap: 8 }}>
        <div>
          <Bold>{filtered.length}</Bold> question{filtered.length !== 1 ? "s" : ""} ·
          <Bold> /{totalMarks} marks total</Bold> ·
          <span style={{ color: "#666" }}> {revealedCount} revealed</span>
        </div>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setRev({})} style={{
            padding: "5px 10px", borderRadius: 5, fontSize: 11, fontWeight: 600, cursor: "pointer",
            border: `1.5px solid ${RD}`, background: "#fff", color: RD,
          }}>Hide all</button>
        </div>
      </div>

      {filtered.length === 0 && (
        <div style={{ textAlign: "center", padding: "30px 20px", color: "#999", fontSize: 13, background: "#f8f8f6", borderRadius: 10 }}>
          No questions match the selected filters. Try a different combination.
        </div>
      )}

      {/* Question cards */}
      {filtered.map(q => {
        const diffMeta = diffs.find(d => d.id === q.diff);
        const topicMeta = topics.find(t => t.id === q.topic);
        return (
          <div key={q.id} style={{ border: `1.5px solid ${BD}`, borderRadius: 10, overflow: "hidden" }}>
            <div style={{ background: diffMeta.bg, padding: "10px 16px", borderBottom: `1px solid ${BD}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 3, padding: "2px 7px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.5 }}>{q.diff.toUpperCase()}</span>
                  <span style={{ color: topicMeta.color, fontWeight: 700, fontSize: 10.5, padding: "2px 7px", border: `1px solid ${topicMeta.color}`, borderRadius: 3 }}>{topicMeta.label}</span>
                  {q.ext && <span style={{ background: PU, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700 }}>EXT</span>}
                  {q.src && (() => {
                    const srcStyle = q.src === "Hodder"
                      ? { color: G,         label: "HODDER",  title: "Hodder textbook official question" }
                      : q.src === "SME"
                      ? { color: TL,        label: "SME",     title: "Save My Exams Theory Question" }
                      : q.src === "SME-ATP"
                      ? { color: "#5b3fa6", label: "SME-ATP", title: "Save My Exams Alternative to Practical (Paper 6)" }
                      : q.src === "SME-MCQ"
                      ? { color: "#b85c00", label: "SME-MCQ", title: "Save My Exams Multiple Choice (Paper 1)" }
                      :                       { color: "#7a6a40", label: "SUPPL",  title: "NLCS supplementary question" };
                    return (
                      <span title={srcStyle.title}
                        style={{ background: srcStyle.color, color: "#fff", borderRadius: 3, padding: "2px 6px", fontSize: 9.5, fontWeight: 700, letterSpacing: 0.4 }}>
                        {srcStyle.label}
                      </span>
                    );
                  })()}
                  <span style={{ color: diffMeta.color, fontSize: 12 }}>{q.star}</span>
                </div>
                <span style={{ background: diffMeta.color, color: "#fff", borderRadius: 14, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>[{q.marks} mark{q.marks !== 1 ? "s" : ""}]</span>
              </div>
              <div style={{ fontSize: 13, color: "#2a0000", lineHeight: 1.6, fontWeight: 500, whiteSpace: "pre-line" }}>{q.q}</div>
              <div style={{ fontSize: 11, color: "#888", marginTop: 5, fontStyle: "italic" }}>💭 Hint: {q.hint}</div>
            </div>
            <div style={{ padding: "10px 16px", background: "#fff" }}>
              {rev[q.id] ? (
                <>
                  <div style={{ fontSize: 12, whiteSpace: "pre-line", background: "#f8f8f6", borderRadius: 8, padding: "10px 14px", borderLeft: `3px solid ${diffMeta.color}`, lineHeight: 1.7, color: GR }}>
                    {q.a}
                  </div>
                  <button onClick={() => toggle(q.id)} style={{ marginTop: 8, background: "none", border: `1px solid ${diffMeta.color}`, color: diffMeta.color, borderRadius: 6, padding: "5px 14px", fontSize: 11, cursor: "pointer", fontWeight: 600 }}>
                    Hide answer
                  </button>
                </>
              ) : (
                <button onClick={() => toggle(q.id)} style={{ background: diffMeta.color, color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
                  Show answer
                </button>
              )}
            </div>
          </div>
        );
      })}

      {/* Footer note */}
      <div style={{ marginTop: 8, padding: "10px 14px", background: RL, borderRadius: 8, fontSize: 11, color: RD, textAlign: "center", lineHeight: 1.55 }}>
        💡 <Bold>Infinite test mode:</Bold> {qs.length} questions loaded. Add more by appending to the <code style={{ background: "#fff", padding: "1px 5px", borderRadius: 3 }}>qs</code> array — the filters &amp; stats update automatically.
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// ③ SUMMARY TAB — 1st-stage summary with concept flow & key tables
// ════════════════════════════════════════════════════════════════════════════
function SummaryTab() {
  const [open, setOpen] = useState({ A: true, B: true, C: false, D: false, E: false, F: false, G: false, H: false });
  const t = (k) => setOpen(p => ({ ...p, [k]: !p[k] }));

  const Sec = ({ id, title, children }) => (
    <div style={{ border: `1.5px solid ${PU}`, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
      <button onClick={() => t(id)} style={{
        width: "100%", textAlign: "left", padding: "10px 16px",
        background: PU, color: "#fff", border: "none", cursor: "pointer",
        fontSize: 13.5, fontWeight: 700, display: "flex", justifyContent: "space-between", alignItems: "center",
      }}>
        <span>{title}</span>
        <span style={{ fontSize: 14 }}>{open[id] ? "▼" : "▶"}</span>
      </button>
      {open[id] && <div style={{ padding: "14px 18px", background: "#fff", fontSize: 13, lineHeight: 1.65 }}>{children}</div>}
    </div>
  );

  return (
    <div>
      <div style={{ background: PU, color: "#fff", borderRadius: 10, padding: "12px 18px", marginBottom: 14, fontSize: 13 }}>
        <strong>📚 1st-stage summary.</strong> Concept maps · key tables · big-picture overview before diving into the textbook.
      </div>

      <Sec id="A" title="A · The Big Picture — Why animals need a circulatory system">
        <p style={{ marginTop: 0 }}>
          Diffusion alone is too slow for a large multicellular animal. A 70 kg human has cells many centimetres from any external surface — oxygen, glucose, hormones and waste cannot move that far through tissues by diffusion in any useful time. The solution is a <KW c={PU}>circulatory system</KW>: a network of <Bold>blood vessels</Bold>, a muscular <Bold>pump</Bold> (the heart), and one-way <Bold>valves</Bold>.
        </p>
        <ul>
          <li><KW c={G}>Blood vessels</KW> — arteries (away from heart), veins (towards heart), capillaries (exchange sites).</li>
          <li><KW c={AM}>Pump</KW> — the heart contracts rhythmically to keep blood moving against resistance.</li>
          <li><KW c={RD}>Valves</KW> — found in the heart and in veins. They ensure blood flows in one direction only.</li>
        </ul>
        <div style={{ background: GL, padding: "10px 14px", borderLeft: `4px solid ${G}`, borderRadius: 4, marginTop: 10 }}>
          <Bold>Key idea:</Bold> the circulatory system is the body's <em>delivery and removal service</em>. Plasma carries the dissolved substances; red cells carry the oxygen; white cells defend the body; platelets repair leaks.
        </div>
      </Sec>

      <Sec id="B" title="B · Single (fish) vs Double (mammal) Circulation">
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <SingleVsDoubleSVG />
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: PL }}>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Feature</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: AM }}>FISH (single)</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: G }}>MAMMAL (double)</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Heart chambers", "2 (1 atrium + 1 ventricle)", "4 (2 atria + 2 ventricles)"],
                ["Times blood passes heart per circuit", "ONCE", "TWICE"],
                ["Pressure at gills/lungs", "Drops a LOT — slow flow afterwards", "Drops at lungs, then re-pressurised"],
                ["Oxy & deoxy blood", "Mixed at one point in the body's plumbing", "Kept separate (septum)"],
                ["Efficiency", "Slower delivery to tissues", "Fast delivery — supports high O₂ demand"],
              ].map((row, i) => (
                <tr key={i}>
                  {row.map((cell, j) => (
                    <td key={j} style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: j === 0 ? 600 : 400, background: j === 0 ? "#fafafa" : "#fff" }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background: PL, padding: "10px 14px", borderLeft: `4px solid ${PU}`, borderRadius: 4, marginTop: 10 }}>
          <Bold>Advantage of double circulation</Bold> <Ext/> — blood loses pressure crossing the capillaries of the lungs. By coming back to the heart, the pressure can be raised again before being sent to the body. This means <em>fast, high-pressure delivery</em> of O₂ and glucose to active tissues, supporting the high metabolic rate of mammals.
        </div>
      </Sec>

      <Sec id="C" title="C · Heart Structure &amp; Cardiac Cycle (Extended)">
        <p style={{ marginTop: 0 }}>
          The mammalian heart is <KW c={G}>four-chambered</KW>: 2 upper <Bold>atria</Bold> (thin walls — receive blood from veins) and 2 lower <Bold>ventricles</Bold> (thick walls — pump blood into arteries). The <KW c={G}>septum</KW> is a muscular wall between the left and right sides — it stops oxygenated and deoxygenated blood mixing.
        </p>
        <ul>
          <li><Bold>Right side</Bold> — receives <em>deoxygenated</em> blood from the body (via vena cava → right atrium → right ventricle → pulmonary artery → lungs).</li>
          <li><Bold>Left side</Bold> — receives <em>oxygenated</em> blood from the lungs (via pulmonary vein → left atrium → left ventricle → aorta → body).</li>
        </ul>
        <div style={{ background: PL, padding: "10px 14px", borderLeft: `4px solid ${PU}`, borderRadius: 4, margin: "12px 0" }}>
          <Bold>The "thicker left ventricle" question</Bold> <Ext/> — the left ventricle has a wall about <em>3× thicker</em> than the right. Both ventricles pump the <Bold>same volume</Bold> of blood, but the left has to pump it all the way around the body at high pressure, while the right only sends it to the nearby lungs at low pressure (capillaries in alveoli would burst at high pressure).
        </div>

        <div style={{ marginTop: 14, marginBottom: 8 }}><Bold>The cardiac cycle (3 phases)</Bold> <Ext/></div>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <CardiacCycleSVG />
        </div>
        <ol>
          <li><Bold>Atria contract</Bold> — atrioventricular (AV) valves OPEN, semilunar (SL) valves CLOSED. Blood is pushed from atria into ventricles.</li>
          <li><Bold>Ventricles contract</Bold> — pressure rises sharply. AV valves SLAM SHUT (the "<em>lub</em>" sound — heard via stethoscope). SL valves OPEN. Blood is forced out into the aorta and pulmonary artery.</li>
          <li><Bold>Ventricles relax</Bold> — pressure drops. SL valves CLOSE (the "<em>dub</em>" sound — backflow from arteries pushes them shut). AV valves reopen. Blood flows passively from veins → atria → ventricles, ready for the next cycle.</li>
        </ol>
        <div style={{ background: GL, padding: "10px 14px", borderLeft: `4px solid ${G}`, borderRadius: 4, marginTop: 10 }}>
          <Bold>Valves never let blood flow backwards.</Bold> AV valves have <em>tendons</em> ("heart strings") that stop them inverting under ventricular pressure. SL valves are like 3 pockets that fill up to block backflow.
        </div>
      </Sec>

      <Sec id="D" title="D · Blood Vessels — Artery vs Vein vs Capillary">
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: PL }}>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Feature</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: RD }}>ARTERY</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: "#2a4f87" }}>VEIN</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: PU }}>CAPILLARY</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Direction", "AWAY from heart", "TOWARDS heart", "Through tissues"],
                ["Wall", "Thick · elastic · muscular", "Thin · less elastic", "ONE cell thick"],
                ["Lumen (inside)", "Narrow", "Wide", "Very narrow (1 RBC wide)"],
                ["Pressure", "HIGH (pulses)", "LOW (steady)", "Falling along length"],
                ["Valves?", "No (only aorta/PA at heart)", "Yes (prevent backflow)", "No"],
                ["Oxygen", "Oxygenated (except pulmonary artery)", "Deoxygenated (except pulmonary vein)", "Both — exchange happens here"],
              ].map((row, i) => (
                <tr key={i}>
                  {row.map((cell, j) => (
                    <td key={j} style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: j === 0 ? 600 : 400, background: j === 0 ? "#fafafa" : "#fff" }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background: AL, padding: "10px 14px", borderLeft: `4px solid ${AM}`, borderRadius: 4, marginTop: 12 }}>
          <Bold>Flow order:</Bold> artery → arteriole → <KW c={PU}>capillary</KW> → venule → vein. Most exchange happens in the capillary because the wall is one cell thick AND flow is slow there (so more time for diffusion).
        </div>
      </Sec>

      <Sec id="E" title="E · Blood Components &amp; their Functions">
        <p style={{ marginTop: 0 }}>
          Blood = liquid <KW c={RD}>plasma</KW> (≈55%) carrying cells (≈45%): <Bold>red cells</Bold>, <Bold>white cells</Bold>, and <Bold>platelets</Bold>.
        </p>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: PL }}>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Component</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Structure</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Function</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: 600 }}>Plasma</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Straw-coloured liquid (mostly water)</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Transports CO₂, digested food, urea, hormones, mineral ions, heat</td>
              </tr>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: 600 }}>Red blood cell</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Biconcave disc · NO nucleus · packed with <Bold>haemoglobin</Bold></td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Carries O₂ as <Bold>oxyhaemoglobin</Bold> from lungs to respiring tissues</td>
              </tr>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: 600 }}>White blood cell</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Large · has a nucleus · 2 types (phagocyte, lymphocyte) <Ext/></td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Defence: phagocytosis (engulf pathogens) &amp; antibody production</td>
              </tr>
              <tr>
                <td style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: 600 }}>Platelet</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Cell fragments (not whole cells)</td>
                <td style={{ border: `1px solid ${BD}`, padding: 8 }}>Blood clotting — form plug + trigger fibrin mesh</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style={{ marginTop: 14 }}><Bold>The two types of WBC</Bold> <Ext/></div>
        <div style={{ display: "flex", justifyContent: "center", marginTop: 8, marginBottom: 8 }}>
          <PhagocytosisSVG />
        </div>
        <ul>
          <li><KW c={PU}>Phagocyte</KW> — multi-lobed nucleus, granular cytoplasm. Detects chemicals from pathogens, then <Bold>engulfs and digests</Bold> them using enzymes (phagocytosis).</li>
          <li><KW c={PU}>Lymphocyte</KW> — large round nucleus filling almost the whole cell, clear non-granular cytoplasm. Produces <Bold>antibodies</Bold> (mark pathogens for destruction) and <Bold>antitoxins</Bold> (neutralise toxins).</li>
        </ul>
      </Sec>

      <Sec id="F" title="F · Coronary Heart Disease — risk factors &amp; prevention">
        <p style={{ marginTop: 0 }}>
          The heart muscle has its own blood supply via the <KW c={RD}>coronary arteries</KW> (visible on the outside of the heart). If these arteries get blocked, the heart muscle dies.
        </p>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <CoronaryAtheromaSVG />
        </div>
        <ol>
          <li><Bold>Atheroma</Bold> (fatty plaque of cholesterol + WBCs) builds up in the artery lining. Wall becomes less elastic.</li>
          <li><Bold>Lumen narrows</Bold> — less blood reaches the heart muscle. During exercise this causes chest pain (<KW c={RD}>angina</KW>) — a warning sign.</li>
          <li>The rough surface of plaque can trigger a <Bold>blood clot</Bold>. If the clot completely blocks the artery, cells downstream cannot respire → <KW c={RD}>heart attack</KW> (myocardial infarction).</li>
        </ol>

        <div style={{ overflowX: "auto", marginTop: 12 }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: PL }}>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Risk factor</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Can change?</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>How it raises risk</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Diet high in saturated fat", "YES", "↑ blood cholesterol → faster plaque build-up"],
                ["Smoking", "YES", "Nicotine narrows vessels, CO damages artery lining → atheroma forms"],
                ["Lack of exercise", "YES", "↓ heart muscle tone, ↑ obesity risk → strain on heart"],
                ["Stress", "YES", "Stress hormones ↑ blood pressure → more atheroma"],
                ["Age", "NO", "Plaque accumulates with time; risk rises after middle age"],
                ["Sex (male)", "NO", "Males have a higher rate than pre-menopausal females (oestrogen protective)"],
                ["Genetics", "NO", "CHD often runs in families — partly inherited"],
              ].map((row, i) => (
                <tr key={i}>
                  {row.map((cell, j) => (
                    <td key={j} style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: j === 0 ? 600 : 400, background: j === 0 ? "#fafafa" : "#fff" }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background: GL, padding: "10px 14px", borderLeft: `4px solid ${G}`, borderRadius: 4, marginTop: 12 }}>
          <Bold>Prevention =</Bold> stop smoking · reduce saturated fat (more fruit/veg) · regular exercise · manage weight &amp; stress. These tackle the changeable risk factors and lower overall CHD risk.
        </div>
      </Sec>

      <Sec id="G" title="G · Blood Clotting Cascade (Extended)">
        <p style={{ marginTop: 0 }}>
          A wound must be sealed quickly to prevent <Bold>blood loss</Bold> and <Bold>pathogen entry</Bold>. The clotting cascade has three main steps: <Ext/>
        </p>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <BloodClottingSVG />
        </div>
        <ol>
          <li><Bold>Platelets</Bold> arrive at the damaged tissue and release <Bold>chemicals</Bold>.</li>
          <li>Those chemicals trigger enzymes that convert soluble <KW c={PU}>fibrinogen</KW> in the plasma into insoluble <KW c={PU}>fibrin</KW> threads.</li>
          <li>The fibrin forms a <Bold>mesh</Bold> across the wound, trapping red blood cells → a clot. The clot dries and becomes a <Bold>scab</Bold>, protecting the area while new skin grows underneath.</li>
        </ol>
        <div style={{ background: PL, padding: "10px 14px", borderLeft: `4px solid ${PU}`, borderRadius: 4, marginTop: 10 }}>
          <Bold>Key equation:</Bold> soluble <em>fibrinogen</em> → insoluble <em>fibrin</em> (via enzymes triggered by platelets). Remember: fibrin<em>ogen</em> is the soluble precursor; fibr<em>in</em> is the insoluble fibre that catches red cells. <Ext/>
        </div>
      </Sec>

      <Sec id="H" title="H · Named Blood Vessels of Each Organ">
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 12 }}>
          <CirculationMapSVG />
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12.5 }}>
            <thead>
              <tr style={{ background: PL }}>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left" }}>Organ</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: RD }}>Vessel(s) IN (towards organ)</th>
                <th style={{ border: `1px solid ${BD}`, padding: 8, textAlign: "left", color: "#2a4f87" }}>Vessel(s) OUT (away from organ)</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Heart", "Vena cava (deoxy from body), Pulmonary VEIN (oxy from lungs)", "Aorta (oxy to body), Pulmonary ARTERY (deoxy to lungs)"],
                ["Lungs", "Pulmonary artery", "Pulmonary vein"],
                ["Kidneys", "Renal artery", "Renal vein"],
                ["Gut (stomach + intestines)", "Mesenteric artery", "Hepatic portal vein (→ liver, NOT straight to vena cava)"],
                ["Liver (EXT)", "Hepatic ARTERY (oxy from heart) + Hepatic PORTAL VEIN (food-rich, deoxy from gut)", "Hepatic vein (→ vena cava)"],
              ].map((row, i) => (
                <tr key={i}>
                  {row.map((cell, j) => (
                    <td key={j} style={{ border: `1px solid ${BD}`, padding: 8, fontWeight: j === 0 ? 600 : 400, background: j === 0 ? "#fafafa" : "#fff" }}>{cell}</td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ background: PL, padding: "10px 14px", borderLeft: `4px solid ${PU}`, borderRadius: 4, marginTop: 12 }}>
          <Bold>The liver is unique</Bold> <Ext/> — it has <em>two</em> incoming vessels. The hepatic <Bold>artery</Bold> brings oxygen from the heart, while the hepatic <Bold>portal vein</Bold> brings absorbed nutrients (glucose, amino acids) straight from the gut. Both meet in the liver, which processes the nutrients before sending blood back via the hepatic <Bold>vein</Bold> to the vena cava.
        </div>
      </Sec>
    </div>
  );
}
